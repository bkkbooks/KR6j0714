body:
  text: 住嘉禾楞嚴講寺天台比丘靈耀述彌天高判之後諸經皆約三分分文此經從始至歸來佛所為序分從阿離見佛至不戀三界為正宗分此後為流通分序中先通序次別序通序文通而義別別在今經故別序事別而義通通皆有故又今通序聲聞約開顯以歎德菩薩因自恣以來列特異於諸經則又是通中之別矣經前五事今為六種成就一信成就如是如是乃指法之詞猶言此事此人此物之謂也今指此經中所詮初正觀一心次別約招報以明圓解行證直至圓滿菩提歸無所得之法也言此一種密因修證之軌則是我阿難親從佛邊咨問欽聞而得也今復依一宗成範以因緣約教釋文初四悉釋者三世佛經初皆安如是諸佛道同不與世諍世界悉檀也大論云舉時方人令人生信者為人悉檀也又對破外道阿歐二字阿之言無歐之言有外人所計此二為宗今立如是破外道不如不是對治悉檀也又如是者信順之辭信則所聞之理會順則師資之道成即第一義悉檀也次用約教釋者佛先已說今復重述故云如是約文言如約理言是以文是重述故約能詮而論如理本無差故約所詮而論是也約教有四佛言世出世法皆從因緣生因煩惱故有生死若離煩惱即無生死煩惱是集諦生死是苦諦離煩惱是道諦無生死是滅諦阿難傳此與佛說不異故云如是此三藏經初如是也佛言因緣生法當體即空來時不從自他共離來去時不向東西南北去即有而空非色滅空阿難傳此文如理是則通教經初如是也佛言生死之法皆若空華真空涅槃亦如幻化佛性如雲外月逈出二邊阿難傳此與佛說不異則別教經初如是也佛言生死即是中道況復涅槃寧非中道地水火風與空見識一性咸具妙覺明心即相離相雖空而具雖具而空阿難傳此與佛說不異曰如理本無非曰是則圓教經初如是也楞嚴在方等時應具四種如是復經開顯則全成圓教如是矣經雖開顯部在方等且庋本迹此經正宗全明心觀故於序內勿論觀心二聞成就我聞我即阿難自指正法念經明有三阿難阿難陀此云歡喜持小乘藏阿難跋陀此云歡喜賢受持雜藏阿難娑伽此云歡喜海持佛藏阿含經有典藏阿難持菩薩藏蓋指一人具於四德傳持四法門也小乘即藏教雜藏即通教菩薩即別教佛藏即圓教故釋籤初云具如疏文四種阿難然第一義中無我無聞今言我者凡夫三種我謂見我慢我名字我學人二種無見我能伏慢我未能即斷慢我無學一種隨世名字稱我無咎然大經云阿難多聞士知我無我而不二故能傳持如來無礙智慧也聞者大論云耳根不壞聲在可聞處作心欲聞衆緣和合故云我聞大經云有不聞聞有不聞不聞有聞不聞有聞聞一家用配四教若持藏教是傳聞聞法持通教是傳聞不聞法持別教是傳不聞聞法持圓教是傳不聞不聞法今此經中具有四義或有經云聞如是蓋前後其詞耳更有多解不能具出三時成就一時法王啓運嘉會之時感應道交當機得道不後不前名為一時故不標春夏秋冬日月歲時也四主成就佛佛者具云佛陀此云覺者于道場樹下知覺世間出世間總相別相于六即佛中即究竟覺也復能開覺一切衆生故云奇哉衆生具有如來智慧德相但以妄想執著而不證得佛於法性無動無出能令衆生感見動出身長丈六現八十老比丘相木菩提樹下三十四心正習俱盡者三藏佛自覺覺他相也若帶比丘像現尊特身樹下一念相應斷餘殘習即通教佛自覺覺他相也單現尊特身坐蓮華臺受佛職者即別教自覺覺他相也若現不可思議身如虗空相遍于法界即圓教佛自覺覺他相也今經具四教則具四佛約開會說惟一圓佛即向身是圓常之身向佛是圓常之佛也五處成就在室羅筏城祇桓精舍室羅筏或云舍衛新翻豐德以國豐四德一貨財二欲境三多聞四解脫祇具云祇陀正云逝多此翻戰勝太子之名也生時父王與外國戰勝因立美號即須達為之買園造立精舍以施佛者桓即林也精舍者冬屋夏堂僧寮禪窟沙門精行所居故以名焉佛內住首楞嚴定能建大法故迹住精舍以利群生六衆成就分三一聲聞衆五一明類與大比丘衆與者阿難與彼千二百五十人為同聞衆故舉為證信序也又與是共義或云佛與比丘同住一處即佛為主比丘為伴其說亦通若據證信則阿難同衆之說為長若據主伴則佛與比丘為當今以證信為正意耳梵言摩訶今具三義謂大多勝也器量尊重為天王等大人所敬故云大遍知內外經書故云多勝出九十五種外道故云勝比丘名含三義乞士怖魔破惡乞士者有四種食合藥種植田園名下口食仰觀星宿名仰口食四方巧語名方口食呪術卜算名四維口食比丘不作此四名清淨乞士至果成應供德也怖魔者自既出家復化餘人俱離三界乖于魔意魔用力制反被五繫但愁懼而已故名怖魔至果成無生德也破惡者能破煩惱九十八使皆斷故名破惡至果成殺賊德也衆者四人以上乃至百千無量一處羯磨作法行籌布薩事理二和無有違諍名和合衆二示數千二百五十人俱佛初成道度陳如等五人次度三迦葉兄弟兼徒一千次度舍利弗目犍連各兼徒一百次度耶舍長者等五十人經舉大數但云千二百五十此等竝先事外道纍劫勤苦一無所證才遇佛法即得上果感佛恩深為常隨衆也三顯位皆是無漏大阿羅漢孤山曰無漏者內冥中道不漏落二邊也阿羅漢名含三義殺賊應供無生準涅槃四依品第四依即十地菩薩名阿羅漢若常途所釋三漏者一欲漏謂欲界一切煩惱除無明二有漏謂上二界一切煩惱除無明三無明漏謂三界無明然惑業為諸漏之因生死為諸漏之果今言無漏是無分段變易兩種三界諸漏故孤山指為十地此從開顯釋也四歎德佛子住持善超諸有能于國土成就威儀從佛轉輪妙堪遺囑嚴淨毗尼弘範三界應身無量度脫衆生拔濟未來越諸塵纍此明諸大弟子皆住首楞嚴定也古解首楞嚴定者不起滅定現諸威儀今初四句標住此定也在法華中領付家業是佛之子住佛境界護持正法亦是住于大定之中故曰住持言諸有者指二十五有即有而超名為善超豈非住大乘滅盡定耶既超諸有已得寂光之本故能應下三土正容悟物豈非現諸威儀耶從佛下釋上四句初二句釋佛子住持從佛轉輪者佛有頓漸法輪悉能隨轉法華疏云夫首楞嚴種種示現稱適根性靡所不為若法輪初啓甘露門開諸大士化緣未熟示為聾啞全生如乳若所化緣熟則素絲易染池華早開革凡成聖轉乳成酪師宗為上首弟子或智慧神通辨才三昧各各第一共輔法王更度未度重熟已熟于方等座席聞菩薩不可思議功德恥小慕大如轉酪為生酥次聞般若摩訶衍門初歷色心終于種智含挾小大出內取與或共或別或偏或圓奉命領知心漸通泰如轉生酥為熟酥次聞法華會天性定父子授記莂付大乘廢三歸一如餘四味同一醍醐諸大羅漢從法身地俯影隨緣迹臨萬水首楞嚴力方便善權為若此文蓋從佛轉五時法輪示為權行使實行成五味之益是從佛轉輪義也然佛在世則隨轉法輪佛滅度後則妙堪遺囑皆佛子之事如父臨終必有遺囑佛以教法付諸弟子亦名遺囑須知聲聞不堪付囑如老病人不堪寄金無上佛法應付菩薩如二十五人百金可托以諸菩薩善能問答使佛法久住于世增益熾盛利安衆生方名妙堪如此經阿難能種種問佛詮顯深義乃妙堪之相也又臨滅時種種問答名妙堪滅後使佛法久住亦名妙堪故此二句是釋佛子住持也次二句釋善超諸有毗尼翻滅滅身口諸非故或云此非正譯正翻為律律者銓也銓量輕重分別犯非犯也善超諸有定慧之力而定慧由戒而得若具大乘十戒則定慧亦在其中故云惟佛一人持淨戒餘人皆名汙戒者今就分真所證分與佛同可稱嚴淨如是則廣為三界之範苟非超出諸有豈為二種三界之師範乎應身下釋能于國土成就威儀久得法報之本應下三土現十界身方名無量是度說九界衆生歸於佛界也復拔濟未來有情越三界塵纍此顯已得常住法身非灰身滅智者比若自若他威儀咸具故是釋成就威儀也此文先標次釋皆明諸大弟子已住首楞嚴定具二種開顯之義一者開權顯實謂開小乘之權即大乘之實二者開迹顯本謂外現聲聞之迹內蘊菩薩之本此法華開顯之旨咸於經首明之則是經必與法華同醍醐味明矣然或謂今經在法華後說亦未必然今經初會所說徵心辨見等文實在法華之前而歎德反勝法華者以是經佛為結集人說歷二十年始成一部初會所說雖在法華前四五卷去是法華後說阿難自記所聞前後悟門皆在今經若所聞開權顯實開迹顯本之旨不于經首發明更于何處露此意耶蓋通序是經前序在一經之首故亦名經後序是結集人所安故故結集者得明己意若開今經餘經可例知矣由結集人自述所知闡明教意故歎德之語反勝法華也復由結經五名中亦名大方廣妙蓮華王所以開顯之義得于經首明之五列名其名曰大智舍利弗摩訶目犍連摩訶拘絺羅富樓那彌多羅尼子須菩提優波尼沙陀等而為上首舍利弗具云舍利弗羅此翻身子其母好形身身之所生故云身子又云鶖子其母于女人中聰明聰明相在眼眼黑白分明轉動流利如鶖故名鶖子又舍標父利標母雙顯父母故名舍利弗弗子也父名優波提舍故也云大智者聲聞衆中智慧第一如菩薩衆中之有文殊故稱第二世尊佛說一句身子以一句為本七日七夜作獅子吼更出異句異味使無窮盡況佛多說則身子智辨寧可盡耶大目犍連姓也翻讚誦文殊問經翻萊茯根真諦云此翻胡豆二物古仙所嗜因以命族名拘律陀此云無節樹釋論稱舍利弗為右面弟子大目連為左面弟子神通第一通因定生是定慧一雙也稱為大者揀異算數目連等故摩訶拘絺羅此翻大膝舍利弗舅常論勝姊姐懷鶖子論則不勝知懷智人寄辨母口遂往南天竺學十八經時人笑之纍世難通一生非冀喟然歎曰在家為姊所勝出路為他所輕誓讀不休無暇剪爪時號長爪梵志學訖還家問甥所在人云為佛弟子即大憍慢我甥八歲聲震五天彼沙門者有何道術誘我姊子徑往佛所思惟良久不得一法入心語佛言一切法不忍忍是安義此言一切法我皆能破使不得安故言一切法不忍佛問是見忍否梵志自思我墮兩負處若忍是見前云一切法不忍若不忍是見何以勝佛即低頭得法眼淨身子扇佛聞舅論得阿羅漢增一云得四辨才觸難能答拘絺羅第一富樓那父名此云滿彌多羅尼母名此云慈今連父母名云滿慈子于說法人中最為第一中阿含云生處安居比丘稱歎滿慈子少欲知足精進閒居一心正念智慧無漏勸法亦稱第一時身子聞念我何時得見此人他示云白皙龍鼻鸚鵡嘴者是其形像後于安陀林見滿慈子身子問賢者于瞿曇所修梵行耶答如是又問為戒淨修梵行耶答不也為心淨見淨度疑淨知道非道淨道亦知見淨道跡智斷淨修梵行耶答不也又問向言如是今言不也此義如何答為無餘涅槃故修梵行又問以戒淨故設無餘涅槃答不也乃至道迹智斷淨設無餘涅槃答不也又問此義云何答若以戒淨設無餘者此以有餘稱無餘乃至道迹智斷淨設無餘者亦是有餘稱無餘若離此七者凡夫人當般涅槃凡人離七故以不離故從戒淨至心淨乃至道跡智斷淨仁者聽我說喻如波斯匿王欲從拘薩羅至婆雞帝中間布七車捨初乘二乃至捨六乘七婆雞帝人問為乘初車答不也乃至乘第七車答不也准喻可知身子問賢名何等梵行人云何稱汝答我父名滿母名慈梵行人稱我為滿慈子身子稱歎善哉賢者滿慈子為如來弟子智辨聰明決定安隱無畏逮大辨才得甘露幢于甘露自作證值汝者得大利益諸梵行人應縈衣頂戴滿慈子問賢者何名梵行人云何稱答我父字優波提舍母名舍利故稱我為舍利子滿慈子歎曰今與世尊等弟子共論而不知與第二世尊共論而不知與法將共論而不知與轉法輪復轉弟子共論而不知若我知尊者不能答一句況復深論善哉善哉為如來弟子乃至縈衣頂戴云云大膝滿慈是辨才說法為一雙也須菩提翻空生生時倉庫器皿一切皆空占者言吉因空而生字曰空生若供養者得現果報故名善吉佛忉利下率土輻輳爭前頂禮尊者端坐石室念諸法空色非佛乃至識非佛眼非佛乃至意非佛豁然悟道佛告蓮華比丘尼非汝前禮汝禮色身須菩提巖中晏坐前見法身優波尼沙陀此云塵性以觀塵性空得道故空生塵性是以空有為一雙也更有餘人經不具載故云等也此皆頭角聲聞為衆知識故曰上首孤山曰諸經列名不同或尚年臘則先陳如或尚聲德則先身子今從尚德之例二緣覺衆復有無量辟支無學并其初心同來佛所梵語辟支迦羅此翻緣覺觀十二因緣而悟道故亦翻獨覺出無佛世無佛自悟故景德云梵言畢勒支底迦此云各各獨行音義云獨覺正得其義也長水云此分二類其利根者曰麟喻麟之獨角出無佛世觀物變易自覺無生其鈍根者曰部行亦出無佛世部黨而行師徒訓化即中云經既云并其初心正似師徒共集是佛世亦有部行也然部行未必全鈍為師者必自悟即麟喻也徒衆隨之可名為鈍即部行也言無學者㭊玄云至此位中四智已圓無法可學故名無學有四無生智一我生已盡苦諦智也二不受後有集諦智也三梵行已立道諦智也四所作已辦滅諦智也初心者即是初發辟支佛心妙玄云此人根利不須制果又能侵習譬如身壯直到所在不中止息故不制果雖不制果豈無初心之人緣覺獨覺有種種辨今不繁述不列名歎德者厭喧樂靜多在空間不為衆所知識故耳若據開顯則阿羅漢位在十地無學亦然若從本為名且從小乘釋之以無歎德之文也三菩薩衆此文應在別序中成發起序言發起者如來當說戒時而阿難將毀戒體意必相關故云發起然通序中列衆未竟故且屬通序又託因緣以列菩薩益見此經巧妙屬諸比丘休夏自恣十方菩薩咨決心疑欽奉慈嚴將求密義即時如來敷坐宴安為諸會中宣示深奧法筵清衆得未曾有迦陵仙音遍十方界恆沙菩薩來聚道場文殊師利而為上首屬者當也夏於此休故云休夏孤山曰自恣律開三日七月十四十五十六也自迷所犯恣任僧舉當懺清淨曰自恣菩薩者具云菩提薩埵大論云菩提名佛道薩埵名成衆生用諸佛道成就衆生故又菩提是自行薩埵是化他言十方者跋陀婆羅等菩薩是本國人為菩薩衆中之主餘諸菩薩多從十方來左氏云訪問于善為咨心疑者塵沙無明未盡則有疑也如來大慈時當說戒故云慈嚴欽奉顯菩薩之心慈嚴顯如來之德九旬禁足無由見佛故于夏終而覲禮焉將求密義者約時而論于般若時欲聞法華涅槃約教而論對佛說戒指大乘深定慧為密義也即時下明應機說法宴安屬定宣示是慧非禪不智須先入定末世狂慧多不從三昧而得聖人應物垂範于一文中具三學可不遵耶深奧者大經云十二部經修多羅中微細之義為菩薩說淺近之義為聲聞說即中云無常無我即是淺近無常中有常無我法中有真我豈非微細今云深奧意亦如是迦陵頻伽翻妙聲鳥出雪山在殼中能鳴即勝諸鳥其聲和雅聽者無厭佛音如之遍十方界是佛圓音如俗典載吳孫休時有人能為響言言于此而聞于彼自其所聽之不覺其聲之大也自遠聽之如人對言不覺聲之自遠來也聲之所往隨其所向遠者所過十數里凡夫報法尚有如此况如來仙音寧不遍到所謂圓音落落該十剎而頓周又豈目連所能窮究者哉恆沙菩薩非即前十方之衆因聞仙音故來聚集感應道交法門是起文殊師利此翻妙德以證法身般若解脫三德于楞嚴會上為擇法眼故居上首也二別序二一王臣營齊二阿難被攝初又二一佛應王宮時波斯匿王為其父王諱日營齊請佛宮掖自迎如來廣設珍羞無上妙味兼復親延諸大菩薩波斯匿此云和悅亦翻勝軍仁王經波斯匿名月光德行十地也諱日者曲禮云卒哭而諱謂諸侯既葬七月有祭於庭廟謂之卒哭乃命于中宮捨故而諱新無敢稱名故匿王以其日設齊恭延聖衆所以資先王之靈也又諱日亦云忌日祭義曰忌日必哀稱諱如見親宮掖者按唐志及宋元宮殿録掖皆謂掖垣掖門而非內庭蓋云宮城也若班固西都賦云後宮則有掖庭椒房呂向注掖庭宮名在天子左右如肘掖也此文請佛下有五重見敬之至其迎則親其設則廣其羞則珍味則無上伴則諸大士也若請佛宮掖是處中之道耳齊者齊也不過中食方言云羞熟也謂熟食也或云羞進也二僧應臣舍城中復有長者居士同時飯僧佇佛來應佛敕文殊分領菩薩及阿羅漢應諸齊主天竺以積財巨億為長者守道居正為居士韓子曰厚重自居謂之長者玉藻云居士錦帶注曰居士道藝處士也二阿難被攝二一獨行無供二乞食遭攝初又二一簡阿難他行惟有阿難先受別請遠遊未還不遑僧次先受別請或因他事而非齊也長水曰涅槃言阿難不受別請蓋不隨佛受別請耳四分律明請僧有二種謂僧次請別請也雖律開別請而諸文中多斥別請偏讚僧次十誦律云別請佛及五百羅漢不如僧次請一似像極惡比丘成論云僧次請僧如飲海水即飲衆流梵網經中亦作此說二明獨還無供既無上座及阿闍黎途中獨歸其日無供上更無人名上座阿闍黎此云軌範師律制僧遠出侶須三人一上座一軌範師所以嚴行止防誤失也今無上座阿闍黎故獨歸不遑僧次故無供是為乞食遭攝之緣也二乞食遭攝二一乞食運懷三一俯運等慈即時阿難執持應器於所遊城次第循乞心中初求最後檀越以為齊主無問淨穢剎利尊姓及旃陀羅方行等慈不擇微賤發意圓成一切衆生無量功德當日初分乞食易得故云即時鉢云應器以其體色量三皆應法故熏聞云律明鉢體大要有二泥及鐵也色者熏作黑色赤色或孔咽色鴿色等量者大鉢受三斗小者受斗半中者可知南山云此姬周之斗也凖唐斗上鉢一斗下者五升城即室羅筏城檀越此云施主望前僧次是為最後即中云最後檀越謂從末飯僧者求得此人即名初求非阿難初發是心也摩登非其人耶所求齊主中淨穢為一雙貴賤為一雙剎帝利王族即貴姓也旃陀羅云殺者即賤姓也方法也軌則如來行平等慈也微賤之言兼穢與旃陀羅既云不擇豈擇摩登伽乎欲令淨穢皆趣菩提故云圓成無量功德夫大士行門全憑本願後來性比丘尼速取無學必歸佛果亦可謂成無量功德矣二仰遵訶誡阿難已知如來世尊訶須菩提及大迦葉為阿羅漢心不均平欽仰如來開闡無遮度諸疑謗言已知者阿難未證羅漢已知羅漢有偏所以獨仰如來又此時已過方等故云已知也須菩提捨貧從富大迦葉捨富從貧一為富者易施一為貧者植因如來訶之是闡明平等無遮之慈而超越不均之疑謗言欽仰者阿難欽仰如來之至訓耳三肅儀如法經彼城隍徐步郭門嚴整威儀肅恭齊法城之濠塹曰隍齊法者齊整嚴重次第行乞之謂也分衛經明一切賢聖欲濟貧苦故入聚落當乞食時乃至入無城想見無人想阿難嚴整威儀肅恭齊法是已此等運心行事皆遭攝之由也二經歷遭攝二一攝入淫席爾時阿難因乞食次經歷淫室遭大幻術摩登伽女以娑毗迦羅先梵天呪攝入淫席淫躬撫摩將毀戒體長水曰摩登伽義翻本性下文云性比丘尼是也孤山曰摩登伽經云阿難昔五百世曾與此女而為夫婦愛習未忘故有斯事資中曰娑毗迦羅即金頭仙食米臍外道師事梵天而得此呪幽溪曰戒體即無作戒體也謂授戒之時三白四結身口承受心不異緣因作得戒發得無作之戒無作者戒體常存任運成就非關身口造作故云無作戒疏所謂不起則已起則性無作假色是也須知毀戒正毀此體後云心清淨故尚未淪溺則將毀而已當機初果已斷邪淫不入欲流故不淪溺二如來慈救三一在宮密知如來知彼淫術所加大經云佛求侍者心在阿難如東日照西壁當此被攝豈得不知彼指阿難以呪導淫名為淫術幽溪曰如來知彼淫術所加正明佛界機興感應道交也知之一字即如來鑑機之智寂而常照無緣慈悲之體也二歸園演法齊畢旋歸王及大臣長者居士俱來隨佛願聞法要於時世尊頂放百寶無畏光明光中出生千葉寶蓮有佛化身結跏趺坐宣說神呪如來常儀受請齊畢俱為說法今既速歸必別有意故王臣大衆相隨而來也於時者是將毀戒體之時頂即無見頂相華嚴云初生疾捧持諦觀不見頂故知此頂即法身也然不但從頂現而且放光不但放光而且涌千葉寶蓮故知無為心佛無上神呪尊之至矣無善不具故曰百寶無惡不摧故曰無畏因果滿足故現千葉寶蓮化佛從頂現且坐千葉寶蓮即報身也故此文中三身咸具釋迦應身也頂法身也華臺現佛報身說呪全是智光特敕文殊有由來矣問如來既知逼切何不于王宮施救而必待返精舍耶答佛知初果不犯邪淫不妨稍緩且提獎歸來登伽亦至王宮豈所宜乎問登伽小術佛何不自說呪而假之化佛且特遣大智文殊區區惡呪安用牛刀答今值希有之事故施難思之法希有事者文云遭大幻術摩登伽女何但小術故以微賤而欲得阿難王子為夫一奇也以邪攝正二奇也以凡匹聖三奇也初果聖人戒體將毀豈無纏綿之意良由五百世中常為夫婦恩愛已深豈小緣哉非法報應三身之力莫破著相之惑非文殊大智不堪受敕況淫愛之障為生死本今借阿難發起以救末代衆生此所謂難思法也若據摩登伽經但是如來自說一呪解彼淫術問他人犯淫如來未必即救今救阿難一何騷擾答初果之法不墮邪淫今佛設救即其驗也末代有證初果者感應亦然其未證須陀洹者本是凡夫安得責如來之不應乎苟放逸不謹但於生死海中頭出頭沒而已三文殊護歸敕文殊師利將呪往護惡呪消滅提獎阿難及摩登伽歸來佛所頂光化佛體勢尊嚴所說神呪在小智尚不能解況往救乎非文殊固不能受敕也而文殊密說妙解惡呪阿難亦不顯聞故後文云云提謂提拔獎者助也亦借力也與登伽同歸者如下經題五名中云救護親因度脫阿難及性比丘尼是也登伽不但出家兼證聖果如下文云淫火頓歇得阿那含此中特未敘耳至文殊簡圓通竟成阿羅漢若據登伽經說聞呪時未言得益尋求阿難自到佛所且非文殊提獎而歸至聞說法亦證四果然則兩經並由聞經證阿羅漢但大小機見不同古注云若約實行則機熟得道之時由阿難牽以欲鈎後令入佛道也若是大權乃同阿難發起是教以益群機耳別序竟正宗大分二章從阿難啓請妙奢摩他去至問結經名乃正觀總無明心以明修證從阿難問七趣何生至不戀三界約別能招報心以明修證大凡行人修行貴乎先得其本一切衆生自一念不覺即成根本無明以障本覺而即本覺心亦不變隨緣為一念陰識所謂法性之與無明遍造衆惡名之為染乃成現行發得業報枝末而不知一念識陰體雖虗妄亦即真常如經云一切浮塵諸幻化相當處發生隨處滅盡其性真為本如來藏妙真如性又云使汝流轉生死結根即汝六根更非他物使汝究竟安樂妙常亦汝六根更非他物知見立知即無明本知見無見斯即涅槃迷妄有無明發明即解脫故只須觀此總無明心則自然妄去真顯垢盡明生如灸病得穴伐本枝枯之要道今如來開口即徵問此心正令觀破此一念陰心真心自顯之妙法今家揀境修觀觀現前一念顯難思妙境皆先根本之意也至下七趣五陰是五識五意識受想行三心之現行能招報及禪定中發起則觀不發不觀之發得能招報皆枝末相應惑也故略一揀斤令行人不著即顯本如來藏矣如大綱中說今初為兩章一正明修證二結顯經名初中作三大章一約破顯以開圓解二示正助以修圓行三明迷悟以證圓位初開解中一對阿難雙約次不次明三止觀次對滿慈更審除細惑明如來藏初又三一阿難悔請阿難見佛頂禮悲泣恨無始來一向多聞未全道力殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便阿難持法藏人示迹恆為魔嬈此獨悲泣者悲從自恨而發也法華經云昔於空王佛所同如來發心佛常勤精進故成菩提阿難常樂多聞未得無漏據此則無始來一向多聞信矣此時在法華前尚未發迹然聖位中人詎不自知多生習性乎道言體也力言用也有道而後有力有體而後有用既以多聞小慧自咎故自敘殷勤啓請等十方如來者言諸佛道同小乘中不言有十方佛阿難發心本在圓大故言十方所謂一切無礙人一道出生死也如來是極果人菩提是極果法果必有因妙奢摩他三摩禪那是也妙者言一心中具此三法考諸翻譯奢摩他翻止乃寂靜之義宜屬於空三摩翻俗宜屬於假禪那翻靜慮雙收止觀宜屬于中空假中在一心中故名為妙古今解此文者具有三說會解云奢摩他等乃楞嚴大定之別名也孤山嘗用三止配之一曰體真止止於真諦即奢摩他也二曰方便隨緣止止於俗諦即三摩也三曰息二邊分別止止於中道第一義諦即禪那也依此則三名皆屬于止或云一奢摩他是空觀二三摩是不空觀三禪那是中道觀則三名皆屬於觀然考圓覺經中三皆名定又名三淨觀如釋題中已引故知偏止偏觀皆非圓乘三名咸具止觀方為正義奢摩他者真諦之止觀也三摩者俗諦之止觀也禪那者中諦之止觀也如是解之庶無遺漏人情自屬安可依耶或云奢摩他是止三摩是觀禪那雙收止觀作此釋者于義無礙消文即偏言于義無礙者如止觀云次第三觀中二乘及通菩薩有初觀分此屬定多慧少不見佛性別教菩薩有第二觀分此屬慧多定少亦不見性二觀為方便得入第三觀則見佛性則以空觀屬定而今以奢摩屬止止即是定以假觀屬慧而今以三摩屬觀觀即是慧義正相符故無礙也言消文即偏者諸師分文以徵心辨見屬奢摩他而其中豈可無觀以五陰三科為諸三摩提而其中豈可無止豈非欲圓而反偏耶故以三名圓具止觀為正釋也三止觀咸在一心始稱為妙應知若約圓乘空假中三既在一心定慧二輪必無偏取古人云義立三名體惟一法舉一即三言三即一三一互融故謂之妙如是妙修方曰楞嚴大定準此亦應云義立止觀體惟一法舉定即慧言慧即定方謂之妙方可稱楞嚴大定又圓覺經中奢摩他三悟後方修今從初即論者亦約圓乘釋義境智行三在一心中方名妙也如玄籤三下行妙初文盛明此義若昧此義何以消今文耶束上所說共有三義一三法在一心二三觀三止咸在一心三解行證亦在一心始稱為妙此乃一經之要旨趣理之玄門菩薩所修宗極于此如來所證亦不出此的是今經能觀之觀且是如來成道之本一佛既爾諸佛咸然文中但言十方而三世可準知矣最初方便者三觀之先更有一三摩提即最初方便是名為假也阿難此問徹上徹下該果該因如來下文所說總酬斯問之意而已二大衆願聞於時復有恆沙菩薩及諸十方大阿羅漢辟支佛等俱願樂聞退坐默然承受聖旨三觀法門兼於圓別孰不當聞大衆欲聞假于請主故默然承受至下如來一喝中當有無量三乘四衆在座悟入如良馬見鞭影即歸正路者皆此處願聞之衆也三如來演說二初酬請開示二聞法領悟初文分三初寄從假入空酬奢摩以助圓理即徵心辨見之文是也二寄從空出假酬三摩以歸圓理即五陰三科之文是也三明中道了義酬禪那以顯圓理即性具七大之文是也瓔珞云從假入空觀亦名二諦觀從空出假觀亦名平等觀二觀為方便得入中道第一義諦觀雙照二諦心心寂滅自然流入薩婆若海與今楞嚴宛然符契但今經一以圓融為主約次第以顯不次節節明別節節入圓考之止觀意亦如是故輔行云先明次第意者令不思議易顯故也若棄思議別求不思議者遠矣從來解者雖立三觀而不善用瓔珞經文故于解釋多有不順今以七番逐破為空前之假假即三摩提的是最初方便為從假入空觀庶合經旨大論云因緣所生法我說即是空亦名為假名亦名中道義因緣生法即假也觀假為入空之詮非方便乎就初從假入空中分二初審問心見二破妄顯真破妄顯真即從假入空觀也如來欲示能觀妙觀且先徵出現前陰心為所觀境境既定已觀方可施如射必定的灸先定穴須知一切名色五識五意識受想行心竝是今境俱得為觀但寬漫難入若觀心者近而復要故須徵出此總無明心為今破顯張本言總者真妄皆在其中也蓋心有真心妄心見有真見妄見下文云使汝流轉使汝安樂皆此六根更非他物是也今如阿難所執若知若見無非是妄所謂知見立知法在必破下文所顯若知若見無非是真所謂知見無見又所當護矣蓋此心為衆生出生死之大本諸佛度衆生之要訣若心境不定即妙奢摩他等能觀妙觀從何處用耶初文中分為二一審問發心二詳審心見初又二一問佛告阿難汝我同氣情均天倫當初發心於我法中見何勝相頓捨世間深重恩愛阿難此云慶喜斛飯王子如來成道夜生淨飯既聞太子成道斛飯又奏宮中生男舉國欣慶因名慶喜孤山曰斛飯王子者初師子頰王有四子一曰淨飯二子一悉達二難陀二曰斛飯二子一調達二阿難三曰白飯二子一摩訶男二阿那律四曰甘露飯二子一跋提二提沙弟兄為同氣情均天倫者阿難是佛堂弟與嫡無殊故曰情均言天倫者天然倫序是天性之親也此出家之由也當初下更審出家之意夫遇境生心每事皆然而徵問阿難之發心見相以嚴初離俗一念為出生死成佛之因因地若真必獲聖果苟帶凡情即混生死故特徵之益知真妄皆在一心中也發心即該下文所徵之心見何勝相即下文所辨之見次答阿難白佛我見如來三十二相勝妙殊絶形體映徹猶如琉璃常自思惟此相非是欲愛所生何以故欲氣粗濁腥臊交遘膿血雜亂不能發生勝淨妙明紫金光聚是以渴仰從佛剃落我見下是答見相常自思惟下是答發心三十二相者下自奩輪上至肉髻超勝轉輪故云勝端嚴美麗故言妙殊絶者謂世間所必無也映徹者當是世間色象皆于身中現故譬琉璃答發心中先標次徵釋言粗濁者人當欲時氣息極粗以知昏濁之至男女遘精故是腥臊謂臭穢也所成之形則膿血雜亂勝淨與腥臊相反淨謂無穢妙明與粗濁相反妙則非粗明非昏濁紫金光聚者閻浮檀金比迦葉身金猶如聚墨若比佛身迦葉復如聚墨如此妙身豈從欲生若據渴仰之心亦欲成佛故捨深重恩愛而出家所謂見相發菩提心也天如曰阿難見相乃緣塵分別之見其所發心乃妄想攀緣之心後文七徵八辨重重逐破者此也交光曰下文正破思惟之心不破見相之見以見是所顯非所破故然見有真妄真見是所顯妄見是所破何云全不破耶後云如是見性是心非眼是所顯也又云見聞如幻翳是所破也故交光顯見之言不如辨見為妥又所發之心亦通真妄若知愛樂之心從緣而起本無心相即通於真若認愛樂為心即屬於妄故於善哉阿難下雙示真妄也二詳審心見又三一直示常心二勸進直心三正審心見先示常心者如來之意謂發心貴乎真正阿難緣相好發心不可不謂之正而攀緣未息著相未忘未必全真故特示常心即首標不思議境也契悟真常則發心真正矣佛言善哉阿難汝等當知一切衆生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉善哉阿難者美惡不嫌同辭也如來將示第一義諦先以大慈哀憫之辭與而進之如止觀明發心有多種有見種種相好而發心者有聞種種法而發心者乃至第十云云今阿難見相發菩提心誠可嘉歎汝等指現前大衆一切衆生遍及有情從無始來豎窮過去由所示者大故所告者多所追遡者遠也生死相續謂積苦至今從來未悟故云不知即無始無明也常住真心者言語道斷心行亦訖不生不滅離根離塵一切皆妄唯此獨真常途以隨緣為心不變為性此文心即是性然亦以遇緣常了為心從來不改為性離染常照故曰淨明是人心體亦是經體須知小乘詮真理大乘詮中理蓋心非心智非智之別也輔行云藏通三乘皆為滅心以為極果據此文則真理非心今云常住真心故中理是心小乘灰身滅智故真理非智今云性淨明體故中理是智然以心智為中理亦通圓別二教如下文云諸法所生唯心所現一切因果世界微塵因心成體夫心既常住則一切莫非常住二卷云五陰六入從十二處至十八界本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了不可得據此文則總指諸法皆常為常住真心亦即現前一念心王若證此心即如意珠王身也妙玄云小乘灰斷無如意珠身正是此意言如意珠者譬如來現形十界隨所宜身說所應法不須作意身土互融如如意珠王隨意雨寶妙玄之意以十界身土性本具足隨機變現方名圓教常住豈但以性不生滅為常住乎今經七徵之後有圓別進否之義進則明圓否則明別在圓教中以圓融三諦為常而帶最初方便或但指見性為常根塵非常雖撥根塵與小乘空理有異實別教耳今經正意的顯圓常旁兼別教苟不甄別鮮不以別而為圓矣向下更明茲不繁述用諸妄想謂用攀緣心為自性也妄想非一如五陰即有五重妄想故名曰諸妄想生已即滅元非實有如鏡上塵垢而已今若以此為因則所感生死之報起滅不停猶如輪轉如來將欲破妄故雙示真妄真心是其所顯妄心是其所破兩重能所不待下文而已宛然於此矣二勸進直心汝今欲研無上菩提真發明性應當直心酬我所問十方如來同一道故出離生死皆以直心心言直故如是乃至終始地位中間永無諸委曲相真發明性是了因也謂真欲發明性體也或云真發明性者從真發現之謂也如後文云我以妙明不滅不生合如來藏至故發真如妙覺明性是真發明性也勸進直心者經云一者直見不邪二者直聞不聽三者直治不曲四者直說不煩五者直行不迷六者直念不思七者直意不動八者直受不尋今言直心即是常心此心下不落乎攀緣上可合于常住後徵問時欲阿難有疑即陳勿自遮掩故如來答之便成應病與藥之益所以欲效十方如來出離生死先當效其直心古人云後文言識精元明能生諸緣緣所遺者即直心也攀緣心者即虗假也古人所言良可思矣言者心之聲由心直故所言皆直酬問即言直也此文正明十方如來心言皆直故所歷地位咸無委曲以有頓超十地之用先言終而後言始意勸當機之倣效焉三正審心見分二一審心見二審心目之處初中先問阿難我今問汝當汝發心緣於如來三十二相將何所見誰為愛樂前阿難言見三十二相發心愛樂真妄端倪已露如來就此端倪更為研究前雖云見未曾言目故今問將何所見前云渴仰即是愛樂故復問誰為愛樂次答阿難白佛言世尊如是愛樂用我心目由目觀見如來勝相心生愛樂故我發心願捨生死如是下總答由目下別答也由目觀見是答將何所見下文云如是見性是心非眼而今以目為見謬矣心生愛樂是答誰為愛樂真心本無攀緣而今以愛樂為心是取緣塵分別之心謬矣兩謬之外更有一謬尊者是謂心不能見豈非謬耶雖發心願捨生死生死由之起矣然如是病根今七徵初尚不即破至辨見初方破此病幽溪云止觀明見相發心有四種有見父母生身而發心者有見勝應而發心者有見報身而發心者有見法身而發心者今阿難所見即父母生身然四教雖即不同莫不一以生為身境解圓則圓解偏則偏故如來先標常住真心為本然後誨敕阿難當以直心酬我使阿難果能依常住而發心一以直心訓佛所問如柏庭所謂我以心見見佛惟心我心遍于佛身佛身現我身內心不自知心佛不自見佛心有想則癡無想則泥洹是真見佛般舟云又能了知如來之身前際不來後際不去今亦不住不觀色不觀色如不觀色性等淨名云是則依於佛慧不以二相見於如來唯依心現不離真如能如是答則七處徵心無從生起安有是經惟阿難發起是教特閟其妙惟以緣心酬佛所問曰如是愛樂用我心目安能契常住真心哉次審心目之處先問佛告阿難如汝所說真所愛樂因於心目若不識知心目所在則不能得降伏塵勞譬如國王為賊所侵發兵討除是兵要當知賊所在使汝流轉心目為咎吾今問汝唯心與目今何所在阿難言目見心樂佛即當破見者非目愛樂非心但尊者病根已露必使病根盡露方堪應病與藥蓋病有根標藥有緩急先破心在內者所謂急則治其標也真所愛樂謂真誠愛樂所字助語詞耳文有法譬合因于心目即下心目為咎之意下文七徵以破妄心之處是降伏塵勞假使阿難不執在內何由破其內乎餘六亦爾以心例目其意亦然執目在面然後可破在面之目如云眼能顯色如是見性是心非眼非破在面之目耶或謂此文但破心而不破目豈不謬耶塵謂塵緣由塵緣而勞纍心神也譬中國王譬真心賊譬妄心如來七徵喻發兵討除賊所在喻七處合中使汝流轉同國王為賊所侵心目為咎是妄心妄目若真心真見有何咎與又此文雙標心目為咎而今特破心者是所對所觀之陰心根本若破心已如伐本枝枯擒賊擒王法也目是枝末至下略破即足矣問心與目何在者合是兵要當知賊所在次答阿難白佛言世尊一切世間十種異生同將識心居在身內縱觀如來青蓮華眼亦在佛面我今觀此浮根四塵祗在我面如是識心實居身內先舉凡心在內次舉佛眼在面例己亦然是尊者答詞之巧也十種異生者或云十二類中除空散消沉及精神化為土木金石但有十類熏聞云青蓮華眼者天竺有青蓮華其葉修而復廣青白分明有大人目相故以為喻𭬥李云浮根四塵即外五根名浮塵根浮謂粗浮塵以染汙為名染汙真性故根以能生為義能生五識故然內五根皆清淨四大所造屬不可見有對色也又內外五根皆具八法所成能造四大地水火風所造四塵色香味觸今在浮根中能造四大性不可見故指所造而已夫前指目為能見是一重謬今云眼根在面是第二重謬也前指愛樂為心是一重謬今云心在身內是第二重謬也後文云十方虗空生汝心內猶如片雲點太清裏又云汝身汝心皆是妙明真心中物今言識心實居身內乃當機之大謬須先擒破此屬心王也至於眼根二謬枝末稍緩俟辨見中破若不破眼根則恐又墮根塵之中成常見外道矣二破妄顯真破妄即是從假顯真即是入空從假即假觀也顯真即空觀也嗟夫世人不善觀心不知圓別門戶聞次第三觀先空次假後中便欲直從空觀而入不知欲入空者先須觀假所以瓔珞云從假入空觀亦名二諦觀摩訶止觀云觀假為入空之詮空由詮會聖說如此豈可違乎若不觀假而能入空此古今必無之事須知從假入空乃空前之假非空後之假也今觀妄心不在七處意顯妄心元非實有豈非假乎所言假者非謂永無但非實有苟直以妄心為一無所有即如水消鹽之邪空矣又從來習台教者皆謂楞嚴尚耳根天台觀六識然今所破妄心豈非第六意識此與止觀去丈就尺去尺就寸簡去四陰唯觀識陰的觀現前一念總無明心文意正同昧者猶欲岐而二之不可解也文中先約三摩提觀假次約奢摩他顯真二科之中皆明圓理初文分七先破心在內又三一以現事比例二示最初方便三正破斥在內初中三一定內外心若在內應先見內內必先見外必後見故先問內外也佛告阿難汝今現坐如來講堂觀祇陀林今何所在世尊此大重閣清淨講堂在給孤園今祇陀林實在堂外現坐者謂現在可據之事當以為例也講堂在內祇陀林在外其事顯然而反問阿難者欲其親自答出則無可回避耳若比例者阿難例心講堂例身現坐講堂例心在身中祇陀林以喻身外世尊下阿難答也堂在園中隱然指身為內境林在堂外隱然指物為外境據其自說則內外定矣二定先後阿難汝今堂中先何所見世尊我在堂中先見如來次觀大衆如是外望方矚林園此定見之次第也內外既定先後斯分故問先後文意本以阿難例心而今問汝在堂中先何所見則儼然以心為能見矣但急攻心在內之執未顯破目在面及見者是目之病者先根本而後枝末自然之道也阿難所答必先見內而後見外以此例心亦當先見焦腑後見外物明矣蓋以講堂例身如來大衆當例五臟故也三定因由阿難汝矚林園因何有見世尊此大講堂戶牖開豁故我在堂得遠瞻見內外先後已定綽然可以破心在內茲復問因由者欲阿難答出戶牖開豁蓋既以阿難例心便當以戶牖例五根也隱然指五根開通然後心得緣於外境是則據當機所答外以眼為戶牖明矣執心在內此計既破眼為戶牖即此可破眼為能見之執故知破有傍正此中正破妄心傍駁妄見正根露枝枯也二示最初方便爾時世尊在大衆中舒金色臂摩阿難頂告示阿難及諸大衆有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路汝今諦聽阿難頂禮伏受慈旨前比例已竟即應破執佛不即破而云有三摩提等者示最初方便也破法先須觀假假是三摩提特舉其名以冠徵心辨見之首焉此名古師講之太略但云圓融三諦舉一即三今人講之太訛云三摩提是總相法門夫首楞嚴已是總相今又以三摩提為大總相何所總耶考圓覺經以靜幻寂釋奢摩他等三名而云三摩提起幻今經亦云如幻三摩提則三摩提為三觀中之假觀三定中之假定明矣又翻譯中翻三摩提為等持釋云離沉掉為等令心專住一境為持既云專住一境非假而何然特舉假者何也當機首請一心三觀理最圓融要因門入世尊于三法中特舉三摩提為入門方便使措心有地亦通途修定之法耳蓋三觀有二種一次第三觀二不次第三觀次第三觀必先假後空瓔珞經云從假入空觀亦名二諦觀從空入假觀亦名平等觀人但知空假中為三觀而不知有空前之假有空後之假空前之假名從假入空止觀云觀假為入空之詮空由詮會正是此義空後之假名從空出假止觀明復疏倒入即是其義二假義異其名則同今經有三摩提乃是空前之假後文開示奢摩他路非從假入空乎圓融三觀必約假以立空中三大部中其例甚多聊舉四文不能盡引妙樂釋經萬二千人俱觀心中云境據假邊且存其數空中尚無其數安在然必約假以立空中觀亦如是止觀云若一法一切法即是因緣所生法是為假名假觀也若一切法即一法我說即是空空觀也若非一非一切者即是中道觀彼文觀不思議境中歷陰入界等文文如是是亦約假以立空中也輔行云三諦無形俱不可見然即假法可寄事辨即此假法即空即中妙玄云見思幻破真諦幻成無知幻破俗諦幻成無明幻破中道幻成如上四文總明圓教行人必從妙假入門假即空中一心具三止觀今經圓旨義趣全同故首標有三摩提下即云大佛頂等其意可見如是則七徵之文即是圓門但世尊以圓融立宗阿難每從方便啓請至七徵後重請示奢摩他路顯今七徵但是從假至後辨見方是入空此別教義分圓即別融別即圓圓別豈相礙耶後有三番進否之文進則明圓否則明別進否之義實昉于此名大佛頂下此世尊以圓融立經名也上雖但立三摩提而假能破法即是空中圓融三諦是法身之理法身遍到妙明無相名大佛頂證入此諦由三止觀首楞嚴王該三止觀即具萬行總定具別故稱為王準題中名諸菩薩萬行今雖不言菩薩義已該之又在菩薩但名萬行首楞嚴在佛名首楞嚴王今文多就如來說也次云十方如來一門超出妙莊嚴路即如來密因修證了義也一門超出豈非密因因即是門後文云識陰若盡如是乃超十信等五十五位是已妙莊嚴是修證謂一心具萬行之因莊嚴果德也然一門對十方說十方佛雖多孰不由此一門超出路對果說門之與路皆却指因中之修耳經題存三隱二義得于此須知十方如來皆從觀假得入由觀假故證大佛頂乃至具妙莊嚴行人捨此何從證入耶而以此為最初方便者空假中之前又有一假豈非最初方便乎定林云摩頂者撫以示愛禮足者伏以示敬上愛下故摩頂下敬上故禮足三正破斥在內二一立例按定佛告阿難如汝所言身在講堂戶牖開豁遠矚林園亦有衆生在此堂中不見如來見堂外者阿難答言世尊在堂不見如來能見林泉無有是處如汝所言牒阿難語也身在講堂而見堂外牒前初二兩答戶牖開豁牒前第三答此兩義皆是能例次云亦有衆生就所例說與能例違此衆生隱然指阿難也不見如來而見堂外正如阿難心在身中不見身內而但見身外也如阿難答斷無不見內而見外之事是自破心在內義長水云只知據理直申不覺計宗危矣二循例正破破中先例次縱後結阿難汝亦如是汝之心靈一切明了若汝現前所明了心實在身內爾時先合了知內身頗有衆生先見身中後觀外物縱不能見心肝脾胃爪生髮長筋轉脉搖誠合明了如何不知必不內知云何知外是故應知汝言覺了能知之心住在身內無是處例破中初句正斥汝亦如是者謂汝即是不見如來能見林泉之人也汝之下破計先立義云心靈一切明了有二義一者內外皆見故曰明了二者眼見耳聞皆是心靈故云一切明了如是即旁破眼為能見應上文戶牖之喻也若汝至身內此句牒執爾時句定也頗有下正破在內之計古解云頗者可也或云少也意言不問其多還少有人見身中否既無此人不合言心在內此句即是破辭縱破者謂太近不見或不能見心肝脾胃如眼不見睫理亦有之而爪髮生長筋脉轉搖誠應明了如何不知此句責破必不內知等者并責不應見外言汝心在內而不內知況外物疏遠而能知耶此句生起下文心不住內也阿難計心在外由聞此語謂除非心在外則知外耳結破者一切凡夫皆謂心在身內阿難初果宜無此執示與衆同亦言在內如上所破心不在內其義了然然佛雖破妄心之處乃破妄心非實有也不實即假是之謂三摩提已即中云問交光正脈中大非天如會解謂如來所答前四卷皆明奢摩他性定道理只言性而不言修會解硬配三止甚違經旨今以七徵為三摩提觀假之法及前約空假中分科得非以修釋性耶答若約圓乘解行證三一念具足修性可岐為二乎若約方便解行或分修性難擘止觀非理何依理非止觀不顯縱在別教亦須約奢摩他等三名以明三諦況圓乘乎然會解中實未嘗以修釋性如云阿難請楞嚴大定如來下文所示別無其方始則決擇真妄次則真妄和融乃至會通藏性深窮萬法皆是發明究竟之圓理而已蓋此圓理乃大定之本也會解此文以前三卷半文為發明究竟圓理何嘗硬配三止理非性乎須知空假中名是諦非觀如觀經玄義云假是虗妄俗諦也空是審實真諦也釋籤云觀中之觀名為中觀據此知觀空之觀名為空觀而空則未嘗非諦觀假之觀名為假觀而假則未嘗非諦觀中亦然諦是性觀是修豈得才見空假中名便以為三觀耶不惟交光不知空假中是諦今人弘台教者亦謂真俗中是諦空假中是觀株守此說所以來交光之難也若尋古轍諦觀竝舉方名三觀故今經前三卷半以空假中三諦之理使阿難開悟然必托止觀以彰深理茲七徵文托三摩提俗諦止觀會歸圓理皆修性相依交光分擘修性豈通方之說乎又如彼所釋謂今文是奢摩他性定其如七徵之首如來即云有三摩提乃強解云三摩提名隨便寄居干此夫三摩既是寄居奢摩之名何能無寄居無奢摩而強加有三摩而不用如此僻解安可判修性耶彼云性定似不必用修又云略帶緣修益不可解皆回經就情全成臆說而已問幽溪科經亦以七徵為奢摩他何也答幽溪以五陰三科為從空出假以徵心辨見為從假入空既許從假今必是假特引而不發耳又復計心在內名為性執天下人同耳但聞破心在內之人三根不同上根人聞破在內性計既空契入無生解行證三當下圓成一部楞嚴至此畢矣其名首楞嚴王具足萬行宜乎亦即中論觀因緣生法顯即空假中也中根性執方破圓解全開即當說妙湛總持之偈而領謝之也如前恆沙菩薩十方三乘同時願聞中必有此二根性惟阿難示同人法機在下根故更有轉計在外潛根之問所謂衆生處處著正聞破有即計空亡聞不在內即計在外也下文節節皆有三根同聞上中先悟之機例之可知二破心在外二一立計三一因破轉計阿難稽首而白佛言我聞如來如是法音悟知我心實居身外如上所破以不見內故心不在內轉計能見身外心在身外也如是法音指必不內知云何知外二立喻例顯所以者何譬如燈光然於室中是燈必能先照室內從其室門後及庭際一切衆生不見身中獨見身外亦如燈光居在室外不能照室所以者何徵也譬如下釋先立例中燈光喻心若心在身中必先知內然後及於外物言室門者領上戶牖開豁之喻由耳目開通心方能識外境也一切下合法不見身中獨見身外是立計之本與室中燈其義相反此中廢一喻立一喻謂廢室內燈喻立室外燈喻以心在身外則不知身內猶燈在室外則不能照室又燈然於室中從其室門後及庭際以門開之故室外燈光不能照室以門閉之故例心在身外不知身中亦為皮膜所隔耳三結意請正是義必明將無所惑同佛了義得無妄耶如上所計心有離身之過尊者謂室外燈與室外心法喻宛齊同佛了義猶懷疑而請正焉夫心不在內勢必居外亦所謂直心酬佛也二正破二一立例按定佛告阿難是諸比丘適來從我室羅筏城循乞摶食歸祇陀林我已宿齊汝觀比丘一人食時諸人飽否阿難答言不也世尊何以故是諸比丘雖阿羅漢軀命不同云何一人能令衆飽心若離身即同他人故引諸比丘一人受食衆皆腹飽立此例者明相外則不相涉也孤山曰前云受請今云從我乞食者提獎阿難在赴請日為彼演法事應隔宵故指即日循乞為例我已宿齊者即我一人已飽也齊乃經宿方食故云宿齊谷響云謂待明相故加宿之一字足顯齊義謂今日明相現時方可得食熏聞云循與巡同摶食即第八云段食是也今存古翻二循例破執佛告阿難若汝覺了知見之心實在身外身心相外自不相干則心所知身不能覺覺在身際心不能知我今示汝兜羅綿手汝眼見時心分別不阿難答言如是世尊佛告阿難若相知者云何在外是故應知汝言覺了能知之心住在身外無有是處初若汝至身外牒計心總餘根故言覺了知見次例破文分三節初身心至不能知以理定其相外初句標心在身外身在心外故云相外若爾則如一食難令衆飽則心下釋上句明心知未必眼見以心在身外也下句明眼見未必心知以眼在身根也如是則為心在外矣此定心在外之式也次我今下約見驗其相知兜羅此云細香其綿色如霜佛手柔軟似之文云汝眼見時心分別否此句為後潛根計本如是世尊者謂眼見時心即分別如世尊所言也三佛言若相知者云何在外此句方是正破上文止是示其相外定其相知耳若立相外之義必如彼食不能此飽今既相知一體不分可言心在外耶是故下結破前破在內今破在外只一念妄心破之不已所謂專心一境非耶須知如來之意不但破妄兼明觀道利根聞之解行竝進科就鈍根但名為開解耳問既具行解亦具證否答七徵之文約證釋之其義始便何者若約開解只須銷落諸念直契本心苟用推簡反覺迂遠古人云中論觀法被末代鈍根此從開解說也若欲斷惑證真入賢聖位淺者從因緣入故阿難云我從因緣心得開悟深者必從破因緣入須用四性推簡如孤山云七番中在內潛根似自性在外似他性中間似共性隨合無著似無因性四句求生皆不可得即是無生夫如此推簡直就惑體觀察故得斷惑證真所謂觀陰心以顯不思議是也是則如來七番所說元明證位之道觀文云名大佛頂首楞嚴王具足萬行豈無證而能若是乎聞者未能破惑但能進行則兼於行鈍根聞之但能開解則惟於解經意元為初心進道之人故科云開解而佛旨淵深實明證入之道也此義人多不曉并中論觀法亦似受屈今并為申之三破潛根三一立計二一因破計生阿難白佛言世尊如佛所言不見內故不居身內身心相知不相離故不在身外我今思惟知在一處阿難計內計外所計俱窮復因世尊之言而生轉計實自無主宰性計不能守定矣二因徵敘計佛言處今何在阿難言此了知心既不知內而能見外如我思忖潛伏根裏猶如有人取琉璃碗合其兩眼雖有物合而不留礙彼根隨見隨即分別然我覺了能知之心不見內者為在根故分明矚外無障礙者潛根內故以兩義故成潛根之計一不知內二能見外潛者藏也謂潛伏于五根之中也次譬琉璃碗者喻潛根之狀彼根隨見等八字就法上說琉璃喻眼根琉璃合眼之見喻分別之心以潛根裏故分別極速然潛伏根裏之根指五根也彼根隨見之根指眼根也此寬狹之分耳然我下謂成上兩義一成不見內義以在根則不在內故不見內也二成見外之義以清淨四大猶如琉璃心在根內分明矚外也二逐破二一立例按定佛告阿難如汝所言潛根內者猶如琉璃彼人當以琉璃籠眼當見山河見琉璃不如是世尊是人當以琉璃籠眼實見琉璃初句牒計古人云此責阿難有法喻不齊之過其說是也彼人下明在喻則俱見山河與琉璃有兩重所見觀實見之言阿難之計危矣二循例破執佛告阿難汝心若同琉璃合者當見山河何不見眼若見眼者眼即同境不得成隨若不能見云何說言此了知心潛在根內如琉璃合汝心至何不見眼正責其法喻不齊也在喻則有兩重所見在法止有一重所見但見山河不見己眼潛根之計破矣若見下雙責縱彼所計能見眼者則眼為心家所緣之境何得言隨汝所言彼根隨見隨即分別其義不成所言隨者一體之義使眼為外境尚能與心為一體乎若不見眼又墮法喻不齊之過眼根不可見豈同琉璃之可見耶進退失據其計窮矣三結破是故應知汝言覺了能知之心潛伏根裏如琉璃合無有是處四破內外三一立計阿難白佛言世尊我今又作如是思惟是衆生身腑臟在中竅穴居外有藏則暗有竅則明今我對佛開眼見明名為見外閉眼見暗名為見內是義云何此問吳興釋之至矣阿難此計雖不同潛根元與潛根相類前云既不知內而能見外故計潛根又蒙破斥今復立此計明不知內而能見外之故可免第一第二之難也初云腑臟在中竅穴居外是衆生身相次云有藏則暗定暗為內境也有竅則明定見外之由也今我下正立計良由有竅則明故開眼而眼光向外親見明相如主人開門而見門外何必心定在外而招外不相干之難耶有藏則暗故見暗時即是見內如主人閉戶而見暗室何必定見心肝爪髮等耶是不知內而能見外各有其由此計若成還成計心在內之義據下佛破云何成在內計內明矣然計中心體活潑有向內向外之義故下文以對眼不對眼破之二佛破溫陵作三節破或云此文只有二義如經云為與眼對為不對眼溫陵作三節非也但對中有二義一約眼前一約內對今科分二一雙約對不對破二單約內對破初中二一雙定佛告阿難汝當閉眼見暗之時此暗境界為與眼對為不對眼計中雙計見明見暗然閉眼見暗成心在內之計故特破之雙定對不對者對則成見故可計對不對眼則成內故可計不對二雙破若與眼對暗在眼前云何成內若成內者居暗室中無日月燈此室暗中皆汝焦腑若不對者云何成見文中初破對先正破本取在內之暗今暗相實在眼前則非內矣次縱破若成內者立縱計也據阿難意以暗為內則眼前之暗必成身內居暗室下破也暗室開眼之見不同合眼之見然既以暗為內則開眼所見室中之暗必是焦腑以皆是暗則皆是內作此破者甚言暗之非內也上皆是破對也古注云焦元也天地有三元之氣生成萬物人法天地亦以三元之氣而養身形白虎通曰五藏謂肝心肺腎脾六府者五藏之宮府也胃為脾之府膀胱為腎之府三焦為命之府膽為肝之府大小腸為心府肺府也次破不對對在眼前既非身內則不對者當是身內若取不對之暗內義雖成又非所見眼根明前不明後以其不對故耳今既不對何成見耶二單破內對二一立內對若離外見內對所成此中元欲取對但與前對不同前對在眼前今離外見之暗取內對之暗以成身中之義意謂合眼則眼光向內名內對也補遺云此文是牒前計如前計云開眼見明閉眼見暗乃外見內對之義不同意明離於外見內對自成今重牒之謂離外見之明即是內對之暗故今文是牒前計也欲使內外兩相例難以開眼見明難閉眼見暗是兩相例難義不得成故下破中應今所牒指合眼見暗名為身中句雖雙牒內外意在破內合眼見暗是牒內開眼見明是牒外所破但在內對即中謂補遺之意謂離外見之明即是內對之暗然外見之言亦得離外見之暗離此外暗而取返觀所對之暗故云內對所成補遺另一途爾二破內對二一正破合眼見暗名為身中開眼見明何不見面若不見面內對不成合眼至身中亦牒計也開眼下準外破內也合眼既能返觀身中逃前不見焦府之責今準此義開眼亦應返觀己面故云何不見面若開眼不能返觀己面則內對之義不成而合眼又何能返觀身中乎二縱破見面若成此了知心及與眼根乃在虗空何成在內若在虗空自非汝體即應如來今見汝面亦是汝身汝眼已知身合非覺必汝執言身眼兩覺應有二知即汝一身應成兩佛文有三重縱計初重約在空破云見面若成者且縱彼成於見面之義阿難所執見性既開眼即在外境是眼光元可在外又能返觀是必成見面之勢破云如是則心與眼皆在虗空蓋眼非知意非見兩者相合方能成見今兩者皆在虗空容有是耶不特無此事而阿難多分計心在內義亦墮矣次若在虗空下約自他破阿難見性在外又可返觀又有心眼在空之勢故今轉破在空此計有三重破一者在空則非汝體二者汝既無身則如來今見汝面反是汝身三者汝眼及了知之心俱在身外身寧更有覺耶此三重俱破第二心眼在空之轉計也三必汝下約兩覺破若必欲成返觀外見之義又何妨執身眼兩覺故并破之謂汝若執眼覺明暗而心知附眼光而起身覺痛癢而心知亦附身觸而起故云兩覺又云二知則一身應成兩佛審矣至此則破盡計窮後即結破三結破從來解者皆謂閉眼見內成心在內之計故獨破之此文中之意若據顯文只是破暗為內境而已是故應知汝言見暗名見內者無有是處開眼見外不能返觀則閉眼見暗亦非見內但破見內者文中帶破見外如心眼在空是也五破隨合三一立計阿難言我常聞佛開示四衆由心生故種種法生由法生故種種心生我今思惟即思惟體實我心性隨所合處心則隨有亦非內外中間三處孤山曰心生法生境從心起也法生心生心逐境遷也即中云何難前之四計既被窮逐今轉推心生之由所以引開示之言者謂諸法本無由心故有心亦本無因法故有此引文之意也雖引二句意重下句法生心生及種種二字我今等者此定思惟是心蓋阿難本計如此前文多以見為心今獨表心惟是心言隨合隨有者如繫心身中則合于內馳心千里則合於外不定在一處故云非內外中間其實遍該三處中間指潛根也二佛破二一牒執佛告阿難汝今說言由法生故種種心生隨所合處心隨有者阿難欲計法生心生故通舉二句蓋佛常有此說故也其實只就下句為計所以佛破祗牒其下句二正破二一直明無體是心無體則無所合若無有體而能合者則十九界因七塵合是義不然心既隨合而有似先無心體因合而有故今破云心若無體則并無此合若無下縱破若無體之心與物能合比例言之應十九界與七塵合界止十八今言十九者更加一無體之塵為第七塵合成十九界也既無無體之塵豈有無體之心乎補遺云如世之火自有體性然後假于陽燧為緣而能發焰若云心自無體假緣能合者狀似火自無體乃合陽燧爾二委破有體二一約內外出入破二一破若有體者如汝以手自挃其體汝所知心為復內出為從外入若復內出還見身中若從外來先合見面既破無體必計有體故約內出外入破之明心無所從來挃音質古注云挃猶觸也二救又二一救阿難言見是其眼心知非眼為見非義自初徵以來佛即以見為心阿難亦權順佛語然阿難前云由自觀見如來勝相心生愛樂據此則阿難本意豈以見為心乎故今反難如來謂見自屬見心但能知心既非眼而以為見于義成非前來未有此問至此方出阿難本意此受病之根也二破佛言若眼能見汝在室中門能見不則諸已死尚有眼存應皆見物若見物者云何名死初句牒計汝在下釋難佛謂汝言眼能見心不能見例如汝在室中必見室外亦由門開而後能見眼但如門心則如人心因眼開而後能見如人因門開而見室外也倘謂眼見而心不見亦可云門見而人不見耶故能例中門雖通見必室中有人而後見則見者是人而非門矣所例中眼雖通見必眼中有心而後見則見者是心而非眼矣更舉已死為例者溫陵云舉門喻能見在心舉死明徒眼不見其說是也由生時心見非眼故死後徒眼不見若見下更縱破也如此明文皆言心識為主破顯唯心根但如門從門出入乃是方便而執者何言用根不用識耶二約一多遍局破二一定阿難又汝覺了能知之心若必有體為復一體為有多體今在汝身為復遍體為不遍體此中遍與不遍似從一體中分出而一體多體指心為體遍與不遍指身為體遇事時為知覺遍到一身之中為但在一處而知覺不能遍耶二破若一體者則汝以手挃一支時四支應覺若咸覺者挃應無在若挃有所則汝一體自不能成若多體者則成多人何體為汝若遍體者同前所挃若不遍者當汝觸頭亦觸其足頭有所覺足應無知今汝不然文分四初破一體初句牒則汝下難汝若一體而有二覺則非一體有覺有不覺即二相也故難以四支應覺是出一體之相若成下破若言俱覺痛癢者是則欲擊汝頭但擊汝足欲擊汝左但擊汝右有是理乎挃應無在謂不定在一支也若挃下結破挃有定在便成離合兩覺即是二相非一體義二破多體一體既破或轉計覺有多體然一人止有一覺多覺即成多人其中必分自他以何覺體而為汝耶三破遍體遍者知覺遍于一身挃一支時應遍于有覺之處則與前四支應覺義正相同難辭雖同意則有別一體者謂無二相遍體者覺處咸遍四破不遍不遍者謂知覺不遍于一身若執心不遍頭足俱觸一既有覺一合無知今汝不然者謂俱觸俱覺則非不遍也三結破是故應知隨所合處心則隨有無有是處如上所說有體既非無體亦謬心尚難立何云隨合隨有耶六破中間三一立計阿難白佛言世尊我亦聞佛與文殊等諸法王子談實相時世尊亦言心不在內亦不在外如我思惟內無所見外不相知內無知故在內不成身心相知在外非義今相知故復內無見當在中間此計從第五發來因前佛破有體中云若復內出還見身中若從外來先合見面內外既破故復計中間也于中初舉佛與文殊談實相者實相即是心心不在內非內六根亦不在外非外六塵此實相離根離塵之義阿難不解復起謬執文有三重初舉前破辭內無所見謂在內則不當無所見也外不相知謂在外當不相知也次明不成內外三方計中間不遽定者見踟蹰之意耳問上阿難言亦非內外中間今何復計中間耶答上言中間乃以潛根為中與今有異今被重重難破又不得已引彼不在內不在外之語為例既不在內外而必居中間矣此之中間實有根塵為二邊影顯中相與前中間不同二佛破二一約身處破二一按定佛言汝言中間中必不迷非無所在今汝推中中何為在為復在處為當在身中必不迷者迷則不知所在不迷則非無所在迷謂惑也處謂依報之處身謂正報二推破二一破在身若在身者在邊非中在中同內身之可見者皆邊非中在中同內謂同前計心在內也二破在處若在處者為有所表為無所表無表同無表則無定何以故如人以表表為中時東看則西南觀成北表體既混心應雜亂表者如立杖以表其處大地廣博以何為中故無表則同于無中矣表則下破有表先標次釋人在表東則以表為西人在表南則以表為北表之四方既混以心為在中亦得云在邊故雜亂也二約根塵破二一救阿難言我所說中非此二種如世尊言眼色為緣生于眼識眼有分別色塵無知識生其中則為心在眼即清淨四大色即眼家之塵有眼而無色則不生識有色而無眼亦不生識二法相合以為生識之緣即生眼識云眼有分別者眼根能引生眼識眼識生時有隨念分別故云眼有分別是指能生分別為有分別也而色畢竟無知眼識生起在有知無知之中故招下雜亂之難又前四計皆先有心識五六皆論生心約生論處故曰識生其中則為心在二破佛言汝心若在根塵之中此之心體為復兼二為不兼二若兼二者物體雜亂物非體知成敵兩立云何為中兼二不成非知不知即無體性中何為相文中先定次破破中先破兼二然前定中云此之心體乃指心知為體破中云物體雜亂乃指眼根為體物即塵也以阿難計云眼有分別故且就所執而破之適時之語不須定執當知物體雜亂此句之難謂一識而兼根塵之二塵為物根為體當雜亂于一識之中矣物非體知下破其不成中也外物之無知不同根體之有知即成敵對之法相形而立更無調停為一法之義何以為中破兼二也非知下是破不兼不兼根則非知不兼塵則非不知凡言中者必有雙非之體今之心知若離根塵更無體性中何在耶三結破是故應知當在中間無有是處兼二不兼二義俱無成則當在中間之計其不可立也明矣七破無著三一立計阿難白佛言世尊我昔見佛與大目連須菩提富樓那舍利弗四大弟子共轉法輪常言覺知分別心性既不在內亦不在外不在中間俱無所在一切無著名之為心則我無著名為心不前之六計以有處所皆被窮逐阿難不得已而計無著所引佛與四大弟子共轉法輪是通教義而有通別之義故言心性謂覺知分別中有此心性也不在內外如前文解中間應指識心既非內外中間則一切無著此佛語也而阿難還以不著內外中間為心又成計著故須破之泐潭云既非內外中間即知心無所著而不知佛意破妄無體令識本真如云三際求心心不有心不有故妄元無妄心無處即菩提生死涅槃本平等不了此意謬引佛言妄立無著二佛破佛告阿難汝言覺知分別心性俱無在者世間虗空水陸飛行諸所物象名為一切汝不著者為在為無無則同于龜毛兔角云何不著有不著者不可名無無相則無非無則相相有則在云何無著阿難妄計因一切無著而起故佛拈此一句破之于中先研核無著之體次相有下結斥非無著也虗空水陸一切有法此阿難計為實有者也汝以不著此法者為心為實有一不著之心而但不滯于物象耶為并無此不著心耶此句是雙問下正研云若并無不著之心則心同龜毛有名無體并不必言無著阿難言不著者必有一不著之心是即有心非無心也無相下重以相無相申釋上句以上未言相無相故再定之既定有相次即結破當知阿難胸中實計有心而強謂無著故被佛破則所破乃僞無著非真無著下文云無有是處亦但阿難所計無是處耳若并破轉法輪之言是因咽廢食矣問古解云為在為無問汝心不著而彼物象為存在耶為虗無耶今何違古注答古解云若彼物象空無則同龜毛試思水陸虗空則該依報飛行之類則該正報乃謂我心不著便同龜毛兔角義恐不妥故今作此釋也三結破是故應知一切無著名覺知心無有是處上來七番窮逐妄心使無住著乃三摩提起觀之門謂之最初方便可也止觀十乘觀法中最初揀示所觀之境云去丈就尺去尺就寸置色等四陰唯觀識陰識陰者心是也此意與今文同彼止觀文先揀去界入故譬去丈就尺於五陰中又揀去四陰唯取識陰故譬去尺就寸輔行云直爾觀心義當觀王四明云即能觀為所觀易絶念故皆是此意須知止觀中明兩重所觀之境一指第六識心為境即揀境之文是也二觀不思議境即一念三千是也觀六識心意在顯不思議境故孤山云觀一念之妄心顯三諦之真理妄心為第一重真心為第二重雖立二重觀之不已則陰境轉成不思議境矣今經亦然初七番窮逐是以妄心為境後文云諸法所生唯心所現一切因果世界微塵因心成體又云汝身汝心皆是妙明真心中物又云若能轉物即同如來于一毛端遍能含受十方國土豈非一念三千為觀境耶至三卷云如來藏中性識明知覺明真識則觀六識以成不思議境蓋無疑矣是則今經前三卷多明十乘中第一不思議境三卷末阿難大衆說偈讚佛云如一衆生未成佛終不于此取泥洹是第二真正發菩提心請入華屋是第三巧修止觀十乘觀中前三最要故略配之第四破法遍是證果時事二十五圓通即破遍也若第五識通塞是破遍之餘意耳在今經耳根則通餘根則塞第六對治助開可配建壇持呪第七道品調適但從不思議境分出識次位能安忍離法愛正屬圓位蓋能忍能離方得證入圓位也此于總無明心用十乘妙觀始終修證法也至于七趣陰魔即五識五意識等能招報心亦當用十乘能觀之法而修證之使一一皆成一念三千之不思議境方顯兩重所觀觀識即真也夫兩重所觀十乘觀法佛祖意合而或謂天台專觀六識楞嚴獨用耳根未必然也苕溪曰總此七番似破四性若四性未破此覺了心世而非諦破四性已乃名世諦世諦虗假猶存于相若破此相方名真諦亦曰第一義諦故智者大師云世諦破性真諦破假假破即相空性破即性空今文七徵是破性一喝即真諦破相也即中云初心觀假名空前之假經稱三摩提斯時三諦未彰但觀諸法不實故云假也如今文七番逐破豈得謂妄心為實有乎但屬性空下文如來一喝使當機言思道斷妄心全空方入真諦此真諦顯名奢摩他乃從假入空也在利根人觀空前之假即悟三諦所以云有三摩提名大佛頂首楞嚴王具足萬行在鈍根者真諦未彰但屬觀假故此後文更請示奢摩他路圓教進否其源在茲問四句推檢止耶觀耶答一往言之宜屬乎止輔行釋止觀體真止云案文解釋其文尚略具足應以四句推檢破性相已具二空故方得名空據此文應屬止然輔行釋弘誓中即以四句推檢性相二空為能觀智須知就停心諦理稱止就能照了稱觀二約奢摩他顯真前雖破妄似但以世諦破性尚未以真諦破相此後咄破妄心豈非破相即是空也然圓別竝明圓則三諦在一心中別則次第三諦而已故有三番進否之義不可不知科分二一請奢摩他爾時阿難在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言我是如來最小之弟蒙佛慈愛雖今出家猶恃憍憐所以多聞未得無漏不能折伏娑毗羅呪為彼所轉溺于淫舍當由不知真際所詣唯願世尊大慈哀愍開示我等奢摩他路令諸闡提隳彌戾車作是語已五體投地及諸大衆傾渴翹佇欽聞示誨即從座起者聽法在座請益故起于中具三業恭敬偏袒至合掌是身業也恭敬是意業而白佛言是口業文先悔過次請法悔過中皆以上句生下句幽溪云當機悔過而有六重溺淫舍過由不能伏邪不能伏邪過由有漏有漏過由多聞多聞過由恃佛憍愛恃佛憍愛過由為佛最小堂弟六重中最自恨者未得無漏故結重于不知真際所詣若得無漏即知真際所詣矣即中云憍憐者不以難事苦之曰憍憐謂世尊憐惜為彼所轉者彼指娑毗羅呪所以自敘者向蒙佛慈未嘗如今日七番窮逐故作是說惟願下次請法或云真際之家以奢摩他為能詣故稱為路然前標三摩提是從假法起觀今言奢摩他即是從假入空前七徵但破四性名世諦破性後咄破妄心乃真諦破相因相空故得見真心豈非路乎見真即獲聖果能除闡提邪惡之見闡提翻信不具彌戾車翻惡見據經所言知有道果則能息衆生邪見不見真諦安有道果佛既七番窮逐阿難知欲蕩相顯空故作此請也然有二義一三摩提與奢摩他合空有不二即是禪那是名三觀在一心中不必更出禪那之名二者從假入空意重于空止名奢摩他正是阿難之所求耳傾渴者傾心渴仰翹謂翹首而望佇是立待之意二演奢摩他二一現瑞爾時世尊從其面門放種種光其光晃耀如百千日普佛世界六種震動如是十方微塵國土一時開現佛之威神令諸世界合成一界其世界中所有一切諸大菩薩皆住本國合掌承聽今經放光現瑞至多此當其首是為總瑞總冠一經將欲開示圓妙三觀先以形示也形示也頓上根利智目擊而道存聲示也漸中下之機耳提而方悟今經形聲雙示漸頓兼施無法不融無機不攝面門口也或以面門為眼耳鼻舌則無據矣吳興云此中現瑞凡有四意謂教行人理也口放種種光表從一理演出衆教即此方真教體清淨在音聞也六種震動表依教修行破六根惑即一根既返源六根成解脫也十方合成一界表十界染淨同一真心即漚滅空本無況復諸三有也諸大菩薩皆住本國表行門雖殊各證一理即歸元性無二方便有多門也文吳興之說謂放光表楞嚴之教地動表楞嚴之行十方合成一界表不二之理大菩薩是住定之人教行人理備矣以住定故菩薩不必遠來亦由合成一界則遠聽無隔且密表耳根圓通也文句記曰六動者動起涌震吼擊搖揚不安曰動自下升高名起璘瓏凹凸名踊六方出沒亦名踊隱隱有聲名震砰磕發響名吼令物覺悟名擊動起踊形三也震吼擊聲三也震動者形聲各舉其一耳然此放光合土是真諦破相之形下文一喝即真諦破相之聲真諦不思議本不屬形聲然即此形聲亦即不思議也二聲益二一示二種根本又二一標示佛告阿難一切衆生從無始來種種顛倒業種自然如惡叉聚諸修行人不能得成無上菩提乃至別成聲聞緣覺及成外道諸天魔王及魔眷屬皆由不知二種根本錯亂修習猶如煮沙欲成嘉饌縱經塵劫終不能得阿難請示奢摩他路而世尊示以二種根本為後破妄顯真之本也種種顛倒者衆生有三種顛倒心顛倒想顛倒見顛倒古師解云識有心倒想受有想倒行有見倒有云初心妄計名心倒次心想成名想倒想成外執名見倒由此三倒起種種倒顛倒是妄惑即業種也種必有果業惑苦三生則同條如惡叉果一枝三子常聚不離故令衆生流轉三有如來先示此者以見衆生執妄心為自性是顛倒也次示修行岐路藏通佛果權教所說皆非無上菩提聲聞緣覺保證涅槃未免沉空滯寂外道即六師之類諸天以十善為宗魔羅此云殺者蓋自謂成無上道耽荒五欲斷人慧命者也彼皆不知二種根本妄意欲成菩提猶煮沙成饌豈可得乎饌熟食也二正明云何二種阿難一者無始生死根本則汝今者與諸衆生用攀緣心為自性者二者無始菩提涅槃元清淨體則汝今者識精元明能生諸緣緣所遺者由諸衆生遺此本明雖終日行而不自覺枉入諸趣初根本中言攀緣心者思量分別之心至下文咄破者是也如見色之後自謂見色聞聲之後自謂聞聲乃以第二念追緣第一念中所歷之事故號攀緣心衆生輪回生死由此心不絶之故以此心是著相之心著相則生癡愛由癡愛故便入生死其事了然下阿難云發大勇猛行諸一切難行法事皆用此心縱令謗法亦由此心若此非心我乃無心同于土木豈非執此為自性耶二示菩提涅槃根本菩提智德涅槃斷德衆生本具二德不假修成無始已然是根本也而指阿難現前識精元明者所謂無明即法性而觀現前一念識心即顯不思議境是也或云識精是八識元明是九識恐未必然何者第二卷云且汝見我見精明元此見雖非妙精明心如第二月非是月影下文明元是第二月則今元明其義亦然蓋攀緣心是月影今精明是第二月皆非第一月也識體深細名精未雜思量分別故曰元明若于此而起攀緣全成生死根本若於此不起攀緣則塵勞即是智慧生死即是涅槃故指為二轉依號焉言能生諸緣者從見色聞聲後人必自謂見色聞聲非攀緣從此起耶言緣所遺者有二義一顯攀緣若起即失真體二顯真體元非攀緣故為諸緣所遺由衆生下結過無明全是智慧故曰本明涅槃經云無明明者即畢竟空是此義也既遺此體遂為根塵埋沒言思纏擾本無生死而為生死所縛名枉入諸趣良可悲夫問前已云不知常住真心用諸妄想今何復出二種根本耶答前欲示三摩提之宗先示常住真心之體令成空前之假蓋必得體而後可以成宗也今欲示奢摩他之宗復示菩提涅槃元清淨體令成從假入空之觀前云用諸妄想此中云用攀緣心為自性前云常住真心今示識精元明為智斷體廣前所說所指更切二明奢摩他路又二一雙徵心目阿難汝今欲知奢摩他路願出生死今復問汝即時如來舉金色臂屈五輪指語阿難言汝今見不阿難言見佛言汝何所見阿難言我見如來舉臂屈指為光明拳曜我心目佛言汝將誰見阿難言我與大衆同將眼見佛告阿難汝今答我如來屈指為光明拳曜汝心目汝目可見以何為心當我拳曜阿難言如來現今徵心所在而我以心推窮尋逐即能推者我將為心前示常住真心後即云有三摩提今示二種根本後即云奢摩他路皆是約體以明宗也此下經文權實竝談實則圓三觀權則先明空理云欲知奢摩他路指空明矣當機請妙三觀故以圓酬帶初方便故以權酬非權無以入實非實無以究竟進退明之經文甚顯出生死者空觀之力也今復問下有四問答初屈五輪指者或云如來五指有地水火風空五相在其指端此五皆稱輪也舉臂屈指而問見者示奢摩他觀之所依也即呈拳示掌舉青蓮豎一指要當人直薦本明之法耳藏教空理見聞冥寂今指見體為常住真心即超小教阿難言見未出常情次問汝何所見者即問汝見箇甚麼之意答曜心目者眼非知意非見合而言之雙曜心目也三四問答分目與心為二番世尊問誰見正問能見者是誰亦即念佛者是誰而答眼見則阿難謬矣見即是心可云眼乎其病在不離根塵也此等問辭及下一喝并上現瑞皆不落言思之真諦也豈惟下之一喝方是真諦乎佛不即斥而復問以何為心欲彰重迷以斥之耳至以能推為心則迷甚矣其病在不離思量也前文曰由目觀見如來勝相心生愛樂佛指其為賊所侵今經七番窮逐妄想之賊現矣故佛即施致太平之劒直與一喝斬斷思量命根也二斥妄辨真二一斥妄心次辨真心所斥即第一生死根本也所辨即第二菩提涅槃根本也初中三一咄破佛言咄阿難此非汝心性相二空為入真之要道前破妄心之處雖不在內外中間但是破自他共無因之性耳而一念推測之心尚未能除猶存其相故佛以師子奮迅之威震聲一喝曰咄此非汝心此所謂命根下殺一刀也故知思量推度必宜急斷起信云若離于念名為得入又云所言覺義者謂心體離念離念相者等虗空界無所不遍法界一相即是如來平等法身又云若離心念即無一切境界之相據起信文知意根斷絶方合真諦是謂真諦破相之道也夫定此一喝為真諦禪教兩宗皆有疑議禪人謂一咄上多立名相教師謂言語法何指為真殊不知此一喝非語言而真諦非名相也正如說藥人真藥現前反不能識蓋當機既蒙多番窮逐至此則羽翼已去巢穴亦空惟現前一念思量命根未斷若再施有意味之法語則更引起當人思量妄念而不能斷所謂重增迷悶矣故佛直與無意味難思量之一喝竟斬斷當人念想攀緣之妄而使無可凑泊商量凑泊攀緣之妄絶功由一咄名真諦破相則此一喝即不思議境也即第一義諦也雖似語言音聲不落音聲語言之相若從一咄之下勦絶妄情即金剛王寶劒若一切攀緣心不能及即踞地師子在凡情認為一喝在如來則全體大用即一喝不作一喝用當機于此一喝下有領有不領領有淺深之殊如阿難云我乃無心同於土木即探竿影草一咄之下和盤托出家珍即是體因機叩而遽施即是用須知如前所列有無量菩薩聲聞天人大衆聞此一咄頓斷相心直證無生者不可算數及東土吐舌耳聾者皆上根利智因此喝而深契不思議境故曰真諦又豈語言名相法哉惟阿難塵相未忘秪作得箇探竿影草耳又佛言此非汝心正指體上之妄非心非指六識心王為非心也妄去真現即識即智何曾有二哉如大綱中說然當機既示為迷惑未斷攀緣故佛于今文示離思量至後辨見示離根塵應機之序又如是耳若近日交光謂一念未生正是根相此別據眼根而起妄計不知見根聞根亦須脫去況一念未生又安有根相耶二驚問阿難矍然避座合掌起立白佛此非我心當名何等矍然遽視貌阿難見佛前來推窮竝無怒意忽聞咄破如冷水澆背陡然一驚遽視如來避坐而問妙玄云癡犬逐塊徒自疲勞塊終不絶如黠師子放塊逐人塊本既除塊則絶矣阿難被咄當忽悟自心不從人得則如師子放塊咬人吐舌耳聾深入不暇今戀戀于妄心而復問當名何等與逐塊何異乎三顯示佛告阿難此是前塵虗妄相想惑汝真性由汝無始至於今生認賊為子失汝元常故受輪轉初句明妄心所從來前塵者目前所對之五塵也第二卷云且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙此文但指目前所對為前塵然前塵實通五塵也前塵已是虗妄之相又於相上起想成今妄心次句明妄心功能惑者謂使人不知也妄心是生滅法力能惑亂真性不生不滅而使人不知由汝下明妄認受輪此正前文所謂用攀緣心為自性名無始生死根本也夫六識是賊性如父心如子今以攀緣為己心即認賊為子損法財失慧命莫不由茲皆是賊義以不知不生滅法而失元來常住慧命妄心所惑豈非賊乎輪轉之根實在于此據此文知前生死根本當指見思第六識心審矣次辨真心二一疑問阿難白佛言世尊我佛寵弟心愛佛故令我出家我心何獨供養如來乃至遍歷恆沙國土承事諸佛及善知識發大勇猛行諸一切難行法事皆用此心縱令謗法永退善根亦因此心若此發明不是心者我乃無心同諸土木離此覺知更無所有云何如來說此非心我實驚怖兼此大衆無不疑惑惟垂大悲開示未悟此問最有關係大凡人情必得真心方舍妄心阿難尚未得真遽欲捨妄勢必不能故發此問初明善行由心言令我出家者謂因愛佛而佛命我出家也以愛一佛遂欲遍事諸佛及善知識因發勇猛而行善行此心之功也次明惡行由心謗法與愛佛供養相反斷善與行善相反是心之罪也若此下明無心即同土木阿難謂除推度心則更無心便與土木相類離此覺知更無所有是釋上同于土木謂何故同于土木以離覺知更無心故我實驚怖明矍然避席之意也阿難此問亦似因咽廢食如來雖示推測非心然發心行善未必皆屬推測須知紛然思議中元有不思之體即是真心今時講者但知佛破六識非心後顯見性是心不知佛說色心諸緣及心所使惟心所現已明六識元是真心此是圓義後明見性是心自屬別義經意難知可妄判耶二開示有三番進否三番中初番先略示圓心次別顯見性初文為二一略示惟心又二一顯惟心爾時世尊開示阿難及諸大衆欲令心入無生法忍於師子座摩阿難頂而告之言如來常說諸法所生惟心所現一切因果世界微塵因心成體此第一番開示唯心進明圓理也夫世尊豈欲指見為心正欲顯諸法唯心耳因何難不解故退指見性是心今之所示正是圓宗此後共有三番進否進則明圓否則明別然後廣明如來藏理文初云開示等者謂下文所說是以圓教開示阿難大衆也無生法忍者悟惟心之旨不見有一法生不見有一法滅稱無生法忍師子座者座無師子之形但有所表大論云佛是人中師子故佛所坐名師子座佛之所說名師子吼如來常說者正標宗旨前既以推窮者為非心則今所云心必是真心據後文云咸是妙明真心中物故必是真心也諸法生起更無別體惟是心現則無非常住既皆常住即自心本具諸法故所造法全能造心蓋此文正明圓融三諦諸法所生假也惟心中也所現者現如鏡像不實空也三諦在一心中莫非常住皆是真心即酬妙奢摩他三摩禪那之請而古人謂真心為妄所熏變起根身器界一切俗法真心是空俗法是不空此二不二遂成中道若爾真心是妙俗法不妙俗既不妙惟應存真三觀之中獨存一觀而已今謂古人所說于二造中但得事造之義而事造全由理具具故能造名為理造如此方合華嚴心造之旨觀今文豈不宛然具二義耶如云諸法所生事造也惟心所現理造也事造即理造全妄即真故曰諸法皆真心所現理造即事造則事造一念中亦具十界因果故荊溪云惟心之言豈惟真心也問釋今經文云惟真心其義已足何故復云惟妄心耶答觀二卷云色身外暨山河虗空大地咸是妙明真心中物是惟真心後八卷云心憶珍羞口中水出心發愛涎舉體光潤據此豈無惟妄心之義乎同在一經義不可缺如人多饒財寶遇不肖子便成浪用豈得非長者之物故不立妄具則真具義亦不全工夫之要在達妄即真所以先云惟真心耳孤山曰一切因果即十界正報世界微塵即十界依報此釋上諸法所生也因心成體此釋上惟心所現也即中云正報惟心故成百界千如依報惟心故名無情有性正報為能依依報為所依依正既居一心一心豈分能所此文因阿難疑心無體遂特揭之以樹宗旨其語甚略至第二番明圓理云色心諸緣及心所使諸所緣法惟心所現等文方是暢明今義二舉物況阿難若諸世界一切所有其中乃至草葉縷結詰其根元咸有體性縱令虗空亦有名貌何況清淨妙淨明心性一切心而自無體一切所有遍該萬物乃至草葉有根種縷結因絲麻故咸有體性又涅槃說空有四名謂虗空無所有不動無礙貌者如雜集論說空一顯色論云顯色豈非貌耶子書云蒼蒼者其正色亦貌也空無體而有名貌亦體之類也以此況顯真心畢竟有體三諦無形故曰清淨妙謂非三非一淨即是空明即是假心性即中性一切心者謂為十界心之本性如輔行云十界諸法皆以三諦為不改之性正此義也如此清淨之心豈無體耶上約圓法開示所以解阿難之疑也二明妄無體又二一斥妄次結過初又二一正斥二即時阿難下默領初又二一明無體若汝執吝分別覺觀所了知性必為心者此心即應離諸一切色香味觸諸塵事業別有全性如汝今者承聽我法此則因聲而有分別縱滅一切見聞覺知內守幽閒猶為法塵分別影事初句牒計堅執不捨故云執吝初心在緣名覺細心分別名觀即指前推窮之心也此心至全性反顯離塵無體色香味觸先舉四塵聲塵則在下文明之五根各緣一塵意則總緣諸塵故曰諸塵事業業者謂外塵牽心而有業用也據法相說意根不能自緣外塵或與五識同時而緣或相續而起分別總皆因塵而有若依他有大半諸塵所成豈離塵而有全性乎故佛反說若離塵有性即是心也如汝下正明離塵無性聲是耳家之塵聞聲時有同時意識起與耳識同緣聲塵是隨念分別若以後念緣前聲塵名獨影境是計度分別聞聲尚非實有影事那得是真縱滅等者謂不但有意所緣皆是虗妄縱六識皆滅猶緣法塵大論曰眼曰見耳曰聞鼻舌身曰覺意曰知今云滅者似是深定境界而古人以為散位獨頭以定中亦緣性境何但影事其說亦是然據後文云現前雖成九次第定不得漏盡成阿羅漢今恐指次第定中六識漸滅至滅盡定受想不行佛名此定為內守幽閒以無六塵粗相故曰幽閒雖滅受想心王尚在所對正是法塵有滅有守豈非分別能緣為分別所緣為影事蓋是五塵俱滅之影是事而非理也以定中亦有比量故名分別影事況未階此定而推窮尋逐非影事而何二敕揣摩我非敕汝執為非心但汝於心微細揣摩若離前塵有分別性即真汝心若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同于斷滅其誰修證無生法忍敕者誡敕荊公云此亦是心然達本心則此心是妄然前文云諸法所生唯心所現豈分別反在惟心之外然果悟性識明知覺明真識則此心即性識阿難未悟不可認妄為真須自揣摩前文先反顯妄心無體次正釋離塵無性今復同前者勸其依佛語而揣摩也若離下反顯既云分別即依前塵便非真心故此句是反顯也佛作此語者意顯離塵獨立方是真心耳若分下正釋五根所對名為前塵而意識緣落謝影子名分別影事前因聲分別猶屬隨念分別今此正判推窮之心全屬計度分別古人以為散位獨頭是已塵非下明執妄成失心雖賴塵而塵非常住除生住已即是異滅變即異也此時如形亡影滅安有心乎真心即法身若以無常為真心者義合法身同于斷滅法身既滅智照亦不能起其誰修惟心之道而證無生法忍耶佛意在進明圓理故結語及之二默領即時阿難與諸大衆默然自失上聞開示圓心茫然不解及斥妄心無體自亦知非泐潭云所執既消故云自失二結過佛告阿難世間一切諸修學人現前雖成九次第定不得漏盡成阿羅漢皆由執此生死妄想誤為真實是故汝今雖得多聞不成聖果學人指前三果前云滅一切見聞覺知故以九次第定當之九次第定三果已成位當身證修此定者必先修九想八背捨八勝處十一切處如初背捨位在初禪第二背捨位在二禪三淨背捨位在三禪四禪次歷四空第八是滅盡定總名八背捨此觀禪也上來雖得八禪入則有間今欲純熟重從初禪至滅盡定次第而入中間更無散心令不次第者次第故名次第此練禪也釋要云滅盡定者滅六全分盡七染分也四果漏盡義當空觀已成故不執生死妄想三果後心妄想未盡未成羅漢阿難亦在學人數中故結斥之今謂九次第定內外俱修內弟子在初果位中已斷現前生滅妄見從修道已去不同性解脫人緣空直入燒滅骨人故重修觀禪九次第定斷八十一品思惑方得漏盡成俱解脫羅漢若外人但知修六行觀厭下欣上全用見妄而滅思惑此則九次第定雖成未斷思惑故雖成上定漏不盡果不成如本斷超人見思齊斷其位退下是也兩箇雖字極是噄緊處正顯成羅漢得聖果有餘而反為不足不成者見妄不除故也豫釋恰與長水疏云凡夫所修隨禪感果不出三界義合上第一番據圓破妄略示圓心竟二別顯見性前文破妄心以顯真心如經云諸法所生惟心所現世界因果因心成體其辭雖少其旨極圓昧者不悟圓旨似但破妄而未顯真故阿難至此重復悔過哀請佛不得已而辨見性于義為別此圓教之否也古今解者謂前破妄心已竟從此處起文明見性誰曰不然然進圓退別其義不明夫以別為圓勢必至并圓成別今使圓別分途其理不濫如華嚴頓教尚兼別明圓況阿難請示最初方便暫用別教非屈經旨然進否中忽別而又忽圓者即大部所立圓接別通之義也文分二一重哀請阿難聞已重復悲淚五體投地長跪合掌而白佛言自我從佛發心出家恃佛威神常自思惟無勞我修將謂如來惠我三昧不知身心本不相代失我本心雖身出家心不入道譬如窮子捨父逃逝今日乃知雖有多聞若不修行與不聞等如人說食終不能飽世尊我等今者二障所纏良由不知寂常心性惟願如來哀愍窮露發妙明心開我道眼此請與前請義同意異前是三摩提假觀之後請開奢摩他入真之路今所請示寂常心性即奢摩他所契之理是義同也但前雖請奢摩他而佛示諸法唯心之旨屬圓三觀阿難聞已仍不知真心體性故今求開見道之眼則意異也自我等者出家稟戒雖可從佛定慧必由自修豈可望如來惠我耶失我下有兩重法喻初失心喻失本心如捨父徒出家如窮子不入道如逃逝也今日下次多聞喻多聞如說食若不修行喻終不能飽二障者謂煩惱障所知障古今諸師依地持論云二乘無漏人無我智為煩惱障淨智佛菩薩法無我智為智障淨智又云斷愛故得心解脫煩惱障淨斷無明故得智解脫所知障淨若以二障配二惑煩惱是見思惑所知是塵沙無明惑玄籤云二障者煩惱障及智障具如止觀引達磨多羅釋今師依大品大論開為三惑是故智障兼于事理障事智者是塵沙惑障理智者是無明惑若通俗解者見思粗惑能令心煩使心作惱為二乘人無我智之障故云煩惱障也所知者指佛菩薩法無我智為所知無明未斷能障此智故云所知障也寂常心性者寂謂寂靜常是常住心謂隨緣之能性是不變之體即奢摩他止觀所契也夫心性之言本在于中而今屬空者奢摩是空所依與中不隔豈與小乘空觀同耶窮露者如窮子背父則奔走長途風餐露宿約法則以不識本心無慧行食行行衣曰窮常在生死曰露發妙心開道眼元非二事下文云如是見性是心非眼則顯見即顯心也元明之體不可思議名妙明心道眼者見道之眼二正開示二一現瑞許說二一現瑞即時如來從胸卍字涌出寶光其光晃昱有百千色十方微塵普佛世界一時周遍遍灌十方所有寶剎諸如來頂旋至阿難及諸大衆前光從口冠戴一經今光從胸必表從心顯見百千色者表說三科七大即萬行也普遍十方灌如來頂者表此法門是大佛頂也普佛世界顯真性無所不遍即大義也時會當獲此益故旋至阿難等耳卍字梵云阿悉底迦此云有樂亦云吉祥海雲是吉祥萬德之相有此相者必受安樂以是吉祥萬德所集故也華嚴如來相海品云如來胸臆有大人相形如卍字名吉祥海雲摩尼寶華以為莊嚴放一切寶光二許說佛告阿難言吾今為汝建大法幢亦令十方一切衆生獲妙微密性淨明心得清淨眼如來之意在明圓頓故名大法幢幢表摧邪立正建者豎也次明見性是心指此心為妙微密性淨明心指此見為清淨眼耳云亦令者即兼明教也妙者忘相之義下文云奢摩他微密觀照例今妙微密等亦屬奢摩慧眼所見云微密也奢摩所照乃本性淨明之心不假修成而云清淨眼者謂見離根塵即清淨矣上文請發妙明心故今云獲妙微密惟淨明心上文云道眼今云清淨眼上來現瑞許說雖在別明見性科內義通圓別文意豈有隔耶二正辨見性古人云先破妄心次破妄見者以前破妄心且離緣塵分別想相而未能知心性常住今破妄見則引盲人矚暗等以彰見性不滅乃至舉手飛光皆顯性無搖動當知如來自淺而深示阿難奢摩他路也即中云阿難執目在面而心在內故對機而說宜先破妄心次辨見性似有兩意若就如來說意不過前破妄心次顯真心豈有二耶然文意總歸圓融而以此為別者前顯心則云諸法唯心今辨見則云頭自動搖見無所動手自開合見無舒卷其以動搖對不動搖舒卷對不舒卷明矣又云汝面雖皺而此見精性未曾皺皺者受滅彼不變者元無生滅其以變易對不變易生滅對不生滅又明矣故此是第一番退明別教蓋非別無以辨見見性之後諸法皆常豈非別教為圓教之門乎交光不知教分權實于此後作十重顯見之科是為平頭十王略無統攝所不取焉又古人云破妄見顯真見交光獨云此是顯見不是破見又云破識心而不用取根性為因心夫顯見但是立義之偏取根足見悟門之謬如今文中取盲人矚暗驗見性無虧彼盲人眼根已壞而見性宛然則已脫于根塵之外交光反云是取根中之性可乎況衆生見聞之性雖曰在六根中而未始少帶根塵佛因鈍根不解不得已而取盲人為例所以建首辨見即離根塵如云前塵自暗見何虧損離塵也見性是心非眼離根也若戀戀于六根正如淨名訶云若求見聞覺知是則見聞覺知非求法也若脫根塵方是以不生滅心為本修因然後圓成果地修證此是要義不得不辨又先破後立法門常規古人云破妄顯真言實不謬如經中明眼不能見見者是心豈非破妄見顯真見耶交光不知此義反欲取根又云帶妄顯真夫妄何物而可帶乎豈非外道邪常舊醫乳藥乎但若破若顯義似相違今云辨見即兼之矣科分三一示見性是心次明見性不變三明見性常住初中三一徵定拳見于中先問阿難汝先答我見光明拳此拳光明因何所有云何成拳汝將誰見首句總下三句別總中見之一字是文正意前阿難言我見世尊舉臂屈指為光明拳耀我心目故今文云汝先答我見光明拳下三別問初問光明何因相帶來耳非文正意次問拳者欲以拳理例眼根也三問誰見此見即是離根之見而阿難必以為根故重問之二答阿難言由佛全體閻浮檀金赩如寶山清淨所生故有光明我實眼觀五輪指端屈握示人故有拳相梵語閻浮提此云上勝赩盛也佛全體金色光明照耀猶如寶山此光明拳之近由也清淨所生不從愛欲此光明之遠因也次答我實眼觀卷初即云由目觀見如來勝相認眼為見是阿難病根前文又云我與大衆同將眼見今云眼觀總是內根未脫耳二復例拳見三一問佛告阿難如來今日實言告汝諸有智者要以譬喻而得開悟阿難譬如我拳若無我手不成我拳若無汝眼不成汝見以汝眼根例我拳理其義均不實言告汝者此後佛言見性是心其言最實遂先示之要以譬喻得開悟者指後客塵主空及今以拳例見皆譬喻也譬如下立譬若無下是法無手不能成拳無眼不能成見此法喻不齊者也佛見阿難依舊認眼能見故問如此于前三問中但舉兩事為例拳理者理謂物理二答阿難言唯然世尊既無我眼不成我見以我眼根例如來拳事義相類阿難果以無見例于無拳此大誤也見為眼之本見不與眼俱喪拳為手之末拳必與手俱喪本末可相齊乎然阿難言最遜順無拳之語不以唐突世尊故自居于無眼而例同于無拳足顯相類三破佛告阿難汝言相類是義不然何以故如無手人拳畢竟滅彼無眼者非見全無所以者何汝試于途詢問盲人汝何所見彼諸盲人必來答汝我今眼前惟見黑暗更無他矚以是義觀前塵自暗見何虧損以盲人立義者當知識精元明真妄和合自成眼根以來常情惟知眼為能見不知離眼有見若欲指見性離根庶惟盲人可顯此體以盲人眼根既壞而見性不昏則無眼有見其義昭然故特藉盲人以開道眼則眼為能見之執破矣又當機不知心為能見如來意在指見歸心惟彼群盲見不依眼則心為能見其義亦成故特藉盲人以顯妙心則目在面之執亦破矣阿難前有二執今始破之于中先標不類何以故下釋不類之故手為拳本本喪則末亡見是根元末亡而元在所以者何下釋盲非無見盲人而言諸者示此理之同也諸盲見暗若論所見非是全無若論能見即是全有而于此彰見性之離塵矣三會見歸心四一計諸盲立難阿難言諸盲眼前唯覩黑暗云何成見難者見暗非見此常情也阿難之意全以眼為能見耳二以二黑相校佛告阿難諸盲無眼唯覩黑暗與有眼人處于暗室二黑有別為無有別諸盲承上文來無眼對下有眼佛不急明盲人有見而但以二黑相校者前佛云前塵自暗見何虧損則盲人有見其義了然不必更明阿難固執眼為能見此是妄想攀緣之心仍妄根所縛佛此下竟明眼非能見則妄根自破真見自顯欲斥妄根非見須明燈眼同功欲明燈眼同功先明二黑無別至妄見破真見立盲人有見其義自成不心結顯者此非要義故也三復順問而答如是世尊此暗中人與彼群盲二黑校量曾無有異阿難生希有心不意有眼無眼二黑無異佛止欲明二黑是同故應云如是四正破根顯見阿難若無眼人全見前黑忽得眼光還于前塵見種種色名眼見者彼暗中人全見前黑忽獲燈光亦於前塵見種種色應名燈見若燈見者燈能有見自不名燈又則燈觀何關汝事是故當知燈能顯色如是見者是眼非燈眼能顯色如是見性是心非眼文又分三一明二黑無異則燈眼同功若者假如也無眼者山河大地一無所矚故云全見前黑有能治目還得眼光前無眼而見前黑今有眼而見前塵似惟眼為能見此阿難胸中所執也例推暗中之人無燈而見前黑有燈而見前塵燈亦應名能見以有眼而不見黑與有燈而不見黑其功均也前阿難執眼能見今示眼僅同燈以破當機之執耳二破燈非能見此中藏破眼見之義欲破眼見故破燈見二黑既同二不見黑亦同燈見若破眼見亦破古人云此是縱破說汝許燈能見者燈即是人豈名燈耶又燈既另是一人彼自能觀與汝何涉三正破根顯見此中之文或以燈能顯色對有眼在暗室時眼能顯色對盲者得眼光時亦可然一人之見實亦賴兩重顯色也是故兩字承上破燈見來燈能顯色者燈體無知而無燈不見有燈即見是顯色義眼根同燈體亦無知但如鏡中無別分析以眼根是清淨四大所成刻論則與燈無異其靈知之性是心而非眼也以此論見見性了然前既斥妄想非心今所云心必是常心心心自見豈賴根乎文云是眼非燈則見離塵又云是心非眼則見離根離根離塵厥旨顯矣問六根皆是有知今何云眼體無知答佛意實爾非關臆說如二黑校量以來眼根事事同燈二黑既同二見前塵亦同燈見既破眼見亦破其義亦同乃至二名顯色無知亦同眼若有知豈得同于燈乎故後文云見覺無知因色空有維摩經云是身無知如土木瓦石皆是明證以眼體無知故現前之見即是真見元離根塵此所謂破妄見顯真見也自卷首徵問心目以來至此方結其義二明見性不變二一默請阿難雖復得聞是言與諸大衆口已默然心未開悟猶冀如來慈音宣示合掌清心佇佛悲誨口已默然者前阿難以為心而佛斥云非心阿難以為見而佛復云是心知醉辨無益故默然也未悟者已聞見性是心而未能頓破諸惑狀同未悟又見性雖離根塵而此性隨根塵之緣見有外物則客塵未除義當空觀未成故未開悟佇佛悲誨者依然是請世尊開我道眼之意二正示夫教相有四一藏二通三別四圓如是四教共詮二理藏通詮真別圓詮中析空體空則詮真之教殊但中圓中則詮中之教殊此四教所繇分也所以不言俗者俗乃事法由觀俗而會真中真中名理二理一事共成三諦今楞嚴帶權說實定兼別教別教詮次第法必先空次假後中而空觀實用藏通方便今文佛因阿難未悟還叩鹿苑初悟以發明之豈非藏乎此文既兼藏教前後文必有通教又引藏入別即是通也此文來意因前見性隨緣見有外法見性雖顯根塵尚在即是客塵根塵是客見性是主須去客而存主根塵未空總喻為塵須去塵以存空方合奢摩他空觀之義是則陳如所悟可以助釋見性此佛叩問之意也文分三一徵名驗悟三一問爾時世尊舒兜羅綿網相光手開五輪指誨敕阿難及諸大衆我初成道于鹿園中為阿若多五比丘等及汝四衆言一切衆生不成菩提及阿羅漢皆由客塵煩惱所誤汝等當時因何開悟今成聖果兜羅綿此云細香義翻氷或云兜沙此云霜以色得名或云名妒羅綿妒羅樹名綿從樹生因而得稱熏聞云佛手柔軟加以合縵似此綿也三十二相中云五手足指合縵網勝餘人正是此相似自前屈指握拳以來至此方舒手耳鹿園者群鹿所居故云鹿苑昔釋迦行菩薩道時為鹿王居此園慈救群鹿緣在輔行佛初成道時居鹿苑說法從樹為名亦名奈二仙所居亦名仙苑五比丘者太子入山學道父王思念遣五人追侍一憍陳那二額即馬勝比丘也三跋提亦名摩訶男四十力迦葉五拘利太子不成菩提及阿羅漢者藏教中以三十四心斷結成道正習俱盡為菩提然在鹿苑時亦得密示大乘菩提即三智一心中得如今經所云得成菩提是矣由客塵煩惱不成聖果故云為所誤也然經云昔于波羅奈轉四諦法輪分別說諸法五衆之生滅是知最初所說必該四諦據後文以根境二種通喻客塵則客塵之言但是見思之集而已政以集能招苦故為所誤是該苦諦若知是誤不起于集即道諦無集則無苦即滅諦今經一語四諦義足而正意在煩惱之集也如來所以引此者前攀緣妄想及根塵妄法皆是客塵煩惱衆生為其所誤令常住真心不得明了故引彼釋此令當機悟入見性之不動主人焉因何開悟指初果見道即下因主客而斷見以開悟真諦也聖果指四果即下因空塵而斷思以成羅漢果也二答時憍陳那起立白佛我今長老於大衆中獨得解名因悟客塵二字成果世尊譬如行客投寄旅亭或宿或食食宿事畢俶裝前途不遑安住若實主人自無攸往如是思惟不住名客住名主人以不住者名為客義又如新霽清暘升天光入隙中發明空中諸有塵相塵質搖動虗空寂然如是思惟澄寂名空搖動名塵以搖動者名為塵義答中初總述有長人之德故曰長老獨得解名者夫巨夜長寢無人能覺日若未出明星前現憍陳如比丘初得無生智譬若明星在衆明之始一切人智明無前陳那獨得解名不亦宜乎悟客塵二字者以譬喻得開悟也不悟主空而悟客塵者妙玄云如來初教正詮思議之俗諦旁詮思議之真諦籤云初但說無常苦等故云思議之俗雖通涅槃涅槃是小乘法性若初詮法性恐增邪倒不能破常我等僻故俗正真旁文據此文則鹿苑初教客塵為正而主空為旁機教相符故悟客塵二字成果愚謂客塵之喻乃陳如追述鹿苑場中斷見思二惑而證真諦涅槃之解也客喻見惑塵喻思惑主空即是見性真理八十八使如狂瀾無定名為利使觸處便生法華喻如魑魅魍魎處處皆有忽而起貪忽而起瞋著有著無如客之不定一處也著見之心暫久不同名為或宿或食而見心無定名為不遑安住因觀見惑之狂瀾無住即會出恆住之主人公主人公則初無去來也只一旅字即該盡喻中生客同時法上真妄交際矣易中旅卦艮山為內為主止於此而不動離火為外為客去其所而不留喻中主客一段宛然明白即法上陳如斷見時修忍位三十一周減緣減行真妄竝馳推四真諦理排利鈍使惑如子夏交戰于胸中之時正主客同時真妄交際義也此約卦體而言若審爻詞九四得其資斧則客有得利之象如陳那舍利先皆著見忙忙然以求理息而不可得故不安住一聞如來因緣之說初聞再悟先得泥洹一日之價即投得好主人有獲利之義也此述斷見見真之解明矣又如新霽清陽升天一段即追述疇昔斷思惑也八十一品煩惱塵勞之多如昏鶩塵埃若未見真前混混而去不覺其煩因已斷去見惑如雨天新霽用四諦智慧重慮緣真以斷思惑時如清陽升天而思惑煩惱彌覺其煩多矣清陽甚嫩顯非菩薩般若如日光諸佛智慧如日輪停午也光入隙中乃化他之權不能當門正照即牖中窺子門側見父之意今于隙中而見空相即初果初斷見後所顯偏真小空而重緣此空以斷思惑初但見思惑塵勞紛紛不已久視而塵靜光澄三空涅槃當下證矣斷思證寂法喻分明佛既印之而猶恐阿難不領此旨故舉拳以顯斷見之後有常住之主人飛光以顯斷思之後有不動之真空也常住真心無乃不動之見性乎印可佛言如是二現相證成又二一以客塵義令見性脫塵即時如來于大衆中屈五輪指屈已復開開已又屈謂阿難言汝今何見阿難言我見如來百寶輪掌衆中開合佛告阿難汝見我手衆中開合為是我手有開有合為復汝見有開有合阿難言世尊寶手衆中開合我見如來手自開合非我見性有開有合佛言誰動誰靜阿難言佛手不住而我見性尚無有靜誰為無住佛言如是此阿難因客塵之喻而悟見性離根塵也夫如來之言一聞之而得道果再研之而識指歸客塵之喻在阿含初教陳那悟此而盡見思大集經云甚深之理不可說第一實義無聲字陳如比丘於諸法獲得真實之知見此初教之益所謂一聞而得聖果非歟然初教以俗諦為正真諦為旁所云真諦亦不明指見聞嘗臭之性今經不然以界外真諦為正界外俗諦為旁則主空是正客塵是旁主空以喻真見客塵以喻妄心妄見昔教滅心今見性是常住真心則與昔殊昔教滅智今見性是無分別智光復與前異所謂再研而識指歸非歟由前阿難聞見性是心非眼茫然未解佛使陳如旁通一線當機始悟外境內根皆是客塵見性是主空以昔之喻移喻今法主空得顯功由客塵不惟阿難領旨而陳如之悟亦進如峰回谷轉別一溪山無量義經云性欲無量故說法無量無量義者從一法生不其然乎文中佛手凡兩屈一開此如來以自手當阿難之外境而與見性對辨也阿難言我見如來百寶輪掌衆中開合者不惟見性對境而為內外而其中且有主客譬義見是主手是客方其見時主客會合明矣前旅亭為主客交會之處今見時即旅亭也開合是往來之類也忽開忽合彌顯不住蓋佛手倐開而倐合如客之乍去而乍來正喻邪見之或常而或斷也如來掌中有千輻輪相具百寶光故云百寶輪掌佛告下重問阿難發明主客之義汝見我手衆中開合者如言見客往來也為是我手有開有合者如言但客有往來也為復汝見有開有合者如言內心亦可作客而有往來也阿難言下答出正義言世尊寶手衆中開合謂手為外境如客有往來我見如來手自開合謂內心對外而見外境如客非我見性有開有合謂內心為主定無往來如上所說見中主客之義明矣又問誰動誰靜更欲合塵空之義而阿難答中言不住者不住是客動是塵客塵元是一義故兼言之而我見性尚無有靜者見性是真常之體擬議皆絶可云靜耶靜尚難言何況動乎無住即動也前來客塵主空有喻無法今佛手對見正可合喻又前約見思煩惱以喻客塵是主空之喻具而未彰今約見性以顯真心則主空之義辨而方的佛印如是者阿難至此已知見是常住真心脫於色塵之外可不印歟二以客塵義令見性脫根如來于是從輪掌中飛一寶光在阿難右即時阿難回首右盻又放一光在阿難左阿難又則回首左盻佛告阿難汝頭今日為何搖動阿難言我見如來出妙寶光來我左右故左右觀頭自搖動阿難汝盻佛光左右動頭為汝頭動為復見動世尊我頭自動而我見性尚無有止誰為搖動佛言如是次約內身與見對辨也左右頭動元是阿難之身較之外境境疏身親復須載示盻應作盼流視也回首右盼謂回之于右也左盼亦然汝頭今日因何搖動者頭是身根根因塵動故作此問阿難答因見光頭動而頭動中實兼眼動之義我頭自動總合客塵而我見性無止與動所謂動靜二相了然不生并主空尚不立誰為搖動乎須知見性脫于根塵之外前佛手開合而見無開合明示脫塵之義頭自搖動而見無搖動次示脫根之義既脫內根可不印如是乎三結會責失於時如來普告大衆若復衆生以搖動者名之為塵以不住者名之為客汝觀阿難頭自動搖見無所動又汝觀我手自開合見無舒卷云何汝今以動為身以動為境從始洎終念念生滅遺失真性顛倒行事性心失真認物為己輪回是中自取流轉前雙印陳那阿難之後因普告大衆而總責之若復下述陳那所答汝觀下述阿難所答云何下責失也如來之意本欲明諸法惟心根境非動不得已而明見性是心非眼阿難因陳那所答雖悟動不動義然謂根境有動見性不動終非諸法唯心之旨故責其緣塵分別岐心境為二途也身本無動而阿難以為動如云頭自動搖是己境本無動而阿難以為動如明手自開合是己如是則始終惟一生滅據現生則始從胎中五位終至身壞命盡據後經文始則晦昧為空終則執心存內念念莫非生滅也乃遺圓融真性而認六識攀緣為心是顛倒行事此責阿難大衆不但迷圓且以能推為心也如來之意謂阿難既知見聞唯一真心何不知根身器界亦唯真心而岐之為二耶性心等者幽溪科云前云何下初責逐末忘本今責棄本循末其說是也不變之性隨緣之心本皆依正不二不解圓理則失其真言認物為己者始既迷己為物終必認物為己如最初不覺心動變成根身器世間等是迷己為物今妄認四大為自身相六塵緣影為自心相是認物為己見有生死生死得而苦之故云輪回是中自取流轉若不見有生死豈復招分段變易二苦報耶如來用權引物總為入實上來明見性不動義雖屬權秪令衆生入實而已經中進圓退別脉絡相通此章之文是起第二番進明圓教也天如以為普告大衆語意淺深隨機各解亦是一說若爾即八教中不定教相矣
