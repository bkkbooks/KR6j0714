body:
  text: 五觀音觀耳根若依三科七大次第此應在那律眼根之次今以圓通義廣正是此方便宜備顯修證之門廣出化儀之相故於最後別列一章也亦二一敘悟緣起又二一值佛受教爾時觀世音菩薩即從座起頂禮佛足而白佛言世尊憶念我昔無數恆河沙劫於時有佛出現於世名觀世音我於彼佛發菩提心彼佛教我從聞思修入三摩地觀世音觀是大士本有大光明藏意密鑒機世是三十二應身密普現音是四無礙辨口密說法皆由大士證得中道應本故能三輪不思議設化無窮也此直作一句呼之正指圓中應本若觀字作一句世音作一句讀則大士普觀十法界機呼之即應如云觀其音聲即得解脫也若觀世作一句音字作一句則大士先觀十界機叩不同而為說法如云應以何身得度即以何身而為說法是也此二屬慈悲與拔假觀也若直呼觀音二字即大士初聞佛教音聲而入心成觀觀即能觀之智音即所觀之境境智雙冥直破十界五住二死之真空蕩相觀也如云初于聞中入流忘所乃至生滅滅已寂滅現前忽然超越世出世間是也具如普門膚說此三觀妙門乃十方三世如來得成菩提之妙奢摩他三摩禪那故古佛亦名觀世音今佛亦名觀世音正前聖後聖其揆一也然入門必假耳聞乃起修中之最初方便世有執方便而為真實極力排斥三觀者是斬絶諸佛觀音圓通法門妙莊嚴路矣復有法華化他楞嚴自行之辨須知楞嚴令彼十方苦惱衆生觀其音聲即得解脫則即自行而為化他矣又觀字有平聲去聲二義如云觀去聲詮其體獨標能想之心觀平聲顯其用兼召所對之境止觀云以觀觀昏即昏而朗則二義皆須用也亦如普門膚說從聞思修入三摩地此三慧有橫有竪橫則名字已上位位有之竪則名字為聞觀行為思相似為修涅槃二十二卷十功德中第七功德文云菩薩修大涅槃微妙經典作是思惟何法能為大般涅槃而作近因菩薩即知有四種法為大涅槃而作近因一者親近善友二者專心聽法三者繫念思惟四者如法修行又今文三慧與餘門有異凡秉教者皆從耳根得聞不定從耳根悟入觀音亦從耳根得聞則與餘二十四門同也復從耳根悟入則與餘二十四門異也二備顯修證二一述修證二顯圓通初中二一入空初於聞中入流亡所所入既寂動靜二相了然不生如是漸增聞所聞盡盡聞不住覺所覺空空覺極圓空所空滅前云十方如來及大菩薩于其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體據此經文先空次中見與見緣下空也此見及緣下中也今菩薩入三摩地其文亦然當以空中二理判定此文從初于聞中至空所空滅空也從生滅既滅至上合下合中也言初于聞中者蓋約假以立空中令從聞根假法而入即最初方便也若聞所聞盡則此聞根亦空之矣非執在耳根而可得圓通也吳興分此文為四節謂亡前塵盡內根空觀智滅諦理即中云菩薩修時元必從聞動靜入言入流者入者返也前云汝今欲逆生死欲流返窮流根至不生滅此文即入流之正解也凡夫耳根流逸奔聲即是向外今不起分別名為入流自因明立所以來所之為害久矣今雖聞聲不起分別始亡聲塵之所所入既寂是工夫得手之時動靜二相了然不生即是寂也此時非不知動靜但不起動靜之相若不知動靜即非耳根若分別二相即屬耳識識起故能生惑業今則雖聞動靜不起前塵之相也但菩薩本從根入而先亡動靜之塵者由塵發知塵脫則根必拔故先亡之也次盡內根者夫由塵發知因根有相二法為偶存一不可前塵因根有雖已亡之根苟不亡終非解脫良由亡智有親有疏故曰漸增如分別不起塵相既亡此時根雖了然亦安有相是聞與所聞而俱盡也乃正從耳根而入既入之後根相全亡應知凡夫聞聲時元無根塵之相起念執取根塵始生今菩薩適復其本故涅槃云雖見男女無男女相雖見五陰無五陰相縱使耳識入復即分別而破分別不然便起惑業況耳根乎故于此根不起後念即破根塵入聞性矣聞性即心莫言不用三空觀智者盡聞牒前根盡之義不住正明宜空覺照也後知不起分別元無覺照譬如凡夫分別未生之時有何覺照因空根塵權立能覺對病以設藥病去而藥亦亡若病去執藥藥反成病故能覺其所覺之智至此并空則本元自復矣四滅諦理者空覺即上空覺照之體極是圓滿并空亦空如前火木然諸薪已亦復自然所空指上根塵及智能空即是諦理良由分別既亡豈執空理故有極圓之稱只一無分別心任運有此四重之義也何者對塵而不執塵則亡塵相在根而不執根則亡根相豈在智照而執智照在諦理而反執諦理乎問理本寂滅復何滅乎答若謂寂滅此滅猶生但破其情非破其理如智論云不破聖人心中所得涅槃為未得者執成戲論是故須破維摩云但除其病不除其法是也觀此可知大士初步工夫必先破去根塵方得入空之門奈何正脉必執圓通在耳根耶正智論之執成戲論淨名之執病不除也得大士先亡根塵之旨則圓通可修而入道有門矣二入中生滅既滅寂滅現前忽然超越世出世間十方圓明獲二殊勝一者上合十方如來本妙覺心與諸如來同一慈力二者下合十方一切六道衆生與諸衆生同一悲仰生滅者上來四重展轉生滅以前生後以後滅前最後之滅與生相對亦復須滅因之寂滅現前寂滅者中道之理也長水判云此之觀門即是圓修一心三觀初于聞中假也亡前塵淨內根空觀智滅諦理空也寂滅現前至超越二邊中也問若爾即有先後何名一心答大論釋三智文云雖一心中得亦有初中後次第如一心有三相生因緣住住因緣滅正虎溪曰境為妙假觀為空境觀雙忘即是中亡照何曾有先後一心融絶了無蹤也忽然下釋明寂滅先雙遮次雙照世聞是俗出世是真超越二邊寧非中道從來解者不知空中相接遂失中道之義十方下是雙照圓明是中體故能雙照而獲二殊勝菩薩本深迹大至此示為等覺能上合本妙覺心謂本有妙覺之心也慈能與樂下三十二應孰非與樂之事又以位在菩薩故下合衆生同一悲仰悲謂悲苦仰是慈仰大聖無我先憂而憂然悲有二義在衆生則苦惱而生悲在菩薩則拔苦而興悲又衆生則仰賴于菩薩菩薩則仰叩于法身其義皆同下十四無畏無非拔苦事也二顯圓通三一三十二應三一總明世尊由我供養觀音如來蒙彼如來授我如幻聞熏聞修金剛三昧與佛如來同慈力故令我身成三十二應入諸國土同慈上合中先總明三十二應空中之道必由假顯故先云如幻是觀耳根為幻俗也言聞熏聞修者前云聞思修今易思為熏思似有心熏則任運緣心自在故宜易之古云聲教熏習故曰聞熏聞而復修故曰聞修然據後十四無畏中有熏聞成聞等言豈得專以聲教釋聞蓋以聞性而熏餘根餘塵亦以聞性而熏耳識聲塵并熏聞根皆成聞性故曰熏也依聞而修復曰聞修工夫雖由觀假而入所顯真性猶如金剛此喻真性不壞能摧破無明也三十二應即以法界無礙身雲普現十法身圓應群機也幽溪曰二聞字即所觀之境熏修二字即能觀之觀言熏修者熏謂熏習修謂修治蓋此法門乃全性以起修全修而在性全性起修則以本覺之性而熏習乎始覺全修在性則以始覺之修而修習乎本覺如是而修即為無為亡情絶解一切結惑擬之即銷故稱為如幻聞熏聞修金剛三昧二別列三十二一現佛身世尊若諸菩薩入三摩地進修無漏勝解現圓我現佛身而為說法令其解脫初應菩薩入三昧已進修中道無漏有定之慧不同聲聞故曰勝解將欲圓滿名為現圓現佛身者須八相成道五時說法問既云勝解現圓必將自證何假現身答感應道交如啐啄同時以令其速證也孤山云菩薩別圓機也若入相似三摩地進修中道無漏則分真勝解現圓乃至若進修金剛無漏則究竟勝解現圓大士皆現佛身為說頓法令得分真究竟解脫然大士所以能現佛身者以上合諸佛同一慈力故也二現獨覺身若諸有學寂靜妙明勝妙現圓我於彼前現獨覺身而為說法令其解脫出無佛世觀物變易自證無生名為獨覺經名麟喻者如大經云麒麟獨一之行也妙是亡相之義妙明即空觀也真空之理朗然自明故曰妙明言勝妙者最勝真空之理過諸有學將欲現前也三現緣覺身若諸有學斷十二緣緣斷勝性勝妙現圓我於彼前現緣覺身而為說法令其解脫緣覺獨覺皆能侵習但見佛不見佛稟教不稟教之殊耳十二因緣有流轉還滅二門斷十二緣即還滅也緣斷而勝性現勝性即空性謂最勝真空之理過諸有學前獨覺中言勝妙而不言勝性後聲聞中言勝性而不言勝妙似以侵習稱妙稟教稱性四諦十二緣皆是佛說不可更改故云性也又前之獨覺亦觀因緣如華飛釧動皆是觀緣悟道但不聞十二因緣流轉還滅以此法相非佛不能說故又支佛根利不制分果而有學無學之殊者以歷三生六十劫判也四現聲聞身若諸有學得四諦空修道入滅勝性現圓我於彼前現聲聞身而為說法令其解脫擕李曰三果俱屬有學見道一十六心斷四諦下惑證生空理故曰得四諦空初果後進斷八十一品俱生品品皆證一分擇滅無為故曰修道入滅最勝真空之性將欲圓滿大士現身說法令其速證五現梵王身若諸衆生欲心明悟不犯欲塵欲身清淨我於彼前現梵王身而為說法令其解脫孤山曰梵王即色天主名為尸棄此云頂髻文中欲心等有盡作淫欲解者未必然也欲心欲身希欲之欲也欲塵淫欲之欲也欲心明悟謂悟明初禪之法如五支八觸十功德等又梵王能說出欲論又有覺觀語言之法得為千界之主非悟明而能若是乎因不犯欲界之塵而身根清淨解脫者令離欲塵也六現帝釋身若諸衆生欲為天主統領諸天我於彼前現帝釋身而為說法令其成就樂行十善即是欲為天主彼天橫有三十三天而帝釋統之說法謂說十善法也七現自在天身若諸衆生欲身自在遊行十方我於彼前現自在天身而為說法令其成就自在天是欲界頂天具云婆舍跋提此云他化自在假他所作以成己樂即魔王也或云第六天上別有魔王宮殿亦自在天攝八現大自在天身若有衆生欲身自在飛行虗空我於彼前現大自在天身而為說法令其成就孤山曰大自在華嚴稱為色究竟天即色頂摩醯首羅天大論云三目八臂騎白牛執白拂者是也慈恩以自在為夜摩兜率大自在為化樂他化自在未必然也九現天大將軍身若諸衆生愛統鬼神救護國土我於彼前現天大將軍身而為說法令其成就上舉正統此明臣輔金光明以散脂為大將大經云八臂健提是天中力士大論稱塢摩羅伽此云童子騎孔擎雞持鐸捉赤幡復有韋紐天此云遍聞四臂捉貝持輪騎金翅鳥皆是諸天大將未知此中定是何等何妨菩薩隨機俱現十現四王身若諸衆生愛統世界保護衆生我於彼前現四天王身而為說法令其成就四天王者東方提頭賴吒天王此云持國居黃金埵領乾闥婆富單那南方毗留勒叉天王此云增長居琉璃埵領鳩槃茶薜荔多王有九十一子西方毗留博叉天王此云廣目居白銀埵領毗舍闍毒龍等北方毗沙門天王此云多聞居水晶埵領夜叉羅剎制此鬼神不令害人故稱護世妙玄云不殺戒生四天處不殺不盜生三十三天十一現四王太子身若諸衆生愛生天宮驅使鬼神我於彼前現四天王國太子身而為說法令其成就國太子如世間太子入則監國出則撫軍也十二現人王身若諸衆生樂為人王我於彼前現人王身而為說法令其成就王者往也人皆歸往也四輪粟散皆人之主手鑑云金銀銅鐵四輪王如次王四三二一天下若中下品十善報為粟撒小王衆多如彼粟故從喻立名又言粟散如人把粟散置盤中各得分位王喻亦爾以上化下物無不從所謂一人有慶兆民賴之也抑又佛法興隆增長精氣大集經云國王護法增長三種精氣一地精氣謂五穀豐熟二衆生精氣謂形貌嚴正無諸疾苦三善法精氣謂修施戒信等十三現長者身若諸衆生愛主族姓世間推讓我於彼前現長者身而為說法令其成就長者儒佛兩出天竺以積財巨億為長者則惟富而已亦有為富不仁者不足以盡此名也韓子曰厚重自居謂之長者以對輕薄待人謂之小人則指其德號史記漢高祖封侄為調羮候曰為其母不長者耳王陵母對使者曰漢王長者宜善事之推此則候王之位可力取而長者之名難幸邀者也蓋候王舉世直名與之而貌事之長者則實與之而心服之故云世間推讓此儒名而儒解也若佛經長者則具十德謂姓貴位高大富威猛智深年耆行淨禮備上歎下歸此本維摩經文然須分世出世聞長者世間長者姓則三王五帝之後左貂右插之家位則輔弼丞相鹽梅阿衡富則銅陵金谷豐饒侈靡威則嚴霜隆重不肅而威智則胸如武庫權奇超拔年則蒼蒼稜稜物儀所伏行則白圭無玷所行如言禮則節度庠序世所式瞻上則一人所敬下則四海所歸出世長者如維摩經云已曾供養無量諸佛深植善本姓貴得無生忍位高辨才無礙逮諸總持大富稱無所畏降伏勞冤威猛善于智度通達方便明了衆生心之所趣又能分別諸根利鈍智深久于佛道心已純熟年耆決定大乘諸有所作能善思量行淨住佛威儀心大如海禮備諸佛咨嗟上嘆弟子釋梵世主所敬下歸十四現居士身若諸衆生愛談名言清淨自居我於彼前現居士身而為說法令其成就居士亦儒佛兩出今先分釋二宇六書精蘊云上之十字一乃數之始十乃數之終舉十則攝盡世間千萬之法如十十為百十百為千十千為萬十萬為億舉凡世間千萬森羅之法皆吾分內所當知者十下用一者皆當以一貫之也故士乃美稱如云彥士髦士秀士文士多士博士都人士上中下士貢士進士三代無生貴故世子皆初就元士之位以卿大夫候王天子皆以士為本如繪事後素然故居四民之首也今士上用居字者尸即屋也屋下所蘊者乃千古聖凡同稟一真也如云居天下之廣居此居字非謂大屋乃指古聖貫道德仁義皆吾分內所當懷蘊也天竺以守道居正為居士而禮記玉藻云居士錦帶鄭康成注云道藝處士也豈非逢掖章甫天縱多能之謂乎若佛經所出梵語迦羅越即維摩居士大品經中居士是也補遺云博聞強識不求仕宦居財大富秉志廉貞故云居士得之矣今世措大家聞呼居士便慍為佛家輕菲之稱殊不知皆儒書極尊極貴之目也名言華嚴云風雅典則語也十五現宰官身若諸衆生愛治國土剖斷邑我於彼前現宰官身而為說法令其成就國城也大曰封也有功者封于是也邑即是縣三台輔相州牧縣長悉號宰官十六現婆羅門身若諸衆生愛諸數術攝衛自居我於彼前現婆羅門身而為說法令其成就婆羅門梵語也此云淨行西域四姓之一劫初種族山野自間故名淨行東土即黃冠道士倫也周時李伯陽初生髮白名老子著道德五千言莊周著內外雜篇號南華經漢子房從黃石受書辟穀山林即全真之𭽍後漢張道陵之從老子受雲中科教為天師書寫符録為人驅役鬼神時號三斗米張即正乙之𭽍也後全真分二類一鍊養二服食正乙分二類一符録二科教更有南宗修性北宗修命茅山道士江西天師之別所修金丹之外千餘旁門其法既繁其類亦夥呪禁算藝調養方法皆其旁門數術也大士為度此類亦現身其中為師為主如摩利支天元是大權應現而為淨行尊為斗母無不可也十七現比丘身若有男子好學出家持諸戒律我於彼前現比丘身而為說法令其成就好習三乘遠離家獄尸羅曰戒毗尼曰律由依律法防非止惡比丘此云乞士上從諸佛乞法以資慧命下從檀越乞食以資身命戒有二百五十條名義如初卷十八現比丘尼身若有女人好學出家持諸禁戒我於彼前現比丘尼身而為說法令其成就尼女也文句云通稱女為尼即女比丘也比丘尼戒五百條謂觸八覆隨持止身過又尼戒八棄殺盜淫妄與比丘四棄戒同其觸八覆隨者觸謂與男身觸八具八相謂與染心男子捉手捉衣入屏處屏處共立共語共行身相倚相期覆覆他罪惡隨隨舉大僧供給衣食十九現優婆塞身若有男子樂持五戒我於彼前現優婆塞身而為說法令其成就優婆塞此云近事男謂以五戒自守堪任親近出家比丘者也五戒謂不殺不盜不邪淫不妄語不飲酒優婆塞經說五戒者天下大禁忌若犯此五在天違五星在地違五嶽在方違五帝在身違五藏如是等世間違犯無量若約出世則壞五分法身一切佛法以五戒是大小尸羅根本故好學此者現清淨男與說此法二十現優婆夷身若有女子五戒自居我於彼前現優婆夷身而為說法令其成就優婆夷此云近事女亦以五戒自守堪近事出家比丘尼者也二十一現女主等身若有女人內政立身以修家國我於彼前現女主身及國夫人命婦大家而為說法令其成就女主即天子之后周禮天子之后立六宮三夫人九嬪二十七世婦八十一女御國夫人如云君之妻君稱之曰夫人命婦謂因夫榮而受封誥者也大家如曹世叔妻號大家之類二十二現童男身若有男子不壞男根我於彼前現童男身而為說法令其成就二十三現童女身若有女人愛樂處身不求侵暴我於彼前現童女身而為說法令其成就二十四現天身若有諸天樂出天倫我現天身而為說法令其成就諸天方樂而能厭樂是樂出天倫雖欲出本倫而于三乘中實未有定身之處故菩薩且現同類身則易于化導二十五現龍身若有諸龍樂出龍倫我現龍身而為說法令其成就此下七種雖有神通福德均名惡趣各有苦惱故皆欲脫去二十六現藥叉身若有藥叉樂度本倫我於彼前現藥叉身而為說法令其成就藥義此云輕捷此有三處海島空中天上度亦脫也二十七現乾闥婆身若乾闥婆樂脫其倫我於彼前現乾闥婆身而為說法令其成就乾闥婆此云香陰新翻尋行熏聞云帝釋樂神也在須彌山南金剛窟住天欲作樂此有異相二十八現阿修羅身若阿修羅樂脫其倫我於彼前現阿修羅身而為說法令其成就阿修羅此云無端正以女美而男醜故從男彰名新翻非天以諂詐無天行故淨名疏名此神果報最勝鄰次諸天而非天也苕溪云准普門品八部此闕迦樓羅即金翅鳥恐在下文雜類中收二十九現緊那羅身若緊那羅樂脫其倫我於彼前現緊那羅身而為說法令其成就緊那羅形似人而頭有一角因呼為疑人天帝絲竹樂神小劣乾闥婆新翻曰歌神三十現摩訶羅伽身若摩訶羅伽樂脫其倫我於彼前現摩訶羅伽身而為說法令其成就羅伽什師云地龍肇公云大蟒腹行也淨名疏云即世間廟神受人酒肉悉入蟒腹毀戒邪諂多瞋小施貪嗜酒肉戒緩墮鬼神多嗔蟲入其身而唼食之亦名莫呼洛三十一現人身若諸衆生樂人修人我現人身而為說法令其成就補遺云天龍等皆言樂出其倫而人謂樂人修人者樂入其類或欲出其倫皆隨而應之三十二現非人等身若諸非人有形無形有想無想樂度其倫我於彼前皆現其身而為說法令其成就長水曰有形有色蘊如下休咎精明等無形無色蘊如下空散銷沉等有想有四蘊如下鬼神精靈等無想無四蘊如下精神化為草木金石等上皆非人也霅川云除人道外餘五悉號非人有形色界無形無色界有想空識二天無想無所有及非想天幽溪曰此經三十二應身與法華普門品同其所說法則異彼為流通法華純說佛法故其文曰應以何身得度者即以何身而為說法此經為顯從妙體起妙用無剎而不現無法而不說以泛應言之則楞嚴漚和之用廣以大體言之則法華實智之本大一施權一顯實事不雷同一敘因一敘果道非崖異三總結是名妙淨三十二應入國土身皆以三昧聞熏聞修無作妙力自在成就溫陵曰迹示同類心絶愛見名妙淨依無作智起大神用名妙力無作無為隨緣之應名自在成就正一月在天影臨萬水也但此與普門俱無菩薩并地獄身者或曰聖言之略或曰觀音已是菩薩何須更現地獄苦重不可度也智者依正法華具現菩薩界身又準釋論菩薩亦化地獄則無礙身雲具現十界也二十四無畏三一總明世尊我復以此聞熏聞修金剛三昧無作妙力與諸十方三世六道一切衆生同悲仰故令諸衆生於我身心獲十四種無畏功德三十二應十四無畏與法華有同有異三十二應是人十四無畏是法異三十二應是慈十四無畏是悲同三十二應是福十四無畏是慧同三十二應是應身十四無畏是法身同三十二應是如意珠身十四無畏是藥樹身同三十二應是顯益十四無畏是冥益同三十二應是權十四無畏是實同三十二應是迹十四無畏是本同三十二應是緣十四無畏是因同三十二應是斷十四無畏是智同三十二應俱顯十四無畏顯機冥應也次別列十四一從音得無畏一者由我不自觀音以觀觀者令彼十方苦惱衆生觀其音聲即得解脫菩薩音塵已銷何必自觀衆生觀聲菩薩加以觀智故云不自觀音以觀觀者又衆生所觀音聲即是稱觀音之音聲也衆生觀此音聲菩薩亦觀此音聲機應皆觀尋聲赴救也吳興謂聖人無已惟物是利故以觀音之智加彼觀聲之機於苦得脫不旋踵矣菩薩正以觀衆生之音得名也交光非吳興而自作如字之釋不亦異哉二從眼根得無畏二者知見旋復令諸衆生設入大火火不能燒別行疏釋火難有三種一果報火下從地獄上至初禪二惡業火通三界三煩惱火通三乘火難既然下皆倣此三從耳根得無畏三者觀聽旋復令諸衆生大水所漂水不能溺六根互用聽即是觀故曰觀聽溫陵曰內外四大常相交感見覺屬火聞聽屬水故見業交則見猛火聞業交則見波濤今知見旋復則無見業觀聽旋復則無聞業故水火不能燒溺也四從滅妄想得無畏四者斷滅妄想心無殺害令諸衆生入諸鬼國鬼不能害妄想起時計有冤恨妄想斷滅冤親等視何殺害之有哉衆生自忘殺害則他不能害今以被加與自忘殺機同也前後無畏多從脫根塵得唯此無畏從滅妄想而得五從六根銷復得無畏五者熏聞成聞六根銷復同於聲聽能令衆生臨當被害刀段段壞使其兵戈猶如割水亦如吹光性無搖動熏聞成聞六根為聞所熏皆同于聞性也然古人皆云熏于妄聞成其聞性恐不可違同于聲聽者外來如聲內根同聽刀段段壞似音聲之念念滅也割水吹光似聽聞之無隔礙也義疏云刀段段壞者明人執殺具一折一來隨來隨斷彌顯力大六從聞熏得無畏六者聞熏精明明遍法界則諸幽暗性不能全能令衆生藥義羅剎鳩槃茶鬼及毗舍遮富單那等雖近其傍目不能視聞熏精明等如四卷云內瑩發光如是浮塵及器世間諸變化相如湯消氷應念化成無上知覺也妄法不起純一精明此明周遍法界爍彼幽暗藥義等類咸受幽氣故雖近傍而不能視前四自入鬼國今是鬼來惱人藥義如前羅剎云可畏鳩槃茶厭魅鬼毗舍遮噉精氣鬼富單那熱病鬼七從銷音得無畏七者音性圓銷觀聽返入離諸塵妄能令衆生禁繫枷鎖所不能著音銷聽返所以離諸塵妄塵纍縛人如枷鎖禁繫塵妄既銷枷鎖咸絶溫陵曰音性圓銷則內無所繫聽返入則內無所纍故枷鎖自脫也八從圓聞得無畏八者滅音圓聞遍生慈力能令衆生經過險路賊不能劫前文云六為賊媒自劫家寶故長水云音能劫心害善為賊也滅音圓聞故得遍生慈力以音銷之故賊不能劫又普門品云或值冤賊繞各執刀加害念彼觀音力咸即起慈心據此偈賊心生慈故不劫矣即中云滅音故無六塵之賊圓成一聞故生同體大慈自心無賊外亦無賊因遍生慈力賊起慈心夫音聞兩立則物我成敵今滅音圓聞則內外無待故能遍生慈力無復怨敵也九從離塵得無畏九者熏聞離塵色所不劫能令一切多淫衆生遠離貪欲承第八來故云不劫聞性所熏聲塵尚離色何能劫然只據衆生聞根色質不能為礙塵即成空亦有離塵之義故以聞熏眼而色不能劫也衆生色根重非聞不能熏眼也十從純音得無畏十者純音無塵根境圓融無對所對能令一切忿恨衆生離諸瞋恚純音無塵者性中本具之音了無塵相前云滅音圓聞又音性圓銷故知今云純音者乃音遍法界是音之本性耳根境圓融者根境皆性圓融無二也瞋由違情而起對境而生音性純淨無違無對不瞋矣十一從旋明得無畏十一者銷塵旋明法界身心猶如琉璃朗徹無礙能令一切昏鈍性障諸阿顛迦永離癡暗癡由妄塵所蔽無明所覆銷塵則無蔽旋明則無覆故外之世界內之身心凝融朗徹離癡暗矣性障即癡也阿顛迦此云無善心內業有十而壞滅法身惟淫怒癡為甚故舉三以兼餘十二從復聞得無畏十二者融形復聞不動道場涉入世間不壞世界能遍十方供養微塵諸佛如來各各佛邊為法王子能令法界無子衆生欲求男者誕生福德智慧之男聞性朗耀色質盡空故云融形復聞聞性元不動而到故不動道場而涉入世間形礙既消故雖涉入而不壞世界不用開門為不壞涉入世間不壞世界是從法起應又為法王子多能幹事則屬權智之用十三從根圓得無畏十三者六根圓通明照無二含十方界立大圓鏡空如來藏承順十方微塵如來祕密法門受領無失能令十方無子衆生欲求女者誕生端正福德柔順衆人愛敬有相之女六根解脫無非圓通是六根皆得圓通以圓通故明照無二此是法身之體故含十方界也明照則為大圓鏡智含界則為空如來藏此屬實智實智屬理理能含育故生于女當知此是法身境界故能承順祕密法門十四從妙門得無畏十四者此三千大千世界百億日月現住世間諸法王子有六十二恆河沙數修法垂範教化衆生隨順衆生方便智慧各各不同由我所得圓通本根發妙耳門然後身心微妙含容周遍法界能令衆生持我名號與彼共持六十二億恆河沙諸法王子二人福德正等無異世尊我一名號與彼衆多名號無異由我修習得真圓通百億日月即千個百萬也修法是自行垂範是化他言隨順衆生方便智慧即屬權智各各不同是權智不同此與觀音實同權異以諸菩薩權用有偏惟觀音體用皆圓勝諸菩薩此舉所較由我下次舉能較即中云身心微妙含容如前云六根圓通含十方界又身心之言該十八界則盡攝二十四種圓通是則周遍法界之言當該七大能令下正較量法華疏云圓人惟一偏人則多格六十二億偏菩薩也又別行疏云一多性不可得無有二相同入實際實際正等是故無異法華論云畢竟決定知法故法即法性真如法身是故六十二億與觀音無別蓋法華為流通本經故智者二疏約待絶二妙之義互顯其文格偏等圓相待義也實際正等絶待義也況復本論以法性釋等今經為對諸聖說圓通本根校量勝劣然則兩經義不全同儻或一向將此例彼豈唯見智者未曉抑亦觀天親弗明矣世尊下結所以無缺缺為真圓通孤山曰此方衆生耳根利故受道者多所以觀音化勝餘根鈍故受道者少所以諸聖化劣是知行位雖齊對境有異總河沙數但敵觀音一人故使持名二福正等從來觀音耳根利于諸聖之餘根而反就衆生說者是舉所化顯能化也三總結是名十四施無畏力福備衆生三四不思議二一總標世尊我又獲是圓通修證無上道故又能善獲四不思議無作妙德前三十二應是菩薩往應衆生十四無畏是衆生來叩菩薩今四不思議雖亦是感應而正明菩薩自所證得心不能思口不能議故云修證無上道據後云我得佛心證于究竟即是已證然由修方證或云三十二應是初住境界至此方是等覺位淺深恐不可定次別列四一現容說呪一者由我初獲妙妙聞心心精遺聞見聞覺知不能分隔成一圓融清淨寶覺故我能現衆多妙容能說無邊祕密神呪其中或現一首三首五首七首九首十一首如是乃至一百八首千首萬首八萬四千爍迦羅首二臂四臂六臂八臂十臂十二臂十四十六十八二十至二十四如是乃至一百八臂千臂萬臂八萬四千母陀羅臂二目三目四目九目如是乃至一百八目千目萬目八萬四千清淨寶目或慈或威或定或慧救護衆生得大自在妙妙兩字確指空中妙以亡相為義空亡根塵之相中亡空假之相若就前文則入流亡所下是初妙義寂滅現前下是次妙義若就本文則心精遺聞是初妙義見聞覺知不能分隔成一圓融清淨寶覺是次妙義心性真常不雜妄法故曰心精脫去耳根故曰遺聞六根圓融了無一相是清淨具諸妙用曰寶覺夫一根已具千二百功德況六根互具妙用豈窮霅川曰首表法身超出二邊臂表解脫提拔衆苦目表般若照了萬境皆云八萬四千者即障顯德也障即八萬四千塵勞偈云十使互具成一百歷十法界成一千身口七支為七千三世共成二萬一四心各具二萬一共成八萬四千數清淨寶目者能除他垢曰清淨令他得益曰寶目身手目咸有慈威定慧之相見必利益故能救護現容說呪其相如此可思議乎二形呪無畏二者由我聞思脫出七塵如聲度垣不能為礙故我妙能現一一形誦一一呪其形其呪能以無畏施諸衆生是故十方微塵國土皆名我為施無畏者聞即初于聞中思即入流亡所等於三慧中但言前二蓋省文耳如聲下譬也聞思如聲六塵如垣六塵不能繫縛如垣不礙聲蓋妄形已盡真形如聲之無礙以真形全是聞性也形與聲類故以聲為喻故我下明不思識承上文來重言現形誦呪既一切不能拘縛何畏之有微塵國中皆施無畏可思議乎此與前十四無畏不同以前不云微塵國也光師云根如聲之無形此妙語也以無礙故無剎不現故曰妙能以無礙故令他無畏礙則有畏不礙何畏三令衆求哀三者由我修習本妙圓通清淨本根所遊世界能令衆生捨身珍寶求我哀愍本妙圓通清淨本根者上謂本來自妙下謂圓通清淨本惟耳根耳根利則機應捷本根清淨則一切無著故令衆生捨身珍寶夫一切衆生以財為命慳心最難破捨心最難發而所遊之處皆捨身珍寶可思議乎四己他願滿四者我得佛心證于究竟能以珍寶種種供養十方如來傍及法界六道衆生求妻得妻求子得子求三昧得三昧求長壽得長壽如是乃至求大涅槃得大涅槃過去已成正法明如來即究竟覺雖成佛果行菩薩道願無不滿能供如來則滿己願能應諸求則滿他願可思議乎又供佛珍寶安知非即衆生所施之珍寶乎己他滿願亦因能克果之義吳興曰此四不思議前二屬應後二對機應中備顯形聲二益初文雖云說呪而正示形益即應身功德也次文雖復現形而正示聲益即名稱普聞也機中具明因果二相先明修因則六度之中略舉布施俾求福故後明感果則世出世願靡不成就令得樂故二結答圓通佛問圓通我從耳門圓照三昧緣心自在因入流相得三摩地成就菩提斯為第一世尊彼佛如來歎我善得圓通法門于大會中授記我為觀世音號由我觀聽十方圓明故觀音名遍十方界身根圓照似簡他根緣心似簡耳識緣心自在者繫緣法界不須作意也因入下似總結上文所說因入下因也成就下果也其言入流者能脫根塵可謂入流也已吳興曰按觀音三昧經及大悲經並云此菩薩過去久已成佛號正法明又悲華經云往昔寶藏如來授不瞬太子記名觀世音然則悲華與今經皆覆本隨迹之名今得圓通即太子後身也補遺云今正釋出觀音之名於聞聽中用觀觀其聞性方成圓明從德立名故不云聞而云觀也是則云觀已兼其聽矣由我以觀為聽故能圓明前云觀聽旋復亦此意觀聽十方圓明觀周普也稱名周遍世音普也此見普門之義經自初卷辨見所顯獨在眼根大士從耳根入而云由我觀聽者六根互用雙收二根則見道修道之文咸歸一轍也四放光現瑞印可爾時世尊於師子座從其五體同放寶光遠灌十方微塵如來及法王子諸菩薩頂彼諸如來亦於五體同放寶光從微塵方來灌佛頂并灌會中諸大菩薩及阿羅漢林木池沼皆演法音交光相羅如寶絲網是諸大衆得未曾有一切普獲金剛三昧即時天雨百寶蓮華青黃赤白間錯粉糅十方虗空成七寶色此娑婆界大地山河俱時不現唯見十方微塵國土合成一界梵唄詠歌自然敷奏初放光即時下現瑞現瑞中表三德五體放光放全體之光十方佛總諸圓通十方菩薩各入圓通故遠灌其頂以明道之不二又十方佛既從二十五門入今佛與大衆亦然故微塵佛亦放光來此灌頂以表所入法門無非無上頂法無相真理菩薩羅漢不言頂者省文耳林木池沼皆演法音表七大皆如來藏正一切聲是佛聲一切色是佛色也微塵諸光其光交接互相籠故曰相羅喻寶絲者以寶絲為重重相映如光之彼彼互徹金剛三昧從性體得是大經十功德中第六功德經云譬如金剛若在日中色則不定金剛三昧亦復如是若在大衆色亦不定所以今經下文即云天雨百寶蓮華乃至虗空成七寶色也又金剛三昧者雖見男女無男女相雖見五陰無五陰相故下文又云大地山河俱時不現等也雨華至不現表般若唯見下表法身梵唄下表解脫又青黃赤白四華表四十位國土合一表大衆俱入一法界既不見諸界自然成一界矣二十五種圓通不一故華具衆色自行化他讚歎隨喜合成百寶二十五門一一皆是金剛三昧咸具因果故以百寶蓮華表之青黃赤白等正明色之不定也證圓通後十方虗空悉皆銷殞化成寶覺真空亦以金剛三昧其色不定或成色也五佛敕文殊簡辨三一佛敕文殊二奉命簡辨三時衆獲益初中二一示圓融於是如來告文殊師利法王子汝今觀此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別最初成道方便者所從之門即方便也長水云修行之要入實為期今皆實證故無優劣據曰劫相陪便成前後差別既各證果有何前後吳興曰夫如來藏性元無異乘以根有利鈍故教分大小約三諦言之則小教所詮者真也大教所詮者中也而此真中遍在一切俗諦之上即前所悟十八界及七大也當知三諦具足名如來藏俗諦不空真中俱空故二十五聖中凡聲聞所證或析俗見真或體俗見真皆分入空藏也菩薩所證或離俗顯中或即俗顯中皆全入空藏也今以藏性融會全分無差即同法華開方便門示真實相决了聲聞法是諸經之王也既以此文為開顯下揀圓通必是別教無疑問前釋觀皆圓通云是一心三觀今何言別答觀音自圓揀選自別既云簡選優劣非別而何應知此經元教初機之人自當分別不可直作純圓而釋二明須揀二一為阿難我今欲令阿難開悟二十五行誰當其根易開悟者即當其根二為未來兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就每一世界必有所宜而此界所宜何在菩薩乘因也無上道果也何方便門使因果得易成就所從之根名為方便前四卷第二決定義中云得循圓通與不圓根日劫相陪直至今文尚未揀出圓通本根茲欲的示華屋之門故命文殊揀選又前文云十方如來于十八界一一修行皆得圓滿無上菩提亦無優劣故佛不自揀降佛已還每為根局則選圓通是菩薩因人之事文殊應命不亦宜乎二奉命揀辨二一述敬儀文殊師利法王子奉佛慈旨即從座起頂禮佛足承佛威神說偈對佛二正說偈二一通明所證理又二一從真起妄覺海性澄圓圓澄覺元妙元明照生所所立照性亡迷妄有虗空依空立世界想澄成國土知覺乃衆生欲選圓通先原始要終以明迷悟之大途覺海之覺即四卷中性覺本覺之覺也海字亦可從喻亦可從法覺體無涯稱為海耳此是性體而云澄圓者或謂同于性覺妙明本覺明妙未必然也明字自在下文豈可強對圓字若以澄字當妙則元妙之妙何以釋之澄是澄寂圓是圓滿覺字即下成衆生之本澄字即下成國土之本但下文全妄此處全真在性中澄寂之德義含本有依報依正不二故名曰圓次句圓澄覺三字猶言一體之依正也元妙者元來無相故以為妙次言元明照生所者至此方用明字蓋三諦中有一諦能生諸法俗諦是也性覺妙明中有一字能生諸法明字是也若以前二句為真中二諦今元明為俗諦亦無不可前非無俗合俗而為真中元明即是真中合真中而為俗明必有照照必生所即是因明立所也照性亡者從覺明而成晦昧也迷妄有虗空是釋明照性亡耳空晦暗中結暗為色而成世界先成無情之國土次成有情之衆生想澄者妄想中有澄靜之體蓋全覺海之澄而為妄想之澄知覺是正報亦全覺體而為知覺文殊皆引第四卷文以立三諦之體此七大十八界所由來也二返妄歸真空生大覺中如海一漚發有漏微塵國皆依空所生漚滅空本無況復諸三有幽溪曰前依第四卷文明從真起妄今一行半明返妄歸真蓋衆生未見道時非惟迷萬法本空抑且謂物大已小此二迷展轉相因而有惟不了萬法本空故有天有地有依有正一墮于有則謂依大正小身大心小所謂一迷為心決定惑為色身之內是也能見道者則了覺海性澄圓圓澄覺元妙從大覺而生虗空依虗空而立大地依大地而妄立衆生所謂不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤故曰空生大覺中如海一漚發有漏微塵國皆依空所生此中且破物大己小若破萬法皆有又在下二句也漚滅空本無況復諸三有者前文云今汝諸根若圓拔已內瑩發光如是浮塵及器世間諸變化相如湯銷氷應念化成無上知覺後文云一人發真歸元十方虗空悉皆銷殞何況空中所有國土滅漚方為修道漚滅正言證果此二句正破于有有破則萬法之體空體空則大小之計亡惟一寶覺真心本元之性矣二別顯能入門二一總述意歸元性無二方便有多門聖性無不通順逆皆方便初心入三昧遲速不同倫前明迷悟大途竟下正簡圓通二十五門名曰多門佛赴宿根隨其宜樂故聖性無不通又前云十方如來于十八界一一修行皆得圓滿無上菩提亦是聖性無不通如前三卷初六入十二處等皆是佛說是聖性無不通云順逆皆方便者耳根則順順此方之機也諸根則逆逆此方之機也二別簡辨二一簡諸行非二顯觀音是初為四一簡六塵六一簡色塵色想結成塵精了不明徹如何不明徹於是獲圓通優波尼沙陀因觀不淨白骨微塵根色明空塵色既盡妙色密圓今此簡云色由妄想結成諸塵塵質粗凝故精明了別之性不能通徹云何以此而取圓通耶二簡聲塵音聲雜語言但伊名句味一非含一切云何獲圓通陳如悟四諦聲妙音密圓簡謂音聲是徑直聲語言是屈曲聲故曰雜名句等者名詮自性句詮差別文即是字為二所依如名為眼即詮自性若言佛眼天眼乃顯句詮差別味即文也一非含一切云何獲圓通者謂若非一即一切不名圓通非定謂一不能含一切三簡香塵香以合中知離則元非有不恆其所覺云何獲圓通香嚴童子聞香入鼻觀其來無所從去無所至塵氣倐滅妙香密圓今此揀云香之一法合有離無既非其常未為圓觀四簡味塵味性非本然要以味時有其覺不恆一云何獲圓通藥王藥上因嘗衆味了味無生非即身心非離身心由味覺明位登菩薩今云味性本無待根方覺無根無味故非圓通味時者嘗時也五簡觸塵觸以所觸明無所不明觸合離性非定云何獲圓通跋陀婆羅忽悟水因既不洗塵亦不洗體中間安然得無所有妙觸宣明由是證果今言此觸要因所觸之塵合于身時而觸相方明性非常定故不圓通六簡法塵法稱為內塵憑塵必有所能所非遍涉云何獲圓通迦葉從法塵入不依五根所取稱為內塵荊公曰法塵為所緣意為能緣但心無並慮如緣善心數則不能緣惡故曰非遍涉二簡五根為五一簡眼根見性雖洞然明前不明後四維虧一半云何獲圓通律陀旋見循元由斯證得然前方全明後方全暗左右傍觀三分之二故簡之也須知文殊所簡皆在初機若少得禪定則十方洞達況聖性乎次此即應耳根以觀音呈解在後而文殊所取正此故留在後二簡鼻根鼻息出入通現前無交氣支離匪涉入云何獲圓通長水云周利槃特因教數息微細窮盡生住異滅返息循空因是得道今云鼻息雖通出入出入各據而不相交支分既離豈成圓觀三簡舌根舌非入無端因味生覺了味亡了無有云何獲圓通舌根為識所依亦名舌入令文語倒云舌非入耳然鉢提觀味之知非體非物是對物推簡故云味亡了無有四簡身根身與所觸同各非圓覺觀涯量不冥會云何獲圓通畢陵伽婆蹉因毒刺傷足有覺覺痛覺清淨心無痛痛覺純覺遺身獲無學果簡謂身為能觸塵為所觸徒物不觸因身知而有觸惟身不觸因外塵而有觸故云同然合中有覺離中不知各者離也初心在緣為覺細心分別為觀既離中則無豈圓覺觀乎涯量者邊際也承上離中不知是不能冥會又圓者圓融知身即觸知觸即身可謂圓覺觀矣然合時則圓離則不圓故云各非圓覺觀也且身與觸之邊際顯處相通冥則不通故不冥會五簡意根知根雜亂思湛了終無見想念不可脫云何獲圓通空生曠劫心得無礙如是乃至十方成空空性圓明頓入如來寶明空海今簡意知之根每雜亂思使湛了之性終不能見圓通本離思量分別而想念不脫豈可獲哉三簡六識為六一簡眼識識見雜三和詰本稱非相自體先無定云何獲圓通舍利弗心見清淨由遇佛故見覺明圓簡中云識見即眼識也論云二和生識今云三和者能所合說耳從因緣生即無定相故下句云自體先無定如下耳根圓通常皆是真實決定之法豈無定乎二簡耳識心聞遍十方生於大因力初心不能入云何獲圓通唯以心聞不由根聽此是普賢大人境界由修法界行大因所生初心之人縱修耳識決不能以心聞而洞十方若洞十方名為圓通不洞十方非圓通也由此觀之可見所選的指初心入門方便矣云何必執為真實耶三簡鼻識鼻想本權機祗令攝心住住成心所住云何獲圓通權機者謂權用此機宜因孫陀羅心多散亂教觀鼻端以攝其心心既住已則息成心之所住而真元無住有住即非四簡舌識說法弄音文開悟先成者名句非無漏云何獲圓通音謂音聲文謂名句文等滿慈從曠劫來辨才無礙豈非先已成就今重使轉輪即得開悟然法離文字故名句非無漏也亦非初心所宜是故簡之五簡身識持犯但束身非身無所束元非遍一切云何獲圓通持犯甄別但束身耳持戒雖用身識而所束實在有形之身苟無形象何以束之身既是有形之法不能遍到一切豈圓通乎六簡意識神通本宿因何關法分別念緣非離物云何獲圓通目連神通由宿習所得雖云旋湛心光發宣非關于法分別而現然小乘神通皆是作意緣物則有離物則無分別法塵是為意識四簡七大為七一簡地大若以地性觀堅礙非通達有為非聖性云何獲圓通地性觀者謂觀地性下文亦然持地平填尚涉有為非實聖性即中云生住滅為三有為相恐指地性是有為耳烏得非持地之行乎二簡水大若以水性觀想念非真實如如非覺觀云何獲圓通月光童子入定成水乃是想念所成禪中有覺觀如如之理則非覺觀三簡火大若以火性觀厭有非真離非初心方便云何獲圓通烏芻厭欲觀火非真解脫且初心之人豈可使其盡修火定故須簡也四簡風火若以風性觀動寂非無對對非無上覺云何獲圓通琉璃光觀風性動見東方不動佛國是動寂相對五簡空大若以空性觀昏鈍先非覺無覺異菩提云何獲圓通晦昧為空則昏鈍迷空是無明故先非覺六簡識大若以識性觀觀識非常住存心乃虗妄云何獲圓通彌勒修惟識而所觀之識念念遷謝故非常住又言有識心即是存心如云識簡心空豈非存心乎七簡根大諸行是無常念性元生滅因果今殊感云何獲圓通前之六大皆有觀法惟勢至念佛不假方便故不言觀先總明有為諸行悉是無常次明念亦諸行故不離生滅生滅即無常也惟此一門以生滅因而得不生不滅之果所感之果與因殊異以他力故入無生忍因不該果非圓因不通果非通吳興曰已上二十四聖皆由所得圓通本根非此土當根乃為所簡須知簡聖全是簡機豈文殊之有慢心諸聖之有慙德古謂此等龍門點額寧不長吁者鄙哉二顯觀音是分六一明方便我今白世尊佛出娑婆界此方真教體清淨在音聞欲取三摩提實以聞中入此土衆生聞根偏利而佛以音聲為教體最清淨偏逗此方機宜故欲取三摩提必從音聞而入也音即所聞之境聞即能聞之根舉所顯能而正示聞性故云欲取等也自第二決定義來直至此句分明指出圓通本根鄭重殷勤無過此語三摩提是假觀假即空中義含三觀二歎觀音離苦得解脫良哉觀世音於恆沙劫中入微塵佛國得大自在力無畏施衆生妙音觀世音梵音海潮音救世悉安寧出世獲常住離苦者離分段變易二生死苦前入流亡所下得空解脫忽然超越等得中解脫良者善也恆沙劫者明成道已來利物時長入微塵佛國歎三十二應得自在是歎四不思議無畏句是歎十四無畏妙音下約三諦以歎名音字皆是所觀三智觀故音成三境雙遮空有即妙音觀音赴救是妙假梵音清淨以歎于空海潮總喻三音應不失恃救世安寧利他三千赴物也出世常住自行惟在空中也又三諦救世咸獲安寧三諦出世莫非常住蓋令衆生先得世樂後獲常樂三顯圓通三一圓真實我今啓如來如觀音所說譬如人靜居十方俱擊鼓十處一時聞此則圓真實古云十方者十界也擊鼓者機動也一時聞者應不失也交光直就凡夫現前聞性釋之于凡有分于聖不親然此文以凡驗聖故云如觀音所說又云譬如謂不特觀音應遍十方就凡夫聞聲亦可徵驗二通真實目非觀障外口鼻亦復然身以合方知心念紛無緒隔垣聽音響遐邇俱可聞五根所不齊是則通真實目非觀障外隔紙不見外物隔皮不見五藏口鼻亦然若有所隔咸不能知惟耳隔垣能聽不惟聞邇又能聞遐如銅山西崩靈鐘東應則所聞何限乎問此是根用何言真實答根是四大所成豈能聞聲既能聞聲全是聞性必不關于四大性雖真實附根而顯故曰真非真恐迷也吳興曰此明圓通且寄耳用以顯聞性異于五根也即中云圓真實者謂真實是圓通真實者謂真實是通也三常真實音聲性動靜聞中為有無無聲號無聞非實聞無性聲無既無滅聲有亦非生生滅二圓離是則常真實縱令在夢想不為不思無覺觀出思惟身心不能及明常中先引擊鐘驗常動則聞中有聲靜則聞中無聲正如前云聲于聞中自有生滅也無聲號無聞者如前鐘歇無聲阿難大衆俱言不聞也前云若實無聞聞性已滅鐘聲更擊汝云何知故今云非實聞無性此一行明離斷見次一行正明常住文從無滅顯出無生謂不但聞聲時聞性無滅即有聲時聞亦不生故阿難前文答聲為是答聞總差夫聲無無滅聲有不生則不惟答無為誤而答有亦成謬矣故佛云自是聲塵或無或有豈彼聞性為汝有無次二句承前半行即結常住問明常未畢何遽結常答此有二意一者前一行離斷見次一行正明常住故應結常二者縱令下一行開人入道之門圓通常皆從此而入何者日間耳聞與意識雜惟夢想時聞離意識即是聞性故悟門必從此入言夢想者夢中有想如自怪其聲為木石響方斯時也有夢時之意識無醒時之意識故前文云豈憶靜搖開閉通塞不憶靜搖是不憶塵不憶開閉通塞是不憶根則根之不動可知雖不思憶必聞舂搗聲是不為不思無也言覺觀者前文有覺觀義如云其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘蓋初心在緣名覺也即于夢中自怪其鐘為木石響即細心分別為觀也此皆夢中覺觀出于醒時思惟之外夫五根身心不即是性夢聞即性故前云其形雖寐聞性不昏若見性者一聞此言宜猛自提取矣此文雖明常真實而圓通常必皆從此入也四別示迷悟二一明循聲故迷今此娑婆界聲論得宣明衆生迷本聞循聲故流轉阿難縱強記不免落邪思豈非隨所淪旋流獲無妄如上奉命揀選已竟今點出聞中迷悟功過曉喻當機使之倒聞反聞以旋迷歸悟即仰體如來開示在會之慈旨也文中先結功成過聲論宣明是功循聲流轉是過如上文云無滅無生是本聞也而聲塵有生滅隨遂此聲必招流轉豈非下結過成德以聞隨聲為聞之過是為淪溺而旋流滅妄即獲真常是聞之功二明入流則悟二一誡諦聽阿難汝諦聽我承佛神力宣說金剛王如幻不思議佛母真三昧長水科此文為後明觀行今定之金剛空也如幻假也幻即空中不可思議佛母中也此則首楞嚴定體具法身般若解脫三德祕藏也又十方三世諸佛皆從此妙奢摩三摩禪那出故名佛母二明入流二一標聞聞汝聞微塵佛一切祕密門欲漏不先除畜聞成過誤將聞持佛佛何不自聞聞欲漏句勉其斷思惑佛佛者佛說三藏十二部皆成佛道之法故名佛佛聞聞者聞性現前不涉思量則自聞其聞也謂從聞而入聞性即下文反聞聞自性也二釋聞聞二一明修證圓滿二譬一返六脫初中二一明根脫則塵返聞非自然生因聲有名字旋聞與聲脫能脫欲誰名一根既返源六根成解脫向下正明聞聞交光云聽精映聲卷聲成根遂有耳根之名今謂不爾因音聲而有名句文故云名字旋聞者非謂舍動求靜正當聞聲時不起思量分別動靜二相了然不生則與聲脫若作此釋不但成脫聲之義而前圓通常三德之旨皆煥然矣音聲之徑直者尚不可得名字之屈曲者復何有哉聲塵既亡耳根隨拔故五粘皆拔而六根成脫也二明根除則塵消二一由假入空中見聞如幻翳三界若空華聞復翳根除塵銷覺圓淨淨極光通達寂照含虗空前明由離塵故脫根今偈復明根除則塵相盡銷先明生死之由衆生見聞其猶翳眼翳眼見華故三界如空華矣次明除塵之由翳根若除塵相自殞情虗理實覺心圓淨蓋前言離塵脫根者離自分之六塵脫自分之六根也今明脫根之後三界空華皆殞故妙覺明心圓滿清淨及其淨之極也中道智光通達無礙寂照之覺尚含虗空矧空中所有之器界乎或云聞復塵銷此分證也後云淨極乃極證也二由空中出假却來觀世間猶如夢中事摩登伽在夢誰能留汝形却來者解脫之後退入三界還來度生以自他之幻皆銷摩登不能留矣登伽是夢得圓通者是醒安見夢中之人能拘攝醒中之人乎二譬一返六脫二一喻又二一喻依真起妄如世巧幻師幻作諸男女雖見諸根動要以一機抽譬上一返六脫等文即總譬法說也喻中有四意一幻師二諸男女三諸根四一機古人云幻師喻真如有隨緣義故名為巧幻作喻真如隨無明緣諸男女當喻諸衆生諸根動喻下文六和合一機者幻師手中所提線索喻一精明若線動則幻人手足皆動抽者抽牽也二喻反妄歸真息機歸寂然諸幻成無性線索不動則幻人手足皆不動此譬下一處成休復六用皆不成也以六用不成合諸幻無性其旨最明幽祖云此喻喻衆生根塵情虗無實可以生而可以滅如識精元明能生諸緣即諸幻可生也見見非見聞聞非聞即諸幻可滅也前文云狂心若歇歇即菩提正同此意二合二一合起妄六根亦如是元依一精明分或六和合或以一精明合前幻師則不合一機以六和合合諸男女則不合諸根今謂不爾如前以一機喻一精明諸根喻六和合其義甚明然一精明是陀那細識真妄和合為六根所依則幻師與幻法之一機皆在其中矣六和合是衆生之六根則諸男女亦在其中矣二合歸真三一一返六脫一處成休復六用皆不成一處成休復合上息機歸寂然一處即一根也六用皆不成合上諸幻成無性二辨分滿位塵垢應念銷成圓明淨妙餘塵尚諸學明極即如來孤山曰塵垢等二句登圓初住餘塵等二自從分至滿三結勸聞聞大衆及阿難旋汝倒聞機反聞聞自性性成無上道圓通實如是此結上聞聞之義夫人情必有所偏意重于聲則遺其聞所謂倒聞機也機以可發為義根可發聞亦可發識故名為機令矯其斃而云反聞聞自性者顛倒分別則但聞聲茲不外聞其聞而反聞其聞正當聞時分別不起并亡生滅根塵盡脫從此聞而入聞性若性成無上道即如前云淨極光通達寂照含虗空却來觀世間猶如夢中事至却來時無一音而不照即觀世音故云性成無上道圓通實如是五明同證此是微塵佛一路涅槃門過去諸如來斯門已成就現在諸菩薩今各入圓通未來修學人當依如是法我亦從中證非惟觀世音一路涅槃門者十方三世如來皆由耳根一門而超出故為涅槃之門此二句總標過去六句別開三世如來以勸修證而十方該在其中末二句約彼我菩薩以勸修意云我文殊與觀音既皆修此而證入後之欲究竟悲智者可不依此而修乎六結宜修二一結酬以明去取誠如佛世尊詢我諸方便以救諸末劫求出世間人成就涅槃心觀世音為最自餘諸方便皆是佛威神即事舍塵勞非是常修學淺深同說法佛以二十五方便使我選擇故以詢也元教阿難而但云末劫者阿難示迹亦為未來豈實鈍乎耳根當體即是涅槃妙心是故名為最又救末劫令入涅槃亦惟觀音為最即事者即所遇之事也言二十四聖各隨所因事相而成觀行皆是佛之威神方便令其得道非是久長修學淺深二機同入之法門也反顯觀音即是淺深二機同說同入久長修學之法門也如失明而旋見觸刺而遺身等皆為即己事而修證者二請加以顯真實頂禮如來藏無漏不思議願加被未來於此門無惑方便易成就堪以教阿難及末劫沉淪但以此根修圓通超餘者真實心如是前佛云我今欲令阿難開悟二十五行誰當其根兼我滅後此界衆生入菩薩乘求無上道何方便門得易成就今此結文對前可曉應知佛言何方便門得易成就今文殊云於此門方便易得成就則佛與文殊皆以耳根為初心入門方便未嘗言根為究竟真實也奈何人師故違佛說偏執用根不用心耶真實心即文殊自指選圓通之心也三時衆獲益四一阿難明道於是阿難及諸大衆身心了然得大開示觀佛菩提及大涅槃猶如有人因事遠遊未得歸還明了其家所歸道路此節皆就耳根說阿難等方悟圓通從耳根入耳根屬身與心故身心了然見道分中已賜華屋今得華屋之門是大開示菩提涅槃是二轉依號猶如下立喻因事未還明其心未常不欲歸也一時在會尚未得修耳根為因事未歸然知菩提涅槃是家耳根圓通為路則于修證皆無惑矣二普會入位普會大衆天龍八部有學二乘及諸一切新發意菩薩其數凡有十恆河沙皆得本心遠塵離垢獲法眼淨皆得本心者悟明自心也塵垢皆是見惑獲法眼淨成須陀洹然法華以為位在六根即七信已上今聞圓通得證當亦是六根位也三登伽證果性比丘尼聞說偈已成阿羅漢性尼獨言聞偈者與他人不同他人之益兼在圓通摩登初從文殊獲度功獨歸偈然所證小果未必便齊第四依也四衆生發心無量衆生皆發無等等阿耨多羅三藐三菩提心法華疏云畢竟之理是無等初緣畢竟理而發心能等于理故云無等等也彼中有三釋文句云無等等者九法界心不能等理佛法界心能等此理故無等而等也次即疏中所引又心之與理俱不可得將何物等何物而言無等等耶心之與理俱不可說不可說而說此心等此理故言無等等耳初一是橫釋次一是豎釋又次非橫非豎釋二帶事兼修名助行三一持根本大戒二明誦呪除習三明結壇立行初二一陳請二一經家敘阿難整衣服于大衆中合掌頂禮心迹圓明悲欣交集欲益未來諸衆生故稽首白佛長水曰圓通即是心所行路故曰心迹悲昔不聞欣今得悟又念未來衆生未悟故悲觀現存大衆得益故欣二正陳請二一敘自悟大悲世尊我今已悟成佛法門是中修行得無疑惑二請利他二一稟佛教嘗聞如來說如是言自未得度先度人者菩薩發心自覺己圓能覺他者如來應世吳興曰菩薩四誓以度人為先如來十號以度世為本當知五住究盡二死永亡方云得度二述意請二一欲以正行益物我雖未度願度末劫一切衆生云願度衆生似專仗如來之力若安立道場遠離魔事則未來衆生永得度脫二更請助行益物世尊此諸衆生去佛漸遠邪師說法如恆河沙欲攝其心入三摩地云何令其安立道場遠諸魔事於菩提心得無退屈長水云此諸衆生根劣也去佛漸遠時劣也邪師說法難多也此則時澆解昧惑障尤多修定攝心難為進趣況遭魔惑邪見彌增如此修行如何無退二宣說二一讚德誡聽爾時世尊於大衆中稱讚阿難善哉善哉如汝所問安立道場救護衆生末劫沉淪汝今諦聽當為汝說阿難大衆唯然奉教二正為宣說為二一舉戒為衆基佛告阿難汝常聞我毗奈耶中宣說修行三決定義所謂攝心為戒因戒生定因定發慧是則名為三無漏學攝心為戒者攝是止義惡念既息積以歲月如水久澄寂然入定定生慧者謂于所觀之境專一不移須臾證之疑惑盡裂教有大小之分而此三階終無躐等溫陵曰三藏之中毗奈耶律藏也此大小乘戒通稱也小乘稟法為戒粗治其末大乘攝心為戒細絶其本法戒則無犯而已心戒則無思犯也夫能攝心則定由是生慧由是發三者圓明則諸漏永盡故名三無漏學別示四重則十戒之初淫殺盜妄四波羅夷為根本重罪其所謂其心不淫其心不偷等皆使無思犯也攝持執則莫尚乎此二明持犯損益二一徵起阿難云何攝心我名為戒戒以防非止惡為義攝心為戒防莫大焉二解釋四淫殺盜妄初中二一辨示持犯二結顯邪正初又二一正明二重示初又二一宣示損蓋二囑誡滅後初又二一持則不隨生死若諸世界六道衆生其心不淫則不隨其生死相續六道皆因淫有淫心若絶六道俱息二犯則必落魔道汝修三昧本出塵勞淫心不除塵不可出縱有多智禪定現前如不斷淫必落魔道上品魔王中品魔民下品魔女彼等諸魔亦有徒衆各各自謂成無上道因邪智而發欲定定無戒基全不順三學次第正長水云魔不斷淫而修定魔定順惑得易成就因其定功淺深而分三品也若論淫欲當入三塗以禪智力故落魔道若論禪定應生天上以不斷淫又落魔道是福勝見強而且破戒乃戒見俱破以淫轉化故自謂成道且有徒衆也二囑誡滅後又二一魔令毀犯我滅度後末法之中多此魔民熾盛世間廣行貪淫為善知識令諸衆生落愛見坑失菩提路佛在世時魔但欲壞法不自附于佛法佛滅度後附佛法而成魔徒衆反盛乃遂其壞法之計長水曰末世衆生無正法眼多被魔民廣行貪淫假稱善友誘化無識失正遭苦二汝教堅持汝教世人修三摩地先斷心淫是名如來先佛世尊第一決定清淨明誨溫陵曰諸經戒殺居首為設化以慈悲為本此經淫戒居首為真修以離欲為本蓋欲氣粗濁染汙妙明欲習狂迷易失正受續生死喪真常莫甚于此故須首戒而為清淨第一明誨也觀阿難起教示遭邪染而厥初發心先厭欲濁至于三漸次中一一首懲然後身心妙圓獲大安隱十信初心由欲愛乾枯而慧性圓明遂階等妙諸世間人由心不流逸澄瑩生明漸乎六天是故真修內攝必先離欲也二重示二一犯障修證是故阿難若不斷淫修禪定者如蒸沙石欲其成飯經百千劫秪名熱沙何以故此非飯本沙石成故汝以淫身求佛妙果縱得妙悟皆是淫根根本成淫輪轉三塗必不能出如來涅槃何路修證前已云縱有多智禪定現前今又云不得禪者前指邪智所發之定非由戒發即非真定今明非戒無從得定然下合文云求佛妙果今云修禪豈佛果但屬禪定耶應知禪定之稱是牒上修三摩地入三摩地妙慧即發佛果現前故前後之言皆相應也定力極淺者如電光三昧亦必從斷淫而得今不斷淫正與相反故如蒸砂作飯合中汝以淫身求佛妙果合上蒸砂成飯縱得下至必不能出合上經百千劫只名熱沙又縱得妙悟皆是淫根先合此非飯本以是淫根則非佛本也言妙悟者彼縱悟貪欲即道愈增其淫故皆淫根雖以福力得生魔宮後歷三惡永無出期如來涅槃何路修證耶二持獲菩提必使淫機身心俱斷斷性亦無於佛菩提斯可希冀機者發動之由喻如弩牙易云幾者動之微身心皆有淫機須使皆斷有無二無無二亦滅是斷性亦無二結顯邪正如我此說名為佛說不如此說即波旬說波旬又名波卑夜此翻惡者即是魔王或言殺者二殺戒二一辨示持犯二一正明二一宣示損益二一持則不隨生死阿難又諸世界六道衆生其心不殺則不隨其生死相續若論戒相斷淫較易斷殺較難如蚤蝨蚊蚋及蛇蠍毒蟲遇而不殺殊為不易今經先禁食肉猶是易持至禁絲綿絹帛靴履裘毳則亦出家易犯也二犯則必落神道汝修三昧本出塵勞殺心不除塵不可出縱有多智禪定現前如不斷殺必落神道上品之人為大力鬼中品則為飛行夜叉諸鬼帥等下品當為地行羅剎彼諸鬼神亦有徒衆各各自謂成無上道多智是修智禪定是修福帶殺修福報為神道功深福厚為大力鬼即五嶽四瀆係祠祀者功淺福薄列在中下八部所管及大海邊羅剎國類因修定故皆有業通迅疾無礙不斷殺故受此惡趣若但行殺害直入地獄矣一雨云各各自謂成無上道者認己是而不知其非如鶚虎不知暴也此四戒雖俱根本以墮落為言不無輕重如淫墮魔道殺墮鬼道盜墮妖邪豈非為罪漸鄙而為報轉微乎至于妄語則永殞善根無復知見沉三苦海此則不惟失如來種而三惡道又某永居也二囑誡滅後三一鬼神誑世我滅度後末法之中多此鬼神熾盛世間自言食肉得菩提路上但云殺至此方云食肉是殺之所以也二如來簡顯二一釋疑情阿難我令比丘食五淨肉此肉皆我神力化生本無命根汝婆羅門地多蒸濕加以砂石草菜不生我以大悲神力所加因大慈悲假名為肉汝得其味疑者云既戒食肉何令比丘食五淨肉故此釋之是知令食五淨正是令人不食肉也五淨肉律中三淨不見為我殺不聞為我殺不疑為我殺今言五者加自死鳥殘二也溫陵云我以大悲等者恐害鳥獸以神力加即是大悲復加慈字令之得味即與樂也二斥邪計奈何如來滅度之後食衆生肉名為釋子汝等當知是食肉人縱得心開似三摩地皆大羅剎報終必沉生死苦海非佛弟子如是之人相殺相吞相食未已云何是人得出三界如來滅後既非神力所化即實是衆生報陰豈可食哉似三摩地鬼神定也亦能知過去未來事與善定相似戒定慧三俱有頓漸故梵網頓制對別圓機久斷食肉但鹿苑以來毗尼漸制對藏通機故開三淨化道將終則收漸歸頓故楞伽涅槃今經俱唱斷肉楞伽正制藏通菩薩此經則兼制三乘故下云清淨比丘及諸菩薩不踏生草等洎至涅槃更獨制聲聞三囑付阿難汝教世人修三摩地次斷殺生是名如來先佛世尊第二決定清淨明誨二重示二一犯障修證是故阿難若不斷殺修禪定者譬如有人自塞其耳高聲大叫求人不聞此等名為欲隱彌露清淨比丘及諸菩薩於岐路行不踏生草況以手拔云何大悲取諸衆生血肉充食修禪之意元為入三摩地然不斷殺而修禪豈得禪乎自塞其耳元欲不聞然大叫而求不聞人豈不聞欲隱彌露承上大呌求人不聞喻欲出生死而反彰生死之過溫陵曰不故踏不故殺仁慈之至猶及草木況食衆生肉耶二持戒解脫若諸衆生不服東方絲綿絹帛及是此土靴履裘毳乳酪醍醐如是比丘於世真脫酬還宿債不遊三界何以故服其身分皆為彼緣如人食其地中百穀足不離地必使身心於諸衆生若身身分身心二途不服不食我說是人真解脫者東方不無裘毳西土不無絲綿各以多分言也酬還宿債只此生身捨此則永別三界矣物理論云梁者黍稷之總名稻者粳糯之總名菽者衆豆之總名三穀各二十合六十蔬果之實各二十合為百穀足不離地者劫初之人體有飛光足若御雲由乎食地肥啖粳糯故其體堅重而足不離地也必使下雙結服食身血肉骨髓也身分裘毳乳酪也既云身心又云身心二途者上並標身心下明身心分二途也謂身服食心貪求也二結顯邪正如我此說名為佛說不如此說即波旬說三盜戒二一辨示持犯二一正明二一宣示損益二一持則不隨生死阿難又復世界六道衆生其心不偷則不隨其生死相續不與而取謂之盜起心即犯故云心不偷二犯則必落邪道汝修三昧本出塵勞偷心不除塵不可出縱有多智禪定現前如不斷偷必落邪道上品精靈中品妖魅下品邪人諸魅所著彼等群邪亦有徒衆各各自謂成無上道誑取人財義同穿窬故號偷心多智禪定從修福修慧而得取利則其心不正故落邪道精靈者如山精水怪神通自在猶若神仙妖魅者如狐狸猿猴或取人精氣或盜人財物下品為諸魅所著即依傍假托取人財食也二囑誡滅後二一邪徒亂正二一妖邪惑世我滅度後末法之中多此妖邪熾盛世間潛匿姦欺稱善知識各自謂己得上人法詃惑無識恐令失心所過之處其家耗散潛匿奸欺謂潛藏奸盜詐僞取利之心也稱善知識盜賊渠率也奸欺之人苟求不與之利詃誘無識之人猛貪異語令彼愚者頓罄家財仍遭王難故云耗散十誦律有六種盜心謂苦切取即乞憐狀輕慢取有規威狀以他名字取謂我是善知識觸突取謂嫚罵使伏乞受寄取謂昏昧他寄附出息取謂以錢責人之息者五分律有四謂諂心曲心瞋心恐怖心四分律有十種謂黑暗心謂不識正理曲戾心謂諂附恐怖心謂唯恐失之常有盜他心既言常有則不論多寡必欲盜耳決定取以力強求不問可否寄物取可解恐怖心謂以言恐之因而取財見便取謂伺其可取之便而盜之倚托取謂假指權勢經云恐令失心即恐怖取失心即令前人失己正念俱墮邪見此經潛匿奸欺等其言雖略足以蔽諸而偏指稱善知識者將非如來懸鑑末世其徒實繁耶子女玉帛者當以自省矣二如來簡顯二一顯正斥邪我教比丘循方乞食令其捨貪成菩提道諸比丘等不自熟食寄於殘生旅泊三界示一往還去已無返云何賊人假我衣服裨販如來造種種業皆言佛法却非出家具戒比丘為小乘道由是疑誤無量衆生墮無間獄循方下標隨所到處乞食自活名循方諸比丘下釋一往還者縱不即出而一往一來則非久住之義若去已不返則直去不回矣又一往來是二果去已是三果裨販者裨音悲補也欲自補益須事販賣以佛法為取利之具是裨販如來之賊人也造種種業者如貯穀米置田房言是佛法蓋假借佛法為名而與俗人治生無異涅槃邪正品云我滅度後是魔波旬漸當壞亂我之正法乃至作比丘比丘尼像及阿羅漢等形以此有漏之身稱是無漏乃至說言無四波羅夷十三僧殘不定法捨墮等法亦無五逆等罪及一闡提乃至若犯如是等罪亦無有報如是說者並是魔說但今文所指意在取利不在壞法然已同于魔說矣疑誤無量衆生者人皆有好利之根今聞邪說彼等衆生一一皆以取利為事不守正法非毀戒律豈不墮無間獄乎僧祇律云乞食謂之分衛謂分施衆僧衛護道力肇師云乞食略有四意一為福利衆生二為折伏憍慢三為知身有苦四為除去滯著今經令其捨貪不自熟食即除去滯著也成菩提道即衛護道力福利衆生也知身為倘寄知世為旅泊無事畜藏無所顧戀皆所謂循方方法也二示滅罪法若我滅後其有比丘發心決定修三摩提能於如來形像之前身然一燈燒一指節及於身上爇一香炷我說是人無始宿債一時酬畢長揖世間永脫諸漏雖未即明無上覺路是人於法已決定心若不為此捨身微因縱成無為必還生人酬其宿債如我馬麥正等無異盜者取他依報資于己身今損正報以供上聖故能翻破無始盜業正一切難捨無過于身難捨能捨則自餘貪愛決能棄捨故曰是人于法已決定心苟捨身而心不捨則徒增業苦無益于道故下云必使身心二俱棄捨也佛為宿詬比丘可食馬麥故證果後於毗蘭邑食之示宿債必酬也二囑付阿難汝教世人修三摩地後斷偷盜是名如來先佛世尊第三決定清淨明誨二重示二一犯障正定是故阿難若不斷偷修禪定者譬如有人水灌漏巵欲求其滿縱經塵劫終無平復譬鑿巵令漏灌水求滿水來雖復無限而巵之漏去無窮以無窮之漏待無限之來縱經塵劫終無平復以喻禪定之水無限盜罪之漏無窮縱修之曠劫秪益酬償先債何能滿足菩提二持獲三昧若諸比丘衣鉢之餘分寸不畜乞食餘分施餓衆生於大集會合掌禮衆有人捶詈同于稱讚必使身心二俱捐捨身肉骨血與衆生共不將如來不了義說回為己解以誤初學佛印是人得真三昧長水云此文勸離四過謂貪慢瞋癡配文可見初貪中又二一衣鉢之餘不畜者止貪也二餘分施餓鬼衆生止吝也于大集下離慢使有人下離瞋使必使下離癡使不了義者如燒身得蘭燒指得吉之類回為己解者不了義說合其私心故回佛說而為己解以佛說而成己解故云回耳又回為己解者己不能行大乘却引權乘所說為是初學聞之棄大從小執權迷實故曰誤也其云合掌禮衆視毀如讚矯稱善知識之弊也二結顯邪正如我所說名為佛說不如此說即波旬說四妄語戒二一辨示持犯二一正明二一宣示罪障三一標示阿難如是世界六道衆生雖則身心無殺盜淫三行已圓若大妄語即三摩地不得清淨成愛見魔失如來種修行之人才得影響即自彰言多成妄語內貪利名欲他重己則成愛魔內起邪見謂己均聖則成見魔二顯相所謂未得謂得未證言證或求世間尊勝第一謂前人言我今已得須陀洹果斯陀含果阿那含果阿羅漢道辟支佛乘十地地前諸位菩薩求彼禮懺貪其供養前標愛見今示其根先總示其相未得三果未證無學及十地此似見魔或求下正示愛魔謂前人言下別示愛見之相文列三乘辟支佛亦有方便即是得也果位即證也乃至地前即得登地即證涅槃邪正品云若有說言我已得成阿耨菩提何以故以有佛性故有佛性者必定得成阿耨菩提當故是人犯波羅夷罪何以故雖有佛性以未修習諸善方便是故未見以不見故不得成就阿耨菩提故知略不修斷自稱即是佛者皆大妄語也犯波羅夷非佛弟子三結過是一顛迦消滅佛種如人以刀斷多羅木佛記是人永殞善根無復知見沉三苦海不成三昧一顛迦即一闡提一云何顛益迦此云極惡熏聞云多羅樹形如棕櫚高者七八十丈具云貝多羅此翻岸形以刀斷即不復活喻大妄語人永斷善根三苦海者三途也二囑誡滅後二一顯正破邪我滅度後敕諸菩薩及阿羅漢應身生彼末法之中作種種形度諸輪轉或作沙門白衣居士人王宰官童男童女如是乃至淫女寡婦姦偷屠販與其同事稱讚佛乘令其身心入三摩地終不自言我真菩薩真阿羅漢泄佛密因輕言未學惟除命終陰有遺付云何是人惑亂衆生成大妄語真四果十地從法起應尚不許說自證況凡夫妄語乎作種種形是總標度諸輪轉是現形之意沙門至童男女是同其勝淨淫女等是同其穢劣蓋四攝法中同事利行盡為益他非為利己何必說自證耶如此應化同凡皆是佛之密因而於後生晚學之前輕言已證泄佛密因殊為不可陰有遺付如南嶽之言鐵輪天台之示五品功德鎧之說偈真觀師之屈指是也然此猶言此生親證若文殊普賢之化為寒山拾得戒師七娘方是應身生此末法也南嶽天台如統紀本傳求陀跋摩此云功德鎧宋文時死反屈二指表證二果真觀居錢塘下天竺隋文帝時死反屈三指表證三果二囑付阿難汝教世人修三摩地後復斷除諸大妄語是名如來先佛世尊第四決定清淨明誨二重示二一立三喻是故阿難若不斷其大妄語者如刻人糞為栴檀形欲求香氣無有是處我教比丘直心道場於四威儀一切行中尚無虗假云何自稱得上人法譬如窮人妄號帝王自取誅滅況復法王如何妄竊因地不真果招紆曲求佛菩提如噬臍人欲誰成就此文舉淺況深餘之妄語尚不可為況大妄語耶妄號帝王喻如圓通疏求升反墜名曰紆曲以妄語人而求菩提如以自口而噬自臍不可及矣文有三喻初刻糞為栴檀形喻妄言證聖是假非真妄稱帝王明其僭妄之罪三噬喻喻欲求佛果終不成就二正勸誡若諸比丘心如直絃一切真實入三摩地永無魔事我印是人成就菩薩無上知覺此語與上相反直心即不誑妄心言直故如是乃至始終地位中間永無諸委曲相故成無上知覺二結顯邪正如我此說名為佛說不如此說即波旬說
