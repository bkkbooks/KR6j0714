body:
  text: 四行陰此五陰發得境中前二屬貪愛大慢等煩惱境想陰的是魔境今行陰十種是見境五識陰中兼於禪見等執最後二乘住立涅槃而不前進即二乘境止觀立十境而初觀陰入有不得入者反因觀心發得下九皆當用十乘妙觀觀之一一令成不思議境今經正為禪那行人因觀不入反發魔事故微細詳明不令住著則正觀可入也為三一總示始終又三一結前想陰阿難彼善男子修三摩地想陰盡者是人平常夢想消滅寤寐恆一覺明虗靜猶如晴空無復粗重前塵影事觀諸世間大地山河如鏡鑑明來無所粘過無蹤迹虗受照應了罔陳習唯一精真想陰盡者約已斷説想以取相為義寤則為想寐則為夢只就寤時已紛然不一何況寐乎今想陰既除故雖有寤寐而其相恆一也明平常心體如此覺明下有法喻合如來得妙空明覺此是果人之德今在行人覺明虗靜不取相故虗無喧雜故靜晴空中無雲煙如覺明中無夢想粗重之習苕溪曰準智論明阿羅漢有眠無夢驗今想盡即六根淨以圓觀所破通別二惑猶如冶鐵粗垢先除故曰無復粗重等也觀諸下明應物之用世間該依正二報獨言山河大地者想念所著每在依報故也如鏡下是喻鑑亦鏡也又鏡有鑑物之明來去無著虗受下是合法不取外物之相是以虗受唯照應之而已更不起怨親諸想是無陳習二預示始終二一不盡始相生滅根元從此披露見諸十方十二衆生畢殫其類雖未通其各命由緒見同生基猶如野馬熠熠清擾為浮根塵究竟樞穴此則名為行陰區宇補遺云皆謂想盡行現故云披露今謂前言想盡約利根破惑入相似位者説之若鈍根人但是伏惑想陰未破惟得想心凝明而已未可云盡即中云想盡行現其説元是在斷想者行陰才現即能斷行故後經文明行陰盡相在伏想者便墮行陰區宇中經含二意元不相妨生滅下想伏而行現也六識之體既伏七識之體斯現楞伽云七識生滅如來藏不生滅此二和合成阿賴耶據楞伽此言知前六識皆生滅而根元在第七明矣又如餘四陰皆有生滅而根元在行陰中故言生滅根元見諸下明行現則通他人前受想但在一身今行陰露則能窮十二類生雖未下明未見類生之識見同生基明已見類生之行蓋各命由緒其種子在八識中尚未能通而十二類同生之基狀若無知喻同野馬野馬即陽焰也春晴遠望其狀如水熠熠閃爍貌體離受想雖擾而清言浮塵根者粗浮顯露曰浮體無知覺曰塵除却清淨四大即浮塵根其中爪生髮長筋轉脈搖人不自知總為行陰所攝雖在自身似無情法故經云是身無知如土木瓦石也生住異滅名不相應行斯為浮根究竟樞穴門簨曰樞門臼曰穴簨橫木也此人但伏想陰故入行陰區宇二已盡終相若此清擾熠熠元性性入元澄一澄元習如波瀾滅化為澄水名行陰盡是人則能超衆生濁若此下謂利根人觀行得悟即于此滅行也熠熠清擾為十二類生基故稱元性性入元澄者生滅之性入于本元澄寂之體也或謂元澄是後識性流急不見非是無流非也即中謂行陰盡處即是元澄若以此為常行亦得指為識耶澄彼清擾之習故云一澄元習元習即上元性故知性是習成之性喻中澄水當喻真性不當喻識惑業所招苦報生滅不停名衆生濁故行盡則超之二結顯妄源觀其所由幽隱妄想以為其本想陰之想是粗浮之想行陰是微細之想如前經云變化密移我誠不覺故今云幽隱妄想二正詳發相十一二無因論三一總述阿難當知是得正知奢摩他中諸善男子凝明正心十類天魔不得其便方得精研窮生類本于本類中生元露者觀彼幽清圓擾動元于圓元中起計度者是人墜入二無因論想陰已伏不起邪慮名正知奢摩他是入空止觀也有三緣故魔不得便一者凝謂心常在定故二者明謂心常觀照故三者正謂不起邪慮故方得精研等者至此不但見己并見他人能窮十二類生之本往昔已來已有類生故云本類生元即行陰也即下文云幽清圓等對下第二外道是觀常擾動元故今云圓擾動元窮十二類故稱圓也圓元者圓字承上觀彼句元字承上生元句執無因者良由未通各命由緒之故二別顯二初本無因又二一正明一者是人見本無因何以故是人既得生機全破乘於眼根八百功德見八萬劫所有衆生業流灣環死此生彼只見衆生輪回其處八萬劫外冥無所觀便作是解此等世間十方衆生八萬劫來無因自有初句標何以故下徵釋破是看破以下即云眼根故也長水曰八百功德謂由定力發其眼根本分功德百倍增勝見八萬劫吳興云業流灣環者行陰流轉也既見衆生死此生彼便知何人復為何人自身曾從何類轉入何類他身亦然若爾與各命由緒何別蓋各命由緒是見識中所含種子今但見業報轉變不見種子如但見面豈即見心交光云此人總見類生不停非一一各詳似并不知何人為何人則解文太粗矣此人眼根只見衆生輪回八萬劫中不見其識而八萬劫外亦無所觀吳興指為外道冥諦是也輪回其處者指八萬劫為處便作下是起僻解二結過由此計度亡正遍知墮落外道惑菩提性無因則非正知只見八萬則非遍知誤落外道不知菩提之正軌矣二末無因二一正明二者是人見末無因何以故是人於生既見其根知人生人悟鳥生鳥烏從來黑鵠從來白人天本豎畜生本橫白非洗成黑非染造從八萬劫無復改移今盡此形亦復如是而我本來不見菩提云何更有成菩提事當知今日一切物象皆本無因夫人不生鳥鳥不生人生根有異直以久遠為生根也烏從來黑者其根既定色相無改前劫烏黑今烏亦黑餘三句亦然白非洗黑非染者言其根定不從因緣有也以本例末色相無殊烏鵠等雖盡今日之形而後劫之烏還如今黑後劫人天亦如今豎此中古人引身子觀鴿恐不相肖是人既觀八萬劫則自身必歷諸道他人亦然經但云色相無殊非云人死必為人也如云烏從來黑豈云烏死必為烏乎而我下以諸法之有根顯菩提之無根昔有菩提今後方有菩提往昔既無後來安有是則一切皆有菩提獨無謗法甚矣結文本字合是末字今日萬象決不因修證而改是末無因也前計本無因乃由不見其始今計末無因乃由不用修證遂廢修業之因二結過由此計度亡正遍知墮落外道惑菩提性三結示是則名為第一外道立無因論吳興曰肇師云外道末伽梨謂衆生苦樂不因行得皆自然耳前文云末伽梨等都言此身死後全滅今計無因雖不云死滅必至劫滿亦同其倫當知諸見不出四句謂斷常雙亦雙非也上二無因即斷見下四遍常及一分無常一分常乃至死後俱非即後三句餘之所計皆源流于此二四遍常論二一正心絶魔阿難是三摩中諸善男子凝明正心魔不得便修圓定者空假在一心中故或言奢摩他或言三摩良由正觀現前故魔不能發即已斷想受前七卷半中任運修證證入圓位之人也二窮元發見三一總述窮生類本觀彼幽清常擾動元于圓常中起計度者是人墜入四遍常論起計度者即但伏不斷因觀發昔起九境能招報因一類也在佛法中以不生不滅為常今以行陰常存曰常溫陵云遍即圓也故此標名遍常後結名圓常二別顯二初正明四初二萬常一者是人窮心境性二處無因修習能知二萬劫中十方衆生所有生滅咸皆循環不曾散失計以為常此因窮心境二處而知二萬劫也窮心性者如目但能見耳但能聞必其生根之有異窮境性者如烏從來黑鵠從來白亦其生根有異也生滅循環不曾散失者如鐘聲雖歇叩則還生不特一物性常物物皆常故有生有滅不過循環之法而二萬劫來衆生未常少一人也若少一人即散失矣正因觀生滅而見其常故此計從行陰發內教明緣生無性正破此計聲從鐘槌而發正是從因緣生而彼計為無因此一謬也從因緣生其性無常無常即空而彼反計為常此又一謬也問性具諸法不從因緣大是常住與此計何相似耶答性具七大諸法必因破相而顯今生滅未破特因衆生經劫不散計以為常是執相為常便成早計又性具之理雖非生因所生亦是了因所顯可直云無因耶此外道但見行陰尚未知識陰何由見性乎幽溪云前由眼根八百功德故謂之見今依意根千二百功德故謂之知所獲意通比前為小但能知二萬劫也二四萬常二者是人窮四大元四性常住修習能知四萬劫中十方衆生所有生滅咸皆體恆不曾散失計以為常此因窮四大而知四萬劫也不相應行狀若無知遍及器界是人既觀生滅根元必能窮四大根元而四大生而復滅滅而又生性豈不常此性即衆生之體故使衆生不失以不失為常非以不生滅為常幽溪曰上于心境二性生計其見尚寬遍色遍心今窮四大性常其見則狹但在于色而已其中意根功德比前倍大故言四萬言修習能知者乃想伏行現之後重加修習方能知之也三八萬常三者是人窮盡六根末那執受心意識中本元由處性常恆故修習能知八萬劫中一切衆生循環不失本來常住窮不失性計以為常補遺云初就心境觀生滅次就四大觀生滅今就六識至八識中觀其生滅方為窮盡言六根者舉所依根即該六識文中初從六根窮至八識次又從八至六識于此三中凡有生滅與類生共者是衆生之元由見其不斷乃謂性常雖歷六七八只觀行陰境耳即中謂此人雖見行陰仍觀識陰故能知八萬劫也從八萬劫以至今日即名本來常住窮盡八識知八萬劫是窮不失性吳興云按楞伽經阿梨耶識除佛及八地菩薩諸餘二乘外道修行者皆不能知由是觀之今行陰未盡豈能于此計以為常應知心意識者通舉八識也本元由處別指行陰也良以首楞嚴定頓窮八識圓伏五住而于想陰盡處不了行陰微細生滅妄認為常非謂定中已見第八慤師云若了八識何得異計斯語善焉天如曰俱舍云集起名心思量名意了別名識百法疏云八識名心七識名意六識名識又婆沙云心即意識如火名焰亦名為熾亦名燒薪只是一心有三差別此中諸解當取嶽師通舉八識別指行陰之説為近理也吳興云頓窮八識圓伏五住初正觀總無明心即六識心王而既伏破受想六即業識矣一心三別此之謂也四不生滅常四者是人既盡想元生理更無流止運轉生滅想心今已永滅理中自然成不生滅因心所度計心為常生理者行中理體若即以行陰為理體恐未必然如前文云見同生基熠熠清擾據此文既以行為擾動豈今謂其無流轉耶此人計行之生滅全由于想故稱想元想陰既滅行體必無流轉乃計為常斯乃意根卜度不諦甚矣故不復立能知之劫量也又生滅由想故想為生滅之元想元既盡行中已無生滅之相但存其理或流或止即是運轉想盡而行不流如披其枝而根本亦枯也生滅下出自然計耳故非重疊前三人皆用修習而第四人不用修習故云自然成不生滅行本生滅而以為不生滅者因心所度故也二結過由此計常亡正遍知墮落外道惑菩提性以無常為常則非正不超二萬乃至八萬即非遍三結示是則名為第二外道立圓常論吳興曰此曰遍常所窮之境從廣至狹而成次第初通五陰二局色陰三惟行陰四但是行中不生滅理若言第三計八識第四復計行陰其義既失所次亦非三四一分無常一分常論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于自他中起計度者是人墜入四顛倒見一分無常一分常論自他如後釋雖觀常住非不生滅雖觀無常不能破法皆成顛倒之見二別顯二初正明四一我常彼無常一者是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生于我心中自生自死則我心性名之為常彼生滅者真無常性據三卷末云各各自知心遍十方則是人所觀似亦非謬但若作此見即成邪計妙明心體不離陀那七識恆執陀那為自內我豈不執妙明心為神我耶七識為生滅根元今存行陰正七識現行之時當有此計故此計從行陰起非即以行陰生滅為常也我遍十方是我大色小我即是自凝明不動顯其為自體也衆生即他自生自死言與真心無涉我心為常衆生無常即是立我慢幢打自大鼓謂自悟心即無生滅他不悟心但有生滅是獨得其常而傲衆生之無常二劫壞劫不壞二者是人不觀其心遍觀十方恆沙國土見劫壞處名為究竟無常種性劫不壞處名究竟常見同生基但觀十方吳興曰三禪以下終為三災所壞名無常種性四禪以上災不能壞名究竟常常則為自所證涅槃之處無常則為他生死之處三我如微塵轉三者是人別觀我心精細微密猶如微塵流轉十方性無移改能令此身即生即滅其不壞性名我性常一切死生從我流出名無常性見同生基而別觀我心也前計妙明遍十方是我大色小今觀心如微塵是色大我小惟識云體常至細如一極微潛轉身中作事業故今流轉十方亦此類也微塵所至更無隔礙故流轉十方性無改者謂心之自性無有改易吳興云我既微細生滅亦然故云即生即滅而此生滅從細至粗相續無間故云一切死生等文既云能令此身豈非從我流出文云流轉十方可知是行雖行而常身之生滅是行而無常也四行常餘無常四者是人知想陰盡見行陰流行陰常流計為常性色受想等今已滅盡名為無常吳興曰前觀我心雖流轉十方性無移改不知我是行陰其體常流今雖見流仍未見識陰之相故對色受想等為常無常也此四顛倒初觀神我及一切衆生即正報也次觀國土與劫即依報也此二對他明常無常三觀我心及身四計陰等此二約自色心明常無常亦從廣至狹也二結過由此計度一分無常一分常故墮落外道惑菩提性三結示是則名為第三外道一分常論四四有邊論二初正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于分位中生計度者是人墜入四有邊論有邊無邊在十四問中悉是邪計溫陵曰分位有四謂三際分位見聞分位彼我分位生滅分位幽溪曰四種分位不外時之與處如第一第四約時以言之第二第三約處以言之又以時為分以處為位合時與處成四種分位二別顯二初正明四一三世一者是人心計生元流用不息計過未者名為有邊計相續心名為無邊過去之時雖遠然至現在而成邊際未來之時雖長然至現在而亦成邊際邊即邊際物之盡處也過未約時名為有邊現在相續之心計為無邊蓋流用之心歷然居現在之中指此心為無邊非約時也應知心在過去則過去亦現在也心在未來則未來亦現在也相續心唯居現在現在有何邊乎溫陵曰不知真際本非有邊非無邊故作此計二衆生二者是人觀八萬劫則見衆生八萬劫前寂無聞見無聞見處名為無邊有衆生處名為有邊長水云八萬劫見于衆生然有分劑故曰有邊溫陵云前以不見為有邊此以無聞為無邊乃回互倒計也三心性三者是人計我遍知得無邊性彼一切人現我知中我曾不知彼之知性名彼不得無邊之心但有邊性此人窮至行陰則所知無邊謂遍見衆生畢殫其類也他人未窮行陰故曾不知彼之知性而有邊無邊分矣我曾不知彼之知性者謂曾不見有人能遍知也四生滅四者是人窮行陰空以其所見心路籌度一切衆生一身之中計其咸皆半生半滅明其世界一切所有一半有邊一半無邊行以生滅為義直謂之空可矣然以所見心路籌度不能全空見有生見有滅是其所見即是其心所行之路一切衆生指正報下世界兼依報謂正生時即現滅相是半生半滅也因謂世間一切所有一半屬生是有邊際一半屬滅是無邊際二結過由此計度有邊無邊墮落外道惑菩提性三結示是則名為第四外道立有邊論經中初標後結但舉有邊者有無相待舉一即該有謂理體無邊故避之者其説非也五四不死矯亂論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于知見中生計度者是人墜入四種顛倒不死矯亂遍計虗論前文云由是真精妙覺明性故能令汝出指非指今不見識精明元唯見行陰故于是中偏多計度資中曰準婆沙論釋外道計天常住名為不死計不亂答得生彼天若實不知而輒答者恐成矯亂故有問時答言祕密言辭不應皆説或不定答佛法訶云此真矯亂故名不死矯亂虗論溫陵曰以邪倒故于知見中狂解不決遂矯亂其語也今之邪人妄謂得道而中無主正矯惑于人者多類此四二別顯二初正明四一俱計四雙一者是人觀變化元見遷流處名之為變見相續處名之為恆見所見處名之為生不見見處名之為滅相續之因性不斷處名之為增正相續中中所離處名之為減各各生處名之為有互互亡處名之為無以理都觀用心別見有求法人來問其義答言我今亦生亦滅亦有亦無亦增亦減于一切時皆亂其語令彼前人遺失章句只一行陰遷流相續之相以為根本遂成八計一于根本中以有遷流處計之為變即此遷流者前後相續復是恆義乃亦變亦恆也下皆充拓其見初生滅者于遷流一邊更為二計正生起時似有能見所見生即有滅入離能見所見相續亦分二計相續有因則其體性不斷是展轉增上而正相續中前後相離之處必有間隙即是缺減遷流中前後二念各各生起復以為有而前後互無如瓶中無衣衣中無瓶即是無義以理都觀者實有處所可觀都稱為理而見之各別又復如是八處所憑只一行陰故云亦生亦滅等也二計無二者是人諦觀其心互互無處因無得證有人來問惟答一字但言其無除無之餘無所言説既云諦觀其心知約行陰之相非指行中所見諸法也幽溪曰生能互無其滅滅能互無其生故名互互無前則枝于八今則定于無蓋有滅則不可云生有生則不可云滅故幽溪以為互亡無既云無有亦云無豈非矯亂三計有三者是人諦觀其心各各有處因有得證有人來問惟答一字但言其是除是之餘無所言説幽溪曰各各有處生中有生住中有住等秪是生住異滅循環不失故云各各有也證字不必作證驗解謂因此觀法證入于行陰也是既稱是非亦言是矯亂甚矣前二卷中阿難計色空是見佛言如是復計色空非見佛言如是大衆驚懾佛言無上法王如所如説非是外道不死矯亂論議據此便可知今矯亂之計文云互互無者如既有非見則無是見既有是見則無非見故一切皆無各各有者色空是見此言亦是色空非見此言亦是二義皆可成立即各各有也各立則俱有相對則互無經義顯然無煩異議問此與行蘊遷流何異答見解不定正是遷流不爾何成外計四有無俱見四者是人有無俱見其境枝故其心亦亂有人來問答言亦有即是亦無亦無之中不是亦有一切矯亂無容窮詰如前所釋有無俱見其義可知今更立一喻如瓶衣是有此亦有也瓶中無衣衣中無瓶是亦無也而言亦無不是亦有者瓶雖是有而瓶中畢竟無衣衣雖是有而衣中畢竟無瓶無瓶之中畢竟不能有瓶故云亦無之中不是亦有也如是則又多一番枝岐之見矣矯者不順亂者紊亂此有無俱計與第一人何異然第一有八亦今止計有無所以為異又亦無之中不是亦有乃此中新出之見亦無之中不是亦有考之古人惟長水云雖于有中説無二相各別故云不是亦有此解最是二結過由此計度矯亂虗無墮落外道惑菩提性虗無即是虗妄三結示是則名為第五外道四顛倒性不死矯亂遍計虗論吳興曰從二至四于前八中有無分出也二三單計第四兩亦有即是無如氷是水無不是有如水非氷四句之中但涉三句未見雙非其計猶粗六十六有相論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于無盡流生計度者是人墜入死後有相發心顛倒無盡流者謂行陰生滅之流無有窮盡故死後尚有四陰之相始于佛道發心而後于外道發心是顛倒也二別顯二初正明二一見發相或自固身云色是我或見我圓含遍國土云我有色或彼前緣隨我回復云色屬我或復我依行中相續云我在色皆計度言死後有相如是循環有十六相色既是我不可失壞決須自固云含遍者能含國土而又遍于國土云我依行中相續者謂色陰生滅相續而我亦附此以常存皆言我者若破生滅方顯真心倘留生滅妄法則所計妙心決是神我以四陰是我所而統之者我也皆計度等者如上四計總明色不可少溫陵曰心顛倒故固執色身以色是我又謂我體圓遍則色為我有前緣即目前之色也行陰續相亦色也于色作此四計于受想行亦然故成十六相皆計死後復有也擕李曰不言識陰者所計之我即識陰也苕溪云不爾外道六法我與識異今行陰未破識未當情故不言耳問前三陰既破何故於我復計四句耶答堅固妄想雖伏而色質猶在色等生滅念念不停即無盡流也然此行陰與常途所辨粗細不同如百論家以識陰為初想陰居次受陰第三三皆無記未能成業至于行陰方起煩惱造作諸業是則四陰之中行陰最粗此據平常未破時説也今觀行中已破受想須知行陰粗相亦盡唯細相在故通前三陰俱見遷流幽隱之元其實難曉二見成相從此或計畢竟煩惱畢竟菩提兩性並驅各不相觸苕溪曰上四陰與我既死後有相或復妄計煩惱菩提理亦如是以煩惱由陰而生菩提由我而證言畢竟者即兩性不相陵滅入未來際此皆後有也二結過由此計度死後有故墮落外道惑菩提性既死後有則此人不至無色不知無色三結示是則名為第六外道立五陰中死後有相心顛倒論苕溪云通結五陰正在前四又雖在前四義唯行陰耳七八無相論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于先除滅色受想中生計度者是人墜入死後無相發心顛倒前因行陰未盡并計三陰皆有今因三陰除滅并計行陰亦空因計度而入無相即是顛倒況想陰才滅行陰未空自謂涅槃窮理未盡故成外道二別顯二初正明二一見發相見其色滅形無所因觀其想滅心無所繫知其受滅無復連綴陰性消散縱有生理而無受想與草木同此質現前猶不可得死後云何更有諸相因之勘校死後相無如是循環有八無相前陰之色既滅後陰之形無所因起取相則心繫于外故想滅則無繫也前受既滅後受無復連綴三句中初三兩句皆以前後相望想獨不然乃內外相望耳僅餘生理即同草木者以草木亦有生理故也若餘生理行陰尚存而即計死後無相是邪惑之本此質現前猶不可得者謂此身現在尚無陰相可得死後豈有陰相耶然皆約自身以計死後無相故云見其色滅觀其想滅其字指自身也溫陵云此約四陰現在因亡未來果滅因果合論故成八相二見成相從此或計涅槃因果一切皆空徒有名字究竟斷滅行在尚非涅槃而彼即計涅槃則過分矣此人所計謂空是涅槃因空是涅槃果以所證者與涅槃相似遂移外計入佛法耳非滅計滅判屬斷見二結過由此計度死後無故墮落外道惑菩提性三結示是則名為第七外道立五陰中死後無相心顛倒論八八俱非論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于行存中兼受想滅雙計有無自體相破是人墜入死後俱非起顛倒論文有三意一雙計有無二自體相破三死後俱非下二節皆具三意行存是有受想滅是無是雙計有無也有中復有不有無中復有不無是自體相破以相破故遂成俱非有無四句是人咸具二別顯二初正明二一明見發之相色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相行陰未破色受想之生滅尚在故云見有而色受想之惑已滅故云非有行中之色受想已除故曰觀無而行之遷流尚在故曰不無此豈非雙計有無及自體相破乎見有即計行有也觀無即計前三陰無也而非有即是破有不無即是破無如是下明雙非也有是非無故見有非有即是非無非有無是不有故觀無不無即是不有不無每一陰中具非有非無二義共成八俱非相將十八界細配可知二明見成之相隨得一緣皆言死後有相無相又計諸行性遷訛故心發通悟有無俱非虗實失措每舉一陰咸具雙亦如舉色陰遷流尚存即是有相色病已空即是無相受想亦然又行陰遷流即是有相行中無前三陰之失即是無相前總述中云雙計有無至此云隨得一緣方盡其義又總述中但云死後俱非今死後亦雙計有無又見發中但云觀見今發為論議是見成之相云死後者究竟之義通死後也又計等者色與受想皆名諸行性遷訛者是自體相破以為亦有而又亦無以為亦有亦無而又不止于雙亦是遷訛也心發下結成雙非前云窮盡但窮陰界中俱非之相而已今云通悟亦見成也虗實即有無有無不能安措故云失措二結過由此計度死後俱非後際昏瞢無可道故墮落外道惑菩提性幽溪云釋中雖立雙亦結中但云俱非蓋論雖義立雙亦見實但成俱非一歸于斷見而已後際昏瞢者不可言有不可言無是昏瞢無可道也惑菩提者菩提之道亦語言道斷有無雙非今以外見雷同詎非迷惑三結示是則名為第八外道立五陰中死後俱非心顛倒論九七斷滅論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于後後無生計度者是人墜入七斷滅論現前行陰名為最後復受後有始歸斷滅名後後無孤山曰七斷滅者欲開人天色開四禪無色合一此計七處滅已不生也二別顯二一正明或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅如是循環窮盡七際現前消滅滅已無復或者顯非一人是七人各隨所計身滅者欲界人天也欲盡滅初禪欲染已盡故苦盡滅二禪極喜無憂念故極樂滅三禪之樂極故極捨滅四禪捨覺觀喜樂故無色捨色礙故然則極捨之言含其二也或窮七處始入斷滅或六或五無不從現身而起故曰循環現前對滅已謂七際現在之身也二結過由此計度死後斷滅墮落外道惑菩提性三結示是則名為第九外道立五陰中死後斷滅心顛倒論謂五陰中有四陰死後滅也因經此句吳興謂從第七外道流出然前但身滅今窮七際所以又成一類吳興曰此計應從第七外道流出但前約橫論今約豎説若攝橫歸豎則前無相屬今身滅幽溪曰第九外道雖于行陰後後無生乎計度觀後結文云立五陰中死後斷滅則不獨計行兼計四陰悉歸斷滅也十五現涅槃論二一正心絶魔又三摩中諸善男子堅凝正心魔不得便二窮元發見三一總述窮生類本觀彼幽清常擾動元于後後有生計度者是人墜入五涅槃論行陰為最後復于最後身而計涅槃故云後後有二別顯二一正明或以欲界為正轉依觀見圓明生愛慕故或以初禪性無憂故或以二禪心無苦故或以三禪極悅隨故或以四禪苦樂二亡不受輪回生滅性故迷有漏天作無為解五處安隱為勝淨依如是循環五處究竟前卷明初禪苦惱不逼二禪一切憂懸所不能逼今初禪無憂二禪無苦蓋綺文互現也初禪離欲則無憂二禪極喜則無苦三禪極悅隨者前文云得大隨順身心安隱得無量樂二禪喜與憂對為苦三禪無憂喜為樂作無為解者妄計為離繫自在之果即我德也安隱樂也勝淨依淨也究竟常也此凡夫四倒也補遺云或以欲界為正轉依者正明欲定之相也良以欲定成時不見牀鋪事障乃是定心之正報能轉依報故下即云觀見圓明交光釋轉依一依溫陵又以初得天眼故云觀見圓明幽溪曰涅槃計五處者除欲界人道并無色界不計人道者現居生死故不計無色者以四禪無想天為涅槃故二結過由此計度五現涅槃墮落外道惑菩提性以禪定力生彼天已不必捨身即得究竟安樂故云五現涅槃又五陰尚在而計涅槃名現涅槃三結示是則名為第十外道立五陰中五現涅槃心顛倒論良由五陰不滅遂以五天而為常住故吳興云從第六外道流出前第六云或自固身云色是我等今從彼流出是其流類故五涅槃不至無色具如桐洲注二結過勸示阿難如是十種禪那狂解皆是行陰用心交互故現斯悟衆生頑迷不自忖量逢此現前以迷為解自言登聖大妄語成墮無間獄汝等必須將如來語于我滅後傳示末法遍令衆生覺了斯義無令心魔自起深孽保持覆護消息邪見教其身心開覺真義于無上道不遭枝岐勿令心祈得少為足作大覺王清淨標指保持句冥持息邪教其句顯教歸正于無下總明持善遮惡十魔皆由得少為足指其病根使歸極果必以今文為清淨標指焉長水云想陰未盡猶引外魔今想陰盡行陰明露但于所覺境界別生異見執此為是故曰心魔熏聞云説文言禽獸蟲蝗之怪謂之孽今云心魔自損如彼之怪消息猶除滅也溫陵曰前云禪那現境乃天魔候得其便此云禪那狂解乃心魔自起深孽凡見道不真多岐妄計皆即狂解是謂心魔最宜深防也吳興曰前色受想末皆云無令天魔得其方便此云心魔後識陰云見魔心見不出見愛二惑即煩惱魔也於受陰中第五生無盡憂心不欲活猶死魔也并所觀五陰即陰魔四魔具矣幽溪曰溫陵師言見道不真多岐妄計此言深中乎學者之膏肓蓋世之修行多墮二種失一師心自立無有師承徒仰古德之高風深入蘭若之絶境邪推妄畫忽爾心空如氷夾魚謂為真道因之起見墮入邪宗建立門庭證引祖教以鍮石而比黃金將碔砆以亂白璧自陷及人竟落魔黨一秉承不久研味非精好作人師自立規矩既不甘以品位而下人復欲援衆流而歸己禪肩一豎宗頭愈高嘗藥品既不關于神農施湯劑豈能同于仲景藥非應病病不合方一槩妄投視民如草初雖少益後致大妨入邪見之叢林墮波旬之羅網建言立論垂範後昆本師失足入火坑而不知弟子盲牽墮險途而罔覺皆由未見道而遽修道依邪道而誤證果故也五識陰三一總示始終三一結前行盡阿難彼善男子修三摩地行陰盡者諸世間性幽清擾動同分生機倐然隳裂沉細綱紐補特伽羅酬業深脈感應懸絶此明行滅之相也長水云世間性者行陰即是世間體性世間有三義一有生滅二性有漏三可破壞既墮世間同以行陰生滅為性也同分生機者十二類生同然所有之生機也倐然隳裂即是盡相以止觀力照破生機故云隳裂雖云同分隳裂實在一人沉細下重釋盡義溫陵交光皆以沉細綱紐連上句讀云倐然隳烈沉細綱紐今謂無此句法恐當連下讀之網上大繩曰綱衣領結處曰紐皆喻其要十二類生如網如衣行陰結要如綱如紐體是七識故云沉細補特伽羅云數取趣是中有身能酬前業行陰是深脈也以幽隱妄想所成故名深業為感報為應脈斷不交故云懸絶感應懸絶與下諸類不召其義正同蓋行陰體遍一通自他二通情無情三界類生此感彼應由行為相通之脈故行盡則感應不交矣或指深脈為沉細綱紐如云沉細綱紐者何即補特伽羅酬業深脈耳二預示始終二一不盡始相于涅槃天將大明悟如雞後鳴瞻顧東方已有精色六根虗靜無復馳逸內外湛明入無所入深達十方十二種類受命元由觀由執元諸類不召于十方界已獲其同精色不沉發現幽祕此則名為識陰區宇于涅槃下有法譬合明真理將明識陰隨現初二句法也行陰之生滅既除而無生滅法將欲現前故云將大明悟孤山云三德涅槃名第一義天補遺云指前行陰若破即入相似將登分真于中道涅槃之天將曉見相似三諦也如雞至精色喻也雞後鳴者定其為將曉之時而已何必以五更三唱配五陰及受想行之數耶精色者東方將曉之象明相未雜故云精色喻相似三諦六根下合也從六根虗靜至發現幽祕皆似清曉氣象其為合喻可知行陰已破現前六根無復奔走聲色是拔去浮塵根也如後經云于身不出見聞覺知故標六根無前四陰為虗無擾動為靜行陰名幽清今并除行豈非虗靜內外內是識體外是六根惟一湛明之體更無能入所入蓋行陰中甲長髮生氣消容皺曾無覺悟今離此相豈不湛明第一義天所以將耀亦由此也深達下識體現也非但見衆生死此生彼亦見識中種子為受命元由此遍知他人也元由二字義復有異由即種子今已能觀元即托胎一分識心今已能執能觀故無因之見執守故無受生之業而盡十二類莫牽其生此即自利之事十方之言該依正自他皆識所現同一識體言精色不沉發現幽祕者古人云只此二句是識陰區宇前皆行盡之文彼謂行盡文別指能斷行陰之人行陰已斷識陰隨斷故後即有超越命濁之言唯精色二句乃指伏行而未斷者并前受想及色悉是暫伏今進觀識心明湛故精色不沉而發現幽祕也即中云伏斷之説最得經宗然分文如此似猶未順精色二句恐承上文六根虗靜至入無所入豈非精色不沉乎不沉是離隱沒之病次云深達十方受命元由豈非發現幽祕乎謂識中種子含藏幽祕今已發現也由精色不沉而現幽祕幽祕之處名識區宇當行盡識現時在斷行者識陰才現復能斷識故經後文明識陰盡相在伏行者便墮識區宇中故成十種魔事經含二意元不相妨前行陰初文亦如是二已盡終相若于群召已獲同中消磨六門合開成就見聞通鄰互用清淨十方世界及與身心如吠琉璃內外明徹名識陰盡是人則能超越命濁初句指在識陰中也群召雖異識體是同同則虗靜湛一召不能動是時以止觀之功消磨根隔前但六根虗靜今則無六根之相矣合開成就者合惟一識開成六根又合之為一而六用森然名開成就開之為六而一心自在名合成就又見聞通鄰開成就也互用清淨合成就也言通鄰者六用不隔如鄰之相通也長水云身心為內世界為外皆唯識現今識陰盡唯一覺體覺體明妙如淨琉璃前但精色不沉今如琉璃明徹是大明悟也言超越命濁者識住命存識亡命謝今識破則超命濁固無疑矣竊研五陰區宇之後即續明五陰盡相者蓋利根之人于前陰斷後陰現時妙悟若發即破後陰不待再觀魔境而後悟也所以此中明識盡相云消磨六門合開成就在十境前後云識陰若盡則汝現前諸根互用乃在十境之後文非重疊覽者知之又斷行者多即破識若伏行者多起十魔又超越等者前觀由執元猶未能超罔象虗無觀之執之真夢幻耳今達其妄何所執哉故名超越三結顯妄源觀其所由罔象虗無顛倒妄想以為其本罔象亦倣像皆不實也此是覺明初起影象之相乃顛倒之本也不實則非有故云虗無既罔象虗無而有此計乃因顛倒之力以是顛倒之本故獨受罔象虗無之名二正詳發相十一因所因執分二一行盡識現阿難當知是善男子窮諸行空於識還元已滅生滅而于寂滅精妙未圓能令己身根隔合開亦與十方諸類通覺覺知通㳷能入圓元文分三初行空還元前文云陀那微細識習氣成瀑流真非真恐迷我常不開演今云于識還元識即心王元即陀那識也前之七識皆從陀那識生七識之生滅既破返歸陀那之元二已滅下明其長短對前行陰故云已滅生滅云精妙未圓者蓋真與非真擇焉而未精也識陰未亡生滅細相仍在如後文云流急不見非是無流故前文以瀑流喻之前云真非真恐迷今正起迷之人也三出其所證言根隔合開者若消磨六門則根相融泯今諸根雖隔已能合開只一隔字顯是未消之相與真六根互用者雲泥逈隔補遺云諸類通覺是達其覺性不同前文已獲其同是唯識也即中云行陰若存甲長髮生曾無覺悟此行既消則與類生通覺行陰尚通他人覺體豈不通乎上合開惟在于己今通覺則通他人覺知通㳷通承自他工夫到此能證入于圓元即指諸根自他不隔之地為圓元二因計成過二一正敘若于所歸立真常因生勝解者是人則墮因所因執娑毗迦羅所歸冥諦成其伴侶迷佛菩提亡失知見文分四初正明起計所歸即上還元計此元為本心能生諸法是真常因此以非真為真生滅為常又有能生所生豈非謬見二是人下定彼計名諸法為能因圓元為所因與外道因常而果無常其義正同三辨其伴侶彼黃頭外道立冥諦為能生二十三法為所生又冥諦亦為所歸不相類乎雖云伴侶未必全同以此云覺知彼云冥諦故也義勢相似成其伴耳四斥其邪謬迷佛菩提者菩提曰覺覺體離念離念相者等虗空界無所不遍法界一相今執有法從一因生能所差別故云迷也忘正知見故云亡失二結斥是名第一立所得心成所歸果違遠圓通背涅槃城生外道種前文云自心取自心非幻成幻法今立真常因而生勝解即成所得是取著也或云能入圓元即圓元為所歸之果今謂指能生法是為所歸之因指能證心計為所歸之果二能非能執二一行盡識現阿難又善男子窮諸行空已滅生滅而于寂滅精妙未圓妙是忘相之智是人識精雖現未能忘相故云未圓二因執成過二一敘執若于所歸覽為自體盡虗空界十二類內所有衆生皆我身中一類流出生勝解者是人則墮能非能執摩醯首羅現無邊身成其伴侶迷佛菩提亡失知見初正敘所執于識還元故云所歸覽者取也自體即我身也法本無我而攬為我身豈非我見因見識體遍于十方便謂有情衆生皆從此出于此法門印持忍可名曰勝解次是人下定彼執名彼謂我為能生而他不能故稱能非能執三辨其伴侶摩醯首羅是大自在天現無邊身則衆生皆在其中矣四斥彼迷謬佛菩提由無我智顯此人執我即迷佛覺何由得正知見乎二結斥是名第二立能為心成能事果違遠圓通背涅槃城生大慢天我遍圓種能為心者結上邪執覽為自體等也計我心為能生故曰能為成能事果結上無邊身為伴侶也是人將感自在天能現無邊身之果以彼有現無邊身之能事故既執識體必有隔礙豈曰圓通涅槃如城有防非禦敵之義妙樂云非寬敵急見逼思遙今第二人方起見惑是背涅槃城矣俱舍云于他勝謂己勝為大慢若生色界頂天謂衆生從我身流出縱遇聖賢必謂己勝非大慢乎我遍圓者計一切衆生皆從我生故我心周遍又因前薄有圓解而生此計故受圓名然我遍圓之名通因通果能為心因也能事果果也由因至果已成種性蓋于佛法外自成一種類矣三常非常執二初行窮識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因計生過二一正敘若于所歸有所歸依自疑身心從彼流出十方虗空咸其生起即于都起所宣流地作真常身無生滅解在生滅中早計常住既惑不生亦迷不滅安住沉迷生勝解者是人則墮常非常執計自在天成其伴侶迷佛菩提亡失知見文中初出其執始因行滅于識還元如息波歸水但是所歸復計以為常住之法是我所歸依此倒計也又識是自心而反疑為彼其倒逾甚前文云十方虗空生汝心內猶如片雲點太清裡此明真心起妄遂成虗空今竟謂從識陰流出其都起宣流之地是生滅而非真常也既惑不生謂不知有真常之理也亦迷生滅者謂生滅為無生也有所歸依計得安住則其迷深沉而不可醒次是人下定彼執名溫陵云以非常為常故名常非常執三辨其伴侶資中曰自在天與前不別此天現有生滅妄計為常今在生滅中早計安住正其伴也四出其迷謬如文次結斥是名第三立因依心成妄計果違遠圓通背涅槃城生倒圓種將來必生計自在天故云成妄計果以無常為常疑自心為彼曰倒薄有圓解仍得圓名四知無知執二一行盡識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因執成過二一正敘若于所知知遍圓故因知立解十方草木皆稱有情與人無異草木為人人死還成十方草樹無擇遍知生勝解者是人則墮知無知執婆吒霰尼執一切覺成其伴侶迷佛菩提亡失知見初正明起見因知立解便不許有無知之法十方是知遍之處草木是知遍之物此人所以執草木有知者彼謂識心是知而識體圓遍更無不知蓋未達性覺妙明元無識性一念不覺晦昧為空空是晦昧之法依空立界故器界皆無知由未達此斯起謬執或云老楓化為羽人朽麥化為蝴蝶此草木為人之類也賢婦化為貞石蚯蚓化為百合此人為草樹之類也此經十二類生亦有精神化為土木金石然此皆偶然之事不可為常而定謂有情無情互為轉變則大謬矣溫陵云無情遍皆有知無所簡擇故云無擇遍知次定彼計名此以無知為知故名知無知執三辨其伴侶婆吒或云跋闍此翻避霰尼亦云先尼亦云西你迦此翻有軍二外道之名也四斥其迷謬菩提須破晦昧而今謂晦昧之物即是覺體豈非迷與孤山曰問前説無情有性無情作佛何異此文邪執乎答不然常住真心一體無二云云孤山之説轉覺迂遠如荊溪初立無情有性次文即云若云有性即不合云無情據此則知佛性中更無無情明矣特因點示世人所云無情正是佛性周遍之處故云無情有性若達佛性即無情豈與今同二結斥是名第四計圓知心成虗謬果違遠圓通背涅槃城生倒知種溫陵曰此謬計圓知以為因心則果終虗謬矣以無知為知是倒知也五生無生執二一行窮識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因計生過二一正敘若于圓融根互用中已得隨順便于圓化一切發生求火光明樂水清淨愛風周流觀塵成就各各崇事以此群塵發作本因立常住解是人則墮生無生執諸迦葉波并婆羅門勤心役身事火崇水求出生死成其伴侶迷佛菩提亡失知見文為四初正明起計六根互用但能隨順未得真證溫陵所解是也然一根既現諸用并欲變現諸塵是使圓融變化一切發生言便于者譏早計也識陰未破性中七大未顯而徒求四大之用愛之樂之不得則崇事外物以求發生欲借外塵以發自心本具之塵故云發作本因如一星之火能使燎原四大咸然以外引內為發本因亦猶是耳立常住解者謂本因既發即是常住地水火風從古至今未曾欠少計以為常不如其是事非理也二是人下定彼計名欲生諸用而竟不能生故號生無生執三辨其伴侶三迦葉波今已從佛諸婆羅門邪黨尚繁是其儔類云求出生死者計得水火常住之理即免輪回未必出于三界之外也四斥其迷謬性中七大清淨本然是佛菩提今迷此菩提而失正知見矣二結斥是名第五計著崇事迷心從佛立妄求因求妄冀果違遠圓通背涅槃城生顛化種言計著者計外物能發自心之用因之崇事水火是迷自心所現而從物求冀也如是則以緣木求魚之因妄冀常住之果豈可得哉生顛化種者變化之元本從心出而反從物求是顛倒化理又立妄求因結求火光明等求妄冀果結求出生死根塵各遍為圓通依正未一是不圓通事水火非涅槃之道六歸無歸執二一行盡識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因計生過二一正敘若于圓明計明中虗非滅群化以永滅依為所歸依生勝解者是人則墮歸無歸執無想天中諸舜若多成其伴侶迷佛菩提亡失知見古解云明中虗者前云罔象虗無是也恐未必然前文謂識陰盡則見罔象虗無顛倒妄想為本今識陰未盡安得雷同蓋明是識陰之明此識陰明中妄謂虗無一物耳豈能破識陰乎從明而計虗者亦謂此明能消諸塵垢也以有色即礙明故計明中虗耳離塵不能離識但欲識中虗無何補于事非破也破滅十二類之羣化也不但依之而且為歸依上依是依托下歸依是尊重意無想天略舉非非想以該四空非取四禪無想諸舜若多總舉四空為同類耳從無想天來生空處名諸舜若多前文云若從無想諸外道天窮空不歸是也長水曰永滅依即明中虗也此計空為所歸依處即涅槃也此明中虗實非所歸而計于歸故云歸無歸執孤山曰歸于無歸故曰歸無歸執舜若多主空神也二結斥是名第六圓虗無心成空亡果違遠圓通背涅槃城生斷滅種非滅羣化為圓虗無心永滅依為空亡果圓虗無者此之虗無總該八識及十二類故名為圓而引業所牽當證空亡之果不但立論而已空亡果應即是四空等天但彼天因修定生今因計明中虗而生別號空亡果耳有無不合則非圓通當以轉識為涅槃今則非也斷滅種者該于因果虗無即發能招報之因空亡即發得所招報之果如此因果為斷滅見之種凡此種字皆該發得境上因果二事前後例爾夫空亡斷滅尚歷然辨發得因果不同況他境哉七貪非貪執二一行盡識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因計生過二一正敘若于圓常固身常住同于精圓長不傾逝生勝解者是人則墮貪非貪執諸阿斯陀求長命者成其伴侶迷佛菩提亡失知見幽溪曰識體遍依遍正遍身遍心故曰圓吳興曰識陰精明湛不搖處名之為常固身常住同識之常也同于句同識精之圓也精圓二字竟指識體身本無常實不可貪以為長久今堅貪著故云貪非貪執溫陵曰阿斯陀此云無比即長壽仙也二結斥是名第七執著命元立固妄因趣長勞果違遠圓通皆涅槃城生妄延種命元是第八識前文云觀由執元其義是同固妄者唯欲固其妄身補遺云趣長勞果恐取勞苦之義莊周曰勞我以生今求長生延命非法性身秪成勞苦之果耳妄延者不知法身亘古亘今而欲希延壽命故曰妄也八真無真執二一行窮識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因計生過二一正敘觀命互通却留塵勞恐其銷盡便于此際坐蓮華宮廣化七珍多增寶緩縱恣其心生勝解者是人則墮真無真執吒枳迦羅成其伴侶迷佛菩提亡失知見命是識體通真通俗故曰互通通真則事相銷盡通俗故可留塵勞以有神力故化諸欲境美女為媛真無真者孤山云將欲復真而反戀于俗也吒枳迦羅即斫迦羅此翻輪山前稱大幻師故可為神力變化之伴交光之解支離不可用長水真際俱有解不暇多及二結斥是名第八發邪思因立熾塵果違遠圓通背涅槃城生天魔種桐洲云邪思因者于定中發此邪念不能善察由此熾盛起塵勞事故同天魔九定性聲聞二一行窮識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因解起著二一正敘于命明中分別精粗疏決真偽因果相酬惟求感應背清淨道所謂見苦斷集證滅修道居滅已休更不前進生勝解者是人則墮定性聲聞諸無聞僧增上慢者成其伴侶迷佛菩提亡失知見前云深達十方十二種類受命元由即命明也此人順前境界更不別起邪計分別下文有三重初是了達世出世因果分別苦集是粗是偽滅道是精是真惟求下趣向小乘但祈感應故見苦而後斷集欲證滅而始修道居滅下既得果已不復前進若思前進即回心羅漢非聲聞種也增上慢者未得謂得未證謂證又不及定性聲聞不過成其伴侶而已未得謂得亦可稱為無聞然是人下秪是判屬定性非謂至此方成小果桐洲云無聞僧者妄執小道以為究竟故與夫謂四禪為四果增上慢人為害一揆桐洲之意竟以住小乘者為無聞上慢矣次結斥是名第九圓精應心成趣寂果違遠圓通背涅槃城生纏空種圓精應者圓指識體遍該在識體中以祈求精潔之應而為因心是牒上唯求感應等也成趣寂果牒上居滅已休等也生纏空種結上是人則墮等十定性緣覺二一行窮識現又善男子窮諸行空已滅生滅而于寂滅精妙未圓二因解起著二一正敘若于圓融清淨覺明發研深妙即立涅槃而不前進生勝解者是人則墮定性辟支諸緣獨倫不回心者成其伴侶迷佛菩提亡失知見文中亦有三重與聲聞無異識精之體洞三世徹十方消六入一名曰圓融遠離愛取名曰清淨覺明者如前章曰命明命屬因果不離感應今既勝前別得覺明之名以成緣覺之體如後所説即以覺為因心明為果心然其義亦互通亦可以初悟為覺深知緣起為明是以因緣之悟為覺明也蓋佛悟因緣顯法支佛悟因緣生法故支佛以集為初門勝聲聞以苦為初門發研深妙者推十二因緣究竟滅除無明成自然慧是深妙也以此為因涅槃是果住果不進幽溪曰支佛所證偏真涅槃與聲聞無異但能侵習耳然有獨覺緣覺二種不同今云成其伴侶未必因行同于二種也前云纏空今云不化均是定性不回心者此亦今經破定性聲聞之明文也此即止觀用十乘觀法觀二乘境也夫圓頓止觀并破二乘住果非法華三昧而何且二乘住識精為泥洹即墮無為坑而不能起用今經破斥又是方等彈訶之教意故此經以方等被開成醍醐為相也二結斥是名第十圓覺㳷心成湛明果違遠圓通背涅槃城生覺圓明不化圓種于圓融覺明而生勝解即是圓覺㳷心圓須指識覺須指因緣之悟了三世因緣亦了百千萬世因緣是成湛明果言覺圓明者因緣之悟仍不離識而能遍了三世也不化者謂成定性不能超過識精長水云證識覺之圓明無悲化之妙用二乘住識精為泥洹即墮無為坑而不能起用今經斥破又是方等彈訶之教意是也三斥邪結正二初斥邪二初顯過二一結由識阿難如是十種禪那中途成狂因依迷惑于未足中生滿足證皆是識陰用心交互故生斯位交光曰中途一句前八意多因依二字意兼前後于未二句後二意多次具明過二一八境衆生頑迷不自忖量逢此現前各以所愛先習迷心而自休息將為畢竟所歸寧地自言滿足無上菩提大妄語成外道邪魔所感業終墮無間獄各以所愛先習迷心而自休息正輔行所謂因觀發昔宿習現前之發得能招報心經文顯了人不細心會通經論故致此經兩章千秋迄無定判也秪如自言滿足墮無間獄正因發得以招苦報之果豈不瞭然哉吳興曰大妄語別指前八也前八通名外道邪魔亦可別指七是外道八是邪魔俱未斷惑故云墮獄二乘異此故云不進二二乘聲聞緣覺不成增進二勸示汝等存心秉如來道將此法門于我滅後傳示末世普令衆生覺了斯義無令見魔自作沉孽保綏哀救消息邪緣令其身心入佛知見從此成就不遭岐路將此下顯教法門謂辨魔法門十種皆稱見魔保綏下冥持身心入佛知見該六根互用之義長水云入佛知見證真位也從此謂從觀識中成就道業吳興曰言見魔者見以違理為名前八違真中二理起界內邪見後二違中道理起界外邪見以二乘智即無明故又前八中七純是見八具見愛以留塵勞生勝解故問前受陰盡已超見濁何至行識二陰又發諸見耶答前約斷位得意生身者言之今在伏位于二陰區宇中發也此五陰文若迷斷伏之義雖有妙辨其何以消之二結正二一示法門如是法門先過去世恆沙劫中微塵如來乘此心開得無上道吳興曰如是法門且指識陰禪那現相過去諸佛無不覺了入佛知見故曰乘此心開二明超能二一標示能超直至等覺識陰若盡則汝現前諸根互用從互用中能入菩薩金剛乾慧圓明精心于中發化如淨琉璃內含寶月發得能招之境既不住著自然正觀圓明任運流入真因位也六根互用有似有真從似入真直至金剛乾慧孤山之釋最是然未可定判在七信或在十信或在初住經云從互用中其言甚寬不雜無明故曰圓精明心根身器界悉皆清淨故云發化據識陰若盡之言誠是已登初住從此超入等覺後心即圓人善超也孤山據六根互用有似有真故兼用似位耳而以初住為正二委示能超直至如來如是乃超十信十住十行十回向四加行心菩薩所行金剛十地等覺圓明入于如來妙莊嚴海圓滿菩提歸無所得不但直入真因抑且直入極果此因觀破發得能招報以明修證一番事畢也金剛乾慧是等覺後心故直超等覺而入妙覺孤山曰妙莊嚴海是福究竟圓滿菩提是智究竟歸無所得是理究竟福即解脫智即般若理即法身不縱不橫三德祕藏于茲具顯此正由用圓頓止觀觀別能招報中發得等境而證入也何者蓋圓解修證皆復本來有何可得而因修發得五十境中一一皆由有得有愛而現魔孽今既皆觀破則自當歸本來之無所得矣三結勸欽承三一總結示此是過去先佛世尊奢摩他中毗婆舍那覺明分析微細魔事總結詳辨五陰中因觀發得魔境之意二勸兩根二一利根宜精識魔境現前汝能諳識心垢洗除不落邪見陰魔銷滅天魔推碎大力鬼神褫魄逃逝魑魅罔兩無復出生直至菩提無諸少乏下劣增進于大涅槃心不迷悶前云洗心非正落于邪見今與相反從奢摩他至魑魅句皆與前文對映五十種魔孰非心垢心垢至銷滅是明內魔不生天魔下明外魔不入無乏少者有此辨魔之法則助道無乏少也下劣恐指二乘以彼證小涅槃無心向大故二鈍根托祕呪若諸末法愚鈍衆生未識禪那不知説法樂修三昧汝恐同邪一心勸令持我佛頂陀羅尼呪若未能誦寫于禪堂或帶身上一切諸魔所不能動吳興云夫返妄歸真非行不克行之大略唯信法焉從聞法而入者曰信行從思惟而入者曰法行然其二行必假相資今云未識禪那即法行者未識五陰禪那現境也不知説法謂不知以信行而資法行也由是之故名為愚鈍若于三昧好樂修習佛慮斯人為魔所惱故囑阿難勸持神呪也即中云行人不知空假之定在一心中名未識禪那因此不知法相然是法行人故樂修三昧此法行中之鈍人非法行中之利根也又未識等不過明其愚鈍而已不知説法即不能辨魔問如上辨魔已詳修三昧者自能依文簡辨何云不能辨耶答今經所言亦其大槩而魔説多種在利根者推廣今經之意故皆能辨非鈍所能故今云汝恐同邪也汝恐同邪者謂或為邪説所動一切諸魔所不能動指外魔也三令欽奉汝當恭欽十方如來究竟修進最後垂範正觀總無明心若發宿習衆境紛現若生住著即如來修證皆不究竟堅固今既詳明不令住著則正觀心任運流入是為修行最後要緊垂範也前阿難殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便如來既答十方如來正觀陰入一心三觀最初方便已今則更詳十方如來修正觀時發得魔境使不住著則一切事方得竟竟堅固又為十方如來最後垂範也不必依孤山夏滿説經前春示滅之説詳發得能招報竟二更斷餘疑即上所詳發得能招報五十陰魔中有未盡之義更加問答料簡以釋明之非別有疑事可斷也要之五十發得境中天魔外道邪鬼妖魅似乎外來害人殊不知此等諸境皆由正觀陰入之人心不自正妄生取著故發宿習以致外邪得入也故結出五十陰魔皆是妄想則非外來可知矣為二一疑問阿難即從座起聞佛示誨頂禮欽奉憶持無失于大衆中重復白佛知佛所言五陰相中五種虗妄為本想心我等平常未蒙如來微細開示又此五陰為併銷除為次第盡如是五重詣何為界惟願如來發宣大慈為此大衆清明心目以為末世一切衆生作將來眼問有三初問未蒙等者意欲如來再為細示二問頓漸三問因界淺深謂色以何為邊際乃至識以何為邊際二答釋二初正答所問三初答五陰妄想二一正答又二一總答二一明真如本淨妄生諸法佛告阿難精真妙明本覺圓淨非留死生及諸塵垢乃至虗空皆因妄想之所生起斯元本覺妙明精真妄以發生諸器世間如演若多迷頭認影死生苦道也塵垢業煩惱也真妄合生正是不生滅與生滅和合前文殊偈中先生空界後成有情今亦如是乃至者追遡五陰以前之事迷頭如迷真認影如生器世間吳興曰精真中道也妙明寂照也三諦融通云無塵垢總名本覺圓淨此單論真性也乃至下單論妄想生起諸法斯元下合明真妄發生世間所以爾者無前單論則不知離義無後合明則不知即義幽溪曰文中先明真覺無妄次明妄以發生三明真妄合生非初二節不足以彰離非後一節不足以彰即離則真妄並行而不相害即則真妄體融而不相礙不相害則妄可去而真可復不相礙則妄無相而其體真空華之喻最好研詳波水之譬猶堪取象二明因緣自然二計虗妄三一立妄元無因于妄想中立因緣性迷因緣者稱為自然文有三重妄元無因一也于想妄中立因緣性二也不了妄想當體全空遂計妄想為能生也迷因緣者稱為自然三也桐洲云立因緣性謂自他共性并下自然則四性備矣言自然者五陰皆自然而有也二破二一總破二計彼虗空性猶實幻生因緣自然皆是衆生妄心計度二乘衆生計五陰為因緣外道衆生計五陰為自然不但二乘計因緣恐別教亦然二別破二計二一破因緣阿難知妄所起説妄因緣若妄元無説妄因緣元無所有補遺云謂若只知妄從真起則有妄想因緣可言也若能了妄即真無妄可起則妄想因緣亦無可言者矣謂若知妄從真起便謂真因妄緣而生五陰若了妄即是真豈復有因緣和合而復生五陰耶知妄等者謂見有妄法生起可説妄之因緣若不見有妄法何因緣可論耶二破自然何況不知推自然有三結是故如來與汝發明五陰本因同是妄想如來説五陰以妄想為因謂所生五陰能生妄想皆不可得也如來發明五陰本因而此因緣元是妄想心中所見故説五重皆妄想也二別答五一明堅固妄想汝體先因父母想生汝心非想則不能來想中傳命如我先言心想酢味口中涎生心想登高足心酸起懸崖不有酢物未來汝體必非虗妄通倫口水如何因談酢出是故當知汝現色身名為堅固第一妄想因父母淫愛之想而流赤白二滴故云因父母想生汝在中陰時心無淫想豈于父母想中而傳命耶此文大意明身從妄想所生而已齊想中傳命四字明妄想生身已竟酢味登高等舉身由想動以驗身從想生口水足酸皆從想生前境不至而體即為動可謂虗矣可謂妄矣必非下反顯也是知現前色身總是妄結與口水足酸無異但因妄想窒礙牢固而不可拔故成色耳色元不堅在妄想中即名堅固汝體必非虗妄通倫者體與虗妄倫類相通此句明身由想生故還為想動指想中傳命為通倫也二明虗明妄想即此所説臨高想心能令汝形真受酸澀由因受生能動色體汝今現前順益違損二現驅馳名為虗明第二妄想點前色陰妄想其中已具受陰補遺云想味臨高而令真酸受澀此言因想生受由因受生能動色體此言因受動色如言心受愛境則身業運動有所為也長水曰照境而虗通無礙故曰虗明益損之受由想而生豈非第二妄想長水釋中以即此至酸澀是牒前由因下是正顯不及吳興之説而吳興配文又不如補遺也三明融通妄想由汝念慮使汝色身身非念倫汝身何因隨念所使種種取像心生形取與念相應寤即想心寐為諸夢則汝想念搖動妄情名為融通第三妄想由汝下明身為念倫念慮之言應該王數而想亦在其中矣良由六識取境之用全在于想故于想中總舉王數前明色則與想對辨今明想則與形對辨初句正明念能使身身非下反顯也身實也念虗也然身是念之類苟非其倫何為念所使乎前色中已明想中傳命此受生之始今總舉尋常日用皆為念所役也種種取像句正明想陰身是有相之法既為念倫故想還能取像又形既為念之一類故心生于內形取于外心生形取想之用也晝想夜夢想之相也想一動而色心皆動故云搖動妄情言融通者內心外境融通為一此妄想中之融通非二諦融通之比四明幽隱妄想化理不住運運密移甲長髮生氣消容皺日夜相代曾無覺悟阿難此若非汝云何體遷如必是真汝何無覺則汝諸行念念不停名為幽隱第四妄想運運即念念也行陰通乎七識以生滅為體是十方十二類同分生機而亦色心所共故已多不覺其見之形體者甲長等是生氣消等是滅屬不相應行故無覺悟阿難以是真非汝詰者七識全是妄法妄亦自心所現不可謂非汝也如必下決其非真真心是覺而彼不覺豈非妄乎念念不停即指甲長髮生等以不覺故名幽隱也又非色非心是名化理故以是真非汝詰之上既就色陰論遷流下復遍歷諸行此化理實是妄想曾無覺悟故云幽隱此文有二意化理下正明行陰阿難下是非雙詰明其虗妄即汝非汝幻妄極矣則汝下結出遷流之故由于念念不停也長水云非汝不可是汝無憑故知虗妄五明罔象妄想二一正辨識相又汝精明湛不搖處名恆常者于身不出見聞覺知若實精真不容習妄何因汝等曾于昔年覩一奇物經歷年歲憶忘俱無于後忽然覆覩前異記憶宛然曾不遺失則此精了湛不搖中念念受熏有何籌算文中初句反徵精明湛不搖處即陀那微細識也離行陰之曾無覺悟故曰精明離行生滅故云湛不搖處于身不出見聞覺知此句順釋意明下文覩奇物者即是精明之體也見聞覺知出于念慮之外念慮已屬想陰中收非今所指前行陰尚不自覺豈識陰而反雜念慮乎今以前五識及第六現量未起推測可為精明之用用即是體但陀那與現前六識粗細實分良以阿難習漏未除及末世衆生未階深位非舉淺驗深則根源不顯又五卷中十方如來同云唯汝六根更非他物詮顯楞嚴大定必在六根初心行人當依六根證入所以根隔是凡夫相六根互用即頓超十地之基也若實下反顯言精真則不雜妄豈為妄熏人情謂既離生滅又無念慮何得非真故須辨之何因下正破以尋常所見易于忽忘故以奇物言之憶忘俱無者始必有憶則有忘時後既無憶并不説忘問既有憶忘等語驗前見聞覺知亦該比度答正破文中止云記憶宛然記憶二字應屬比度然不過借顯含藏之用而文意實不在記憶也若見聞覺知四字前文亦屬見大如云但如鏡中無別分析是也則此下結顯以精了湛不搖體即是見聞為彼所見還為彼所藏故自覩之後即念念受熏憶忘俱無正是熏習之時第八名含藏識良由于此有何籌算者言受熏不止奇物而已次更顯微細阿難當知此湛非真如急流水望如恬靜流急不見非是無流若非想元寧受妄習非汝六根互用合開此之妄想無時得滅故汝現在見聞覺知中串習幾則湛了內罔象虗無第五顛倒微細精想此湛下因其非常判其非真也文有法譬望若恬靜故行人至此多誤認為真常是知生滅有二爪生髮長生滅猶粗流急不見生滅最細前想陰猶是粗想今識陰名想之元即是細想指最初不覺心動方成識陰豈非想乎非汝六根等者以真如之體不即六根亦不離六根非六根至于極妙無由復真六根互用則根隔已消是知生相無明從此分分得滅識陰由茲而盡古人判此為相似位力用尚短但前文云從互用中能入金剛乾慧據此何必非深位耶妄滅之後即名菴摩羅識楞巖三昧至此成矣故汝下結成妄想見聞覺知指六識現量也中串習幾指陀那識湛了內者前云此湛非真今味內之一字此湛又不止于非真正所云真非真恐迷也識體兼真而受習之處乃是非真衆妄之本特受罔象虗無之名五顛倒中是心顛倒以是細想亦名顛倒佛眼所擇佛地方盡曰細微精想正陀那微細識也二結答阿難是五受陰五妄想成二答詣何為界汝今欲知因界淺深惟色與空是色邊際惟觸及離是受邊際惟記與忘是想邊際惟滅與生是行邊際湛入合湛歸識邊際或云因者五妄想為五陰之因界者五妄想因各有界畔即中謂論云無始時來界一切法等因由此有諸趣及涅槃證得此因界之解也淺深者色淺而識深邊際即界限謂法至此而盡也但舉色空盡色之量下四亦然長水云色謂形色空謂顯色俱色陰攝妄色妄空互形顯故略舉色空攝一切法資中云觸有苦樂離則是捨俱名為受記則取諸法之相忘則取昏昧之相故俱名想吳興云三相遷流俱屬行陰略舉生滅以攝于異湛入合湛者上湛字是見聞覺知下湛字乃指識體見聞逆流合乎陀那細識是歸識之邊際但舉見聞識陰未盡合陀那識識體盡矣上湛為淺下湛為深上可例知三答併銷次第三一約生滅此五陰元重疊生起生因識有滅從色除重疊者謂非一時生起如巾之結必由次第孤山曰約生則由內造外從細至粗如著衣也故迷理有識乃至有色約滅則由外至內從粗至細如脫衣也故悟理色盡乃至識盡二約理事理則頓悟乘悟併銷事非頓除因次第盡理謂真如之理頓悟之時乘此悟門五陰之相皆消事謂修證之事陰既粗細不同法爾粗者先去若超斷者如鷹隼摩空雖甚捷疾亦必從風至高則次第在其中矣彼次斷者其義可知古解云初信則併銷五陰中迷理之惑二信至七信則漸除五陰中迷事之惑此説最當若作見思俱斷則事理在一心中併消之時事障亦盡然不無次第也蓋悟理者如知巾體是一則無五結約事則五結事殊解應次第故下即引巾結為例三喻巾結我已示汝劫波巾結何所不明再此詢問吳興曰所指前説亦有頓漸二義巾體是一以喻真性悟則成頓也巾結有異以喻妄想除則成漸也前文云此五陰元重疊生起是次第結義復云因次第盡即次第解義總是第三答中意耳又重舉巾結以喻陰妄如來巧説冷然可會有六根法喻則六根之數不虗有五陰法喻則次第之言復合非根陰兩重不足以盡一巾之喻二結勸傳示汝應將此妄想根元心得開通傳示將來末法之中諸修行者令識虗妄深厭自生知有涅槃不戀三界心得開通是自覺傳示將來是覺他前阿難啓請云最初方便後佛問諸聖圓通復云最初發心此經之意欲使凡夫修道速證圓理而已此中云傳示將來末法與前文照應令識等者謂令識五陰皆妄想所成則自然厭此五陰識妄是知苦深厭則斷集涅槃屬滅不戀屬道正宗竟三流通分二一結勸流通二一以施福較勸二以成佛正勸初又二一約施福較顯二一問阿難若復有人遍滿十方所有虗空盈滿七寶持以奉上微塵諸佛承事供養心無虗度于意云何是人以此施佛因緣得福多不遍滿等者上滿字指虗空滿下滿字指七寶滿謂七寶填空而盡其處承事供養者謂承事座下身心供養熏聞云問中三意一遍滿下舉種子多二持以下示福田多三承事下明敬心多以此三多為較量本即中云謂初舉七寶多二舉佛多以如是寶奉上諸佛自然心無虗度故此文中但有二意與下答相應二答虗空珍寶答上寶多佛土充滿答上佛多阿難答言虗空無盡珍寶無邊昔有衆生施佛七錢捨身猶獲轉輪王位況復現前虗空既窮佛土充滿皆施珍寶窮劫思議尚不能及是福云何更有邊際言虗空無盡珍寶無邊者明其可以供諸佛也然以上句生下句虗空既無盡則珍寶無邊昔有下舉劣況勝七錢甚少對顯七寶甚多少施而感輪王位者以佛福田勝故輪王之福七寶具足千子圍繞況盡空珍寶供微塵如來福寧有量耶言虗空既窮謂盡其處佛土充滿皆施珍寶者謂施佛時遍其國土皆是珍寶佛佛咸爾故云皆施二舉功德勸通二一滅罪功佛告阿難諸佛如來語無虗妄若復有人身具四重十波羅夷瞬息即經此方他方阿鼻地獄乃至窮盡十方無間靡不經歷能以一念將此法門于末劫中開示未學是人罪障應念消滅變其所受地獄苦因成安樂國波羅夷此云棄亦云不可樂棄故即現無僧用不可樂即當入地獄大乘十棄于殺盜淫妄外更加酤酒等六有此重罪安得有此法門借以校量功德耳瞬息者墮獄之速此方獄壞更至他方乃至盡十方無間也法門指楞嚴法門末劫乃難弘法時未學是無所開曉一念者機教相應之一念也一念雖暫而能化所化機教相合則自利利他靡不具足末劫中作此難事誠為希有言成安樂國者以果顯因也前則十方阿鼻皆其所生今則盡十方土皆安樂國故云變二生福德得福超越前之施人百倍千倍千萬億倍如是乃至算數譬喻所不能及言百倍等者以前施福但為一倍今勝彼百千萬倍等施福太多樂果無盡反為成佛之障今自他皆得首楞三昧直成佛果故能勝之又施寶但滿虗空而空生大覺中如海一漚發今自他皆證大覺能包虗空施福不足言矣二以成佛正勸阿難若有衆生能誦此經能持此呪如我廣説窮劫不盡依我教言如教行道直成菩提無復魔業前文云開示未學恐疑利他方獲此福故復依顯密教明自利福深如我廣説者謂廣説其福報也次依我下因上明誦經持呪未具三慧今更具思修二慧則自利利他必不缺少依我教言思也如教行道修也三慧具足疾成菩提直成者應上直心酬我之語從發心至成佛永無諸委曲相何魔事之有此科所説遍該經意故以為結文焉二結益流通佛説此經已比丘比丘尼優婆塞優婆夷一切世間天人阿修羅及諸他方菩薩二乘聖仙童子并初發心大力鬼神皆大歡喜作禮而去皆大歡喜是結益作禮而去是流通長水云二十五聖及妙吉祥雖各有説功歸于佛皆名佛説興福云此聽法歡喜者可列為三十六衆也即中云三善道各有比丘等四成十二衆歷三乘即三十六衆此方亦有三乘他方亦有四衆蓋巧説互顯耳聖仙大力既超于人即附天趣故但三十六衆言聖仙童子者以仙趣而得聖果且是童真也初發心三字彰此經所被意在凡夫修道有真位發心有似位發心今是內外凡發心而已聖仙大力皆此土機鬼神最多舉大力以統之皆大歡喜通該凡聖準大論云有三義故喜一能説人清淨二所説法清淨三依法得果清淨據此則前二屬應後一屬機幽溪云若論經敘佛説此經已皆大歡喜惟在所説之法但此法非機莫叩非應莫説感應交顯故具三義也即中云大論三句義該四悉三義即世界能説人即為人所説法即對治依法得果即第一義又此經扶律談常帶權説實即偏解圓咸沾妙益故大歡喜作禮者頂戴大法而去者此方他土隨力弘經所謂二十五人百金可托故作禮而去四字正是流通也靈耀自惟庸鄙無所堪任獨懺罪往生之願默勤於大士前耳丙午猥蒙天溪老人託以衣拂且與楞嚴諸解命之曰楞嚴不遇智者判釋竟成千秋疑案諸家注疏云云而未揭觀心的旨汝其悉心成解啓迪後昆不惟山教功臣實亦報佛恩德耀思寸管窺天萬難倣佛師命莫違慚懼拜領而已癸丑秋應海潮楞嚴之講即事剖判蓋此經既的是止觀總別觀心之法則握管者惟在點會佛祖同心之妙不當更贅他論也大科兩章起盡一貫如日月麗天人皆知見至於銷文解句博采諸長而遵用幽溪即中成説居多如圖畫者神情既肖匡廓已成其填彩著色不妨借手他人也戊午春首事剞劂庚申冬厥功告成計刊隨經定解十卷大綱一卷科章一卷總十二卷不敢言發前聖之未發為千秋定解庶幾合佛祖之心觀以請證後之知音耳切念靈耀生死庸流輪回下品貪嗔癡毒現行與種子俱存惑業苦障此生及後身還債方勤正念忽雜愛纏暫起福門難逃互用得繩具縛無端空入頻伽補特伽羅一任蛾投火焰往生有願接引何年惟願竭斯塵識上報佛恩了盡因緣普霑含識耀則自從無始乃至今日惑業苦障悉得蠲除自從今日乃至成佛戒定慧品常得增明往生淨土親見彌陀方至娑婆廣度有情者庚申冬日傳天台教觀嗣興第五世住嘉禾楞嚴講寺隨緣比丘靈耀書於大樹方丈楞嚴經問答清淨挺著收于閲經十二種之第六故不載於此
