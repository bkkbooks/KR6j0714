body:
  text: 三明見性常住二一請二一慶喜密請爾時阿難及諸大衆聞佛示誨身心泰然念無始來失却本心妄認緣塵分別影事今日開悟如失乳兒忽遇慈母合掌禮佛願聞如來顯出身心真妄虗實現前生滅與不生滅二發明性前當機請示寂常心性佛明見性不動已言其寂今大衆願聞二發明性復深探常住之旨生滅即無常不生滅即常住也聞示誨者聞見性離根塵之示誨而身心泰然則異前矍然避座重復悲泣心懷憂懼之時失却本心不知見性是心非眼也妄認緣塵分別影事認攀緣心為自性也今日開悟知妄想非心而見性是心一向遺失本心如失乳兒今受真法之乳如遇慈母領前已竟次合掌禮佛下請後顯出身心者心指見性便屬不生滅而身中有生滅不生滅二義又身心各具真妄等三雙真妄約體心有真心妄心身有肉身法身虗實約相真為實相妄則為虗虗妄為生滅法真實為不生滅法二發明性者不生滅法顯露開發為真發明性生滅之法發明顯露為妄發明性因前佛示二種根本判然分途故今請二發明性也古來解者謂前示阿難見無搖動後示匿王性無生滅一往似同義必有異今如來於生滅中示無生滅即變論不變豈與見無搖動身自搖動為同年耶竊謂此文生滅與不生滅逈然二途大旨與前不殊但此中細明無常以顯見常前文所無須重説之故云顯出真妄等耳二匿王顯問時波斯匿王起立白佛我昔未承諸佛誨敕見迦旃延毗羅胝子咸言此身死後斷滅名為涅槃我雖值佛今猶狐疑云何發揮證知此心不生滅地今此大衆諸有漏者咸皆願聞仁王般若經稱月光王滿足十地今示為狐疑以破斷見迦旃延姓也名迦羅鳩陀翻牛領剪髮此人説諸法亦有亦無毗羅胝母名自名刪闍夜翻正勝説衆生任運時熟得道如縷丸所投極則停住又言八萬劫滿自然得道二外道皆執斷見者也涅槃此云不生亦云不滅彼謂死後斷滅并無見聞之性即安樂涅槃匿王亦以為非但須親證常住之心則狐疑永斷矣發越揮散也不生滅地指常住心也阿難大衆雙請生滅與不生滅據下匿王顯示生滅似已知無常故但請不生滅二答二一開示二一明身有遷變欲明常住而先明遷變者必先破妄而後顯真也妄法不盡真如不顯彼諸外道孰不自謂已證真常由未破妄而即顯真遂成邪倒之見匿王位階十地深知法門故先使其發明無常也佛告大王汝身現在今復問汝汝此肉身為同金剛常住不朽為復變壞世尊我今此身終從變滅佛言大王汝未曾滅云何知滅世尊我此無常變壞之身雖未曾滅我觀現前念念遷謝新新不住如火成灰漸漸銷殞殞亡不息決知此身當從滅盡佛言如是大王汝今生齡已從衰老顏貌何如童子之時世尊我昔孩孺膚潤澤年至長成血氣充滿而今頽齡迫於衰耄形色枯悴精神昏昧髮白面皺逮將不久如何見比充盛之時佛言大王汝之形容應不頓朽王言世尊變化密移我誠不覺寒暑遷流漸至於此何以故我年二十雖號年少顏貌已老初十歲時三十之年又衰二十於今六十又過於二觀五十時宛然強壯世尊我見密移雖此殂落其間流易且限十年若復令我微細思維其變寧惟一紀二紀實為年變豈唯年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住故知我身終從變滅文有四番問答是時匿王年老故無常之義佛不親宣但使王自述漸衰則生滅之旨宛然矣四番中初二略明三四廣述初問中現在對死後説且無論死後斷滅只據現在言之王已言死後今復問無常故云復耳問為兩端一常二無常無常中又有二義變是一義壞是一義而匿王斷定此身終滅亦自然之理非染斷見佛知匿王能觀無常故載審變滅之由答中斷定無常首句即云無常變壞謂但觀現前即知究竟現前不滅則未來亦不滅現在變滅則未來變滅可知而現前念念遷謝是無常之細相也不相應行故云念念文中先言其故後言其新新而又新是相續假文有法譬合譬火燒木言漸漸銷殞有二義一者漸銷二者終滅殞亡下合譬亦有二意殞亡滅沒也第三問盛衰相比從遷謝不住發來而發揮初問答義夫身心皆有無常身相無常人所易見故復問顏貌十五曰童未巾冠也然佛止問二時王加長成即成三時所謂少壯老也孩才成體也孺需人以養也耄謂昏忘禮云八十九十曰耄匿王年六十二通言昏忘耳形色枯悴釋衰精神昏昧釋耄逮及也將及死亡豈反比充盛耶逮恐應作殆殆幾也第四問從王答三時發來而發前第二問答義佛欲匿王詳述無常故問應不頓朽答中我誠不覺者化理不住元屬不相應行故已不覺後經云甲長髮生氣消客皺日夜相代曾無覺悟是也漸至之言答不頓朽次徵釋中先敘無常粗相則十年而增文中有三進三退初進至二十退至十歲次進至三十退至二十三進至六十退至五十非進無以見其年老非退無以見其漸衰次述無常細相則一紀而減從六十二追遡五十之年已當一紀故約紀而減之剎那者時之至促從年月日時以至剎那念念不停可謂善悟無常矣夫無常者入道之根本觀法之初門今於見性之前論無常者正如維摩經中文殊云所可見者更不可見也如是則不以第二念緣第一念而見性得其真矣二示性無生滅二一審問真性佛告大王汝見變化遷改不停悟知汝滅亦於滅時汝知身中有不滅耶波斯匿王合掌白佛我實不知變化等變也悟知汝滅滅也身中有不滅者涅槃云如持戒比丘觀無蟲水而作是念此中動者蟲耶塵耶久視不已方知是塵不大明了十住菩薩於己身中觀如來性亦復如是不大明了彼經有十喻今經云身中有不滅正與涅槃意同彼經以蠱動喻無明塵不動喻佛性今以生滅為不明不生滅為佛性義亦無殊以十住菩薩不大明了故王答不知也二如來開示佛言我今示汝不生滅性大王汝年幾時見恆河水王言我生三歲慈母攜我謁耆婆天經過此流爾時即知是恆河水佛言大王如汝所説二十之時衰於十歲乃至六十日月歲時念念遷變則汝三歲見此河時至年十三其水云何王言如三歲時宛然無異乃至於今年六十二亦無有異佛言汝今自傷髮白面皺其面必定皺於童年則汝今時觀此恆河與昔童時觀河之見有童耄不王言不也世尊佛言大王汝面雖皺而此見精性未曾皺皺者為變不皺非變變者受滅彼不變者元無生滅云何於中受汝生死而猶引彼末伽黎等都言此身死後全滅文中如來先許次示問幾年見恆河者的指見為真性也或疑此見是根中之見不知根中之見實離根塵良由妄心未除所以見性隨緣流轉生死若見性離妄亦離諸緣若以識心攀緣則根塵永不可絶不起識心根塵安在欲返真源捨此見性更無路矣交光不達此意獨倡用根不用識之説謂見性在根中但取照色之時一如鏡中無別分析即是見性起念分析即屬於識愚謂不起念時根亦不可得而交光謂此中有根亦識心未忘之故耳前來盲人矚暗及舉拳驗見皆即指現前之見所謂無明即法性不其然乎當知二種根本中指識精元明為菩提涅槃義見於此恆河亦云殑伽河翻天堂來如藥師直解中説世變滄桑而恆河不改以此為所見之境足顯能見無遷王答中云即知是恆河水者王性警悟因此一知記有昔日之見以知答見合見性是心之義也幽溪云此中文有三重始則寄以恆河之水次則進以觀河見精三則彰以見精之性如云而此見精性未曾皺雖有三重而正意在性佛初問三歲見此河時至年十三其水云何此明水之無異以是所見故云見耳文意非正顯見性也初卷以眼根與見性對辨今復就見精以顯見性見精之名實昉于此前辨眼根則云如是見性是心非眼以眼根無知與見性碩異今見精切近于真故云而此見精性未嘗皺若辨明見精則見性可識見精似是能見而內托眼根外託塵象故見恆河者實見精也然外託塵象不過無情之儔內托眼根亦是顯色之類故見精非真能見其洞然能見者唯見性耳見精但吸取塵象以向內根故屬眼根者不屬于耳根根塵既立反為真見之礙能見豈其功哉據今文似見境見精見性三皆不遷然不皺者獨指見性苟謂見精不皺失文旨矣但此文明別教而顯性又有三重初云面皺而性不皺非皺不皺為兩途乎次皺者變不皺非變非變不變為兩途乎三變者滅而不變者無滅非滅不滅為兩途乎別意昭然讀者諱言之耳蓋非別則悟性不確悟性之後指性具法即入圓教別圓之分具法不具法之異也故別教為圓教之門所謂最初方便也梵語末伽黎此云不見道等者等於匿王所舉二人則外道六師中共有三人執斷明矣二領悟王聞是言信知身後捨生趣生與諸大衆踊躍歡喜得未曾有信知等者破斷見也前明生滅以破常見今示見性以破斷見故大衆皆喜不然豈以捨生趣生而生喜耶第一番退明別教竟第二番圓別進否文分為二一圓二別初又二一暢明圓理二一躡前致問阿難即從座起禮佛合掌長跪白佛世尊若此見聞必不生滅云何世尊名我等輩遺失真性顛倒行事願興慈悲洗我塵垢此阿難因佛告匿王而疑前普告大衆之語前佛辨見今并言聞餘根可例知矣夫雖知不生滅而不知根境即是自心本無動相便成顛倒豈知不生滅即非顛倒耶故阿難之問非也二正為開演他師科立十重顯見此為第四科竊觀阿難問中有一見字祗是牒前然亦兼問聞性如來答中無一見字而以為顯見何哉蓋此文乃佛第二番進明圓理前第一番中進明圓理則論唯心退明別教則辨見性而佛意必在于圓故第二番復揭唯心以破顛倒不過鬯前所説文中色心依正既唯一心豈但辨見而已為三一喻顯倒正即時如來垂金色臂輪手下指示阿難言汝今見我母陀羅手為正為倒阿難言世間衆生以此為倒而我不知誰正誰倒佛告阿難若世間人以此為倒即世間人將何為正阿難言如來豎臂兜羅綿手上指於空則名為正佛即豎臂告阿難言若此顛倒首尾相換諸世間人一倍瞻視則知汝身與諸如來清淨法身比類發明如來之身名正遍知汝等之身號性顛倒先倒臂以問阿難者明止是一臂而有倒豎之分猶止是一境而有生佛之別母陀羅此云印手乃三十二相之一或倒或正只順世情其義已足不必更作他説初輪手下指世既以為倒矣次佛即豎臂順世間為正也言若此顛倒者指垂臂為顛倒也豎臂則以尾為首若即此臂顛倒下垂則以首為尾故云首尾相換一倍是兩番倒為一番正為一番汝身佛身從臂上説來故舉身為言如來之意欲明妙性周圓而周圓即是法身所謂毗盧遮那遍一切處也離諸倒亂故云清淨比類發明者謂以兩身比垂臂之類則可發明如臂不異而有正有倒今身不異而有正有倒其義亦然蓋如來之臂本無正倒而衆生分為正倒猶生佛之身元無正倒而衆生迷為正倒如來下正是比類在如來名正遍知身不異而名為正則同于豎臂之正在衆生名性顛倒身不異而言倒則同于倒臂之倒其實身臂無正倒之分而強為正倒之名號也正遍知者知中道曰正達法界曰遍知應屬心今屬身者是身心不二之義二被問茫然隨汝諦觀汝身佛身稱顛倒者名字何處號為顛倒於時阿難與諸大衆矚瞢瞻佛目睛不瞬不知身心顛倒所在既云汝身佛身比類發明則顛倒之義似乎可知故還問大衆謂汝身與佛二身相比而名汝為顛倒者將指何處為顛倒耶當知身無顛倒而顛倒由迷也大衆先聞常住未悟周圓故不知顛倒所在如下真妄依正皆是妙心體本周圓有何正倒而生則不知瞪直正切直視貌瞢莫紅切又眉庚切目不明也三正示圓融又二一正示色心不二以斥遺失真性佛興慈悲哀愍阿難及諸大衆發海潮音遍告同會諸善男子我常説言色心諸緣及心所使諸所緣法唯心所現汝身汝心皆是妙明真精妙心中所現物云何汝等遺失本妙圓妙明心寶明妙性認悟中迷此如來暢示唯心以明楞嚴大定圓融三觀也海潮音者全海而涌無人不聞可喻遍告大衆今明圓教不同別教故音亦異乎前矣文為三初引昔圓教上言清淨法身此云心者如來達此周遍之心遂使法身豎窮橫遍衆生未得法身唯有妙心可論而已前第一番明圓教云諸法所生唯心所現今是廣前所説色是五根五塵及法界少分心是意根六識諸緣即指上色心心所使是心數法諸所緣法廣舉一切真妄邪正性相因果也唯心現者心如工畫師能畫諸色像若云心造似有物可得今云心現當體全虗諸法是假唯心是中現是空三諦在一心中明矣二汝身下示心含色心文意正揀異別教妙明真精妙心正指心也妙名不可思議明者如鏡現像即寂而照故曰妙明雖現諸法實無外物相雜故曰真精具上諸義復曰妙心身心皆妙心所現莫非常住若如他師云空理是真俗法是妄則真妙而俗不妙豈經旨乎須知身心雖為無明所成實從妙心中現在衆生則全體無明無法不妄故有倒正之分故後文云精研七趣皆是昏沉諸有為相自如來觀之則妙心所現無法不真故無倒正之目而後文有性具七大一為無量無量為一之言觀今文豈不宛然具二義耶前揀妄心則曰緣塵分別揀根境則曰頭自搖動今知是妙心豈復指為心外耶故知前文所説皆是權教始為圓而施別既廢別而立圓圓教以唯心為門又先觀色心不二如不二門云心之色心即心名變不其然乎三云何下斥遺失真性本妙者本來是妙如四卷云因明立所則明亦有過明與妙合始無過咎今云本妙言本來無過也溫陵云心之與性體用互稱心則從妙起明如鏡之光性則即明而妙如鏡之體其説亦是即中云本妙正指中諦圓妙者以圓融而稱妙復從寂而有照所謂不變隨緣曰心是俗諦也寶明者寶是具德之明復攝照而歸寂所謂隨緣不變曰性是真諦也此真與俗觀文勢各具三諦中亦具三合三離九是衆生本具心性而不知色心不二全是妙心遺失多矣前來阿難明見性不動是其悟處不知色心不二即是迷處故云認悟中迷此文先説身心正報下文方指山河依報二兼示依正不二以斥顛倒行事晦昧為空空晦暗中結暗為色色雜妄想想相為身聚緣內搖趣外奔逸昏擾擾相以為心性一迷為心決定惑為色身之內不知色身外洎山河虗空大地咸是妙明真心中物譬如澄清百千大海棄之唯認一浮漚體目為全潮窮盡瀛渤汝等即是迷中倍人如我垂手等無差別如來説為可憐愍者文分二節初約事造明顛倒之相晦昧迷之始即無始無明無明本有故言無始因此而成空界根身故又云迷始也空為無明所生全體是無明惑如世間虗空無日月燈則無光明故即空為晦昧明矣有空之後次生山河大地法性為因無明為緣結暗為四大之色是依報也有依報已方有正報以四大色雜妄想心妄想所成之相是為衆生之身上色字指四大之色下相字乃衆生之相衆生有旁正研醜之相元是結暗所成故隔皮膜不見五臟也有身之後次論心識五塵影子積聚于內搖動不停六識之用各緣外境奔逸無已以無止動之功能一以昏動而為心性幽溪云始則無始無明元以昏動而為依界如後文云覺明空昧相待成搖則昏動具説今文但影略耳後則衆生妄想又以昏動而為病根昏則昧昧失本性之明動則擾擾失本性之寂妙明既失常輪生死既以為心決認在幻質之內詎非迷之至乎不知下次約理造明顛倒之由又為三初法次譬三斥初法中色身正也山河虗空大地依也咸是妙明真心中物依正不二也前云一切因果世界微塵因心成體今亦是廣前所説如十不二門論不思議境而有總別二意總在一念別分色心今文亦然妙明真心總也色心依正別也若不論別則不知自心元具諸法將謂諸法皆妄念所成若不論總則不知現前諸法唯是一心而色心依正各各差殊何以契一相一味之旨乎知總知別意在攝別入總方得心性之全經文似明真具亦兼妄具以色心依正皆是妙心豈不具耶荊溪云他人咸知一切唯識不知身土居乎一心四明云現前一心本具千法此圓觀也次譬心量廣大如百千大海圓離三惑如海澄清觀譬意則知依正本妙若非依正色心本是妙心何以喻澄清大海乎棄此心量而秪認身內之心是唯認浮漚體也言浮漚則非澄清之本矣謂此外畢竟無心如阿難云離此覺知更無所有即目浮漚為全海之潮窮盡瀛渤之量是豈可哉三斥倍是兩重以迷望悟名為一倍若在悟中安有倍乎前以垂手喻倒而此人顛倒與垂手全同其實手無正倒性無迷悟衆生迷之為二故為如來之憐愍也二當機不悟此文至云何為主應作一科下即更問更答不必合下科為顯見無還也今科之意止斥緣心其文即竟一呈疑阿難承佛悲救深誨垂泣叉手而白佛言我雖承佛如是妙音悟妙明心元所圓滿常住心地而我悟佛現説法音未能忘言則現有説法之音而我從有言説處悟故云悟佛現説法音也現以緣心允所瞻仰現以攀緣心信所尊重人之言徒獲此心未敢認為本元心地願佛哀愍宣示圓音拔我疑根歸無上道文中初領佛旨次陳疑根悲救者救其顛倒深誨者誨以圓理當機知所示非常而緣心未脫故至垂泣前第一番佛顯圓理當機未解直似不聞故知華嚴乳味二乘在席如聾如啞固無疑矣今第二番暢示唯心始似領悟而又非真悟圓聞豈易易哉雖者未盡之辭妙音者單承上發海潮音以下之文上標心性其名雖多妙明二字略已攝盡色心依正皆在心中故云圓滿圓常並説指圓教也而我下正述攀緣未忘現謂現在佛説法音現前可據正是所緣而我胸中確有一能緣之心亦現前可據能所歷然乃分別未忘之象因如來是所瞻仰尊重之言何敢不信允者信也徒獲此心者此心指緣心如此信根起念則有不起念則無言思未離根塵不脫豈本元心地乎重望示圓音以拔疑根似以能拔疑根者稱為圓音佛不得不以別接之矣二佛斥二一遣所緣之教分三法譬合佛告阿難汝等尚以緣心聽法此法亦緣非得法性如人以手指月示人彼人因指應當看月若復觀指以為月體此人豈唯亡失月輪亦亡其指何以故以所標指為明月故豈唯亡指亦復不識明之與暗何以故即以指體為月明性明暗二性無所了故汝亦如是前文云而我悟佛現説法音現以緣心允所瞻仰故知阿難寶重法音謂至理在是不知封文迷理則失教意佛故立喻曉之初法中謂阿難未得真悟以能緣之心聽法則法亦成所緣非真得圓常法性次指月喻中迷有三重一迷月體二迷指體文中先標次釋三迷明暗亦先標次徵釋若就喻論乃極愚之人故具出其過也三合者喻佛以教指心示人當機聞教應自觀心若執言教以為自心此人豈唯迷昧自心亦迷于教何以故以能詮教為自心故豈唯迷教亦復不識緣與無緣何以故即以緣體謂為自心緣與無緣無所了故故示汝亦如是二破能緣之心亦法譬合若以分別我説法音為汝心者此心自應離分別音有分別性譬如有客寄宿旅亭暫止便去終不常住而掌亭人都無所去名為亭主此亦如是若真汝心則無所去云何離身無分別性斯則豈唯聲分別心分別我容離諸色相無分別性如是乃至分別都無非色非空拘舍離等昧為冥諦離諸法緣無分別性則汝心性各有所還云何為主文中意含縱奪須知前文阿難呈疑之語所揀極嚴今此文初句是牒前文分別正是六識謂以佛所説圓妙法音為己圓妙之心蓋承佛妙音胸中有一圓妙影子似是妙心故特斥云若分別是汝心者應離所分別之音而有能分別之性此即縱也此聞聲時有同時意識起名隨念分別後念相續名計度分別是皆緣塵而有豈自性歟喻中意兼縱奪客喻六塵六識旅亭可喻苦東掌亭人喻真心去者謂有時而去也常住之謂無去合法中此字指分別心若真汝心則無所去合上亭主之喻謂無去則與真心同矣此即縱也云何離聲至云何為主俱合上客喻縱少奪多以文意在奪故耳于中分四初先約聲奪離聲則無分別之性是則心有時而去聲既是客此獨非客乎次以聲例色前云允所瞻仰是分別我容既依色而起分別則離色亦無性三約外計奪言冥諦者依百論云一墮冥初生覺從覺生我心過我心則生五塵五塵則生五大五大生十一根第二十五神我主諦古人云二十五諦離冥諦外不出色心空今分別都無非心也非色則非五塵五大等非空則非空大非二十四正是冥諦拘舍離外道名即末伽黎異稱詳述如桐洲注蓋性覺妙明常自現前外道別緣最初以為冥諦豈非邪見從來解者俱謂分別六識不行第七緣第八識以為神我正此外道所執也四責成可還如上分別都無尚成外道況從聲色而起分別離諸法塵之緣則胸中便無聲色之影此時分別聲影者還之于聲分別色影者還之于色其是客而非亭主明矣前第一番進明圓理後亦責緣塵分別與今大同二退明別教前第一番進明圓理則曰唯心退明別教則指見性今第二番亦然又第一番退明見性時初舉盲人矚暗直示見性離根離塵阿難不解次因客塵之喻比知見性離塵離根當機倣佛有解而非真解焉豈有緣心不離而反離根塵者乎故世尊前章重破緣心今第二番退明見性重舉離塵後方重示離根如云見見非見是離根也塵是見精所託故先明之此中八還蓋辨見性離塵耳為二一明見性無還二先承責咨請阿難言若我心性各有所還則如來説妙明元心云何無還惟垂哀愍為我宣説問中言有還無還者從聲色生即還聲色不與心性相涉是無還也下文云汝見八種見精明性當欲誰還阿難不解故問無還之體二示以無還三一簡示許説佛告阿難且汝見我見精明元此見雖非妙精明心如第二月非是月影汝應諦聽今當示汝無所還地阿難雖問妙心佛不進明圓理而且約見性以示別義又佛欲示無還而且于可還中示其無還故云且也前匿王章中始言見精今復言見精明元蓋識精元明在眼曰見精明元精亦明義如十卷云顧瞻東方已有精色乃明相未散之象思量分別未起稱曰明元此體真妄和合以含真故遇物能見以含妄故見相未忘較之真心只少一妙字而已以妙是亡相之義也只就目前指出故云且汝見我有汝有我猶帶妄見自他俱冥方全奢摩之照名曰妙心喻有三重孤山曰第一月喻妙精明心第二月喻見精明元水中月影喻緣塵分別孤山此釋為正下文云汝今遍觀此會聖衆但如鏡中無別分析此見精也即第二月也又云汝識於中次第標指此是文殊等此緣慮之心即月影也見精中相是可還性是無還六識心皆是可還此兩種可還之異古人云第二月由揑目而成見精由迷真而起但不揑目二月自無若亡能所則真心可了故於見精中指出無所還地其義如此二正辨境見二一明境可還二一示八境二一顯境既相是可還性不可還第先簡其可還則不可還者自露阿難此大講堂洞開東方日輪升天則有明曜中夜黑月雲霧晦暝則復昏暗戶牖之隙則復見通墻宇之間則復觀壅分別之處則復見緣頑虗之中遍是空性𡋯之象則紆昏塵澄霽斂氛又觀清淨先示可還之相共有四雙先明暗次通塞次空有次染淨其中有體有相日輪是體明曜是相黑月是體昏暗是相然六句皆先體後相唯空與塵先相後體故後文云頑虗還空𡋯還塵蓋綺文互現耳分別者謂物象差別如高下曲直青黃長短遠近等緣即是有對下空境而説𡋯塵起貌氛亦是氣二明還阿難汝咸看此諸變化相吾今各還本所因處云何本因阿難此諸變化明還日輪何以故無日不明明因屬日是故還日暗還黑月通還戶牖壅還墻宇緣還分別頑虗還空𡋯還塵清明還霽諸變化相者四雙八雙一一相違如明化為暗暗化為明塵氛化為清淨決無並存是變化也本所因即日輪黑月等還者明還日輪與見性無關乃至澄霽亦爾然此中可還與前可還不同前以分別聲色之心還於聲色此第六識中之可還者也今以明暗之相還於外境此見精之可還者也應知見精附於八境八相既還則見精亦不可得矣經意謂欲窮不還之體須盡除可還之相如明暗等現有之境尚是可還況分別心乎故簡之若此二明該攝則諸世間一切所有不出斯類簡現境則該眼根所對故云不出斯類二明見無還汝見八種見精明性當欲誰還何以故若還於明則不明時無復見暗雖明暗等種種差別見無差別諸可還者自然非汝不汝還者非汝而誰經云汝見八種等者是指見性所謂性不可還者也才言見性即已離根豈不離塵耶問前托見精指性今何直指見性耶答今亦就見精指性故云見精明性耳然見者畢竟是見性而非見精何者見精附性而起復托根塵附性而起似自能見既托根塵根塵體是無知則見精必非能見故今直以能見而歸於性當欲誰還明無還也何以故下徵釋若明還日輪并見性而歸於明便不見暗安見八種文中欲辨還無還先以差無差對辨八種皆見即是無差應知見精雖見八種然非無差以由八種而起故體是差別非無差也見性體非八種是常住法故無差別差即是妄無差即真諸可還下結顯還無還義不汝還者謂不須汝還也若是阿難自體則真而非妄明矣三指心責迷則知汝心本妙明淨汝自迷悶喪本受輪於生死中常被淪溺是故如來名可憐愍據今結文云則知汝心本妙明淨知前無還之見是妙明心淨覺不作結前之解惟言此句是真而云見性不還猶第二月此見屬妄將亦須還惟有真月所喻真性誠不還耳然觀經文此句元是結前又前文盛談不還而嶽師言還恐違經旨然亦有義以前文云見精明性似帶見精今云本妙明淨與前有異蓋前就見精中指性性是妙心今結前妙心以責阿難文意非更進也汝自下結責不知見性常住逐諸妄想是喪本受輪一入生死輪轉無已如來憐愍衆生借阿難以發此歎憐故退明別教作還無還之論總是權説安有隔日輪於心外而可為圓宗乎二明見性非物二一問阿難言我雖識此見性無還云何得知是我真性見性無還承上文也言云何得知是我真性者如下佛答則外物有相見性無相豈不了然由未聞真性無相故言云何得我真性真性即見性也二答二一正明真見非物二一示見量佛告阿難吾今問汝今汝未得無漏清淨承佛神力見於初禪得無障礙而阿那律見閻浮提如觀掌中菴摩羅果諸菩薩等見百千界十方如來窮盡微塵清淨國土無所不矚衆生洞視不過分寸言問汝者下云誰是我體誰為物象豈非問辭阿難得初果但斷見惑未斷三界思惑假他而觀以佛力見於初禪而已據淨名經那律答嚴淨梵王云我見三千大千世界如觀掌果此云闍浮從近示耳阿那律此翻無貧閻浮樹名此翻穢樹菴摩羅翻難分別其果似桃非桃似李非李故此文泛敘見用而有五重一學人二無學三菩薩四如來五衆生言窮盡微塵清淨國土者如來不唯見穢土且見淨土淨名經云有佛世尊得真天眼常在三昧悉見諸佛國不以二相據此文則如來國土無不清淨故云微塵清淨國土也長水云不過分寸者隔紙膜不見外物隔皮膚不見五藏或云以衆生較諸聖所見不過分寸而已須知見量有差見性無差二示非物二一勸檢自他阿難且吾與汝觀四天王所住宮殿中間遍覽水陸空行雖有昏明種種形像無非前塵分別留礙汝應於此分別自他今吾將汝擇於見中誰是我體誰為物象文中先定所觀言且吾與汝者雖至初禪且觀四天王宮也佛與阿難居日月宮則先觀四王宮殿然後遍觀世間故云中間遍覽水陸空行目根所對不出昏明二種昏是外象昏暗明亦非眼根之明總是前塵而已前塵者目前之塵分別者物象差別留礙者眼光至此而留礙也是則雖明猶昏於見性有何涉乎汝應下勸簡自他因前問云何得知是我真性故勸分別自他他即妄也自即真也今吾下正問自他後文云我與如來觀四天王勝藏寶殿居日月宮據此則佛將阿難明矣誰自誰他即問辭也二正簡自他二一明他阿難極汝見源從日月宮是物非汝至七金山周遍諦觀雖種種光亦物非汝漸漸更觀雲騰鳥飛風動塵起樹木山川草芥人畜咸物非汝簡外物中文有三重從日月宮起見是見之源因佛力加被使阿難至日月宮便可遍觀外物故見從日月宮起也或以見源為真見其説謬矣此文因上云誰是我體誰為物象故今承上簡三重所見皆是物象七金山者此界有九山八水須彌居中鐵圍在外中七金山繞山有七香水海第七山外鐵圍之內即第八鹹海今四洲皆在鹹海中耳七金山有種種寶林皆有光明言漸漸更觀者既居日月宮則日月宮為近由近而遠故云漸漸風動塵起等即所見四洲之事芥小草也如此三重昏明不同皆所見外物非阿難能見之真性此屬他而不屬己審矣二明自阿難是諸近遠諸有物性雖復差殊同汝見精清淨所矚則諸物類自有差別見性無殊此精妙明誠汝見性指上三重名諸近遠近指日月宮遠指雲騰鳥飛等上文三重所見咸物非汝皆是外象至此中方出自體先指見精次指見性言見精清淨者即根中清淨四大是見精所託然見精亦未離物象統諸差別雖屬於汝猶是妄見若見性無差離物獨立則真汝之性矣大涅槃經云衆生佛性非內非外猶如虗空一切諸法因緣故生因緣故滅衆生佛性不破不壞不牽不捉不繫不縛如衆生中所有虗空彼經明衆生身中無有佛性故曰非內是見性離根今經明見性離塵即是非外其意大同皆明真性如虗空耳此真性的是中道亦名佛性在今文明見性無殊即不破不壞不牽不捉不繫不縛之體也由隨染緣喪本受淪若見此者即信衆生皆有佛性佛因衆生不知此性故離塵示之離塵之處名奢摩他然前章明見性無還今明見性非物義猶未全若曉日輪本無草芥非有如同別妄見中説方名奢摩他微密觀照耳二展轉破見是物三一示見非物若見是物則汝亦可見吾之見若同見者名為見吾吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝若汝不知真性認見即是差別之物則吾見亦即彼物汝應見之若同下縱也謂若吾與汝同見名為見吾之見破云吾不與汝同見之時於外境上應少一物而汝何不見耶如來天眼無所不矚然不與阿難同見亦可云不見此順肉眼而為言也若見不見者縱妄意推測謂見吾不在即是見吾不見既云不見豈可見乎彼不見者以見望不見稱不見為彼也於外境上既不能辨吾之不見則亦不能見吾之見見之非物明矣云何非汝二約物我結過又則汝今見物之時汝既見物物亦見汝體性紛雜則汝與我并諸世間不成安立汝執見性是物亦應物即是見則汝見物時物亦見汝而體性紛雜矣又汝見是物我見亦是物外物復即是見自他不分情無情無辨一切俱不安立蓋若論世諦必汝是汝我是我情與無情逈然各別方安立也若失本位豈安立之道耶三結責當機阿難若汝見時是汝非我見性周遍非汝而誰云何自疑汝之真性性汝不真取我求實承上言汝自汝我自我汝見之時是阿難而非佛方名安立則汝見性周遍照物非汝而誰乎蓋汝是無相佛是有相雖云承佛威力見於初禪而見時實是阿難而非佛也因問云何得知是我真性故今結云是汝非我言周遍者從日月宮至七金山等一一皆見故曰周遍周遍之言密顯阿難有平等法身與佛無殊孤山曰性汝不真者謂真性在汝而不自知反取我言以求其實迷之甚也責之深也上兩科雖退明別教然是入圓教之方便以明見性非物則根塵自破根塵破已方可會根塵而為自心不然未破妄而顯真豈不全同外道耶第三番圓別進否文分為二先明圓證次明別理前二番進明圓理則論唯心退明別教則論見性今第三番即就見性以辨圓理文分為三初明圓證超觀大觀小次明圓證出是見非見三明圓證離因緣自然初文先問前言見性非物無相之旨已自昭然今復以大小縮斷為問者大小縮斷即是有相更除此疑方徹無相之旨此阿難愈疑而愈深如來愈談而愈妙也阿難白佛言世尊若此見性必我非餘我與如來觀四天王勝藏寶殿居日月宮此見周圓遍娑婆國退歸精舍祗見伽藍清心戶堂戶邊堂內但矚簷廡世尊此見如是其體本來周遍一界今在室中唯滿一室為復此見縮大為小為當墻宇夾令斷絶我今不知斯義所在願垂弘慈為我敷演問中先敘見遠近因前文云見性周遍非汝而誰細推遠近不無致惑故作此問文有三重牒前佛云觀四天王所住宮殿故云觀四天王等勝藏殿若欲觀四王寶殿必須居日月宮以佛神力欲居則居此阿難隨佛事也承上居日月宮故云退歸精舍伽藍梵語此云衆園先遍一國次見伽藍後瞻簷廡廡大屋四邊重簷也世尊下次疑大小重牒前問唯作兩重若欲對辨兩重即足一界初禪也一室講堂也借力見寬自力見狹已陳大小次作縮斷兩疑言不知斯義所在者縮則非斷斷則非縮縮耶斷耶斯義何在下文答意亦非斷亦非縮故曰義性如是云何為在二答二一正破疑二一正破佛告阿難一切世間大小內外諸所事業各屬前塵不應説言見有舒縮譬如方器中見方空吾復問汝此方器中所見方空為復定方為不定方若定方者別安圓器空應不圓若不定者在方器中應無方空汝言不知斯義所在義性如是云何為在阿難若復欲令入無方圓但除器方空體無方不應説言更除虗空方相所在一切下先總明離相既明見性非物即無諸相故總決之一切世間即根身器界之類大如一界小如一室內外如墻宇夾斷也諸所事業如方圓高下通塞明暗等前塵即天宮精舍等阿難雖就見性為問然所疑大小內外實屬前塵塵則非見豈可混耶言見無舒縮者以非大則無舒非小則無縮也譬下以虗空為譬器喻前塵空喻見性見性無相唯空可以譬之方圓喻大小見性無大小不妨示為大小虗空無方圓不妨示為方圓故見方空吾復下雙問為復定方為不定方此問辭也若定下雙破別安下破定方空若是方於此處別置圓器空應無圓相矣在方器下破不定方汝言下結顯汝言見性或縮或斷要將一義決定但虗空中無定方不定方二義豈可又於二中決定一義乎見性可例知已若復欲令入無方圓等者明復本也但除器方不須説虗空之中更有方相可除只一方相何必兩番除之見性亦然但離前塵則無大小不須言離塵之外更離見性中之大小二反難若如汝問入室之時縮見令小仰觀日時汝豈挽見齊於日面若築墻宇能夾見斷穿為小竇寧無續迹是義不然前文是總破舒縮今是別破夾縮先破縮中云挽見者挽如挽弓之挽既非可挽則非可縮明矣次破夾中云續迹者內外皆見夾使不通穿竇續之續必有痕此如來之巧辨也結云是義不然者謂縮與夾二義不然二明圓證一切衆生從無始來迷己為物失於本心為物所轉故於是中觀大觀小若能轉物則同如來身心圓明不動道場於一毛端遍能含受十方國土文中先明迷本觀大觀小執情之本故先斥之何但阿難一切皆然何但今日無始如是迷己為物無明惑也謂無始來不覺心動而有其念從此變生根身器界迷真性之己成色心之物色心既成真性即隱故云失於本心始既迷己為物終必為物所轉觀大作大會觀小作小會非為物所轉而何須知為物所轉之言已遍該三惑矣若能下明圓證云若能者難言之也名字觀行位中初修轉物之觀至相似位猶未能真轉唯別初地圓初住方能轉物便同如來到此身即是心名為圓明此與上失本心相反道場者證道之處今論自證邊事故曰道場道場在同居土中不須移動而一毛端能含十方國土毛端且不動何況道場乎前既以觀大觀小為物所轉則小能容大名為轉物其義明矣又身心屬己而毛含國土即是會物為己此離迷己為物之惑也古人如長水釋此文同四卷之圓照法界吳興評之謂今文是攝事歸理非從體起用其義極精交光徒非古人安知古人之意哉問毛端亦事國土亦事安云攝事成理答一毛端正是理體即寂光土寂光諸土無二無別寂光是理諸土是事寂光理通諸土別異以理通故云一毛端以別異故所以稱為十方國土問一毛端是身分極微之處何以稱寂光乎答曰若論今文有多種義而攝事歸理為義中之要言多種義者若轉大小即大小相容也若會物為己即自他不隔也若身心圓明即色心不二也若以身對土即依正互融也若一毛含十方土即一多無礙也更有多義不暇具明而義中有要以前兩番進明圓理只論唯心今番進明圓證獨揭唯色比前更深是發明身心圓明之驗蓋心具易知色具難解經第四云如意默容十方三世一切世間出世間法唯聖與凡無不包容盡其涯際據經所言心具諸法人所易曉世雖至愚之人亦能記憶少壯及老及他人之事有何限量由其所知推及其所不知靡不包容殆信然矣所以前兩番初明圓旨且論唯心人猶易信唯色唯心義實不異在凡位中色具難解唯聖人達依正之色無非自心色具宛如心具毛端國土皆是色法以類相從自能容受所以經言身心圓明正顯色即是心成唯色法門也此中雖論毛含剎海而亦兼明一念具法以上文云身心圓明豈非明色具即是一念具耶一念是時之極促一毛端是色之極微時雖極促處雖極微然分量已全可論具法身土既融時處豈不即耶前兩番云諸法所生唯心所現其中自含一念具法之義今揭色具意亦兼之古人明一念具法是寂光土體如義例云他人咸知一切唯識不知身土居乎一心故知心體即常寂光寂光諸土無二無別遮那之身與土相稱法與報應一體無差今例此義色具即心豈非寂光寂光攝下三土故含受十方國也色心依正鎔融總攝全成寂光則古人攝事成理之説更無惑矣前兩番明圓教之因今論圓教之果如來本意在圓故對觀大觀小而即明小大相容耳二明圓證出是見非見前章雖從見性明圓是圓即別義而云身心圓明其語尚寬今云此見及緣元是菩提妙淨明體是的就見以明圓證於中先問阿難白佛言世尊若此見精必我妙性今此妙性現在我前見必我真我今身心復是何物而今身心分別有實彼見無別分辨我身若實我心令我今見見性實我而身非我何殊如來先所難言物能見我惟垂大慈開發未悟若此見精必我妙性者前文於見精中點出見性如云同汝見精清淨所矚則諸物象雖有差別見性無殊此於見精中點出見性也而妙性之言指毛含國土等義故此問從見性無還見性非物及若能轉物三章發來見性現在我前此句是生疑之本由前文有見性周遍非汝而誰等語據此而疑現在前也後文云汝見虗空遍十方界有空無體有見無覺故知見精中元有一分不附身根名無覺之見阿難先已見及此矣見必下執見以疑身心見性洞然必是我真此性既在眼前已離我體現今身心須不是我復是何物次而今下執身心以疑見謂如我思惟則身心有知彼見無辨則見未必是我真也彼者外之之辭三若實下明墮物能見我之過如世尊言必以見者為心以令我今見故見性是我則身非我以身不能見故前文云汝既見物物亦見汝今見在身外何殊物能見我耶汝即我也言何殊者亦非全同以見在身外似有反見我身之義阿難之意似猶未信見性是心然皆據見現在前發此疑端惟垂下結請二答二一破執二會通初文三一如來破執又二一總破見在我前佛告阿難今汝所言見在汝前是義非實見在我前是生疑之本故先斥之以其墮劫濁也二別破是見非見又二若實至別有自性等總明物非是見須知文意元不立物即是見以為所破但破見在前耳因阿難執見在前故佛難云明暗色空無一是見可云見在前乎然縱物無是見而於萬象前剖出精明同物無惑亦得謂之見在眼前故佛難破中具有二義即破是見也答中亦分為二先答物無是見次如佛所説下明不能於萬物象前剖出精見則必不可云見在眼前阿難所説合佛難意故印云如是若實汝前汝實見者則此見精既有方所非無指示且今與汝坐祇陀林遍觀林渠及與殿堂上至日月前對恆河汝今於我師子座前舉手指陳是種種相陰者是林明者是日礙者是壁通者是空如是乃至草樹纖毫大小雖殊但可有形無不指著若必其見現在汝前汝應以手確實指陳何者是見阿難當知若空是見既已成見何者是空若物是見既已成見何者為物汝可微細披剝萬象析出精明淨妙見元指陳示我同彼諸物分明無惑阿難言我今於此重閣講堂遠洎恆河上觀日月舉手所指縱目所觀指皆是物無是見者世尊如佛所説況我有漏初學聲聞乃至菩薩亦不能於萬物象前剖出精見離一切物別有自性佛言如是如是文云汝實見者謂實有眼前之見則必有實法可示且今與汝者且以物為例祇陀林下皆是所見日月恆河極見所至之處亦所見耳下文方明種種相皆有形可指若必句重牒計也以物例見物在眼前而見亦在前則物有可指而見亦必可指故云汝應以手確實指陳也阿難當下明物無是見又二先明即物無見謂若以空即見則既謂之見即不得謂之空次物亦然汝可下謂即物既不可得會須於萬象前剖出一見方可云見在汝前譬如壁畫畫雖依壁然不妨壁是壁畫是畫是即可剖今見亦然合此二義皆名物無是見謂萬物中無一是見之處耳佛已明示物無是見而猶未決其辭以使阿難自決所以斷其疑也文言精明淨妙見元則見精見性皆在其中矣阿難答中方正明物無是見重閣講堂領上祇陀林等恆河日月領上上至日月前對恆河舉手等領上物無是見言縱目者義當舉手故下即云指皆是物無是見者如佛所説下正明不能剖物出見阿難雖云見在眼前而佛令其析出見性則不可得故竟決之二明物無非見佛復告阿難如汝所言無有精見離一切物別有自性則汝所指是物之中無是見者今復告汝汝與如來坐祇陀林更觀林苑乃至日月種種象殊必無見精受汝所指汝又發明此諸物中何者非見阿難言我實遍見此祇陀林不知是中何者非見何以故若樹非見云何見樹若樹即見復云何樹如是乃至若空非見云何見空若空即見復云何空我又思惟是萬象中微細發明無非見者佛言如是如是如汝下述其所言精見二字亦該見精見性前世尊先明即物無見次明析物無見析即離也阿難答中亦分為二今但言離者是必前文意重於離耳前謂見現在前必有可指豈明暗色空即是見乎此既不可須於萬象中剖出一見亦得謂之見在眼前則前問答中意重於離明矣雖言為離元是是見中義以若於萬象中析出一見即是物中有此見也故結云則汝所指等結語雖單承離物無見亦該即物無見故云是物之中無是見也今復下別徵非見更觀之意在徵非見也然佛亦不結而使阿難自決既云遍見便不得云非見此中祗應破非見而即非俱破者謂進退皆不可而決其無非見耳言我又思維者前思無是見今又思無非見也微細者欲尋非見之義故云微細兩關皆破佛意可明故復印之溫陵云二義無定佛皆印者以色空等象如虗空華本無所有不可定指也二大衆茫然於是大衆非無學者聞佛此言茫然不知是義終始一時惶悚失其所守大衆茫然者如前問答以為是見則無所指故是見之義難立大衆已懷迷悶以為非見應無所矚故非見之義難立大衆復懷迷悶而佛反兩印之迷悶轉深故茫然不知終始幽溪云經家特言非無學者無學之人已證偏真則色空已盡豈更執乎所不及者此見及緣元是菩提妙淨明體耳大乘小乘漸頓偏圓於是乎分終始者如虗空華是義之始元是菩提妙淨明體是義之終又如虗空華是義之終是見非見至此而斷也追遡其本元是菩提妙淨明體即其始也有無不決故失其所守三如來安慰如來知其魂慮變懾心生憐愍安慰阿難及諸大衆諸善男子無上法王是真實語如所如説不誑不妄非末伽黎四種不死矯亂論義汝諦思惟無忝哀慕變懾者失其所守則變一時惶悚是懾懾專入聲怯也或云懼也特言無上法王真實語者是見非見皆非真實今俱非之意欲明圓教中道是真實語也如所如説者如於真如之理是稱理而説不誑則不欺於人不妄是斷除妄語或以如來五語釋之亦是具如會解不死矯亂者言其立義甚有無不決如十卷中云或言其有或言其無亦有即是亦無亦無之中不是亦有即矯亂而不決也二會通二一文殊騰疑請問是時文殊師利法王子愍諸四衆在大衆中即從座起頂禮佛足合掌恭敬而白佛言世尊此諸大衆不悟如來發明二種精見色空是非是義世尊若此前緣色空等象若是見者應有所指若非見者應無所矚而今不知是義所歸故有驚怖非是疇昔善根輕鮮惟願如來大慈發明此諸物象與此見精元是何物於其中間無是非是大衆雖蒙安慰未啓幽關故假文殊槌砧相叩文分三節初總述四衆不悟發明二種者謂是見非見二義也精見與色空相對有色空是見色空非見二義若其悟明即知離是非是亦成佛果二明不悟所以若是見者應有所指者謂物既是見必可指其何者為物中之見也是義指物無是見物無非見二義所歸是旨歸之地如下明菩提妙淨明體離是非是豈非義所歸乎因如來所示其意甚深尚非無學偏空境界況阿難有學及諸四衆能無驚怖故非善根微薄三惟願下請如來發明此正叩所歸舉二以叩不二也元是何物者下佛云元是菩提淨明體正答此語二如來正為會通二一正明絶待佛告文殊及諸大衆十方如來及大菩薩於其自住三摩地中見與見緣并所想相如虗空華本無所有此見及緣元是菩提妙淨明體云何於中有是非是此中文意近代諸師皆以萬物一體釋之未必然也考天地同根萬物一體語見外書自肇公引用遂為見性之極談亦須究其所以夫根身器界皆是虗妄欲以目前萬法而即會成一體此乃帶妄釋真徒成妄法今此文中有破有立欲證菩提淨體必須破盡根塵破後論立方明萬物與己為一苟或未破即立豈通方之大道乎文云如來大菩薩者如來極果菩薩分證皆有自行權實二智三摩地或云即是三摩提然三摩提是所修妙因三摩地是所證習果當有因果之分果上所證或即三昧之別名也見是根見緣是塵所想相者六識各有所想之相如虗空華者自緣而言之不可謂之見不可謂之非見緣無定性即不可信則緣若空華自見而言之不可謂之緣不可謂之非緣見無定性則不可信故若空華前文大意是破前塵此中破法根塵咸破又自首卷來言見性脫離根塵未言根塵本無所有至此方喻如空華故非極果聖人登地菩薩安能破盡根塵二相乎根塵既破六識例知此乃自行之權智也破法之後須明立法根塵同源本無二法唯一菩提妙淨明體妙即中也淨即空也明即假也竊觀此處文意方指物與見元是一體萬象叵得見亦安在唯妙淨明體而已文重此見及緣四字涅槃云明與無明智者了達其性無二行之與識智者了達其性無二無二之性即是佛性今見與緣其義亦然本無二法即是妙明如立是見是指妙明即是妙明此語誠贅如立非見乃指妙明非是妙明此語更乖妙明離是非此自行之實智也問前文殊問元是何物於其中間無是非是今答元是菩提妙淨明體云何於中有是非是其義已足奈何於破法中先云不可謂是見不可謂非見耶答前云若樹非見云何見樹若樹即見復云何樹常作是觀知如空華即推檢入空之道應知權簡之法必以自他相對破是非是若妙淨明心只是一體中無是非是也二引例釋成二一指人引例二一指人問以見與見緣元止一真心故直以文殊喻之問前云若樹非見云何見樹若樹即見復云何樹是將根塵對辨無是非是耳今何直就真體言無是非耶答前云此見及緣元是菩提妙淨明體已是卷妄歸真故此問答中直就真體言無是非也文殊吾今問汝如汝文殊更有文殊是文殊者為無文殊妙明似遠今舉菩薩當身而問則執情易破玄指易彰如汝文殊例立菩提妙淨明體更有文殊是文殊者例立妙明是妙明也譬如今人居平無事必不言我是某甲若作此念全成疣贅文殊亦然故今佛問為更指文殊是文殊乎為無文殊例立妙明非妙明也為不許説是文殊遂無文殊耶此喻義旨最深語言最淺講者勿支離其詞也二領意答如是世尊我真文殊無是文殊何以故若有是者則二文殊然我今日非無文殊於中實無是非二相文殊答佛我真文殊本無乖舛何須印定我是文殊真之為言最妙出於是非之外若有是者須言文殊是文殊豈非一句中而疊兩文殊耶然我今日雖不言是文殊非定無文殊可得也故只就一人之身本無是非二相此事易明而非文殊不能答妙明真性可例知矣二説法釋成二一離是非佛言此見妙明與諸空塵亦復如是本是妙明無上菩提淨圓真心妄為色空及與聞見如第二月誰為是月又誰非月文殊但一月真中間自無是月非月世尊合喻雙明真妄此見至如是總標真妄本是妙明等者言止是一實諦法大經云如醉未吐見有轉日及不轉日醒人但見不轉不見於轉今亦如是止是一實相無根塵之異妙明即寂照也無上菩提寂照不二之道也於中無法不具無相不融故曰淨圓真心妄為等者謂真心中本無二法妄心起時遂為色空之塵聞見之根以不二而成二法蓋無明之力耳如第下更立喻也上文既雙立真妄以根塵為妄妙明為真此喻從上根塵發來第二月總喻根塵如第二月對第一月不可言是月非月色空對見不可言是見非見以見中有妙明即可以真月喻之但一月下舉一月喻淨圓真心此喻從上妙明發來正同文殊喻意二月既妄一月乃真何必言是月非月是直明真體中無是非耳二明得失上文雙明真妄故今以妄為失真為得是以汝今觀見與塵種種發明名為妄想不能於中出是非是由是真精妙覺明性故能令汝出指非指見與塵是根塵之妄若言色空是見非見即種種發明乃從根塵而起攀緣故妄想一動終不出是非之外雖不可定亦不能出蓋善觀則出是非之外不善觀但見其不可定耳若契妙性遂脫根塵豈論妄想指非指即是非是也前云若是見者應有所指詎非以指為是乎則非指之為非是可知矣輔行云妙境義成妙觀斯立正此意也由是言之圓融之理必脫根塵而言根塵是道亦須善會圓教之門必除妄想而言妄想即道不可浪宣故前咄破妄心為入真之要路矣三明圓證離因緣自然前兩科皆明圓證此亦是進明圓證之文菩提妙淨明體必離因緣自然故有此番問答後文處處言離因緣自然從此文始為四一明見性離自然二一疑自然阿難白佛言世尊誠如法王所説覺緣遍十方界湛然常住性非生滅與先梵志娑毗迦羅所談冥諦及投灰等諸外道種説有真我遍滿十方有何差別世尊亦曾於楞伽山為大慧等敷演斯義彼外道等常説自然我説因緣非彼境界我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣與彼自然云何開示不入羣邪獲真實心妙覺明性問中言覺緣者歷觀前後諸文多指見性而為覺體緣指萬象森羅緣即是覺乃以緣廣顯覺體之遍上文以第二月喻諸根塵以是非是等為妄想分別今皆遠離即常住非生滅也次與外道對辨者小乘中明無常無我與外道逈別大乘所説每似外道故涅槃中有舊醫乳藥新醫乳藥之喻又云非聖凡夫皆説有我悉是此意梵志即婆羅門謂是梵天所生秦言淨裔而云先者乃已死之人也娑毗迦羅秦言金頭所立二十五諦中首云冥諦謂冥然莫覺不生不滅有似乎湛然常住性非生滅投灰苦行外道説真我遍十方有似覺緣遍十方界內外恐混誠須辨明世尊下引昔教對辨楞伽山名此云不可往唯得通者能到斯義即內教外教差別之義也一切外道多宗自然彼云如龜陸生自能入水毒蛇生已自然食土如刺頭尖誰之所作飛鳥毛羽自然色別世間衆生亦復如是有利有鈍有富有貧有得解脫有不得者是故當知一切法中皆有自性果如外説則斷惑證真義皆不立佛説因緣者由煩惱因緣則有生死由修道因緣則有涅槃衆生能淨三業便革凡成聖正説勝邪豈外道所能及乎往日所説以因緣而破自然義猶易識何意今經所説全類自然蓋非生非滅即是自體本然也言遠離虗妄顛倒者虗妄謂根塵顛倒為妄想離此則凝然不變必非因緣今觀下文言常不言遍者常可以該遍也是則邪教亦有自然正教亦有自然何以辨耶獲真等者謂不同冥初神我也二破自然二一斥疑總責佛告阿難我今如是開示方便真實告汝汝猶未悟惑為自然從首卷來種種開示已非一端故云如是開示開示二字冠下方便真實謂開示權實二義前兩番退明別教是方便三番進明圓教是真實權實並用汝猶未悟反起計度惑為自然二歷境別破阿難若必自然自須甄明有自然體汝且觀此妙明見中以何為自此見為復以明為自以暗為自以空為自以塞為自阿難若明為自應不見暗若復以空為自體者應不見塞如是乃至諸暗等相以為自者則於明時見性斷滅云何見明此中先定次破甄者別也阿難以常住之法不從因緣故疑自然而今以見明暗等為自然明暗空塞仍屬因緣生滅與問似不相蒙因外道以鵠白烏玄及刺頭尖等為自然是未破五陰而計自體本然今欲例之仍當于根塵中立自然計然後委破故須以見明暗等為自然則與彼相肖又此中文意非以明暗空塞為自體也乃以見明見暗之見為自體耳故定中云此見為復以明為自暗等例之若明為自下破謂若以見明為自應不見暗見暗則隨緣轉變非自然也元可見暗故見非明下三句亦然次云明時見性斷滅者明時便無自體是斷滅也二明見性離因緣二一疑因緣阿難言必此妙見性非自然我今發明是因緣生心猶未明咨詢如來是義云何合因緣性長水云既非自然必是因緣因緣之法無常生滅此有彼無豈同覺性湛然常住圓滿十方故問云何合也二破因緣佛言汝言因緣吾復問汝汝今因見見性現前此見為復因明有見因暗有見因空有見因塞有見阿難若因明有應不見暗如因暗有應不見明如是乃至因空因塞同於明暗復次阿難此見又復緣明有見緣暗有見緣空有見緣塞有見阿難若緣空有應不見塞若緣塞有應不見空如是乃至緣明緣暗同於空塞若中先破因次破緣皆先問次破言汝今因見見性現前者交光云汝今因見下應補明等二字未必然也彼謂見性仗外緣始現不知此中具見根見性二義因見根顯色而見性現前前文云眼能顯色如是見性是心非眼正是此義所見不離明暗空色故曰因明有見等問若無見根見性遂不現前耶答凡夫固賴見精映色聖人亦寄根明發又盲人矚暗見性何嘗不現前今就阿難故云汝今因見也破意者若因明有見見從明生明去則見亦去豈見暗乎餘亦例之次破緣者因是親生種子緣是助緣如苗以穀種為因水土等為緣瓶以泥團為因輪繩陶師等為緣因明有見此義難立緣明有見乃是正義何故破之蓋小乘雖立因緣大乘起時須破因緣所謂深觀緣起即證無生也言緣空有者謂見性藉空助發而有苟為空所助發塞必不能助發之矣此文因中以明暗例空塞緣中以空塞例明暗真際云因親緣疏故分二門三明正體當知如是精覺妙明非因非緣亦非自然非不自然無非不非無是非是離一切相即一切法若離思議當體即是破執已竟次明正體無妄緣雜稱為精覺即見性也雲間補遺云此中先破性執從無非不非下破相執非因緣破因緣性計也亦非自然性計也非不自然乃覺性之自然也以由上文將覺性自然與彼外道自然相類今分別之破彼立此然補遺云據理合有非不因緣句然既無文何必強加後云必妙覺性非因非緣據此文便不必加美補遺又謂無非不非句破自然之相執無是非是句破因緣之相執愚謂性相分文甚有眉目然無非之非總承上四個非字而破非與不非之相非與是對故復言無是非是亦破相也以下文云即一切相故預遣其是而言是無非是古德云情可破法不可破情可破故離一切相法不可破故即一切法所謂存然亡然不可得而名焉四結責汝今云何於中措心以諸世間戲論名相而得分別如以手掌撮摩虗空秪益自勞虗空云何隨汝執捉阿難起諸計度總由思慮不忘之故故責云於中措心因緣自然皆世間戲論名相外道計自然小乘見因緣悉名世間正覺中不容有此分別也孤山云手掌喻妄情撮摩喻推度虗空喻真心秪益自勞喻生死輪轉真覺不可措心如虗空不可措手二第三番退明別教為圓教之否何故有此番退別前示菩提妙淨明體不屬因緣自然離一切相即一切法阿難終疑見從因緣生佛明見性畢竟不屬因緣言離而不言即遂成別教又此科中先明見非明暗通塞次明見非是見真妄分途豈非別乎以至後文同別二妄等皆是別義二妄之後終開解文不復論別科分三一辨真俗二諦二一問阿難白佛言世尊必妙覺性非因非緣世尊云何常與比丘宣説見性具四種緣所謂因空因明因心因眼是義云何問中必妙覺性亦指見性溫陵云緣生之見因空而有因明而顯因心而知因眼而見幽溪云唯識明眼識具九緣一空二明三根四境五作意六分別七染淨八根本九種子若加等無間緣即成十也今於外合境為空明因眼即根緣因心即作意等五緣然涅槃中亦但四緣耳二答二一判二諦佛言阿難我説世間諸因緣相非第一義諸佛常依二諦説法世諦有因緣第一義諦不屬因緣蓋外道不知因緣生法但言見者是我佛説見具四緣破彼我為能見之執雖破外道但是世諦非第一義二明二諦三先破世諦此文與初卷盲人矚暗見性是同義亦無別蓋重舉之以破世諦耳前明見性是心非眼正離內根不賴明緣亦離前塵今明見性不賴明緣是離前塵暗中有見何藉內根辨見將終雙脫根塵以結歸前之見性向下談見見非見與是心非眼何以異乎阿難吾復問汝諸世間人説我能見云何名見云何不見阿難言世人因於日月燈光見種種相名之為見若復無此三種光明則不能見阿難若無明時名不見者應不見暗若必見暗此但無明云何無見阿難若在暗時不見明故名為不見今在明時不見暗相還名不見如是二相俱名不見若復二相自相陵奪非汝見性於中暫無如是則知二俱名見云何不見初世尊問世間人説我能見以世間人心所解名為世諦故問世間人也見後起執説我能見正見之時元無此執故知世間之稱總該二乘説我能見指凡夫迷執耳云何下雙問見不見謂何因緣名見何因緣名不見也答中世人之言總該凡小因於下答上云何是見凡夫不知因緣亦不憶見因日月若知因日月即不言我為能見今云世人因日月燈似隱譏凡夫之失凡夫因三光有見而歸功於目此是我執二乘知從因緣生見而法執未忘亦名為見皆以見明為能見也若復下答上云何非見故知凡小秪貪多見若得三光所見即多故云種種黑止一種故不云見阿難下佛破不見之執文分三初反破既云不見則一無所見豈見暗乎次若必下正破暗中有見則不賴根并不賴塵何仗空與能分別心故佛此言四緣俱破若在下立並顯不見之謬也以明例暗明亦無見遂至二相俱名不見是豈可哉三若復下結破明來暗滅暗來明滅是相陵奪見性常住不籍根塵無時不有可云無三種光明不見耶世間人所見既謬則因世立諦亦無究竟此以第一義破因緣也二明第一義是故阿難汝今當知見明之時見非是明見暗之時見非是暗見空之時見非是空見塞之時見非是塞四義成就汝復應知見見之時見非是見見猶離見見不能及云何復説因緣自然及和合相先示見性離前塵明暗色空四種是塵古人謂見精離前塵然見性可不離前塵耶後經云見精映色結色成根又云此見離彼明暗二種畢竟無體據此文則謂見精離塵恐未必然當是見性離前塵耳次明見性離內根四義成就四字溫陵以為結上起下其説是也見見等者上見字是見性下見字是見根見性非是見根故云見非是見從古解者謂有真見見於妄見之義如吳興云見明之時見非是明等皆以能見見於所見能非是所也例今見見之時義亦如是即以上見字為能見下見為所見吳興此解最當蓋明暗空塞元由妄見而立體即妄見若見明暗空塞即見妄見妄見既為所見則能見者必是真見而非妄見矣故云見非是見真見尚離妄見妄見何可及乎須知見明暗時即是見見之時不可作兩時釋之又凡位已然但不自覺不可定入聖位方能見見此義稍似難明所以下文重問重釋言因緣自然及和合者下文將破和合故並舉和合也三結斥勸進汝等聲聞狹劣無識不能通達清淨實相吾今誨汝當善思惟無得疲怠妙菩提路部屬方等故須彈斥但知因緣不知見性故云狹劣等吾今下勸勉離根離塵即妙菩提路也辨見至此其文將終有師云前文秪辨得箇見精到見見之時見非是見二句方破見精恐未必是幽溪云經文始於是心非眼至於見見非見一就見性而辨無動無遷無還非物皆是見性唯無還中云且汝見我見精明元此見雖非妙精明心如第二月非是月影然雖托見精實辨見性故結云則知汝心本妙明淨非即妙精明心乎所以前後皆顯見性問若爾諸文何異答經文進圓退別其三番圓教自是一途別教辨見諸文亦有次第如最初舉盲人矚暗示見性是心非眼正示離根又云前塵自暗見何虧損亦示離塵阿難不解所借客塵之喻明頭自動搖手自開合見無所動雙離根塵阿難稍解而緣心猶未伏也欲伏緣心再辨八還正示離塵兼示離根離塵易解故先明之嗣後多以離塵為正意直至今文雙離根塵明見見非見始復如是見性是心非眼之宗而辨見之文竟矣向下同別妄見深明見見非見之義也二破同別妄見二一牒前説疑請阿難白佛言世尊如佛世尊為我等輩宣説因緣及與自然諸和合相與不和合心猶未開而今更聞見見非見重增迷悶伏願弘慈施大慧目開示我等覺心明淨作是語已悲泪頂禮承受聖旨因聞見見非見重請發明但此中遠請和合不和合相近請見見非見桐洲云和合即因緣相不和合即自然相雖聞因緣未曉和合雖聞自然未知不和合相所以上文云云何復説因緣自然及和合相下文云汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合也見性朗然名大慧目破除妄見則覺心明淨二約二見開示二一訶誡許宣爾時世尊憐愍阿難及諸大衆將欲敷演大陀羅尼諸三摩提妙修行路告阿難言汝雖強記但益多聞於奢摩他微密觀照心猶未了汝今諦聽吾當為汝分別開示亦令將來諸有漏者獲菩提果如來欲示後文深談空觀將欲敷演者將説五陰三科之文陀羅尼此云總持下文陰入處界一一皆是如來藏理總攝諸理豈非大總持乎諸三摩提者上文從徵心起為一三摩提自行從一門入也下文五陰三科為諸三摩提欲化衆生須遍習諸法門破塵沙惑也又上是從假入空故七徵之後請示奢摩他今從空出假故佛先闡奢摩他微密觀照然後明諸三摩提雖順別教次第正意在圓即云妙修行路諸三摩提一一達之無非圓妙三觀是入菩提之路也上是經家敘意如此次如來云奢摩他微密觀照者是從空定而起空觀慧眼所見非肉眼見非微密乎上來停心諦理多屬於止今遍破諸法應屬於觀止觀皆名奢摩他但觀今文先奢摩而後三摩從空出假其義明矣幽溪云此文以方便隨緣止遍歷萬法為總持故曰大陀羅尼諸三摩提妙修行路而云於奢摩他微密觀照心猶未了者蓋欲示以即定之慧猶瓔珞所謂從空出假也所以前文奢摩他唯約一根而辨非以捨博從約者為奢摩乎次漸推廣歷三科而辨非以約該博為三摩乎次明七大各各清淨本然周遍法界隨衆生心應所知量非以博約雙融為禪那乎幽溪以從空出假判釋今文甚得經旨假從空出故於今文無惑可入後科獲菩提果者亦酬前得成菩提圓三止觀之請耳化他之法無不咸備令諸有漏亦得菩提二推因正説二一示輪回由妄阿難一切衆生輪回世間由二顛倒分別見妄當處發生當業輪轉云何二見一者衆生別業妄見二者衆生同分妄見阿難本問見見而佛明二妄者以妄見有相真見無相妄既有相可以真見而見之即見見也於中先標次云何下列標中輪回世間多指分段生死見有輪回則受生死故云由二顛倒分別等逐妄迷真名為顛倒分別是顛倒之因也竊研見妄之言是指妄惑然此惑以苦為體由見有苦報是名見妄豈非以苦為體乎見妄本無所從來故云當處發生二妄皆由業之所成即招輪轉故云當業輪轉是則惑業苦三聚在一處不得相離天如曰別業者一人妄見也同分者多人妄見也故後文先引別業且喻阿難一人眼根之妄次連同分廣喻十方衆生根身器界同一妄耳交光云同分有惑無業別業方能造業然後文云同見業中瘴惡所起瘴惡豈非苦乎見業豈非業乎知故同別二妄皆具業惑苦三明矣二約二見廣釋二一正明二例合初文二一別業妄見三一指人云何名為別業妄見阿難如世間人目有赤眚夜見燈光別有圓影五色重疊云如世間人者下文自有例釋能例如所例故云如也病目見影亦可稱別業但文意不過以為能例而已蓋以別業之易知例別業之難知也目本無病燈亦無影赤眚為妄見之因圓影為妄見之境眚翳之類如人病目多紅色也二正破二一破即於意云何此夜燈明所現圓光為是燈色為當見色阿難此若燈色則非眚人何不同見而此圓影唯眚之觀若是見色見已成色則彼眚人見圓影者名為何等先定次破五色圓影元是目病恐人疑病目所見病既是實圓影非虗故須委破破即燈中謂果是燈色非眚人亦應見之故責非眚何不同見而唯有眚之人見耶破即見中見已成色不應別更有見則見影者應不名見是何物耶見色之言太混所以受難若云見病為色而見圓影者元是無病之體有何過乎會解云色即影也二破離復次阿難若此圓影離燈別有則合傍觀屏帳几筵有圓影出離見別有應非眼矚云何眚人目見圓影屏帳几筵既無圓影則非離燈應非眼矚者謂應是耳鼻所識此展轉破離以生下結顯之文也三結顯是故當知色實在燈見病為影影見俱眚見眚非病終不應言是燈是見於是中有非燈非見如第二月非體非影何以故第二之觀揑所成故諸有智者不應説言此揑根元是形非形離見非見此亦如是目眚所成今欲名誰是燈是見何況分別非燈非見文分三節初結示色實在燈言彼五色重疊實賴燈現如屏帳等不出圓影則在燈明矣此結非離燈別有也然雖不離燈而實不從燈有乃見病所成此結非離見別有也影見俱眚見眚非病者謂圓影與見影之見俱是目眚見指見病影即是見而影見即眚蓋三名而一體耳影是眚結非燈色見是眚結非見色眚乃見病可即言是見乎見眚非病釋成見圓影者名何等也然應云見影而云見眚者影即是眚故云見眚又眚為有病之見見眚即見見也有病之見既為所見則能見此眚者豈非無病之目耶由上文云則彼眚人見圓影者名為何等今出其義謂是無病之目也即影之見是一箇見可例妄見離影之見又是一箇見可例真見如是則見見可曉矣終不下總結上義影是眚云何是燈見病是眚云何是見於是中者於見圓影之中也色實在燈云何非燈見病為影云何非見謂安得於見圓影中而有非燈非見之義耶二如第下喻顯以第二月喻見圓影同是眼家之妄故也此第二月非真月體非水中影何以故以揑目所成故既揑所成則見第二月時得不以為見見乎由以揑為根元即名第二月為揑根元吳興云雙是形與非形雙離見與非見其説甚是形謂月形離見是非見離非見即是見不應説是形結非體也不應説非形結非影也不應説離見結第二之觀不應説非見結揑所成故三此亦下合法目眚所成與揑所成其言相對今欲名誰下合喻可知吳興云是燈是見謂圓影由燈見而有因緣義也非燈非見謂圓影離燈見而有自然義也謂仗因託緣猶且不可況非燈非見自有實體是豈可哉別業破最委悉以為下文衆破之本耳二同分妄見云何名為同分妄見阿難此閻浮提除大海水中間平陸有三千洲正中大洲東西括量大國凡有二千三百其餘小洲在諸海中其間或有三兩百國或一或二至於三十四十五十阿難若復此中有一小洲秪有兩國唯一國人同感惡緣則彼小洲當土衆生覩諸一切不祥境界或見二日或見兩月其中乃至暈適珮玦彗孛飛流負耳虹霓種種惡相但此國見彼國衆生本所不見亦復不聞一國衆生共所感者名為同分然此文亦是能例下文以一國例多國是所例也今文先數諸國次明妄見數諸國中先舉鹹海閻浮一面中間平陸有三千洲次明大洲三明小洲其間數國初從多至少謂從二千三百至三兩百國又從少至多謂從或一或二至四十五十次明妄見中但舉小洲兩國之一以明同感惡業溫陵曰暈適珮玦日月之災象也彗孛飛流星辰之災象也負耳虹霓陰陽之災象也惡氣環日曰暈日蝕曰適妖氣近日月如珮玦之狀星芒如帚曰彗芒氣四出曰孛孛孛然也絶迹而去曰飛光迹相連曰流陰陽之氣或背日如負旁日如耳或明而為虹暗而為霓寂音引春秋傳云魯哀公六年楚有雲如赤鳥夾日以飛二日楚子使問諸周太史太史曰其當王身乎杜預注曰日為人君妖氣守之故以為王身雲在楚上唯楚見之故禍不及他國又魯昭公二十六年冬十一月齊有彗星齊候使穰之晏子曰無益也只自誣焉天道不陷不二其命若之何禳且天道之有彗也以除穢也君無穢也又何禳焉若德之穢禳之何損杜預注曰出齊之分野也不出魯故魯不見以此觀之經言驗矣蓋自一國言之則謂之同兩國言之則謂之異非同不稱同分非異何以名妄見乎交光云同分有惑無業其説非也據經所言乃并業苦而為妄見之惑耳字書云水中可居曰洲洲者聚也人及鳥物所聚之處二例合二一總標阿難吾今為汝以此二事進退合明二事者指同別二妄進退者謂進別例同退同例別故曰合明一往觀之下文似有三重進退初以燈影例目觀二以一人例多人三以一國例多國皆可謂之進退但燈影是別中之喻目觀是別中之法法喻既齊有何進退一國多國是同分中法喻其義亦爾唯如彼衆生下一節是以同別相例可云進退吳興之説是也以法喻既立方可引同例別故先以燈影例目觀乃為進退之地耳二別示三一別中法喻三先喻阿難如彼衆生別業妄見矚燈光中所現圓影雖現似境終彼見者目眚所成眚即見勞非色所造然見眚者終無見咎先舉能例其文有四初直指燈光圓影為別業妄見二雖現似境者謂燈影雖現在前似乎外境三終彼至非色所造謂實非外境乃是能見之人目有赤眚故成圓影此指圓影是也眚因見勞而發此指眚是見也則圓影即見無疑影即眚而眚即見勞蓋三名而一體耳非色所造斷定是見四然見眚者終無見咎見影即是見眚又眚即是有病之見但云見眚即該之矣若爾則見病已為所見故能見者非病咎即病也上即眚之見是一箇見此離眚之見又是一箇見實有見見之義故舉為能例焉前文云影見俱眚見眚非病意與今同二法例汝今日以目觀見山河國土及諸衆生皆是無始見病所成見與見緣似現前境元我覺明見所緣眚覺見即眚本覺明心覺緣非眚覺所覺眚覺非眚中此實見見云何復明覺聞知見所例亦四一從例汝今日至見病所成合上如彼衆生別業妄見矚燈先中所現圓影也此語共顯三義一顯燈影是夜見山河大地是日間所見二顯睹圓影者病在一時睹依正者病在無始三顯睹赤眚時好眼非病睹依正時好眼即病例顯之意甚多略舉三義而已二見與見緣似現前境合上雖現似境句見是根見緣是塵然見緣是境而見亦稱境者根塵不相離皆對覺而名境是見附見緣而為現前之境無境而名境故云似也三元我覺明見所緣眚覺見即眚合上終彼見者目眚所成眚即見勞非色所造所言我者即真我也覺明覺見明性離根塵之體也特立覺明者前文云見非是見既非是見當是覺明之體覺明起病為能見之根及所見之緣當體是眚故云見所緣眚見即所緣而所緣即眚亦三名一體耳次云覺見即眚謂從覺而起眼根之見即是眚也此句但指見為眚正顯睹依正時好眼即病佛意欲破除眼根故作此語前指圓影是眚今指所緣是眚前指眚即見勞今亦指見即眚法喻齊矣又覺見即眚之語與上非色所造其意極合四本覺明心覺緣非眚覺所覺眚覺非眚中合上然見眚者終無見咎本覺明心者不涉眼根之心覺緣者覺有依正外緣也緣即是眚眚為所覺則能覺非眚明矣又緣字但指依正所覺該乎根塵故再簡云覺非眚中或云覺緣非眚對上覺見即眚謂見緣則見即是眚覺緣而覺非是眚見緣之時即覺緣之時以真妄和合之故此實下結歸見見非見如上覺明能照諸法亦可稱見既稱覺明即是非見阿難謂聞見見非見重增迷悶然能覺之明非真見乎所覺之目非妄見乎則真見果有見于妄見之義而真見離眼根即不名見復離耳鼻等根亦非聞與覺知故前文云見非是見也前云覺所覺今復云見見祗是一義而已此一番以別例別蓋目睹依正難知其妄而圓影則易知其妄真見見妄見其義難彰而赤眚之見見易彰故以易知之別業例難知之別業也既云合法有何進退然此中合法最詳以為衆合之本故耳三結是故汝今見我及汝并諸世間十類衆生皆即見眚非見眚者彼見真精性非眚者故不名見前明目睹依正是眚今明目觀生佛自他皆是眚衆生有十二類謂胎卵濕化有色無色有想無想非有色非無色非有想非無想內除無色是空散銷沉無想化為土木金石但有十類前十種異生亦然皆即見眚謂是妄見之眚而非見眚之覺體此中生佛自他同于上文圓影而云皆即見眚同上文影見俱眚蓋影與見眚三名一體終不相離而真見獨脫于三種之外故云非見眚者即同上文見眚非病又見眚即見見也彼見下明真見非見性非眚者指眼眼為眚既脫眼根可云見乎故前文稱之為覺明也別業法喻竟二進退合明阿難如彼衆生同分妄見例彼妄見別業一人一病目人同彼一國彼見圓影眚妄所生此衆同分所現不祥同見業中瘴惡所起俱是無始見妄所生進退中先退同例別同分妄見指彗孛飛流等退同一人所見圓影蓋燈影是一人所見其妄易知而日月災祥象見於天人皆謂為實有若是實有彼國亦見今唯在此國則知衆人同分妄見與燈影無異矣一病目人下進別例同彼見下正是合明彼見至不祥先牒二喻同見句就喻説謂不但同分稱為瘴惡而眚妄亦可稱瘴惡瘴不和之氣也瘴惡之言元從同分而得衆人同感瘴惡象見於天無而妄謂為有然眚妄豈非見業中不和之氣耶前同分文迷者以為有惑無業今云見業豈非業乎當知瘴惡即苦也此句是合別于同也俱是句就法説是合同於別謂燈光圓影喻一人無始見妄彗孛飛流等喻衆人無始見妄妄該無始無明之惑故同別二妄中咸該惑業苦三道明矣作此進退者佛意明同分之妄悉同別業之妄故合明之上文別中法喻已足今方作此進退耳三同分合法又二一以起妄正合例閻浮提三千洲中兼四大海娑婆世界并洎十方諸有漏國及諸衆生同是覺明無漏妙心見聞覺知虗妄病緣和合妄生和合妄死上合明中已牒同分之喻今以一國例多國是合法也閻浮提就一面言四大海就四面言娑婆世界則該大千十方有漏則該塵剎此從狹至廣耳多國是依報衆生是正報同是從真所起之妄覺明無漏妙心即非見之體如無病之目見聞覺知如目上之眚故曰虗妄病緣不但見此依正者是見聞覺知虗妄病緣而彼依正當體皆具妙心亦彼各各妙心中所起見聞虗妄病緣也故下即云和合等和合者覺明與無明合無漏與有漏合妙心與有相心合前目病則見圓影災象則感兵荒今真妄和合則感生死其義均也此番雖以少例多然既是合法不必言進退如上諸文名奢摩他微密觀照盡破根塵皆是虗妄不但明見性離根塵而已二以歸真顯示若能遠離諸和合緣及不和合則復滅除諸生死因圓滿菩提不生滅性清淨本心本覺常住前明同別二妄竟次明返妄歸真前文云由是真精妙覺明性故能令汝出指非指今文亦然須遠知合及不和合二邊分別不起則攀緣既脫而根塵必從此離矣則復下謂果除二邊不但離和合等情計并除惑業無惑業則無苦三道皆離所謂菩提不生滅性也除同別二妄則獲清淨本心既免輪回本覺常住此破二妄文連下破和合及非和合齊此是第三番退明別教竟和合非和合圓教亦須破除然圓別二門咸離二計今因文便附于別教之後蓋圓須融妄即真而別必破妄顯真文明同別二妄以釋見見非見分真分妄其為別也審矣明別之意元為顯圓其中脈絡相通故破和合文不妨兩屬於別圓也三破和合及不和合二一責迷阿難汝雖先悟本覺妙明性非因緣非自然性而猶未明如是覺元非和合生及不和合前文阿難聞菩提妙淨明體疑為自然佛因廣破自然又疑因緣世尊復破因緣當機聞此必有悟入故云先悟又前阿難自云諸和合相與不和合心猶未開然和合即因緣非和合即自然今未明者以計因緣則粗計和合為細計自然則粗計非和合為細也問何名粗細答計因緣者計覺性或因明暗空塞或緣明暗空塞但成二義今計覺性或與因和或與因合或與緣和或與緣合即成四義計自然者計覺性非因非緣但成二義今不與因和不與因合不與緣和不與緣合復成四義此粗細之分也二徵破二一破和合疑二一標責阿難吾今復以前塵問汝汝今猶以一切世間妄想和合諸因緣性而自疑惑證菩提心和合起者吾今句標汝今下責世間凡夫多計和合是妄想執著故云妄想和合何者如因不能生緣不能生凡夫亦信此語若因緣和合而生世人謂現見諸法無不如是故和合最難破也吳興曰菩提心者覺性也上文云而猶未明如是覺元非和合生等古人以佛果菩提解者謬矣阿難疑覺元與諸塵和合而生故云證菩提心和合起也二正破二一破和二一定則汝今者妙淨見精為與明和為與暗和為與通和為與塞和見精而云妙淨即見性也溫陵曰則汝下意謂設有所和即涉妄塵而不名妙淨矣次破二一正破明和若明和者且汝觀明當明現前何處雜見見相可辨雜何形像若非見者云何見明若即見者云何見見必見圓滿何處和明若明圓滿不合見和見必異明雜則失彼性明名字雜失明性和明非義文分四節初明相雜何形見明現前何處雜見者顯明中無見也雜是和義故以可辨破雜見屬內相屬外見有知相無知宛然可辨有何雜耶次若非下明即離俱過此承上雜何形像謂所云雜者為非見而雜乎為即見而雜乎皆辨形像也若非見而和明既非見即不合見明矣如此合是即見若即見而和見不自見今云何見見耶上文有見見之義而今破見見者上文以真見見于妄見故云見見今不分真妄則見見不可立也三必見下明圓滿非和圓滿猶周遍也由見相俱滿故須論和若一切處遍是於見則無明相可和若一切處總是於明則無有見可雜和則間雜不圓滿矣四見必下明和失自性見必屬內心明屬外相兩不容混故云必異言雜則失彼性明名字者如微塵與水相和但名泥團不名泥水性明亦然性即見也今明見二名不失則以為和明者非矣佛展轉破明和之義以衆生胸中有此情計也二例破餘境彼暗與通及諸羣塞亦復如是二破合二一定復次阿難又汝今者妙淨見精為與明合為與暗合為與通合為與塞合資中曰上和義如水和土今合義如蓋合函二破二一正破明合又二一正破若明合者至於暗時明相已滅此見即不與諸暗合云何見暗溫陵云和則雜而不辨合則附而不離合既不離故明相滅時見亦隨滅不復見暗須知明滅則見亦滅方是合義不爾即非合矣二轉破若見暗時不與暗合與明合者應非見明既不見明云何明合了明非暗恐轉計云見暗之時一無所見何必言合破云不合而見則合反應不見便不應見明矣既不下牒破明合兩字是牒上文上又云與明合者應非見明今明合時了明非暗則與應非見明違矣如是則明合見明又豈可云見暗時不與暗合耶既與暗合則破前明合之義二例破餘境彼暗與通及諸群塞亦復如是塞非一種故云群塞群塞亦非一種云諸群塞上諸暗亦然如上所破合義不成故菩提心非和合起也二破非和合二一轉計阿難白佛言世尊如我思惟此妙覺元與諸緣塵及心念慮非和合耶凡夫計執如屈步蟲得一捨一阿難大權示同凡執才破和合即著非和合謂覺元與前塵不和合亦與妄想不和合也前文云一切世間妄想和合諸因緣性今心念慮即妄想諸緣塵即諸因緣性二佛破二一責疑佛言汝今又言覺非和合和合尚不可立況非和合故佛責之二正破二一破非和二一定吾復問汝此妙見精非和合者為非明和為非暗和為非通和為非塞和二破二一正破非明又二一約邊畔指問若非明和則見與明必有邊畔汝且諦觀何處是明何處是見在見在明自何為畔邊畔即是疆界何處下問其邊也在見下問其畔也次顯不和非畔阿難若明際中必無見者則不相及自不知其明相所在畔云何成此文即以邊畔而破邊畔之義謂縱許有畔即明際外有見際中無見見與明遂不相及如是則見不知明之所在而不相接有畔即是無畔并非和之義自難立矣再往觀文似乎以邊破畔畔不成則邊亦不成二例破餘境彼暗與通及諸群塞亦復如是二破非合二一定又妙見精非和合者為非明合為非暗合為非通合為非塞合二破二一正破非合若非明合則見與明性相乖角如耳與明了不相觸見且不知明相所在云何甄明合非合理見之與明其性不合故云乖角如耳非明家之根明非耳家之塵了不相涉前非和中言自不知其明相所在明其不相接也不接則際畔不成今云見且不知明相所在者謂以根塵相對而見非明之根明非見之塵便同耳之與明兩不相觸縱在一處亦不能知則不合尚不可説何況合乎此文即以非合而破非合之義也理謂物理二例破餘境彼暗與通及諸群塞亦復如是吳興云非和約體不相入故以際畔推之非合約性自差別故以乖角破之問現前衆生本無和合不和合計何須苦破答衆生雖不計和合然計有生滅即計和合將來必有故須破之又防轉計復破不和合也如此情計圓教亦須破除今因文便附別教之後耳上來三次明圓三番用權當機惑重帶權説實齊此是寄從假入空以助圓觀竟後文不煩進否竟明圓旨所以前不出如來藏之名而後名如來藏也雖正談圓旁亦兼別於圓融中旁兼復疏倒入而已言覆疏倒入者輔行云自行雖破未忘分別故名為疏次為利他更廣分別故名為覆破已復來故名倒入亦名却入二寄從空出假酬三摩以歸圓理前二種見妄之初言佛將欲敷演大陀羅尼諸三摩提妙修行路標題在先而猶有奢摩他之餘義未酬故復示二種見妄并破和合非和合等以終前義至此汝猶未明下方起諸三摩提於中初總示本真次別會諸觀初中又二一略示阿難汝猶未明一切浮塵諸幻化相當處出生隨處滅盡幻妄稱相其性真為妙覺明體前文雖就眼根顯真見體略會此見及緣元是菩提妙淨明體而未明五陰三科皆如幻化性即真常故此指之浮塵者古解云虗浮無體塵亦真性或云浮塵即陽焰莊生所謂野馬塵埃是也陽焰幻化此舉十種深喻之三以喻諸法悉非實有諸法本無所從來故云當處出生去亦無所至故云隨處滅盡蓋諸法暫現如石火電光是無常義而先云諸幻化相故是無常即空不同小乘析空以無常為實有矣幻妄等者古解喻如空起華華處全空如鏡現像全像是鏡其説甚是然幻即牒上幻化妄即牒上生滅其性真為妙覺明體者起念分別即是著相不起分別莫非真性不但見有真見若臭聽嘗觸色聲香味等一一皆有真性皆離妄想根塵故無非妙覺明體覺是中道妙明者即寂而照皆三諦之體耳二廣示如是乃至五陰六入從十二處至十八界因緣和合虗妄有生因緣別離虗妄名滅殊不能知生滅去來本如來藏常住妙明不動周圓妙真如性性真常中求於去來迷悟生死了無所得陰入處界廣上浮塵諸幻化相孤山曰諸經皆列三科謂陰處界三對愚根樂各有三故而今有四更加六入秪是破十二處中內六處耳隨機增減何必定三此並色心開合之殊也因緣下廣上當處出生隨處滅盡夫因緣者行人立觀之要境而有二種若推其始則法性為因賴耶為緣此大乘圓教所觀若論其末則惑為因業為緣和合而生陰入處界緣不久聚別離則滅應知因不能生緣不能生而見和合有生此虗妄耳妄滅亦然殊不能知下廣上幻妄稱相其性真為妙覺明體見生滅者多不知常住真性故言殊不能知約體相言生滅約蹤迹言去來本如來藏者九界即佛界故曰如來多所含藏而無積聚曰藏常住妙明對生滅説大經云生亦是常住無常故生亦無常住亦是常以生生故住亦無常異亦是常法無常故異亦無常滅亦是常以本有今無故滅亦無常善男子以性故生住異滅一切皆常據經所言生住異滅皆本性所具其為常住明矣本具之法即是自心故妙明也不動周圓對去來説淨名經文殊師利云若來已更不來若去已更不去所以者何來者無所從來去者無所至所謂見者更不可見經作此説者以來去祗一剎那但一念住來無所從去無所至既無去來即無遷動是人本具心性總該一切無不遍到故曰周圓據其亡相之德又稱妙真如性如上所説常與無常在一心中涅槃鳥喻品明二鳥雙遊答迦葉云何共聖行娑羅迦鄰提之問正此義也次云性真常等者恐疑去來生滅既皆自性便不須亡泯當知諸法即性一切寂滅如法華云終歸于空也又云迷悟者上來殊不能知即迷知之即悟故兼舉之觀相元妄尚無可陳況觀性元真求於去來迷悟生死豈可得乎下文明陰入處界令阿難以因緣等四性一一推之是皆於性真常中求不可得也二別明諸觀四一會五陰又二一總徵阿難云何五陰本如來藏妙真如性因滅是色獲得常色受想行識亦復如是即法性五陰名體不轉皆本如來妙真如性也會解云梵語塞犍陀此云蘊古翻為陰蘊謂積聚陰謂蓋覆積聚有為蓋覆真性幽溪云法性五陰體本真常不真常者生滅去來為之蔽因緣自然為之誤也如來欲為開迷而即悟先且破有以歸空空華之相既無瞪目之勞自息悟尚無得何因立迷是所謂性真常中求於去來迷悟生死了無所得故曰本如來藏妙真如性唐溪曰諸三摩提一科世人謂屬假觀今總徵中云如來藏妙真如性自屬圓融三諦而以為假觀可乎應知若據次第實是從空出假而文旨則歸於圓所謂圓融行布不相礙也又妙玄三上云十住正修空傍修假中十行正修假傍修中前徵問心目至同別二妄其中退明別教是正修空傍修假中之義今亦正明圓教兼帶別教正修假傍修中之義耳二別示五一色陰二一立喻顯法阿難譬如有人以清淨目觀睛明空唯一晴空逈無所有其人無故不動目睛瞪以發勞則於虗空別見狂華復有一切狂亂非相色陰當知亦復如是孤山曰淨目喻本具真智睛空喻本具真理唯一睛空即理智一如逈無所有絶九界妄色其人無故者即下文山河大地無狀忽生演若迷頭無狀狂走也不動目睛喻妄心取著瞪喻起惑勞喻造業於妙性中現九界色故曰於空見狂華等言別見者華因勞目而見清明眼則無之矣以喻衆生則有諸佛則無即中云經意明妄念未起理智一如喻以淨目觀晴空纖塵不雜衆生不能識取起惑造業喻目空相對反為生華之因緣如止觀云無明法性生一切法即其義也則以瞪目喻無明虗空喻法性可也狂以不實為義復有等者謂或見毛輪第二月等可喻餘陰生起因緣生法皆是虗幻故須破之既以狂華喻色若破狂華即破色陰也二寄喻破執二一喻陰相無生二一正示阿難是諸狂華非從空來非從目出二反破二一破空來如是阿難若空來者既從空來還從空入若有出入即非虗空空若非空自不容其華相起滅如阿難體不容阿難見華既從空來不見應從空入若有下縱破縱許有出入即有內外故非虗空空若下破空非空空若非空即是實法須并華亦實故不容華相起滅喻以阿難體中不容阿難上阿難喻虗空下阿難喻空華也既無此事故謂從空來者非矣二破目出若目出者既從目出還從目入即此華性從目出故當合有見若有見者去既華空旋合見眼若無見者出既翳空旋當翳眼又見華時目應無翳云何晴空號清明眼還從目入者謂不見華時應從目入也既從至目入是定其有出入耳即此下破先約華性出入有見破華空者為華於空也華得目之氣分必當有見則旋應見眼矣次約華性出入無見破華既無見故旋當翳眼又見下復破出既翳空華從目出目即無翳無翳即是清明何待晴空始號清明眼耶釋要云若見華是好眼應見晴空却是病眼何以世人觀晴空時號清淨明眼二結虗妄離計是故當知色陰虗妄本非因緣非自然性前以空來目出推破狂華乃破因緣以明空也今雙非因緣自然是明中道總而言之俗即空中故名如來藏耳二受陰二一立喻顯法阿難譬如有人手足宴安百骸調適忽如忘生性無違順其人無故以二手掌於空相摩於二手中妄生澀滑冷熱諸相受陰當知亦復如是宴靜也調和也適悅也手足至無違順以譬正受幽溪曰如來藏性本無諸受今有之者乃無故發生如觸之為法必托境生徒有一身自不成觸今以二手于空相摩于一體中而妄生澀滑豈有故哉衆生于藏性中幻受損益亦復如是即中謂二手譬生受之因緣澀滑冷熱譬違順諸受冷暖諸觸從空而生今受亦從空生故知是妄二寄喻破執二一喻陰相無生二一正示阿難是諸幻觸不從空來不從掌出冷暖本無二手相摩於空妄出故云幻觸二反破如是阿難若空來者既能觸掌何不觸身不應虗空選擇來觸若從掌出應非待合又掌出故合則掌知離則觸入臂腕骨髓應亦覺知入時蹤迹必有覺心知出知入自有一物身中往來何待合知要名為觸初破空生觸從空來必不應相摩而有故破云何不觸身言選擇者謂虗空選相摩之處而來觸也次破掌出凡從內出如鬚髮等未必待合今觸從掌出豈待合耶又掌下約出入破帶一轉計計云掌雖生觸必待合時此觸方出若爾合既觸出離應觸入必有等者恐謂入時人未必知故破云身中出入必有覺心知之此能覺也而所覺者自有一物往來此皆離時有覺豈待合耶以入之蹤迹乃離時所覺也掌入既非則掌出破矣二結虗妄離計是故當知受陰虗妄本非因緣非自然性前以幻觸喻受幻觸既破受亦隨破約四性推之非因緣非性中本有即非自然三摩觀照全是中道既約虗妄離計應屬但中然圓中亦豈遠乎三想陰二一立喻顯法阿難譬如有人談説酢梅口中水出思踏懸崖足心酸澀想陰當知亦復如是想以取相為義如乍遇一人以為親則歡愛之念生以為怨則忿恨之心起妄謂冤親自生想著如他人説梅而吾口水出自思懸崖而足心酸澀豈有實耶此以想譬想也二寄喻破執二一喻陰相無生二一正示阿難如是酢説不從梅生非從口入酢梅即酸梅也酢説能引水出似從梅生而實不從梅生水從口出似説從口入而實不從口入義海云以水喻想今推酢説説既不有水從何生二反破如是阿難若梅生者梅合自談何待人説若從口入自合口聞何須待耳若獨耳聞此水何不耳中而出想踏懸崖與説相類若酢説從梅而生梅合自談方是從梅何假于人此求説之來處不可得也若從口入與下若獨耳聞對看良由他人説梅吾口水出此説當從口入而口不能聞計口入者非矣此求説之入處不可得也若獨耳聞水非耳出此計亦非此求水之來處不可得也想之虗妄可勝言哉想踏懸崖者真際曰如是思踏非懸崖來非足心入若從崖來崖合自想何待人思若足心入足合自思何待心想若獨心思何故足心覺有酸澀二結虗妄離計是故當知想陰虗妄本非因緣非自然性四行陰二一立喻顯法阿難譬如瀑流波浪相續前際後際不相踰越行陰當知亦復如是行陰所該最廣如通大地心數有十謂想欲觸慧念思脫憶定受此十中但除想受餘皆屬行以其念念不住取喻瀑流飛泉懸水曰瀑蓋取急流之意前際後際喻生住異滅也二寄喻破執二一喻陰相無生二一正示阿難如是流性不因空生不因水有亦非水性非離空水二反破如是阿難若因空生則諸十方無盡虗空成無盡流世界自然俱受淪溺若因水有則此瀑流性應非水有所有相今應現在若即水性則澄清時應非水體若離空水空非有外水外無流二結妄離計是故當知行陰虗妄本非因緣非自然性問前之三陰皆以根境對明下識陰文云譬如有人亦約人説今行陰中直約空水其意何居答後十卷中行陰名同生基蓋自他依正同此行陰如爪生髮長筋轉胍搖密密推移曾無覺悟果成華落樹老藤枯運運遷謝無可見知即如瀑流亦無非行陰遷流之相故竟約外境而辨今此文四性具足水及水性為自為因以空為他為緣二法合為共離空外為無因然推流性而云因空者流非即水或從空生故須破之言因水有者義海云能有是水所有是流二相若殊今應俱在如樹生果果不是樹二俱現在今且不然破即水及離空水可解有指自然為無因生未必同也蓋性中本具稱為自然此與無因亦復小異然賴緣則必非自然矣五識陰二一立喻顯法阿難譬如有人取頻伽瓶塞其兩孔滿中擎空千里遠行用餉他國識陰當知亦復如是頻伽妙聲鳥也瓶形似之故有兩孔塞其孔則內空與外空別若合喻者古人云識陰無形在有情身如瓶擎空是也然識陰喻空者前行陰已通無情水流華謝皆是行陰今識陰離此生滅故如虗空而投胎之識其去後來先必在身中所以有擎空之喻十方虗空以喻真心一迷為識如瓶中之空內外一空喻真妄同體喻意最微不可不曉言塞兩孔者古注謂臨命終時諸根不通是塞兩孔今謂身諸根不能取境是塞一孔受想行心數不行又塞一孔唯有識在身內為滿中擎空千里遠行喻六道受生當知識之來往良由根身器界故經云瓶盛虗空千里遠行也用餉者餉饋也非餉而言餉耳既是饋送故下文有開孔倒瓶之言也他國者喻捨身受身現陰為此國中陰生陰悉如他國吳興云以人喻業以瓶喻身以空喻識人擎瓶空而行猶業持身識而去他國者六道依報也夫捨身受身時實無往來而似有往來乃識陰之相非餉言餉亦是此意二寄喻破執二一喻陰相無生二一正示阿難如是虗空非彼方來非此方入前云塞其兩孔有彼方來之意故明虗空不從彼方來入此方當知虗空有三義一周遍義二無相義三無來往義識陰亦然體具十界是周遍義離行陰生滅是無相義三無來往義者如大經云若有善男子善女人善能修治身口意業捨命之時雖無親族取其尸骸或以火燒或投大水或棄冢間狐狼禽獸競共食啖然心意識即生善道而是心法實無去來亦無所至直是前後相似相續相貌不異即此意也二反破如是阿難若彼方來則本瓶中既貯空去於本瓶地應少虗空若此方入開孔倒瓶應見空出今日指前日之瓶稱為本瓶彼方之地為本瓶地又開孔倒瓶不見空出則謂來入此方者謬矣合喻者如從天宮來生人間是從彼方來天身中識已離彼方似本瓶中貯空去也如是則天宮應少一識然識體元遍豈遺天宮則謂從天宮來者妄也又若天宮之識變為人識同此方入諸識重復取境是開孔心王同前四陰緣境是倒瓶然天宮識何嘗攜至人間人間之識本來具足則謂天識來至人間亦妄見耳總之彼處有空此處亦有空不借彼方之空而為此方之空故空無出入人天之識元皆具足不借天宮之識而為人間之識故識無去來空尚不相借而況識乎二結虗妄離計是故當知識陰虗妄本非因緣非自然性識之來往良由根塵即因緣謂性中自有此識是自然離此二邊即是中道上來五陰在二十五圓通中一一須破故先言之
