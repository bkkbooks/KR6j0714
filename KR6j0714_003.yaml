body:
  text: 二會六入四科通名會者即會陰入諸法以歸本如來藏妙真如性此經既歷三時至法華後則今文正同般若會八十一科皆摩訶衍性也彼部稱摩訶衍則無法不藏何異今之本如來藏而今經四科足該八十一也然據今經章章皆用四句推破似但入空而諸法咸會又即從空出假一一皆本如來藏詎非圓中妙旨乎是章章皆顯圓融三諦也若據次第酬請此文正是覆疎倒入從空出假葢自行一門亦足欲度眾生須於二十五門一一諳練方能知病識藥應病與藥如自於耳根入道而眾生有眼根之機不可使其定入耳根故須徧習諸法則可應無窮之機也然此中正意在圓旁兼出假假亦圓融所攝大經云譬如金剛若在日中色則不定金剛三昧亦復如是若在大眾色亦不定是故名為金剛三昧今經亦然據佛性五名首楞嚴三昧亦名金剛三昧以此文圓融行布兩不相礙正是金剛三昧不定之相前奢摩他中帶權說實其意亦爾前文帶藏通別尚入圓旨況今文惟常別乎文中二十五門即是預說二十五圓通之相下文諸聖皆是依此文修證而已然界入可該七大七大亦可該界入故於界入後約七大明中文旨互通而如來藏則無別也六入中一總徵復次阿難云何六入本如來藏妙真如性央掘經云所謂彼眼根於諸如來常了了分明見具足無減修所謂彼耳根於諸如來常了了分明聞具足無減修乃至意入亦如是大品云六自在王性清淨故是故六入皆如來藏妙真如性此句乃文旨所歸若據下文所說祗用四句推檢破因緣自然四句推檢似但入空破因緣自然是中道雙非之旨而意顯如來藏妙真如性遮照咸該故今首句是文旨所歸也梵語鉢羅吠奢此云入亦云處大塵所入之處也亦是識生處故然根塵二法俱識生處今分六根別破故惟以根為入也問所云妙真如性為亡泯諸相故名妙真如性乎為是性具六入故名妙真如性乎答亡泯是真空性具是妙有此二不二方是中道然至下文七大始明性具今文引而不發而意則無不該矣二別示六一眼入是阿那律陀悟處依溫陵釋分文為三蓋理長即用無彼此之分也一依真起妄阿難即彼目睛瞪發勞者兼目與勞同是菩提瞪發勞相此重指前色陰之喻也目睛即前清淨目因瞪發勞別見狂華目以譬真勞以譬妄狂華以譬色陰在前文中但是能喻至今兼目與勞復為所喻而目喻以瞪發勞相不但勞自勞而目亦勞故云兼也因對菩提則目與勞兩重皆妄然今文是帶法立喻菩提是法瞪發勞是喻若言菩提如清淨眼目之與勞皆如瞪發勞相則法喻全矣由菩提二字取喻淨目則現今淨眼亦退居空華之位恐人執前淨目為真故并斥之然此文乃會妄歸真之意似云目之與勞皆是菩提其所以成目勞者以由瞪發勞耳若全妄即真則目勞即菩提矣二辨妄無實又二一約世諦假立前阿難舉四緣生見佛言我說世間諸因緣相非第一義今明因塵有見此世諦也下文約四處推窮即第一義也因於明暗二種妄塵發見居中吸此塵象名為見性此見離彼明暗二塵畢竟無體性本無塵亦無對塵之見由迷真性初發明暗二塵因粘湛體而發眼見所發之見乃真妄和合之見也性本真為妄塵所粘是妄故云真妄和合能統明暗故曰居中幽溪云因於明暗二種妄塵者由塵發知也吸此塵象者因根有相也吸字與磁石吸鐵義同磁石本為鐵母故稱磁母石直以氣分相同天性不異所以磁獨吸針不吸餘物今文六根亦復如是直是氣分相同故眼獨吸色成根而不吸乎聲等若根能互用則根塵一體而照用寂然又何言吸前明盲人矚暗則見暗不賴眼根今何兼吸二種答見暗雖不賴根而根亦可見暗故兼攝之以真妄和合故名見性言離明暗無見者如鏡照像像去則照不可得性覺雖明元無對塵之見其義亦然二明真諦無生如是阿難當知是見非明暗來非於根出不於空生何以故若從明來暗即隨滅應非見暗若從暗來明即隨滅應無見明若從根生必無明暗如是見精本無自性若於空出前矚塵象歸當見根又空自觀何關汝入文中先列四處不生何以故下釋四處不生非明暗來即非他生非於根出即非自生若根塵合生不可即非共生不於空生即非無因生破根生中言必無明暗者因避他生故云根生故必無明暗也若無明暗見精尚無由見精映色結色成根既無見精根不可得明矣空生中言歸當見根者歸者向內之義非歸本之義又空若自觀則無藉根故云何關汝入作此推撿者是明妄根無見四句求之不可得耳三了妄即真是故當知眼入虗妄本非因緣非自然性虗者實之對妄者真之偶蓋言真則實而妄則虗亦可云實則真而虗則妄前之四處悉明因緣不從因緣者謂不因四處而有見也性中雖無妄見而又必隨根塵之緣故非自然性如是則性離二邊無知無見不可思惟是為中道妙真如性矣若據後敘圓通陳那為首若據根塵識次第以阿那律陀為首那律是無眼人徧居首者表根塵識之宜破也近代交光有決定用根之說根若宜用則阿那律陀不應得圓通矣豈不與經旨相違耶後以陳那居首者以是佛初度弟子且順此方教體爾二耳入是觀音入圓通處為三一依真起妄阿難譬如有人以兩手指急塞其耳耳根勞故頭中作聲兼耳與勞同是菩提瞪發勞相古師解此文謂耳喻真性手喻無明真妄和合名塞等霅川云譬如者此乃假設其事曉訓令悟非取比況之義也下鼻舌等亦爾即中云耳本無聲因急塞故頭中作聲此聲是妄佛意以塞耳作聲之妄例同耳根之妄莫不皆然正是譬喻所以下句即云兼耳與勞等菩提如清淨眼耳之與勞皆如瞪發勞相復取此譬者今明耳根若不取喻於目根之妄何以知其如空華乎幽溪云不特頭中發聲為勞即因外聲有聞亦勞相也前因勞見華云喻色陰耳根是色故得引之二辨妄無實二一約世諦假立因於動靜二種妄塵發聞居中吸此塵象名聽聞性此聞離彼動靜二塵畢竟無體動靜二塵相待而有故名為妄因於二塵發起妄聞是由塵發知也故聞居動靜之中能吸二邊是因根有相也具此二義名聽聞性言聽聞者與下齅聞辨異後文約四處辨不生即相見無性同於空華也應知凡外不知因緣生法但總計見聞為我因迷世諦難入真諦今明聞性從妄塵有而塵又非一種是顯聽聞無實明此世諦入真有地言離彼二塵畢竟無體者是明聞性無我耳孤山曰耳聞動靜猶目覩明暗也諸經所說對聲有聞緣明有見今文了義靜亦名聞暗亦名見鼻聞通塞意知生滅亦復如是二明真諦無生如是阿難當知是聞非動靜來非於根出不於空生何以故若從靜來動即隨滅應非聞動若從動來靜即隨滅應無覺靜若從根生必無動靜如是聞體本無自性若於空出有聞成性即非虗空又空自聞何關汝入先標四處不生何以故下釋四處有生境不動靜一聞則一不聞以能生動靜有生滅故則所生之聞應有生滅也此破他生若從根生下破自生凡言根者以發識為義耳識生時能辨音聲高下是鐘是鼓然初對音聲時未辨鐘鼓指此為根可以發識故後文云但如鏡中無別分析今明離塵并無根體何可言生若於空出下破無因生文中具性相二空之義前後皆爾不從四性是性空空亦不可得是相空也三了妄即真是故當知耳入虗妄本非因緣非自然性如上根境及空皆不能聞應是聞性能聞而聞性中本無根塵之妄安有此聞是不從四句因緣而有聞也聞性又必隨緣故非自然如是雙遮即兼雙照菩提從此顯矣三鼻入是周利槃特迦悟處分為三一從真起妄阿難譬如有人急畜其鼻畜久成勞則於鼻中聞有冷觸因觸分別通塞虗實如是乃至諸香臭氣兼鼻與勞同是菩提瞪發勞相譬如下先明勞相因觸下次明鼻相兼鼻下雙結虗妄畜者縮也吸也呼則熱而吸則冷冷熱皆觸今畜久但聞冷觸者葢鼻之為用全賴乎息故出則取香而入則嗅香任其出入則不名勞今禁其出入禁之且久自成勞矣冷熱乃呼吸之分今因畜久無別香臭但有冷觸姑借之以顯鼻根勝義之所依不得謂是身根所對之塵也即中云冷觸本無因久畜有足知其妄可通譬鼻根皆妄故先舉之次通明鼻相通塞虗實槩論鼻根所對不但就畜鼻言也於呼吸中通則虗而聞塞則實而不聞通中能辨諸香臭氣正是鼻根之用上文急畜等明鼻依於息因觸下明息依於鼻也兼鼻下雙結者上急畜等但舉勞相通塞虗實槩舉鼻相人但知畜久為勞不知鼻亦是勞以菩提之體本無名相而勝義名清淨四大肉鼻為浮根四塵如雙垂爪豈無相之理乎其為勞相無疑矣大經云因滅是色獲得常色今文亦然滅此勞相菩提自顯下文推破鼻入正意在顯菩提也二辨妄無實二一世諦假立因於通塞二種妄塵發聞居中吸此塵象名齅聞性此聞離彼通塞二塵畢竟無體文具三假因者因成假也通塞是相待假吸此塵象是相續假鼻聞香臭而云因於通塞乃鼻根之大端也言離塵無體者是空前之假也空後徧習故云倒入二真諦無生當知是聞非通塞來非於根出不於空生何以故若從通來塞則聞滅云何知塞如因塞有通則無聞云何發明香臭等觸若從根生必無通塞如是聞機本無自性若從空出是聞自當迴齅汝鼻空自有聞何關汝入因通而知香臭則聞似從通來便不應知塞因塞而知不香不臭亦謂之聞此聞從塵來又不應知通吳興曰機者弩牙也根有發聞之義故取譬之次破空生前則聞境歸則鼻根又空自有聞此鼻何用此中不但破四性亦破四相即於問香臭時鼻根叵得故名即空在通教中亦用此方便而今意為顯如來藏性即不止於通別教複疎倒入正是今義而今意為顯圓又不止於別意雖在圓不妨兼別三了妄即真是故當知鼻入虗妄本非因緣非自然性鼻入虗妄已不可得何可論其因緣有因尚不可況自然乎二卷文云精覺妙明非因非緣亦非自然今云鼻入虗妄非因緣自然其義一也四舌入是憍梵鉢提悟處文分三一從真起妄阿難譬如有人以舌䑛吻熟䑛令勞其人若病則有苦味無病之人微有甜觸由甜與苦顯此舌根不動之時淡性常在兼舌與勞同是菩提瞪發勞相䑛上紙切時上聲以舌取食物也熟䑛是舌家勞甜苦是舌家勞相甜苦本無因熟䑛有故知是妄以譬舌入之妄無不皆然言兼舌者遇淡苦物知是淡苦是舌入體人謂非勞然亦與勞同妄也二辨妄無實又二一約世諦假立因甜苦淡二種妄塵發知居中吸此塵象名知味性此知味性離彼甜苦及淡二塵畢竟無體甜苦合為一種淡為一種故云二種淡是不動何稱為妄因甜苦顯皆名妄也大凡二法能生一法塵既有二是生舌知二生一明矣能統二邊名為居中言離塵無體者以屬二故兼賴二塵畜一尚不能立況離二乎二約真諦無生如是阿難當知如是甞苦淡知非甜苦來非因淡有又非根出不於空生何以故若甜苦來淡則知滅云何知淡若從淡出甜則知亡復云何知甜苦二相若從舌生必無甜淡及與苦塵斯知味根本無自性若於空出虗空自味非汝口知又空自知何關汝入或云舌知元雙從苦淡而來今列中言非甜苦來者謂不但從甜苦來耳非與甜苦為交涉也釋云若專從甜苦來則不應知淡既知淡味豈與淡無涉乎既亦從淡來則不從甜苦來審矣如人自力能舉石何賴他人若賴他人共舉俱自無舉石之力故石雖被舉非實有能舉者也如是而云未嘗舉石豈直不舉石耶此釋亦有義然細研文意是明甞性能知而甞性中元無妄法亦無此甞味之知故云不從因緣生耳據彼所釋乃是共生故不可也若從舌生等者以避他生故計自生故必無甜苦等也補遺曰虗空自味至何關汝入四句似乎相濫應知上二句明味塵下二句明舌入以其味而言之虗空自味非汝之味故云非汝口知以其根而言之虗空自知非汝之知故云何關汝入上句對味以辨根故云知耳此文中以知為根其意甚明三了妄即真是故當知舌入虗妄本非因緣非自然性因緣總不能生故非因緣雙離因緣自然即是中道五身入是畢陵伽婆蹉圓通文分三一從真起妄阿難譬如有人以一冷手觸於熱手若冷勢多熱者從冷若熱功勝冷者成熱如是以此合覺之觸顯於離知涉勢若成因於勞觸兼身與勞同是菩提瞪發勞相初譬如至離知約離合觸以顯身覺次涉勢下結成勞觸以例身入冷熱是觸覺是身根如是者承上之詞合者兩手合也觸謂冷熱二觸謂兩手合時所覺冷熱之觸也合覺對離知說人身離則不知今因合中有覺對顯離時應知若不相涉即是離也謂對顯不相涉時知其無冷熱相觸耳離合俱觸猶動靜俱聞明暗俱見之意次文云涉勢若成因於勞觸者上未云勞此結成勞觸亦獨舉勞觸以例身觸勞觸者觸之久也冷熱相涉兩無定勢足其知妄身根之妄亦然菩提如清淨眼身之與勞兩重俱是瞪發勞相身根之勞若不取喻於眼根之勞何以知其如空華乎二辨無實二一約世諦假立因於離合二種妄塵發覺居中吸此塵象名知覺性此知覺體離彼離合違順二塵畢竟無體身根因何而有由於離合二塵覺是身根違順即離合中之違順故惟二塵而已覺苦即是違覺樂即是順或云因離合有二故下文云非離合來因違順有二故下文云非違順有因離塵無體故下文云不於根出竊謂不然文意總明根塵無知下文特借離合破非謂離合共能生覺根塵亦爾若墮共生非佛意矣二約真諦無生如是阿難當知是覺非離合來非違順有不於根出又非空生何以故若合時來離當已滅云何覺離違順二相亦復如是若從根出必無離合違順四相則汝身知元無自性必於空出空自知覺何關汝入文中先標不生次釋不生言云何覺離者特借離當已滅顯合不能生覺非謂共能生覺也破根生中云四相者塵則惟二相即有四離合是二相合中有違順又是二相據離一合雙之語離中無違順明矣問五陰三科雖標如來藏性然文明觀法但頻出性相二空何以見如來藏乎答世諦是立真諦是破若作意破立屬前二觀若任運破立屬中道觀如纓絡經云二觀為方便得入中道第一義諦觀止觀解此文云初觀破假次觀破空此之二空為雙遮之方便初觀用空次觀用假此之二用為雙照之方便輔行釋止觀文云由前異時雙亡方便今入中道任運雙亡由前異時雙照方便今入中道任運雙照據止觀記此言故知任運遮照即是中道空假破立其理不異今所以結歸於如來藏者以作意之遮照當入任意之遮照耳三了妄即真是故當知身入虗妄本非因緣非自然性身入尚不可得何言因緣況自然乎即中云自然之言未必即指空生如二卷云我今觀此覺性自然非生非滅遠離一切虗妄顛倒似非因緣據此文安得謂從空生為自然乎今文指身根之覺不從四性來為自然耳六意入是須菩提悟寶明空海處分文為三一從真起妄阿難譬如有人勞倦則眠睡熟便寤覽塵斯憶失憶為忘是其顛倒生住異滅吸習中歸不相踰越稱意知根兼意與勞同是菩提瞪皆勞相初句勞倦則眠是意根勞相餘是意根所有之相故下結云兼意與勞同是菩提瞪發勞相若據常解六情昏昏曰眠委放四支曰睡今文眠屬意根勞相蓋肉團心形如蓮華上有七葉合即為寐開即為寤此勝義所依之浮塵根也幽溪云六入所破雖正在勝義而勝義所依又在浮塵如不動目睛瞪以發勞耳根勞故頭中作聲急畜其鼻畜久成勞以舌䑛物熟䑛令勞涉勢若成因於勞觸勞倦則眠睡熟便寤皆其事也故六浮塵根皆屬身根如下云寤寐二相隨身開合是也故知勞倦則眠睡熟便寤者意根所依浮塵之體也攬塵斯憶失憶為忘者意根之用也受寤受寐覽之失之意根之正體也憶之則生失之則滅又寤為生寐為滅兩間名住前後名異是為顛倒生住異滅即中云初句是勞相寤寐二種是肉團根相憶忘生住異滅是意家之塵而覽之失之及吸習中歸則意根之相言顛倒者若論真如安有四相今有四相咸顛倒耳吳興曰寤則覽塵斯憶寐則失意為忘又睡中有夢寤中有忘皆是覽塵失憶之相憶之則生忘之則滅故下文云因於生滅二種妄塵也此二妄塵復為生住異滅四種細相吸習等者上來憶妄生滅已是意家所對之塵而復云中歸者乃是吸習塵象中歸意根以塵對根說耳釋要云意根是第七識梵語訖利瑟吒耶末那此云染汙意恒審思量名之為意相宗所說但能緣內計第八見分為內我若小乘但說一切諸法皆從六識建立不說七八二識然心亦多種相宗說七識為心根是不可見法非同色法可見勝義也然今經不論色與不色盡是菩提性中無明勞相皆同空華無體可得以是藏性故也補遺云孤山以記忘為習吳興意謂意根覽吸此記忘之相若學習然疑者謂生可吸習滅何可吸習即中云既稱為塵亦可吸習如善滅惡滅之類四相剎那不相踰越言兼意與勞者如人本不眠因勞故眠足知其妄意根之妄亦然二辨妄無實二一約世諦假立因於生滅二種妄塵集知居中吸撮內塵見聞逆流流不及地名覺知性此覺知性離彼寤寐生滅二塵畢竟無體孤山曰前舉四相此唯二者以生攝住以滅攝異而且以憶者為生忘者為滅據孤山之釋則生滅之言該前生住異滅寤寐憶忘八種法也皆是前塵悉屬所知生滅非一名集知居中五塵落謝影子皆意根所對故云生滅非一集是集起與前發見發聞等其意皆同吸撮皆取也內塵者非同前五照外境界故云內塵資中曰眼耳取外境界剎那流入意地從外入內名為逆流至第二念流之不及故云流不及地資中謂見聞是第一念意根吸取是第二念反是第一念所不及耳然古來解者多以憶之則生為見聞逆流失憶為忘為流不及地如會解釋良是地之一字通乎生滅之間憶忘二種皆覺知之性則此性該昏明之相也寤寐兼身根生滅惟是意根所對故雙舉之二約真諦無生如是阿難當知如是覺知之根非寤寐來非生滅有不於根出亦非空生何以故若從寤來寐即隨滅將何為寐必生時有滅即同無令誰受滅若從滅有生即滅無誰知生者若從根出寤寐二相隨身開合離斯二體此覺知者同於空華畢竟無性若從空生自是空知何關汝入熏聞曰非寤寐來破共生非生滅有破他生不於根出破自生空生破無因生熏聞意謂寤寐是意家所對之塵又帶浮塵根說則根塵共生也幽溪曰天如補註謂將何為寐令誰受滅為受二字當作知字予謂若改字其義反晦況既無寐不復有知不若為字其義為順蓋曰既隨寤滅將何人為寐者乎既隨生滅令誰人受滅者乎幽祖之言是也生即滅無者謂當生時滅相已無則知亦無誰知生耶破根生中云隨身開合者指肉團心元屬身根肉團開則寤而合則寐即勝義根亦托浮塵所以肉團勝義咸屬身根如是則竟無知覺故同空華離二體者謂離開合之二體也作此推檢者意明知覺必是覺性非關意根人謂意根能知是妄計耳根塵皆不能知而覺性隨緣方有意知然覺性實不從因緣生故經云根塵皆無知也不然豈人竟無知覺如木石乎前後諸文義皆如是如初卷云如是見性是心非眼據此則知見聞覺知皆是常住真心之用所以前明明暗根空皆不能見今文明根塵皆不能知總顯真性能見能知其義是同是知佛意原在言外令人自悟中論推檢其義亦然若竟謂無知即成斷滅見矣又覺性雖隨妄根妄塵能為見聞而覺性中本無妄緣安有見聞故見聞如幻畢竟叵得如此明空不落斷見三了妄即真是故當知意入虗妄本非因緣非自然性攬塵立根既皆無用故意入虗妄覺性亦不從因緣有故非因緣而覺性又必隨緣故非自然前云精覺妙明非因非緣亦非自然此不空之理也六入虗妄非因緣自然明入理之門也由門入理故二種非因緣自然其義元一三會十二處二一總徵復次阿難云何十二處本如來藏妙真如性雲臺寶網寂光四德普賢觀法身遍處琉璃光青光智性故皆如來藏也長水云處以生門為義六根六境是識生處根已破會今正會境然亦以根相對而破故雙問色生眼生等也孤山曰前六入破六根雖以塵對辨而五意在根今十二處雖根塵互破止破在塵後十八界雖根塵識三相對而破而正意惟在識耳即中云前五陰中全約喻比用破執情次六入中猶帶譬喻顯其妄相今十二處乃至七大即於現前見聞之境及近所目擊者示其藏性譬意是同故不更述二別示六一眼色處是優波尼沙陀圓通文分三一舉事徵起阿難汝且觀此祇陀樹林及諸泉池於意云何此等為是色生眼見眼生色相前六入中先立次破今汝且觀下亦先立也祇樹泉池舉目前所見色也問但舉所見云何稱立答前卷云以目觀見山河大地皆是無始見妄所成則所見不可得其義明矣今祇林是高泉池是下盡取一剎那中所見是立之為觀境耳色生眼見是由塵發知眼生色相是因根有相亦為所破者既有相見即須破除方顯如來藏也二牒執推破阿難若復眼根生色相者見空非色色性應銷銷則顯發一切都無色相既無誰明空質空亦如是若復色塵生眼見者觀空非色見即銷亡亡則都無誰明空色初破眼生色相中以根為能生色為所生見空非色者謂目更觀空空則非色此時能生之根既轉所生之色應消不但空自空而色亦空故云一切都無也但一切法相待而有色相既無何以顯空故曰誰明空質今空元從色顯眼根不能生色明矣空亦如是者應云若復眼根生空相者見色非空空性應滅滅色可見滅空何狀此義可了故佛言存略或譯者省之二破色生眼見中以色為能生見為所生此中亦以觀空破色謂所觀之空非色見離其母見當銷亡都無者指觀空觀色之見都無則正當觀空時誰明空之與色今既明空色則色不生眼見明矣三了妄即真是故當知見與色空俱無處所即色與見二處虗妄本非因緣非自然性色不能生見則見無處所見不能生色空則色無處所故云二處虗妄因色有見因見有色是因緣也不因色而有見不因見而有色此自然也二計俱離故眼色界即空如來藏性於茲顯矣二耳聲處是憍陳如圓通文分三一舉事徵起阿難汝更聽此祇陀園中食辦擊鼓眾集撞鐘鐘鼓音聲前後相續於意云何此等為是聲來耳邊耳往聲處桐洲云擊鼓以作眾撞鐘以靜之又擊鼓以報食辦撞鐘則眾來集前後相讀非齊出也二牒執推破阿難若復此聲來於耳邊如我乞食室羅筏城在祇陀林則無有我此聲必來阿難耳處目連迦葉應不俱聞何況其中一千二百五十沙門一聞鐘聲同來食處若復汝耳往彼聲邊如我歸住祇陀林中在室羅城則無有我汝聞鼓聲其耳已往擊鼓之處鐘聲齊出應不俱聞何況其中象馬牛羊種種音響若無來往亦復無聞初句牒計如我下破先立喻以佛喻聲城喻阿難耳林喻餘人耳佛入城中則林中無佛示同凡夫惟一色身也此聲下合若有來往聲即有限聲來阿難耳處則阿難耳中有聲如佛到城也目連迦葉耳中便無音聲如林中無佛今既俱聞則謂聲來耳邊非矣次破耳往聲處即將世尊歸林破之耳有來往耳聞亦復有限此中以佛喻耳以林喻鼓聲城喻鍾聲耳往鼓邊則鼓邊有耳如佛歸住林中也若鍾鼓相續不妨更聞鍾聲倘一時齊出耳必不能更到鍾邊是時鍾邊無耳如佛不在城況餘聲乎若無下破無來往謂聲不來耳耳不往聲聞義不立是則有來往固非無來往亦謬義不可定不可謂實有也三了妄即真是故當知聽與音聲俱無處所即聽與聲二處虗妄本非因緣非自然性耳往不可不往不可則聽處不立聲來不可不來不可則聲處不立非來往則非因緣非無來往即非自然因緣自然俱非何但即空義成藏性亦顯三鼻香處是香嚴童子圓通文分三一舉事徵起阿難汝又齅此爐中旃檀此香若復然於一銖室羅筏城四十里內同時聞氣於意云何此香為復生旃檀木生於汝鼻為生於空長水云此中但問境生之處不同前文根塵對破竊觀結文云香鼻與聞俱無處所是破根塵兩處而前文但從香破者正如古註云今十二處雖根塵互破正破在塵也四十里者謂四面各十里二牒執推破阿難若復此香生於汝鼻稱鼻所生當從鼻出鼻非旃檀云何鼻中有旃檀氣稱汝聞香當於鼻入鼻中出香說聞非義若生於空空性常恒香應常在何藉爐中爇此枯木若生於木則此香質因爇成烟若鼻得聞合蒙烟氣其烟騰空未及遙遠四十里內云何已聞文分三節初破鼻生雖帶鼻說實破香生處也初句牒稱鼻下正破稱汝下縱破設許汝鼻能生於香生義雖成聞義不立以但能出香不從外入而與鼻合則非聞也凡云聞者以入為義出非聞義次空生中云爇木有香共顯二義一非常住二非生空此以木生破空生也三破木生木既成煙若蒙煙齅香便得云從木生香今既不爾何云生旃檀木或云若生於木四十里內云何已聞是也擕李云此中義理稍難成立且鼻舌身三者是合中知也設四十里內聞香亦是香有殊勝之力其氣遠騰彼合知處久久方聞而言不待鼻蒙烟氣等甚與教相及現量相違今此釋者恐取聖人根力強利能速疾遠聞不取凡常鈍劣者說理實必須氣通於鼻方得成聞經中一往據麤顯邊似不到鼻故作斯破吳興云敏師一往之說其實然也若爾但是香有殊勝之力不須更取聖人根力強利也然合三離二是惟識法相後文亦云香以合中知俱舍不爾如玅樂二十八引俱舍云且六根中眼耳鼻三不假至者還依不至可見對眼可聞對耳有氣對鼻舌身二根須到了者依至變現今楞嚴所說香然一銖四十里內同時聞氣不須煙到鼻邊然後得聞與俱舍最合不必專據惟識以責經也張華博物志云漢武帝時西國遣使獻香四枚大如鷄卵漢制香不滿斤不得受後長安染疫使者奏請焚香燒一枚四十里間民疫病皆愈香有殊勝之力明矣律曆志云二十四銖為一兩今云一銖得四分一釐六毫六絲六忽三了妄即真是故當知香鼻與聞俱無處所即齅與香二處虗妄本非因緣非自然性香鼻與聞者鼻字牒上鼻生香字意牒空生木生皆破香處聞字破根故知前但破香處今雙破根塵二處也非因緣自然者香處不立破緣聞處不立破因若不緣鼻而有香不緣香而有鼻即自然也二邊既破中道即顯豈非如來藏性乎四味舌處是藥王圓通文分三一舉事徵起阿難汝常二時眾中持鉢其間或遇酥酪醍醐名為上味於意云何此味為復生於空中生於舌中為生食中二時大食小食時也眾中持鉢者謂同眾乞食酥酪醍醐名為上味遇必經心故獨舉之先舉空者求其生處而不可得疑從空生今文先標而後破也二牒執推破阿難若復此味生於汝舌在汝口中只有一舌其舌爾時已成酥味遇黑石蜜應不推移若不變移不名知味若變移者舌非多體云何多味一舌之知若生於食食非有識云何自知又食自知即同他食何預於汝名味之知若生於空汝噉虗空當作何味必其虗空若作鹹味既鹹汝舌亦鹹汝面則此界人同於海魚既常受鹹了不知淡若不識淡亦不覺鹹必無所知云何名味文分三節初破舌生若復句先牒在汝下破先一舌不知多味是約不變破先正破味既從舌生而口中只有一舌便只有一味古註云以味從舌味應無別是也若酥酪醍醐只成一味石蜜亦然混濫極矣黑石蜜者善見律云甘蔗糖也其堅如石若不下縱破設許味不變者味既不分何名知味次約變移破若變移者謂變移而又生於舌也舌非多體謂口中無多舌古註云以舌從味舌便應多是也既無多舌即止一舌而變移則有多味云何多味一舌之知意言一舌不能生多味耳次破食生亦先正破若謂味生於食而味由知有離知無味後文云必無所知云何多味則全以知為味其義明矣然食無情識而以為味生於食可乎云何自知言云何自知味之美也又食下縱破設許食能自知即非汝知雖非他食而義已同於他食矣此與汝何涉而名從味所生之知乎三破空生先勸噉空審味因計食中之味皆從空生則目今太空亦必有味須噉而審之必其下次約一味推破初句按定鹹味既鹹下明展轉成謬先通身是鹹繆舌面既鹹何但鹹面通身皆鹹故同海魚次惟鹹無淡謬遍界皆鹹則無有淡受此鹹者何由知淡三并不識鹹繆鹹淡相待無淡則不知鹹矣結云必無等者味由知顯不知則無味也三了妄即真是故當知味舌與甞俱無處所即甞與味二俱虗妄本非因緣非自然性味字破空生食生舌破舌生破外塵也甞字破內根觀下即甞與味之言則知舌味二字是專破塵明矣非因緣者非根則非因非塵則非緣若不因舌食空三處而有味塵亦不藉因緣而有內根是自然也因緣自然俱非藏性顯矣五身觸處是䟦陀婆羅圓通文分三一舉事徵起阿難汝常晨朝以手摩頭於意云何此摩所知誰為能觸能為在手為復在頭世尊尋常誡勅弟子一日三摩其頭口誦云守口攝意身莫犯如是行持得度世言此摩所知者如色香等雖不見不聞體是外塵今觸必待知而成塵故云此摩所知所知指觸塵也能觸指身根也又所知指冷煖澀滑等能觸即知冷知煖之身根故可以所為無知觸為有知云在手在頭者手是吾手頭是吾頭在手則手為能觸而頭為外塵在頭則頭為能觸而手為外塵義實難定故雙舉之又頭癢而以手搔之則能觸在頭手冷而就煖於身則能觸在手今晨朝摩頭非此例也問下破中有五段今何但舉二義答下文五段次第相生故但標初二義也二牒執推破若在於手頭則無知云何成觸若在於頭手則無用云何名觸若各各有則汝阿難應有二身若頭與手一觸所生則手與頭當為一體若一體者觸則無成若二體者觸誰為在在能非所在所非能不應虗空與汝成觸初二破在手在頭是破互有互無初若在句牒執頭則無知定也云何成觸破也若能觸在手頭則同於木石何以成頭之觸乎次番若能觸在頭手亦同於木石必不能舉手摩頭安得名觸是皆以能為有知所為無知耳三破各有初句立計謂頭亦有知手亦有知名各各有汝則句破也能知是身根故破應有二身也四破一觸初若頭至所生立計二身既破須計一觸一觸者謂頭與手止在一身安有二觸生起故云一觸所生則手下定若一下破既名一觸是手與頭當粘著而為一體一體則觸不成矣一體既窮還計二體故更破二體此中體則有二觸惟是一體雖有二而又不得同上之二身以帶有一觸之義故觸雖是一而又不同上文一觸所生以頭手畢竟成二之故則知觸者必屬一邊故問觸誰為在謂在手耶在頭耶次破中云能所者即頭手也在能者頭亦可為能手亦可為能而在頭之能則不在手之所在手之能則不在頭之所在所者頭亦可為所手亦可為所而在頭之所則不在手之能在手之所則不在頭之能須知觸誰為在與初二破不同前對所論能能為有知所為無知今知通能所而在能則非所在所則非能以一觸必有所屬故也問前既以所為無知何前後相違耶答初二破中對能論所所為無知無用元是破辭不可定執今以頭手相對則知又通能所觀第三破中云各各有故不定以所為無知矣又能所之名亦通頭手不定以頭為能觸也次破空者既在頭不可在手不可應是頭手中間有空成觸故須破之初二破頭手可當自生他生三各各有去是破共生今破空是破無因也三了妄即真是故當知覺觸與身俱無處所即身與觸二俱虗妄本非因緣非自然性結中言覺觸者因覺名觸故曰覺觸頭手相對不知何者是外塵是無觸處不知何者是內身是無身處二處及空俱不能定能所是非因緣若天然有身不藉觸顯天然有觸不賴身顯是自然性情計俱離如來藏顯六意法處是摩訶迦葉圓通文分三一舉事徵起阿難汝常意中所緣善惡無記三性生成法則此法為復即心所生為當離心別有方所幽溪曰意根為能緣善惡無記三性為所緣意中所緣等者雖標所以彰能實棄能以顯所也生成法則者法法塵也則矩度也如伏羲以八卦而矩度萬物乃天然矩度不加勉強意之所緣何翅河沙善惡無記三性攝盡乃生成之法則非塵外之強名也溫陵以善惡為緣慮心無記為昏住心夫不屬善惡即名無記何定屬昏住乎二牒執推破阿難若即心者法則非塵非心所緣云何成處若離於心別有方所則法自性為知非知知則名心異汝非塵同他心量即汝即心云何汝心更二於汝若非知者此塵既非色聲香味離合冷熱及虗空相當於何在今於色空都無表示不應人間更有空外心非所緣處從誰立初破即心言云何成處者謂云何對心而成二處也二破離心先牒計雙徵知則下破有知知則名心此句是定離心有法法既有知亦名為心異汝下破也離心則異汝有知則非塵異汝是他故同他心即汝即心者防轉計也雖離於心而元即汝不是異汝雖離於心而元即汝心不同他人之心此句對上文說即汝對上異汝即心是非他心如是則汝有二心云何汝心更異於汝元來之心耶前已破即心今又破者前但破即心今破離中之即耳若非下破非知非知則與意根不同是意家所不攝宜屬外塵而又非五塵及空則法塵在何處耶今於下明無表示色空之內既無表示應在空外而人間豈有空外乎結中約離心說故曰心非所緣非色非心故曰處從何立又解上色空諸境無此法塵除非心是法塵而心非所緣何以成塵心境俱非法塵處從何立三了妄即真是故當知法則與心俱無處所則意與法二俱虗妄本非因緣非自然性上明法處即心離心義俱難定則法處虗妄意根之妄亦然若因心有法因法有心謂之因緣離心有法離法有心謂之自然二計俱非如來藏顯上來十二處俱破意顯有相對待之法莫非虗妄惟絕對待色心不二之法乃為真實因緣自然俱非即中道也四會十八界二一總徵復次阿難云何十八界本如來藏妙真如性以法界對法界起法界故皆本如來藏妙真如性也溫陵曰根境識三各六分內外中為界長水云梵語䭾都此云界界是因義根境識三互為因故又種族義根境識三各一種族又眼等六種族別故幽溪曰因界者因之為界也如經云此識為復因眼所生以眼為界因色所生以色為界然則雖曰十八義惟成六以曰此識故也前孤山云十八界雖根境識三相對推破而正意惟在六識厥旨顯然若以族釋界則根境識三各有種族十八之義仍顯孤山又曰本如來藏者妄執既破藏性即立故此一經原始要終皆即破即立雖或偏破而未甞不立雖或偏立而未甞不破文有出沒旨常圓備破即空也立即假也破立相即即中也以此中文意雖修從空出假之觀而意在圓融不過兼別而已故首標如來藏性五陰三科其義咸爾二別示六一眼識界是舍利弗圓通文分三一指解徵起阿難如汝所明眼色為緣生於眼識此識為復因眼所生以眼為界因色所生以色為界霅川曰如汝所明者小乘所解因緣生法皆是實有不了即空今據彼詰之用破其執也他皆倣此即中云阿難是初果人見因緣而悟道故云如汝所明也外典言一生二夫一則不生豈能生二今明眼色二法生識之一法此世間現見內教所以異於邪宗者在此二牒執推破三一破以眼為界阿難若因眼生既無色空無可分別縱有汝識欲將何用汝見又非青黃赤白無所表示從何立界獨因眼生則定不用色空既無外塵識為可癈言識無用者欲顯其不能立界也如國家任人必其有用然後立之無用不立今識亦然汝見下明單根無色真際曰汝見指根也是不可見有對色非青等色故不可見能照境發識故有對此是勝義根非浮塵根既不可見即無表示即中謂汝見非青黃赤白者謂汝見雖現在前如前云此見周圓是也但見非青黃赤白有何表示則不能生識矣二破以色為界若因色生空無色時汝識因滅云何識知是虗空性若色變時汝亦識其色相遷變汝識不遷界從何立從變則變界相自無不變則恒既從色生應不識知虗空所在交光云文意明變與不變皆應不識空皆應不立界而交錯成文前以從變為不識空而後以不變為不識空前以不變為不立界而後以從變為不立界其說是也於中初約識滅破既從色生空現色亡識應隨滅云何識知虗空所在二約識不遷破若當色變而汝元識其變則汝識不遷明矣但此識本從色生既無色相從何立界三從變不成界破識從色變則識亦遷變若對虗空更無有識是不但不遷無以立界而從變亦無界相也四不變不知空破從色而生祗應見色名之為恒是不但識滅不能知空即識不滅亦不能知空也上四節皆破色不能生從無而有豈得認識為實有乎三破眼色共生若兼二種眼色共生合則中離離則兩合體性雜亂云何成界合則中離離則兩合者交光所解不如舊釋仁菴云約離合論無中位也合則中離者言此識半合於眼半合於色而中位離矣離則兩合者承上句而言謂中體既離兩屬眼色祗成兩合有何中位其說與舊解大同孤山曰體性雜亂者謂根境兩屬乖種族也三了妄即真是故當知眼色為緣生眼識界三處都無則眼與色及色界三本非因緣非自然性眼識界如文所破既無中界內外不成前文云眼色為緣生於眼識是界緣也不因眼色即屬自然根境例之問眼識名識界何也答單根不能生識對色生識故名識為色界後文例之二耳聲識界是普賢圓通分文為三一指解徵起阿難又汝所明耳聲為緣生於耳識此識為復因耳所生以耳為界因聲所生以聲為界又汝下指解此識下徵起二牒執推破三一破以耳為界阿難若因耳生動靜二相既不現前根不成知必無所知知尚無成識何形貌若取耳聞無動靜故聞無所成云何耳形雜色觸塵名為識界則耳識界復從誰立古人以此文配勝義浮塵二根其說最是但若取耳聞等不必即破浮塵當取耳形為浮塵耳初明耳勝義根因動靜而有無塵則根不立必無所知者判定離塵則根必無知也根尚無知何能生識若取下破轉計計云動靜二相不現前時不能生識今取耳正聞時應能生識此是共生正意是從根生破云耳正聞時聞根元賴動靜而有無塵根亦不立安謂根能生識乎云何下正破浮塵根故云耳形然耳形雖屬耳根尚雜色法所對即是觸塵宜屬身根何能生耳識耶則耳下雙質二根也二破以聲為界若生於聲識因聲有則不關聞無聞則亡聲相所在識從聲生許聲因聞而有聲相聞應聞識不聞非界聞則同聲識已被聞誰知聞識若無知者終如草木聲能生識何假於聞此亡根也若無有根聲亦不有此亡境也根境俱亡識從誰生識從下防轉計也謂識必從外聲而生而內聞亦不可缺此似共生正意在從聲生以上文云無聞則亡聲相所在故今須有聞方有聲相破云聞應聞識者謂耳根應聞此識也識得聲之氣分識亦有響故是可聞不聞非界者謂若不聞識識界安在若果聞識識即有響便同外境識已被聞者被字上聲識已成無情之法對根而為所聞夫識心了然方知己之聞聲今識化為無情誰知根之聞此識耶若無知者聽而不覺雖有聞根如草木耳三破耳聲共生不應聲聞雜成中界界無中位則內外相復從何成單根單境既不生識或計根境共生但有情無情種類各殊豈得雜成中界中位是根塵和合之處若無和合則根境不相到何內外之有三了妄即真是故當知耳聲為緣生耳識界三處都無則耳與聲及聲界三本非因緣非自然性如上所破中及內外義俱不立故三處都無豈得約都無而論因緣又約都無而論自然是計夢境為實有也二邊俱非如來藏妙真如性由茲顯矣三鼻香識界是孫難陀圓通文分三一指解徵起阿難又汝所明鼻香為緣生於鼻識此識為復因鼻所生以鼻為界因香所生以香為界鼻香是二法生識是一法所生惟一故叩其因鼻因香也二牒執推破二一破以鼻為界二一立徵阿難若因鼻生則汝心中以何為鼻為取肉形雙爪之相為取齅知動搖之性肉形即浮塵根齅知即勝義根下文因肉鼻無在是勝義難安二推破二一約浮塵根破若取肉形肉質乃身身知即觸名身非鼻名觸即塵鼻尚無名云何立界初句牒計據世間人皆謂肉形為鼻耳肉質下破其所取之謬鼻之肉形元附於身故肉質乃身若取其塵便是寒煖痛痒之類豈非觸乎即觸等者上二句明其所取今二句明其所非以身奪鼻以觸奪香名無兩屬故俱非也觸即身塵故曰即塵據其所取尚失鼻名況其實耶二約勝義根破若取齅知又汝心中以何為知以肉為知則肉之知元觸非鼻以空為知空則自知肉應非覺如是則應虗空是汝汝身非知今日阿難應無所在以香為知知自屬香何預於汝若香臭氣必生汝鼻則彼香臭二種流氣不生伊蘭及旃檀木二物不來汝自齅鼻為香為臭臭則非香香應非臭若香臭二俱能聞者則汝一人應有兩鼻對我問道有二阿難誰為汝體若鼻是一香臭無二臭既為香香復成臭二性不有界從誰立初句總牒取齅知即取勝義根也次句徵起以肉下破中文分四節初破以肉為知言以肉為知者前文若取肉形是但取肉今取肉形而具齅知之性也據世人意孰不以肉鼻為能聞而豈識其謬耶既從肉取知則仍取肉上之知故云元觸非鼻次破以空為知空者鼻中倒垂之空也此中墮根不能覺之過如是下推廣其說鼻空有知則一切虗空皆應有知故云虗空是汝鼻肉無知則徧身皆無知故云汝身非知孤山云言空是汝則不見形言身是汝則不能知兩求不得則無所在其說是也三破以香為知上因世人皆以肉鼻為知故破肉知除肉惟空故破空知今或計香能發勝義則全賴此香故破以香為知與下香能生識不同意謂以香為知則離香無知故知自屬香也四破香臭生鼻此因上第三破而生轉計計云非不相關香臭到鼻鼻知香臭餘處不覺故香臭生鼻此計似以香臭共鼻能生而生處在鼻所云必者謂是肉是空鼻雖難定然必賴鼻也既云香臭生鼻則仍取勝義之知亦復宗歸鼻根耳則彼下破中文為五重一約流氣生鼻破流謂流動流動之氣不生於木而生於根何名流氣耶二二物不來破二物若來可云香臭生鼻苟俱不來鼻於香臭當何所屬若不來無有香臭則香臭不生於鼻明矣三香臭偏屬破香臭決不兩立縱許其香香則非臭臭必與香為二縱許其臭其義亦然此似約不來時說也四以根從境破謂鼻若不偏二俱能聞俱聞即是俱生故一人應有兩鼻復以人從根應有二人當以香者為阿難臭者為阿難耶五以境從根破因上破二鼻今計一人只有一鼻香臭皆從一鼻生復用一鼻聞是無二也臭既下破生香即是生臭聞香即是聞臭故長水云若無香臭說何為知名生識界問此文名破勝義何以為勝義耶答齅知是勝義之用人謂勝義附於肉形便知香臭是以肉為知破云若取身浮塵根即取身勝義不過肉之知耳其所知即是觸而非鼻勝義根所附既非能附豈是或謂勝義賴空取香是以空為知故復破空皆破勝義根也二破以香為界若因香生識因香有如眼有見不能觀眼因香有故應不知香知即非生不知非識香非知有香界不成識不知香因界則非從香建立既無中間不成內外彼諸聞性畢竟虗妄初句牒次破中先以眼見立例文有法譬合識因句是法如眼下是喻因香下是合知即下次以知不知對辨若曰能知則非香生若曰不知即不名識香非下明不知墮二種邊一香界不成過不以識而知香則香界何在二識界不成過識不知香是無有識而以為從香生識何耶既無下總結破也三了妄即真是故當知鼻香為緣生鼻識界三處都無則鼻與香及香界三本非因緣非自然性中間內外俱破則三處都無又前約浮塵勝義是破鼻根香塵不能生識是破香界即三處都無也三處相因是聲聞因緣之義若不相因是外道自然之計二義俱破如來藏顯四舌味識界是富樓那得圓通處文分三一指解徵起阿難又汝所明舌味為緣生於舌識此識為復因舌所生以舌為界因味所生以味為界二牒執推破四一破從舌生阿難若因舌生則諸世間甘蔗烏梅黃連石鹽細辛薑桂都無有味汝自甞舌為甜為苦若舌性苦誰來甞舌舌不自甞孰為知覺舌性非苦味自不生云何立界破中先約五味破問此文辨從舌生識何先破從舌生味耶答識從舌生則不從味生無味何由生識故先從舌生味而後可云從舌生識言都無有味者謂味不從物生惟從舌生也因舉無五味以問舌根謂諸味不來之時舌作何味次舌性苦者但舉一味為例誰來甞舌者謂能甞之根已為所甞之境更無他物來甞舌也舌不自甞者謂舌根又不能自甞也兩句自他相對皆不能甞孰知覺其苦乎次破非苦者謂味必從舌生而舌又無味味自不生矣既不生味則不生識二破因味生若因味生識自為味同於舌根應不自甞云何識知是味非味又一切味非一物生味既多生識應多體識體若一體必味生鹹淡甘辛和合俱生諸變異相同為一味應無分別分別既無則不名識云何復名舌味識界初句牒次破中分三初引例無知破識從味生識即有味如父姓張子亦姓張也同上若舌性苦舌不自甞豈知是苦非甜乎二又一切下以心從境破如前五味各從一物而生識既從味生亦應多體是識從於味識即成多也三識體若一下以境從心破多體既破應計一識而此一體必由味生是則多味而入一體便成一味識生之時必無分別謂縱在異時先鹹後苦名為異時亦無分別豈成識乎又云何名舌味所生之識界耶吳興云鹹淡甘辛略舉四味詳則有六更加苦酢言和合者眾味共成也俱生者本性不易也變異者燒煑異本也三破虗空生不應虗空生汝心識上明舌不能生味不能生應是虗空所生而虗空自不能生識也四破和合生舌味和合即於是中元無自性云何界生破和合者若和合生則所生識全是舌之與味安有自性既無自性便無識界交光曰無性者無兩開各自之性也又云云何界生者言根塵既已合一尚無自性豈有中間空隙以容識界之生乎然無性之言教家常用如斯之解實所未見良由交光平日不用四性推簡以觀其心故茫昧如此孤山曰初因舌是破自生二因味是破他生三不應虗空是破無因生四舌味和合是破共生前後諸文皆爾此中最顯三了妄即真是故當知舌味為緣生舌識界三處都無則舌與味及舌界三本非因緣非自然性五身觸識界是優波離圓通文分三一指解徵起阿難又汝所明身觸為緣生於身識此識為復因身所生以身為界因觸所生以觸為界二牒執推破三一破以身為界阿難若因身生必無合離二覺觀緣身何所識必無合離者謂必不取合離二觸也初心在緣名覺細心分別名觀合離二觸是生覺觀之緣二破以觸為界若因觸生必無汝身誰有非身知合離者必無汝身謂必不取身根也徒觸不知故云誰有非身知合離者三破身處合離阿難物不觸知身知有觸知身即觸知觸即身即觸非身即身非觸身觸二相元無處所合身即為身自體性離身即是虗空等相內外不成中云何立中不復立內外性空則汝識生從誰立界初二句正明和合蓋觸塵與餘塵不同如色香等雖不見不聞亦得稱塵今觸必待知而後成故徒物不名為觸亦無有知待身知而後名觸是全以知為觸也知身下正破共生先定次破定中言知身即觸者如知冷煖在身即是知身而此冷煖即觸也言知觸即身者知受冷煖之觸即是知觸而此冷煖實在身也即觸下破既謂之觸則內相不成故非身既謂之身則外相不成故非觸所以下云內外不成須知界相既分內外恒別若相混則俱非矣言身觸無處者非身則身處不立非觸則觸處不立合身下雙破離合如上身知有觸皆就合說夫觸法有八痛痒輕重冷煖澀滑痛痒是風相輕重是地相冷煖是火相澀滑是水相凡合於身皆成自身體性所以身觸二處兩皆不立若就離說亦無二處何者色聲等雖離諸根元是外塵惟有觸塵離身不立即同虗空何名身觸故二處亦不立其義明矣上雙破離合竟下總結破如上若離若合內外兩皆不成內外不成則中無所顯故云中云何立中位即識也中既不立則根塵不相到而內外亦空矣則汝等者長水云三處俱空識從何立三了妄即真是故當知身觸為緣生身識界三處都無則身與觸及身界三本非因緣非自然性須知十八界中雖正破識亦兼破根塵如上初破徒身次破徒觸三破合離皆先破根塵以及於識所以結云三處都無也又佛明陰入處界諸文悉是止觀行人須依教以觀其心今生必不空過若但消文正如止觀云黑蚖懷珠何益於長蛇者乎六意法識界是目連尊者圓通文分三一指解徵起阿難又汝所明意法為緣生於意識此識為復因意所生以意為界因法所生以法為界若云從因緣生皆是無常則就聲聞所明已是析空之道析空即無常也但未明無常即空況即假中故今徵起為顯三諦在一心中令當機入如來藏耳二牒執推破二一破以意為界二一約法有無破阿難若因意生於汝意中必有所思發明汝意若無前法意無所生離緣無形識將何用必有所思者謂汝意中必有所思之法塵然後顯發其意根之用若無現前所緣之法塵則意亦無從生起如前耳識界中文云動靜二相既不現前根不成知今亦例之離緣等者長水云尚無根之形貌況所生識將何起用二約識同異破又汝識心與諸思量兼了別性為同為異同意即意云何所生異意不同應無所識若無所識云何意生若有所識云何識意惟同與異二性無成界云何立此文亦破意生俱舍云集起名心籌量名意了別名識今文識心同彼第一思量同彼第二即意根也兼了別性同彼第三即意根所生之識也長水云識心第八也思量第七也了別第六也七八二識俱第六根亦同名意故此雙問此解與今大同同意下破同異也若識同意意既明了識亦明了則識亦可稱意方將成一體之義豈得謂根為能生識為所生故同則不成能所也若識異意種類不同則所生應無所識故異亦不成意識若無下更明同異皆不可說不但異不成意識意既明了所生何得頑愚故異乃必無之事不但同不成能所識既與意同其明了云何有識與意之異故同乃必無之事所以下即云惟同與異二性無成如是則識界云何可立耶海印師云據上必有所思而推之者是將三義而合辨之也識心者即意根也諸思量者即塵境也了別性者即識體也由有所思之相方成意根之知所以將是三事而合辨之其說亦是二破以法為界若因法生世間諸法不離五塵汝觀色法及諸聲法香法味法及與觸法相狀分明以對五根非意所攝汝識決定依於法生今汝諦觀法法何狀若離色空動靜通塞合離生滅越此諸相終無所得生則色空諸法等生滅則色空諸法等滅所因既無因生有識作何形相相狀不有界云何生先約外五塵破初法字指法塵諸法下皆指五塵為法非意所攝者如上諸塵非意根所能緣也若是則法塵果何在乎汝識下次正約法塵破言決定依法者計謂不緣五塵所以決定依於法塵故使諦觀法塵之法有何相狀若離下此文正指五塵生滅以為法塵蓋念前五塵即謂之生不念則滅如前云覽塵斯憶失憶為忘註云憶之則生忘之則滅是也如此生滅不過五塵影子而已越者超於外也此諸相者五塵影子之相也此二句義似重疊然若離句雖總舉六塵而意重於生滅次句云諸相單指意根中五塵影子以生滅中有前五塵落謝之相其相最多故再言之生則下明法塵無實念前五塵則謂之生豈更有別法生乎不念則滅豈更有別法滅乎夫諸法如影所以諸法皆空今法塵元是影事有何實體所因下明生識亦無所因之法塵既無因之生識復作何狀則識界不能立矣三了妄即真是故當知意法為緣生意識界三處都無則意與法及意界三本非因緣非自然性文自五陰來皆云本非因緣非自然性夫非因緣生法則非有若法離因緣即自然性而法性必隨諸緣則非自然是非無非有非無是中道義又有義者離有則入空離空亦可入假入假是覆疎倒入正是別教之義所以自五陰來皆具圓別二教雖具圓別二教正意在圓故此文名諸三摩提又首標如來藏妙真如性也三約中道了義酬禪那以明圓理此文明七大廣顯性具觀性具者不同但空亦異但中觀但空者觀法不從自他共離生性相俱空妄法非有真亦叵得今性具之理遠取諸物近取諸身法法圓融塵塵周徧故與空不同也觀但中者觀常住真心離因緣自然不可以智知不可以言議然不具法故名但中今性具之理遮照咸備雖具而空雖空而具故與但中不同也溫陵云大性先非水火亦非空識全一如來藏體循業發現而已七大既爾萬法皆然凡我依正先非根身亦非器界皆即循業之相性真圓融初無生滅幽溪曰溫陵此語雖本諸經文後之閱者要知先非之義不則幾同偏教矣蓋言七大之性非如世間水火有互相陵滅之相不無性具之理如云性色真空性空真色等皆性具中明文了義故知天台一宗深談性具與佛誠言同示一律即中云輔行二十卷云一家教門永異諸說該攝一切十方三世若凡若聖一切因果者良由觀具具即是假假即空中理性雖具若不觀之但言觀心則不稱理又釋籤解能觀心性名為上定云若以心性觀彼界如界如皆空常具諸法非空非具而空而具雙遮雙照非遮非照亦秪是一念心性而已如斯之定詎不上耶由荊溪二文觀之具之與空二義一體故幽溪深明性具誠得佛旨而溫陵亦無失也以此答禪那者梵語禪那秦言靜慮靜即空也慮即假也空假不二正是中道故今明中道了義是答禪那有何惑哉問具既是假何約此以論中乎答具是中道中之假法以中道中元具三諦性具之假即第一義空方是中道今文亦非但明性具如經云性色真空又云清淨本然夫清淨則無一法可得豈非第一義空故今中道了義是圓融三觀之道也文分二一疑請阿難白佛言世尊如來常說和合因緣一切世間種種變化皆因四大和合發明云何如來因緣自然二俱排擯我今不知斯義所屬惟垂哀愍開示眾生中道了義無戲論法幽溪云如來常說和合因緣者即前引楞伽經中所演彼外道等常說自然我說因緣非彼境界也因緣而言和合者因親緣疎二法和合而有生也種種變化者有情則生死死生無情則變生作熟化有為無等不出地水火風四大世相無他惟此而已此昔日以因緣破自然之正談夫以正破邪則邪去而正留今日二俱排擯未知斯義所屬即中云二俱排斥自屬中道雙遮之義聞者未達圓旨不知不變隨緣故云不知斯義所屬如下七大文中深明不變隨緣得此則義有所屬矣又不變隨緣是雙照也非因緣自然是雙遮也遮照不二體用始備名中道了義無戲論法戲論即指因緣自然也言了義者前文已有中道但未明了義今對前文名為了義若對前五陰三科則以遮照俱備方名了義若對前初卷已來諸文則以不帶空假純明中道而中道中自具三諦名了義蓋此經圓別竝明約次第以論不次自初卷來共有五番圓別進否之義初從假入空中以觀假為入空之詮故首標三摩提而於文首即建圓宗云有三摩提名大佛頂首楞嚴王具足萬行故知空前之假達之即是一心三觀在別教人不達圓宗七處徵心僅或空前之假所謂圓融不礙隔別也此第一番圓別進否之義次正入空開示奢摩他路文有三番進否進則明圓否則明別如前已說次明諸三摩提是從空出假文首即標如來藏妙真如性亦是明一心三觀而五陰三科文末皆云本非因緣非自然性遮照未備亦是帶別所以總結上文共有五番進否今七大文在別教次第已入中道第一義諦次第三觀會入圓宗若在圓教雖初後無殊而達惟心了體具前文之義至後更鬯獨稱了義其意在此講者若貴簡要則但以遮照俱備為了義亦無失焉幽溪曰此經當機每以因緣自然為問者有兩說焉一以此經為圓頓博地凡夫可即生成辦大事故所問至淺而所示至深一以因緣自然等語義本該深況有真因緣自然者在以近鈎玄椎砧相應然當機問意以四大發起七大七大與陰入處界同耶異耶或謂七大即十八界地水火風空之五大六塵攝也見大六根攝也下見大文云如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然徧周法界豈非六根攝耶識大六識攝也故知七大即十八界陰入處界及七大祗開合之異耳又復二十五圓通既各有屬則七大與界雖同而異不可不知如四大中所具四微有多少之別風但有觸火具色觸水具色觸味地具色香味觸能具所具未可全同故圓通亦異空雖屬色而今經恒以色空相對則空非即色見大識大是總六根六識是別總別不同圓通亦異故成二十五門也二開示二一訶誡爾時世尊告阿難言汝先厭離聲聞緣覺諸小乘法發心勤求無上菩提故我今時為汝開示第一義諦如何復將世間戲論妄想因緣而自纏繞汝雖多聞如說藥人真藥現前不能分別如來說為真可憐愍汝今諦聽吾當為汝分別開示亦令當來修大乘者通達實相阿難默然承佛聖旨問阿難何處厭小求大答即經初云殷勤啟請十方如來得成菩提妙奢摩他等是厭小求大也諸法不生惟如來藏是第一義諦若因緣生法秪是世諦後文云我說佛法從因緣生非取世間和合麤相今阿難執四大和合豈非世間和合麤相乃世諦中之最淺者於論成戲於想成妄纏繞即疑惑之相此責阿難執世間因緣而昧第一義諦也諸佛祕藏靡不悉知故云說藥今聞佛法皆如來藏名真藥現前舉昔方便疑今真實是不能分別此責阿難雖有多聞而昧實相也汝今下誡聽實相是三諦之理下文明七大正是實相為大乘之體通達即成體家之宗矣次當機佇聽如文二正說二一牒疑總示二一牒疑阿難如汝所言四大和合發明世間種種變化二總示阿難若彼大性體非和合則不能與諸大雜和猶如虗空不和諸色若和合者同於變化始終相成生滅相續生死死生生生死死如旋火輪未有休息總示中先言大性者阿難自引四大和合之言今佛答中辨大性與相非和不和者欲明性具隨緣不變之旨故以性相為言端也大性之顯即下文性水性火之性也幽溪云此經始終一理皆明即空即假即中之旨如下性色真空性空真色此為妙俗清淨本然此為妙空周徧法界此為妙中圓融三諦總屬圓中全理具而為事造故有世間七大之相如來將欲開示先以非和不和示之謂若大性非和合者則不能與大相雜和因設喻云猶如虗空不和諸色斯則佛性不能變造諸法性居相外而相不即性非但無情無即性之理即有情亦無歸真之期矣今下文明有情無情皆有佛性豈非性相和合而成耶若性之與相實和合者則相有生滅而性亦隨之故云同於變化言始終相成生滅相續者始終亦生滅也生為始滅為終上句明相成下句明相續續者謂生而即滅滅而即生生死死生者順次而言生生死死者間隔而論因設喻云如旋火輪無有休息旋火之輪無有實體喻虗妄相成相續斯則真如有隨緣之污眾生無息妄之年矣今現見有出生死人豈果無休息耶非和合既不可和合又不可非雙遮雙照中道了義而何是為總示七大之旨趣也二歷大別顯七一地大為四一示地性無堅阿難如水成氷氷還成水欲明地大皆雙非雙照性色真空性空真色清淨本然周遍法界先示其性本皆圓融初無堅執循業發現時不妨結成無明大地堅礙非常復性還源時還歸清淨流澌圓融法性蓋當時法性之與無明遍造眾惡名之為染如水成氷也今日無明之與法性遍融諸法名之為淨氷還成水也此豈非地性融通而初無堅執之性故可以循業發現亦可以清淨本然耶如下推破乃氷還成水之功夫今則直示性本圓融耳天溪師曰氷即地也大論云水以寒因緣故成地觀無量壽佛經有氷地觀是也若據請觀音經應云地性無主今云氷還成水則科為地性無堅為妙凡六大前必皆先示大性而吳興等師擘地性二句為總示非也二舉色空相成汝觀地性麤為大地細為微塵至鄰虗塵析彼極微色邊際相七分所成更析鄰虗即實空性阿難若此鄰虗析成虗空當知虗空出生色相文有二義先明析色成空霅川曰汝觀地性蓋指析法差別之性非真性也隨文釋義不可混同如地持中有二法性一事法性性差別故二實法性性真實故麤謂麤大之麤細謂微細之細經中塵有三名一微塵二極微是色邊際相三鄰處塵析極微為七分便成隣虗是一極微為七鄰虗塵也更析鄰虗即入空矣孤山曰鄰虗塵者以此塵至細鄰於虗空故七隣虗為一透金塵七透金塵為一透水塵七透水塵為一兔毛頭塵七兔毛頭塵為一羊毛頭塵七羊毛頭塵為一牛毛頭塵七牛毛頭塵為一隙中遊塵準孤山此言則經云極微色邊際相乃透金塵也更析隣虗即實空性者小乘中以析空為拙度若據止觀以無常為正析析塵為邪析止觀引釋論云若有極微色則有十方分若無極微色則無十方分若析極微色不盡則成常見有見若析極微盡則成斷見無見此外道析色也云云論文仍明三藏析色之觀云色若麤若細總而觀之無常無我何以故麤細色等從無明生無明不實故麤細皆假假故無常無性即得入空上皆止觀文也然法界次第中亦有析塵之言故知佛法中仍以此為助道今經持地菩薩云觀身微塵與造世界所以微塵等無差別金剛云若有善男子善女人以三千大千世界碎為微塵如經所言皆空觀成就之相但經中析身析界至成微塵即是空觀已成之相今文更析鄰虗入空并塵不可得也次明從空生色幽溪云若此鄰虗析成虗空者牒小解析色成空也當知虗空出生色相者準例合空成色也如上析色明空既析大以為小自有而之無以空例色亦應積小以成大合空以成色若循環之無端理必然者夫萬象皆從空中發現然不以空為生因據今文所說即以空為生因乃佛先順小宗權立此義以為下文所破之法與下文日鏡艾生火方諸承月中水其例是同故下即破析色成空合空為色也三破和合之妄汝今問言由和合故出生世間諸變化相汝且觀此一鄰虗塵用幾虗空和合而有不應鄰虗合成鄰虗又鄰虗塵析入空者用幾色相合成虗空若色合時合色非空若空合時合空非色色猶可析空云何合文中先研破次若色下出正義初文汝今下牒阿難問辭汝且下研破共破三義一破和合二破合色為空三破合空為色然破和合即附合空為色合色為空共顯之耳初汝且觀下破合空為色如前析塵至鄰虗塵而止塵既有大小虗空亦有分量特不知用幾許虗空合成一鄰虗塵此句即研破也蓋鄰虗為色之始此若非合一切皆非和合而隣虗之前更無有塵勢必合空以成隣虗然空豈可合哉不應下防轉計計云空不可合乃合塵以成塵然鄰虗前更無有塵勢必合隣虗以成隣虗但隣虗止可合為極微豈可復合為隣虗乎故云不應等塵既難合定應合空其如空之不可合哉此即約自他性以破塵之來原隣塵即自性空即他性也又隣虗下破合色為空十方虗空甚大析幾色相合成大空此句亦是研破或謂析之與合義似相違佛意正破相違然文意本明先析後合何必以相違難之如先析一隣虗以成小空次析多塵以成大空後析無量塵成十方界如是則太費力此正破和合兼破析色也若色合下結出正義文有縱結有正結若色合時合色非空結用幾色相合成虗空蓋若合鄰虗祗成極微色邊際相此正明空非合成也若空合時合空非色結用幾虗空合成隣虗此正明色非合成也上皆縱結次明色尚有相可析令空空無有相云何合之使有方是正義四示非和不和之真汝元不知如來藏中性色真空性空真色清淨本然周徧法界隨眾生心應所知量循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義此中云性即是真性文辨地大而云色者以地得色之全性也幽溪曰阿難向執常說因緣為是疑今二俱排擯為非如來雙示非和不和然後歷大廣顯此中示不變隨緣正非和不和之義也蓋世出世之道有影響有形聲世人迷頭認影覔響尋聲於因緣自然妄生卜度如來深愍其愚示以形聲文中凡示二義初指悟性圓融次斥迷情失指初又二初明性具之理次明性具體用初中如來藏指能具也性色真空性空真色指所具也凡界即佛界故曰如來眾生本覺妙明性中法爾具足恒沙性功德義之為藏中者指其間所具之大數有七此以一二謂色空也言之然大數須如下文具明十界依正俱非俱即三如來藏今雖言七攝得下十以地木火風空祗是十界依報根識祗是十界正報故也色空二字溫陵師以空為體七大循業發現為用又云故七大皆言真空不知此中色空體則俱體用則俱用前四大則對空以辨後三大又自對辨不同豈智者千慮之一失乎孤山師云如來藏即心性中道也即俗而真曰性色真空即真而俗曰性空真色以真俗即中故竝云性不知此中色空真則俱真俗則俱俗亦失之詳矣須知此承上文析色為空之空合空為色之色影響上發來以示乎形聲蓋言如來藏中所具之色乃性色所具之空乃性空性色無妄故曰真色性空無妄故曰真空如是色空在如來藏中同一本性體自相即故互言之曰性色真空性空真色次明性具體用又為二初明性具之體不變似自然非自然次明性具之用隨緣似因緣非因緣初中言清淨本然周徧法界者兼前言性之三德也謂兼前文及與此文即具三德蓋上色空言性具即妙有也清淨本然言性體即真空也周徧法界言性量即圓中也謂上性具法體無三惑二死污染繫縛故曰清淨非相生而然非相含而然性德天然故曰本然此清淨本然之色空於十法界無不充滿一真法界亦無不充滿故曰周徧法界此即前文陰入處界本如來藏常住妙明不動周圓妙真如性但彼即妄明真故先云殊不能知生滅去來乃隨眾生心應所知量邊事此文指真即真指性具即性體性量故曰清淨本然乃性色真空性空真色邊事又前明會妄歸真此明從體起用然非後義無足以顯前義會而歸之不同而同也次明性具之用隨緣似因緣非因緣上不變言真如之體此隨心應量乃真如之用眾生義含十界佛名無上眾生故體言性而用言心者古德所謂隨緣不變名性不變隨緣名心也隨十界心應十界量者下文云汝以色空相傾相奪於如來藏而如來藏隨為色空周徧法界我以妙明不滅不生合如來藏而如來藏惟妙覺明圓照法界又如一見根阿難承佛神力見於初禪那律見大千菩薩見百千界如來窮盡國土眾生洞視不過分寸皆其事也循業發現者業由心造心由業牽單心不感獨業不發文雖互言合明方足謂惡心善心染心淨心黑業白業染業淨業三惑心三觀心九界業佛界業俱名為業以皆有身口運為故如三祇六度行百劫相好因法華云久修業所得庸非業乎而獨云眾生業佛不業不可也應知眾生心業皆感之之道應所知而發現皆應之之道量則言其能感所應之分劑耳然特科為不變似自然非自然隨緣似因緣非因緣者非自然因緣彰離過也似自然因緣彰功能也離過功能初無二體今但合明其義自見過有四種一外計二小乘三大乘初門即通教四大乘終極即別教前之邪計或計自然或計因緣以為小乘所破姑不重辨若後之三種雖稟正因緣亦宗自然如小乘析色通教體色別教次第體色皆因緣也小乘與通教所計法性自天而然苦不能惱集不能染別教但中佛性之自然本自其然皆自然也離過功能者離即破也非破無以顯離故也或以不變破因緣隨緣破自然或即以不變破自然隨緣破因緣知炬破暗無施不可然有正傍若映前文則以破析顯體為正若原佛意則以破別顯圓為正故此中破析非直破藏前三教皆名為折顯體亦非直通教體色明空三諦皆即方名為體今先約圓正破前二兼破別教然後正破別教初約不變破因緣者如上所辨析色歸空合空成色小乘和合因緣也今曰性色即真空固不待析色而後空性空即真色固不待合空而成色矣體幻色即偏空通教之因緣也今性色俱真空豈但偏空性空即真色豈但幻色耶但中佛性不即色空破去色空佛性方顯此別教之因緣也今性色真空性空真色則無中不邊無邊不中不須破二中道常然不變破自然者偏真法性苦集不干此藏通之自然也雖無界內色空之染尚有界外色空之礙與而言之見思已破真諦清淨二惑未破俗諦中諦未清淨一諦復本二未本然周徧二乘法界八法界不得周徧今如來藏性色真空性空真色三諦無不清淨本然十法界無不周徧也如雲外月逈出二邊此別教之自然也中不具二邊與而言之二邊清淨本然一未清淨本然周徧九界佛界未得周徧今如來藏性色真空性空真色三諦無不復本清淨四聖六凡無不周徧法界也次以隨緣破和合者既如來藏所具色空能隨眾生心應所知量汝以色空相傾相奪於如來藏而如來藏隨為色空周徧法界固不待折色而後空合空而後色也既曰性色真空性空真色全體發現固不但體幻色入徧空已也既曰性色真空性空真色則三諦色空法法具足固不須次第而體次第而破方見中道也隨緣破自然者如來藏不變隨緣具造諸法徧色徧空徧苦徧集豈寒空法性如嚴枯木不能生諸法者乎如來藏性色真空能隨染淨緣具造十法界豈同但中佛性如淳善人被惡人逐強來作惡為惡所染者乎應知此章是如來秘藏具無畏力如上所說小力而已其大功能正與別教對壘前雖兼明於離過彰能猶有未盡故重申之蓋清淨本然周徧法界者彰性色真空性空真色真如之體不變也隨眾生心應所知量者明真如之體能隨染淨緣具造十法界也若但能不變不能隨緣此如淳善人不能為惡可喻別理但中不具九界若但能隨緣不能不變此如淳善人被惡人逼強作眾惡可喻別教但中迷佛性而強覺忽生以非性具故所有迷中染惡定須翻破故皆即義不成今性色真空清淨本然周徧法界而隨眾生心應所知量乃不變隨緣如君子不器善惡皆能即隨眾生心應所知量而當處清淨本然周徧法界謂之隨緣不變如君子作事但彰己能何過之有此今經之圓旨也故迷中一切染惡若七大若陰入處界皆如來藏妙真如性眾生雖在生死煩惱而此體不減絲毫如來雖證菩提涅槃而此體亦無增益雖勤修證而實無修無證所以云汝但不隨分別三種相續乃至狂性自歇歇即菩提何藉劬勞肯綮修證此修證無修證之明文也世間無知下斥迷情失旨眾生妄心一以無知為之相惑著為之用所惑因緣自然已如上辨其惑之所以皆於影響以事卜度故因緣者隨緣之影也自然者不變之影也皆是識心分別計度者指上無知惑著乃以分別識心為體不但凡夫分別謂之識心三乘七方便於如來藏未證真理皆名識心未悟實相皆是計度但有言說都無實義者言說即計度因緣自然之表詮也謂但於不變隨緣中模寫影響以為因緣自然戲論名相而自纏繞寔無真寔義味也故大經云世諦但有名無實義第一義諦有名有實義何謂實義不變隨緣是也何謂有名自然因緣是也前云非不自然後云我說佛法從因緣生非取世間和合麤相荊溪云三諦者天然之性德也法華云佛種從緣起是故說一乘是以圓修行者悟得清淨本然之不變則一味天真不勞修證悟得隨眾生心應所知量之隨緣則不妨修證即不變而隨緣全性以起修即隨緣而不變全修而在性修性雙泯境觀兩忘能了乎此始可言道然有有情之色焉無情之色焉有有情之性焉無情之性焉在色似有情與無情之殊在性豈有情無情之異是以能悟性色即真空性空即真色者則不疑古人無情成佛之說矣此持地菩薩所入法門而幽溪大師所釋義意也二火大分四一略示無我阿難火性無我寄於諸緣火具二微謂色與觸無我者火不能自立必假竹木然後有火故云寄於諸緣無我是無自性若寄他緣似有他性如下明日鏡艾不生火即無他性也共無因亦如下說又於四性中隨計一性是有見若謂是事實餘妄語即是有我若檢四性不得此謂見火是無是事實餘妄語即是我也若見火亦有亦無謂是事實餘妄語亦是我也若見火非有非無是事實餘妄語亦是我也若於此四句有所計執即皆是我以有我故尚不見空何況性具今觀火性無我能破諸見因之得顯性具涅槃云無我法中有真我其義是同然真我不可執二舉事汝觀城中未食之家欲炊爨時手執陽燧日前求火一切法皆無我而火之賴緣其義更著執燧求火此其事矣火具照燒二德今欲炊爨即是燒也𭬥李曰陽燧者崔豹古今註曰以銅為之形如鏡照物則影倒向日則火生以艾為炷又淮南子云陽燧火方諸也論衡曰於五月丙午日午時銷鍊五方石圓如鏡中央窪炊㸑者字書云取其氣上謂之炊取其進火謂之㸑幽溪云火性五行皆具下文風金相摩故有火光為變化性又如火鏡以金為之此金具火性也古人鑽榆取火今人鋸竹取火此木具火性也又云彼大海中火光常起此水具火性也又云山石擊之則𦦨名為土骨此土具火性也故知火性無我處處可求今獨云執燧日前求火顯所寄之緣勝所依之處大蓋火太陽之子日為太陽之母而日又無我以光明所在為之體然日又依空而不住空則火之周徧將何限極用彰性火真空性空真火豈非所寄之緣勝所依之處大乎對空而辨意實在茲三破和合二一例同阿難名和合者如我與汝一千二百五十比丘今為一眾眾雖為一詰其根本各各有身皆有所生氏族名字如舍利弗婆羅門種優樓頻螺迦葉波種乃至阿難瞿曇種姓古云所舉舍利弗三人不同例同日鏡艾三也文云身氏名字者如舍利弗是身及名字婆羅門種是氏族身據現在氏族是來原因有身而成眾故身亦是和合之本及身與名字是名實之分餘皆例之優樓頻螺此云木瓜林迦葉波此云龜氏瞿曇云地最勝亦云日種孤山曰瞿曇星名至於後代改姓釋迦補遺云舍利弗等三人例同日鏡艾和合之義水中珠空月三風中衣空面三其義亦然二正破佛欲明性具必先破和合者涅槃云因滅是色獲得常色涅槃所云謂必先破妄色而後顯真色也又於妄法中求其來由既不可得知是性中本有方是不變隨緣之義於中先徵阿難若此火性因和合有彼手執鏡於日求火此火為從鏡中而出為從艾出為於日來和合是所破之義故先拈之若果因和合有當於日鏡艾三處得火今三處俱無不得稱和合也二破阿難若日來者自能燒汝手中之艾來處林木皆應受焚若鏡中出自能於鏡出然於艾鏡何不鎔紆汝手執尚無熱相云何融泮若生於艾何藉日鏡光明相接然後火生汝又諦觀鏡因手執日從天來艾本地生火從何方遊歷於此日鏡相遠非和非合不應火光無從自有此中法喻一往觀之文勢不齊再往觀之法喻元合言一往觀之文勢不齊者前喻中三人各有來由成一眾和合之義是未和合前已先有來由略舉三人例顯千二百人皆有來由其來由多也法中日鏡艾各無火之來由故不成日鏡艾和合之義其無來由者一也則一多不同又因火無來由顯日鏡艾不成和合是不和合即在無來由時也則一時異時不同況千二百人外無別和合日鏡艾之外別有一火欲其文勢之相齊得乎言載往觀之法喻元合者三人各有來由成一眾和合之義日鏡艾各無火之來由遂不成和合之義法喻中意何嘗不齊今但就齊處論之可耳文中先破三處破日生中云自能燒汝手中之艾者不藉鏡生故名為自次破鏡生言自亦然紆者屈也於日鏡艾三處中求火來處一不可得似明火不與三人同實即明火不成和合是此中早已破和合矣須知火若有來處亦不成和合何也若從日來便不藉鏡艾何名和合今顯火無來處亦不成和合也然破三處中有破自生他生之義火是自三處是他因建首云火性無我早已破自故今但破他也如古人釋即以鏡為自日為他如後識大破和合中說汝又諦觀下深明火無來由謂日鏡艾各有來由而惟火無所從來故云何方遊歷於此當知日鏡諸法元離四性皆無所從生今欲對顯火無來因權言彼有來因耳日鏡相遠下別破共生此二句似結顯上不成和合然作結顯義似不便此中文意皆破和合則皆破共生因上破他生中破日鏡艾和合之義以無來因顯不和合今據文次第宜別破共生但言日鏡非和非合以相遠顯不和合似有二義故別言之從日至手四萬由旬故云遠也不云艾者艾與日遠不與鏡遠故略不言艾是他生中和合反寬而此中和合反狹也不應句破無因生此句似亦破自性然最初言無我我是自性今云無從自有顯屬無因故是破無因也四明非和不和之真二一指悟性圓融二斥迷情失旨汝猶不知如來藏中性火真空性空真火清淨本然周徧法界隨眾生心應所知量阿難當知世人一處執鏡一處火生徧法界執滿世間起起徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義初明不變之體有性具性體性量三義言性火者上明火大不從日鏡艾來不從自他共離生然則火從何有因結顯云如來藏中原有此火名為性火相火不破性火不顯涅槃云因滅是色獲得常色今經亦然上文約四性以破有相之火是破無明無明既破火即是佛性也問四句推檢性相二空在通教止破見思今亦破無明耶答妙玄五下云龍樹作論以不可得空洗蕩封著習應一切法空是名與般若相應此空豈不空於無明釋籤云當知前空亦空無明玄籤此語正與今義相合上文雖但破性亦兼破相故得頓破無明而顯如來藏中之性火也性火圓融即第五空大相火是非頑空性火即是真空乃會四大而通第五大耳復言性空者文中先未辨空例今火大亦有性空空既云性火復云真觀相元妄惟性火為真火與空既皆性具即本有俗諦也次云清淨本然是性體即本有真諦也清淨謂不立諸相本然謂不假造作前文日前求火即是造作性中豈有此造作耶據文當以清淨為真本然為中今依幽祖以性具為俗性體為真於義無失若依古人即直以性體為中也三云周徧法界是性量即中諦也火空二大於十法界無不徧滿既徧於俗復徧於真故得是本有中諦如上性具性體性量咸是不變之體輔行云三諦無形俱不可見然即假法可寄事辨即此假法即空即中空中二理二無二也輔行此言與今極合本有三諦中不但真中無形性具火大亦無形相今人不達此理但約事論俗故俗成妄法而非真法其欲拂去性中七大豈無故哉今知火大無形不須除俗明矣就佛而辨須約假以立空中辨性亦然須約性具以明性體性量也如是圓義可破前藏通別三教一破藏教者此教析色明空元以無常為正析世間無常莫過火大𦦨𦦨不停纔生即滅故順入空今性火即真空豈析火而後空性空即火豈空中便無火耶二教通觀一切法如大火聚四邊不可觸自他四性有無四句皆是四邊悉不可取是為體色入空之觀今性火即真空豈體幻色而入偏空性空即真火豈住空耶三別教中道如云外月逈出二邊則中在火外故涅槃云非佛性者謂墻壁瓦礫如經所云墻壁既非火大豈是此別教佛性之義今性火真空性空真火無邊非中無中非邊豈捨邊求中耶性具一義既破前三教性體性量例前可知具如圓通疏說次約隨緣之用四明指要鈔中有但理隨緣性具隨緣之辨但理謂但中之理不具九界亦隨染緣造九界法如淳善人不能為惡被惡人逼強作眾惡以非性具故所有迷中染惡定須翻破故皆即義不成古人稱為緣理斷九是也若性具十界如君子不噐善惡皆能隨十界緣變造十界如君子作事但彰己能何過之有所以九界之法不須翻破即是佛界此今經之圓旨與別教但理隨緣其義霄壤今云隨眾生心者能隨為不變之性所隨為眾生之心心有迷悟凡為惑心聖為淨心所謂能隨染淨緣具造十法界也凡聖心中皆有所知之量如凡夫取火之法各有不同聖人火光三昧亦有大小性不作意而能應其所知之量阿難當知下舉事以騐執鏡求火火似有限到處執到處起火實無限寧有方所者謂莫測所從來也幽祖云此下五大多舉事騐隨緣一段例地大則欠非欠也將以空大出土一尺則有一尺虗空例之耳言循業發現者循順也上隨心之言止能該惑惑為緣業為因方感火大故於業中方言發現也惑業皆能惑性為能應既全性以起修則所現之火全修即性縱是凡夫業火與火光三昧有何別乎所以烏芻瑟摩化多婬心成智慧火有自來矣世間下斥迷情失旨三惑所覆故言無知以不知不變惑為因緣不知隨緣惑為自然又不知不變起自然之執不知隨緣成因緣之悟世間凡外及前三教行人皆由識心未忘起此計度故皆有言無旨縱得聖果尚屬權乘而已識心若忘自有明悟不賴分別火頭金剛得之矣三水大分四一略示不定阿難水性不定流息無恒水具三微謂色觸味不定者水性元無定住以其住者池沼方圓礙之即住非水有定性也又不定者若於自他四性中隨計一性即是有見是定非不定若檢四性不可得此為見水是無亦是定非不定若見水亦有亦無乃至非有非無亦是定非不定今不住有四句中亦不住無四句中亦不住不可說中故言水性不定性不定故或流或息古人云求則流否則息今若以流水為流止水為息亦無不可不恒即不定也恒常也二舉事如室羅城迦毗羅仙斫迦羅仙及鉢頭摩訶薩多等諸大幻師求太陰精用和幻藥是諸師等於白月晝手執方諸承月中水室羅伐此云豐德或云聞物迦毗羅此翻黃赤色斫迦羅此翻輪山鉢頭摩此翻赤蓮華訶薩多從古未詳譯語皆外道名善幻術者太陰精月中之水也望前曰白月亭午曰晝方諸取水之珠也即陰燧也孤山曰淮南子云方諸見月則津而為水高誘註曰方諸陰燧大蛤也熟拭令熱以向月則水生許慎註曰方名也諸珠也譯人今取許註故文云從珠中出等三徵破二一徵此水為復從珠中出空中自有為從月來水即自性珠空月即他性也或以珠為自空月為他亦無不可元破和合故舉三處以應上三人之喻二破阿難若從月來尚能遠方令珠出水所經林木皆應吐流流則何待方諸所出不流明水非從月降若從珠出則此珠中常應流水何待中宵承白月晝若從空生空性無邊水當無際從人洎天皆同滔溺云何復有水陸空行汝更諦觀月從天陟珠因手持承珠水盤本人敷設水從何方流注於此月珠相遠非和非合不應水精無從自有文中先破三處又二先正牒破次勸審觀破月來中初句牒尚能下定言令珠出水者明珠無出水之功功皆在月如是則月光到處遇物即流珠與林木不殊皆能出水從月至手亦四萬由旬故云遠也流則下破若林木果能吐流何待珠出此句破林木出水言必無此事耳若林木不流則珠元有功而水不降月月來之義破矣次破珠出則此下定也不賴月光故云常應流水何待句破也三破空生空性下定滔水沒也云何下破可知次汝更下勸諦觀月珠水盤三物各有根因水無根因故云何方流注於此陟音職之石切升也問三處既無水不可得何更窮流注耶答所言空者空其情見非謂永無當知性具之法其猶形聲有相之法其猶影響影響不實非并影響亦無今蓋窮影響之來原以示形聲耳上文破自他生亦有三處無來由顯不和合次月珠下別以兩物相遠顯非和合是破共生三不應句破無因生但破四性不破四相者輔行云有秪是自無祇是他乃至雙非秪是無因經文存略如荊溪此說則破性可兼四相也然此中破相非但顯空故云水從何方流注於此雖破來因仍立假法窮假法之來原即中道性體故下接云性水真空等四明非和不和之真汝尚不知如來藏中性水真空性空真水清淨本然周徧法界隨眾生心應所知量一處執珠一處水出徧法界執滿法界生生滿世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義性水真空謂有水之處即空性空真水謂無水之處皆水據前滔溺之言空不生水今論性水法法融即尚即性火何況空耶心謂迷悟之心業謂染淨之業幽溪曰論水大亦五行皆具如金能生水固理氣之常談經云是故林藪遇絞成水此木具水性也又曰寶明生潤火光上蒸故有水輪含十方界此火具水性也又云彼洲潭中江河常注此土具水性也今特取白月晝手執方諸承月中水者亦顯所寄之緣勝所依之處大也蓋水為太陰之子而月為太陰之母而月又無我以光明所在為之體依空而不住空則水之周徧將何限極用以彰性水真空性空真水豈非所寄之緣勝所依之處大乎對空而辨意實在茲舊以循業發現句通屬上文交光則連下世間無知而解不知隨心但彰真如有隨緣之應若無十界染淨之業則無感之之力要知九界眾生起無邊染用與夫佛起無邊妙用皆得此感應之道也或疑自己性用何必作感應釋然十卷云補特伽羅酬業深脉感應懸絕亦其例矣交光又云此四字雙具兩種不自在意一者世出世間諸淨玅色若不循彼種種淨業雖欲發現不可得也二者三途四惡一切苦穢之色若不戒彼種種染業雖欲不發現不可得也云云不知如此論議只可解釋第二門頭事於此圓頓直捷諦理不但了無交涉抑且使圓頓旨趣反增晦昧蓋首楞嚴王一切事法莫不究竟堅固尚理而不尚情曷為情世間惑為因緣自然是也曷為理不變隨緣隨緣不變是也惟其不變而隨緣故得終日隨緣而不變在隨緣固有自在不自在之殊在不變雖終日隨情不自在而未甞不自在故觀經疏云此理灼然世間常住雖五無間皆解脫相雖昏盲倒惑其理存焉蓋深得乎此故此段經文深明常住真心圓頓至理要使人人體會一切所隨染淨之緣直下便是不變之性莫不清淨本然周徧法界以成楞嚴大定即修證而無修證舉心即錯擬議即乖乃觀心之要道也四風大分四一略示無體阿難風性無體動靜不常風於四微止具一觸無體者未動之時不知所在既拂之後了不可得又若於自他四句中隨計一性謂是事實餘妄語即是有體若檢四性不得見風是無謂是事實亦是有體乃至見風非有非無亦是有體若四句觀風風不可得即是無體無體故無礙即得入如實之際溫陵曰拂衣則動垂衣則靜所謂動靜不常也二舉事汝常整衣入於大眾僧伽梨角動及傍人則有微風拂彼人面僧伽梨此翻雜碎衣剪碎製成條相多故亦翻壞色衣名含多義或名離塵服斷六塵故或名消瘦服割煩惱故或名蓮華服離染著故或名間色服如法色故出真諦雜記亦三衣通稱幽溪曰佛意廣明七大儒典只說五行空大彼將以為天矣若四大與五行敵對言之水火二大名實俱同土金二行儒則開一為二佛則合為地大蓋土能生金金未成則金為土之堅性金既就則金為土之體骨故一有地足當二行木行即為天也風以動為性木屬東方震卦為羣動之首若論風性亦五行皆具如金風怒號水波洶湧火𦦨之搖光吐舌大塊之噫氣為風皆其事也所以風稱為大今特云汝常整衣等者以騐風性無體動靜不常耳此中文勢與前不同前陰燧求水陽燧求火明其自無之有足顯性具而其事稍難今微風生衣亦自無之有足顯性具而其事更易以風於四微中但有一觸水火假緣稍多此難易之分也易則尤足顯性具矣三徵破二一徵此風為復出袈裟角發於虗空生彼人面二破阿難此風若復出袈裟角汝乃披風其衣飛搖應離汝體我今說法會中垂衣汝看我衣風何所在不應衣中有藏風地若生虗空汝衣不動何因無拂空性常住風應常生若無風時虗空當滅滅風可見滅空何狀若有生滅不名虗空名為虗空云何風出若風自生被拂之面從彼面生當應拂汝自汝整衣云何倒拂汝審諦觀整衣在汝面屬彼人虗空寂然不參流動風自誰方鼓動來此風空性隔非和不合不應風性無從自有文分三先破三處中二先正牒破初破衣生中初句牒汝乃句難其衣下破言我會中垂衣者汝衣既風我衣亦風汝因整衣則有佛因埀衣則無則衣之非風明矣不應句破轉計可知次破空生中云汝衣等者先以衣對辨空若生風何須假汝動衣方有次明空無風若必謂空能生風則空體常在風應無歇既空自能生風而有無風之時豈非并空亦滅耶滅風下縱破縱汝計謂虗空已滅然物不動時滅風可見虗空若滅有何相狀若有生滅下猶是縱破或以風生為虗空之生風滅為虗空之滅破云既有生滅何成虗空以虗空乃三無為之一也名為虗空下結破因世人常計空能生風故結顯之長水曰風性搖動虗空寂然豈有寂然而生搖動是也三破面生中自汝等者承上文來風還拂汝即是倒拂豈自汝整衣而反拂汝耶具足應云自汝整衣云何從彼面生而反拂汝耶次勸審觀中云整衣在汝面屬彼人明風不生於面也此句亦可足前破面生義虗空寂然不參流動明風不生於空也故即云風從何方鼓動來此總承上二義明風之來處必不可得耳二破和合即破共生相風頑空其性必隔前文已破空能生風是破獨空能生未破風空和合故重破之於三處中但以空為言者以常情每謂空中有風也又性隔之言亦是承上虗空寂然不參流動所言性者是相中之性耳不應下破無因也四顯真汝宛不知如來藏中性風真空性空真風清淨本然周徧法界隨眾生心應所知量阿難如汝一人微動服衣有微風出徧法界拂滿國土生周徧世間寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義初悟性圓融中初明不變之體經中地水火風皆與空對辨如今文云名為虗空云何風出前三大亦然雖明有相之四大與空恒隔而意欲顯性中四大與空相即故先云風空性隔後即云性風真空性空真風此性具也言清淨本然者真風不動真火不焦真水不溺真地不塞如此之風豈待整衣方出此性體也風即是空何處不徧非但風空相即亦可云性風真地性地真風水火亦然故云周徧法界此性量也次明隨緣之用先隨心應量次舉事騐問前明衣不生風今何云微動服衣有微風出答前破因緣生法今明因緣顯法性具之風畢竟不由因緣而生故前言三處皆不能生然風雖本具賴緣方顯如暗室瓶盆井中七寶假炬方彰非炬能生七寶風性亦然因微動之緣有微風出有劫盡之緣則毗嵐猛風由心而現皆藉緣而顯豈藉緣而生耶教中常明缾衣等法從因緣生故皆無常惟佛性之理從因緣顯故是常住今經明四大五陰皆如來藏妙真如體即本有佛性故皆緣顯非緣生也又眾生妄心不停故風之吹拂無已蓬蓬然起於北海蓬蓬然入於南海皆即眾生之心而眾生見動聖人見其不動所知之量別也心異則所循業亦異風是所感之報耳五空大四一略示無形阿難空性無形因色顯發空有四名一虗空二無所有三不動四無礙今略言無形可兼四義幽溪云因者待也世間萬物相待成形因色顯空此為有待之根元溫陵曰鑿土得空所謂因色顯發也二舉事如室羅城去河遙處諸剎利種及婆羅門毗舍首陀兼頗羅墮旃陀羅等新立安居鑿井求水出土一尺於中則有一尺虗空如是乃至出土一丈中間還得一丈虗空虗空淺深隨出多少溫陵曰西天貴賤族分四性如此方四民剎帝利王族也婆羅門淨志也亦云淨行以守道居正潔白其操也毗舍商賈也首陀農夫也是謂四姓頗羅墮利根也旃陀羅魁膾也此又智愚之族也孤山曰頗羅墮此翻捷疾亦利根慈恩云婆羅門凡十八姓此居其一旃陀羅此云嚴幟惡業自嚴行特標幟謂搖鈴持竹也幽溪曰出土一尺則有一尺虗空顯發二義前地大則對空而明今空大則對色而辨準餘三大各互缺一待可知三徵破二一徵此空為當因土所出因鑿所有無因自生二破阿難若復此空無因自生未鑿土前何不無礙惟見大地逈無通達若因土出則土出時應見空入若土先出無空入者云何虗空因土而出若無出入則應空土元無異因無異則同則土出時空何不出若因鑿出則鑿出空應非出土不因鑿出鑿自出土云何見空汝更審諦諦審諦觀鑿從人手隨方運轉土因地移如是虗空因何所出鑿空虗實不相為用非和非合不應虗空無從自出文分三先破三處又二先正牒破次勸審觀三處中先破無因者虗空最是無因故先破之如所鑿是土所求是水而虗空忽現得不疑其無因乎破中逈遠也謂大地曠遠曾無通達次破土生長水云若因至空入先牒破土若生空土出井時應見虗空出土入井若土下結非若土先出不見虗空從土躍出還入於井何言空從土而有耶若無下轉破無出入若不見空出土入井則應空土無相異之因由言無異因者如土因鑿出空亦因鑿而出是所因同也所以破云則土出時空何不出也此正破無異然土出而空不出反似因土而出空矣故以此破無出入也此文天如所解大同其云虗空若從土出應見虗空出於土而入於井此妙解也交光不用而立開池引水之喻甚覺寬緩但得空入之義不得土出之義至轉破中若無出入句必須解云若不見空出土入井交光解云仍承上難必言土自出入空無出入故即約空無出入以難也與經意亦不相肖三破鑿生若謂虗空因鑿而出則鑿意反為出空而非出土矣不因下反破若不因鑿而出者則鑿自出土而已空既非土何因見有空耶勸審觀中吳興云當以三諦配前因土因鑿無因其說是也土因地移者土從地中運鑿移出也鑿從人手則鑿有因土因地移則土有因惟空無所因言無因者欲明空是自性中具耳次破和合意言鑿是鑿土以實為用者也空是虗通以虗為用者也本是異法安得用實以成其空用虗以成其實桐洲云二者體性相乖故不相為用猶云不相為因是也不應下破無從前已破無因今復破者前之無因亦可言因今并不因無因故曰無從四顯真三一均前四大若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅此文古人有異釋泐潭直以大為如來藏義霅川曰四大後所以點空均名五大者蓋諸經常談唯四而已此既異彼故特言之下根識中其例亦爾通名大者且從事立智論云佛說四大無處不有故名為大若言大性周徧必須指事即理攝末歸本不可名而名之是謂如來藏也或有直以藏性釋於大名者一何悞哉即中云虗空性圓周徧者若言空處有空實處無空即非周徧虗空不爾故言周徧具如涅槃一十復次所說下文云無邊不動虗空并其動搖地水火風據此文則空大獨名不動也言性真圓融者性空即真四大性中四大即是真空故曰圓融此是以空均四會歸藏性言本無生滅者雖四大滅而經云性空真色則空在即地水火風在也故四大無滅雖四大生而經云性色真空則四大在即空在也故四大無生空無生滅例此可知空在即四大在故空無生四大在即空在故空無滅然今云無生滅謂在圓融性中無生滅耳二斥迷令悟阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入汝心昏迷者晦昧為空汝心昏迷亦然虗空為出為入如前破出土入井是也前又破無出入及不因鑿出等即非出入也虗空圓離諸計本是真性四大亦然幽溪曰自五大之相而言之一虗四實不相為倫自性而言均一如來藏性也三不變隨緣汝全不知如來藏中性覺真空性空真覺清淨本然周徧法界隨眾在心應所知量阿難如一井空空生一井十方虗空亦復如是圓滿十方寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義幽溪云相末也性本也相之圓融元由性具故曰汝全不知云云此中對辨與前不同者前欲以空均四故歷對空辨此欲以根識均空故對覺而辨會歸藏性其進有序溫陵不詳乎此故以體用而釋交光不詳乎此乃云比前變其文而復顛倒其意環師之失在於約鑑公之失在於鑿也即中謂此中對辨較前稍詳初均前四大中重將空與四大對辨而云性真圓融不如此不與前文映合今示性具中復以空對覺者空是晦昧之法故與覺對明其圓融空既即覺不可消殞雖不可銷只一覺體而已隨緣中晦昧為空隨眾生之心也寶覺真空隨聖人之心也又汝以色空相傾相奪於如來藏故於是中風動空澄我以妙明不生不滅合如來藏故身含十方無盡虗空由所知量不同耳舉事中空生一井是應其取空之道十方空如空無邊處依此悟道則虗空藏菩薩云虗空無二佛國本同於同發明得無生忍是矣六見大四一略示無知阿難見覺無知因色空有見覺者見聞覺知略稱見覺此根中之知由離塵無體故首云見覺無知義海云根無自性因境而有見覺是根因色空顯下文云由塵發知也今謂有無四句皆是有知今觀無知則破四見云根但如鏡無別分析故云無知此說亦可二引事如汝今者在祇陀林朝明夕昏設居中宵白月則光黑月便暗則明暗等因見分析云因見分析者前明由塵發知今示因根有相三徵破二一徵此見為復與明暗相并太虗空為同一體為非一體或同非同或異非異擕李曰此問四句一同二異三亦同亦異四非同非異但經文分兩同兩異各成一句然此中先立三相以應上三人之喻次立同異四句以為所破此下之文不即破見所從來而先破一體等者以前明由塵發知因根有相則根塵似為一體苟非一體則計異體乃至或計雙亦雙非故先破之至勸審觀中方破見所從來及破和合以結歸性具也二破分三先破四句二破和合三破無因初中二初正牒破次勸審觀初中四一破一體阿難此見若復與明與暗及與虗空元一體者則明與暗二體相亡暗時無明明時無暗若與暗一明則見亡必一於明暗時當滅滅則云何見明見暗若明暗殊見無生滅一云何成初句牒則明下破破中先明二塵相奪見雖與明暗虗空一體其如明暗二體相亡但言明暗者以空不在相違中也若與下正推破當明之時暗體既亡則見暗之見亦亡故明時不但無暗而且無見暗之見下句准說若一即亡滅之義滅則云何滅字總承上暗時當滅明則見亡明則見亡云何見明暗時當滅云何見暗若明下結破二破異體若此見精與暗與明非一體者汝離明暗及與虗空分析見元作何形相離明離暗及離虗空是見元同龜毛兔角明暗虗空三事俱異從何立見初句但牒明暗汝離下約三事破又為三意初明見相難分如正見明暗虗空之時離此三事別求見體則不可得見元者見精明元也二明離塵無體前明正見三相之時不可分析今明設離三相此見必無蓋見與明暗虗空終日和合人不覺其和合也故佛明若離三相則見元無體也三明俱異無見無明則依暗無明暗則依空三事俱無斯見不立三破雙亦明暗相背云何或同離三元無云何或異前但計一邊秪拈一難今雙計同異則拈兩難或同中不言空者是以色攝空也四破雙非分空分見本無邊畔云何非同見暗見明性非遷改云何非異非同則舉空非異則舉明暗蓋綺文互現耳無邊畔則似同故不可云非同性無改則似與明暗異故不可云非異問同異四句一不可立為是妄相無有決定為是中道不可思議答同異四句皆是妄見妄見不立妄相元空而中道之不可思議亦於是可知何者妄尚無定中道豈有住著無住即不思議也二勸審觀汝更細審微細審詳審諦審觀明從太陽暗隨黑月通屬虗空壅歸大地如是見精因何所出霅川以四審配前四句補遺云根大中有四審字初一句總標下三審字審其明暗空三不能生根大前空大中審諦亦是總標次云鑿從人手乃諦審也土因地移乃諦觀也至下識大中只有二詳字乃對見相二義霅川是對前補遺或對前或對後數亦不合然觀文勢初句實是總標下二句謂細不但細而且微細審不但審而且審詳又就境而言則為審諦就觀而言則為審觀作此釋已復以四審字對前同異四句或更對明暗通壅四句則無漏矣上破同異等四句示破見之來處今云明從太陽等者謂明暗通壅皆有所因見則無因言見精者指六之根為見精也二破和合見覺空頑非和非合但言空者以空攝色前破異體中似明見相和合又破雙非中云分空分見本無邊畔云何非同究論見覺空頑體性碩異不可云和合也前破非一體似破和合然但破一體未破和合故今再破三破無因不應見精無從自出夫見精者與真同體無始恒有何必求所自來然既是無始無明異竟從迷真而有故不得謂無從因出也上明見精因何所出即似無因故再破無因四顯真三一均成六大若見聞知性圓周徧本不動搖當知無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅孤山曰前於六根廣破眼見餘根竝略今乃類通顯示其性皆徧聞即耳根覺即鼻舌身根知即意根不言覺者略也性圓周徧故不偏見色空本不動搖遂乃遠離生滅然猶就事而論未必全真如前破一體中云若明暗殊見無生滅經雖云無生滅無遷改豈即謂之真乎故與不動虗空動搖地水火風均名六大也至會如來藏性本無生滅方得謂之真耳幽溪曰此中先以根大均空大次以根大均餘五大意顯二大展轉超勝於前空則以不動無相勝根則以有覺無滅勝然此勝劣亦不過隨相分別如藏言之略無差別故今均之而曰性真圓融皆如來藏本無生滅幽祖以根大均空大者如經云性圓周徧本不動搖是以根大均空也二斥迷令悟阿難汝性沉淪不悟汝之見聞覺知本如來藏汝當觀此見聞覺知為生為滅為同為異為非生滅為非同異沉淪者沉滯於無為寂滅之理謂真理中無見聞覺知故當觀現前見聞等也能見物外者為生為滅與外物相對為同為異溫陵曰生滅同異皆因妄塵非生非異不離妄計離此諸妄即如來藏也三不變隨緣汝曾不知如來藏中性見覺明覺精明見清淨本然周徧法界隨眾生心應所知量如一見根見周法界聽齅甞觸覺觸覺知妙德瑩然徧周法界圓滿十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義初明悟性圓融初不變中先明性具之理本性之見即是覺體之明覺體不雜妄法故曰精覺體之精即是明了之見此中以用對體而辨性見明見用也覺明覺精體也後識大亦然此性具中道之理異於藏通藏通真理既無見聞亦非覺體今是圓中異於偏真也別教中正點見聞即是佛性然見性聞性逈脫根塵之外今指見聞諸根即是覺體故破別教此性具也清淨者性中六根元無根相故清淨本然則非因緣所感此性體也周徧法界者別教性體中雖具見聞然有情有佛性無情無佛性則不周徧圓教色香之體即是見聞故惟色惟心能徧法界此性量也上明不變之體已竟次明隨緣隨眾生淨心則為佛界之六根隨眾生染心則為九界之六根經云世孰有真天眼者有佛世尊不以二相見諸佛土故所知量最廣九界展轉漸狹此文具該六根前就易明先約見辨以見準五莫不咸然云見周法界者指現前眾生見根對境咸矚是周法界溫陵云甞觸指舌根以味合方覺故亦名觸覺觸身根覺知意根六根應用皆是妙德云瑩然者是明徹義皆同見根悉周法界循業者謂十界之業不同故十界見聞各別世間下斥迷情無旨須知大性總絕名言纔屬思議即非實義此大勢至所入法門以彼云都攝六根故七識大此大是彌勒悟處科分四一略示無源阿難識性無源因於六種根塵妄出根塵之體切近於真故曰根塵同源識性虗妄即是無源若以根塵為源而根塵已是妄故無源也從根塵而有識如大經云眼色二語生識一語問前火性無我等皆作離四句釋今無源之語亦能作此釋乎答有無四句皆識心所計今知識性虗妄從識起見悉不可信即離四句之根元矣二引事汝今徧觀此會聖眾用目循歷其目周視但如鏡中無別分析汝識於中次第標指此是文殊此富樓那此目犍連此須菩提此舍利弗初舉根對簡言徧觀者與下次第標指異也真際曰根但照境故如鏡中識有分別故能標指交光曰萬象對照一念不生正是根相幽祖曰聖眾塵也徧觀根也二卷所顯見精初卷所指識精正是此體交光意指此為真常故有決定用根之語不知用目循歷雖如鏡中無別分析尚屬無記欲證菩提要須見見即用目循歷未是一念不生境界何者有根有塵必有妄念如八識中有作意心數六根豈能離作意耶但此是根本無明於此不起攀緣即是法性或直指為無明或直指為法性其謬均耳若即此悟性方為得旨汝識下正顯識體前根如鏡故能發識如前五識并五意識及第六識皆名為識眼色親得色相有自性分別不帶名言無計度分別亦屬根本無明於此不起攀緣根塵自空即是法性由彼同時意識起第三念計執名字如某某等名隨念計度分別也然五識五意識皆緣性境至第六識離前五識自緣獨影境亦為今識大所攝三徵破二一徵此識了知為生於見為生於相為生虗空為無所因突然而出義海云四處不生顯無生也言無因者三處既不能生或計無因而有二破分三一破四處二一正牒破阿難若汝識性生於見中如無明暗及與色等四種必無元無汝見見性尚無從何發識若汝識性生於相中不從見生既不見明亦不見暗明暗不矚即無色空彼相若無識從何發作此推檢者明藏性之無源也前釋中謂根塵是妄故識無源今推根塵不能生識故曰無源初番破從見生識若生於見則必不生於相其如無相之時見亦不可得當斯時也根性尚無識何由生是欲以見為源而不可得也次番破從相生識若決定從相而生則不從見生而無見則無相方斯時也相尚不立何由有識是欲以相為源而不可得也若生於空非相非見非見無辨自不能知明暗色空非相滅緣見聞覺知無處安立處此二非空則同無有非同物縱發汝識欲何分別第三破從空生先破能生之空言雙非者謂以非相非見為空也不從塵生故曰非相不從根生故曰非見以空性無形因色顯發既無明暗之色并空相不可得此空又深一層非見則不能分辨外境故不知四種外塵是絕無生識之機外塵是所緣非相則滅所緣而無相則亦無見定無生識之道上來所辨皆明見相相因而有也處此下正破識從空生義海云非相非見故曰二非正指空也空則同無者謂生識是空即同龜毛或識是有亦不同根塵之物縱發汝識等者以同根塵之故方能分別外塵既不同根塵縱發汝識豈能分別外塵乎若無所因突然而出何不日中別識明月日中識月是無所因既無此識安得謂無因耶二勸詳審汝更細詳微細詳審見托汝睛相推前境可狀成有不相成無如是識緣因何所出補遺云汝更細詳總標也微細詳審別舉也夫總別之釋極是而詳相詳見亦在乎其中矣見托根相託境有出可狀無出非有是則根境空有皆有來因惟識無所從來也二破和合識動見澄非和非合聞聽覺知亦復如是動或識能了別澄謂根但照境阿難前以和合立難故復宗破和合若識從根生即有和合之義既不從根生豈復成和合耶熏聞云識動見澄非和非合者此約根識動靜相違名非和合若望他境還破自生耳若風大中云風空性隔非和非合既對境論乃破他生也若火大中云日境相遠非和非合此乃自他相望正是破和合性隨意而說故非一塗聞聽下例破餘識聞聽者以耳與鼻辨異鼻名齅聞故三破無從不應識緣無從自出識緣者謂識起緣由前已破無因而無因亦是所從故再破無從四顯真三一會成七大若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅言本無所從者正以無所從來故是性中本具了別見聞覺知非六識也指前根大耳性非從所亦示根性本具均識均根竟然後以有情均無情皆性本具故無生滅溫陵云地等既然世界眾生物物皆爾不惟地等名大草芥塵毛皆可名大問五識是第八識見分元屬現量可會歸如來藏五意識及第六識是攀緣心今經斥為生死根本何亦是如來藏耶答九界攀緣之心無非理具輔行云竝由理具方有事用正此義也此攀緣心會入理體皆是佛法名如來藏問如來藏中何用此攀緣心耶答生滅之法性中本有以無生智現前生滅即除非性中永無生滅故攀緣之心亦性中本有以無得心現攀緣自息非性具永無攀緣復以性真圓融緣即無緣此義如涅槃中廣說又從略言之且會心王既會心王亦會心所故第二卷云我常說言色心諸緣及心所使諸所緣法惟心所現二斥迷令悟阿難汝心麤浮不悟見聞發明了知本如來藏汝應觀此六處識心為同為異為空為有為非同異為非空有荊公云於空云汝心昏迷空性覺故於見云汝性沉淪見性外現故於識云汝心麤浮識心內潛故浮則但認浮根麤則不達識精即中云阿難始執心在內并計七處既執心從因緣生是麤浮也見聞二字意該六根發明了知當指六識為同等者為與根塵同為與根塵異同異對根塵說空有就自體說或謂六識體同用異本一精明是同也分成六識是異也亦不違理三不變隨緣汝元不知如來藏中性識明知覺明真識妙覺湛然徧周法界含吐十虗寧有方所循業發現世間無知惑為因緣及自然性皆是識心分別計度但有言說都無實義文分二初悟性圓融二迷情失旨初中二一明不變次明隨緣初文中亦具性體性具性量三義本性之識即妙明之知覺體之明即性真之識幽溪云性識真識存本位而言即第九白淨識也明知覺明廢本位而言即本覺妙明也前五大相會或會有相以歸無相會無情以歸有情至見大識大理無不極但會其異名別說而已此言存本位廢本位即體兼用冥之義是性具也特言妙覺湛然不云清淨本然者上六大有相故言清淨以彰離相今識心元自無相融入覺體是名妙覺以無分別而善分別故覺名妙下文云此湛非真流急不見蓋八識之湛非真而性識白淨為真湛耳此性體也周徧法界是性量也次隨緣中無隨心應量者前五大是無情法根是清淨四大皆可云隨心今正是心何必言隨心既不云心亦不必云所知量矣含吐者後文云如意默容十方三世世出世法惟聖與凡無不包容據經所說豈非含十虗乎又能分別諸法豈非吐乎寧有方所故不可於七處求之七處如首卷徵心中說循業發現者現為聖凡諸識或隨佛界之業或隨九界之業凡具心識咸是妙覺如匠作舍運斤若風如人作書心手相稱是其靈明廓徹不思議之力雖在夢幻空華中而具足成就不差毫髮孰非佛性之用此心識不賴根塵非關卜度眾生以妄想侵之故落生死若知其本絕言思則九界無非佛界古人云分別亦非意正此義也世間下斥迷迷何在在識心分別計度耳故知分別之心元非思量分別所及其義明矣須知止觀明兩重所觀今經亦爾彼文第一重立六識為所觀境即去丈就尺等文是也第二重觀不思議境即一念三千之文是也雖立陰觀妄而融妄即真觀之令成不思議境則兩重止是一重今經自初卷來亦以妄心為所觀境然破妄顯真且指攀緣心為生死本直至今文方云性識明知覺明真識均成七大皆不生滅然後知現前六識即是不思議境豈不與止觀文若合符節皆觀妄心以成真心大顯兩重止是一重不惟正觀總無明心別約能招報心是同而已故今經徵心之說至此方竟所以自初卷來節節呈疑以問起答至明識大圓義始畢下文大眾領解亦經文一大結局也問七大之文前四乃對空而辨云性色真空性空真色等第五空大乃對覺而辨云性覺真空性空真覺第六見大乃對覺明而辨云性見覺明覺精明見第七識大又乃對明知而辨曰性識明知覺明真識如此對辨不同何也答此由眾生無始迷真覺以為根識局內身以遠外境對空色以分大小如經所謂晦昧為空空晦暗中乃至惟認一浮漚體目為全潮窮盡瀛渤如來憐愍斯輩將為指迷而即悟故必自淺以之深先以無邊之虗空對辨有邊之四大故往復言之而曰性色真空性空真色乃至性風真空性空真風所以然者地大之色堅質而有方所者也虗空融通故無方所矣水火風大搖動而有生滅者也虗空恒然故無動搖矣凡有生滅去來則有虗妄無生滅去來故性真圓融矣今日性色真空性空真色猶言空性色亦性空真色亦真色之與空本無差別故於第五大文中而和會云若此虗空性圓周徧本不動搖當知現前地水火風均名五大性真圓融皆如來藏本無生滅阿難汝心昏迷不悟四大元如來藏當觀虗空為出為入為非出入是則四大與空均一常住相雖示異性乃元同莫不清淨本然周徧法界稱之為大不亦宜乎復次色空之常徧雖融身境之無差未會故又於空大文中而云性覺真空性空真覺所言覺者通而言之即根與識也所以空覺相對而辨者夫根識有覺知者也虗空無覺知者也事固如是理實不然故往復言之而曰性覺真空性空真覺猶言覺性空亦性覺真空亦真空之與覺元無殊異故於見大文中而和會云若見聞知性圓周徧本不動搖當知無邊虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅斯則以根識均虗空豈惟虗空非無情而地水火風亦非無情以虗空均根識豈惟虗空常徧而根識亦常徧也稱之為大不亦宜乎復次內外既會身境圓融然於真妄兩途情執猶如冠履故又於見識兩大文中而云性見覺明覺精明見性識明知覺明真識此皆全體起用全用在體故往復言之若此所以古德云約諸識門雖一多不定皆是體用緣起本末相收從本向末寂而常用從末向本用而常寂寂而常用故靜而不結用而常寂故動而不亂靜而不結故真如是緣起動而不亂故緣起是真如真如是緣起故無涅槃不生死即八九為六七緣起是真如故無生死不涅槃即六七為八九無涅槃不生死故法界皆生死無生死不涅槃故法界皆涅槃識既如是根亦復然豈惟六根即向之五大莫不體用相即以三界惟心一切惟識故故於識大文中而和會云若此識心本無所從當知了別見聞覺知圓滿湛然性非從所兼彼虗空地水火風均名七大性真圓融皆如來藏本無生滅夫諸法真常圓會若此稱之為大不亦宜乎是以聖言至此詮理既極當機氷執情亦泮然上皆取幽祖玄義重示二聞法領解此科從初卷如來演說分來初酬請開示已竟今是第二領解又分為二初長行二偈頌長行是經家敘益為二一敘當機獲益二一略敘益為大眾所同得之益也爾時阿難及諸大眾蒙佛如來微妙開示身心蕩然得無罣礙言微妙開示者總指三科初從假入空徵心辨見二從空出假諸三摩提三中道了義無戲論法現前一念即空即假即中諸相皆融是微妙開示也幽溪云了身無身相即是法身心無心相即是常心故身心蕩然疑惑銷除是無罣礙二廣上文二一悟心徧是諸大眾各各自知心徧十方見十方空如觀手中所持葉物一切世間諸所有物皆即菩提妙明元心心精徧圓含裹十方反觀父母所生之身猶彼十方虗空之中吹一微塵若存若亡如湛巨海流一浮漚起滅無從此即廣上身心蕩然而有三重初心含虗空孤山曰各各自知即能覺之智也心徧十方即所覺之理也前文云色心諸緣及心所使諸所緣法惟心所現又云色身外洎山河虗空大地咸是妙明真心中物今正得此益蓋前文有圓別二示圓示諸法惟心別則撥去根塵獨顯見性而示別正為顯圓今是領圓故曰心徧心者常住真心也於性具七大之後方領心徧者良由性具故惟一心若領惟心即領性具約不變則稱性具約隨約即曰心徧其旨大同於此見圓教初心徹三諦之底而性具七大秪是諸法所生惟心所現之義耳長水曰向執心在身中謂言是我真性今知空在心內如片物持於掌間孤山曰十方空者謂循業發現之空也迷妄有空比真為小故以掌葉為喻次心含世界吳興云一切世間等謂依空立世界也即十界循業發現依正之法耳皆即菩提等謂十方虗空十界依正一法叵得皆我真心觀此文者豈疑無情有性無情作佛之說耶長水云向執心外有法今悟法法惟心菩提云覺覺即是佛乃至立量示等具如義海及桐洲註心精徧圓含裹十方結上空界皆心耳三反觀自身此文從廣至狹先十方空次及世界三及自身謂阿難大眾自觀己界正報之身也文有二喻初空中一塵以喻肉質至小理即事故若存事即理故若亡次湛海浮漚以喻陰本無生來時不從自他共離來去時不向東西南北去故云起滅無從桐洲註云若以文往觀則有空塵一喻可無海漚一喻有海漚一喻可無空塵一喻若以義往求則非空塵一喻無以顯心徧而身局非海漚一喻無以顯身局即心徧二義相須故有二喻亦猶河圖洛書相為經緯八卦九疇相為表裏前後文雖為顯心徧身局且欲顯身心一體故竝用塵漚一喻二卷六卷至辨魔文欲談此心至大虗空世界至小故復以雲點太清為喻觀者詳之二獲常心了然自知獲本妙心常住不滅霅川曰得分真智知本覺理幽溪云前佛告阿難一切眾生從無始來生死相續皆由不知常住真心性淨明體用諸妄想此想不真故有輪轉故自首卷來無非明常住真心當機圓悟故此經云獲本妙心常住不滅前云不知今則云知迷悟二相了然可別又前明心量對依正以明圓具今明心體故云常住不滅體用咸備是當機妙契圓常之旨即所謂不歷僧祇獲法身也二敘外敬內悅禮佛合掌得未曾有於如來前說偈讚佛二偈頌五一讚歎述益玅湛總持不動尊首楞嚴王世希有孤山曰妙湛讚真諦般若德也總持讚俗諦解脫德也不動讚中諦法身德也又即三而一故曰妙湛即一而三故曰總持非三非一故曰不動尊者十號之一也由證此三號世中尊首楞嚴大定之總名此云事究竟也冥三德之理故曰究竟別而往目即奢摩他等三焉阿難以別名而請今舉總名而歎以顯圓定三一無礙也出偏小上喻之以王是則行從理而得名教從行而立稱教行理三悉號楞嚴今正舉能詮以歎也如來在世所說經中最為殊勝曰世希有幽溪曰上句讚能說之人下句讚所說之法或謂妙湛二字領上初卷至二卷辨見之益總持領上諸三摩提益不動領上聞七大益其說固是然徵心之初佛言有三摩提名大佛頂首楞嚴王具足萬行已指徵心法門即是性識明知覺明真識三諦法門一語全該方盡今偈之意亡相為妙清徹為湛銷我億劫顛倒想不歷僧祇獲法身桐洲云初偈即顯三寶初句是能說教主即佛寶次句是所說經教即法寶銷我二句是受益之人即僧寶孤山曰億劫顛倒想即無始無明也不歷僧祇者若婆沙論明三阿僧祇劫修六度行百劫種相好因然後獲五分法身乃至如唯識云地前歷一僧祇初地至七地滿二僧祇八地至等覺是三僧祇然後獲究竟法身此皆方便之談時長行遠今云不歷即同法華八歲龍女南方作佛華嚴初發心時便成正覺胎經凡夫賢聖人平等無高下惟在心垢滅取證如反掌貲中曰由前廣破人法二執故此分見如來藏心也又解或是諸佛神力示現暫令得見如華嚴中金剛藏菩薩說十地境界恐有不信以神通力攝諸大眾皆入身中菩薩既爾佛亦如是不爾何故阿難向後方得二果耶長水曰據此經文且敘解悟如云各各自知心徧十方知即解也敘雖論解不無證悟以隨人入位淺深不同故吳興曰此文疑論者久矣而多所未決今試辨之且經家敘云爾時阿難及諸大眾蒙佛開示身心蕩然等是則說偈領悟非述一人而釋者爭以阿難一人為妨可乎當知若約解證言之必屬於證以知為解無的可憑如云正徧知者豈屬解歟須據偈中不歷僧祇獲法身義驗前知字實頓證之智也若釋銷我之言應有二義一者且指諸菩薩及利根等人為我阿難雖在眾中未同其證蓋從多分得證者言之二者設是阿難自稱為我已同其證斯亦無妨下文所得二乘不可以小乘實證為比及乎喻以旅人請入華屋乃為鈍根者發起行門耳大權引物惟變是宜或曰不然予不知其然也上文皆錄會解二誓願報恩願今得果成寶王還度如是恒沙眾將此深心奉塵剎是則名為報佛恩孤山曰前獲初住分果今願成正覺極果也乃至配攝四弘誓云云即中云前獲法身今願得報身即於今世願成報果故曰願今下奉塵剎語該應身如入五濁豈非應乎奉塵剎者以我深心歸奉塵剎如來眾生是酬佛微妙開示之恩也幽溪曰前阿難尊者緣佛相好發心出家所依之境狹而不周事而非理正而不真惟自利而未利人今聞前法悟不思議境故所發心非惟自利兼人亦乃真正廣大乃權乘菩薩所不能及可謂真正發菩提心也但發心位次不同如肇公云發僧那於始心終大悲以赴難此名字發心也仁王云十善菩薩發大心長別三界苦輪海此相似發心也華嚴云初發心時便成正覺此分真發心也據迹則阿難位居相似論本則位當初住次陳報恩者蓋圓聞深法已獲深悟大感深恩非淺心所能報故欲報深恩莫若深心欲創深心莫如深願先陳願而後述心其意在此是則前文是觀不思議境今為真正發心也前作三身今配兩乘者隨位淺深意不相妨三請證大願伏請世尊為證明五濁惡世誓先入如一眾生未成佛終不於此取泥洹吳興云前願度人如釋迦故云願度是眾今願取土如釋迦故云五濁誓入此正深心奉塵剎之事既入五濁非釋迦不能證明泥洹即涅槃此云安樂有一生未度則不歸於安樂之處補遺云此中誓入五濁乃行因與物結緣之相吳興指果則成佛之後大悲赴難不但受大涅槃之安樂補遺指因而泥洹之名亦不專在小乘謂縱成佛果亦不入涅槃耳法華中二乘畏入五濁元非阿難所說四希更說法大雄大力大慈悲希更審除微細惑令我早登無上覺於十方界坐道場孤山曰請更開導除細惑者以今始入初住尚有微細無明故又後文富那所問即微細惑也無上覺即妙覺除細惑是煩惱誓斷成妙覺是佛道誓成前還度句是眾生誓度而願今得果及希更之言即攝法門誓學前後偈文四弘攝盡桐洲云前明三德之體故曰妙湛等今明三德之用故曰大雄等涅槃云佛性雄猛故知大雄是法身之用又云是諸聲聞無有慧力故知大力是般若之用又云慈即解脫故知大慈是解脫之用既理顯智極斷圓廼能無謀而化故今更請開導除我細惑桐洲之釋至矣於十方界坐道場者初住百界作佛二住千界作佛乃至妙覺無有窮盡總名十方界也治無明糠顯法性米是名道場當機欲速取菩提而不入涅槃乃慈悲度生之義五總結前偈舜若多性可銷亡爍迦羅心無動轉舜若多此云空爍迦羅云堅固空性無體尚可銷殞弘誓堅確終無動移即前四弘誓願不可動轉也
