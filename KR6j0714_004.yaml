body:
  text: 二對滿慈更審除細惑明如來藏即中云三卷末聞法領解中偈云大雄大力大慈悲希更審除微細惑即今富那所問如來所破之微細惑也科為二一答富那問次更釋餘疑初中四一疑請二一述未達爾時富樓那彌多羅尼子在大衆中即從座起偏袒右肩右膝著地合掌恭敬而白佛言大威德世尊善為衆生敷演如來第一義諦世尊常推説法人中我為第一今聞如來微妙法音猶如聾人逾百步外聆於蚊蚋本所不見何況得聞佛雖宣明令我除惑今猶未詳斯義究竟無疑惑地世尊如阿難輩雖則開悟習漏未除我等會中登無漏者雖盡諸漏今聞如來所説法音尚紆疑悔言第一義諦者對偏小因緣生法祗是世諦今名第一義諦世尊所演是一心三諦之道總名第一義諦能善敷演是真善説法也富那但於真諦説法第一今聞中道了義故不能知喻中含三比況之義聾人之耳覿面不聞況逾百步大聲不聞況於蚊蚋形之大者遠或可見今尚不見何況得聞然聾人之譬本譬聲聞根性遠於佛智故云逾於百步亦兼以蚊蚋喻微妙法音也問前後皆云今聞喻中何言何況得聞答言不聞者乃是聾人不見不聞不必以喻難法而言富那不聞此中文意但明聞猶不聞而已本所不見喻本不知中道之理何況得聞喻不悟中道百步外喻二乘真理去中道遠不生聞慧如聾人也秪因二乘不悟令佛微妙法音喻同蚊蚋若悟則同塗毒鼓音聞即殺人豈蚊蚋乎本所之言對下何況不必以本為昔而作今昔相對之解交光云敘昔未聞又云回思昔日方顯敘昔一何謬哉未究竟無疑者如下問二疑是也阿難雖悟而未除漏則於所悟幽微之處必未了了我等除漏尚紆疑悔較之阿難似各有得失長水云羅漢煩惱障輕故得無漏所知障重故紆疑悔阿難所知障輕故先開悟煩惱障在未除習漏二呈二疑二一疑世界生起世尊若復世間一切根塵陰處界等皆如來藏清淨本然云何忽生山河大地諸有為相次第遷流終而復始此問總躡前三科七大而生其中山河忽生發起下文妄為明覺之義次第遷流發起下文三種相續之義幽溪曰溫陵云清淨則宜無諸相本然則宜無遷流與下答文似不相應富那問意謂七大既清淨本然而隨緣不變方其隨緣之始且云何忽然而生既生已後云何無有已時次第遷流終而復始如來下文答以妄為明覺正答生起之由覺明空昧相待成搖明妄非他覺明為咎想愛同結愛不能止正答次第遷流終而復始蓋富那問意謂隨緣即是不變何故有染法生起如云世間一切根塵陰處界等是隨緣也皆如來藏清淨本然是不變也豈非隨緣即不變乎若爾則不應有山河大地諸有為相矣況相續乎二疑大性周遍又如來説地水火風本性圓融周遍法界湛然常住世尊若地性遍云何容水水性周遍火則不生復云何明水火二性俱遍虗空不相陵滅世尊地性障礙空性虗通云何二俱周遍法界而我不知是義攸往惟願如來宣流大慈開我迷雲及諸大衆作是語已五體投地欽渴如來無上慈誨前問總躡三科七大而起今聞專從七大而有前如來明七大周遍融成一性滿慈聞此執相上互相陵滅疑性中不合相容此正疑性具之理也譬如慈母而生七子兄弟相爭惑者謂未生子前慈母胸中已先具鬩墻之變豈有是哉良由滿慈未曉即空而具即具而空故懷此惑是未明三如來藏耳幽溪曰此雖問理而實問行問行而實問惑乃不隨三種分別之一揆如曰汝以生滅之心相傾相奪於如來藏而如來藏隨為色空非惑乎吾以妙明不滅不生合如來藏而如來藏惟妙覺明圓照法界非行乎祗此二語而如來藏能隨染淨緣具造十法界之理俱明可謂善問善答者矣攸所也如後所説則此義往至三如來藏中也惟願下結請二許宣爾時世尊告富樓那及諸會中漏盡無學諸阿羅漢如來今日普為此會宣勝義中真勝義性令汝會中定性聲聞及諸一切未得二空回向上乘阿羅漢等皆獲一乘寂滅場地真阿練若正修行處汝今諦聽當為汝説欲答其問先示聞法之益諸會中指諸聽衆漏盡下別指羅漢大乘為勝義圓教為真勝義又勝義根中揀顯真如勝義之性故云也定性下有二種聲聞保證涅槃名定性聲聞不及回心羅漢已向上乘然皆獲一乘者此經前三卷未開權教四卷已去時有開顯之言恐已入法華時矣蓋法華八年所説其中未必無餘經如方等陀羅尼經亦其類也今云定性聲聞皆獲一乘詎非開顯之明文乎未得二空者未得大乘人法二空亦未得大乘性相二空吳興曰寂場指得果之地練若指修因之處因果所依皆是實相故曰寂曰真也阿練若翻無喧雜正是寂因故以為正修行處三佇聽富樓那等欽佛法音默然承聽四正説二一答世界生起二答大性周遍初世界生起中二初明衆生迷真故起妄二明如來證真故無妄初又二先答清淨本然云何忽生山河大地諸有為相二答次第遷流終而復始初中又二一直拈正義有問答佛告富樓那如汝所言清淨本然云何忽生山河大地汝常不聞如來宣説性覺妙明本覺明妙富樓那言唯然世尊我常聞佛宣説斯義性覺妙明本覺明妙即前開示七大中性色真空性空真色性識明知覺明真識只一圓融總相天然三諦之理具足諸法覺是圓中妙是真空明是妙假而妙假中天然能生諸法而諸法一一性具皆即空中正全性起修即理具而為事造一一無非本如來藏清淨本然周遍法界如即中云妙而明不失俗諦之照山河大地何嘗不現其中明而妙不乖真諦之空何曾有山河之相如下文云汝稱覺明是知覺明離妙便為生界之由故覺妙明三缺一不可乃天然三諦初無能生所生之相其如富那雖聞已上開示未能師子咬人猶認名言將山河與真性分作兩橛而問云何忽生此一問即見當機未解前七大中所明空不空如來藏皆具三諦無非清淨周遍之妙矣故佛換轉話頭直示之曰既曰清淨本然何有能生所生之相汝豈不聞如來比説性色真空性空真色性覺妙明本覺明妙能所既絶對待俱亡之天然諦德乎此是如來高提向上一事意令當機直薦周遍圓融隨緣不變清淨本然者也正如古人疑問清淨本然云何忽生山河大地而答者只高聲躡其所問而答之疑者一聞即悟無生之妙訣也其如機情未解但曰聞説而已佛則不得已且置向上用中下法以勘出迷源也此中解釋吳興天如言之皆當可無煩辭但恐交光異説詒誤後賢再為辨之夫性覺本覺只一中道不過轉易其文耳而交光曰性本異稱各有詮表性表一真理體未有事用而舊以三諦釋之不知其無俗諦也本表天然本具不論修為而舊以三觀釋者不達其非工夫也據交光之説斥孤山謬論三諦吳興云空假中復是三觀不知孤山所言俗諦是性覺中本具妙有何得定云此中無俗諦耶不知諦之與觀皆名空假中乃謬斥云此非工夫又不知性中本具體用乃呵云此中未涉事用交光法相不明妄斥古人皆是此類如觀經玄云假是虗妄俗諦也空是審實真諦也據此文豈非空假亦名諦乎今經性具七大豈非本有妙俗體兼用冥寧不該事豫豈好辨哉聊存古規而已交光又云此是空劫以前真理愚謂遇飯即飯遇茶即茶所謂性覺妙明本覺明妙何定屬空劫前耶二勘出忽生二一明世界生起迷源二示世界生起相狀今初有問答定佛言汝稱覺明為復性明稱名為覺為覺不明稱為明覺富樓那言若此不明名為覺者則無所明佛言若無所明則無明覺有所非覺無所非明無明又非覺湛明性已過關者在佛提性覺妙明處如俊鷹快翱翔而去不必更説機既未悟則易驗迷情故佛只將兩個話頭以探試之為復性明稱名為覺此是自然性明一途富那元以此説為是為覺不明稱為明覺此是晦昧無明一途覺體不明而稱之為覺元無此事是如來以此覺不明三字權詞以探試當機者而當機即曰若覺體不明而名之為覺則全然是一段無明境界矣烏得稱之為覺又烏得稱之為明哉蓋以無明為覺人人知其不可也何者以其覺體昏昏既無能明之明亦無所明之覺非無明而何哉故曰則無所明富那此答雖清不覺墮在能所因緣生起內矣蓋所明二字大是病根有所明之覺有能明之明能所歷然對待齊立下云明妄非他又云所立照亡所明豈非迷本乎蓋富那語勢已落在必是有一能明之明去明所明之覺方得名為覺明耳故佛即提富那病根而足成其語以結出忽生之源云據汝説若無所明則無明覺則必要有一能明所明矣詎知性覺妙明境智一如如來藏體即大光明藏譬大圓鏡法爾自有光明明非外有亦無能所今汝謂若無所明則無明覺是欲於明鏡上更加一個能明之物方稱明覺豈知此所加之明即是鏡上障礙正能所立而照性亡大有所有而本覺妙明白雲萬里矣故曰有所非覺此句乃斷定能所因緣而忽然生起之迷源也下即繼之以無所非明等者此如來截定衆生因緣自然及與雙非之計皆是妄也蓋恐愚人不知見認為有所則落於能所句內為生起根本即生轉計計無所為究竟斯則又墮於自然窟內故佛復遮之曰無所非明又恐愚人見佛有無皆斥即計為不有不無不局因緣自然而但是任運隨他去此則又落於非自然之無明窟內矣豈是靈明洞徹之性覺明妙乎故又曰無明又非覺湛明性也夫性色真空性空真色性覺妙明本覺明妙清淨本然周遍法界即所謂圓滿太虗無欠無餘也世人之所以迷妄忽生者良由取捨所以不如耳富樓那之見必要有一能明之法以明覺體此是體上加明成乎增謗之取若曰無所此又於體上去明成乎減謗之捨也寧知這個上取不得捨不得耶或者以為任運昏昏不取不捨此又落在非有非無無明窟內均非本覺妙明圓滿太虗正體所以佛以三關通斥迷情也又復若斥富那忽生迷源只有所非覺一句至矣盡矣其如世間執計之人知見甚活如佛世外道破有計空破空計雙亦破雙亦計雙非所謂惡見稠林處處貪著佛欲法門詳盡破執周悉故約三句斥之而雙亦該在其中矣又復應知已能了悟清淨本然周遍法界者有亦是如來藏元具諸法也無亦是第一義空不存一相也雙亦雙非亦是圓中實相離即離非是即非即也今不了悟者有亦不是有所非覺矣無亦不是無所非明矣不有不無亦不是無明又非覺湛明性矣然如來先以兩關誠問雖是勘驗迷人之權法亦是如來不得已而施之者也蓋無狀忽生難以形言秪是真如不守自性一念不覺而有動動即有苦遂成世界河山論到忽生之源地住菩薩方見其終等覺後心能見其始惟佛與佛破盡明了所謂冷暖自知難以拈出示人以其全體虗妄如迷頭狂走初無因由所以如來亦只就富那現前不了處點示之耳昔魚朝恩問欽禪師如何是無明無明從何起欽曰世衰道微奴也解問佛法魚朝恩大怒欽曰此即是無明無明從此起亦只就現前點示意也則知今日富那謂有所明未嘗非真蓋如來藏明元自生法索照以其未了執有即忽生迷源矣富那方便土中能所是現前法朝恩同居土中大怒是現前法一同此段諸説甚夥但一涉法相便覺支離故愚竟以淺直之語解之二示世界生起相狀二初能所細相二依正粗相先細後粗次第應爾初中二一立妄能所性覺必明妄為明覺覺非所明因明立所所既妄立生汝妄能此如來重釋明上忽生之妄以成能所細相上雖有有無雙非三妄富那只執所明故今亦只在所明上點迷言性覺必明者性覺既明便不須更明此覺其如明必索照遂起妄心還來明此覺體是妄為明覺也覺非所明二句又是釋清妄為明覺意問何故此明却是妄耶即釋曰覺體是中道亡能絶所元非所明而明既索照因別立一所照如人作夢從無而有因明立所其義亦然今經示從真起妄多先成外境後成內根今由明索所照妄立外境本無忽有是為所明所明既立復妄立能明以照前境到此全是妄法真明隱矣言生汝妄能者汝指富那富那漏盡已脫分段生死在變易界中業識未空妄所妄能富那咸具故云生汝妄能也所以此文是能所細相後勞久發塵下方是依正粗相又復因明立所空如來藏中具有三諦性覺本覺中道之體也妙明明妙空假之用也空是寂寂故妙假是照照故明三諦之中有一諦能生山河俗諦是也經云覺非所明因明立所豈非於俗諦開出諸法乎此義在妙玄妙玄五下三法妙中以第一義諦為中如來藏為假第一義空為空而云佛從何法開出權乘於如來藏開出聲聞緣覺及通別菩薩等乘據彼文於俗諦開出權乘今亦例彼於俗諦出生山河義最相合何者經云所既妄立生汝妄能汝是富那例推藏通果位別教因人妄所妄能全在皆可出生山河故於俗諦開出權乘即於俗諦出生山河也遡因明立所以前明是俗諦元非妄法至立所時明即妄因故後偈云元明照生所所立照性亡是則因明而生不明之法其義明矣須知俗諦能生諸法而以真諦達其本空即是以不滅不生合如來藏故在如來稱妙空明覺若為事法所惑不達空理便成三種相續矣此明能生法惟即中四十年台宗隨緣三十載教觀方能説能證也二出能所相無同異中熾然成異異彼所異因異立同同異發明因此復立無同無異從性覺妙明之無同異上因明立所成森羅山河大地之異相異彼晦昧森羅之異者即成虗空之同相此依報所相先立也於空色邊投一分妄想即知覺乃衆生之正報能相立故曰因此復立無同無異此無同異即下所謂真有為法非虗空故非同即四大故非異是妄能所成有情正報之本又同與異乃上妄所之所成也非同非異乃上妄能之所成也先分能所後成依正理數然耳能所皆惑心所具故不同依正二報也今言無同異者如性具七大本無同異今於妄所中忽彰四大等相及十二諸有為相等故云熾然成異問塵勞未發安有四大答性中已有四大今因明立所豈不即彰其相須知四大相非一種如背捨禪中見無煙清淨之火無塵逈淨之風黃白淨潔之地深淵清澄之水如此四大豈有塵耶咸是一心所現今亦例之於根本惑中彰此四大是為下文世界之本也今名粗細實不配同起信三細六粗而引背捨禪為證者昔天台智者謂八色流光是界外法正與今文所既妄立生汝妄能其相相似何者汝指富那富那是阿羅漢已成背捨等定見思既破無明尚在其所見地水等相非即分段生死中事也若爾應是方便土相然妄所妄能又在方便土先此是無明細惑先有此惑後成方便土又成同居分段生死方便同居皆屬塵勞故後文斥富那云汝暫舉心塵勞先起又云背覺合塵故發塵勞有世間相是則塵勞之言尚該方便皆在妄能所後其義明矣二依正粗相二初煩惱因二依正果問此中既有因果前能所細相中何無因果答妄為明覺妄即最初之因又云因明立所及因異立同乃至因此復立無同無異即後文所云自諸妄想展轉相因也若以前念為因後念為果則前文已有因果但不及此中因果彰顯耳但如是下古人俱作指上之辭今謂如是之言雖是指前塵勞煩惱此中別立如是擾亂相待生勞勞久發塵自相渾濁由是引起塵勞煩惱如是者牒上之辭因細生粗須承上文上文同異及無同無異三種顯發故云擾亂又云相待費力曰勞勞久發塵者欲成山河大地先現微塵塵具四微謂色香味觸并聲成五據後文云相待成搖故有風輪則此中相待豈無聲乎以此五塵混入見聞覺知名自相渾濁由塵勞故心則昏煩惱亂是五住煩惱為生死因也觀勞久之言則知後時方起塵相不得作指前之釋又六塵勞擾心則煩惱前相待生勞是覺體之勞後塵勞煩惱是人心之勞二依正果起為世界靜成虗空虗空為同世界為異彼無同異真有為法上塵勞煩惱元該五住此中依正該同居方便二種三界起為世界者欲界色界也靜成虗空者現前頑空及無色界也言虗空為同等者指今三界為前同異所成前是根本今是枝末指枝末即根本之相耳無同異是正報衆生造善造惡靡不由此真是有為之法對前真無同異故云彼無同異也當知未成依正先有妄所妄能此是細惑後依正成而正報為能依依報為所依元是能所之相又先成外境後成內根其相皆然故知依正只一能所其根源皆在妄為明覺耳二答次第遷流終而復始前答忽生已竟今約三種相續答遷流分二一別示三相三一世界相續二一釋相又二一成四大覺明空昧相待成搖故有風輪執持世界因空生搖堅明立礙彼金寶者明覺立堅故有金輪保持國土堅覺寶成搖明風出風金相摩故有火光為變化性寶明生潤火光上蒸故有水輪含十方界初成風大中言覺明者即覺體之明也覺明為生界之由故首言之覺明是元明然因明立所所即空昧一有昧空則真妄相待明欲搖暗暗亦欲搖明是相待成搖世界最下依風輪住故云執持世界大槩二法能生一法明昧二法生風輪一法下文例之溫陵以五行助釋而云土水生木者此時未有土水明得水性昧得土性風屬東方木是為土水生木也次生金輪雖相待成搖而易搖實由虗空如空處必生風是其驗也覺明之體因搖發堅故號堅明上覺明猶是真明今加一堅相是為妄心所染言立礙者昧欲搖動其明而明既發堅不為昧所搖亦不為風所動彼金下出金寶體此中以明為主明不為昧所搖而覺是其體故先言明而後言覺也所立堅相便是金寶金得覺體最多故為世間上寶經云如來之身金色微妙其明照耀據經所言故知但除情堅即證金光明法門矣輪有圓轉之義世間最下風輪之上次有水輪後有金輪然生起之序實先金後水於義無礙言木土生金者如云因空生搖空昧屬土風搖屬木由此二法生金寶一法國土之名當屬地大而下為金輪所持故皆屬地也次生火大堅覺寶成牒上文也金得覺體而染妄情之堅故云堅覺寶之一字義該於明然上句堅覺以覺該明下句搖明以明該覺同一風也前因搖覺明而成金今又因搖明光而成火火必由相摩而有如金木生火是已言變化性者火能變生作熟化有為無也後生水大谷響云若以五行論之金生水金是水之母水是金之子故生潤即金之含育也火是金之賊火尅金既母被尅故子下流成水輪也如釜中含水下以火蒸則其水騰氣流汗而下也即中云金火生水水雖在風輪之上金輪之下而實為金之所生不專在下亦遍於上故云含十方界如上四輪雖不離衆生現前一念然以法性為因無明為緣生此大種不必專約有情心釋恐濫同於衆生業果耳二成諸相上文雖明四大而明覺立堅故有金輪實未闡國土之相今明水火生土方成大地并示草木燒絞以盡其相火騰水降交發立堅濕為巨海乾為洲灘以是義故彼大海中火光常起彼洲灘中江河常注水勢劣火結為高山是故山石擊則成𦦨融則成水土勢劣水抽為草木是故林藪遇燒成土因絞成水交妄發生遞相為種上明世界之體今明器界之相交發立堅者是水火成土此與明覺立堅堅相雖同而金土別矣濕為巨海水降之所立也乾為洲灘水火之所成也濕為巨海而在立堅中者海有底岸詎非土乎洲者水中可居處人及鳥物所聚息也灘音壇水中沙渚觀海中火起則知火交於水觀洲中河注則知水交於火水勢劣火者是水勢少火勢多擊則成焰復火之本也融則成水復水之本也水底蛟龍以石為食亦融則成水之證也草木為地之毛草木多處為林藪或謂五行生尅非楞嚴經旨難云遇燒成土是火生土因絞生水豈木生水乎今謂水生木是相生之次木成水是復本之義水既生木故木還成水文中擊成焰融成水乃至燒成土皆復本釋耳交妄下總結上文文中皆以二法和合而生一法故云交妄然最初覺明空昧是真交妄餘俱二妄相交遞相為種者如木土生金金木生火火金生水水火生土土水生木是也二結示以是因緣世界相續真妄和合名為因緣又兩妄交合亦名因緣前後相望為世方位為界終而復始是相續即以兩法生一法之因緣而世界相續也二衆生相續前答忽生之故必先立所明後立能明所即是境能即是根今三種相續中國土即妄所也衆生業果即妄能也故妄所妄能攝盡前後之義文云所妄既立明理不踰明既稱理不可即是妄能而所必先立其義了然至云六妄成就由是分開見覺聞知則先所後能明矣為二一釋相二一明根塵和合流轉四生復次富樓那明妄非他覺明為咎所妄既立明理不踰以是因緣聽不出聲見不超色色香味觸六妄成就由是分開見覺聞知同業相纏合離成化前文因明立所所既妄立生汝妄能乃至相待成勞以後之事皆明妄也非他者言更不從他處起乃因中道之覺具有照法之明遂生諸法故曰為咎所妄既立即上文所既妄立明理為本明之體是理非事即性覺必明也由所妄乃明覺所成故明理即附合於所妄而不能踰越乃真妄和合之義耳衆生相續中先揭此者以國土是無明昏昧所成衆生是明所成而衆生之明又必依附於無情之法故先示之以是因緣者以真妄和合之因緣也此中當以明理為因所妄為緣聽見是人本性聽附於聲故不能過聲而及色見附於色亦不能超色而及香所以成根此二句承上真妄和合而明根隔之故也色香下專顯根隔言六妄成就者在前細能所中塵未彰露今粗塵既彰名六妄成就又世界相續中風但有聲及觸火具色觸水具色觸味地則咸具名為成就塵成則根愈隔衆生為根塵所局其相孰不然耶同業下明四生相溫陵曰同業即胎卵類因父母己三者業同故相纏著而有生合離即濕化類不因父母但由己業或合濕而成形即蠢蠕也或離異而託化如天獄鬼等類也二明受生形相升沉不定二一別示胎生見明色發明見想成異見成憎同想成愛流愛為種納想為胎交遘發生吸引同業故有因緣生羯羅藍遏蒲曇等人投胎時見大地皆黑惟一處明了祗見父母交會之色故云見明色發於明了處既見此相即成託胎之想如下所云異見同想是也故曰明見想成若識神是男則以父為異為憎以母為同為愛女人反此此中陰身中所見母納受此想而成胎耳流愛者當是父母所流赤白二滴即是愛水此為受身之種納想者納想於赤白二滴之中也因父母交遘發生後陰而實由父母與己其業相同故為所吸引如磁石吸鐵故有因緣下明胎中五位俱舍云一七名羯羅藍此云凝滑二七名遏蒲團此云皰三七名閉尸此翻軟肉四七名健南此云硬肉五七名鉢羅奢佉此翻形位今略舉前二等取後三有因緣者凝酥薄酪各有因緣在母胎中每須一相即用一風染之在句記十二卷二紙具明則胎中五位各有因緣可知孤山曰納想者有福者想其母胎如華林殿堂薄福人惟棘樹圊廁云云二總明四類胎卵濕化隨其所應卵惟想生胎因情有濕以合感化以離應情想合離更有變易所有受業逐其飛沉隨其所應者隨其所造惑業而受此果也想者取相執著有似乎卵情則鍾愛耽戀結而為胎合者附著不離以此業而感濕離者不與物合故得化生之應四句中感應交雜因果互陳情想下更論改易先因次果因心中或情變為想合易為離所有下示其果也受業者所有受報隨業善惡三世受生不定一道在六道中或飛而升或墜而沉然前云情想合離有似乎惑既云受業應是業苦受即苦果也蓋總論多生則有變易飛沉之不定故下即云衆生相續或云變為蛤魚化為龍別一途耳止在畜趣不太局耶又卵生居首者想念初動情愛後起又兼胎濕化故耳此文論想乃內分染想非外分淨想論化乃轉蛻業化非意生妙化也二結示以是因緣衆生相續以根塵不脫之因緣故衆生相續欲出生死必須脫根欲脫內根必先脫塵以根由塵所成耳烏有不脫根塵而出生死者哉三業果相續業為招果之因因果並陳故云業果業即淫殺盜三世間衆生惟見現在不見未來於此三事謂名教所不禁恣意放行不知生死之由實在乎此為二一釋相又二一別示三一欲貪果富樓那想愛同結愛不能離則諸世間父母子孫相生不斷是等則以欲貪為本想愛下舉業則諸下舉果想愛之言似專指惑然觀文意想指淫想愛即兼業如男女相愛豈非業乎以惑助業故云同結父母子孫恐不專在人倫亦不獨在胎生即想愛之果也是等下舉果彰業謂眷屬繁多蒸嘗相繼皆以欲貪之業而為其本觀子孫相繼則己身生死相續可知二殺貪果貪愛同滋貪不能止則諸世間卵化濕胎隨力強弱遞相吞食是等則以殺貪為本貪是貪彼之味愛則自愛其身貪愛兩念互相滋長雖欲自止其貪而不可得以強食弱是遞相吞食畜生中魚鱗相咀亦其類也殺是嗔業實可助貪以助貪故殺不可止又酬命時亦兼貪嗔酬命是嗔也貪味是貪也文中遞相吞食一句殺業及果皆在其中以強弱可互為耳是等下舉果彰業相吞相報其事甚多皆以殺貪之業而為其本三盜貪果以人食羊羊死為人人死為羊如是乃至十生之類死死生生互來相噉惡業俱生窮未來際是等則以盜貪為本盜貪中復論相食者殺生罪重故重舉之又前殺貪必資始於欲故建首云貪愛同滋今盜貪又資始於殺故云以人食羊等淫殺盜三相由而致可不慎哉特言羊者舉一例諸又旁生中羊最無罪人喜食之是弱肉強食耳羊死為人人死為羊是強弱可互為也羊既無罪為人甚易人死為羊償報宜然世人但貪滋味豈知人羊酬報之相似乎十生如二卷中已釋死死生生者前死後死前生後生前生則我噉彼今生則彼噉我前死後死例之言歷無量世恆相吞噬也惡業俱生者冤對相聚故曰俱生不與而取曰盜如羊不與人食而人食之盜也盜貪為本者謂還償以盜貪為本盜亦名貪人能止貪則三惡業皆除矣二總顯前別示中是舉果以彰業今總顯中是舉業以明果汝負我命我還汝債以是因緣經百千劫常在生死汝愛我心我愛汝色以是因緣經百千劫常在纏縛此省文影互故合殺盜為一股以成對偶若汝負我命汝還我命我負汝命我還汝命我負汝債我還汝債汝負我債汝還我債則二句即成八句言百千劫在生死者或謂衆生以淫欲受生殺盜非續生之本不知負財負命還償無已何由出生死乎愛憐相對只有二句如一人有色可憐一人有心可愛便可相當而有色者未必有心有心未必兼色故只二句而已縱再演之惟有四句或汝愛我心或我愛汝心色亦例之無八句也言百千劫在纏縛者前父母子孫相生不斷此種類相續非己業報今所明者即己之業果而自他業果皆在其中矣又殺盜淫三種皆貪則三種皆續生死又三種業果皆通自他思之可見二結示惟殺盜淫三為根本以是因緣業果相續以身三惡業之因緣而業果相續前二相續皆是已成之局惟今業果最宜痛戒為報在未來故也二總結緣由富樓那如是三種顛倒相續皆是覺明明了知性因了發相從妄見生山河大地諸有為相次第遷流因此虗妄終而復始初句總牒前文三種顛倒不出依正皆是覺明者推其原也如初告滿慈即云汝稱覺明非其原乎而此覺明性元非妄因明而起明了知性妄之始也如前云妄為明覺謂妄心起而還自照其覺此明是妄之始即今云明了知性雖屬妄始未離真明真妄和合亦名為性因了發相即因明立所也妄見即生汝妄能也諸有為相意該有情因此虗妄者指妄為明覺及妄所妄能皆名虗妄前文有三妄字可據若竟指覺明為妄豈中道之覺俗諦之明皆稱妄耶但俗諦為生法之原故必依此而起妄念耳二明如來證真故無妄二一疑問富樓那言若此妙覺本妙覺明與如來心不增不減無狀忽生山河大地諸有為相如來今得妙空明覺山河大地有為習漏何當復生問此妙覺乃衆生同有之妙覺也妙覺體中本具三諦故云本妙覺明此心在諸佛不增在衆生不減平等無差滿慈先立此句以為設難之本意謂在衆生不減既無狀而忽生無狀猶無故也在如來之不增山河大地何當復生乎有為即衆生習漏即業果二喻釋二一明妄因妄果其體本虗二明真智真斷不重起妄竊觀此文四喻而有三結觀下結文喻意可識初迷方喻妄因本空兼破有為習漏復生之疑次空華喻妄果非有破前山河復生兼斥富那之問第三第四喻菩提涅槃法喻相合文甚了然初中二一迷方喻妄因本空又二一別喻二一喻迷因無本有問答佛告富樓那譬如迷人於一聚落惑南為北此迷為復因迷而有因悟所出富樓那言如是迷人亦不因迷又不因悟何以故迷本無根云何因迷悟非生迷云何因悟迷人喻衆生聚落喻如來藏民之聚居故名聚落夫山河忽生有因有果果是山河因是妄心人之忽然起妄其猶迷方之人惑南為北南北正方以喻本覺惑南為北總喻妄心不必如古注以南喻性明北喻所明則傷於鑿矣此迷下意顯妄心無體故佛設兩關以待富那之自答也驟然起迷故曰無根是不因迷也若謂悟能生迷悟豈為迷之因耶法有來原方能自立既無來由則妄心非有明矣二喻覺不生迷佛言彼之迷人正在迷時倐有悟人指示令悟富樓那於意云何此人縱迷於此聚落更生迷不不也世尊前富那疑悟後生迷故以覺不生迷曉之悟人即是先佛此顯諸佛莫不由師之指示而破無明無明既破永不復迷文中以迷為彼人悟為此人指昔曾迷故曰縱迷然悟後實不迷也答不也世尊者若在喻則以迷虗方實故不復迷若就法論衆生性德必迷須以修德合之真如出纏便成佛果又迷虗理實故不迷耳二總合富樓那十方如來亦復如是此迷無本性畢竟空昔本無迷似有迷覺覺迷迷滅覺不生迷十方如來皆先迷後覺可總合上兩喻故云亦復如是此迷下合前喻妄體本空迷是最初妄念爾前無迷故不因迷性中無迷故不因悟既無來原迷即非有昔本下合後喻覺不生迷昔本無迷承上文説因指示而知無迷則似有昔迷今覺若名為似即非實有覺迷之後迷則永滅修性一合豈更迷哉二空華喻妄果非有二一妄果元空亦如翳人見空中華翳病若除華於空滅忽有愚人於彼空華所滅空地待華更生汝觀是人為愚為慧富樓那言空元無華妄見生滅見華滅空已是顛倒敕令更出斯實狂癡云何更名如是愚人為愚為慧佛問中翳喻妄見華喻山河意明空本無華良由目翳見空中華華滅亦然妄見若亡山河即滅山河既滅生滅咸亡忽有愚人的譬富那前翳人未必皆愚今此愚人翳而愚者也於彼空華所滅空地者華因翳生與空何涉今不歸之於目而求之於空故稱空為彼也空無華處名為空地目既無翳待華更生惑之甚矣滿慈答中言空本無華者指空決不生華言妄見生滅者上云亦如翳人見空中華是妄見生次云翳病若除華於空滅是妄見滅生滅未亡容有此見此但妄見非是顛倒次見華滅空而云顛倒者華隨翳滅而云華滅於空故顛倒也顛倒之見為待華更生之因敕者命也命其重出也又必欲其生華故云敕也言狂癡者既有妄見又加顛倒況華是目病反立待空華之生謂可悅目如是狂癡之人不必商酌其愚慧矣問諸佛無始曾迷可譬翳人今妄見滅即是諸佛若以富那喻愚人豈富那空華已滅耶答譬有要意此中只有空地譬佛所證妙覺明空復以待華更生為狂愚以斥富那之問此要意也豈可以妄見生滅譬佛所證妙覺果耶故見生見滅只可譬聲聞小果佛元無生滅妄見既是小果不妨富那已證猶昧妙覺明空似不知空地無華故有待華更生之惑耳須知富那小果見思已破山河雖未全除亦有分滅之處故云妄見生滅也二印合結責佛言如汝所解云何問言諸佛如來妙覺明空何當更出山河大地如汝所解者印上富那指待華更生為狂是其所解已知空不生華矣云何下結責佛證妙覺明空正喻空地何問其復生山河耶觀此一結即知空華當喻山河而兼斥富那之問明矣二明真智真斷不重起妄又如金礦雜於精金其金一純更不成雜如木成灰不重為木諸佛如來菩提涅槃亦復如是初以金灰立喻礦喻無明金喻菩提木喻生死灰喻涅槃燒木鍛金俱假於火火即中間智行之功也次以智斷合喻菩提是智果涅槃是斷果智果不變如金斷果不生如灰何疑山河習漏有復生之患乎溫陵云云次答大性周遍二一牒問富樓那又汝問言地水火風本性圓融周遍法界疑水火性不相陵滅又徵虗空及諸大地俱遍法界不合相容富那雖總疑大性而所疑在前五大以相上有相陵相奪之迹故執相以疑性也二正答二一立譬喻顯法二明三如來藏初中二一喻虗空二喻俱現初中三先立虗空譬二一先明不拒諸相二一總明不拒富樓那譬如虗空體非羣相而不拒彼諸相發揮譬如來藏體非七大而不拒彼七大發揮不拒喻隨緣正喻藏性能不變隨緣也問前卷明性具七大今又云體非群相何前後相違乎答如來藏性不可思議適言其有一相不立適言其無七大宛然雖云染具體離染汙若歷然有七大之相便非清淨本然矣故得以虗空譬之然但云無相不言無性中七大乃具無具相耳二別喻七大所以者何富樓那彼太虗空日照則明雲屯則暗風搖則動霽澄則清氣凝則濁土積成霾水澄成映隨義對法當以日照則明譬火大雲屯則暗譬空大晦昧為空故日雲是體明暗是相三風搖則動者風是體動是相虗空無體安有動哉吹萬不同而若有所撼耳四霽澄則清譬見大見能照境而相清淨故五氣凝則濁譬識大識遍緣五塵影子有凝聚義想念分雜故云濁也土對地大水對水大爾雅云風而雨土成霾水澄則空故能映物映即相也所謂不拒諸相發揮也次明諸相虗妄於意云何如是殊方諸有為相為因彼生為復空有若彼所生富樓那且日照時既是日明十方世界同為日色云何空中更見圓日若是空明空應自照云何中宵雲霧之時不生光耀當知是明非日非空不異空日文中先徵次難三結徵中言殊方者七事不在一方故曰殊方殊方則一顯空體不殊有為則反顯空體無為為因彼生徵他生為復空有徵自生次若彼下難破初句牒計前文云日照則明今先破明相以例餘六文中有標有定有破且日照下標也承上若彼所生故即云既是日明十方句定也言因日明故十方同日色也云何下破也既是日明不當有藉虗空何空中更見圓日而日外皆空耶日少空多當知空自有明與日何涉若謂空明又不然矣中宵是夜益以雲霧明相全無當知下結明虗妄即離俱非求其定相了不可得安得以明為實有乎幽溪云若彼所生去破他生若是空明去破自生非日非空破共生不異空日破無因生故此結中兼破共離二性二即譬顯法以法中七大喻中七事皆以四句推撿知其虗妄推檢既同歸真則一故法譬合明也觀相元妄無可指陳猶邀空華結為空果云何詰其相陵滅義觀性元真惟妙覺明妙覺明心先非水火云何復問不相容者觀相之相指上文殊方諸有為相及前卷七大之相以七大羣相皆如來藏隨緣之用不妨並舉也如上以四性推之是觀相元妄即離俱非是無可指陳邀者留也空華無質何可邀留然空華猶可見空果更不可得如水火尚無復詰相陵何殊空華邀令結果則不但性無陵滅而有相之水火亦無陵奪也相既全空觀相即性所云性者即性具之性也性具之法已離相著全體是真體兼用冥惟一三諦之理妙屬真諦茲欲蕩相故居其首覺明是中假二諦三諦在一心中但空偏假至此全袪惟一圓中具三諦理言性而復言心者謂性具七大更無形相惟一圓三諦心而已亦顯一念之心必具三千三諦之法輔行云三諦無形俱不可見不其然乎先非水火者此句結譬歸法妙心非雲非日亦非水火先者已也謂妙心已非水火何更問其不相容耶此文解者不同有云妙心本無水火而前卷有性水性火之稱者因隨緣時有水火之相相由性起故名水火為性水性火的論性體元無水火作此解者乃指未隨緣時為先而云性中空無一物於今文似順於前卷則違或云妙覺明心但無相水相火非無性水性火若謂性中一總無水火即非此經性具之旨也作此説者與前文最合釋今文稍偏今謂三四兩卷皆是佛説何容頓乖須知今文觀性之性正指性具而云先非水火者指前性水性火其體寂滅惟一真心乃具無具相如來藏不思議之德也後文三如來藏義出於此世人不明性具又不知全具即空故釋今文每多掣肘今點具無具相於前卷既合與今文復符豈不妙得兩卷之意歟又先非水火者先非同居水火亦先非有餘水火釋論云出三界外有清淨土聲聞辟支佛出生其中釋論所云即方便有餘土也此土中亦有水火何以知之如後文云汝以色空相傾相奪於如來藏至云風動空澄日明雲暗汝指富那富那已出同居三界猶見色空則所生有餘土中必有水火明矣以今妙覺明心是光光土體寂光實報相為表裏而同居方便二土乃為所非故非水火又寂光土中體具七大即具而空則并非寂光水火前卷明具德則七大無非本然今文因釋難則妙心元非水火二義不具何以成三諦乎又世人聞惟心之言但知三界之法惟一心造不知性具之法亦惟一心事用惟心能泯諸相性具惟心豈不泯諸相耶此文就喻顯法而先非水火已合譬中體非羣相至汝以空明下合不拒諸相其文了然交光欲移此文置於無可憑據之後豈可先合不拒諸相而後合體非羣相乎三正合空喻前科云就喻顯法者因前文以空喻藏性雲日等七以喻七大空非雲日而不礙雲日喻性非七大而不拒七大後以空日對簡并喻亦顯真性據其文勢就喻歸法非是正合今方是正合之文也真妙覺明亦復如是汝以空明則有空現地水火風各各發明則各各現若俱發明則有俱現真妙覺明亦復如是承上觀性元真惟妙覺明來上文已合體非羣相故今但合不拒諸相言汝以空明者滿慈已出分段生死未超變易三界如前引出三界外有清淨土聲聞辟支佛出生其中正其文也既有淨土土中必有四大虗空明矣於覺心中發起空相如後偈云空生大覺中如海一漚發是即有空現又前云出土一尺則有一尺虗空亦其事也四大亦然如方諸取水陽燧取火皆是發明之道方便土中有無煙清淨之火無塵逈淨之風等亦如前引若俱發明者土色空各明今色空齊顯故曰俱現同居方便二土皆有色空若非俱發土何由成言俱現者是一念中俱現其相耳七大尚於一念俱現況色空乎齊此合不拒喻已竟後文重喻俱現二俱現喻此喻從上不拒喻中分出上合不拒喻中有俱現之言佛恐滿慈不解俱現之妄重以水中日影喻之又二一喻云何俱現富樓那如一水中現於日影兩人同觀水中之日東西各行則各有日隨二人去一東一西先無準的不應難言此日是一云何各行各日既雙云何現一宛轉虗妄無可憑據一水古人以水喻妄心近人云水喻真覺妙明蓋妄心無體元是真心苟無妄心何以現色空之境乎如各行見日元在水中水亦通妄其義可知今但以水喻心則真妄皆在其中矣日影喻色空之相體非實有一水中現止是一日喻色空元非異法如前文云空晦暗中結暗為色據經此文色空豈異法乎故以一日喻之又天日喻性具色空日影喻色空妄境有天日而後有日影豈不由性具而後有妄相乎如來藏中性色真空性空真色今成妄境色空亦合令知妄具全是真具也兩人喻能感色空之業此二種業初時同感一境故云同觀水中之日以二業元在一人一念之中故亦同感一境不爾則不名俱現矣東西各行者喻分別色空之念兩念背馳此時兩人各見一日便有兩日如以心分別於色則惟見色以心分別於空是惟見空喻各有日隨兩人也兩日喻色空二種古人以七大釋之其説太煩若據本文俱現正喻色空而已一東一西喻色空頓分先無準的者謂先非定一定二準者則也的謂射的丹面白的是也不應難下結成虗妄同觀是一似當以一難二各行是二似應以二難一然日影虗妄何必作此難耶俱現亦然雖同招一境分別則成二法不應難言同感一境云何成二分別有二何名一境以若一若二皆是虗妄有何定乎霅川云宛轉虗妄者同觀是一知二是虗各行既雙驗一是妄是也須知各行見雙亦止喻一人一念中事如分別色時對空顯色分別空時對色顯空故云俱現二合二一正合隨染緣富樓那汝以色空相傾相奪於如來藏而如來藏隨為色空周遍法界是故於中風動空澄日明雲暗衆生迷悶背覺合塵故發塵勞有世間相前滿慈問地水火風本性圓融疑水火性不相陵滅即相傾也虗空大地不合相容即相奪也今以色空兩心發明藏性正合俱現前喻云兩人同觀水中之日其義在此而如來藏隨為色空者此該同居方便二土二乘證人無我未證法無我在同居土中猶見色空之相生方便土亦有色空故云周遍法界須知法界中事咸於一念中現故可合上俱現之喻於中者於法界中也前已詳喻日照則明等七句今以約該廣但云風動空澄日明雲暗動靜為一雙明暗為一雙該上七句亦該七大又雲日等前是喻文今作合法故知法喻元非碩異所以前文得就喻顯法也前二卷云為物所轉是故於中觀大觀小與今正同對後如來文中今則一為一無量為無量小為小大為大其病在分別未亡而背覺合塵耳衆生迷悶者衆生該九界以未開悟稱為迷悶前文云覺非所明今背無能無所之覺而合妄所之塵又背寂光之覺體合兩土之塵相兩土者謂同居方便也塵勞之名兼於五住塵勞是集世間相是苦即日明雲暗等是已幽溪曰生佛迷悟前後二文其相天懸然須了知相雖有異性本不殊蓋全性以為相則全相而在性性猶濕也相猶水也水相雖有動靜之不同濕性豈有波澄之差別不變之旨此喻最親故知我以妙明不滅不生合如來藏非棄波而觀濕乃即相以達性境風若息性水自澄百千澄清大海海印發光全體大用現前元不異乎衆生界也次兼明隨淨緣我以妙明不滅不生合如來藏而如來藏惟妙覺明圓照法界是故於中一為無量無量為一小中現大大中現小不動道場遍十方界身含十方無盡虗空於一毛端現寶王剎坐微塵裡轉大法輪滅塵合覺故發真如妙覺明性上合隨染緣今明隨淨緣以上明俱現乃於一念中頓現諸相元全性以起修但不能全修即性遂成同居方便兩土之相今如來達修即性故俱現之法一多無礙大小相容成寂光實報兩土融即之相但菩薩自初住至等覺證一分寂光感一分實報故實報乃菩薩所居之土今文所明是究竟寂光無上報土涅槃云我今所獻食願得無上報此無上報土乃妙覺如來之所居也苟非衆生俱現之本無以成如來融通之用全性起修全修在性不其然乎於中先明能合所合次明所起淨用言妙明者能合之智以妙融明故成寂照之德自因明立所以來皆生滅法以妙融明則無生滅又無相陵滅之相則法不滅觀相元妄則法不生對上互相陵滅故先不滅而後不生也如來藏是所合之理即衆生一念心體而已如來藏下明起淨用先明淨用之體惟妙覺明謂無塵相惟一三諦之理覺即如來藏體是一性妙明是二修修性一合無復分張故能圓照法界言圓照者示與東西各行不同也衆生以識心分別故空非色色非空喻以東西各行今如來分別既忘色空不二百界千如靡不彰顯是轉衆生迷中之俱現而為果上之勝用耳又惟妙覺明祗是一念忘情之智而忘情之處諸法圓彰圓照下文及三如來藏皆委明其義也次是故下正示淨用之相分三初列二釋三結初列中言於中者於法界中也列有四句一屬理無量屬事前二卷中霅川解於一毛端遍能含受十方國土云此明無量為一蓋攝事成理非從體起用也對顯今文體用備陳事理雙照故云一為無量則全理而成事無量為一則全事而成理玄籤十上釋二鳥雙遊亦以一為理無量為事今豈有異釋乎然下文以道場釋一是以所證一理為一又云身含十方是以法身正報為一云遍十方界是以多為無量云無盡虗空是以無窮極為無量而非多也大之與小一往且約事論二卷經云為物所轉是故於中觀大觀小對顯今文佛能轉物故小中現大大中現小小大雖約物論然毛端微塵即是妙心又豈轉屬於事耶又正當一為無量之時反顯多不礙一即無量為一正當小中現大時反顯大不礙小即是大中現小束此四句不出二句毛端微塵既是妙心即當一理故知小中現大即是一為無量束此四句全歸一句而已不動下別釋其相初釋一為無量據下如來藏文有十界諸法當以十界為無量立義方確故今十方之言義含十界是則百界千如不出一念正是初句中義且就現文釋之道場指成道之地字書曰治穀曰場今治無明粳顯法性米名曰道場即寂光土也正當成道之時不動寂光而十方機感則應身即遍於十方是垂為下之三土妙玄云寂光理通如鏡如器三土別異如像如正是其義前云無上報土乃從勝為言文句云同居有餘自體皆是妙色妙心果報之處據疏此言豈非三土皆無上報耶起應之時示為實報他受用身及方便同居勝劣二應就佛言之皆是寂光故云不動寂場苟寂光有動即非寂場矣若以十界對三土者同居有十方便有四謂無六凡實報有二寂光惟一茲以應遍三土故云遍十方界須知道場不離同居即同居為寂光還即寂光而遍三土耳次釋無量為一法身正報與寂光依報無二無別故云含受無盡虗空此以無邊際為無量也而云全事成理者融三土色歸寂光空故有攝事成理之義然此句正意在顯遮那依正不二之相故不言器界也虗空之義具如涅槃一十復次不得以邪空釋之既是遮那依正即佛自受用境界與初句示他受用不同然皆正中現依也三釋小中現大毛端現剎是正中現依正也毛端是身分極微處身心圓明毛端即是一念既是一念則毛竭即常寂光土於寂光中現寶王剎如後文云清淨寶嚴妙覺王剎是也寶王是正剎即是依乃從寂光而現實報雖小中現大亦該大中現小如現寶剎而不壞毛端之相非大中現小乎塵裡轉輪是依中現正上句惟色此句惟依一微塵亦是一心則五時八教不出一塵之外以時教全是一心故大聖安坐微塵而轉法輪説法破惑必有所被之機是自他皆現塵中而此句正意同剖塵出經也問坐微塵裡即坐道場與初句何別則末句亦該四土耶答若論四土何句不該如毛端現剎豈離同居此文四句初句明他受用次句明自受用三句惟色四句惟依當依此分文耳毛端微塵處極狹者顯一念具法不假他念故妙樂云此中一心無復餘心也霅川曰不釋大中現小近人非之然由上文以第三句該第四句無別釋第四句故霅川作此説也滅塵下總結前義前因背覺合塵則有同居方便土相今因背塵合覺則有寂光及無上報土之相分別情忘是曰背塵以妙融明便合覺體霅川曰不思議用非修所成故曰發今不言用而言性者並由理具方有事用近來釋此文者多引十玄門及四法界須知四土是此中要義故特引之二明三如來藏上云我以妙明不滅不生合如來藏妙明之言似中道智然中道中具有三諦故須廣明又上云一為無量無量之名當指十界諸法方有歸著故廣約之以明三諦為二一正明二斥迷初為三一明空如來藏二不空如來藏三明中道正義雖曰空與不空實是中道所以十界俱空十界俱假乃至空假即中與次第三諦其相不同常途所明以瓔珞經中三諦為次第義如初卷已引以中論四句為不次第義中論云因緣所生法我説即是空亦為是假名亦是中道義幽溪云十界皆因緣生法以佛種從緣起故我説即是空十界緣起皆真也亦名為假名十界緣起皆俗也亦名中道義十界緣起皆中也即中云中論與今經大同亦復稍異以中論明緣生十界即空假中此通染淨二緣今明妙明心中所具十界即空假中專屬佛界隨淨緣法一空如來藏而如來藏本妙圓心非心非空非地非水非風非火非眼非耳鼻舌身意非色非聲香味觸法非眼識界如是乃至非意識界非明無明明無明盡如是乃至非老非死非老死盡非苦非集非滅非道非智非得非檀那非尸羅非毗梨耶非羼提非禪那非般剌若非波羅蜜多如是乃至非怛闥阿竭非阿羅訶三耶三菩非大涅槃非常非樂非我非淨前云妙明不滅不生合如來藏而今云本妙圓心者空如來藏以妙為主本來自妙也明能生法故不言明十界皆空惟是一心非圓心乎非心至非意識界總非六凡法界非明無明等非緣覺界也先緣覺而後聲聞者十二因緣聲聞恆有四諦法輪非佛不宣故先緣覺緣覺以無明為初支而先舉明者不知因緣名為無明自悟因緣名之為明譬如人坐暗中一見電光便能覩物正見電光是第一剎那是人方知眼藉電光始能見物是第二剎那第一剎那是集法忍第二剎那是集法智此兩剎那所得忍智名之為明若無此明誰曉因緣故先舉明而後言無明又十二支有流轉還滅二門今兼舉焉次非聲聞界緣覺以集為初門聲聞以苦為初門先知苦而後斷集先慕滅而後修道聲聞法中畏果斷因見果行因次第然也言智得者大論三十六卷第十九紙云智者謂無漏八智得者謂得聖道據論所言智之與得惟在初果今謂初果遍觀四諦後三果唯觀一諦故舉四諦則可以該四果矣非檀那等非菩薩界菩薩以道諦為初門非六度即非道此先非能趣之行非波羅蜜多者總非所趣之理六度有事理之殊次第不次第之別無非性具今皆非之非怛闥下非佛界怛闥阿竭云如來阿羅訶云應供三耶三菩云正遍知此先非能證之人次非所證之法涅槃四德是也涅槃二十八卷云若言我者則是如來何以故身無邊故無疑網故不作不受故名為常不生不滅故名為樂無煩惱垢故名為淨涅槃二十一卷末明大我大樂大淨須者往檢前非二乘是非空非菩薩界是非假非佛界是非中空如來藏俱空十界故止觀云一空一切空無假無中而不空總空觀也二不空如來藏此經止有空如來藏名今依大寶積經稱俱即為不空如來藏文二一結前文以是俱非世出世故如如意珠俱非衆寶能具衆寶藏性亦然故結上云俱非等也世結六凡出世結四聖二明俱即即如來藏元明心妙即心即空即地即水即風即火即眼即耳鼻舌身意即色即聲香味觸法即眼識界如是乃至即意識界即明無明明無明盡如是乃至即老即死即老死盡即苦即集即滅即道即智即得即檀那即尸羅即毗梨耶即羼提即禪那即般剌若即波羅蜜多如是乃至即怛闥阿竭即阿羅訶三耶三菩即大涅槃即常即樂即我即淨言元明心妙者以明為主本具俗諦之照故曰元明前不言明而今言明明豈不屬假乎十界惟是一心故云心前真諦中以即有而空故云本妙今俗諦之心即空而有故復云妙元明心妙是能即之體即心下明所即之法具歷十界一一即之問所云即者為性中本具十界故名為即為即俗諦之相故名為即答此中文意因前云故發真如妙覺明性後遂有三諦之文則今俗諦不空之法亦是真如妙覺明性其義明矣既是妙性非關造作豈非性具之法乎以一性而具十界則十界互融界界具十豈非百界一性無性百界宛然但前文妙覺明性元是所發此乃如來從法界體起法界用非衆生境界亦與次第十界不同復以一心而具十界此中有一有多而一多相即有大有小而大小互融無非不生滅法涅槃云雖非常住不念念滅正此義也當知衆生境界念念生滅今非生滅故與衆生不同次第三諦中前六凡界秪是因緣生滅後之四聖對次第三諦二乘為空菩薩為假佛界為中大約以無性之空隨緣之假二者相即方名曰中未修中時空假皆非性德皆非佛界空假即中中為性德方是佛界佛界是實九界是權今是圓教俗諦十界皆是佛界一一皆實無非性德故與次第不同故荊溪云次第即已方成今即今若即已三俱圓極據荊溪意次第不可不即次第即已便歸純圓惟圓三諦為究竟耳此圓俗諦雖是如來所發而衆生性德本具非碩異也又常途所説空是破法假是立法今文既立十界則三諦咸立止觀云一假一切假無空無中而不假總假觀也若以十界歷四教者金錍云藏通造六別圓造十此猶一往論於所造據輔行意藏通明八法界謂六道法界及聲聞緣覺也藏通菩薩弘誓未全止八界半別教或九或十分教證故圓教始終不二而二文在三十八卷既云始終不二則從初即觀性具十界與別不同也按寶積經云空如來藏離不解脫一切煩惱不空如來藏具河沙佛不思議法霅川以山河忽生及三種相續為不空藏但彰染汙生滅之相應如今文十界咸具方合寶積云具恆沙佛不思議法耳又據文次第雖在空後此中十界實為空如來藏之本苟非不空藏中元具十界安得約十界以論空耶空得具本方是真空耳三明中道正義以是俱即世出世故即如來藏妙明心元離即離非是即非即十界有萬不同即如來藏妙明心元者假即中也承上妙空明俗咸歸一心心元之名正指中道本來如是故名為元離乃非之異名是為即之殊稱上離俗諦十界俱即下離真諦十界俱非此顯中道雙遮二邊也上是俗諦十界俱即下是真諦十界俱非此顯中道雙照二邊也但次第三觀中道亦名雙亡雙照對前異時亡照而立此名以初觀破假次觀破空此之二破為雙亡之方便初觀用空次觀用假此之二用為後雙照之方便由前異時作意遮照得入中道任運遮照此以作意為任運之方便入中道時無心亡照任運寂知與前異時亡照不同故名中道觀也今圓三觀中前之二藏已是圓理茲明中者如釋籤云應以畢竟空不思議假相對以成圓融三諦正與今合初十界俱空名畢竟空次十界俱假名不思議假今云雙亡是雙亡畢竟空不思議假雙照亦然此名圓中之圓不可思議中不可思議應知二邊分別若亡即是中道於中道中更點三諦皆是圓融止觀云一中一切中無空無假而不中總中觀也與今意大同三文之中皆云心者通指佛界隨淨緣之心耳四斥凡小不了三一法如何世間三有衆生及出世聞聲聞緣覺以所知心測度如來無上菩提用世語言入佛知見上明三諦竟今指三諦是如來所證非凡小能知如何兩字正責之之辭前云衆生迷悶背覺合塵又云汝以色空相傾相奪於如來藏則凡夫二乘皆不能測佛明矣其病在所知心不忘世語言不絶墜落空有二邊不知所滯之有即真空所著之空即妙有以迷背中道故動成戲論也圓融三諦名無上菩提二喻譬如琴瑟箜篌琵琶雖有妙音若無妙指終不能發琴等喻十界衆生妙音喻如來藏理妙指喻實智發謂發明白虎通云琴者樂也所謂禁止諸邪以正人心也廣雅云長三尺六寸以象三百六十日五絃象五行大絃為君寬和而溫小絃為臣清廉不亂文王武王加二絃以合君臣之恩也瑟者縝密也五十絃箜篌者白虎通云漢武帝命樂工候調作或云候暉作其聲坎坎然以應奏節故謂之坎候復訛轉為箜篌耳候者因彼樂工而得名也楊升菴云琴瑟秦箏之屬絲木相去皆未寸許惟空侯絲與木相去遠聲自空出空侯之名或因此立又謂二字不必加竹恐未必然瑟琶者漢遣烏孫公主嫁昆彌念其遠行故思慕無已使工巧裁箏築為馬上之樂以手推却前後而奏聲故名琶琶推手為琶却手為琶有打撥鈎桃之音今四絃者是已云妙音者琴瑟等音通實報土如大樹緊那羅王絃歌一動聲震大千須彌山王低昂踊沒一切聲聞猶如舞戲天冠菩薩問迦葉言少欲知足頭陀第一云何今日猶如小兒迦葉言非本心也妙樂判云彼經屬方等部以大斥小緊羅奏於別圓之樂故使迦葉不能自安所謂菩薩勝妙五欲能令迦葉起舞也或以琴喻寶覺真心妙音喻無方大用妙指喻楞嚴大定然考大經中亦以箜篌喻衆生音喻佛性故知琴等喻衆生其説最是三合汝與衆生亦復如是寶覺真心各各圓滿如我按指海印發光汝暫舉心塵勞先起由不勤求無上覺道愛念小乘得少為足汝與衆生略該九界合前琴等寶覺真心合前妙音具德為按即妙俗也覺即圓中真即妙空一心具此三諦何人不然言按指發光者佛意元是引證必有所指今不可曉聊舉維摩經及資中解以發明之維摩經云佛以足指按地即時三千大千世界若干百千珍寶嚴飾譬如寶莊嚴佛無量千德寶莊嚴土一切大衆嘆未曾有而皆自見坐寶蓮華豈非海印發光之明證乎謂於海印三昧中發光明也資中云海印者大集云閻浮所有色像大海皆有印文此喻如來法身性海普現一切世間之相正性具依正無不具足喻同海印如來證此法門復從體起用即是海印發光是時山河大地即無上知覺無礙融通成無上報而從按指發之者喻同有妙指而發妙音也次云汝暫舉心塵勞先起合若無妙指終不能發聲聞舉心已是塵勞不待動形故云先起若以四住為塵勞富那已斷四住今不指見思粗惑當以習氣為塵勞耳習氣即塵沙無明惑也據此文知二乘生方便土猶有勞久發塵之相與同居土隙中微塵其相不遠義推實報土中雖有塵相不同下之二土也後偈云餘塵尚諸學故實報當有塵相然既依正無礙豈比二下土乎由不勤求下釋塵勞先起之由也若求無上菩提知並由理具方有事用即相似海印發光今保證小果得涅槃一日之價自以為足故雖在塵中而不知是塵耳此方等部應有禪斥雖已入法華時順方等部儀故宜斥小二更釋餘疑二一滿慈重徵妄因二阿難再執緣起初中二一疑問富樓那言我與如來寶覺圓明真妙淨心無二圓滿而我昔遭無始妄想久在輪回今得聖乘猶未究竟世尊諸妄一切圓滅獨妙真常敢問如來一切衆生何因有妄自蔽妙明受此淪溺問中分三初明己佛無殊具德之覺名曰寶覺是不但中也十界俱照名為圓明是不思議假也第一義空名真妙淨一心具此三諦此句領上三如來藏之義亦躡上寶覺真心各各圓融而發此問也次而我下明己迷佛悟無始妄想指無明惑即妄為明覺等是久在輪回該三種相續之相今得四果但除四住未破無明故云猶未究竟次推佛悟中明佛圓斷五住是諸妄皆滅對彼諸妄則三諦俱名妙真常矣三敢問下正窮妄因前問云何忽生山河大地佛答妄為明覺故生山河明覺之義辨之已詳今問此妄從何而有是到底一問也二佛答分三一以演若失頭為喻二以妄本無因合喻三示頓乘不藉修證初中二一牒惑佛告富樓那汝雖除疑餘惑未盡聞妄為明覺則除山河忽生之疑聞三如來藏則除大性周遍之疑而疑妄必有因是餘惑也二引喻吾以世間現前諸事今復問汝汝豈不聞室羅城中演若達多忽於晨朝以鏡照面愛鏡中頭眉目可見瞋責己頭不見面目以為魑魅無狀狂走於意云何此人何因無故狂走富樓那言是人心狂更無他故文有問答世事易明故佛引以為問演若覔頭是諸事之一耳夫喻本喻法喻若未明何由知法前釋因明立所而云因明立所所既妄立生汝妄能今以鏡照面喻明覺也愛鏡中頭瞋責己頭喻立所也以為魑魅無狀狂走者喻妄能也妄所在前文為同異妄能在前為無同無異無同異是有為衆生故喻狂走文相甚齊無勞異議蓋妄有三重一妄為明覺二所既妄立三生汝妄能今喻亦有三重一以鏡照面二愛鏡責己三無狀狂走豈非文相相齊之甚乎孤山曰晨朝者喻起妄之始然晨朝照面男子所不必然是照面已有狂意故演若照鏡責頭之意在其中矣上舉事竟於意下正問何因之言問其因也富那答中心狂二字正明其因據後經文有狂性因緣之言此中當以心狂為因照鏡為緣是則世尊説其緣滿慈出其因蓋心狂在照鏡狂走之前狂走以心狂為因而心狂則更無因故曰更無他故若合後文心狂喻最初之妄也照鏡至狂走所謂自諸妄想展轉相因也演若達多此云祠授從神乞得故也山神虎頭曰魑宅神豬頭人形曰魅二以妄本無因合喻二一合二結初中三一決明妄本無因佛言妙覺明圓本圓明妙既稱為妄云何有因若有所因云何名妄自諸妄想展轉相因從迷積迷以歷塵劫雖佛發明猶不能返如是迷因因迷自有識迷無因妄無所依尚無有生欲何為滅初云妙覺明圓者妙即是空覺即是中明即是假三諦在一心中故云圓此句立圓融三諦以為性本本圓明妙非修之始妙此句亦明妄想之無本也既稱下反覆明妄無因因即是本既妄為明覺矣又何有因又有因即不名妄乃約名以申其義耳然無因之妄是無始無明由此而生四住煩惱則展轉相因故云從迷積迷若對前文自妄為明覺後因明立所所既妄立生汝妄能乃至三種相續是展轉相因也若對喻文因照鏡而責頭因責頭而狂走亦展轉相因也雖佛發明但斷四住成聲聞果無明尚在名不能返乃責滿慈以責衆生耳如是迷因仍指最初無明此更無因故曰因迷自有是則妄有二種一者最初之妄必無有因二者妄所妄能展轉相因前文云是人心狂更無他故今云既稱為妄云何有因法喻齊矣次示滅妄之方云識迷無因妄無所依者迷即是妄因即所依迷無因即妄無依也以最初妄前更無有妄而真又不生妄所依竟安在乎無因則不能生無生則亦無滅如來所以永斷無明識此而已二約得菩提況釋得菩提者如寤時人説夢中事心縱精明欲何因緣取夢中物況復無因本無所有疑者云妄既本無何以得菩提人言妄有生滅因緣乎故以寤寐釋之菩提如寤妄想生滅如夢夢不知夢至寤而始知夢迷不知迷至寤方能辨迷如説夢中事以其心之精明故也能辨五住枝末故曰精明然夢竟叵得況字從因緣上發來心精明故夢物因緣如在目前然不能據夢中因緣以取夢中之物況一念夢心不從因生并夢亦無而夢物豈可取哉夢物有因緣者喻妄所妄能依於明覺也夢心無因喻妄為明覺之妄不從因生也前但示無因則無生滅今兼示有因緣者亦無生滅言夢心無因者夢前無夢是不因夢醒時非夢是不因醒三復宗明無得失如彼城中演若達多豈有因緣自怖頭走忽然狂歇頭非外得縱未歇狂亦何遺失前更約寤夢為喻今復宗重舉演若演若狂走雖以心狂為因照鏡為緣然因緣畢竟叵得如他人照鏡不狂而彼獨狂是無當狂走之緣也狂性無本是無當狂走之因也次明頭無得失正顯妄心無因頭喻真心頭無得喻真之無得演若謂己失頭所以狂走而頭實不失喻在妄時真不曾失二結富樓那妄性如是因何為在前雖雙明有因無因二種妄法皆不可得然滿慈所問是最初之妄此妄無因故結顯之真不為妄因如不狂不為狂因三示頓乘不藉修證又二一法汝但不隨分別世間業果衆生三種相續三緣斷故三因不生則汝心中演若達多狂性自歇歇即菩提勝淨明心本周法界不從人得何藉劬勞肯綮修證直示頓乘要在不隨分別四字分別之心即是三種相續由分別故成世界相乃至衆生業果亦然此中云世間該二種三界之相所以不隨分別即得成菩提也吳興云三緣即業果中殺盜淫也三因即三種貪親生為因疏助為緣以殺盜淫是身根所造之業三種貪是意根能造之惑惑親緣疏因緣之義彰矣天如非之謂三緣三因是三種相續之因緣而配釋亦未明了即中謂佛語多含三種相續意已窮深下三緣三因獨在業果淺深俱斷三惑圓除正是歇狂之方何必純在於深方不藉修證耶故當以吳興解為正心中演若達多即妄為明覺之心此心起時還欲照明覺體是向外馳求反生器界此三種相續所由來也今明真本無得但須歇狂歇即菩提頓成佛道經自初卷來漸説居多獨此中文最為圓頓偏漸教中須無量劫修菩薩行乃至後文云菩提涅槃尚在遙遠俱屬漸教漸説是權良由阿難未除四住當與言漸滿慈已除四住宜其言頓頓説是實乃究竟旨歸之地耳勝淨明者謂不隨分別自然清淨明鑑名之為勝勝於明覺曰勝淨明周法界者如圓覺云覺遍十方界即得成佛道也此心雖賴師示實不從人得上文云忽然狂歇頭非外得今以此文合之是則頭喻真覺照鏡喻明覺其義明矣肯綮出莊子養生篇云技經肯綮之未嘗而況大觚乎骨間肉曰肯筋肉經處曰綮刀經此處便覺艱難今以勤劬修證名肯綮也圓頓根人悟修證在一心中何必肯綮修證哉二喻譬如有人於自衣中繫如意珠不自覺知窮露他方乞食馳走雖實貧窮珠不曾失忽有智者指示其珠所願從心致大饒富方悟神珠非從外得前迷頭喻衆生之狂性次夢事喻迷妄之不實惟今神珠堪比妙心復顯迷時無失悟時無得苕溪以衣譬五陰珠喻勝淨明心由無明故不覺所遭皆是窮途曰窮在三界中如風餐露宿曰露流轉六道如馳走他方因流轉故求小乘偏教或取人天之樂為乞食馳走此與怖頭狂走何異無功德法財曰貧雖貧珠在喻迷時無失也佛如智者教為示珠證理起用名大饒富雖藉師教不從師授以顯悟亦無得幽溪曰法華繫珠與今不同彼明十六王子覆講法華結大乘緣種喻以親友繫了因珠今經於自衣中繫正因珠喻本有佛性雖窮不失一解一性自不同年上文佛答富樓那竟或疑解門將畢修證方興佛告滿慈即云何藉劬勞肯綮修證何也答如來説教破立同時據圓頓教悟修證在一心中初發心時便成正覺故云何藉劬勞肯綮修證非廢修證也若在漸教必先悟後修先修後證此如來方便析重派深應彼漸機以施權教既是權説須先掃後立要之為頓施漸漸必歸頓圓實部主永無異途二阿難再執緣起幽溪云經自二卷來破因緣自然者屢矣今阿難復以因緣為難何惑情之難袪乎答因緣自然其言雖一義涉多門有在纏之因緣自然有出纏之因緣自然前三卷所破是在纏之因緣而已若今重以為問乃出纏之因緣自然雖單問因緣實兼自然是以世尊答中雙破二義原其問意而備在答中將謂解門已竟當辨修途圓因搆造有似乎因緣分果冥契有似乎自然苟不雙遣必墮雙非故冀如來有以明之庶不墮於偏修偏證之失如曰若悟本頭識知狂走因緣自然皆為戲論乃至云合然俱離離合俱非此句方名無戲論法其事理修證之殊了然可知矣為二一疑請三一引所説之理即時阿難在大衆中頂禮佛足起立白佛世尊現説殺盜淫業三緣斷故三因不生心中達多狂性自歇歇即菩提不從人得斯則因緣皎然明白云何如來頓棄因緣阿難不引三種相續而引殺盜淫三緣三因者立因緣之名也緣狂性歇即成菩提此因緣之義也既出其名又立其義斯則因緣皎然明白雖有不從人得之言似屬自然然豈以此而礙因緣乎言頓棄因緣者如前文云既稱為妄云何有因若有所因云何名妄是頓棄因緣也二引己他得悟我從因緣心得開悟世尊此義何獨我等年少有學聲聞今此會中大目犍連及舍利弗須菩提等從老梵志聞佛因緣發心開悟得成無漏舍利弗目連同師沙然梵志梵志道術身子皆得師有二百五十弟子悉付身子而成就之沙然臨死欣然而笑身子問故答世俗無眼為恩愛所纏我見金地國王死夫人投火聚願同生一處言已命終後見金地商人問之果然身子追悔我未盡師術而不授此法為我非其人師祕乎自知未達更求勝法而無師可事於路見頞䫌威儀庠序因問師法頞䫌答云諸法從緣生是故説因緣是法緣及盡我師如是説一聞即得須陀洹果來至佛所十五日後得阿羅漢目連聞偈亦證初果後見佛亦得羅漢須菩提聞因緣事未考梵志或翻淨裔頞䫌偈中略説三諦初句苦諦次句集諦第三句滅諦法即苦緣即集苦集俱盡是究竟滅三結所説同邪今説菩提不從因緣則王舍城拘舍梨等所説自然成第一義惟垂大悲開發迷悶前佛云識迷無因妄無所依尚無有生欲何為滅即是菩提不從因緣也拘舍梨外道名維摩經云末伽梨拘舍梨子什公云末伽梨字也拘舍梨是其母名其人起見云衆生罪垢無因無緣據此似末伽梨為拘舍梨之子或云末伽梨俱舍梨字形楚越前後譯不同耳翻譯名義云末伽梨此云不見道其計自然亦是斷滅自然然是也自如是也婆沙云法應爾不可改易不可徵詰是法爾義自然與法爾同即中云自然有二種一斷滅自然二常見自然交光云外道自然此八萬劫自然成道猶如縷丸極則停住此常見刪闍夜毗羅胝子所計與拘舍黎何涉刪闍夜計常拘舍梨計斷因名自然若以等字攝之則無不可阿難就對待説不執因緣必入自然似外道反為得之故作此難二佛示二一委辨因緣自然二發起行門方便初中二一辨因緣自然二明無戲論法初中二一總述佛告阿難即如城中演若達多狂性因緣若得滅除則不狂性自然而出因緣自然理窮於是狂性因緣者心狂為因照鏡為緣也不雜因緣稱為自然狂賴因緣不狂則不賴因緣故曰不狂性自然而出溫陵曰不狂之前二皆本無由是觀之凡所謂因緣自然本皆不有悉由狂妄而立故曰理窮於是二別破三一以因緣破自然阿難演若達多頭本自然本自其然無然非自何因緣故怖頭狂走此文以頭為自然故云頭本自然又前文云不狂性自然而出似不狂在後今明頭元自然乃立自然之義也本自下二句定自然計本自其然者謂先來元是自然無然非自謂後日無非自然何因下破不藉因緣方名自然今何以心狂照鏡之因緣而怖頭狂走乎則自然之計窮矣二以自然破因緣若自然頭因緣故狂何不自然因緣故失本頭不失狂怖妄出曾無變易何藉因緣初二句定何不下破本頭下結此文以狂為因緣立自然者不賴因緣立因緣者必先有自然自然頭即不狂不雜因緣之頭也彼計云自然之頭元來不狂後以照鏡因緣故狂破云若立此計亦應自然頭不失以照鏡因緣而失何不爾耶結云今既本頭不失狂自妄出則狂與頭了不相涉何曾變換而假因緣則因緣之計窮矣言失頭者演若自謂失頭故也此文及前因緣不須合法但就喻觀妙義自顯三破轉計自然本狂自然本有狂怖未狂之際狂何所潛不狂自然頭本無妄何為狂走由前以頭為自然狂為因緣既因緣被破轉計狂亦自然不狂亦自然故此破之初破狂自然初句立計次句釋本狂二字未狂下二句破如文次破不狂自然初句立計頭本下破既頭本無妄而有今日之狂走安得定云本來無妄則不狂自然之計破矣二明無戲論法又二一明悟本俱非以顯前義若悟本頭識知狂走因緣自然俱為戲論是故我言三緣斷故即菩提心欲明無戲論法先斥戲論在今釋此文者多指因緣自然皆是狂走前屢明頭是自然狂是因緣恐此釋未妥詳文意似謂悟本頭而知其非自然識狂走而知其非因緣則兩俱戲論其義明矣次結顯前義三緣斷則不關自然即菩提心則不涉因緣所以前文之言本離戲論也二簡二種生滅名無戲論菩提心生生滅心滅此但生滅滅生俱盡無功用道若有自然如是則名自然心生生滅心滅此亦生滅無生滅者名為自然猶如世間諸相雜和成一體者名和合性非和合者稱本然性本然非然和合非合合然俱離離合俱非此句方名無戲論法菩提心中最宜甄別故復重重研核大要以因緣自然對簡有兩重生滅既離對待方除戲論初約菩提簡生滅云菩提心生者向來不悟菩提今悟菩提故曰生分別情忘是生滅心滅智生惑滅既成對待豈非生滅法乎遣此生滅方成無功用道云滅生者由斷惑而證真也此以住前緣修名為滅生登住證真不見有斷惑證真之功稱無功用道方離第一重生滅耳若有下更約自然簡生滅言若有者非相似之若謂情計不忘復立自然如是則名自然心生生滅心滅此仍指智生惑滅為生滅也上云滅生俱盡即俱滅也又須遣之故云此亦生滅此生滅與上智生惑滅不同乃指自然為生智生惑滅俱滅為滅前簡緣修為因緣生滅今貶自然亦歸生滅以亦是對待法耳次云非生滅者名為自然釋成自然是生滅義疑云何故自然亦是生滅釋云對彼智生惑滅稱無生滅者為自然豈非是對待法乎對待即生滅也猶如下立喻如地水火風和合成一譬第二重中智生惑滅之義也虗空非合號曰本然譬上無智生惑滅之自然也就喻既成對待法中可知所以本然之計決不可立故云非然和合之計亦不可立故非合合然俱離承上文和合本然二俱遠離而説是離第二重中無智生惑滅之自然與智生惑滅之和合耳離合俱非者離即離然離合合謂并離亦非即不離也夫離合離然既非對待已是正義今又非之不但非離并亦非合到此一句方名無戲論法當是妙覺之所證耳前云歇即菩提理最直捷今遣之又遣似與前違非違也滿慈得意祗貴承當阿難多聞須除計執故前後互出耳二發起行門方便分四一佛果尚遙菩提涅槃尚在遙遠菩提智德涅槃斷德阿難志在佛果欲成菩提涅槃就其情計尚執因緣去離合俱非甚遠故云尚在遙遠二須勤修證非汝歷劫辛勤修證雖復憶持十方如來十二部經清淨妙理如恆河沙秪益戲論文意謂苟非歷劫修證雖有多聞只益戲論以為下謂行門之開端也三戲論無益汝雖談説因緣自然決定明了人間稱汝多聞第一以此積劫多聞熏習不能免離摩登伽難何須待我佛頂神呪摩登伽心淫火頓歇得阿那含於我法中成精進林愛河乾枯令汝解脫阿難是初果人從十六剎那證入因緣二字具十六剎那之義如云法從因緣生亦從因緣滅我佛大沙門常作如是説夫緣生之緣是集諦生是苦諦緣滅之緣是道諦滅是滅諦一往觀之具四剎那明矣然見苦者有一忍一智見集亦然見滅者有一忍一智見道亦然再往觀之具八剎那明矣又欲界四諦名法忍法智上色無色界四諦名比忍比智因觀欲界緣生緣滅比知上二界緣生緣滅欲界既有四忍四智上界亦然反覆詳觀具十六剎那明矣此談因緣決定明了也又云法性自天而然苦不能惱集不能染道不能通滅不能盡因滅會真滅非真諦滅尚非真三諦焉是此談自然決定明了也阿難所聞又不止此就證十六心辟支佛聲聞分為三品於聲聞中身子上目連中餘皆下一一知之故多聞第一況自空王佛來多聞熏習而不能免摩登伽難孰謂多聞有益乎何須下謂汝若多聞有功何須待我呪力言精進林者精進法多名林梵語阿那含此云不來不來欲界受生故已斷欲界九品俱生於一生中超過七生七返故名精進林也令汝解脫得離淫室也四結勸進修是故阿難汝雖歷劫憶持如來祕密妙嚴不如一日修無漏業遠離世間憎愛二苦如摩登伽宿為淫女由神呪力銷其愛欲法中今名性比丘尼與羅睺母耶輸陀羅同悟宿因知歷世因貪愛為苦一念熏修無漏善故或得出纏或蒙授記如何自欺尚留觀聽前謂不修無漏只益戲論故今勸修言祕密妙嚴者即三德祕藏微妙莊嚴也幽溪云無漏業者不隨分別是也世間輪回由憎愛生憎愛由分別起分別則漏落於世界衆生業果相續故以不隨分別為無漏業此因中説果舉果標因耳文中始云歷劫次云一日又次云一念者前云菩提在遠尚須歷劫修行今斥多聞無功不如一日修習須知歷劫修持祗圖一念相應而已又恐疑歷劫多聞即是辛勤修證故云不如一日修無漏業復舉摩登者前云淫火頓歇顯呪力耳今意謂彼是女人尚證無漏汝是男子云何自欺不明自心即自欺也無漏之言亦通深淺故或出欲纏如性比丘尼或蒙授記如華色比丘尼也今經第四卷必在法華後説此文是其證也方等收經攝後歸前其例實多然法華亦授阿難記莂今引二尼是策其斷結耳尚留觀聽者謂為根塵所礙霅川云略舉見聞以攝覺知即六妄也大章第一約破顯以開圓解竟大章第二示正助以修圓行自古諸師如溫陵孤山長水吳興天如莫不大判先解後行獨交光懸示通駁諸家而自判從初至此答阿難奢摩他已竟向下開行門乃答三摩之請作如此説割截三諦不會佛心須知前開解門是談奢摩他等所照三諦後開行門乃示三法中因果名目相應及決定煩惱根本與夫選擇一門深入故知開解三法必俱行門三法亦必俱第有修性之分境智之殊爾前三卷末當機聞法領解已是結文安有不具三法而遽結益至此後方明三摩者乎又上根利智悟證必俱修在其中例如小乘舍利弗聞説因緣悟心無際悟也即證初果證也前十五心名見道第十六心名修道是修在其中也大乘圓教初發心時便成正覺發心悟也正覺證也前十五心為信行第十六心名信解如法華信解品正是其文是修在其中也如此根性末代必無阿難為後人法式故先請解而後請行耳為二一示觀理直入正行二示帶事兼修助行初又二一慶喜歎領述請二一經家敘相阿難及諸大衆聞佛示誨疑惑銷除心悟實相身意輕安得未曾有重復悲泪頂禮佛足長跪合掌而白佛言自佛答滿慈來未有結益今即總結上文之意也三卷末云希更審除微細惑今云疑惑銷除與前相應言心悟實相者二卷云汝等聲聞狹劣無識不能通達清淨實相三卷七大文初云亦令當來修大乘者通達實相當知實相秪是三諦之理耳無量義經云無相不相不相無相名為實相釋云無相者無生死相也不相者不涅槃相也夫無生死相豈非空乎不涅槃相豈非假乎經又云不相無相豈非中乎或解經文云究竟除因緣自然為實相竊謂前文云離合俱非此句方名無戲論法何但離因緣自然耶應知合然俱離離合俱非無句可指故名實相今所悟者即此理也桐洲曰捨生死重擔息肩於藏性輕安之義二慶喜陳辭二一歎領無上大悲清淨寶王善開我心能以如是種種因緣方便提獎引諸沉冥出於苦海幽溪云讚佛無上大悲清淨寶王者知佛悟妄如迷方空華本無所有證真如精金濕灰更不重生位無有上萬纍多捐無心無緣而能拔苦與樂故又敘益云善開我心等也前破妄會真歸三如來藏故云種種因緣皆有別有圓故云方便提獎五住為沈冥二死為苦海二述請三一述前但解世尊我今雖承如是法音知如來藏妙覺明心遍十方界含育如來十方國土清淨寶嚴妙覺王剎如來復責多聞無功不逮修習慶喜已開圓解深得文旨故今云知如來藏等妙覺明即三諦也藏心既遍三諦咸遍但觀今文豈非諸法所生惟心所現一切因果世界微塵因心成體及二卷云汝身汝心皆是妙明真心中物等為前文之要義乎補遺云心具為含心生為育清淨言無染寶嚴謂具莊嚴世界因明生今以妙合覺故王此淨土心含淨剎是因心徹果也上十方猶兼淨穢此專在淨解心至是可謂極圓然未兼修證則不逮修習故佛責之問解行相去幾何答解則廣兼諸法修即惟在一門例初果見道通觀四諦後三果重慮緣真止觀一諦耳今經亦然據阿難自呈所解心含十方而後文揀選圓通止在一根詎非解廣而行專耶二通喻解行我今猶如旅泊之人忽蒙天王賜與華屋雖獲大宅要因門入陸宿曰旅水宿曰泊喻心行理外也天王賜與華屋者有喻必有法遠指即前三卷半經近指即雖承如是法音知如來藏妙覺明心等也要因門入遠指即後修道分經近指即下本發心路也總之法在前後喻在中間觀要因門入之言解廣行專其義明矣三正請行門惟願如來不捨大悲示我在會諸蒙暗者捐捨小乘畢獲如來無餘涅槃本發心路令有學者從何攝伏疇昔攀緣得陀羅尼入佛知見作是語已五體投地在會一心佇無慈旨在會多先習小乘之人是諸蒙暗今已開權故求畢獲無餘涅槃補遺云小乘煩惱子縛斷名有餘涅槃生死果縛斷名無餘涅槃今此大乘五住二死究竟盡名無餘涅槃是圓果義通分滿對此涅槃而指最初能入之路為本發心路此文與初卷云殷勤啓請十方如來得成菩提妙奢摩他三摩禪那最初方便其義是同但前云菩提是究竟果此云涅槃是究竟果果前舉三觀及最初方便今云本發心路則兼之矣下文攝伏攀緣是奢摩他得陀羅尼是三摩提入佛知見是中道義總該解門三義而請其最初方便故建首云從何耳問此中當機所問與初卷同何分解行答初卷問意欲明從假是最初方便故佛答云有三摩提是最初方便也此中欲明耳根是所從之假乃行門之要故重問之問前七處徵心以妄心為所從之假今以耳根為所從之假云何得同答七處窮逐使言思道斷今耳根云覺觀出思惟身心不能及相雖不同其旨一也又三科七大名諸三摩提那得不同云有學者或云等覺已還皆名有學今謂尊者之意恐指前三果人名有學以上文云捐捨小乘則兼四果今別指前三者由第四果人空觀已成亦得云攝攀緣也二如來宣示行門二一經家敘爾時世尊哀愍會中緣覺聲聞於菩提心未自在者及為當來佛滅度後末法衆生發菩提心開無上乘妙修行路宣示阿難及諸大衆此時已説法華會三歸一故聲聞緣覺咸向菩提初心之人未明中道名不得自在此為現在之機也及為下是為未來衆生若知心遍十方自趨佛果名菩提心開無下總承上現未二機無上乘者謂超過三乘妙修行路者謂一心三觀二正宣示二一發覺初心二顯示修證初中二一正明二義二從七常住名去決通疑滯初又二一總述汝等決定發菩提心於佛如來妙三摩提不生疲倦應當先明發覺初心二決定義妙三摩提者梵語三摩提此云等持離沉掉曰等專心一境曰持於三觀中獨當假觀假即空中故云妙也解行之要皆在乎此問前釋有三摩提約次不次兩門次第則從假入空不次則假即空中今亦具二義否答前次第中雖明從假入空元非正意此經之意正為顯圓在約假以立空中今文亦然前約開解解是行家之解今約起行行是解後之行故特舉三摩提為入門使措心有地立修定之軌則其旨正同又前開解正明圓旨兼用別教而經旨在會別入圓今妙三摩提盡攝後文如觀音圓通正是約假以立空中而憍陳如等小乘聖位豈無從假入空之義會權歸實無非圓矣幽溪云決定有二義一者如來聖人決而方定二者已受決於如來定不可易同是一義但有機應授受之殊耳或謂二決定義與前二種根本為同為異答同而不同前先云生死根本次云菩提涅槃元清淨體則先妄而後真今先審觀因地發心次審詳煩惱根本則先真而後妄立名雖爾今一義中實兼前二種根本何者第一義審觀因地發心與果地覺為同為異先擇生死根本依不生滅圓湛性成夫因果名目相應則與智斷根本中涅槃義同前為開解但示生死根本今為立行須擇去生死根本則第一義中具二種根本明矣第二審詳煩惱根本意兼選擇圓通顯六湛圓明本所功德夫覺體不離六根是稱六湛圓明此與前第二根本中識精元明能生諸緣緣所遺者何以異乎而煩惱根本與生死根本義亦相通則第二義中亦具二種根本明矣同而不同其義如此今所以有二義者第一以因心徹果第二就自身觀察而意皆所以選耳根也發覺初心者指初心所發之悟如五卷云最初發心悟十八界誰為圓通是已二別明二一徵起云何初心二義決定二正釋二初審觀因地發心文三初略示因果同異二以是下明生滅不生滅三則汝下正示起濁除濁初中先勸審觀次明須審所以初審觀因地者所謂以因心徹果輔行四教因心不同今是圓初心也何者前阿難問中云捐捨小乘畢獲如來無餘涅槃佛答中云求佛乘不生不滅後結云皆合涅槃清淨妙德是以界外滅為初門屬圓明矣問第二義初云汝修菩提菩提是道是仍以道為初門何也答滅為初門非不修道第二義中云汝修菩提乃以道諦助成滅諦也由其契理至深故合滅諦而道為修行之法豈可廢乎此之果理必從六根證入故勸審詳煩惱根本耳應知第一義中以滅治苦生死根本苦也不生不滅滅也第二義中以道治集煩惱根本集也得循圓通道也是為四諦同觀而以滅為首非圓教而何阿難第一義者汝等若欲捐捨聲聞修菩薩乘入佛知見應當審觀因地發心與果地覺為同為異阿難若於因地以生滅心為本修因而求佛乘不生不滅無有是處既捨聲聞因果便求菩薩因果入佛知見豈非果乎因地該信前乾慧後文云初伏客塵煩惱客塵指見思見思尚伏故通信前吳興云因該十信果通分滿發心指所發之悟亦指初心所修止觀法門如後文云以湛旋其虗妄滅生伏還元覺以湛之言正指起行蓋初修止觀時圓伏五住發心求佛亦是發心畢竟二不別也若於下明須審所以交光直指識心為生滅則與下文相違蓋四大五濁是生滅法若除四大即是涅槃不生不滅之果下文了然無勞異議因心稍帶五濁則與佛果不相符矣問前開解中指攀緣心為生死根本今以四大為生死本豈不異耶答根本名同而義異攀緣是集集為苦本故名生死根本是相生之根本也今云根本者四大為生死之體若無四大安成生死是當體之根本也前舉其因今言其果由因致果元非碩異前為開解解門以識心為障故斷攀緣今為成行行門以根塵為障須除四大用與不同當識文旨二辨生滅不生滅以是義故汝當照明諸器世間可作之法皆從變滅阿難汝觀世間可作之法誰為不壞然終不聞爛壞虗空何以故空非可作由是始終無壞滅故此文之意明有生必有滅可作是生後則有滅若前無生後亦無滅幽溪云地水火風可作者也湛圓妙覺明心不可作者也然此是法説之義今文是喻喻中先可作次不可作可作中先正説次反顯正説中以外四大喻內四大故舉器世間明其生滅山河國土器世間也而云諸器世間可作之法則瓶衣等皆在其中矣虗空喻真心其義可知三正示五濁及除五濁分二一示濁妄二除五濁初又二一明濁相二示五濁初又二一法則汝身中堅相為地潤濕為水暖觸為火動搖為風由此四纏分汝湛圓妙覺明心為視為聽為覺為察從始入終五疊渾濁身中是根四大是塵攬塵為根成一期生死之相則四大為生死根本更無疑矣涅槃亦云為非佛性説為佛性非佛性者謂墻壁瓦礫據涅槃所云知外四大定非佛性今攬四大以成內身豈成佛性四纏即四蛇也人固有湛圓妙覺明心元在生死之外本無四大曰湛六根互用為圓妙覺明即三諦之理一心具五種功德而此妙心為四纏所分即真妄和合全成妄中之用也為視為聽等者四大有色因結色而成眼四大有聲因卷聲而成耳鼻舌身曰覺意曰察六根應用皆以真妄和合而為濁耳如此似成十二入而前有空大後有煩惱等從劫至命共有五番渾濁也二喻為二一立喻二略合云何為濁阿難譬如清水清潔本然即彼塵土灰沙之倫本質留礙二體法爾性不相循有世間人取彼土塵投於淨水土失留礙水亡清潔容貌汩然名之為濁汝濁五重亦復如是幽溪曰水喻湛圓真心灰沙喻四大纏縛言土失留礙者喻四大無知而反成有知水亡清潔者喻真心無生死而反成生死須知水亡其潔咎歸灰沙真心成生死咎則歸於四大明矣然則水雖濁而清體不亡濁遍之處即是清遍故圓修者非撥濁以求清乃即湛以復湛也汩亂也熏聞曰準悲華經人壽八萬至三萬歲未有濁名至二萬時為五濁之始今文蓋約五陰妄想為五濁故辨魔中色陰有堅固妄想受陰有虗明妄想想陰有融通妄想行陰有幽隱妄想識陰有罔象虗無顛倒妄想是故色陰盡則超劫濁受陰盡則超見濁想陰盡則超煩惱濁行陰盡則超衆生濁識陰盡則超命濁以後驗前知是五陰二示五濁五一劫濁前文明四大妄法能濁真心此就身中説耳四大之前實先有空能濁見也阿難汝見虗空遍十方界空見不分有空無體有見無覺相織妄成是第一重名為劫濁尋常所論五濁之義但云劫濁是總四濁是別然劫雖總四豈無劫濁之體乎今正出劫濁之體即空見不分是也空遍十方界能容地水火風見亦遍十方界能包見聞覺知衆生所共故可總乎四濁劫者時也四濁既聚此時則濁何但以空劫當其義哉若云此經論劫濁與他經有殊便失經旨亦無會通之趣有空無體者空無形質故有見無覺者不附身根故見既無覺故與見濁中見聞覺知義不相同見遍十方聞豈不遍今但以見為言端總之遍十方者盡名劫濁如下見聞覺知總名見濁意可知矣相織妄成者以無體之空織無覺之見以無覺之見織無體之空故妄成第一重濁見至於無覺而猶名濁者以為空所雜也二卷云見在眼前是義非實當知今之遍十方者亦妄見耳吳興曰應知五濁皆就阿難現前而示是故五節文初並云汝見汝身等孤山用配五陰初劫濁配色陰者空名一顯色是色之根本也二見濁汝身現摶四大為體見聞覺知壅令留礙水火風土旋令覺知相織妄成是第二重名為見濁前濁云見但取遍空無覺之見今則附著於身故云汝身現摶等摶揑聚也見聞覺知本非留礙而以四大織之四大有色結色成根四大有聲卷聲成耳是壅滯也因之見不踰色聽不超聲是留礙也水火風土本非覺知而以見聞織之轉無知成知如四大淨色能見能覺此取六根有發識之用故曰覺知是局在身根明矣此句雖似局根而上句見聞覺知實通指見精聞精等也名見濁者見聞覺知總名為見而為四大所濁妄成者妄成第二重濁也以次序言之先有劫濁今當第二此濁配受陰者六根有知則能領納前境故屬受三煩惱濁又汝心中憶識誦習性發知見容現六塵離塵無相離覺無性相織妄成是第三重名煩惱濁上見濁通舉六根及現量識今從見濁生攀緣心名煩惱濁如首卷云此是前塵虗妄相想惑汝心性正是此濁故孤山以配想陰觀文意似多指第六識王數故建首云又汝心中也長水云憶過去境識現在塵誦習未來境界長水以誦習屬未來者言誦習之力能至未來耳性發知見者六根生識初剎那未起分別次一剎那轉入意地故妄想之性發於前之知見性者體也然第六識離六塵無別有相故妄想之容現於六塵次云離塵無相明相是妄離覺無性明性是妄相織者知見六塵相織妄成第三所謂昏煩之法惱亂心神也觀今文則第一決定義中雙具二種根本明矣四衆生濁又汝朝夕生滅不停知見每欲留於世間業運每常遷於國土相織妄成是第四重名衆生濁前見濁及煩惱濁皆是妄法念念生起刻刻遷謝即衆生濁生滅屬行行有二種一不相應行遍於根塵二思即是行能造業招果孤山曰造作之心能趨於果名行行有六種大品經中説為六思思即是業謂六想之後各起不善業善業不動業也即中云前煩惱是惑從惑生業從業生苦而雙取業苦為衆生濁文云業運每常遷於國土豈非並取業苦為今濁乎知見欲留者欲留六根於世間也為業所運不能久住初朝夕不停細生滅也從細至粗流轉國土乃成一期生死之相一去一來名為相織法華疏云衆生濁亦無別體攬見慢果報上立此假名今文雙該上之二濁又以業苦為今濁相與彼文何異耶又上四濁皆有從前生後之義五命濁汝等見聞元無異性衆塵隔越無狀異生性中相知用中相背同異失準相織妄成是第五重名為命濁五濁中以命濁為主見性即聞性是無異也衆塵指六塵卷聲結色成根有異生識亦異問前文云見聞覺知壅令留礙與今何殊答前但明異不言其同今意欲明同異相織故與前異又前壅礙之言雖該根識似未及第六分別今則第六分別亦在其中雖第六通緣前五對彼五識其相不同亦得云無狀異生耳性中句釋上元無異性如後文云彼人以手循體外繞彼雖不見頭足一辨知覺是同是其義也用中句釋上無狀異生同是識體異是識用適言其同則用相背適言其異則性相知是無定準同異相織成命濁者識體本同與異相織是阿賴耶識為人命根故曰命濁據無異之性真妄已是相合而同異又復相織豈不濁耶此五濁文長水用三細六粗以釋其相孤山改用五陰與後辨魔文合千古承用然當文自有五相如劫濁以無體無覺為相則該乎四濁也文云汝見虗空遍十方界非總四濁乎若見濁則以識精之附身者為相煩惱濁則以歷緣對境所起分別心為相在三道中前之三濁皆屬惑道劫見二濁屬無明惑煩惱是第六識王所屬見思惑衆生濁以從惑起業苦為相文云業運每常遷於國土其義了然至於命濁乃指報因必有命根真妄和合同異混雜而為五濁中主雖在受報之後實可統前四濁相雖有五舉業惑苦三即該之矣二除五濁分二一擇真妄阿難汝今欲令見聞覺知遠契如來常樂我淨應當先擇生死根本依不生滅圓湛性成見聞覺知其性本真因四大渾濁而成生死言遠契等者前云菩提涅槃尚在遙遠又阿難初請行門云捐捨小乘畢獲如來無餘涅槃是欲遠契如來之四德也溫陵云生死根本五濁業用也其言甚是交光非之自立六處識心初卷七番所破者為生死根本不知生死以根塵為體今欲立行須破根塵云先擇者蓋欲擇去根中之塵則見聞覺知自復真體況經自堅相為地以來頻言四大能混真性既濁真性故今結顯須除四大前後相映文旨可識乃反遠引初卷之文則成解行不分之過矣幽溪云擇去也依取也前文已示由此四纏分汝圓湛則一真一妄遍乎五濁今當先擇生死之濁者而不用竟取圓湛性之清者而成之也或問根中四大何法能除答不循外塵則內塵自滅外塵皆妄心所成識心愈動則四大逾生五濁逾盛夫執持世界者風輪也今空中之風蓬蓬然起於北海蓬蓬然入於南海孰非衆生心力所致乎意念彌增則風輪彌廣人自不覺乃至貪愛為水覺觀為火堅執為地皆是攀緣所成但除攀緣塵相自滅六根亦淨是依不生滅圓湛性成也成謂成因成果二明伏斷二一正明伏斷以湛旋其虗妄滅生伏還元覺得元明覺無生滅性為因地心然後圓成果地修證以湛下先明因然後下次明果因即是伏果即是斷以湛之言以清治濁正是起行虗妄滅生指五濁耳前地水火風空為生死根本有此五大則成虗妄滅生滅生既妄故可轉旋但除攀緣即以湛旋滅生也伏是伏惑不動之義滅生既旋覺心不擾為伏還元覺元覺者無五大之覺性本來如是故名曰還乃以工夫合本體耳得元明等者明由湛得據下文云明相精純而接以變現之言則明含假義覺即中道無生滅即空契合此性為因地心古人云修三止觀照三諦境不其然乎此心如指南車所向皆正故可圓果地修證三觀功成證三德祕藏則修證圓矣二喻顯修證如澄濁水貯於靜器靜深不動沙土自沉清水現前名為初伏客塵煩惱去泥純水名為永斷根本無明明相精純一切變現不為煩惱皆合涅槃清淨妙德五濁喻濁水湛喻靜器澄濁水喻旋其虗妄滅生靜深不動喻伏還元覺靜是器靜不動是水不動止觀明靜能窮覺體故復喻以深也沙土自沉喻無生滅性清水現前喻得元明覺名為初伏下本文自合喻耳客塵煩惱即界內見思初伏應指十信前五品位中圓伏五住不但無明初伏即見思亦是初伏涅槃云具足煩惱能知如來祕密之藏即其例也縱斷見思塵沙未斷無明此十信位人亦為初伏所攝也去泥下喻果位既澄之後泥自泥水自水故可去泥而為純水喻上圓成果地修證名為下本文自合永斷無明合去泥明相下合純水古注云言永斷者且約從因至果通相而説理實妙覺方名永斷蓋因窮五品之初心果窮妙覺之極證但舉初後自攝諸位一切變現孤山以為隨機所感十界現形幽溪引前文惟妙覺明圓照法界是故於中一為無量無量為一等是也妙假觀成從法界體起法界用豈與凡位煩惱同耶涅槃清淨妙德即四德也為對五濁故以清淨觀之二審詳煩惱根本所謂就自身觀察也前第一決定義云汝今欲令見聞覺知遠契如來常樂我淨只此一語已該盡兩門之意以二決定義説雖次第用必同時故前見聞覺知之言已該今文所辨六根矣今云煩惱根本者對前生死根本煩惱從六根出故云煩惱根本煩惱是因生死是果煩惱既淨生死根本亦盡詳究文意豈非知苦而斷集乎又前文云涅槃清淨妙德今云汝修菩提菩提是智德屬道諦涅槃是斷德屬滅諦詳究文意豈非慕滅而修道乎四諦法門於起行時缺一不可生死若盡便證涅槃故第一義中明斷妄果而證真果煩惱若淨名修菩提故第二義中明除妄因而修真因此與初卷二種根本其文相映菩提涅槃皆在第二根本中而第一生死根本亦該苦集生死是苦諦根本指攀緣心即集也或以二決定義分配二種根本而以第一根本同第二決定義以第二根本同第一決定義未必然也今之二義分配四諦宛轉相成惟滅為首故成無作四諦之相滅既居首以滅治苦為滅修道以道治集義勢然也文分二一總勸審詳二正示審詳初文二一勸審詳第二義者汝等必欲發菩提心於菩薩乘生大勇猛決定棄捐諸有為相應當審詳煩惱根本此無始來發業潤生誰作誰受梵語菩提此翻道發菩提心謂發願修道也前云涅槃此以滅諦而超生死今云菩提乃以道諦而治煩惱四諦宛然諸有為相指上文四大五濁等也慕果修因須詳煩惱根本注者云尋聲逐色所起貪嗔名煩惱眼耳等六根為煩惱根本今謂如下文云若不審觀煩惱根本則不能知虗妄根塵據此當以六根取境為煩惱對彼六塵則以六根為煩惱根本蓋六塵元無分別起貪嗔由於六根故獨受根本之名又煩惱雖由六根而返窮流根至不生滅則圓通亦不出六根故須審之言發業潤生者六根當體是惑又能生識起見思枝末之惑故發善不善業遂潤將來生死當觀發業誰作潤生誰受蓋六根自作斯六根自受也二示須審文有法譬一法阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位虗妄根塵何處顛倒者謂六根六塵雖皆虗妄而顛倒必歸六根非六塵也六根不取六塵是降伏義問第一義中先擇生死根本今言降伏六根何法為要答擇生死根本是去根中之塵正是降伏義耳次譬阿難汝觀世間解結之人不見所結云何知解不聞虗空被汝隳裂何以故空無形相無結解故喻意謂世間解結之人不一時解結貴先見結知先時如何而結則知今時如何而解法中謂行人觀十八界孰不欲解煩惱結故解結之名意猶通泛結所從生名為所結所結的指六根以是煩惱根本故耳下文六結之名從此處起若不知根為結要則或於塵而解根或於識而解根解之則難故云云何知解所結喻顛倒之處也解喻降伏取如來位也次虗空喻真性以內根有四大四微著相所致故須解之真性無形本無有結又焉用解此與第一義中虗空不壞取喻大同總名有相非真惟無相為真耳二正示詳審分二一委示顛倒處所二正勸詳擇降伏初又二一明六為賊媒則汝現前眼耳鼻舌及與身心六為賊媒自劫家寶由此無始衆生世界生纏縛故於器世間不能超越夫見聞覺知元是真性由攬四大成根而生煩惱六塵為四大所成緣外四大則內四大增長是六塵為賊明矣六根取此六塵為賊之媒更無疑也交光云塵雖在外而體本無情説賊非義且於本經無據今謂涅槃經中明以六塵喻六大賊經云菩薩觀此六塵如六大賊何以故能劫一切諸善法故如六大賊能劫一切人民財寶是六塵賊亦復如是能劫一切衆生善財乃至云如六大賊欲劫人時要因而入若無內人則便中還是六塵賊亦復如是欲劫善法要因內有衆生知見常樂我淨不空等相若內無有如是等相六塵惡賊則不能劫一切善法經文了然何謂無據今經虗處使人離塵獨非據乎交光自立決定用根之義而根為四大四微所成若指塵為賊則根亦賊伴非決定可用之法故回經就情作此顛倒之説盲人是之良可悲夫溫陵云則汝下示虗妄根塵顛倒也眼等六根妄根也媒引六賊妄塵也自劫真性顛倒也世界有三種謂衆生五陰國土今舉衆生亦該五陰五陰是實法衆生是假名攬五陰成衆生故言纏縛吳興云由六根所起煩惱故發業潤生乃有無始衆生世界等然衆生見聞所及亦名衆生世界以是千二八百功德所涉也若起貪著是生纏結六結由此而成故於器界自難越矣須知從根生識稱煩惱根本以根對塵名曰賊媒後卷十方如來告阿難言汝欲識知俱生無明使汝輪轉生死結根惟汝六根更非他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物今文初指六為賊媒所謂淪生死惟六根也後云六湛圓明本所功德所謂證妙常惟六根也心有真妄根亦真妄何獨用根不用心耶二釋衆生世界是明千二八百功德所繇成也功德數量由世界相涉數量既明則選擇圓通有自來矣前六為賊媒明根是妄此下意兼真妄如云織妄相成妄也返窮流根至不生滅真也若世界相涉之言則通真妄六千功德凡夫尚具豈聖反無故通於真以前煩惱根本之義亦通真妄故爾分二一約衆生以明世界二約世界以歷六根初中二一釋名辨體二簡定變疊初中二一釋名阿難云何名為衆生世界世為遷流界為方位孤山云上示兩種世界一衆生世界是正報二器世界是依報以由正報纏縛故於依報不能超越故今但約正報而明二辨體二一指相示數汝今當知東西南北東南西南東北西北上下為界過去未來現在為世方位有十流數有三汝今下指相方位下示數尋常世謂差別界謂五陰今以三世四方為正報之世界也此中元明衆生六根正報而今文約三世十方者為示六根有此功德本與依報世界相涉而成故也二結歸衆生一切衆生織妄相成身中貿遷世界相涉三世十方在衆生莫非是妄故云織妄相成有時則必有方是相成也下身中貿遷等正示織妄之義言身中者衆生見聞所及總名身中何必以六尺軀中為身中乎身者聚也謂陰入界聚在一處也既屬陰入豈非身中長水云貿遷世也世界交織故云相涉即中云身中是界貿遷是世貿是貿易遷是遷流以過去易現在以現在易未來故名貿遷於界貿遷名世界相涉夫世界相涉乃千二八百功德數量之本在凡夫則為織妄相成在聖人則為真性妙用古人謂迷本元明是生虗妄一念不覺故有三世十方但法華六根清淨亦具六千功德若在聖位數量元同寧無世界相涉之義惟織妄之名獨在凡夫二簡定變疊二初簡四涉三而此界性設雖十方定位可明世間秪目東西南北上下無位中無定方四數必明與世相涉十是數方故云十方其實定位止有四方言定位者且如東南一隅止是兩借元無定位故定位只有東西南北上下無位即上下無界也相待而言不知自何為上自何為下故天如曰指著上下皆是四方之上下耳中亦為四方所攝故無定方文中先簡四維次簡上下次簡中方故最明顯者惟有四方言與世相涉者或為過去之四方或為現未之四方是與三世相涉也二流變增疊三四四三宛轉十二流變三疊一十百千總括始終六根之中各各功德有千二百三世各有四方四方各有三世皆成十二故云宛轉流變似就世言正是世界相涉一十百千通舉增數之法耳謂增一為十增十為百等此流變三疊古今解之不一惟吳興為最當今依其所釋稍為敷演初以方涉世明三疊者第一約四方各論三世共成十二世第二疊於東方三世變一為十謂一世變為三世三世各立過現未便成九世并最先根本一世故成十世則東方有三十世四方各三十有一百二十也其中十二世為能變一百八世皆是所變第三疊復將一百二十世一世變為十世共成一千二百世也其中除根本十二世餘一百八世咸是所變復為能變皆成根本若畏支離能變所變不論亦可次以世涉方明三疊者第一疊三世各有四方成十二方第二疊一世變為九世并根本成十世每世有四方則成四十方合三世共有一百二十方第三疊復將一世變為十世則十世變為百世三十世變為三百世每世四方成一千二百方也能變所變不復更論吳興又云斯蓋如來只指凡夫六根根塵相織世界相涉從粗至細且至三疊以彰厥德大意令知現在見聞覺知剎那剎那皆涉方世粗細之相也此據六根了別之性是同故云各各功德有千二百下對六塵了別之用有異所以功德全缺不等言功德者功言力德言用謂六根各有竪窮橫遍之力用耳云始終者一變為十為始至千二百即其終矣二約世界以歷六根二一總標阿難汝復於中克定優劣十方如來元無優劣阿難六根不無優劣故須定之二別簡六一眼根如眼觀見後暗前明前方全明後方全暗左右旁觀三分之二統論所作功德不全三分言功一分無德當知眼惟八百功德天如云四方各二百四隅各一百今眼所見前及左右三方已成六百併前二隅二百共成八百惟後方二百及後二隅二百不見故云三分之二也仁菴云三分之二者文云前方全明後方全暗左右旁觀則後方無德而前後左右為二分故成八百功德也二説皆是不必以指空唱數非之或云此中功德約方而不約時然前文以方涉世以世涉方故有千二八百功德苟但約方八百竟安在哉補遺云此中以方涉世是也次耳根如耳周聽十方無遺動若邇遙靜無邊際當知耳根圓滿一千二百功德言十方無遺者既顯周聽十方又兼障不能隔此約方論動若下以世涉方論也因聲有遠近而聞亦似遠近其實聞性何遐邇乎若靜無邊際則與法界合體矣三鼻根如鼻嗅聞通出入息有出有入而闕中交驗於鼻根三分闕一當知鼻惟八百功德鼻有出入息而出能取香入能嗅香所以異於無情之風氣也非出即入非入即出終不停止是闕中交苕溪云鼻中通出入息前後兩不相交是也此中以世涉方如出息屬過去入息屬未來則中交屬現在故後偈云鼻息出入通現前無交氣但或出或入不可定其前後耳長水云出入中交共成三分一分四百闕於中交故惟八百四舌根如舌宣揚盡諸世間出世間智言有方分理無窮盡當知舌根圓滿一千二百功德孤山曰舌取能言不論嘗味若取嘗味其德則劣以合中知故華嚴云佛法無人説雖慧莫能了譬如大暗中非燈無所見故舌功最大有小言有大言而即小可以喻大有深言有淺言而即淺可以明深是言有分而理無窮也況因言悟理理豈可窮盡哉五身根如身覺觸識於違順合時能覺離中不知離一合雙驗於身根三分闕一當知身惟八百功德補遺云離則根境單一故闕其知合則根境雙觸故知違順六意根如意默容十方三世一切世間出世間法惟聖與凡無不包容盡其涯際當知意根圓滿一千二百功德默容者對口能宣演而言十方是橫三世是竪世出世約法聖凡約人聖凡無不容則具十界盡其涯際則具十如幽溪曰默容者謂此根性具功德法爾如斯不假思量擬議如來掩室淨名杜口皆從此默字上得來天台明一念性具百界千如諸法實相亦得乎此即中云佛是一切智人十界十如靡不洞達故法華云惟佛與佛乃能究盡而凡夫一念心中亦性具百界此性德之容也苟能洞達意根遍照此修德之容也既有修性二重凡夫畢竟咸具故經直云默容不別凡聖苟不明修性何以釋默容乎古人云意根獨生遍緣諸法此修德之少分耳孤山曰此經明六根功德與法華不同今示發覺初心令知顛倒處所故辨六根優劣俾阿難擇於耳根以為修證之本彼經依經修行已發似解六根清淨互用無方雖眼八百亦具餘五根功德乃至意根亦復如是即同今經一根既返源六根成解脫二正勸詳擇降伏二一簡勸略明二因疑廣説初文二一勸簡根修行二示須揀所以初又三一簡圓通阿難汝今欲逆生死欲流返窮流根至不生滅當驗此等六受用根誰合誰離誰深誰淺誰為圓通誰不圓滿汝今下先牒阿難所願六根流逸取外六塵因之而致生死名生死欲流順之而出故招生死逆之而入名為入流生死苦也欲流集也返窮流根道也至不生滅滅諦也即中云煩惱流從六根出今不逐外境自達見聞即返窮流根所謂將聞持佛佛何不自聞聞也返窮即逆生死流流根即妙湛不動者也前第一決定義中明生死根本及果地不生不滅今此中具明四諦豈非兩門合一耶又返窮者若欲脫根必先脫塵先亡前塵次盡內根名返窮契涅槃四德名不生滅與前云汝今欲令見聞覺知遠契如來常樂我淨其義一耳故此二句是兩門之文心也當驗下次勸簡根前拈煩惱根本及具顯六根功德意取一根修行故須揀之受者謂受六塵用謂衆生所用六受用根亦可別配離合等六合者身也身由合知故離者意也不親緣外境故深者舌也言有方分理無窮盡故淺者鼻也鼻缺中交浮於外故圓通者耳也耳聞十方故不圓滿者眼也明前不明後故如是簡驗意顯耳根為當修矣前來多言六根是妄今云至不生滅知根中有真復令選根修行選其最合真者而已二較優劣若能於此悟圓通根逆彼無始織妄業流得循圓通與不圓通日劫相倍若能於此悟圓通根結上當驗此等文也不待文殊選擇自知耳門為勝豈非悟乎逆彼無始織妄業流結上汝今欲逆生死欲流至不生滅也上云欲流兼於惑業今織妄是惑業流是業根逐外境造善惡業故云業流得循下正較優劣圓根密指耳根於圓根修習則根塵易脫妙用宜成能以一日同彼一劫前文備顯六根功德其意在此又前審觀因地發心是修行綱要尚未的指華屋之門第二義方密指其門乃兩決定義結穴之處三許發明我今備顯六湛圓明本所功德數量如是隨汝詳擇其可入者吾當發明令汝增進云備顯者前云六根之中各各功德有千二百又云汝復於中克定優劣即備顯也覺性不離六根名六湛圓明言木所功德者行人雖從六根悟明自性元須因其本然故從眼根入者不及耳根豈返窮流根至不生滅便轉劣根而成勝乎故云本所功德數量如是苟悟後便能轉根則不須揀選圓通觀音得真圓通名無作妙用由善知本數量耳二示須揀所以十方如來於十八界一一修行皆得圓滿無上菩提於其中間亦無優劣但汝下劣未能於中圓自在慧故我宣揚令汝但於一門深入入一無妄彼六知根一時清淨十方如來稱機設化世界非一衆機不同或以天衣而作佛事或以寂默無言而作佛事香飰金光其類非一故佛修時於十八中隨研一法皆成無上菩提言圓滿者一成一切成但證一法於十八界皆成解脫以佛證圓理故根塵識皆無優劣則六根之中各各功德有千二百不待言矣阿難下劣不但遜佛并非圓機豈能隨舉一法便該十八選根之法急宜宣説於十八中揀去塵識惟取六根如去丈就尺又於六根中揀去餘五根惟取耳根如去尺就寸所謂汝復於中克定優劣也佛應劣機帶別説圓故施此法豈得已哉一簡勸略明竟二因發廣説二一疑請阿難白佛言世尊云何逆流深入一門能令六根一時清淨前云但於一門深入阿難已知華屋之門必在茲矣故再問以暢其義二廣示三一舉果比斥佛告阿難汝今已得須陀洹果已滅三界衆生世間見所斷惑然猶未知根中積生無始虗習彼習要因修所斷得何況此中生住異滅分劑頭數阿難但斷見惑尚未斷思及塵沙無明故未知一入六淨也須陀洹此云預流小乘初果已預聖流故是見道位已除見惑八十捌使見惑歷三界於二世間中屬衆生世間云見所斷者謂見道所斷之惑也見惑歷四諦下增減不同俱舍頌云苦下具一切身見邊見邪見戒取見取為五利使貪嗔癡慢疑為五鈍使共十使集滅各除三除身見邊見戒取道除於二見身見邊見上界不行嗔共八十八使準輔行二十三卷去有料簡缺具之義集注亦引茲不煩録根中無始虗習指思惑謂思道所斷之惑以修道時重慮緣真故云見思亦云見修即後三果所斷也歷三界九地每地有九品貪嗔癡慢共有八十一品此迷事思亦云俱生我執與生俱生故在根中不惟積生且無始恆有惟聖者重修止觀方能斷之生住異滅即同體塵沙無明也初住已上四十二品為分劑頭數下明理無一六及六根互用則分劑不隔頭數亦融佛意明八十八使初果斷之八十一思後三果除之生住異滅分劑頭數惟破無明者能融能消耳二理無一六二一法二喻一法中二一根非一六二一六義生初又三一徵今汝且觀現前六根為一為六前云深入一門者或從眼入或從耳入也為一為六者現前六根為止一體為有六體也此一字與前一字不同二破二一破一阿難若言一者耳何不見目何不聞頭奚不履足奚無語六根之用不同一身之中猶若異域故以為一者非矣二破六有問答若此六根決定成六如我今會與汝宣揚微妙法門汝之六根誰來領受阿難言我用耳聞佛言汝耳自聞何關身口口來問義身起欽承初句牒計次問答中問六根誰領而阿難答耳聞者所謂此方真教體清淨在音聞也佛言下結破雖六根各不相知而用復相隨安可云定六乎三結此中明理非一六者幽溪云前當機問行實兼問理蓋由不達理無一六故於六根生一異執意謂六根成結要須次第一一而解云何深入一門能令六根一時清淨耶世尊全約理答蓋理明而行疑自銷故答理全是答行所以前破一六次明非一六也是故應知非一終六非六終一終不汝根元一元六阿難當知是根非一非六非一者破執一之惑以諸根之用終然有六故非一也次破執六之計以六根之用終自相隨故非六也終不下正雙遣一六以顯雙非元者本也以非六之故名為終一而非本來是一又以不一之故名為終六而非元來是六一六之計既不可立則是根非一非六明矣當知六根雖由妄立實與真理相符非一非六豈非理乎若生雙非之見即是違理今以離見故云雙非是佛所證豈小聖所能及歟二一六義生前明理體雖非一六然若無一六云何可説非一非六故一六義生此義又不可少所以下文立喻亦先喻一六義生次喻理非一六由無始來顛倒淪替故於圓湛一六義生汝須陀洹雖得六銷猶未亡一顛倒約惑淪替約業果三道所纏故迷圓湛之體而為一六上文元明根非一六今圓湛亦不離根即根是理曰圓理無根相為湛又非一為圓非六為湛而初果法執未忘不得不為之一衆生六根現具不得不謂之六安知一六即非一六哉次約人斥中雖得六銷六指六根交光謂止銷六塵未銷六根未必然也此中元辨根之一六故文首云現前六根為一為六而反以六為六塵可乎夫根由塵有既不入六塵則六根自銷第法執尚存故未妄一耳然孤山以一為涅槃吳興云下文見精乃至知精元是一體或疑小乘滅智涅槃豈非一精明體但阿難既悟大乘豈猶執灰斷之説所證涅槃正是一精明體無足疑也六根既除伏歸元真未能起用故云猶未亡一也二喻二一喻二合喻中二一喻一六義生如太虗空參合羣器由器形異名之異空除器觀空説空為一太虗喻圓湛之性羣器以喻六根人皆知之然前明六根非一非六雙非之理不離六根今云如空正指六根當體如太虗空耳故後合云則汝了知六受用根亦復如是此根凡夫見六二乘見一不知根性圓離二邊如太虗空體非羣相也參合羣器喻非六而六如方器中見有方空之類名之異空喻凡夫不見一體必立六根之名豈定六乎除器觀空喻非一而一初果已證有餘涅槃故云除器法華亦云是名轉法輪便有涅槃音即説空為一之意二喻理無一六彼太虗空云何為汝成同不同何況更名是一非一虗空之體元非同異豈可更加之以名耶太虗參合羣器則似有異除器觀空則似有同故今遣云云何為汝成同不同名之異空説空為一是更加之以名故今遣云何況更名是一非一異空即是非一交光以防轉計釋之謬矣二合則汝了知六受用根亦復如是觀此合文知六受用根其義甚深凡夫小乘不能測也三一入六淨二一明六根生起二明一入六淨欲示一入六淨而先明六根生起者知根所從生則一入六淨亦可明也初又二一正明生起二明離塵無體初又二一列六根六一眼根由明暗等二種相形於妙圓中黏湛發見見精映色結色成根根元目為清淨四大因名眼體如蒲萄朵浮根四塵流逸奔色今經中明依正生起必先立妄所次立妄能成根亦然前三卷云因於明暗二種妄塵發見居中今云由明暗等二種相形於妙圓中黏湛發見前示二種皆妄今示二種由相形而有皆所既妄立之義耳前云發見居中乃以中統二邊今云黏湛表見所從來皆生汝妄能之義耳夫明暗既由相形而有苟分別不起則明暗皆忘此雖起妄之由而歸真之路因此可知言妙圓者即有而無為妙六根互用為圓妙圓中有明湛之德正是見性而不別屬於見為色所黏專發眼根之見即是見精豈非真妄和合之義耶即吳興由明暗等塵染起淨性之説也見精映色句是牒上文上云黏湛發見即見精也由明暗而有見即映色也應知無見方是真見有見即屬見精方其映時見與明暗幾附合而為一體故得結色成根所結指明暗之色而四大亦在其中根元目為清淨四大明勝義根也有能造四大所造四塵今但云四大即攝得所造云清淨者乃八法中至精之物故云清淨所謂染中説淨也因名眼體如蒲葡朵則通上勝義亦通下浮塵蓋勝義如形浮塵如影無有影而不類形者經文省約故以此句通上而冠下也擕李釋為浮塵根豈勝義果無其狀耶故雲間師準顯宗論為之辨云眼根極微居眼星上體清淨故如秋泉池耳根極微居耳穴內旋還而住如卷樺皮又舊婆沙論云舌根鄰虗居舌中央如半月形鼻根極微居鼻頞內背上面下如雙垂爪據此等文豈屬浮塵耶又準婆沙説人身根如腰鼓顙顙鼓筐也上下濶中間小漢宮女謂之細腰正與相類若男人身根應取熏聞記引他經説身如立戟槊此則居然有丈夫之狀今眼根既謂之如蒲萄朵又謂之如秋泉池者正以眼根四微圓轉光潔如水晶萄映徹照物如秋泉池也上皆圓通疏文言浮根四塵者前勝義是不可見有對色能照境發識乃天眼聖目所見其義深遠今浮塵根粗浮淺露虗假可壞曰浮體無知覺不能照境曰塵亦用能所八法為體今言四塵但舉所造二根相假流逸奔色以眼根元是色之所成而又成相對之勢故色可以牽之況眼所知在色而不在他故專念而成奔逸二耳根由動靜等二種相擊於妙圓中黏湛發聽聽精映聲卷聲成根根元目為清淨四大因名耳體如新卷葉浮根四塵流逸奔聲由動句是所既妄立發聽句是生汝妄能聲由叩擊而發有動靜之勢故云相擊無相為妙即真諦也六用互具為圓即中道也明湛是俗諦有照境之用故動靜得而粘之三諦中有一諦能生諸法不其然乎但云映聲舉動該靜也卷聲為聽精之用此乃帶用而成根體長水曰聲性虗散須卷攝以成聽義既卷成根還如卷葉新卷之葉完好如耳此則似乎浮塵之根而勝義為根之元或亦似之二根相助流逸奔聲前雖帶用成體今則專指根用以耳根元是動靜所成故惟知動靜三鼻根由通塞等二種相發於妙圓中黏湛發嗅嗅精映香納香成根根元目為清淨四大因名鼻體如雙垂爪浮根四塵流逸奔香通塞關乎鼻息而其中可以取香由通知塞由塞知通故云相發納吸取也所納雖香而香合四大故可成根長水曰香氣上騰根垂下取如雙垂爪四舌根由恬變等二種相參於妙圓中粘湛發嘗嘗精映味絞味成根根元目為清淨四大因名舌體如初偃月浮根四塵流逸奔味淡味為恬餘味為變參者雜和也精必有光故能映聲乃至映味餘根亦然方其映時幾附合而為一體及根塵成兩始流逸而奔塵言絞味者或卷或舒舌狀如絞初偃月即半月也五身根由離合等二種相摩於妙圓中粘湛發覺覺精映觸摶觸成根根元目為清淨四大因名身體如腰鼓顙浮根四塵流逸奔觸離合相遇而往來不停有相摩之狀摶取也或謂文中有四時初由離句是二塵相形之時第二句明發覺是從真起妄之時第三句覺精映觸是未成根時第四句摶觸成根是成根形時六根皆然今謂二種相摩已是從真起妄何待第二句耶若覺精映觸句是牒上文覺精所發之覺映觸即映難合之觸不得謂是第三時也惟未成形及成根形似有前後然是兩義不得謂是二時何者覺精體虗但以精光映物至成根則有實色故成兩義但成根後豈便無覺精映觸乎亦不能言有二時也故四時之説不足憑也腰鼓顙如桐洲注即中云兩根相假流逸奔觸者由成根後仍有覺精映觸故具流逸之勢流逸從根而説奔望外塵而言前後皆爾六意根由生滅等二種相續於妙圓中粘湛發知知精映法攬法成根根元目為清淨四大因名意思如幽室見浮根四塵流逸奔法初二句明由塵發知妙圓中豈無有知而真知無知由生滅所黏專發為意根之知知精映法句仍牒上文攬者取也前五根勝義名清淨四大意根亦然言意思者補遺云意既無體不可説形量今經就慮知所託肉團則如幽室之相也孤山吳興並以意託肉團為幽室見非也此文上下並明清淨四大勝義根相意之勝義者清淨四大託於肉團之內引發意思而外緣法塵如處幽室而見於外六根之中眼之勝義發在於外惟此意之勝義在肉團內故有室之喻耳又前五根皆有竅穴通外惟意所託包在肉團亦能引思故譬幽室又幽室如意之浮塵根也以勝義根附託於內故云見耳為顯意之浮塵猶如幽室非意所託何名幽室正法念經云如蓮華開合者是也補遺謂意必無形而慮知所託亦有其相名勝義根經云意思思指慮知而已言幽室見者肉團在人身中已如幽室而清淨四大復託之以知法如幽室中有人能見也人在幽室我見人而人不見我意根亦然正法念經云形如蓮華上有七葉朝開暮合色法所攝正今文所喻為幽室者也前云寤寐二相隨身開合亦是此意七徵初執心在內不見臟腑正在乎此二結阿難如是六根由彼覺明有明明覺失彼精了黏妄發光覺即中道之體明即俗諦之照覺明失妙則生世界六根豈不從此生乎以六根屬妄能也覺明是真明元不可少因有明故明必索照妄心起時還以明照此覺故曰有明明覺且覺體何所不遍故明所照處正是覺體稱為明覺不亦宜乎失彼精了者如前云所既妄立後文殊偈云所立照性亡也前明六根因六塵有未明六塵從何而有今示前六塵十二相皆從明覺而生所中無明故照性亡而失精了耳妄所既立生汝妄能因粘六塵而發六根照用之光前示六塵粘湛今則湛粘六塵既名為黏必有相黏之義也言發光者則映色映聲等皆精光所映正是妄明而已二明離塵無體是以汝今離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生非變非恬嘗無所出不離不合覺觸本無無滅無生了知安寄此文正示拔根之道根若從一法生則永劫難離賴因兩法對待如明待於暗動待於靜故塵可離而根可拔幽溪云惟其生起因塵而有所以現用離塵無體故眼見因色而有離色無體耳聽因聲離聲無體乃至意根亦然諺所謂躃者命在杖失杖則顛是也二明一入六淨前由明暗下文意本明一入六淨而先示六根生起者意顯只一妙圓黏湛而成六根所以入一無妄則六根咸淨今則正明一入六淨也為二一明脫根塵二明消根塵初又二一明一入六淨二一一入六淨汝但不循動靜合離恬變通塞生滅明暗如是十二諸有為相隨拔一根脫粘內伏伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫初總明不順六塵言不循者不起分別也人情不著於動則著於靜若分別不生二俱不著下觀音動靜二相了然不生是也前文皆先論眼根今忽以動靜居首其選用耳根之意乎如是十二皆離則六塵咸脫六塵本由明覺而有明覺者謂照了覺體因之反起外塵今不循聲色則治明覺之病所以六塵皆亡楞伽云不了心及緣則生二妄想了心及境界妄想則不生今經圓通正因此入前審詳煩惱根本惟在六根似應從根用力今明脫根之要先在脫塵以根從塵起故耳次隨拔一根下正示其要言一根者初心但離一根之塵則一根即拔因脫根塵便歸真理名曰內伏根塵為外真如為內伏者不動義即性寂也伏歸元真句乃牒上文此時當有六用不行之義是先入空發本明耀是由真入中當內伏時見聞之用不彰若并不住空則妙用頓顯發本明耀耀性本是圓湛之體今得此體復其本然本無六根故六根圓拔五黏指五根及十種外塵之相此乃由假而入空中吳興云阿難所疑一入六淨正釋在茲二六根互用不由前塵所起知見明不循根寄根明發由是六根互相為用此明本明既發則不藉根塵而六根互用也文有四句不由前塵句明不藉塵凡夫六根由塵發知今是本明故不由前塵也明不句明不依根凡夫結色成根有根則有知見今是本明何賴六根循者順也第三句言寄根明發者吳興云寄二種根覺明開發如智論云報生天眼在肉眼中此乃寄於肉眼而發天眼今亦如是吳興言二種根乃浮塵勝義根也謂雖不依根而權借浮塵勝義以彰其用此亦示同凡夫而已若法身之體光明遍滿又何賴六根哉第四句言由是者由本明寄根所以六根互用謂眼能聞聲耳能見色然必根隔既消方是真互用義若帶根隔而能合開根未全消非本明也今因發本明耀一根之中即能見色聞聲嗅香別味人以為根根互用而豈知本明之所寄乎手鑑云此顯證真起用約位明之即相似分滿也前云從何析伏疇昔攀緣得陀羅尼入佛知見斯由隨拔一根脫粘內伏故得不由前塵所起五眼三智開明而互用自在也不漏意識引五識生一一通緣一切境故然六根既自在六識六境亦自在由是根塵識三皆自在故方曰互用若細分別有十二重謂各有四句一根自在四句一根發六識六根發一識一根照六境六根照一境二識自在四句一識依六根六識依一根一識緣六境六識緣一境三境自在四句一境依六根六境應一根一境牽六識六境牽一識云云然此示本明不藉根塵因此而及互用故云由是且就根言未詳及塵識而義必具焉又十二重亦有未盡應云一根作六根六根作一根一根作一根六根作六根初二句可曉言一作一者如眼反司聞耳反司見變換言之共有三十六句其中只三十句是互用耳若眼司見但是寄根非互用也六作六者六六有三十六也二證明不循根阿難汝豈不知今此會中阿那律陀無目而見跋難陀龍無耳而聽殑伽神女非鼻聞香憍梵鉢提異舌知味舜若多神無身覺觸如來光中映令暫現既為風質其體元無諸滅盡定得寂聲聞如此會中摩訶迦葉久滅意根圓明了知不因心念引阿那律陀等者證明不循根之有據也阿那律此云無貧或云無滅以多睡故如來呵之從此精進七日不眠而失雙目佛令修樂見照明金剛三昧大論云得天眼人中最為第一者阿尼盧頭色界四大造色半頭清淨佛眼四大造色全頭清淨跋難陀云賢善龍王名大槩魚龍皆無耳而聽也殑伽河名此云天堂來以其自雪山頂無熱惱池流出故得此名河神是女故曰神女憍梵鉢提云牛呞下云於過去劫輕弄沙門世世生生有牛呞病今取其舌似牛故云異舌以能辨人所食味故云異舌知味舜若多云虗空主空神名雖無有身而能覺觸此神多劫以無身為苦如來放拔苦光映令暫現身觸則樂不可言所現身質其相如風則元無體明矣滅盡定亦云滅心定亦云滅受想定今云滅盡者長水云滅六全分盡七染分釋要云留淨分不斷要持種吳興云諸滅盡定即九次第定中滅受想定也摩訶迦葉入雞足山待彌勒佛正是此定意根既滅圓明了知即是本明故對境時不假興心動念耳然上所説是證明不循根非證六根互用其中或小乘或凡夫且因根缺之故迫於不得已而發非六根互用之比而真明不假根塵亦因此可知本明人人皆具所謂在聖不增在凡不減者是也二明銷根塵三一正明銷根塵阿難今汝諸根若圓拔已內瑩發光如是浮塵及器世聞諸變化相如湯銷氷應念化成無上知覺前明離塵拔根或疑根既拔已內根外塵便為無用今明根塵盡銷即所歸也幽溪曰應念化成無上知覺者化乃變化當體改轉之義蓋根身器界元是妙圓真心由無始從清淨本然中隨心應量成九界染礙色心如水成氷非礙而礙今諸根圓拔內瑩發光如湯銷氷氷還成水當體改轉不遺餘力故曰應念化成無上知覺即中云浮塵指正報浮塵根也器世間指依報山河國土也諸變化相總指四大所成法是則根塵依正全成正覺故曰無上下文云一人發真歸元十方虗空悉皆消殞況諸世界在虗空耶此由內瑩發光故根塵銷落本明發露名內瑩發光吳興云真智如湯妄境如氷了妄即真化成智覺二證暗不能昏阿難如彼世人聚見於眼若令急合暗相現前六根黯然頭足相類彼人以手循體外繞彼雖不見頭足一辨知覺是同前明根塵銷落或疑見聞是因緣生法不假根塵從何有見故引世人亦不假根塵為證言聚見於眼者見性本周法界今局在眼故云聚見良由明暗二塵黏湛發見故聚於眼而不及他處也若令急合則離見根暗相現前則離明緣六根指他人六根方合眼時頭足秪一暗相故云相類彼人指合眼人也以手循繞他人之體故云外擾知覺是同者謂暗中知覺與明中所見不殊須知能知之心即是能見之心故以合眼而當開目耳此則雖無根塵元自有見凡夫豈必假根塵乎三顯覺心圓妙緣見因明暗成無見不明自發則諸暗相永不能昏根塵既銷云何覺明不成圓妙緣見下仍是牒前文也緣塵之見凡夫必假於明言暗成無見者指上暗相現前至頭足相類也不明自發指上循體外繞至知覺是同由是觀之見不藉於根塵其義顯然故結云則諸暗相永不能昏離根離塵皆是暗相故云諸耳次根塵下方明聖境凡夫之見尚不假根塵況聖人根塵已銷豈無妙用上不假根塵猶是性德今銷根塵即是修德根是隔義塵是暗義隔暗已銷圓妙斯顯六根互用曰圓即有而空曰妙一入六淨道極於斯第二義竟二決通疑滯分二一明因果並常通初義二明解結無二通次義初中二一慶喜疑二一疑因心不能克果阿難白佛言世尊如佛説言因地覺心欲求常住要與果位名目相應世尊如果位中菩提涅槃真如佛性菴摩羅識空如來藏大圓鏡智是七種名稱謂雖別清淨圓滿體性堅凝如金剛王常住不壞若此見聽離於明暗動靜通塞畢竟無體猶如念心離於前塵本無所有云何將此畢竟斷滅以為修因欲獲如來七常住果此疑雖從初決定義發來實執第二義中離塵無體之語難第一義中因果相應之文也為四節初如佛説言下舉第一義審覺因地之文因地覺心即覺悟也欲求常住即求常住果也果位名目即下所列七種名是二明果地常住菩提是智涅槃是斷真如是正因之體合此三因名曰佛性因果無殊故云性耳菴摩羅此翻白淨第九識名由來地攝二論立識互諍地人止立第八阿賴耶識攝大乘人立第九識今經乃有二名今文菴摩羅是第九識下卷云陀那微細識是第八識然大圓鏡智乃轉第八識所成溫陵曰分別一切而無染著曰菴摩羅識洞照萬法而無分別曰大圓鏡智此釋顯了但既云分別又云無分別者似即破即立之義故以空如來藏而居其中即該三諦以多所含藏而無積聚名空如來藏也稱謂下言名異體一滅盡無明曰清淨具足衆德曰圓滿更無改變日堅凝金剛王即金剛寶或云帝釋所執者是此約喻明常住耳三若此下明因無常即舉第二義中離塵無體之語也阿難之意似謂前聞見性常住將謂見聽必離塵有體便當依比以求佛果今聞離暗離明無有見體離動離靜元無聽質無通無塞嗅性不生等則與第六念性何以異乎初卷文云若分別性離塵無體斯則前塵分別影事塵非常住若變滅時此心則同龜毛兔角則汝法身同於斷滅故今云離於前塵本無所有也四云何將此下疑因不克果若離前塵見聞則同龜毛兔角是畢竟斷滅之因豈依此而獲七常住果乎蓋修門之要在離根塵根塵既離見聽安在此人情必有之疑故此問決不可少又前明內瑩發光根塵銷落正指見聞之性為本明耀但前云脫黏內伏後發本明本明似非根中見聞故此叩之二以念與見性再推世尊若離明暗見畢竟空如離前塵念自性滅進退循環微細推求本無我心及我心所將誰立因求無上覺如來先説湛精圓常違越誠言終成戲論云何如來真實語者惟垂大慈開我蒙吝前文眼耳例同意識今復以眼見同意者因初卷中以心眼對辨言攀緣非心眼見是心今疑念因前塵而有見亦因塵何必與見而奪念乎前第一番以離塵無體難因果相應雖引初卷之文而所難者在二決定義今第二番并難初卷文也進退者進以眼根而推之若離明暗見畢竟空退以意根而推之如無前塵念性自滅循環者前以眼耳與意對推今以見性與意對推兩番推求名循環也於根塵中微細推求本無有心何云見性是心亦無見中心數是無心所此翻難前如是見性是心非眼耳若見性常必依此立因而求佛果今既不爾將誰立因初卷云其誰修證無生法忍今云將誰立因求無上覺其意是同如來下譏佛頓乖先説前文云六湛圓明本所功德又自初卷來屈指飛光等頻言見性常住及云見精明性等今又言見無自性兩端不定非戲論歟惟垂下請佛開決吝者執吝也二世尊答三一斥迷許説佛告阿難汝學多聞未盡諸漏心中徒知顛倒所因真倒現前實未能識恐汝誠心猶未信伏吾今試將塵俗諸事當除汝疑幽溪曰緣塵而有分別是為顛倒所因離塵而有知見即是真常反謂之無常是為真倒現前阿難雖有多聞未盡思惑故知此而不知彼也恐汝下者謂直説諦理恐汝不信須示塵俗諸事方可除疑下文擊鐘夢寤皆塵俗諸事耳二示聞性常二一就聞鍾顯迷倒二就聞性示因常初又二一詰聞聲二斥矯亂初又二一詰聞二詰聲此中文勢與諸文不同前文處處以根塵對説今皆以聞性與聲塵對辨當知聞性其猶清水若在根中為根所濁如溪流入河變成濁水雖成濁水濕性不失雖入根中聞性不入故皆以性與聲辨明一常一無常前文云離動離靜元無聽質此以根塵對説且明根塵若袪聞性圓妙阿難疑畢竟斷滅似謂水既不清并失濕性豈其然哉故今直以性與塵辨庶不迷於性也初詰聞中二一詰有無二云何下詰所以即時如來敕羅睺羅擊鍾一聲問阿難言汝今聞不阿難大衆俱言我聞鍾歇無聲佛又問言汝今聞不阿難大衆俱言不聞時羅睺羅又擊一聲佛又問言汝今聞不阿難大衆又言俱聞佛問阿難汝云何聞云何不聞阿難大衆俱白佛言鍾聲若擊則我得聞擊久聲銷音響雙絶則名無聞即時與爾時少異爾時者謂前事之末後事之始其時尚寬名為爾時即時亦是前事之末急續前事故稱即時敕羅睺擊鍾者佛意將選耳根圓通也初詰有無中初番言聞而兼大衆表所見之同也第二番俱言不聞此答為謬據佛後文所簡不聞之言含三種過一含以聲為聞之惑二含不知聞性常惑三含不知聞靜之惑故知凡小所言無非是惑豈不痛哉次羅睺再擊者溫陵曰此但無聲非謂無聞必再擊疊問者欲令審辨而而悟也次詰所以中總問聞與不聞答亦總示其意言音響者響是餘響音是正擊故云雙絶答中無聞之言謬之甚矣下文云聲銷無響汝説無聞牒此語也前云不聞已含三惑至此則顯言之然阿難以聞為根如來指聞為性根有生滅性無改更故阿難言聞佛亦言聞阿難言不聞佛亦云聞則聞性是常明矣前後文欲除根塵故對明其妄今阿難墮斷滅見苟不直顯性真何以除疑故將聞性對塵俗諸事言之其意在此二詰聲亦二一詰有無二詰所以如來又敕羅睺擊鍾問阿難言爾今聲不阿難大衆俱言有聲少選聲銷佛又問言爾今聲不阿難大衆答言無聲有頃羅睺更來撞鍾佛又問言爾今聲不阿難大衆俱言有聲佛問阿難汝云何聲云何無聲阿難大衆俱白佛言鍾聲若擊則名有聲擊久聲銷音響雙絶則名無聲又敕之意欲明是聲生滅非聞生滅溫陵曰上答為倒此答為正蓋聲有生滅聞性常在迷情不了以聞同聲是以常為斷也二斥矯亂佛語阿難及諸大衆汝今云何自語矯亂大衆阿難俱時問佛我今云何名為矯亂佛言我問汝聞汝則言聞又問汝聲汝則言聲惟聞與聲報答無定如是云何不名矯亂矯者矯強亂者雜亂據阿難疑聞者是根根由塵有無聲便合無聞然答聞答聲語全相似難免雜亂之失語意必有矯強故以矯強責之如來謂聞者是性聲屬外塵不應報答無定無定者相似也若言聲有生滅聞非有無語不相類即無矯亂之咎矣二就聞性示因常二一就聞正示二引夢明常阿難前疑見性斷滅本無我心及我心所今明聞鐘正是聞性此性常住乃至重睡之時覺觀宛然豈非心及心所所以破斷滅之疑也初中三一正破無聞阿難聲銷無響汝説無聞若實無聞聞性已滅同於枯木鍾聲更擊汝云何知先斥矯亂竟次正出其過先出汝言不聞則墮斷見之過聲銷下牒計前詰聞中第二番阿難大衆俱言不聞次詰所以中云音響雙絶則名無聞指上不聞為無聞耳今總牒云汝説無聞據無聞之語是不知聞性常住故今破云聞性已滅但觀此言知阿難疑聞根而如來正辨聞性聞性若滅至鍾聲再叩應無第三更答之文矣知即聞也阿難因昧聞者是性遂成斷見所謂目對真而莫覺故先斥之二辨析聞塵二一斥謬知有知無自是聲塵或無或有豈彼聞性為汝有無聞實云無誰知無者知有下示答聲為是答聞總差之過若論有無聲塵為正對此聲塵説彼聞性為汝有無猶言被汝有無也夫聲無既無滅聲有亦非生則不惟答無為誤而答有亦成謬矣阿難不知辨析故惑聲以為聞也次聞實下示不知聞靜亦是聞塵之過兼斥以常為斷前破無聞正破以常為斷今文中亦具斥三過二顯正是故阿難聲於聞中自有生滅非為汝聞聲生聲滅令汝聞性為有為無前但云聲塵或無或有今云聲於聞中自有生滅以聲與聞交互説也於聞中者謂於常住聞性中耳故後偈云音聲性動靜聞中為有無引今文也前但云豈彼聞性為汝有無今以聞與聲交互而説故後偈云無聲號無聞非實無聞性聲無既無滅聲有亦非生生滅二緣離是則常真實亦引今文當知前為出過今為結顯正義既云聞無生滅則常住義成既云非為汝聞聲生聲滅令汝聞性為有為無聞聲滅則聞靜義成辨析聞塵不得認聲為聞其義亦成前有三過今結三義對之了然長水云聲於聞中者聞性不動其猶鏡明聲生聲滅正如影像豈由影像有去有來令其鏡明為生為滅但聞性中本無根塵而有根時其聞聲者亦是聞性二卷經云見見之時見非是見例此亦應云聞聞之時聞非是聞雖有聞即涉聞精而聞即無聞不得捨聞以求無聞也三斥顯聞性汝尚顛倒惑聲為聞何怪昏迷以常為斷終不應言離諸動靜閉塞開通説聞無性初句斥其以塵為性非斥其以塵為根夫以聲之生滅為聞之有無非惑聲為聞乎聲可滅亡聞性常住既認聲為聞則必以常為斷矣言何怪者勢必然也終不下正顯聞性前雖就聞聲顯性而聞性必離根塵動靜塵也開閉通塞根也性既常住離根塵則性愈明前云離動離靜元無聽質是離根塵而疑畢竟斷滅是説聞無性佛先明性必有聞故擊鍾以驗之今明聞必有性不與根塵同失其明常住均耳阿難墮斷見中謂性無聞非擊鍾則疑不破而聞聲之性即離根塵之性故結歸於離根塵也二引夢明常二一引睡夢驗常如重睡人眠熟牀枕其家有人於彼睡時搗練舂米其人夢中聞舂搗聲別作他物或為擊鼓或為撞鐘即於夢時自怪其鍾為木石響於時忽寤遄知杵音自告家中我正夢時惑此舂音將為鼓響阿難是人夢中豈憶靜搖開閉通塞其形雖寐聞性不昏引夢聞舂搗與前擊鐘不同前明聞性常今兼明聞性離根塵識也眠輕易醒故舉重睡以重睡則根塵不接耳長水云睡人六識歸種思覺不行但任運聞即真聞性其説最是搗練是杵音杵椎也亦名鍾馗舂米是碓聲其人睡時即以聞舂搗聲為夢更無別夢此聞既非根識決是聞性更無疑也別作下驗非醒時根塵別作他物句是總標或為下別出二聲釋成上句耳即於下驗非醒時意識怪為木石正是夢時意識前阿難疑離根塵時本無我心及我心所今夢時能聞豈非心乎疑為擊鼓撞鍾乃至自怪非心所乎後偈云縱令在夢想不為不思無覺觀出思惟身心不能及正引今文別作下是覺即於下是觀夢中有覺觀其義了然於時忽寤者因夢聞而寤也遄知杵音是醒時根塵自告下是醒時意釋以鼓釋鍾文意互現舉醒對夢顯夢中無醒時根塵識耳阿難下結顯聞性言豈憶者憶即是識根塵由憶而有不憶即無故以憶居首不憶靜搖明不憶塵則無塵相可知不憶開閉等明不憶根則無根相可知無根塵識全是真性故云聞性不昏言不昏者文意但取夢聞舂搗是聞性不昏不取惑為木石聲也以是夢中意識故不取之若爾何故如來曲為模擬云別作他物等耶佛意明夢中有心及心所而正意在取聞性不滅也問既夢聞是性何故與外塵相對性豈有外塵乎答一切衆生皆用此疑須知不憶外塵即無塵相此忘塵之要道也二結形銷不滅縱汝形銷命光遷謝此性云何為汝銷滅既曉夢中不昏便知身死不滅以真性本離根塵豈隨幻影而滅亡耶言命光者前文云黏妄發光即是命光為者被也真性常然不被捨報所滅前阿難通疑六根離塵無體如來所以別顯聞性為常誠欲發耳根圓通之機也二示聞性常竟三結會通示分二一明迷常故無常以諸衆生從無始來循諸色聲逐念流轉曾不開悟性淨妙常不循所常逐諸生滅由是生生雜染流轉意明衆生流轉生死皆由不識常住言無始者指無明住地惑也循者順也根塵相對循聲逐色因之起識是逐念流轉不曾知見聞之性本來常住清淨無相是為無常所惑而乏見道之智耳不悟性常故不依常住而起修逐念流轉是逐諸生滅由是永沉生死非淨妙則雜染矣非常住則流轉矣前云流轉是流轉於意念今云流轉即流轉於生死此由集而起苦也二明棄無常即常若棄生滅守於真常常光現前根塵識心應時銷落想相為塵識情為垢二俱遠離則汝法眼應時清明云何不成無上知覺前是起集招苦今是修道證滅棄生滅守真常者長水云於妙常寂絶念而遊於真覺明亡緣而照是也若觀文意棄根塵識為棄生滅守見聞性為守真常常光者內瑩發光如前所説根既圓拔塵識亦除上是修道今證滅也想相下釋根塵識銷落之義夫塵者憶之則有不憶則亡是想所成之相也識情若起愛憎隨之故名垢穢二可遠離而根則惟在乎轉眼根轉為見法之眼一入六淨餘根可知塵垢離則清明矣遠離之言釋棄生滅守真常法眼清明是釋常光現前云何句正釋銷落如前文云如湯銷氷應念化成無上知覺前文舉要但明拔脫根塵今并明應去識耳無上知覺應指分滿佛果前第一義明苦滅第二義明集道今正兩門並用也
