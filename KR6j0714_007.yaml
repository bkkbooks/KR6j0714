body:
  text: 二明誦呪除習二一結前文阿難汝問攝心我今先説入三摩地修學妙門求菩薩道要先持此四種律儀皎如冰霜自不能生一切枝葉心三口四生必無因阿難如是四事若不失遺心尚不緣色香味觸一切魔事云何發生前阿難問欲攝其心入三摩地云何令其安立道場遠諸魔事阿難攝心之言早已問戒故佛先説持戒所以應阿難之請也入三摩等者欲入三摩地必須修學妙門妙門即是耳門從門入奧如是而後可謂求菩薩道皆持戒後事也先説之先對後誦呪立壇先持之先對下一切枝葉入壇而後修學圓通入三摩地然以戒為基址可不先説乎四根本戒既除一切枝葉自去可不先持乎心三即意貪瞋癡備舉十重也大乘攝心為戒自兼心三若口四但枝葉耳故四重若持則該心口不失遺者謂于戒不漏失是則未入道場已遠魔事矣二明今意二初略顯誦持利益二略示道場方軌初文分二一勸誦持若有宿習不能滅除汝教是人一心誦我佛頂光明摩訶薩怛多般怛囉無上神呪斯是如來無見頂相無為心佛從頂發輝坐寶蓮華所説心呪如來藏心超出羣有永離諸相四眼二智所不能窺故稱無見頂相無為心佛者此佛正是無生滅如來藏心所成也又不但從頂現且從頂發輝不但發輝且坐寶蓮華所説溫陵曰現業易制自行可違宿習難除心假神力今夫行人好正而仍邪欲潔而偏染不教而能不願而為隱然若有驅䇿而不能自已者宿習之使也德隆而福輕行善而身凶多障多冤數病數惱綿然若有機緘而不能自釋者宿習之召也茲非一生一劫之緣乃無始來念念受熏者故非神力莫能脫之摩訶薩怛多般怛囉此云大白傘蓋即藏心也量廓沙界曰大體絶妄染曰白用覆一切曰傘蓋神呪從此流演故名心呪無見頂者華嚴九地知識自説為佛乳母初生疾捧持諦觀不見頂示頂法不可以見見也幽溪曰前説律儀以制現業今説神呪以除宿習不獨設教周圓亦見慈心獨至苟非有此説宿習現前果將何法以治之乎準溫陵師有宿習之使有宿習之召苟能持此神呪則罪滅福生然宿習藏之於心非心呪而弗改宿習有之於為非無為而莫治今以大白傘蓋體相用以臨之將三惑以俱忘四魔而共滅尚何宿習敢潛藏於其間哉二顯利益且汝宿世與摩登伽歷劫因緣恩愛習氣非是一生及與一劫我一宣揚愛心永脫成阿羅漢彼尚淫女無心修行神力冥資速證無學云何汝等在會聲聞求最上乘決定成佛譬如以塵揚於順風有何艱險較量中先舉登伽愛習深厚尚成羅漢言宿生則非一生言歷劫即非一劫次舉淫女及無心修行因呪力故資其宿善尚證無學又登伽速證無學彼方舉行邪呪今以正呪破之彼是當機故得速證阿難但是旁益而已幽溪曰此中較量呪力之義有四不同一汝等在會顯非一人既為比丘愛習則薄二約人品貴賤登伽淫女為品則賤聲聞佛子為品則貴三者彼無心修行其心則劣今求最上乘其心則勝第四應云大小果位不同登伽聞呪速證無學阿難發願決定成佛後舉譬者塵揚順風其事非難喻藉呪成佛有何艱險不必以塵喻習及以風比呪也二略示道場方軌二一方便若有末世欲坐道場先持比丘清淨禁戒要當選擇戒清淨者第一沙門以為其師若其不遇真清淨僧汝戒律儀必不成就戒成已後著清淨衣然香間居誦此心佛所説神呪一百八遍承上決定成佛故云欲坐道場前科顯誦持利益謂之略者以對後文廣顯也此科示道場方軌謂之略者亦以對次文廣示也方軌文二今文正明方便準止觀于正修前具二十五種方便一具五緣二呵五欲三棄五蓋四調五事五行五法用對今文略皆具足如云先持比丘清淨禁戒即持戒清淨也戒成就已著新淨衣即衣食具足也建立道場必擇間林深谷即間居靜處也專心入壇一心行道即息諸緣務也選第一沙門以為之師即近善知識也經云如是四事若不失遺心尚不緣色香味觸即呵五欲也始於三七日六時行道如是不寐後則端坐安居經一百日即棄五蓋也端坐安居必調心不沉不浮調身不緩不急調息不澀不滑調眠不節不恣調食不飢不飽是為調五事也坐禪之時必須具足樂欲精進志念巧慧一心即行五法也是則此經不惟正修與止觀㳷合即方便亦復大同未結界前先誦神呪一百八遍然後結界結界方法此經不説應準大悲經或以刀畫為界或以白芥子散擲四方為界或以想到之處為界幽溪大師山中道場則依後法以想為界也長水云今此持戒應通大小若出家者除戒體本淨當須懺淨如更稟菩薩律儀彌益其善若在家者或受近事戒或但受菩薩戒以下文有白衣故真際曰誦呪百八表滅百八煩惱也二正修二初一修然後結界建立道場求於十方現住國土無上如來放大悲光來灌其頂二明證阿難如是末世清淨比丘若比丘尼白衣檀越心滅貪淫持佛淨戒於道場中發菩薩願出入澡浴六時行道如是不寐經三七日我自現身至其人前摩頂安慰令其開悟心滅貪淫則專至於第一戒也持佛淨戒即先所受比丘戒等也持戒之後更須發願天如補注曰求佛灌頂今佛現身名為感應既得感應心必開悟孤山曰佛本是無心淨故有水清月現感應自然若見此相當觀空寂是佛顯然是魔則滅幽溪曰經中開衆為三一比丘二比丘尼三優婆塞即白衣檀越然白衣近事男或可同壇進修若比丘尼必欲行道自當別置道場如古之法華聖尼必有成法交光乃許白衣女亦可同壇此則內違律制外招譏嫌本圖利益反致損之幽溪據經云白衣檀越不通女人必有深旨尚須再考三明結壇立行二初廣示道場方軌二重宣佛頂呪辭初文二一請問阿難白佛言世尊我蒙如來無上悲誨心已開悟自知修證無學道成末法衆生建立道場云何結界合佛世尊清淨軌則此阿難問結壇軌則之詳也或云悲誨即四種清淨明誨此説太局應知從初卷來無非無上悲誨以圓教法門是如來無上之誨從悲心出故曰悲誨心已開悟者指上多番開悟自知句溫陵曰知呪力冥加聖果可期也幽溪曰自知修證無學道成者謂佛世不必建壇也而有四義面奉慈容故親承聖教故根器淳厚故已登初果故末世反是故須建立幽溪此釋亦指呪力加被故知無學可期此句復含二義一者自知修證之法二自信如此修證必登無學四果之位次為末法請建立道場者前阿難問欲攝其心入三摩地云何令其安立道場遠諸魔事今攝心之法已得聞矣若立道場必須結界其清淨軌則非佛自説何由知之言清淨者即如下文牛糞為場十香塗地等二答示二初別示二初明壇法二一立場方法佛告阿難若末世人願立道場先取雪山大力白牛食其山中肥膩香草此牛唯飲雪山清水其糞微細可取其糞和合栴檀以泥其地若非雪山其牛臭穢不堪塗地別於平原穿去地皮五尺以下取其黃土和上栴檀沈水蘇合熏陸金白膠青木零陵甘松及雞舌香以此十種細羅為粉合土成泥以塗場地方圓丈六為八角壇夫法王法言即事即理楞嚴壇法古有表示但所表尚有未盡今重以觀心釋之文中先取之取取其牛也山中肥膩香草表首楞嚴經飲雪山清水表楞嚴大定其糞微細表萬行可取之取取其糞也雪山或表圓教然考大經云雪山者名為如來忍辱草者名大涅槃經今亦例彼以雪山為如來表行人能入佛境界也大力白牛者考文句以大白牛譬無漏般若今謂雪山表佛境異即屬法身法身中道之理超出如山離二邊無明故如雪行人依之而起般若之智具大根力故表白牛非此純白之法安與大白傘蓋相應耶肥膩香草是圓頓教典謂般若大智從教而得也雪山清水者是性具之定智與定合能見佛性而言其糞微細者從無分別理無分別智起無分別之用具足萬行非微細乎此顯即穢無穢更和栴檀以表解脫三德既具方是道場次簡云若非雪山者未入佛境界也則無分別用反成魔事如大經云縱使大火焚燒身首終不求救舍念法心此以無分別而成佛事苟末代衆生謂淫殺盜妄於道無礙以此為無分別行反成麼矣別於下乃佛預指末代修行如東震旦等不近雪山亦無白牛故為別立此法乃表圓機有云表別機者非也平原表衆生心地穿地五尺表破五住煩惱黃色之中土表信心以顯中信如上雪山白牛喻上根性法華龍女方是其人此不易得降此尚有圓機但依心性中理以起中信云上栴檀者即指上文和合旃檀之語既以黃土而當牛糞可不和栴檀耶此中十香須表十信雖未破無明登住當以圓信歷此十心細羅為粉亦萬行也方圓者理圓而矩方丈六表十六剎那八角表八忍忍者人也謂八人地中具十六剎那耳下文云不起於座得須陀洹則為十六剎那明矣壇者起土為之方與圓合為丈六問十六剎那但在小乘今何入大答法華釋信解品謂信解之名準小望大即屬圓教修道之位是則十六心中前十五心為初住見道至十六心即為第二治地住之向也問既具十六剎那何云八人答前十五心中八忍具足智少一分故名八人此屬須陀洹果至第十六即名斯陀含向有云在菩薩位中十六心但名八忍惟如來得智名也問前糞和栴檀用表解脫今之十香何配十信答解脫之法亦可從十心而得作此配會於義無違二供養方法二初壇中供物二初晝夜常供三一壇心莊嚴壇心置一金銀銅木所造蓮華華中安鉢鉢中先盛八月露水水中隨安所有華葉壇心置蓮華者法華三昧為今經之宗也現前一念具佛知見離思量分別為法華三昧之體或云金銀銅木隨豐儉為之不必具用此四即中謂木莖銅葉銀鬚金臺共為一華金表滅智銀表道銅表苦木表集木能生長故表集也銅附於木故表苦也金最貴而銀次之以對道滅其義可知苦集即道滅乃無作四諦之義如蓮華之出泥不染也以不生不滅為本修因然後圓成果地修證因果在一心中即蓮華也鉢為盛水即無漏性水八月是秋之中表得中道理水水中安華葉者葉以表權理水是實實中有權蓋同體權實之義或云八月亦表八正大經云若修八正即見佛性如八月露水二八方莊嚴取八圓鏡各安其方圍繞華鉢鏡外建立十六蓮華十六香爐間華鋪設莊嚴香爐純燒沉水無令見火此第二層取八圓鏡者上下八鏡為一壇之主今先列八鏡以表行人之八忍也須知八忍從四諦立又四十五位所得法華三昧皆八人地所成故云圍繞華鉢法華八王子亦表八人地耳鏡外下為第三層施十六蓮華者八人地中十六剎那一一皆是法華三昧如法華十六王子皆於八方成正覺也十六香爐表十六心皆是解脫純燒沉水表豎窮實相無令見火者寂滅忍也蓋火是因緣生法今實相理是因緣所顯非因緣所生故不令見火八王子配八忍者經云一名有意此苦法忍也四諦中苦有陰質故有意即苦忍也經云二名善意此集法忍也集為不善以善破之三名無量意此滅法忍也滅則無量故得此名四名寶意此道法忍也道可尊貴故云寶也經云五名增意此苦比忍也從苦法忍增成苦比忍也六名除疑意此集比忍也疑為惑首故應除之七名響意此滅比忍也滅法忍如聲滅比忍如響八名法意此道比忍也道是軌則故云法也圓教八忍乃初發心境界故八子皆名意蓋取發心畢竟二不別也十六王子配十六剎那者法華云其二沙彌東方作佛一名阿閦在歡喜國二名須彌頂即中云此配苦法忍苦法智也苦必三相遷移而佛名不動是子動中證不動也達苦即樂故云歡喜應配苦忍明矣須彌亦不動義智在忍上故須彌頂是苦法智也經云東南方二佛一名師子音二名師子相此配集法忍集法智也集是煩惱聞師子音五住煩惱皆裂故屬集忍從忍發智則具師子之相經云南方二佛一名虗空住二名常滅此配滅法忍滅法智也經云西南方二佛一名帝相二名梵相此配道法忍道法智也四諦中惟道諦最尊故道忍稱帝惟道清白故道智稱梵相也經云西方二佛一名阿彌陀二名度一切世間苦惱此配苦比忍苦比智也彌陀在極樂國達苦即樂應屬苦比忍第二可知經云西北方二佛一名多摩羅跋栴檀香神通二名須彌相此配集比忍集比智也梵語多摩羅跋此云性無垢賢煩惱及業皆垢穢不賢之法得集比忍可以治之又集則四心流動得集比智即不動如須彌也經云北方二佛一名雲自在二名雲自在王此配滅比忍滅比智也滅則自在得此名也經云東北方佛名壞一切世間怖畏第十六我釋迦牟尼於娑婆國土成阿耨多羅三藐三菩提此配道比忍道比智也道忍無畏能壞怖畏至十六道比智聖果已圓故於忍土而得菩提此十六名配十六心絶無矯強覽者知之蓋圓教十六剎那是初發心境界大經云不離初發心而得阿耨多羅三藐三菩提此之謂矣三分置供物取白牛乳置十六器乳為煎餅并諸沙糖油餅乳糜蘇合蜜薑純酥純蜜於蓮華外各各十六圍繞華外以奉諸佛及大菩薩此第四層上來文中取數惟八與十六最多初云方圓丈六為八角壇則能供所供皆在其中矣次云八月露水及八圓鏡各安八方鏡外蓮華香爐數各十六亦兼能供所供蓮華為所香爐為能今文八味十六器則惟能供良以期心初住故皆屬意於八忍十六剎那豈容他釋乎白牛乳即譬佛性大經云雪山有草名曰肥膩牛若食者即得醍醐此上味也而置十六器中豈非佛性在十六剎那中耶乳為煎餅表經融鍊然八味皆十六者明八忍中一一各具十六心苟非圓初發心豈彼彼互具若此或云圍繞華外者是壇心所置之蓮華非鏡外十六蓮華也恐未必然此第四層有一百二十八數在外明矣佛及大菩薩究竟此八忍十六心故以為供二兩時別供每以食時若在中夜取蜜半升用酥三合壇前別安一小火爐以兜樓婆香煎取香水沐浴其炭然令猛熾投是酥蜜於炎爐內燒令煙盡享佛菩薩溫陵云佛以日中受食故日中致享是也而云中夜例之豈中夜亦受供歟應知佛住中道故中日中夜皆表中道取蜜半升用酥三合古人以為三五和合半升是五如大經嬰兒行有五句一不能起者如來終不起諸法相不能住者如來不著一切諸法不能來者如來身行無所動搖不能去者如來已至大般涅槃不能語者如來雖為一切衆生演説諸法實無所説是為五句又五句者第一義空為一句不思議假為第二句有即是空為第三句空即是有為第四句不落有無為第五句酥三合者如大經云一指二指三指皆見即三諦也蜜從華出華是大乘之因酥從乳出密酥皆可喻習果小火爐是鎔鍊之處乃喻現前一念假緣而起故號火爐三即是五同在一念以香浴炭及令煙盡表除習氣也仁菴云投酥蜜於炎爐必有釜也燒令煙盡鍊純使無餘嗅也兜樓婆出鬼神國此方無故不翻或翻香草舊云白茅香也幽溪曰白茅香台山處處有之出香琳峰者佳二壇外莊嚴二一列諸位令其四外遍懸幡華於壇室中四壁敷設十方如來及諸菩薩所有形像應於當陽張盧舍那釋迦彌勒阿閦彌陀諸大變化觀音形像兼金剛藏安其左右帝釋梵王烏芻瑟摩并藍地迦諸軍茶利與毗俱胝四天王等頻那夜迦張於門側左右安置四外者壇之四外苕溪云西域當陽皆取東向所云左右則右尊而左卑也此方敷置或可隨宜應以尊居右卑居左如大論以舍利弗為佛右面弟子目連為佛左面弟子不惟西域此方古者亦以右為尊也即中云此經在灌頂部中録出毗盧為主故須張盧舍那蓋法身無相即以勝應兼法身耳舉五佛以該諸佛舉二菩薩該諸菩薩此佛菩薩中之要也古注謂金剛藏常領金剛護持呪人伏魔斷障故觀音與金剛藏當安左右藍地迦青面力士軍茶利金剛異名毗盧神變經云右邊毗俱胝手垂數珠鬘三目持髮髻尊形猶皓素圓光色無比頻那夜迦即豬頭象鼻二使者具如桐洲注二懸八鏡又取八鏡覆懸虗空與壇場中所安之鏡方面相對使其形影重重相涉前八鏡以表行人八忍今八鏡以表諸佛八智諸佛不離初發心而得阿耨多羅三藐三菩提故恰與行人八忍相對此科在列諸像後故表諸佛八智明矣然不但初後皆八真因真果諸位靡不從心而得豈非重重相涉乎感應道交在其中矣初明壇法竟二示誦儀二初修二初行道二初明成就二一明助行於初七中至誠頂禮十方如來諸大菩薩阿羅漢號恆於六時誦呪圍壇至心行道一時常行一百八遍第二七中一向專心發菩提願心無間斷我毗奈耶先有願教第三七中於十二時一向專持般怛囉呪至第七日十方如來一時出現鏡交光處承佛摩頂前卷云十方如來於十八界一一修行亦無優劣又云此二十五無學諸大菩薩及阿羅漢彼等修行實無差別故須咸禮然菩薩羅漢之名亦不拘於二十五也初七六時誦呪云一時常行一百八遍者長水云此呪四百二十七句前諸句數但是皈命諸佛菩薩衆賢聖等及敘呪願加被離惡鬼病等諸難至四百十九句云跢姪他此翻即説呪曰從四百二十句唵字去方是正呪如云六時行道誦呪每一時誦一百八遍正誦此心呪耳吳興云此説未當所言每一時誦一百八遍者誤也前文自説常於六時誦呪圍壇至心常行一百八遍斯是行道遍數耳又云誦呪但誦唵字以下恐非經意據吳興説蓋以繞壇為行道也第二七發菩薩願心無間斷者此心既發必須相續不爾恐成遺忘故勗之以無間願教吳興曰如梵網經十大願等云云即中云初二七中雖但云持呪禮佛發願必具五悔言五悔者一懺悔破大惡業罪二勸請破謗法罪三隨喜破嫉妬罪四回向破為諸有罪五發願破邪倒罪即導前四令至所在能行五悔令至菩提況滅罪乎第三七一向持呪則純依佛不思議力鏡交光者表感應道交圓人至此多入初住故承佛摩頂二明正行即於道場修三摩地能令如是末世修學身心清淨猶如琉璃修三摩地恐即指後端坐安居經一百日身心清淨如琉璃者泐潭云觀行成就也吳興云此觀行淨或六根淨然經意何必不指六根真清淨位二示不成阿難若此比丘本受戒師及同會中十比丘等其中有一不清淨者如是道場多不成就此反顯道場成就必由於師友也二坐禪從三七後端坐安居經一百日苕溪曰天台止觀示四種三昧一曰常坐如一行三昧二曰常行如佛立三昧三曰半行半坐如方等法華四曰非行非坐如請觀音等諸大乘經今經所屬亦半行半坐也幽溪云今經道場初三七日則專於常行後一百日端坐安居則專於常坐是則一經兼乎兩行也二證有利根者不起於座得須陀洹縱其身心聖果未成決定自知成佛不謬須陀洹者十六剎那進趣見真是第二依人故大經云第八人者不名凡夫縱聖果未成謂未成須陀洹而自知成佛不謬是初依菩薩大經云具煩惱性能知如來祕密之藏又云是名凡夫非第八人前云身心清淨猶如琉璃是過於須陀洹者也應是三四依位二總結汝問道場建立如是二重宣佛頂呪辭三初阿難述請二如來宣説三述願加護初中二一阿難請阿難頂禮佛足而白佛言自我出家恃佛憍愛求多聞故未證無為遭彼梵天邪術所禁心雖明了力不自由賴遇文殊令我解脫雖蒙如來佛頂神呪冥獲其力尚未親聞惟願大慈重為宣説悲救此會諸修行輩末及當來在輪回者承佛密音身意解脫不以難事苦之曰憍未證無為者在小乘則三界惑盡名證無為在大乘則二死已斷名曰無為天如補注曰昔阿難密承呪力得解淫難故曰冥獲而未聞今乃重請顯説意在悲救此會及當來也二大衆請於時會中一切大衆普皆作禮佇聞如來祕密章句二如來宣説二初現化佛説呪爾時世尊從肉髻中涌百寶光光中涌出千葉寶蓮有化如來坐寶華中頂放十道百寶光明一一光明皆遍示現十恆河沙金剛密迹擎山持杵遍虗空界大衆仰觀畏愛兼抱求佛哀佑一心聽佛無見頂相放光如來宣説神呪南無薩怛他蘇伽多耳云云前云無見頂相無為心佛從頂發輝坐寶蓮華所説心呪今云肉髻即無見頂相也熏聞引無上依經云頂骨涌起自然成髻涌百寶光即從頂發輝也次云千葉寶蓮等即坐寶蓮華也補遺云此第六番放光百寶光表百法界千葉華表千如有化如來坐華表千法同一覺性從佛頂現表千法是佛所證無上之法化佛頂又現十道百寶光表千法門佛理齊也然初從佛頂現化佛又從化佛現金剛密迹擎山持杵表此神呪即生善滅惡之用孤山曰諸經神呪例皆不翻自古人師多有異説天台會之不出四悉一云呪者鬼神王名稱其王名部落敬主不敢為非此世界義也二云呪者如軍中密號唱號相應無所呵問不相應者即執治之此為人義也三云呪者密默遮惡餘無識者如微賤人奔逃異國訛稱王子因以公主妻之多瞋難事有一明人從其國來王往欣之其人語曰若當瞋時應説偈云無親往他國欺誑一切人粗食是常食何勞復作瞋説是偈時默然瞋歇即對治義也四云呪者諸佛密語惟聖乃知如王索仙陀婆一名而具四實謂鹽水器馬也群下莫曉惟智臣解之呪亦如是秪一法語遍有諸力病愈罪除生善合道即第一義也具此四義故存本音五不翻中即祕密故不翻於四翻中即翻字不翻音天如補注曰孤山所引四悉者四悉檀也悉遍也檀施也佛以四法遍施衆生也初世界悉檀者隨方異説令生歡喜益也二為人悉檀者生善益也三對治悉檀者破惡益也四第一義悉檀者八理益也二述功德勸持二初舉果人由此自行化他二初正示三初備列衆義又二一總明出生果德阿難是佛頂光聚悉怛多般怛囉祕密伽陀微妙章句出生十方一切諸佛佛頂光聚者前文云從肉髻中涌百寶光又化如來頂放十道百寶光明故是光聚伽陀云諷誦呪亦名頌五會曰章細分曰句從法生佛故曰出生二別示十種功能十一成正覺十方如來因此呪心得成無上正遍知覺十方諸佛得此呪故八相成道因此呪心為因地入道之門該乎兜率降神入胎出胎出家逾城等相也二降魔外十方如來執此呪心降伏諸魔制諸外道幽溪曰金剛降魔必執寶杵金剛王寶覺義亦如之故言執也金剛杵指山山崩指海海竭表當人觀照般若斷除疑惑覺心不昧三應塵土十方如來乘此呪心坐寶蓮華應微塵國憑據是乘義故云坐寶蓮華運動是乘義故云應微塵國又乘者法華明諸法空為座此言諸佛以呪心為所坐之法乘以運載為義坐寶蓮華是載應微塵國是運四轉法輪十方如來含此呪心於微塵國轉大法輪含者具德為本也五蒙授記十方如來持此呪心能於十方摩頂授記自果未成亦於十方蒙佛授記持此呪心者念力曰持授記者果與心期曰記是以佛之記心而成衆生之記心也又持以握持為義蓋依手持以摩頂也自果未成者言記佛自凡入聖初入分果未成妙覺故蒙佛記是以憶呪不忘成佛果之可憶耳又雖自果未成而能持此呪即能持將來之佛果故佛與記六拔羣苦十方如來依此呪心能於十方拔濟羣苦所謂地獄餓鬼畜生盲聾瘖啞冤憎會苦愛別離苦求不得苦五陰熾盛大小諸橫同時解脫賊難兵難王難獄難風火水難飢渴貧窮應念消散依取依賴義此中八苦與常不同常途以生老病死足愛離冤會求不得五盛陰為八今以三塗及盲聾瘖啞足餘四為八有聲無字為瘖聲字俱無為啞孤山云灌頂經云大橫有九小橫無數具如桐洲注此文八難亦與常途不同今以賊兵王獄水風火飢為八自既依賴神呪以道化他他亦依賴之也七事知識十方如來隨此呪心能於十方事善知識四威儀中供養如意恆沙如來會中推為大法王子隨取隨順之義帶果行因事善知識又十方分證諸佛須事極果如來八攝親因十方如來行此呪心能於十方攝受親因令諸小乘聞祕密藏不生驚怖行名進趣親因是宿世受化之人從小向大是進趣義故聞祕藏從乘此呪心至此皆轉法輪事又曾受化者為親因多住小乘須聞祕藏方是進趣之義九入涅槃十方如來誦此呪心成無上覺坐菩提樹入大涅槃誦謂剎那無間之義因此呪心剎那無間故從成佛直至涅槃十付佛法十方如來傳此呪心於滅度後付佛法事究竟住持嚴淨戒律悉得清淨如今佛重説神呪即傳此呪心也阿難是持法藏人故云付佛法事法事即結集法藏及憐憫人天為世間依也使佛法究竟住於世間護持不失以呪力故戒律清淨桐洲注曰傳持之義直至滅後偕前第九同涅槃相也二指廣結名若我説是佛頂光聚般怛囉呪從旦至暮音聲相聯字句中間亦不重疊經恆沙劫終不能盡吳興曰總言呪心者即前文云斯是如來無見頂相無為心佛所説心呪也亦是祕密藏中精要之語故曰呪心也幽溪曰經之前四卷則顯詮藏心入華屋以來則修此藏心今説神呪則密詮藏心入壇持誦則修此藏心是則呪名摩訶悉怛多般怛囉而義翻大白傘蓋者以此所以呪心亦準顯詮而説文有十一段初段總名出生果德後十別開十種功能須知事雖有十心惟一種而有三義量廓沙界曰大即空不空如來藏呪心體絶妄染曰白即空如來藏呪心用覆一切曰傘蓋即不空如來藏呪心昔印海法師嘗以天台十乘妙觀消呪心十因義多勉強每怪山教諸師往往強以止觀配釋楞嚴名義多不相循類似捕風捉影由此不能服於物論致使台教與楞嚴本相符合者而反成乖隔豈非欲流通之反壅塞之乎大率欲以台教釋楞嚴者必屬文義相符參同於圓覺三觀印定於本有心宗如函蓋之相應水乳之相冥不知孰為楞嚴孰為台教然後為得也祗如楞嚴一經要而論之不外天台所立十乘觀法惟第一不思議境而有兩重一顯二密顯如初卷至四卷約常心以開圓解密如壇法莊嚴種種取像皆不思議境也第二真正發菩提心文見兩處一則當機讚佛繼之發願而云願今得果成寶王還度如是恆沙衆此總該四弘一則壇中專心發菩薩願我毗奈耶先有願教第三善巧安心止觀亦有兩處顯則自請入華屋以來訖于耳根圓通乃至端坐安居經一百日莫非善巧安心止觀密則依壇誦呪壇是不思議像呪乃不思議體觀之緣之忘情絶解正以止觀安心於不思議境也第四破法遍豎而言之則一經所明三惑無所而不破橫而言之如圓融三諦十界無所而不非第五識通塞如一切諸法無非涅槃若知見立知即無明本則於通成塞若知見無見斯即涅槃則於塞成通是故修大定者有塞須當破有通須當護第六道品調適苟於覺路通而不塞當於坦途中使道品調適即萬行中三十七道品一一稱性踏於大方行步平正也第七對治助開耳根法門固為正修若有斃病亦須對治或以六度治六蔽如以四種律儀以治貪欲持呪以治宿習經云具足萬行則何行而不修第八知位次九能安忍十離法愛所明五十五位真菩提路即其事也次研七趣辨陰魔乃別約二種能招報心以明修證一一必須十乘具足如止觀例歷餘心及發得九境皆即十觀成乘也蓋十乘觀法為如來開佛知見之大途通乎實相之指要無此則不足以稱大乘缺一則不足以成正教即小乘經中若關涉教理智斷行位因果者無不具之如曰聲聞乘辟支佛乘菩薩乘佛乘最上乘凡一言乘必如法華具足十乘方可自運運人以至道場也三更説別名亦説此呪名如來頂幽溪曰前云佛頂光聚從所依而立稱也蓋此神呪依化佛所説化佛依光明示現光明依頂發輝則此摩訶薩怛多鉢怛囉祕密伽陀所依在頂故曰佛頂光聚今曰名如來頂則直就頂法而言之也二勸持汝等有學未盡輪回發心至誠取阿羅漢不持此呪而坐道場令其身心遠諸魔事無有是處上須陀洹既在大乘此阿羅漢未必專在於小故坐道場之言亦指破無明惑溫陵曰上顯如來境界此明亦攝漸修下顯持呪之益也二舉因人以此滅惡生善二初廣明生善滅惡二一總勸受持阿難若諸世界隨所國土所有衆生隨國所生樺皮貝葉紙素白氎書寫此呪貯於香囊是人心昏未能誦憶或帶身上或書宅中當知是人盡其生年一切諸毒所不能害諸世界則不止於娑婆一界又有多土今盡舉諸界中土故云隨也又云隨國者指樺皮貝葉為隨國所生也二別明功德二一標阿難我今為汝更説此呪救護世間得大無畏成就衆生出世間智長水曰世間凡夫奉信此呪必能背塵合覺漸明出世間智三乘妙心頓獲開悟次釋十一能除諸難若我滅後末世衆生有能自誦若教他誦當知如是誦持衆生火不能燒水不能溺大毒小毒所不能害如是乃至龍天鬼神精祇魔魅所有惡呪皆不能著心得正受一切呪詛厭蠱毒藥金毒銀毒草木蟲蛇萬物毒氣入此人口成甘露味一切惡星并諸鬼神磣心毒人於如是人不能起惡頻那夜迦諸惡鬼王并其眷屬皆領深恩常加守護大毒小毒者大經九云譬如良醫善知除毒無上呪術若惡毒蛇若龍若蝮以諸呪術呪藥使良用塗革屣觸諸毒蟲毒為之消惟除一毒名曰大龍據大經此文則毒有大小明矣心得正受者不受諸受故曰正受以邪受不能動故惡呪不能著也熏聞云厭鬼名眠內不祥伏合人心曰厭蠱蝮中蟲謂蠱行毒也正法華有蠱狐舊維摩經有妖蠱左傳云皿蟲為蠱並音古上但云小大毒今備舉諸毒幽溪云此顯神呪有滅惡生善之力用也如有誦持者水火不能焚溺大毒小毒精魅惡鬼所不能害皆滅惡力也心得正受呪詛毒藥入口反成甘露諸惡鬼王領恩守護皆生善力也二能生諸智阿難當知是呪常有八萬四千那由他恆河沙俱胝金剛藏王菩薩種族一一皆有諸金剛衆而為眷屬晝夜隨侍設有衆生於散亂心非三摩地心憶口持是金剛王常隨從彼諸善男子何況決定菩提心者此諸金剛菩薩藏王精心陰速發彼神識是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑熏聞云那由他此當萬億俱胝此當千萬見應師音義後文所列金剛藏王菩薩數與今合一類相聚故曰種族非以菩薩而兼種族也下列諸金剛衆方是眷屬行住坐臥常在菩提心中名決定發彼神識彼指決定心者補遺云金剛藏王得如來藏心去惑純精陰密神速發彼持呪人神識即中云神識既發即能見道是人下更言發宿命也既識宿世無數劫苦則道心增盛若更知未來即是天眼三不墮惡趣從第一劫乃至後身生生不生藥義羅剎及富單那迦吒富單那鳩槃茶毗舍遮等并諸餓鬼有形無形有想無想如是惡處是善男子若讚若誦若書若寫若帶若藏諸色供養劫劫不生貧窮下賤不可樂處長水云第一劫者發心修行之初時也直至菩薩最後身時於其中間不落雜類或生人中亦非貧賤以持尊勝法故身尊勝也四具諸功德此諸衆生縱其自身不作福業十方如來所有功德悉與此人由是得於恆河沙阿僧祇不可説不可説劫常與諸佛同生一處無量功德如惡義聚同處熏修永無分散是故能令破戒之人戒根清淨未得戒者令其得戒未精進者令得精進無智慧者令得智慧不清淨者速得清淨不持齋戒自成齋戒自身不作對下諸佛悉與言不作福業則呪是慧業可知此人但持神呪諸佛功德皆以與之呪力所使也由是下明諸佛與福為見佛之因恆河沙尚少增至阿僧祇非謂有恆河沙數之阿僧祇也文有三重初言恆沙次言僧祇三再言不可説以結之其與諸佛同生一處蓋為諸佛之弟子耳古注云如惡義聚喻與諸佛無分散也今謂無量功德不出戒定慧不出空假中故如惡義聚同處熏修重明與佛同生一處是故能令破戒下重明無量功德如惡義聚故此兩科應是一文不清淨者指三業穢濁如下文食噉五辛等亦是不淨此前後文多言初心功德疏云果報雖未成就華報先已現前其説是也而此中但言戒慧不言定者持呪即是正定如後五除諸垢罪阿難是善男子持此呪時設犯禁戒於未受時持呪之後衆破戒罪無問輕重一時銷滅縱經飲酒食噉五辛種種不淨一切諸佛菩薩金剛天仙鬼神不將為過設著不淨破弊衣服一行一住悉同清淨縱不作壇不入道場亦不行道誦持此呪還同入壇行道功德無有異也若造五逆無間重罪及諸比丘比丘尼四棄八棄誦此呪已如是重業猶如猛風吹散沙聚悉皆除滅更無毫髮前云破戒之人戒根清淨今出其相未受時者桐洲云謂犯戒已未經懺悔重受之時言縱經者謂未持呪前有飲酒食辛之過飲食中言縱經衣言設著又云縱不作壇等皆明不淨為淨之意一行一住悉同清淨者謂無一行一住而非清淨作壇之後須入道場入道場後又須行道今三事皆無特以持呪等彼三事孤山曰比丘四棄即殺盜淫妄四根本重罪梵語波羅夷此云棄謂犯此者永棄佛海邊外猶如大海不受死尸比丘尼復加四棄謂觸八覆隨也六宿業消除阿難若有衆生從無量無數劫來所有一切輕重罪障從前世來未及懺悔若能讀誦書寫此呪身上帶持若安住處莊宅園館如是積業猶湯消雪不久皆得悟無生忍前但除一生之罪今舉往劫諸罪悉皆消滅至得無生忍即入聖果利益可謂極矣所謂成就衆生出世間智義見於此懺悔者懺是梵語具云懺摩此翻悔過悔是華言華梵兼稱故云懺悔止觀云懺名陳露先罪悔名改往修來館客舍也七所求如願復次阿難若有女人未生男女欲求孕者若能至心憶念斯呪或能身上帶此悉怛多般怛囉者便生福德智慧男女求長命者即得長命欲求果報速圓滿者速得圓滿身命色力亦復如是命終之後隨願往生十方國土必定不生邊地下賤何況雜形前明誦呪功德已極至此更説女人長水云命終尚能隨願往生諸佛淨土況世間所求而不獲耶即中云此節多就女人説也求長命下雖兼男子屬女意多欲求果報速圓滿者是求近效謂持呪之報當在來世而現在欲速得之溫陵云雜形謂鬼畜等類八國界安寧阿難若諸國土州縣聚落飢荒疫癘或復刀兵賊難鬬諍兼餘一切厄難之地寫此神呪安城四門并諸支提或脫闍上令其國土所有衆生奉迎斯呪禮拜恭敬一心供養令其人民各各身佩或各各安所居宅地一切災厄悉皆銷滅前明男女持呪功德今通及一國癘者四時不和之氣人得之而生疾也餘厄難如水火等地字即指州縣等支提云可供養處即淨剎之通稱脫闍此云幢又闍音都脫都即城臺也雨公云一心供養者必專心致敬始得靈驗也九年豐障消阿難在在處處國土衆生隨有此呪天龍歡喜風雨順時五豐殷兆庶安樂亦復能鎮一切惡星隨方變怪災障不起人無橫夭杻械枷鎖不著其身晝夜安眠常無惡夢明呪功諸文大槩以前生後前明國界安寧今明天龍等衛護又前有難令安今兼指無難之地五謂麻黍稷麥豆十億曰兆謂京兆大國多民也星各有方故曰隨方在手曰杻在足曰械在頭曰枷在身曰鎖蓋三木一鐵也十惡星不入阿難是娑婆界有八萬四千災變惡星二十八大惡星而為上首復有八大惡星以為其主作種種形出現世時能生衆生種種災異有此呪地悉皆銷滅十二由旬成結界地諸惡災祥永不能入上云能鎮惡星今具出其相二十八宿為四方之紀而稱為惡者從應逆而言也文云作種種形出現世時即非尋常所見明矣由旬正云踰繕那此云合應計合爾許度量也或云此無正翻乃是輪王巡狩一停之舍猶如此方館驛然彼由旬數有大小或四十里或二十里諸經論中多用小數耳溫陵曰天反時物逆理皆所以為災而反之逆之職由乎人天與物應之而已所謂災變惡星則應人之災惡者也八萬四千應衆生之煩惱業也二十八則四方之紀八則五行之經及羅計孛也順則福應逆則災應所謂惠迪吉從逆凶也能生災異者亦應其逆而已如彗孛飛流為應同分非星之為也今以呪力叶乎百順故惡變悉滅乎天災祥不入其境祥吉凶之先兆也二總述佛意結勸是故如來宣示此呪於未來世保護初學諸修行者入三摩地身心泰然得大安隱更無一切諸魔鬼神及無始來冤橫宿殃舊業陳債來相惱害汝及衆中諸有學人及未來世諸修行者依我壇場如法持戒所受戒主逢清淨僧於此呪心不生疑悔是善男子於此父母所生之身不得心通十方如來便為妄語前初卷阿難請問最初方便今云保護初學顯密二門文皆相應冤謂冤對橫謂橫逆前生所結名曰宿殃舊業是六蔽之業陳債如負財負命等熏聞云具四緣故方能獲益謂依我壇場一如法持戒二所受戒主逢清淨僧三於此呪心不生疑惑四憶持此呪者當自惟念於此四緣為全不全吳興曰心通者據前所説不出三義一者證果即端坐百日有利根者不起于座得須陀洹二者發解謂縱其身心聖果未圓決定自知成佛不謬三者宿命謂是人應時心能記憶八萬四千恆河沙劫周遍了知得無疑惑三述願加護六一金剛衆説是語已會中無量百千金剛一時佛前合掌頂禮而白佛言如佛所説我當誠心保護如是修菩提者以上顯呪之益下出護持之人前文云金剛藏王菩薩一一皆以諸金剛衆而為眷屬今正是諸金剛衆故云如佛所説前如來所説雖明呪功實所以囑金剛也長水云執金剛神由護法故亦護人也二天王衆爾時梵王及天帝釋四天大王亦於佛前同時頂禮而白佛言審有如是修學善人我當盡心至誠保護令其一生所作如願梵釋四王壇中所供皆有護法之責故次金剛發願所作之事如現生取證及世間無畏也既云一生則不止建立道場時矣三八部衆復有無量藥義大將諸羅剎王富單那王鳩槃茶王毗舍遮王頻那夜迦諸大鬼王及諸鬼帥亦於佛前合掌頂禮我亦誓願護持是人令菩提心速得圓滿藥義等皆呪中有名頻那夜迦壇中所供故諸鬼神皆佛所囑帥者將帥首領也云令菩提心速得圓滿則於此呪為有權矣上文云修菩提指持呪即修菩提也上云如願願即心也今雙承上文云菩提心耳四天神衆復有無量日月天子風師雨師雲師雷師并電伯等年歲巡官諸星眷屬亦於會中頂禮佛足而白佛言我亦保護是修行人安立道場得無所畏前云天龍歡喜風雨順時所以日月風雨皆護神呪補遺云陰陽相感薄而為電電雷光也而言師與伯者必有神物主之也法華疏云有四電師東身味南百主西阿竭羅北阿祝藍逐年巡察世間善惡者名巡官此則於有道場時誓為保護蓋前所作之事可論一生若水旱風雨等惟在立道場時使不為害耳五靈祇衆復有無量山神海神一切土地水陸空行萬物精祇并風神王無色界天於如來前同時稽首而白佛言我亦保護是修行人得成菩提永無魔事前明國界安寧國界是諸神所統故山海神等皆為永護土地即地神水陸空行亦各有神萬物精祇指主稼主林神等神王兩字是總承上文也苕溪云無色界天但無粗色非無細色故有稽首白佛之事涅槃云非想等天若無色者云何得有去來進止如是之義諸佛境界非諸聲聞緣覺所知桐洲注更引諸經明無色有色又云無色天不列天衆而在雜衆者以其無色非前天之儔類故與風神無色者類而言之文所發之願為成菩提之外護也六金剛藏王衆二一述意爾時八萬四千那由他恆河沙俱胝金剛藏王菩薩在大會中即從座起頂禮佛足而白佛言世尊如我等輩所修功業久成菩提不取涅槃常隨此呪救護末世修三摩提正修行者述意即是本迹久成菩提本也若入涅槃則不住世間故不取涅槃隨呪護人迹也具此本迹故云精心陰速發彼神識二敘護持世尊如是修心求正定人若在道場及餘經行乃至散心遊戲聚落我等徒衆常當隨從侍衛此人縱令魔王大自在天求其方便終不可得諸小鬼神去此善人十由旬外除彼發心樂修禪者世尊如是惡魔若魔眷屬欲來侵擾是善人者我以寶杵殞碎其首猶如微塵恆令此人所作如願求入正定在道場時本所應護前云於散亂心心憶口持常隨從彼故今云乃至散亂心等前云金剛藏王菩薩一一皆有諸金剛衆而為眷屬晝夜隨侍故今云徒衆等長水云欲界第六名大自在即魔所居處求方便者謂求惱人之方便也諸小鬼神欲為障難驅令遠離若發心修禪即不在制所作如願者成就是人出世間智及於世間得大無畏也既云恆令故不止在道場時矣此文有三雙一修行有定散為一雙二魔有大小為一雙三遮惡持善為一雙寶杵碎首遮惡也所作如願持善也孤山曰夫大聖之訓物也或用攝受或行折伏羣邪之屏迹也或感其惠或畏其威恆此二途咸令得度今行折伏俾畏其威若涅槃殺一闡提法華破諸惱亂仙豫之誅淨行滿足之僇衆生皆由住無緣慈得一子地乃能如是耳從第四卷中請入華屋以來齊此通名示正助以修圓行向下即證圓位三明迷悟以證圓位阿難於證入圓位之初獨問修證地位世尊答文首敘十二類生而後明五十七位者意使一切衆生依此法門從凡入聖重重研極至盡妙覺成無上道也為二初阿難述請二一敘過述益阿難即從座起頂禮佛足而白佛言我輩愚鈍好為多聞於諸漏心未求出離蒙佛慈誨得正熏修身心快然獲大饒益前屢呵多聞故今謙言愚鈍此又是尊者誓願故於諸漏未求出離諸漏指三界思惑前見道修道二文皆慈誨也於身心中見有佛性如大經云我身即有佛性種子故云快然等二因行請位世尊如是修證佛三摩地未到涅槃云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩作是語已五體投地大衆一心佇佛慈音瞪瞢瞻仰以好多聞故求聞五十五位以得正熏修故叩修證階級乾慧之後信住行向及四加行為四十四心其説是也然十信與初住但是開合之殊開為方便合為住體共成四十四心故孤山之説不可全棄至何漸次者準下三種漸次初則除其助因所謂五辛未為正行至於第二刳其正性所謂淫心由是之故修三摩地能得第三違其現業乃至獲無生忍所以第二漸次名為真修即修行之目孤山曰阿難所請斯有二意一者既受行門必有位次如得門入宅須知堂室淺深是故請之二者經初佛語阿難心言直故如是乃至終始地位中間永無諸委曲相前解行圓融則心言直矣地位無曲未知其相因此請之二如來宣説二一讚許爾時世尊讚阿難言善哉善哉汝等乃能普為大衆及諸末世一切衆生修三摩地求大乘者從於凡夫終大涅槃懸示無上正修行路汝今諦聽當為汝説阿難大衆合掌刳心默然受教未證先示故云懸示幽溪曰刳音枯增韻云剖也虗其中也易云刳木為舟今云刳心者凡弟子受法於師若引瓶之受水必虗其心然後有所得也二宣説二初標明二別示初又二一明理絶名相佛言阿難當知妙性圓明離諸名相本來無有世界衆生妙空也性中也圓明假也三諦無形俱不可見何有名相溫陵云生滅真妄菩提涅槃皆所謂諸名相也二明對迷立悟二一迷真起妄因妄有生因生有滅生滅名妄長水云此為分別敘迷真起妄為立位之因地位之興本由迷悟迷真起妄本性即虗故有斷分斷即成悟悟有淺深因成階降階降既分名位斯別若不迷真焉有斯位故順敘也二滅妄名真滅妄名真是稱如來無上菩提及大涅槃二轉依號此文略示妙位始終大經云佛性者有因有因因有果有果果有因者即十二因緣因因者即是智慧有果者即是阿耨多羅三藐三菩提果果者即是無上大般涅槃幽溪云一理之中本無地位因滅妄故不得已而強立名相也二轉依號者衆生則轉菩提而依煩惱轉涅槃而依生死此從理絶名相中而妄生名相也諸佛則轉煩惱而依菩提轉生死而依涅槃此從妄生名相中而復乎理絶名相也又復應知非謂直至妙覺方謂理無名相要須圓家名字位中了知即名相而本無知相能如是知則修即無修雖説地位本無地位可得也二別示二初迷真起妄顛倒類生二返妄歸真淺深位立初中二初總明二種顛倒次別明十二類生初文二一敘意阿難汝今欲修真三摩地直詣如來大涅槃者先當識此衆生世界二顛倒因顛倒不生斯則如來真三摩地如前所明因妄故有世界衆生滅妄則成二轉依號故知欲證真源先須識妄但言涅槃不言詣菩提者真三摩地即菩提也長水云前明三種相續今明二種顛倒以衆生顛倒即攝業果故言二倒者衆生為正報世界為依報正報為能依依報為所依倒則俱倒二不可闕故標二顛倒因顛倒何因因妄而有妄謂不實二倒咸因不實而有以先當識顛倒因故於五十五位之前先明十二類生類生之後即廣明妙位始終其意如此三摩他亦有真偽如涅槃明無真三昧等及能生人顛倒之心故惟如來所得為真三昧耳吳興云位由悟入悟必由迷迷之為凡悟之為聖吳興之意以在迷為因在悟為果悟必由迷故以顛倒為因此是台家正義可與前解並用前解謂二倒以妄為因今謂悟果以迷為因釋中云衆生為正報世界為依報未必然也觀下經文是以生滅為衆生顛倒有數量者為世界顛倒故衆生中亦有依正世界中亦有依正其文顯然即十二類生似亦世界所攝二正明二初明衆生顛倒又二一並明能依所依阿難云何名為衆生顛倒阿難由性明心性明圓故因明發性性妄見生從畢竟無成究竟有此有所有非因所因住所住相了無根本本此無住建立世界及諸衆生初句牒徵由衆生而有依正二報故下文所説總屬衆生倒攝性明心者前四卷中明世界生起則捨妙而言明今文亦然前云妙性圓明茲欲釋顛倒所由即捨妙言明也心為依正之總故特言之性明圓者以此無相性具依正二報天台所謂圓具圓遍性具十界是也因性明一照而依正二報之性一一發明還成無情有情之種由是於本性中還生妄見而此是正此是依判然分二途矣妄見即無始無明從此無明生四住惑於畢竟無依正中成究竟有依正佛順衆生情見故云究竟有耳應知無明亦性本具故云性妄見生釋籤云法性即無明法性無住處無明即法性無明無住處不其然哉問此中依正成究竟有後文何云妄性無體非有成依答所言依正不可得者但云無實誰云永無以非永無故順凡情云畢竟有以無實體故後文云無體無依善觀空者但觀不實終不起斷滅見言無依正輔行云所言三世不可得者但言無實誰謂永無正此義也此有下委出衆生世界之相以明無住本義能有即衆生所有即世界據後文即以所有為界因所因者三世中後為能因前為所因以不住故雖曰能因復為所因雖曰所因復作能因故曰非因所因也如此則無住著而亦無所住之處此遷流無住中安有根本可得而無住內有無始無明為生世界衆生之本二正示衆生顛倒迷本圓明是生虗妄妄性無體非有所依將欲復真欲真已非真真如性非真求復宛成非相非生非住非心非法展轉發生生力發明熏以成業同業相感因有感業相滅相生由是故有衆生顛倒前雖因明發性發性之時圓明即隱如前偈云所立照性亡也因此生妄見即無始無明無明元無體質似為諸妄所依然非實有故曰無依上文云本此無住恐謂實有此本故今遣之將復真者恐指明覺照性之時元欲復歸性真而欲真之念即非真真如性非真至非相似釋明上句既是真如便不須復必自謂非真故求復歸真元耳如此則宛成非真之相矣非生下明諸法生起以為生而復為住以為住而復為異故曰非生非住以為心則能生法以為法則又能生心故下即云展轉發生惑能生起業苦最有力用是生力也妄惑之力熏習成業業能招苦然必有同業相引方成十二類生同業互相招感名為感業長水云淫欲故相生殺盜故相滅幽溪云同業相感此但舉胎卵二生不言濕化者亦以造業力大者言之也二明世界顛倒二一能成所成分成二種十二阿難云何名為世界顛倒是有所有分段妄生因此界立非因所因無住所住遷流不住因此世成三世四方和合相涉變化衆生成十二類初句總徵世界顛倒是有所有者衆生為能有世界為所有分段者指東西南北之界有分量形段也又聲香味等相因而有總以後為能因前為所因前後不停故曰無住亦無無始無明故非所住以不住而成三世也孤山云以世涉方以方涉世俱成十二所以衆生正報因果和合亦成十二吳興曰第四卷方世相涉加流變三疊對彼依報顯於正報六根功德各千二百也此中相涉以依從正明世界顛倒立十二類生也既前云功德今云顛倒古師用此釋前三疊者其可同乎桐洲云三世四方顯是依報因此世界顛倒出生十二類生吳興所云非也桐洲此釋最是蓋三世四方之十二非十二類生之十二也經文三世四方和合相涉已成一個十二次云變化衆生成十二類又是一個十二明文顯然但下文十二區分似指十二入又是一個十二此十二入皆在一身而亦有內外之分若以三世四方為世界顯是依報後以色聲味等為世界則通正報兩種世界不二而二當知後文束前三世四方之十二但為六塵故復對六亂妄想以明十二也蓋色聲等六塵離衆生而論但屬乎依就衆生而辨即可通正經文具離合二義不可不知二依報正報合成一種十二是故世界因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業性故十二區分由此輪轉是故世間聲香味觸窮十二變為一旋復此文從是有所有非因所因無住所住發來故以是故承之因動有聲等人師解云因念動而聞聲因聞聲而見色其説非也文初以世界標名明指無情之體先論見聞不亦謬乎至因味知法始屬意知六亂妄想方對六塵辨六根耳當依長水解云內由動相外感風輪故有聲現因空生搖堅明立礙故有色立風金相摩則有火光光則有氣氣即香也寶明生潤火光上蒸由斯流水水有冷氣為觸觸分澀滑與舌相對是有味生五境合意則名為法上皆長水語也此中有字點上非有所有因字點上非因所因從聲至色香又點無住所住而為世六境既分衆生六情染之遂成亂想衆生六情虗妄如獼猴窺於六窗不恆其一故曰六亂由此造作諸業而成業性十二區分是十二入此是所感之報便屬輪轉十二變即十二區分也一番受生輪轉必具內根外塵故云為一旋復旋即轉旋復即回復次別明十二類生三一總列乘此輪轉顛倒相故是有世界卵生胎生濕生化生有色無色有想無想若非有色若非無色若非有想若非無想前文有兩種十二一者三世四方和合而成十二二者六塵六根相對而成十二今云乘此輪轉是近承因聲有色等顛倒承上世界顛倒十二區分窮變旋復既具十二變化衆生亦成十二取其數之相合耳此方十二時十二月亦是其類二別示文分十二一卵生阿難由因世界虗妄輪回動顛倒故和合氣成八萬四千飛沉亂想如是故有卵羯邏藍流轉國土魚鳥龜蛇其類充塞世界已具十二輪回復具十二顛倒之言多屬有情亦多在因言由因世界者謂世界中有虗妄輪回名動顛倒也輪回之言該今世來世輪回雖歷三世而同一種顛倒古注云卵惟想生虗妄即想也想體輕舉名動顛倒其説甚是言和合氣成者同業和合而卵以氣交如莊子云雄鳴于上風雌鳴于下風而風化又孔聞雷而孕亦是其事想體輕舉可上可下為八萬四千飛沉亂想此為受生之由魚偏得其下鳥偏得其上當知受生之時已具上下之相故曰飛沉亂想羯邏藍云凝滑入胎初位胎卵未分之相也衆生知覺之體若離器界便登聖位若合器界便為類生故云流轉國土卵生之後為魚鳥龜蛇其類充塞亦不止于魚鳥而已卵羯邏藍映上妄動魚鳥龜蛇映上飛沉一往偏承作此釋耳又十二皆名想生復云卵惟想生者十二亂想乃受生時之想卵生之想是因中想著故獨得虗妄之名也二胎生由因世界雜染輪回欲顛倒故和合滋成八萬四千橫豎亂想如是故有胎遏蒲曇流轉國土人畜龍仙其類充塞世界中有可以雜染之處如形類之色男女之相皆可欲之境也衆生因之起欲顛倒然輪回該十二旋復有欲即雜名曰雜染欲字亦雜染之義輪回既稱雜染則顛倒必以欲為性矣胎以情感情愛如水有滋成之義情有偏正名橫豎亂想以此為入胎之由遏蒲曇此云疱狀如瘡疱即入胎第二位胎卵已分也國土之名與世界稍別世界該根塵國土則專屬無情矣出胎之後為人畜龍仙資中云人懷正道豎首而行違正從邪斯生橫類即中云入胎之初但名橫豎之想至出胎後其相始現胎遏蒲曇承上滋成人畜龍仙承上橫豎一往承釋耳三濕生濕以合感者對下化生是離而名合也由因世界執著輪回趣顛倒故和合暖成八萬四千翻覆亂想如是故有濕相蔽尸流轉國土含蠢蠕動其類充塞濕以合感合即執著世界中有可以起著之處衆生感之而成輪回故具六根六塵十二法也趣是趣附輪回既稱執著則顛倒必以趣附為性矣顛倒中有世界衆生兩法和合濕以陽生名之為暖翻覆者此類最多非翻即覆受生亂想之中已具此相苕溪云翻覆飛伏之貌此約形説謂飛動蠕伏是也資中云違心背信翻覆任情遂感此類或翻或覆即中云衆生所趣不同或翻或覆非是一物翻覆不定似不必以違心背信釋之然資中之説亦自有義以衆生背信者多而翻覆之報不妨各得其一以酬因心也蔽尸此云軟肉濕生初相既不入胎則無前二位矣濕相應上暖成含蠢蠕動承上翻覆一往偏承意必互具四化生由因世界變易輪回假顛倒故和合觸成八萬四千新故亂想如是故有化相羯南流轉國土轉蛻飛行其類充塞化生有二種有無而忽有之化如諸天化生是也有當體轉變之化如蟲化為蝶百合化為蚯蚓是也古來解者如溫陵孤山取蟲化為蝶之義吳興取無而忽有之義然經云其類充塞豈偏取一義哉初云變易者化是轉變之相故云變易世界中有可以變易之道衆生乘之具十二入名輪回法假是假托新質溫陵云離此托彼名假顛倒其説是也觸者新故相觸或云根境相觸如生初禪必先現八觸新故亂想者若從諸天之化則以欲界為故初禪為新若當體轉變則以舊質為故變體為新此為受生之由次云化相羯南應上變易羯南胎中第四位也今是化生即無前三乃成第一位矣轉蛻飛行應上新故轉蛻屬故飛行屬新此文會解具列古釋天如所評最當更録於後溫陵曰化以離應變易即離也離此托彼名假顛倒觸類而變名和合觸成轉故趣新名新故亂想故感應亦爾蛻脫故趣新也如蟲為蝶則轉行為飛如為蛤則轉飛為潛凡以不同形而相禪皆轉蛻也羯南云硬肉蛻即成體無蠕相也自下皆稱羯南者諸類通稱也若第五鉢羅奢佉曰成形則名隨狀貌非通稱也孤山曰化相者非無而忽有之化如蠐螬蟲脫換故皮欣取新質意欲飛騰故曰轉蛻飛行也吳興曰轉蛻飛行未必唯舉蠐螬之類蓋是化生取譬之象如列子曰天地委蛻下文純想則飛皆取譬也是則轉蛻譬故形之易蛻飛行喻新質之輕舉無而忽有理合在茲天如曰環圓嶽三師所解化生固合經意若論諸天獄鬼等皆有化相則嶽師無而忽有之説亦有理焉宜備取之五有色由因世界留礙輪回障顛倒故和合著成八萬四千精耀亂想如是故有色相羯南流轉國土休咎精明其類充塞資中曰事日月水火和合光明堅執不捨障隔不通名為留礙精明顯著因此受生故名色相即中云此下四類皆修行不得正道者派成四種今言留礙者衆生精神結聚一處即生留礙由世界中有可以留滯之處如日月水火可以尊事衆生事之或吞吸精色誠意感通是留礙輪回也障顛倒者如星辰墮地即化為石非當體障礙耶故知精耀元由障礙所成所以和合著成精耀亂想也色相羯南承上留礙而障即留礙之意伏咎精明承上精耀休為吉咎為凶光現其象名曰精明如景星慶雲祥麟威鳳與彗孛飛流虹霓商羊皆是其類資中溫陵言皆有義大槩修心煉氣者能感生此耳六無色由因世界銷散輪回惑顛倒故和合暗成八萬四千陰隱亂想如是故有無色羯南流轉國土空散銷沉其類充塞此類與上文精耀相反上云著成精耀今云暗成陰隱敵體相翻然胎因情有此有色無色皆情之變銷散雖不可云情而滅情正情之變也云由因等者世界中有可以銷散之法衆生惑之以形為有待身為患本銷之散之歷十二入名曰輪回輪回雖具十二而顛倒之性惟一惑耳資中曰由迷惑不了厭壞色想思無邊空豈非顛倒即中云顛倒既名為惑則顛倒多就有情説也暗者其形不著為暗有細色在名為陰隱熏聞問既云無色何謂羯南答應取一分細色通名其類不可即同堅硬之狀亦化生之類也即中云銷散則無色陰隱故亦稱羯南空散銷沉者幽溪云且論欲界如舜若多神之類不必以無色界外道言之其説甚是補遺中以空散銷沉別對四空空指空處以脫色籠故散指識處緣識生定未免散亂故銷指無所有處銷前識故沉指非想非非想處到空之底故方允其類充塞之義此説亦可兼用如是故有下通承上文不必以空散等應上銷散無色應上陰隱七有想由因世界罔象輪回影顛倒故和合憶成八萬四千潛結亂想如是故有想相羯南流轉國土神鬼精靈其類充塞罔象者不真之貌為想所取亦具十二入名為輪回而從始至終以影響顛倒為體資中曰論因或如外道凡夫祠禱神明託附形像終身奉事志慕靈通因果相酬故生其類資中論因之説可釋八萬四千潛結亂想從因招果可釋如是故有想相羯南但此中憶成等或是類生果上亂想以類生之果是亂想所成也蓋鬼神與人幽潛相結為感為應無非心想所注故鬼神憶人甚於人憶鬼神稱為想相不亦宜乎想相之言通承上文不必偏映伸者為神屈者為鬼精者無形而有靈者能為靈通言其類充塞者乩仙巫覡皆是其類今世最多此種八萬四千者應八萬四千煩惱數也八無想由因世界愚鈍輪回癡顛倒故和合頑成八萬四千枯稿亂想如是故有無想羯南流轉國土精神化為土木金石其類充塞隳技黜聰以六根而法外塵則具十二入故曰輪回彼謂至道在是豈非癡乎頑者無知也情識者人之生意生意俱無名枯稿亂想如是下通承上文華表生精黃頭化石如桐洲注所載須者往檢天台山志有化石僧事云天台山東有洞入十餘里有居人市肆多賣飲食乾符中有遊僧入洞經歷市中飢甚聞食香買蒸餅啖之同行一僧服氣不食行十餘里出洞門已在青州牟平縣而食僧俄化為石已上二種是想之變自有色無色至此皆修行而不得正道誤成此類九非有色由因世界相待輪回偽顛倒故和合染成八萬四千因依亂想如是故有非有色相成色羯南流轉國土諸水母等以蝦為目其類充塞凡相假借有待而成即名虗偽相待中具有根塵如上以蝦為目則六根亦可假待況六塵乎因中亦然以具十二入曰輪回也所云染者不同欲染之染依附不離即是染著從染而感故是因依亂想水母以水沫為身故疏云不從自類受身是非有色相而成色相也又以蝦為目是無目之色相而有其色相待及偽染成因依皆類生果上之事因中亦然故託此類而為羯南長水云託穢成身藉物為導此釋與水母最合幽溪曰世人君臣父子兄弟之間孰有不因依以成其類亦求其正而已矣苟有不正未有不墮茲類也水母俗謂之蝦蛇一名蟦形如羊胃夫蛩蛩巨驉之負蟨亦然蛩蛩巨驉二獸名前足高不得食而善走北方有獸名蟨走則蹙食得甘草必齧以遺蛩蛩巨驉二獸見人來必負蟨而走二獸非愛蟨也為其得甘草以遺之蟨非愛二獸也為假足也十非無色由因世界相引輪回性顛倒故和合呪成八萬四千呼召亂想由此故有非無色相無色羯南流轉國土呪咀厭生其類充塞引者牽引以呪術牽引令鬼附托具十二入名曰輪回性者稟自然之質也今因相引假他而成非顛倒而何歟世界中有此輪回衆生有此顛倒以此之故而成類生古注云如蝦蟇等以聲附卵者蓋卵必得聲然後長養非聲即壞此與相引呼召雖合而稱為無色羯南可乎當知呪詛之力能使現形厭物故非無色相然因呪即有非呪即無因呼召即至非呼召即不至是本無色質也無色中色亦號羯南乃初受生時得此名目耳前後皆云如是故有今變云由是通承上文不必偏映呪詛亦呼召也厭禱之鬼元非先有實因呼召而生名曰厭生輔行有梵志起尸使鬼事宜檢世入鍊樟木鬼亦是其類已上二種是合之變十一非有想由因世界合妄輪回罔顛倒故和合異成八萬四千回互亂想如是故有非有想相成想羯南流轉國土彼蒲蘆等異質相成其類充塞合妄者資中曰棄本蒸嘗承他宗嗣以此為因其説甚是無子而有子則子即妄無父而有父則父即妄故云合妄無而為有曰罔異成者即下云異質相成回互者交互也此亂想或是受生之因或是果上亂想皆可釋之如是下通承上文言非有想相者非有父子之想而竟成父子之想如蒲蘆等是其類也蒲蘆蜾螺也取青蟲為子楊子法言云螟蛉之子殪而逢蜾螺祝之曰類我類我久則肖之矣速哉十二非無想由因世界怨害輪回殺顛倒故和合怪成八萬四千食父母想如是故有非無想相無想羯南流轉國土如土梟等附塊為兒及破鏡鳥以毒樹果抱為其子子成父母皆遭其食其類充塞此類生以怨害為因怨害中具十二入故曰輪回衆生起殺心即是顛倒衆緣和合怪成食父母想此想亦類生果上亂想長水曰冤對相尋連環不止托至親之父子發至怨之殺害豈不怪哉其説是也如是下通承上文本為報怨而來故非無想土塊毒樹實是無想古有多釋而此解於羯南稍順孤山曰土梟破鏡者史記孝武本紀云祠黃帝用一梟破鏡孟康云梟鳥名也食母破鏡食父黃帝欲絶其類使百物祠皆用之破鏡如貙而虎眼今云鳥者恐譯人誤或鳥字合是等字後人妄改耳貙音摳似狸而大已上二種是離之變二總結是名衆生十二種類類生文首皆言世界結言衆生者有數量故名世界而受生實衆生也佛意將明聖位中有單復十二故先明凡類十二又餘經多言四生今云十二是推廣其説足見今經為了義矣
