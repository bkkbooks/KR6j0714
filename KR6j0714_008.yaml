body:
  text: 二返妄歸真淺深位立三初總明漸次二初結前生後二一結顛倒因阿難如是眾生一一類中亦各各具十二顛倒猶如揑目亂華發生顛倒妙圓真淨明心具足如斯虗妄亂想此文初法次喻次一句釋顛倒二字後一句合喻類生是果顛倒是因果隔難知因通易顯一一類中各具十二顛倒具其因也如今胎生之人或悖逆犯分即梟獍食父母想或棄本蒸嘗承他宗祀即蒲蘆之類呪詛呼召現有人為非性顛倒乎乩仙巫覡幽明相結非影顛倒乎假他有作即水母以蝦為目專觀無方空境即空散鎖沉之類尊事日月水火即休咎精明之類妄想起滅或高或下是動顛倒觸境趣附反覆任情是趣顛倒離此托彼即新故亂想頑如木石即枯槁亂想胎生一類既具十一餘類亦然故喻以空華亂生也言顛倒妙圓真淨明心者真心具五種功德離縱橫為妙具三諦為圓真即是中淨即是空明即是假顛倒此心狂華亂起粗而非妙偏而不圓妄而非真染而非淨暗而非明故云顛倒具茲亂想安有出十二輪旋之期也二生漸次法文中先法次喻正喻三漸次也汝今修證佛三摩地於是本因元所亂想立三漸次方得除滅如淨器中除去毒蜜以諸湯水并雜灰香洗滌其器後貯甘露大論云一切禪定心皆名三摩地秦言正心行處是心無始常曲不端入正行處心則端直如蛇行常曲入筒則直今文云入三摩地即是修圓三觀之所證也于是本因元所亂想明所觀之境也立三漸次明能觀之觀也次喻中淨器喻心性即識精元明毒蜜者欲境可愛如蜜令人墮獄如毒正同四十二章經刀蜜之喻吳興云除去毒蜜喻除其助因及刳其正性也吳興以後貯甘露當喻無生法忍故以前三所除喻毒蜜若爾湯水灰香洗滌其器當喻塵既不緣根無所偶返流旋一六用不行葢根塵既亡其器始淨從此得無生忍是入初住位矣應知所觀之境有二亂想是事境圓通常等為理境此文中惟事境分明而不無理境以淨器當之最合止觀兩重所觀之旨又毒蜜可喻正使湯水灰香喻除習氣習氣即該塵沙無明三惑既破始登初住湯水言諸者謂或湯或水也雜者謂以灰香雜湯水中也古人云湯水如正行灰香如助行其說亦是但不必以助行對除助因正行對刳正性當增進時自有正助二行耳有人以毒蜜喻十二顛倒湯水灰香喻下五十五位觀智恐未必然此喻只喻三漸次文二標列正明二一標列云何名為三種漸次一者修習除其助因二者真修刳其正性三者增進違其現業修習真修前六卷中已明秪是三如來藏之理故下文別標但舉云何助因云何正性也除其助因句中其字正指亂想下二例爾修習真修工夫雖在前卷亦以望助因故但名修習望刳正性名為真修望前二故第三名為增進五種辛菜名助因者殺盜婬名正性故如經云一切眾生皆以婬欲而正性命古註云現業者謂現前惑業據幽溪疏以六亂妄想為現業前文云六亂妄想成業性故二正明三初修習除其助因三一徵云何助因助因者謂助婬嗔如後云熟食發婬生噉增恚正是其義二釋二一總明四食阿難如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛說一切眾生皆依食住真際云佛初出家于外道邊六年苦行日食麻麥知其非衟遂即捨之于牧牛女邊受乳糜食外道聞之生謗佛成道後為除自餓外道苦行乃說一切眾生皆依食住正覺正說餘不能知外道嗤曰愚者亦知何言正覺正知佛更問之食有幾種外道不能答因說四食食以資益為義觸食中能生喜樂資益諸根思食有希望義亦能資益識食即第八識執持之相必賴前三能執持諸根大種此中惟思食稍難釋林間錄中現有引證二別斷五辛二一述意阿難一切眾生食甘故生食毒故死此舉段食之損益欲除五辛之助因葢此五辛在凡俗或以為甘若在求菩提人能損法身慧命即是毒也二正斷二一約斷顯助開是諸眾生求三摩地當斷世間五種辛菜是五種辛熟食發婬生噉增恚孤山云五辛者楞伽經云葱蒜韭薤興渠也應法師云興渠梵音譌也正云興宜慈愍三藏云根如蘿蔔出土辛臭慈愍冬至其土不見其苗則此方無故不翻也二約人明過患二一說法人過患如是世界食辛之人縱能宣說十二部經十方天僊嫌其臭穢咸皆遠離諸餓鬼等因彼食次䑛其唇吻常與鬼住福德日消長無利益咸皆遠離謂不來聽法也二坐禪人過患是食辛人修三摩地菩薩天僊十方善人不來守護大力魔王得其方便現作佛身來為說法非毀禁戒讚婬怒癡命終自為魔王眷屬受魔福盡墮無間獄三結阿難修菩提者永斷五辛是則名為第一增進修行漸次二真修刳其正性三一徵云何正性此殺盜婬正是生死之體故曰正性二釋二初以戒刳性二先持小乘戒二先正明阿難如是眾生入三摩地要先嚴持清淨戒律永斷淫心不䬸酒肉以火淨食無噉生氣不食肉即斷殺溫陵云欲刳淫殺正性必持戒律不飲酒防亂之至也不噉生防殺之至也律中五果皆當火淨示不噉生氣色五果者熏聞云一核果如棗杏等二膚果如蕈茇桑椹梨柰等三殻果如椰子胡桃石榴等四𥢶果𥢶粗糠也如香茅蘇荏等五角果如大小豆等以比丘之法不得自手壞生若有所須語淨人言汝知是汝看是等淨入解者以火觸之此名火淨律中更有爪淨揉淨等今且言火耳以細況粗生果尚順淨食何況食肉傷慈乎次反顯阿難是修行人若不斷婬及與殺生出三界者無有是處當觀婬欲猶如毒蛇如見怨賊熏聞云此中誡犯于四重中略誡前二又于二中偏重淫欲故知刳性之意斯為本歟長水云豈有具諸功德出離之體而從婬殺中得二持大乘戒先持聲聞四棄八棄執身不動後行菩薩清淨律儀執心不起泐潭云小乘戒律身觸為犯大乘戒律起心即犯二持戒利益二一明利益禁戒成就則於世間永無相生相殺之業偷劫不行無相負累亦於世間不還宿債洞洲云相生相殺等如次配于四重亦可無相負累至不還宿債皆由不偷劫也但上句在因下句屬果并前婬殺不行即無三種相續二得神通是清淨人修三摩地父母肉身不須天眼自然觀見十方世界覩佛聞法親奉聖旨得大神通遊十方界宿命清淨得無艱險若論持戒居第二漸次若論得通未必能依次究竟得六通時依戒得四通也文意相連因見十方界故得見佛因見佛故聞法見十方故遊十方界是相連也天眼天耳身如意宿命共有四通後得無生忍是無漏通雖缺他心義能兼攝今文四通乃第二增進之所獲也斷婬殺盜未必即得通葢由修三昧兼持戒之力耳此人能得六通其中四通乃因持戒而得幽溪曰觀見十方即天眼通覩佛聞法即天耳通遊十方界即身如意通宿命清淨即宿命通惟無他心與無漏通以其未破惑故也即中云此論持戒功効究竟因戒能獲四通非必在未破惑前得此通也如第十信云能遊十方所去隨願正與今同豈亦未破惑耶三結是則名為第二增進修行漸次三增進違其現業三一徵云何現業六用不行違現業之始相也十方國土皎然清淨等違現業之中相也即獲無生法忍違現業之後相也文有淺深前二漸次俱是持戒第三增進方該定慧返流旋一六用不行詎非定乎十方皎然等詎非慧乎三釋三一初相阿難如是清淨持禁戒人心無貪婬於外六塵不多流逸因不流逸旋元自歸塵既不行根無所偶返流全一六用不行後之乾慧是其人也前斷食五辛正為助婬旁為助殺次刳其正性亦勸人永斷婬欲故此文承上云心無貪婬也淫根已空非但除男女之欲而眼不奔色耳不奔聲六根皆然總無流逸粗惑已斷細惑未除故云不多四卷中脫黏內伏伏歸元真正是今義長水云元性之中本無根塵夫何為偶根境不生六用不起惟一圓常妙覺明體此同觀音圓通生滅既滅寂滅現前長水此釋最得經旨今文所明正指性離根塵而云返流全一所謂雖得六銷猶未亡一也二中相十方國土皎然清淨譬如琉璃內懸寶月身心快然妙圓平等獲大安隱一切如來密圓淨妙皆現其中此淨極光通達也前因明而失妙則生世界妙明既冥能合如來琉璃譬國土明月喻正報當以六解名身心快然一亡為妙具法為圓身土不二為平等安隱即大涅槃也如來密圓淨妙皆現其中者六用不行己之密也而如來之密亦現其中十方皎然己之淨也而如來之淨亦現其中妙圓可知此文似可配十信六塵清淨在十方國土皎然一句三後相是人即獲無生法忍從是漸修隨所發行安立聖位獲無生忍者一因寂照雙融二因諸佛合體的是初住境界有以細配十信者恐未必然聖位指初住已後之位三結是則名為第三增進修行漸次二別明諸位九一乾慧阿難是善男子欲愛乾枯根境不偶現前殘質不復續生執心虗明純是智慧慧性明圓鎣十方界乾有其慧名乾慧地欲習初乾未與如來法流水接是善男子指第三漸次人也欲愛乾枯者由第二刳其正性故至第三心無貪婬今正指第三文也根境不偶者正指前文塵既不緣根無所偶勿作餘釋夫受生以婬欲為本婬欲既斷則三界生盡而現前止名殘質矣跡此似見思已斷執心虗明者岳師云人法二執了無實性是也即中云根境不偶已入空理又不滯空故執心虗明而純是中道智慧應知中道之觀即智慧也慧性下正與前十方國土皎然清淨是同但未證無生忍耳問未證中道何言慧性答圓人始終莫不以中道正觀觀中道理鎣十方界不其然乎但非真證故在信前乾有其慧者乾即承上欲愛乾枯慧即承純是智慧如來法流水者中道妙理為法流水圓而未妙故稱未接乾慧得名其義有二一者欲愛乾枯二者未與法流相接下文云中中流入是法流之相也二十信第一入真第二照俗第三無俗非真以此為慧即第四以此為定即第五至第六名不退第七與如來氣分交接第八明己佛相對相入第九得佛淨戒第十能遊十方此十信次第也一信心即以此心中中流入圓妙開敷從真妙圓重發真妙妙信常住一切妄想滅盡無餘中道純真名信心住乾慧地中雖修中觀未證十六剎那今即以前之中觀發十六剎那十六心皆見中道故云中中流入中中二字收十六心所見之中相續無間名為流入圓妙者釋明中體顯異但中前圓未稱為妙今十信中十界俱照為圓乃具德之假離縱橫竝別為妙亦是亡相之空也此心一發如蓮華開敷從真妙圓重發真妙正指中中流入或云此真妙真圓不同似妙似圓未必然也下句云中道純真即知上真字之解真即中也如釋籤云無始時來奚甞非真未發心前無真不俗俗即百界千如真即同居一念據籤此文知發心之日無俗不真故後云純真今云從真耳妙圓之後又發真妙故是流入言十六剎那者謂四忍四智四比忍四比智今圓教中以一念為體一念即煩惱之集而煩惱之集即菩提道諦一念是生死之苦而生死之苦即涅槃滅諦雖在一心而法忍法智比忍比智一一開發一一心中咸具三諦無權非實故小乘十六剎那心心皆異圓教十六剎那心心不異所以前名真妙後復名真妙也妙信等者圓妙信心體是常住思量亦有不思量亦有提起亦有不提起亦有能離作輟之病則修性皆常一切妄想應該三惑言中道純真者體兼用冥無空假而非中也而云信心住者明此信即入住功德孤山云此下十信雖與諸經名同而于名下皆結住名故知即是初住分開其說是也葢縱于住前立信而初住百法元是十信所成亦可稱為分開縱謂信心即信而十心才發還是初住方便豈無總別之義今謂初住是總十信是別名初住方便不亦宜乎涅槃云第八人者不名凡夫亦此位也前乾慧人未與如來法流水接今中中流入已接如來法流是入聖位無疑矣問十六剎那經中何不顯說答阿難初果已發剎那今以小望圓但云中中其義可知又小則真真流入圓則中中流入二念心真信明了一切圓通陰處界三不能為礙如是乃至過去未來無數劫中捨身受身一切習氣皆現在前是善男子皆能憶念得無遺忘名念心住真信明了是牒上文十心皆名信故第二心建首即名真信一切圓通是真不礙俗前心即邊而中今信即中而邊陰處界三皆為真信所照故不能為礙乃從真入俗也此位應入修道修道所除正屬習氣圓照三世皆憶無遺即得陀羅尼矣大經十三不可思議文云菩薩摩訶薩于一念頃悉能稱量一切生死即是今意又前心破同體見惑此位應破同體思惑吳興云通指二死為捨身總名五住為習氣詎不信然三精進心妙圓純真真精發化無始習氣通一精明惟以精明進趣真淨名精進心妙圓純真指初信心真精發化指第二信心從真入俗即是發化無始下明精顯無明即明也唯以下明進既無明即明則妄染皆為真淨豈非進乎四慧心心精現前純以智慧名慧心住幽溪曰向全惑成智今無惑唯智此解最確心精指前精進心也五定心執持智明周徧寂湛寂妙常凝名定心住以今之定持前之智所持之智即昏而朗能持之定即散而寂故云周徧寂湛吳興云周徧寂湛謂定之用寂妙常凝謂定之體又定慧不二曰妙六不退心定光發明明性深入惟進無退名不退心前云執持智明則定已有光從此發明是從定慧之體而發明之用也明體從定慧發能深入法相見法諦當知進退之由故惟進無退問此與前進何異答前即惑成智故以精兼進號精進心今定慧均等名從進得與前自殊又前云常凝似乎不進不退故今發明而成不退勝前心也又前以精兼進今是深入之進七護法心心進安然保持不失十方如來氣分交接名護法心初二句牒上文也明從定發故曰心進安然前云無退今云保持不失定慧均等能見佛性故與如來氣分交接幽溪云菩薩為心志存護法若有其心無法可護不得稱為真護法也今氣分交接有法可護成第七心補遺曰恐取六地齊羅漢七地道觀雙流入假化物故與如來氣分交接又保持不失是護十方如來氣分是法既不退則必成如來故氣分交接也八迴向心覺明保持能以妙力迴佛慈光向佛安住猶如雙鏡光明相對其中妙影重重相入名迴向心初句牒上護法心也既有覺明妙不可少明依覺有故曰覺明保持是護又覺在于果即上如來明在于因即前明性深入之明今因心契果故云妙力迴佛慈光則佛對己向佛安住則己對佛苟非妙契心地豈得對佛而喻以雙鏡乎言妙影者因中有果相果中有因相因復現果果復現因故喻兩鏡影復現影重重相入吳興云約十方如來對照亦然故云重重也九戒心心光密迴獲佛常凝無上妙淨安住無為得無遺失名戒心住前定心中云寂妙常凝此是己之所證今獲佛常凝妙淨是佛所得又前以常凝泯己之智今以常凝泯佛之光稱為無上妙淨是亡相之法故號無為以此為戒即道共戒荊公曰前言迴佛慈光淺矣此言心光密迴深矣前言妙影相入淺矣此言獲佛妙淨深矣所言密迴者機括獨連非麤浮可見也安住下明行人所住無遺失則無過咎十願心住戒自在能遊十方所去隨願名願心住初句牒前上文是道共戒亦是定共戒故今云住戒自在如云安住無為得無遺失即自在也見佛聞法利益眾生一一如願如前第二漸次得大神通遊十方界正與今合究竟依戒方得神通吳興曰準天台圓教未斷無明生同居者名為願生正符此文也又說十信出假利益眾生今遊十方亦合其義三十住十一發心住阿難是善男子以真方便發此十心心精發輝十用涉入圓成一心名發心住前乾慧地中云現前殘質不復續生明是己破見思無牽生緣若爾則十信之初豈復破見當為真家方便無疑矣今云以真方便發此十心總牒前十信心也心精發輝是破無明之義前破同體見思今正破無明惑也因發輝故一一互相涉入如帝網珠重重相入即向十心心心各具十心而圓成初住一心是除隔別見也雖離前十心無此住體而前十為別此住為總別為方便總為住體共成發心住焉但觀經文總別宛然初住百界作佛以十心互具為本考法華疏中或以五品在十信前或判五品即十信如云初隨喜品即入信心位分一品為兩心五品即十信心即是六根鐵輪位也五品既有二說十信豈無兩途今判入真位方便有何不可二治地住心中發明如淨琉璃內現精金以前妙心履以成地名治地住初句似承上文喻中琉璃喻心精金喻所發之明也精金是地即以上十用涉入之心履之三修行住心地涉知俱得明了遊履十方得無留礙名修行住心之與地涉入而有相知之義地原是心中所發之明故心地兩俱明了遊履十方者此之心地能徧至十方不拘一處也得無留礙者不為無明色質所礙葢無往而非心地矣幽溪云初住已先名為緣修以未見佛性故登住以來名為真修以見佛性故然初心名發心佛性現前猶未加真修功行也至第二住以前妙心履以成地方以分真始覺照分真本覺至第三住心地涉知俱得明了則始本一合始本俱忘四生貴住行與佛同受佛氣分如中陰身自求父母陰信冥通入如來種名生貴住行與佛同者山河大地皆是妙明真心唯佛為然今心地徧到則行時與佛同既似果佛豈不受彼氣分耶如中下立喻顯法前發心住如投胎一分識心次治地者如中陰所行之地三修行住如投胎必有所往今生貴住如求入胎中投胎時自求父母非父母求子也中陰求父母以業同故自然相引今證與佛同亦自然相引此菩薩能覓如來為父母也陰信等者此住陰信冥密相通即自求之意五方便具足住既遊道胎親奏覺胤如胎已成人相不缺名方便具足住初二句牒前道胎而云遊者如遊心法界之義親奉覺胤者攬佛權實二智凝結聖胎也如胎下正明今住人相不缺當喻具佛五根所謂五眼五耳五鼻等也觀後第七住總承上五六二文云身心合成則此文中必以如來五根為方便明矣如眼能視耳能聞豈非方便乎若以修習無量善根為方便乃權教所說六正心住容貌如佛心相亦同名正心住容貌如佛牒上具足五根心相亦然則意根亦同如來所謂真六根清淨位也自發心來專論心體譬初托胎但以一念心托未有形相第五始明形相至今第六復云心相亦同名正心住正者聖也葢前明托胎之心今明安住身中之心七不退住身心合成日益增長名不退住身心合成牒上五六二住日益增長者至此則五眼五耳及五意等更過于前葢無明分分破佛性分分顯也既有增長定無退失八童真住十身靈相一時具足名童真住玄籤會本引舊譯華嚴云第八地說一切佛現身觀莫捨忍門勸觀常住入無功用心是菩薩現十種身謂于眾生身作己身國土身業報身聲聞身辟支佛身菩薩身佛身智身法身虗空身次國土身作頭亦如是乃至虗空身作頭亦如是熏聞云彼談十身一一具十乃成百身句記云問華嚴十身此但二三身數既少攝義不周是則此經攝義不足答義有通別通義可爾別則不然彼通云身故云十身盧舍那也別釋如來故不應云業報佛國土佛等若欲通收彼經十身應開為四則以化身攝于業報智即報身虗空屬法餘皆化攝孤山復作三身收之謂虗空屬法智報餘應問既屬三四何故十身皆名舍那答以別圓地住所現之身正是實報餘身皆是此身轉變從本受稱故曰舍那又盧舍那者寶梁經翻為淨滿以諸患都盡故稱淨眾德悉圓故云滿十身雖異淨滿是同然于同中須知別相不可三四混而無甄然何以十身釋童真名良以十身舍那翻淨滿義童真無染與淨滿相當矣九法王子住形成出胎親為佛子名法王子住形成二字牒上十身具足又破一分無明身相赫奕顯著名為出胎如來所有大乘家業悉是子有故云親為佛子親為太子則有問安視膳之儀佛子亦然華嚴云此菩薩修習十種觀察之事所謂法王善巧軌度宮殿趣入觀察灌頂力持無畏晏寢乃至法王讚歎故名法王子住十灌頂住表以成人如國大王以諸國事分委太子彼剎利王世子長成陳列灌頂名灌頂住表謂儀表儀表既已成人即弱冠之義補遺云太子出則撫軍入則監國是分委也在法則八相成道五時化物皆所優為既以佛事委之大小逗機頓漸說法為國事四十行十一歡喜行阿難是善男子成佛子已具足無量如來妙德十方隨順名歡喜行上住有十而但云成佛子攝無不盡此結前也長水云有二義故歡喜一具足無量佛德故如觀音云我又獲是圓通修證無上道故又能善獲四不思議無作妙德既云不思議即無量佛德也二眾生受化故歡喜十方者現十界身利眾生也隨順有二一眾生趣類不等根行有異菩薩隨順以形以說此明能化隨順也二眾生隨順一一受化咸皆得益此明所化隨順也能所既皆隨順機應俱生歡喜即中云具德為隨順之本古人以十界解十方其說是也自行化他是如來妙德而云無量者謂現十界身說十界法凡戒善諦緣度二道三法四果一一無缺故能使眾生歡喜二饒益行善能利益一切眾生名饒益行以歡喜故生第二饒益之行得四悉益名為利益言善能者謂是四教四門門門四悉而皆順入圓教幽溪曰前十住位明法王子自覺已圓十行去明導利羣生也或問曰據天台所明三觀從名字來修從假入空觀至七信位破見思惑為自利行從八信去修從空出假觀破塵沙惑為利他行從十信去修中道觀破無明惑登初住去名自利利人覺行圓滿行今楞嚴所明地位至十行位方饒益眾生為出假行何也答曰三觀破惑以分自覺覺他乃一往之說此是次第之義非究竟之談何者圓頓行人三觀一心中修三惑一心中破三覺一心中顯何有如此次第如五品初心隨喜讀誦雖是自利中心說法後心兼行正行兩種六度豈非利他覺人乎雖然圓頓教中不無次第如曰理須頓悟乘悟併銷則圓修圓悟之道彰事非頓除因次第盡則漸修漸破之義顯非漸無以階頓非頓無以融漸二者兼盡而圓頓之道始備然而有觀行之次第焉五品是也有相似之次第焉七信以還破見思惑以證空理八九信破塵沙惑以證俗理十信破無明惑入初住位證中理是也有分真之次第焉十住位破十品無明住真諦理十行位破二十品無明出俗諦理十向破三十品無明更修四種妙圓加行登十地位證中道理是也有究竟之次第焉等覺菩薩證真理已更住千劫倒修凡夫之行破斷微細塵沙緣影一切法門無所不盡更破一品根本微細無明入于如來妙莊嚴海圓滿菩提歸無所得方為究竟今是分真中不次中之次序論初住菩薩便能百界作佛導利羣生豈止十行方利益眾生耶成佛子已具足無量如來妙德結上灌頂住之功德也十方隨順正明歡喜行之相也即以是德一切眾生咸受利益名饒益行三無嗔恨行自覺覺他得無違拒名無嗔恨行幽溪以歡喜行為自覺饒益行為覺他其說是也然自覺者無明未必不違其智覺他者有情未必不拒其化此理之常今不拒不違則無嗔恨四無盡行種類出生窮未來際三世平等十方通達名無盡行種類即四教四門門門四悉也皆從法界出生法界不窮則出生亦不窮以皆歸佛道為平等又達性具之體而出生諸法從性起修故曰種類如摩尼珠雨寶不窮苟非全性起修豈能窮未來際乎三世只一性體故平等十方只一性體故通達以此度生名無盡行五離癡亂行一切合同種種法門得差誤名離癡亂行此似承上文來上種類不同一一出生無非平等之道故即云三世平等今承上故云一切合同孤山云異名別說同歸一理是也既歸一理即無差誤皆破無明則不癡同歸一法則不亂六善現行則于同中顯現羣異一一異相各各見同名善現行則于下亦承上文既應十界機說十界法豈無異乎而于同中顯現葢理不礙事也次句一一等者所謂一一不失一一同趣也索隱云一真如心具足萬行而行行互顯一心如金作器而器器皆金是于同中顯現羣異一一異相各各見同也或以前之六行配前六度恐成別義故不應爾七無著行如是乃至十方虗空滿足微塵一一塵中現十方界現塵現界不相留礙名無著行如是下亦承上文言不但同異互融擴而充之則小大相容一多無礙十方虗空滿足微塵者或引華嚴云華藏世界所有塵一一塵中現法界也不相留礙者界入塵而界不小是小不礙大塵含界而界不大是大不礙小若有一毫執著安能大小相容耶又雖含十方界而塵相不失是現塵雖止在一塵而現十方界是現界上大不礙小下小不礙大八尊重行種種現前咸是第一波羅蜜多名尊重行種種現前者總承上歡喜以來諸行方便位中十行從真入俗覆疎倒入即不名第一波羅蜜今之圓位十行化物無非一為無量無量為一乃至現塵現界事事無礙皆是圓融三德般若之所發現若近承第七如長水云云九善法行如是圓融能成十方諸佛軌則名善法行十方諸佛八相成道五時說法皆用如上圓融之力八相五時是軌則也佛出淨土雖無五時然即頓而漸即漸而頓亦是軌則故名善法十真實行一一皆是清淨無漏一真無為性本然故名真實行第十結上九行十行圓融即一不離十十不離一故最後結云一一皆是等也權教十行但破塵沙今皆破無明故曰清淨無漏謂攝三諦十界無漏失也雖度眾生皆一中道無生滅體雖涉事用莫非性具故曰本然名真實者結上悉名真實也五十迴向十一救護一切眾生離眾生相迴向阿難是善男子滿足神通成佛事已純潔精真遠諸留患當度眾生滅除度相迴無為心向涅槃路名救護一切眾生離眾生相迴向菩薩十信具足便成佛子今十住又滿足即云成佛事也依體起用故曰神通純潔精真者純潔結上清淨無漏精真結上一真無為留患已遠即行成就也當度眾生下明迴向正義若但以性相二空而除度相與通教偏空何異當者正也正度眾生而滅度相是即有而空雖似同通教然通教能通妙所通粗能通妙故與圓何異所通粗故惟入偏空今當度無度相葢能通妙而所通亦妙也迴無為心向涅槃路者遠離空假二邊之為作是曰無為還趣空有俱非涅槃之路前第十行云一真無為已有無為心矣今迴轉此心以向大涅槃路是迴因向果佛地中菩提為果涅槃為果果今迴向心直向果果二不壞迴向壞其可壞遠離諸離名不壞迴向前滅除度相則壞其可壞此壞亦離名遠離諸離離壞即證不壞成第二迴向也三等一切佛迴向本覺湛然覺齊佛覺名等一切佛迴向前初發心住云心精發輝二治地住云以前妙心履以成地三住即云心地涉知俱得明了今第三第四第五迴向與前相似次第亦同然前就菩薩說雖有行與佛同之語猶未全同今迴向中大似于佛故與前異云本覺者前得不壞迴向所謂得無所離即除諸幻故承上云本覺湛然湛然即本覺之體澄渟不動佛亦止證此本覺而已故己覺齊佛覺也四至一切處迴向精真發明地如佛地名至一切處迴向四至一切處者前治地中云心中發明明喻精金之地今第四迴向中亦以明為地既覺如佛覺則地如佛地如來實相之地徧周法界故二卷云色身外洎山河大地咸是妙明真心中物據此則知佛實相地徧一切處而菩薩之地與佛無殊若前治地之地非必至一切處也故前第四住但行與佛同謂行時如佛而地未如佛今則如佛地矣五無盡功德藏迴向世界如來互相涉入得無罣礙名無盡功德藏迴向世界如來互相涉入者染淨依正悉皆不二乃至毫端現界塵中轉法故云無盡功德藏也天如補註曰準吳興解則世界即染如來即淨也六隨順平等善根迴向於同佛地地中各各生清淨因依因發揮取涅槃道名隨順平等善根迴向第六迴向亦從第四文來但前五迴向皆取所證之理迴因向果今此位方明所修之行前十行是從住所生功德今之功德乃從同佛地中所生以地有能生之義也各各之言所該最廣從佛地生是清淨因既從佛地則因當依發揮從依因來是修習之義耳清淨之因能取涅槃之道孤山曰行從理起名隨順平等能生道果名為善根七隨順等觀一切眾生迴向真根既成十方眾生皆我本性性圓成就不失眾生名隨順等觀一切眾生迴向前云隨順平等善根故今牒云真根真根即清淨因也恐謂惟生淨因不及染法故今云眾生皆我本性則染淨不二明矣桐洲云十方眾生皆我本性非有眾生也性圓成就不失眾生非無眾生也六七二向咸明生法俱從第四迴向發來隨順者謂能順理從真根得自他無殊是等觀也八真如相迴向即一切法離一切相惟即與離二無所著名真如相迴向前云不失眾生是即一切法眾生皆本性是離一切相然真如之體畢竟非即非離二無所著孤山曰即一切法假也離一切相空也二無所著中也據此則三諦皆名真如也九無縛解脫迴向真得所如十方無礙名無縛解脫迴向真是理體云得所如者當指十界依正皆即真理故云所知然真得所如之言牒上文也如是則十方依正有何礙乎前三諦約體今十方約用葢指起用時十方皆無礙耳十法界無量迴向性德圓成法界量滅名法界無量迴向十住證理十行涉事今十迴向為迴因向果瓔珞經云迴者迴易轉變初位救護眾生離眾生相迴向即迴易轉變也既離眾生相得無所離即第二不壞迴向此二豈非迴因向果乎第三云等一切佛者證不壞體即是本覺而此本覺齊于佛覺名等一切佛迴向本覺之體履以成地第四即云地如佛地名至一切處迴向佛地徧到第五即云世界如來互相涉入名無盡功德藏迴向回者回互上三位多是己心與佛交互亦回因向果之義也前五迴向多論證體第六起行乃云於同佛地地中各各生清淨因各各之言所該廣矣第七云十方眾生皆我本性合前五向是心佛眾生三無差別皆交互之義也第八三諦無著第九十方無礙亦約理事以論回互上九大意多明三無差別因果自他依正無殊則本性之德圓滿成就既事理迴互融成一體彼此限量皆忘亦不必言己心佛心己地佛地乃為第十法界無量迴向矣六四加行二一總標阿難是善男子盡是清淨四十一心次成四種妙圓加行擕李曰據瓔珞等經皆不別列四加行位若惟識等論則以地前四十心為外凡資粮位十迴向後則明暖等為內凡加行位吳興曰今四加行正如惟識所說也而彼于地前分內外凡位者乃別教一途之義以登地是菩薩聖位聖位難入故開此加行耳問今經圓教何用別義乎答借別名圓斯有其例如仁王云三賢十聖住果報是也敏師謂此經未必純圓應兼別義其失甚哉二別列四一煖位即以佛覺用為己心若出未出猶如讚火欲然其木名為煖地前十迴向皆是迴因向果而因不即果今加行中乃以佛覺為己心天如曰前之佛覺雖曰能齊未能正證今將趣聖果故即用佛覺為己因心其說是也言佛覺者如雜華云心佛眾生三無差別法華中百界千如即空假中正是其義問前經云本覺湛然覺齊佛覺而以得無所離即除諸幻釋之則佛覺似但精真之體今何作此釋耶答前文明覺齊佛覺地如佛地後即云世界如來互相涉入至第七迴向云十方眾生皆我本性豈非心佛眾生三無差別耶又豈非十界依正在一心中耶第八三諦無著第九十方無礙第十結云性德圓成皆深明十界一心即空假中之旨此等皆是佛覺與法華十如無異雖不明言三千而三千在其中矣但猶是所向之佛覺今以此覺用為己心是入地方便也若出者謂佛覺欲從心出而猶未出喻如鑽火欲然先有煖相火喻初地之智木喻所破無明鑽喻加行煖喻初地聖火前相亦得以火喻佛覺木喻己心二頂位又以己心成佛所履若依非依如登高山身入虗空下有微礙名為頂地此義三現前初住云心精發輝二住即云以前妙心履以成地第三迴向云覺齊佛覺第四迴向即云地如佛地當知地亦是所履也此加行中前煖地云即以佛覺用為己心覺亦是地故今即云又以己心成佛所履夫佛覺為佛所履以在己心中故己心亦成所履舊解云佛者即自心中所達果人之智自覺齊佛覺地如佛地以來佛智洞然久矣若依者佛智還依己心之地也非依者佛超己心之外也心相將盡故若依非依此唯登高山可以喻之身入虗空以喻非依下有微礙以喻若依良由己心未盡故有微礙也三忍位心佛二同善得中道如忍事人非懷非出名為忍地己心與佛雖未合一其體不隔故曰二同須知雖至此地己心猶未盡也中道者是佛所證善得者勝前以佛覺為己心之時故云善得如忍下喻也忍事者如喜怒不形非懷非出者究竟當出而未出也時似欲吐名非懷藏之于心故非出正喻善得之狀四世第一位數量銷滅迷覺中道二無所目名世第一地此承上忍地來心佛或二數也同異量也今皆消滅則迷中道與覺中道二無所目至此情見俱忘雖非真證中道已為世間第一流矣七十地十一歡喜地阿難是善男子於大菩提善得通達覺通如來盡佛境界名歡喜地十地中前之五地皆屬覺體初地云覺通如來後之四地皆承其義後之五地皆論真如真離生滅故以涅槃結之應知覺體離妄即名真如非有二義又菩提名大涅槃名海者以是如來二轉依號故也三智一心中得名大菩提此如來寂滅道場所得今入初地善能了達前文云三有眾生及出世間聲聞緣覺不能測佛無上菩提至初住後始能得之猶未名善今始名善孤山曰覺通如來智同佛智也今謂既至無疑之地則覺體通于如來何必以智釋覺乎如前所云惟妙覺明圓照法界初地已得此境界猶是菩薩故云通如來耳言佛境界者所謂一念三千即空假中正是其旨故法華經云惟佛與佛乃能究盡諸法實相今云盡佛境界豈非一念中能窮百界千如之旨乎舍此而談佛境界大槩皆菩薩境界耳名歡喜者既通極果自生法喜故得此名二離垢地異性入同同性亦滅名離垢地本經所云同異如前云世界為異虗空為同後識陰文云于十方界已獲其同今何必不用此義由前云覺通如來故今明世界之異入于虗空之同并空亦滅惟歸覺體所謂一人發真歸元十方虗空悉銷殞也夫覺體有垢良由空界未除已離空界則離垢矣三發光地淨極明生名發光地離垢則淨故承上文而云淨極言明生者覺體之明也前云晦昧為空空晦暗中結暗為色今覺體既離空界明豈不生以覺有妙明之德覺不淨則明不生也明既云生必是般若智光所謂諸法不生而般若生非歟四𦦨慧地明極覺滿名𦦨慧地明極之言躡上發光光明既極覺無所隱故云覺滿三四地名俱從明得然三地承覺有明四地明還顯覺名𦦨慧者從喻得名最後燒無明惑也五難勝地一切同異所不能至名難勝地上云明極覺滿覺體畢竟離同異故復云同異不能至也不但空界泯亡并無同異之有為法咸滅前文云同異發明因此復立無同無異據此知無同異亦同異所攝也如是則世界眾生虗空三種相續咸皆遠離此菩薩最是超出豈可勝乎幽溪云前雖離同異猶有異同緣影者在至發光𦦨慧之後同異緣影悉皆銷滅故一切所不能立六現前地無為真如性淨明露名現前地三種相續既離則非有為故曰無為言真如者覺體離染轉名真如所以云性淨明露也如是則真如現前矣七遠行地盡真如際名遠行地前位真如雖露或有未盡更加功以盡之逈超極造名為遠行此兼前後四位咸從真如得稱吳興曰盡真如際者斯是無際之際理既無際行豈近乎八不動地一真如心名不動地前窮盡真如之際尚有功用今只一真如心更無功用所以名不動也九善慧地二一正明發真如用名善慧地前三位得真如之體此位發真如用資中曰華嚴名此菩薩具四無礙智作大法師演說無量阿僧祇句義無有窮盡故云發真如用即中云真如即法身用屬解脫以善慧為用又屬般若三德備矣此經所明十地皆證入精真之體較之地前語意不同有以檀度等名配諸地恐兼別之說不合今經也二結顯阿難是諸菩薩從此已往修習畢功功德圓滿亦目此地名修習位已往者此去也此去不須修習則修習之功至九地而畢十地悲智兼圓故曰功德圓滿即目九地為修習之位焉應知十地乃菩薩習果也幽溪云古疑既無修習安有斷障然修習與斷障之義一往則相齊再往則九地前有即修習即斷障之義十地去惟斷障而無修習葢悲智功終唯在利人而利人未及如來亦名微細無明障也十法雲地慈陰妙雲覆涅槃海名法雲地欲以菩提涅槃之樂而與眾生是名慈陰不加功行而澤周法界喻為妙雲覆者藏也涅槃海即具三德葢雲有形質陰庇形質喻身輪陰庇喻意輪雲有聲喻口輪菩薩現此三輪廣度眾生已證三德涅槃而尚未入有覆藏之義故涅槃稱祕密藏名法雲地結三智三德為法慈陰名雲前初地云得大菩提今十地云覆涅槃海聖位垂終將入果果二轉依號具矣八等覺二一正明等覺如來逆流如是菩薩順行而至覺際入交名為等覺入流已來有進無出若在如來從真複俗出同萬物是逆流也菩薩順聖位之流而入一出一入覺際恰好相交俱到此地名為等覺謂如來初出之處菩薩方入之地二際相交如一人出門一人入門俱在一門之中豈不等耶又須知如來已入還出初出之處菩薩亦到非謂已到究竟之地二金剛後心阿難從乾慧心至等覺已是覺始獲金剛心中初乾慧地金剛心者即是等覺華嚴十地品後十定品中云普賢菩薩以金剛慧普入法界彼之文義正屬等覺彼此咸有金剛慧名則屬等覺可知也以能破最後無明喻如金剛故得此名詳夫是覺與信前乾慧名同義異前是欲愛初乾乾有其慧名乾慧地今是無明初乾乾有其慧名乾慧地豈可同年語耶或引發心畢竟二不別以釋此文恐未必然此位諸師或合入等覺或另立一位溫陵謂于等覺後心別開此位誠亦有義以證十地後更破一品無明方入等覺等覺後心又破一品無明方入妙覺則等覺後無明初破未入法流亦名乾慧今正指此時得乾慧地名也但宜合入等覺不可云更有一位吳興辨之天如評之其說詳矣有謂等覺入重玄門倒修凡夫事重歷前之乾慧是重歷信前乾慧而不以無明初乾為義俟再攷之九妙覺位如是重重單複十二方盡妙覺成無上道結上諸位并明妙覺重重單複十二者如後文云六十聖位即有五重十二故曰重重言單複者秪是雙隻亦是奇偶如初番為奇次番為偶三番為奇四番為偶至第五重又為偶也前之妄見既各具十二類生今翻此妄亦名十二葢以妙覺一位足前菩薩位而成六十之數斯具重重單複十二焉然但數妙覺不名妙覺所證者以前問云何名為乾慧之地四十四心至何漸次得修行目詣何方所名入地中云何名為等覺菩薩今已具答問既但至等覺答亦至等覺而止復數妙覺以終前之位焉即中云十二者一乾二信三住四行五向六煖七頂八忍九世第一十地十一等覺十二妙覺此十二中有單有複乾慧等妙只有一位是單信位行加行地是複隨人用之恐不如前說為妥三總結諸位三一以止觀結是種種地皆以金剛觀察如幻十種深喻奢摩他中用諸如來毗婆舍那清淨修證漸次深入金剛是能觀十種喻是所觀長水云於一一地皆用金剛如幻三昧觀察諸法據此則金剛及十種深喻皆屬觀照金剛喻能破之智如幻喻所破之法也奢摩他是止毗婆舍那是觀于止發觀則無謬矣止能伏結觀能斷惑成清淨修證漸次者位不躐等也深入者直階妙覺也問十種深喻云何觀察或即喻而觀乎為合法而觀乎答觀經大意正須約法約法修觀有通有別通則直觀諸法悉如幻𦦨水月空華似有實無了無所得則分別之心自止別則各有配屬應觀一切業如幻一切法如𦦨一切性如水中月妙色如空中華妙音如谷中響諸佛國土如乾闥婆城一切佛事如夢佛身如影報身如像法身如化何則不可取捨畢竟空故若以喻為法亦有理焉葢凡所分別皆因著相著相之病在于謂實若對鏡觀像及觀水中月時謂實之心自無著相之心亦息是以正對鏡而分別義疎過去則了罔陳習未對而心無預緣如是了知三際本平等雖有心念如虗空此可與觀象得意者言難與散心粗浮者說也二以漸次結阿難如是皆以三增進故善能成就五十五位真菩提路如上所明地位雖深推厥所由皆由三種漸次故知從戒生定從定生慧戒定前茅斷不可缺根境不偶修行要門吳興曰三增進者即漸次也前三文下皆結示云是名增進修行漸次又云從是漸修隨所發行安立聖位或指金剛奢摩毗婆為三者非也五十五位者除前乾慧由信至等覺是也問何故舍乾慧而又不取妙覺耶答既言真菩提路則顯乾慧非真妙覺非路今謂吳興所解至當然善能成就之言意該乾慧凡求佛者不患不得菩提但患不得其路故特言之況前阿難所請實至等覺而止三以邪正結作是觀者名為正觀若他觀者名為邪觀長水云行人若能依此修證不斷而斷無到而到此則名為真修行者故云正觀若言都無地位但尚理是斯同邪見撥無因果故名邪見仁王經中亦此料簡說地位竟即云若言越此而成佛者是魔所說吳興云五十五位既由三增進故而得成就今簡邪正所以約觀言之須知圓教之外三乘所修皆屬邪觀愚謂如上六十聖位皆觀法也二結顯經名此科從初正觀總無明心以明修證中來正觀中兩大章一正明修證二結顯經名已上約解行證法委明一期修證已竟理當結名以便流通此結名中宛是五重玄義略無增減則知此經不惟起盡觀道懸符止觀即所結名義冥契一家東土釋迦於茲益信具如釋題中明今為二一問爾時文殊師利法王子在大眾中即從座起頂禮佛足而白佛言當何名是經我及眾生云何奉持孤山曰此經發起為救阿難是故先開圓解次顯圓行行成入位極乎妙覺垂範後世有始有卒於是文殊請問經名及奉持法奉持即流通也次答五一定經體佛告文殊師利是經名大佛頂悉怛多般囉怛無上寶印十方如來清淨海眼法華中文殊偈文大師以證名體宗用釋四伏疑今經五名亦應該五重玄義第一名是定經體大佛頂雖是呪名亦是經名如來藏心遍一切處為大佛尊而頂更為超出羣有無相可得非經體乎然大即法身佛即般若頂即解脫此三字如次可配體宗用三章但約性恒開對修須合今對下文如來密因是宗救護親因是用獨名為體葢體兼用冥一切無相稱大佛頂合三離九不其然乎然今名二十一字首三字今題所存餘十八字皆隱則十八字不出大佛頂之義明矣悉怛多等亦是密名而通於顯性本無染覆含法界名大白傘葢小乘經以無常無我為前印涅槃寂滅為後印印是佛說今則三如來藏為無上寶印印定諸法法法全真又如來以此而照窮法界無一相可得名清淨海眼正如妙玄取佛所見為實相正體也二定經力用亦名救護親因度脫阿難及此會中性比丘尼得菩提心入徧知海夫歷劫親因以愛相纏今能斷愛與無明父母別是真救護度脫下舉二人以例餘也則親因為總標二人為別顯矣阿難為親摩登為因得菩提心等者此經斷愛窮見相之本推至山河忽生之故故佛果菩提可證照徹三界正徧知海從茲入矣則此經以斷愛顯真為用也得菩提心亦可名宗入徧知海亦可名體對餘二章今但屬用幽溪云文殊提獎名為救護佛示三如來藏名為度脫如是則顯密咸該而經題全隱此名也又救護親因從上傘葢得名得菩提心從佛頂來因也入徧知海從清淨海眼來果也三定經宗亦名如來密因修證了義圓修三止三觀是密因也阿難首請妙奢摩他三摩禪那乃十方如來得成菩提之法正是密因如來說三如來藏以酬其請權乘不識故稱為密或解為疎密之密一觀為疎三觀為密未必然也如涅槃中明如來初說無常次說常住以無常隱常故常住為祕密藏樂我淨等無不咸然今經以不生不滅為本修因雖用別教正顯圓常豈非密乎依此而修為了義之修如二十五圓通中獨選耳根是也依此而證為了義之證如六十聖位是也然此經開解起行俱帶方便明證惟圓以阿難初請三觀有最初方便之言故解行帶權殊費揀選後明地位是旨歸之處其義純圓而帶別明圓亦所以引別教也則經宗在一乘明矣據密因有三止觀亦可分配三章對餘二事此惟屬宗是開合之義餘具如釋題中解四定經教相亦名大方廣妙蓮華王十方佛母陀羅尼呪大方廣之言似同華嚴然但義同而已約時而論不可判屬華嚴正可冠于妙蓮華之上耳然方等時經題中多有此名吳興曰大方廣所說之法也大方是體廣是其用即空如來藏具不空之用也又常遍曰大軌持曰方包富曰廣如次配法身般若解脫亦如來藏之三德也即中云三字可配體宗用三三者合則可論教相矣妙蓮華王名同法華今經自四卷來最多開顯之言如各說圓通後佛云此等修行實無優劣豈非各賜大車與法華無異耶指權即實是蓮華喻中意於權實法一切自在故稱王也云十方佛母陀羅尼呪者乃是呪名如方等陀羅尼經云此陀羅尼呪乃可為父乃可為母又云諸佛道皆從此生是佛父母今題正與彼同又應屬方等矣總判此經必是方等被開成醍醐為教相也然一經成二味者開顯之後前四時教皆入醍醐今經亦然又楞嚴與餘經不同餘經各有當機懷疑叩佛佛為除疑結經者據一時問答記集成經足明利益餘人續聞法華悟解轉深得益在心非阿難能記今經當機即是阿難是結經人親為侍者常得咨疑佛獨為阿難親弟說此楞嚴歷二十餘年但成一部據經中說密同法華據法華意以法華開方等如前歎德之文是也但開楞嚴餘可例知亦由密同之故方得顯同問既開權顯實亦開迹顯本否答經初云佛子住持善超諸有能於國土成就威儀此明阿難大眾已住首楞嚴三昧不起滅定現諸威儀即是開迹顯本阿難侍佛日久能集諸經苟不露開權開迹之意何以為後人之式耶此名題中全隱五別定經名亦名灌頂章句諸菩薩萬行首楞嚴汝當奉持此名共十二字灌頂章句四字今題則隱餘八字則存灌頂章句者中天竺國大乘秘典有五部東方金剛部阿閦佛以為部主南方寶生部寶生佛以為部主西方蓮華部無量壽佛以為部主北方羯磨部不空成就佛以為部主中央灌頂部毗盧遮那佛以為部主吳興曰此經從灌頂部中流出葢約密言名灌頂章句有誦持者則如來智水灌其心頂亦如剎利之受職也菩薩由此受佛職位故諸菩薩萬行首楞嚴當是經名然上句從密呪立稱而密與顯等此句從經得名而顯與密等菩薩萬行不出三觀三觀一心萬行具矣涅槃云首楞者一切事竟嚴者堅固一切究竟而得堅固名首楞嚴今經三卷中明性水性火等豈非一切事竟又云妙覺明心先非水火豈非堅固葢今經之宗雖具眾因果而意在以因該果所以最後一名獨標菩薩如阿難所請在最初方便如來徵問圓通亦云最初從何方便入三摩地經末亦云并初發心大力鬼神皆大歡喜故知意重于因又此名在釋題中判屬于用但是宗家之用非用家之用而萬行之言可攝用家之用故以配用茲五名中救護親因別當力用今不須配用而以為經名之要不亦宜乎如一卷云有三摩提名大佛頂首楞嚴王又云首楞嚴王世希有其為別顯經名無疑矣問五題皆是經名何獨以此屬名答五名既多稱者不能盡舉名中之要莫過于此如今世人名此經為楞嚴亦聖旨也如上所說五重既備足堪受持遂結云汝當奉持五重次第者經體既要故居其首有體則有用用居其次依經修行有因果之宗故居其三三章既備須定教相五者既俱能該別文則五重玄義皆總名也二約別能招報心以明修證一經正宗為兩大章初正觀總無明心以明修證次約別能招報心以明修證葢眾生一念不覺即為障理無明此是根本名惑障而不牽生三有所謂總無明心是也故凡行人修證急須破顯此本以開一念三千三如來藏而直還本覺既近復要如根如穴根本既去枝末自消如上七卷半經文明破明顯論修論證已竟其如眾生既迷之後日趨日下如江湖之趨直至尾閭因根本無明而即分成六種和合所謂五識五意識受想行三心此等諸心或貪或嗔或詐或諂與外塵相應以架造無邊巨業業即招報受七趣苦果是為枝末牽生能招報心也且眾生過現習成習久自然時時發現故雖觀根本或有證入或不相宜如輔行云初觀總無明心未必是宜即當仍用前觀歷餘一心或貪心嗔心慢心更例餘陰入用十乘四運而推破開顯之但能招報心有二種一是現行能招報即止觀揀境內於第六中取能招報及破法遍中歷例餘心或貪或嗔等心輔行云過現習生是也二是發得能招報因正觀總無明心以發起多生宿習障定牽生即止觀內所列煩惱病業九境輔行云因觀發習是也今如來既因當機之請以普示正觀總無明心竟惟恐眾生機宜不同根器中下正觀難入則滯於二種能招報內仍入生死輪迴故一一詳示不令住著分二章一示現行能招報心即十習因招七趣報是二詳發得能招報心即五十種禪那現境是今經貪習詐習等十心即止觀輔行中貪心嗔心等委如大綱中明但止觀唯明能招報之因心而如來復詳所招報之苦果尤為章明較著也經中顯然至文點示至於明示兩種能招報心已而不明破顯解行證法者現行能招報例上可知如止觀歷例餘心俱即三觀亦即三諦也發得能招報因修觀發習不知是過一生住著即入輪迴既已示明不生住著自然流入薩婆若海歸無所得矣然而總科亦名約別能招報以明修證者倘一住著例得為觀即四種三昧內隨自意三昧縱任三性於中覺察及依經行法也初為二一請問二開示初又二一經家敘悟說是語已即時阿難及諸大眾得蒙如來開示密印般怛囉義兼聞此經了義名目頓悟禪那修進聖位增上妙理心慮虗凝斷除三界修心六品微細煩惱前定經名共有五重玄義顯密相織今敘聞名得益故云說是語已及諸大眾等開示密印者自建壇聞呪已來雖知呪力未聞呪是實相之印今始聞之亦初聞境智相如是呪之義似專指初名也此經了義等即顯說之名也頓悟禪那者禪那此云靜慮乃止觀一心之道奢摩他三摩在一心中即是其義如云奢摩他中用諸如來毗婆舍那是也良由阿難大眾本是圓機故能頓悟中道耳阿難已入初果茲入修道故云修進聖位妙理指所證之理二果所證之理較初果為增上也心慮等者虗謂惑空凝是凝寂乃能證之心增上妙理是慧心慮虗凝是定正合禪那靜慮之義縱在小乘欲入聖位必由定慧今悟中道與偏小不同正定慧均等之時也小乘定慧秪名為定偏教定慧秪名為慧若入圓乘始能均耳斷除等者阿難亦是超斷之人如小乘所明證初果後更歷六番生死方斷欲界前六品惑今此頓斷即超義也云微細者思惑比見為細而阿難是大乘二果之人更斷所知惑破無明豈可測乎據其示迹且在思惑二起禮陳疑二一起禮述益即從座起頂禮佛足合掌恭敬而白佛言大威德世尊慈音無遮善開眾生微細沉惑令我今日身心快然得大饒益長水曰修道所斷行相難了故云微細無始俱生故曰沉惑疑網消除故身心快然增進聖位故曰饒益考俱生煩惱其數甚多今但依小乘則三界四諦下八十八使名分別粗惑貪瞋癡慢是俱生細惑又見思是枝末無明今以根本無明名為沉惑二對佛陳疑二一雙問能所世尊若此妙明真淨妙心本來遍圓如是乃至大地草木蝡動含靈本元真如即是如來成佛真體佛體真實云何復有地獄餓鬼畜生修羅人天等道世尊此道為復本來自有為是眾生妄習生起初問六道是所招苦報為是下即問能招報心此聲聞法中見苦果而問習因從粗及細之意也故科名雙問能所向下如來開示趣趣皆結云由妄想業之所招引亦能所雙答明文宛在真心具五種功德所謂妙圓真淨明也如卷初說今先言其四妙字疊見以三諦本離縱橫故云妙明真淨而此妙德在一心中故稱妙心次句方云徧圓徧至無情有情圓謂圓具如是乃至正言一切即是真體佛體下方明問意此問與富那問似同而異前問山河忽生是問所以生起之故謂清淨本然中何故生諸依正法也今問佛體真寔云何復有諸趣苦果為是性本有耶為是眾生由五識五意識受想行諸心與外相應搆業而生起耶此正能所雙疑而重在所招報果如來之答則廣詳能招報因謂一切眾生寔本真淨因彼妄見遂成十種能招苦報之因由有妄因生起七趣之果則今問意正在能招所招因果來由真淨之說却是帶起之傍也故與前不同然此文所以詳明七趣者他經以四生六道括盡羣生今經廣四生為十二類生亦應廣六道為七趣也二別問所招前雖能所雙問而疑在所招苦報故別問之是阿難重在所招七趣而如來詳在能招十習明矣世尊如寶蓮香比丘尼持菩薩戒私行婬欲妄言行婬非殺非偷無有業報發是語已先於女根生大猛火後於節節猛火燒然墮無間獄琉璃大王善星比丘琉璃為誅瞿曇族姓善星妄說一切法空生身陷入阿鼻地獄此諸地獄為有定處為復自然彼彼發業各各私受惟垂大慈發開童蒙令諸一切持戒眾生聞決定義歡喜頂戴謹潔無犯私行婬是行壞妄言等是見壞意謂殺盜有對邪婬無對故云無報為復自然者別業別報不假他力故云自然吳興云問意有二謂別業同報別業別報初問婬殺妄三即別業也為有定處即同報也為復自然下次問別業別報據下答意皆是別業同報耳文云循造惡業雖則自招眾同分中兼有元地乃至云不斷三業各各有私因各各私眾私同分非無定處惟垂下請答長水曰幼小曰童情昧曰蒙阿難自鄙無有大智願垂開發也若聞因果虗妄猶如空華則持戒何益苟聞決定義門必令謹潔無犯桐洲云善惡因果雖皆虗妄受報好醜終不差忒又云一念幻惡長劫沉淪一念幻善遠階佛果即中云此即決定之義辨地獄受報之事使知決定不持戒者聞則恐懼持戒眾生聞則歡喜此阿難正在所招報苦也二開示二一讚許佛告阿難快哉此問令諸眾生不入邪見汝今諦聽當為汝說地獄固由邪見而入乃至天仙修羅亦是修行岐徑即屬邪見如圓通疏說二正示二初約總別雙答能所二結示勸斷初又二一總示能招所招因果二別詳能招所招因果初又二一能招報因二一約迷真雙標阿難一切眾生寔本真淨因彼妄見有妄習生因此分開內分外分長水云諸法本真未嘗生起由念分別見諸法生苟能離念即見眾生山河國土本來成佛故云實本真淨由念分別見諸法生即妄見也前問云為是眾生妄習生起故佛云有妄習生妄習即輔行所謂過現習生五識五意識受想行心與外相應而成能招七趣之業因一切眾生實本真淨則阿難所問本元真如即是成佛真體其言不謬然真淨之言獨舉空中淨即空真即中也下內外分應屬俗諦阿難止問妄習今明妄習之先已有妄見此正指一念不覺而有動之總無明心為根本惑由此妄本生起十習彼此相應以搆業乃現行能招報之牽生枝末所謂境界為緣長六粗是也二約內外別示二一內分阿難內分即是眾生分內因諸愛染發起妄情情積不休能生愛水是故眾生心憶珍羞口中水出心憶前人或憐或恨目中淚盈貪求財寶心發愛涎舉體光潤心著行婬男女二根自然流液阿難諸愛雖別流結是同潤濕不升自然從墜此名內分前以內外而分兩分故云內分外分今釋云內分是本分之內謂不能超越于常情之外也交光云貪戀本趣名為分內非本趣者即稱分外愛為情欲之本故先舉愛珍羞財寶有種種可愛名諸愛染妄情即憐恨喜怒等也或云無可著而生著故名妄情憶著貪求名情情積不休口中水出即生愛水也問從情積而生水何生水之難乎答如人情輕安肯下淚必情重方淚然但觀口中水出則其人情積久矣心憶珍羞豈非因愛染而起妄情乎口中水出豈非情積而生愛水乎貪求財寶應是有財之人故舉體光潤流結是同者流則向下結則重滯如土得水則結而不散也二外分阿難外分即是眾生分外因諸渴仰發明虗想想積不休能生勝氣是故眾生心持禁戒舉身輕清心持呪印顧盻雄毅心欲生天夢想飛舉心存佛國聖境冥現事善知識自輕身命阿難諸想雖別輕舉是同飛動不沉自然超越此名外分以超越為外分持戒生天等非止一事名諸渴仰虗想謂清虗之想即指持戒持呪之心想積不休亦是習也如持禁戒非指暫時必歷歲月之久方名為持勝氣者超勝之氣氣必向上與水之潤下相反然上之妄情亦心今之虗想亦心三界無別法惟是一心作成此經惟心之旨是故下舉善法以騐能生勝氣之相心持禁戒豈非因渴仰而發明清虗之想乎舉身輕清豈非想積不休而生勝氣乎呪印者如今經無上寶印亦呪名也毅者雄猛之相熏聞云如銷伏毒害呪是三世諸佛陀羅尼印若呪龍等惡律儀事非其義也聖境冥現葢于想中冥默得見諸佛淨土或于夢中潛通此相想既飛動不沉眾生自然超越此約不墮三塗名超勝也二所招報果二一牒二習因阿難一切世間生死相續生從順習死從變流臨命終時未捨煖觸一生善惡俱時頓現死逆生順二習相交欲騐升墜當于生死生則順其習氣死則變其流類前文云情積不休又云想積不休亦輔行過現習生之現行心是其習也然其關要不過在將終之時善惡俱現業也死則逆其習生則順其習故云二習相交然此二習相交一句總該下文二習相然二習相吞等諸句諸師于下文更作餘解尚當參酌如貪婬人見地獄苦具為欲境是順其習也隨受鐵牀銅柱之苦是逆其習也故云二習相交也問墮獄雖爾生天何如答據臨終時必有愛生惡死之念亦是二習大凡解經不可拘一途也或死逆生順多就受惡報者言之幽溪曰臨命終時未捨煖觸者人稟識息煖三法為命生時識先投胎摶父精母血而為種子故有息而後有煖三事相合而有生三事相離而有死死時先捨煖而後捨息捨息而後識去所謂去後來先作主翁者是也二所招五果五一純想純想即飛必生天上若飛心中兼福兼慧及與淨願自然心開見十方佛一切淨土隨願往生當知此等亦現行心能招淨善之報也必生天上應在四王以上既居天宮與暫遊者不同故天上之言該三界諸天也下云遊于四天即暫遊也兼福慧等雖在七趣之外亦是現行善心心數相應造作淨善之業能招淨善之果兼福謂前五度兼慧即般若淨願即要期之心欲生淨土此三缺一不可吳興云於飛心中旁論福慧故皆云兼幽溪曰純想中有二路一生天一生淨土生天之想以上品十善為業生淨土則四義俱備而云隨願往生者葢淨土法門以信行願三法為之主而三法中又以淨願為之約也四義謂純想福慧及淨願二情少想多情少想多輕舉非遠即為飛仙大力鬼王飛行夜叉地行羅剎遊行四天所去無礙其中若有善願善心護持我法或護禁戒隨持戒人或護神呪隨持呪者或護禪定保綏法忍是等親住如來座下夜叉有三種一在地二在虗空三在天地夜叉但以財施不能飛行空天夜叉以車馬施故能飛行善願即護法之願善心即皈向六度之心禁戒法忍等皆如來法故住如來座下也法忍必由禪定而得交光云輕舉非遠者謂豎不越四天橫不越輪圍遊者暫到而已不同生天者常得居住去者往也保綏法忍綏是安義法忍即無生忍之類真際云情少想多此通舉也理宜等降四類分之一情九想即為飛仙二情八想為大力鬼王三情七想為飛行夜叉四情六想為地行羅剎幽溪云情少想多四等中亦分二路一無善願善心者但以下品十善為行二有善願善心者多是乘急戒緩之人故得親住如來座下聽聞大法也三情想均等情想均等不飛不墜生於人間想明斯聰情幽斯鈍不飛為天仙不墜為三塗五情五想名為均也以想明故人報聰于三塗以情幽故鈍于天仙孤山曰由昔情想感今聰鈍是知言均等者總報之業也言幽明者別報之業也由所習情想各有強弱致有聰鈍之異幽溪曰情想均等亦分二路想雖五分明暗不同明者斯聰故多睿智情雖五分亦分輕重重者斯鈍故多愚蒙四情多想少情多想少流入橫生重為毛羣輕為羽族七情三想沉下水輪生于火際受氣猛火身為餓鬼常被焚燒水能害己無食無飲經百千劫九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄長水云橫生旁生也然有輕重若情稍重報為走獸故曰毛羣若想稍強身為飛禽故曰羽族沉下水輪生於火際者古解以為近於地獄其說甚是然水中有火故水輪向下是火輪際即前云火光上蒸故有水輪含十方界據前文所說水下有火無疑矣水能害己者古解云縱得水飲亦化為火最是葢鬼雖受氣猛火以火為受生之因而復以火助之必致大害如此則雖有所食噉悉成猛火其無飲食可知洞者徹也所居最下名風火二交過地大地極下乃是風輪今既洞火輪便與風輪相近前文云堅覺寶成搖明風出故有火光為變化性據此則風火必接可知此地尚非風輪但稱風火二交過地謂風火於此交際經過也受風害者當為八寒受火害者當為八熱須知地獄雖有猛風大火而亦因地勢之自然建立地獄所以云眾同分中兼有元地若寒獄得煖熱獄得凉即是有間一向受苦即是無間孤山云只此七熱地獄自有輕重而此無間非五無間下文阿鼻方是第八熱獄名五無間也又古解謂此非地下三輪如俱舍云大地最下有金水風輪有八寒八熱地獄在三輪之上此文云沉下水火風輪又似地獄在三輪之下疑此所指非地下三輪乃地獄三輪也竊研此此文與前四卷火光上蒸搖明風出等合即是世界安立本來如此何必非地下三輪耶況既云地獄三輪何故餓鬼亦生此中恐此說未確若與俱舍不合葢經部不同例多如此幽溪曰情多想少分四類論其趣生但有三種于三種中各分輕重以論受報二則明開一則義隱若分別者則輕為有財重為無財也五純情純情則沉入阿鼻獄若沉心中有謗大乘毀佛禁戒誑妄說法虗貪信施濫膺恭敬五逆十惡更生十方阿鼻地獄溫陵云阿鼻此云無間謂受罪苦具身量劫數壽命五者皆無遮間名五無間此惟情業至重者墜入至劫壞乃出若兼謗大乘等罪則此劫雖壞更入十方阿鼻無有出期雨公云謗法者令無窮人生邪見毀佛禁戒如寶蓮香比丘尼之類誑妄說法如善星妄說法空之類無功而貪人之信施無德而當人之恭敬乃至犯五逆十重皆十方阿鼻之種也幽溪曰純情無間亦分二類一不謗大乘等至劫壞出可盡之無間也一若謗大乘等劫壞不出不可盡之無間也謗大乘及五逆十重則事兼道俗毀佛禁戒等四罪性在于道故在道之士未空乎想宜先空乎情一涉乎情便為失足之階漸況純情至于不可盡之無間乎二別詳能招所招因果七一地獄趣三一結前標起循造惡業雖則自招眾同分中兼有元地阿難此等皆是彼諸眾生自業所感造十習因受六交報循者順也隨業招報不關他人而眾人同感一報非無定處長水云眾名不一同名為一眾有相似之同分若造業同者共中共變苕溪云此結情多想少及純情之類也然橫生者非有元地以毛羣羽族散在諸趣故是則正言鬼獄二道斯略酬阿難所問以結前也十習因六交報乃是起後雙標能招報因所招報果十習因即止觀所揀於第六中取能招報之餘一心所謂貪心嗔心慢心及例餘陰入之五識五意識受想行三心此等心使與根塵相應共造大業能招七趣報苦六交報即所招報果也經雖雙標能所佛意重在能招習因故先詳十種習因能招習因既除則所招六交報苦自消也次詳辨因果二一能招十習因二所招六交報即釋明上二也初中二一總徵云何十因二別示十一婬習淫習中一順習已含逆習二二習相交之狀三聖賢訶棄此科準後文第七冤習以分阿難一者婬習交接發於相摩研磨不休如是故有大猛火光于中發動如人以手自相摩觸煖相現前交者謂兩相交也下文例之淫之始起于兩人相接而發為相摩此名如是作研磨不休成習名如是性大猛火光乃是因中具果何必專屬順習必是逆習名如是相亦是摧折色心為體交光云交者結搆之始發者臨時之動既云婬習是積久為習何云結搆之始或云淫之始發于相磨或云淫習發為相磨兩說皆可二二習相交之狀二習相然故有鐵牀銅柱諸事順習發逆習之火逆習還燒順習之身故云相然此名因緣果報亦兼如是力然火猶是順習所生反加于身燒然自體則逆習也既生地獄則順逆二習共相燒然順習故鐵牀可臥銅柱可抱逆習故還燒自身皆習心所現寧有外境哉三聖賢訶棄是故十方一切如來色目行婬同名欲火菩薩見欲如遐火坑欲火之言正是本末相等補遺云內分淫生愛水今十習中淫生火而貪生水者淫有二義一者貪愛故亦生水二者男女二根相磨生煖故受火報上文內分通取愛義故淫生愛水今十習義淫取研磨則生火報十習各具性作力相體因緣果報本末等也如此等心皆能招於七趣六交報果此等心習若起即當覺察用四運推其不在內外中間東西南北以破其妄妄因既破妄果自亡然後開顯三千會入性藏而修證事畢矣二貪習三一順習已含逆習二者貪習交計發于相吸吸攬不止如是故有積寒堅氷於中凍冽如人以口吸縮風氣有冷觸生計秪是計較而其體發于相吸吸之不止是稱貪習貪元是水積令成氷吸攬是順習積寒堅氷即是逆習已成之狀此表報為相也云積寒堅氷亦是因中具果於中凍冽者氷結于貪習之中非外法也口吸成冷觸心吸成堅氷可不懼耶二二習相交之狀二習相陵故有吒吒波波羅羅青赤白蓮寒氷等事俱舍云頞部陀此云疱尼剌部陀此云疱裂此二從相阿哳吒唬唬婆嚯嚯婆此三從聲鉢羅等三即青白紅蓮此三從色以寒彌甚身色同之今之善作家者觀此宜知所懼相陵者陵是高舉之意氷者嵯峨之勢貪人多以財勢陵人故也三聖賢訶棄是故十方一切如來色目多求同名貪水菩薩見貪如避瘴海氷由水結名之貪水瘴癘止是不和之氣而人所以謹避之者以其遍也貪心亦然遍滿世間故云瘴海三慢習三一順習已含逆習三者慢習交陵發於相恃馳流不息如是故有騰逸奔波積波為水如人口舌自相綿味因而水發交光云陵者欺義相恃如倚財倚勢竊謂相恃者謂對物而有自恃之心自恃而至陵他是放逸之至也故曰馳流不息騰者騰上水之奔放者勢必騰上故云騰逸奔波愛著元屬水故感奔波奔逸是放恣所致積波為水謂積波為江河之水亦是因中具果綿味者纏綿味著交光云是絞𠻳之狀蓋綿味則不停故生水也次二習相交之狀二習相鼓故有血河灰河熱砂毒海融銅灌吞諸事慢從貪嗔而有荊公云愛已掉動故積波為水令他傷惱故感血灰熱砂等即中云血河等是貪嗔和合之象順逆二習互相鼓動成此地獄相而還害其身三聖賢訶棄是故十方一切如來色目我慢名飲癡水菩薩見慢如避巨溺慢發于貪嗔二分得癡力最全故云癡水一說西域有水飲之發狂名為癡水如此方貪泉之類見慢者交光云謂見己心之慢非見他慢也下倣此慢中具貪瞋癡名巨溺即積波為水之處又溺者以水兼泥易陷難拔巨溺良可畏夫四瞋習三一順習已含逆習四者瞋習交衝發於相忤忤結不息心熱發火鑄氣為金如是故有刀山鐵橛劒樹劒林斧鉞鎗鋸如人銜冤殺氣飛動衝突也結者結瞋習以交衝為相而其始也發于相忤溫陵云心屬火氣屬金心火轉盛氣金轉剛故云鑄氣為金也補遺云煩熱不息氣忿成堅故感金石等事銜冤顯瞋習銜冤則忿氣結瞋既成習濃積亦然二二習相交之狀二習相擊故有宮割斬斫剉刺槌擊諸事二習者以瞋害他人為順習以瞋反害自身名逆習斫則斬首剉乃碎尸孤山曰宮割古五刑之一吳興曰五刑謂墨劓剕宮辟刺即古之墨刑槌擊笞杖之類三聖賢訶棄是故十方一切如來色目瞋恚名利刀劒菩薩見瞋如避誅戮名利刀劒直以果名因耳五詐習三一順習已含逆習五者詐習交誘發于相調引起不住如是故有繩木絞校如水浸田草木生長詐者詐現親附長水云詐謂諂曲罔冐于他矯說異儀險曲為性調亦勾引之意引起者或使其親己或使其作惡皆是引起造因之時以術制人而所感報亦為繩木等制水性至柔而浸潤不已成草木之堅質詐術亦至柔而堅固不解成繩木等報義實相肖故以例之次二習相交之狀二習相延故有杻械枷鎖鞭杖檛棒諸事其初也以術智延致他人逆習一起還延致此順習之體故云二習相延三聖賢訶棄是故十方一切如來色目奸偽同名讒賊菩薩見詐如畏豺狼讒者𧮂也也讒賊本欲害人詐亦害人雖不直害究竟還同豺狼狗足羣行舌有逆刺狼銳首白頰大尾長胡似犬二獸能卜事出必有獲奸偽之人外示親善中懷讒賊實豺狼之心佛與大士即以其心而定名畏避也六誑習三一順習已含逆習六者誑習交欺發于相罔誣罔不止飛心造奸如是故有塵土屎尿穢污不淨如塵隨風各無所見誑者若就言語即是見言不見若就行止即是虗現有德此中云誑似妄言以陷人之意交欺之因發于相罔罔是暗昧之義即相瞞也誣是誣陷飛心者言其從空而起無因而至也志在瞞人故感塵土以惡名加于良善陷人于罪故感屎尿類顯云如塵等者造因之時使人無所見感果之時己身亦不可見故云各無所見次二習相交之狀習相加故有沒溺騰擲飛墜漂淪諸事以逆習加于順習名相加誑能陷人故受沒溺飛心所造故受騰擲誑語或天或淵故遭飛墜或此或彼故受漂淪其中有風故曰飛曰漂也三聖賢訶棄是故十方一切如來色目欺誑同名劫殺菩薩見誑如踐蛇虺殺人之術誑為最便又造誑之意必欲殺人故最毒者無過于此妙樂云蝮者爾雅云虺長三寸大如指江南謂虺為蝮有牙毒鼻上有針餘如桐洲註七冤習三一順習已含逆習七者冤習交嫌發於銜恨如是故有飛石投礰匣貯車檻甕盛囊撲如陰毒人懷抱畜惡冤古本作怨長水云怨即恨也由忿為先懷惡不捨結怨為性今謂冤是讐義不共戴天如嚴仲子之刺韓相子胥鞭平王尸即名冤習冤習是交嫌所致而其相發為銜恨銜者含也時時懷恨必欲暗傷之也此是順習中已有逆習非指感果飛石投礰是不意其忽至礰亦石也匣貯即匣牀車檻即囚車甕盛如請君入甕囊撲囊藏而撲殺之史記載秦始皇囊撲二弟以因中銜恨殺人故招藏匿受苦之報交光云陰毒喻能感之心畜惡喻所感之境此解未善今謂此是類顯如素性陰毒之人中藏惡念若銜恨者雖非素性而畜惡適與相類即似其因桐洲云畜惡在懷其猶匣貯車檻等陰毒傷人如飛石投礰等即似其果二二習相交之狀二習相吞故有投擲擒捉擊射拋撮諸事前之含冤必報猶是順習至死後受報乃以逆習還吞順習以報怨時必欲相害故感投擲擊射等必欲相報故感擒捉等拋是拋擲撮是捉撮古本作挽長水云挽撮是牽繫罪人之狀作拋者悞也三聖賢訶棄是故十方一切如來色目怨家名違害鬼菩薩見怨如飲酖酒補遺云違害鬼者宿有相違今為禍害身子曾遭其事孤山云酖鳥名其羽有毒以畫酒飲之則死其鳥似鶚食蛇蝮雄名運目雌名陰諧即中云鬼似無形而能害人酒似可飲而藏酖毒皆藏恨殺物之情狀耳八見習三一順習已含逆習八者見習交明如薩迦耶見戒禁取邪悟諸業發於違拒出生相反如是故有王使主吏證執文籍如行路人來往相見見謂惡見非一朝一夕之故亦名見習照鏡為交見有邪光故曰交明見有五一身見執身有我因身計我故名身見二見取如執非想為涅槃是非果計果三戒取如執牛狗戒為生天涅槃之因是非因計因四邊見執常非斷執斷非常五邪見謂撥無因果初執斷常但屬邊見若至撥無因果即成邪見是邪能攝邊故今文不言邊見也順邪反正故云發于違拒執有非無執無非有故曰出生相反有王必有使有主必有吏皆自心所見手執文籍以正其非行路人不過生出來往二字自謂其是復見其非如一往一來面目無可迯也又如行路言其無情次二習相交之狀二習相交故有勘問權詐考訊推鞠察訪披究照明善惡童子手執文簿辭辯諸事勘問是總標權詐考訊者如考訊時必用權數也推鞠察訪者推鞠其根由察訪其所言也披究照明者披究其理照明使知邪偽也見中有善有惡須二童子三聖賢訶棄是故十方一切如來色目惡見同名見坑菩薩見諸虗妄偏執如臨毒壑此惡見由人情偏執故是情多想少所攝見是陷人之處謂陷入三塗故曰坑諸毒之中見毒最深能損法身故以壑喻九枉習三一順習已含逆習九者枉習交加發于誣謗如是故有合山合石碾磑耕磨如讒賊人逼枉良善前云誑者妄言以陷人此同類加謗亦能害人故招惡報今云枉者似官長有權枉害良善加之罪譴故云與誑習有異交加者加于人也合山謂見兩山來合罪人無迯避處也合石如之碾磑耕磨皆逼害之狀因時欲使人為虀粉故招此報讒賊等者謂感果如其因也二二習相交之狀二習相排故有押捺搥按蹙漉衡度諸事相排者以逆習排順習也押捺者謂心不服強押之而遏捺也搥按者謂意不甘強按之而槌擊也蹙漉者謂攢其手足壓之而漉其血也索隱云衡度者衡較輕重度較長短皆是定其罪狀使無迯避之意三聖賢訶棄是故十方一切如來色目怨謗同名讒虎菩薩見枉如遭霹𮦷以言害人曰讒讒能傷人曰虎不知所從而甚為可畏為霹𮦷十訟習三一順習已含逆習十者訟習交諠發于藏覆如是故有鑒見照燭如於日中不能藏影我既藏覆彼必發之名訟故藏覆正是訟習我欲隱而人發之遂成諠訟是順情中已生逆情之境鑑見照明俗稱業鏡臺者是已日中不能藏影但喻所感之境二二習相交之狀二習相陳故有惡友業鏡火珠披露宿業對驗諸事二習相陳以逆習陳露順習也惡友即證明人言同類惡人證其訟事也業鏡火珠皆能照其是非三聖賢訶棄是故十方一切如來色目覆藏同名陰賊菩薩見覆如戴高山履于巨海補遺云陰賊者謂陰謀賊害戴高山者意欲覆藏適以自壓下臨無底之淵無立身之地矣溫陵云十習發于十惑通根本而兼隨隨煩惱二十初曰忿恨惱覆誑諂憍害今詐習即諂也怨即恨也枉即害也訟即覆也略例而已幽溪曰十習既屬根隨煩惱根本有六謂貪瞋癡慢疑不正見或開為五隨有二十隨忿恨惱覆誑諂憍害嫉慳無慚無愧不信懈怠放逸昏沉掉舉失念不正知散亂今婬習即所發之業具足貪癡詐習即諂冤習即恨見即五見枉即逼壓良善害所攝亦瞋類訟謂相論得失恨為先惱之一法性相應故已上十習即約能招報以明修證之境也境雖有十秪是現行貪嗔癡開合之異耳用觀當依止觀第四非行非坐三昧縱任三性於中覺察但使起心即可用觀以顯不思議境不必懼其盛大所謂但使有魚多大維嘉也詳答能招報十習因竟二所招六交報二一總明云何六報阿難一切眾生六識造業所招惡報從六根出現行習因准輔行只五識五意識今言六識者非心王也即意識心數及受想行心亦能起惡與六根相應造罪者夫識從根出既是根造還從根受吳興云造業招報根識必俱今以識為業而報從根者葢業竝由心報多約色故也所名六交報者濬師云因與果交今則不爾但是果時六根與惡報相涉也幽溪曰下文一一各明一根受報五根與之同受者六亂妄想使之然也前不云乎是故世界因動有聲因聲有色因色有香因香有味因味有觸因觸知法六亂妄想成業性故十二區分由此輪轉彼明十二類生之根本故曰窮十二變為一旋復今六交報乃彼化生一類方其造十習因時必一根造罪而六亂妄想趣外奔逸與之同造故一根受報而五根與之同受但互為主賓不同以明六交差別此的是所招報果也二別示二一徵云何惡報從六根出前云所招惡報從六根出則根與報交故名六交報今即徵云云何惡報從六根出六交之義益更顯然又云一者見報招引惡果果即屬報亦是根與報交之義雖云此見業交乃是業與根交然業變成報故接云先見猛火元是報與根交若云業與果交義似未順二示六一見報二一標一者見報招引惡果二釋三一臨終見相此見業交則臨終時先見猛火滿十方界溫陵云見覺屬火故感猛火吳興云先見猛火即現報亡者神識等即生報二入獄初相亡者神識飛墜乘烟入無間獄火元騰上故先飛後墜也溫陵云六交皆直入無間者就重言耳成論云極善極惡皆無中陰所以直入三入獄後相又二一發二相發明二相一者明見則能徧見種種惡物生無量畏二者暗見寂然不見生無量恐前辨見中明暗俱見今入獄亦爾雨公云由人間明目張膽造諸惡業了無畏心故在此中徧見惡物生無量畏言惡物者如鐵蛇銅狗劒樹刀山牛頭阿旁之類由在人間暗地瞞人作諸惡業恬不介意故在此間寂無所見生無量恐葢畏生于境而恐藏于心也二交六根如是見火燒聽能為鑊湯洋銅燒息能為黑烟紫𦦨燒味能為焦丸鐵糜燒觸能為熱灰爐炭燒心能生星火逆洒煽鼓空界溫陵云聞聽屬水故燒聽能為鑊湯洋銅鼻嗅主氣故燒息能為黑烟紫𦦨舌主味丸糜味類也身主觸灰炭觸類也心正屬火燒之轉熾故迸洒空界即中云心元屬火念慮紛雜燒之遂成星火迸洒者一時盡洒也字書云迸者走逸也一根造業六根助之故一見火遍燒六根二聞報二一標二者聞報招引惡果二釋三一臨終見相此聞業交則臨終時先見波濤沒溺天地據此是業與根交而業變為報即報與根交二入獄初相亡者神識降注乘流入無間獄降注下流也三入獄後相二一發二相發明二相一者開聽聽種種鬧精神愗亂二者閉聽寂無所聞幽魄沉沒桐洲云耳根所取動靜二境造種種業今受其報亦緣此二開即動閉即靜也熏聞云亂者怐愗上音寇下音質愚也文幽冥中似有形質受沉溺之苦故云幽魄沉沒二交六根如是聞波注聞則能為責為詰注見則能為雷為吼為惡毒氣注息則能為雨為霧洒諸毒蟲周遍身體注味則能為膿為血種種雜穢注觸則能為畜為鬼為糞為尿注意則能為電為雹摧碎心魄言洒毒蟲者謂雨霧中散洒毒蟲也水中之畜如魚鱉等水中亦有鬼此水隨形變皆是惡觸吳興云上云見火此云聞波諸說弗明今以近義詳之如易云離為目為火坎為耳為水將恐見聞本乎水火之性故發燒注之相也溫陵云聞聽屬水故觀聽旋復則水不能溺依之造業則能感波濤注聞發聲故為責罪詰情之事注見能為雷吼者聞波屬陰見火為陽陰陽相薄而成雷故也注息為雨霧水隨氣變也注味為膿血水隨味變也注觸為畜鬼水隨形變也注意為雷雹意出于心水火交感也一切物理莫不因五行乘陰陽以變化故今隨根轉變之事皆不出此三齅報二一標三者齅報招引惡果二釋三一臨終見相此齅業交則臨終時先見毒氣充塞遠近資中曰鼻根造業貪嗅諸香故招毒氣以受其報二入獄初相亡者神識從地涌出入無間獄從地涌出者肖鼻有孔也氣息必從下而上故從地涌出又必從上而下故入無間獄三入獄後相二一發二相發明二相一者通聞被諸惡氣熏極心擾二者塞聞氣掩不通悶絕于地二交六根如是齅氣衝息則能為質為履衝見則能為火為炬衝聽則能為沒為溺為洋為沸衝味則能為餒為爽衝觸則能為綻為爛為大肉山有百千眼無量咂食衝思則能為灰為瘴為飛沙礰擊碎身體洋水盛貌觸身也為大肉山者謂身為大肉山有百千孔無量蟲咂食之為灰等者心思紛雜得毒氣而為灰沙瘴亦毒氣也孤山云魚敗曰餒羮敗曰爽溫陵云質礙也履通也嗅業所依不離通塞故衝息能為質履也衝見為火炬衝聽為沒溺洋沸則見覺屬火聞聽屬水明矣為餒為爽味隨氣變也綻拆爛壞體隨氣變也衝思為灰沙依土感也溫陵云依土感者謂脾主思脾屬土也四味報二一標四者味報招引惡果長水曰舌根作罪最廣一貪味為罪殺戮必多二發語造業其罪又廣然既云味報多是貪味之報長水引妄語等特旁義耳然不可少宜雙用之二釋三一臨終見相此味業交則臨終時先見鐵網猛𦦨熾烈周覆世界舌根造罪猶若網羅無所不覆故臨終先見鐵網猶大火無不被燒故復見猛𦦨此則似於妄語報也二入獄初相亡者神識下透掛網倒懸其頭入無間獄下透掛網倒懸其頭似神識沉埋于滋味中也亦是發言顛倒之報三入獄後相二一發二相發明二相一者吸氣結成寒氷凍裂身肉二者吐氣飛為猛火焦爛骨髓長水云吸氣則取味所招吐氣則發語所致今謂不應偏取發語亦有忽冷忽熱之勢彼貪味者或貪其冷或貪其熱如鯖魚沉李沸羮熱臛味別樂殊故吸氣為陰屬寒氷吐氣屬陽為猛火也二歷六根如是甞味歷甞則能為承為忍歷見則能為然金石歷聽則能為利兵刃歷息則能為大鐵籠彌覆國土歷觸則能為弓為箭為弩為射歷思則能為飛熱鐵從空雨下承忍者謂承領忍受一切惡味見覺屬火為然金石語云眾口鑠金據此則是謗人之報利兵刃者取利兵相擊之聲息本虗浮能為鐵網此羅織人之報亦網取羣味之報溫陵云觸味傷物故感弓箭以自傷發言亦爾弩亦弓也黃帝始作弩弩怒也其柄曰臂鉤弦曰牙牙外有郭下曰懸力合名曰機如機之巧也射即從弩所發之箭飛熱鐵者造語從空緣味之思亦從空發故感飛鐵從空而雨五觸報二一標五者觸報招引惡果二釋三一臨終見相此觸業交則臨終時先見大山四面來合無復出路五歷皆是依報而觸為依報最著如宮殿房宇皆是依報之觸凉煖稱意人共求之依此造業故臨終見四山來合古人以男女身分為觸義豈不然然此乃觸之至近者耳無出路者無迯避也二入獄初相亡者神識見大鐵城火蛇火狗虎狼師子牛頭獄卒馬頭羅剎手執鎗矟驅入城門向無間獄古人稱為惡觸雜感生前求遊居之樂可意之人玩好之物今見入獄初相如此三入獄後相二一發二相發明二相一者合觸合山逼體骨肉血潰二者離觸刀劒觸身心肝屠裂溫陵云觸業所依不出離合屠裂即離相也二交六根如是合觸歷觸則能為道為觀為廳為案歷見則能為燒為熱歷聽則能為撞為擊為剚為射歷息則能為括為袋為考為縛歷甞則能為耕為鉗為斬為截歷思則能為墜為飛為煎為炙前貪房宇之觸凉燠稱意今見趣獄之路治罪之處觀此文則道途房宇為觸審矣谷響云古者每門樹兩觀于前以標表宮其上可居登之可以遠觀故謂之觀人臣將朝至此則思其所闕故謂之闕燒熱為眼家之觸燒為眼所見熱為身所受撞擊等為耳家之觸剚音恣插刃于身也射插箭于身也括袋等為鼻家之觸括結也括袋使氣不通息本依身與身最切變為考縛耕鉗等為口家之觸耕鉗其舌斬截其齒飛墜等為意家之觸以思或升或降或熱惱故六思報二一標六者思報招引惡果二釋三一臨終見相此思業交則臨終時先見惡風吹壞國土妄念動于中則風輪起于外思之能感惡風明矣二入獄初相亡者神識被吹上空旋落乘風墮無間獄或上或下是隨風飄蕩三入獄後相二一發二相發明二相一者不覺迷極則荒奔走不息二者不迷覺知則苦無量煎燒痛深難忍意根所對有昏明二種不覺即昏覺即明也荒者神思亂也由迷悶而致荒亂理之自然奔走雖身實意根中所現之象上句以不覺顯迷下句以不迷顯覺意能遍緣五根所覺既遍痛深餘根也二交六根如是邪思結思則能為方為所結見則能為鑑為證結聽則能為大合石為氷為霜為土為霧結息則能為大火車火船火檻結甞則能為大呌喚為悔為泣結觸則能為大為小為一日中萬生萬死為偃為仰長水云惡習所成皆是邪思思以分別為義意中現象通是結成結為方所分別成矣方所與鑑證相連恐是造罪之方故下即鑑證罪人事也大合石等溫陵以為水土交感是也前文云山石擊則成𦦨融則成水其義明矣又云火騰水降交發立堅濕為巨海乾為洲潬今氷霜亦水類為土者約雨言之即霾也霜別本作霿與雺同音蒙天氣下地不應曰雺息通出入故為火車船檻皆運行之象呌喚悔泣必有言詞亦舌根事忽覺身大忽覺身小生死偃仰皆身觸受苦之相葢萬生非萬遍受形即是一身而一日中萬生萬死也詳示所招報竟三總結顯妄二一由妄所成二非真本有一又二一總結由妄所成阿難是名地獄十因六果皆是眾生迷妄所造問據六交報所墮之獄皆云無間然則十習因悉是阿鼻之業耶答如貪習所感八寒地獄非阿鼻也乃至訟習所感業鏡火珠等是受報前事亦通鑑照入獄之人經云無間恐是對彼輕獄則八寒八熱等皆名無間非定指阿鼻也但阿鼻亦名大無間耳眾生若悟自心一切苦報皆同幻化因迷自心妄見諸苦豈實有哉二別結能所因果五一阿鼻獄因果若諸眾生惡業同造入阿鼻獄受無量苦經無量劫同造者謂同造十習因也惡心重故受苦經劫皆多古人謂六根十習一時同造今謂不然但是一生具諸惡耳二八無間獄因果六根各造及彼所作兼境兼根是人則入八無間獄各造者六根各造如眼造眼家之惡乃至意造意家之惡兼境等者謂十因所造之事十因雖兼而根不兼但名兼境或造惡時能造之根雖兼而境不兼但名兼根兼境在十因中或兼二三至八九兼根在六根中或兼二三至四五各造為六兼境為七兼根為八則有八因能招八無間獄之苦八因所招故名八無間獄不必定是何獄也而無間獄名非寒即熱亦不定指何獄然此因縱入阿鼻不至經無量劫矣此中云八獄當是八種人入即中附評無間獄名據經云九情一想下洞火輪身入風火二交過地輕生有間重生無間二種地獄純情即沉入阿鼻獄是則阿鼻似在無間之外又云惡業同造入阿鼻獄受無量苦經無量劫六根各造及彼所作兼境兼根是人則入八無間獄則無間似亦在阿鼻之外但八熱獄中從古以阿鼻為第八獄偈云等活黑繩三眾合噑叫大叫六炎熱七極熱下八阿鼻此八寒熱根本獄二說如何會通孤山解前段經去輕生有間重生無間者秪前七獄自有輕重應以第六為有間第七為無間此說較妥但後段經未有會通之釋以偈語本出俱舍論及長阿含經不可違也若謂阿鼻定在八無間外於今經似順而違阿含俱舍恐非通方之論三十八地獄因果身口意三作殺盜婬是人則入十八地獄言身口意三則六根不全明矣作殺盜婬則十因不全明矣須知殺盜婬業世人多犯十習非大惡人不能兼也言十八獄者身作殺盜婬口作殺盜婬意作殺盜婬所造有九能造有九二九十八以為能招報因感十八地獄所招報果有一因必有一果理之自然無足疑者此現行能招報名所招報明文歷然例之前後皆可知也四三十六獄因果三業不兼中間或為一殺一盜是人則入三十六地獄三業不兼即是複也此有九句三十六因一身口作殺盜二身口作殺婬三身口作盜婬四身意犯殺盜五身意犯殺婬六身意犯盜婬七口意犯殺盜八口意犯殺婬九口意犯盜婬既有三十六因定招三十六獄云中間或為一殺一盜者亦有九句三十六因一身口作殺二身口作盜三身口作婬四身意犯殺五身意犯盜六身意犯婬七口意犯殺八口意犯盜九口意犯婬其中能作既有十八所作之業亦有十八是三十六能招之因招三十六地獄之果也是人者不止一人如身口犯殺盜便感四獄其入獄多少惟人所感五一百八地獄因果見見一根單犯一業是人則入一百八地獄見見之言古解不一即中曰見見可攝六根前六交報中聞根云先見波濤鼻根亦先見毒氣則餘根受報必先有見煩惱數有一百八獄亦如之雖名數未詳義則可準然根境相對便成兩獄今但根犯未涉于境如妄言謗人人未受害造謀殺人人不被殺眼耳犯故往觀聽等故于一百八中止墮一獄也二非真本有由是眾生別作別造於世界中入同分地妄想發生非本來有別作別造謂別作此業別造此果熏聞云前阿難問此諸地獄為有定處為復自然彼彼發業各各私受故今答于世界中入同分地又前問此道為復本來自有為是眾生妄習生起故今答妄想發生非本來有夫眾生性具十界則地獄亦性中本有但性具之法融成一理無相可得是為三諦一心中具豈得云實有地獄乎故云非本來有由眾生妄想見有地獄耳地獄中能招所招因果既詳下六趣可例知總是現行相應心中所感相也二鬼趣三一總標復次阿難是諸眾生非破律儀犯菩薩戒毀佛涅槃諸餘雜業歷劫燒然後還罪畢受諸鬼形破戒毀法是于佛法中起罪諸餘雜業是于世法中起罪此總結能招苦報之十因歷劫燒然即總結所招六報後還下起後之詞若不經地獄直入鬼趣者如前云七情三想沉下水輪生于火際畜趣例之熏聞云非破律儀謂聲聞戒也撥無曰非違犯曰破二別顯十一怪鬼若於本因貪物為罪是人罪畢遇物成形名為怪鬼十因皆曰貪者情多墮獄即皆以貪為本因也本因貪求財物今遇金銀鏡劒等還成怪鬼言遇物遇風等者如後文云風銷報盡畜死報盡乃至人亡報盡是全仗此十法成形二魃鬼貪色為罪是人罪畢遇風成形名為魃鬼魃鬼如補遺所釋遇風則合其放逸之性故成形也神異經云南方有人長二三尺袒身而目在頂上行走如風名魃所見之國大旱豈非地獄猛火之餘報乎愚謂貪婬屬火故致大旱甚則燒然如慾火燒祆廟等三魅鬼貪惑為罪是人罪畢遇畜成形名為魅鬼詐習以甘言諂惑于人今為鬼遇狐猿猪犬亦現美色媚人名魅四蠱毒鬼貪恨為罪是人罪畢遇蟲成形名蠱毒鬼前云怨習交嫌發于銜恨遇蟲成形者謂附毒虫而成形害人南方有妖術令人成蠱病者此鬼主之五癘鬼貪憶為罪是人罪畢遇衰成形名為癘鬼前云忤結不息故知貪憶為瞋習癘鬼多求飲食與毒不同值人勢衰為瘧癘鬼六餓鬼貪慠為罪是人罪畢遇氣成形名為餓鬼慢者虗憍恃氣則不得食唯鬼亦然餓鬼無飲食充身止存懨懨氣息遇氣者謂受氣猛火七魘鬼貪罔為罪是人罪畢遇幽為形名為魘鬼前云誑習交欺發于相罔罔謂相瞞今為魘寐使人無知八罔兩鬼貪明為罪是人罪畢遇精為形名魍魍鬼前云見習交明今云遇精即日月精曜山澤靈氣凡木石怪為魍魎亦鬼中之偉大精明者也九役使鬼貪成為罪是人罪畢遇明為形名役使鬼凡人欲成名利必致顛倒是非不分黑白誣陷良善故是枉習其人必為有力驅使今遇明神亦為所役名利之處皆有光明既在明中則為天神所役而彼亦樂于奔走十傳送鬼貪黨為罪是人罪畢遇人為形名傳送鬼傳送者附巫覡而傳吉凶也訟者必有同黨發人隱微傳送亦所以發人之覆藏也人有貪知吉凶者今亦黨之三總結阿難是人皆以純情墜落業火燒乾上出為鬼此等皆是自妄想業之所招引若悟菩提則妙圓明本無所有自妄想業即結現行能招十習因所招引即結所招報果也前阿鼻乃是純情餘有九情一想者今以重該輕耳孤山曰純情墜落者愛水下流業火燒乾者燒乾愛水也補遺云非謂愛情已除滅也但燒愛心中所感業水耳三畜趣三一總明復次阿難鬼業既盡則情與想二俱成空方於世間與元負人怨對相值身為畜生酬其宿債雨公云此躡前鬼業盡而生畜趣也情想俱空者但恐阿鼻之純情無間之九情一想有間之八情二想餓鬼之七情三想尚留六情四想為潤生而生毛羣羽族中與元負人酬宿債也元負人即債主二別顯十一梟類物怪之鬼物銷報盡生于世間多為梟類始貪習為怪鬼今報盡作梟倫附塊葢貪物之餘習也又梟為不孝鳥生食父母即大怪事故為怪鬼餘習又貪利者必不孝二異類風魃之鬼風銷報盡生于世間多為咎徵一切異類婬乃衰敗不祥之事今為咎徵以報災魃亦能報旱也一切異類四字應在咎徵之下交光置之下句之首未是三狐類畜魅之鬼畜死報盡生于世間多為狐類魅鬼多憑狐亦卒為狐四毒類蟲蠱之鬼蠱滅報盡生于世間多為毒類蟲蠱之鬼多集于毒故卒為毒五蛔類衰癘之鬼衰窮報盡生于世間多為蛔類癘鬼乘衰多求飲食今依臟而消食名蛔六食類受氣之鬼氣銷報盡生于世間多為食類餓鬼無食今為食類如雞豚等自既無食須人畜養卒為人所食也七服類綿幽之鬼幽銷報盡生于世間多為服類詐習為魘稱綿幽之鬼其始發于相瞞今為蠶類作繭自瞞又綿者著也魘必附著于人為綿幽之鬼古註云綿即綿密不明露也八應類和精之鬼和銷報盡生于世間多為應類因見習作罔兩為和精之鬼言與精曜相和也今為社燕寒鴻亦明見之習耳九休徵明靈之鬼明滅報盡生于世間多為休徵一切諸類貪成後為明靈之鬼今預報休徵亦貪成名利而已十循類依人之鬼人亡報盡生于世間多為循類依人之鬼如世乩仙變為畜類多順人意如猫犬等循者順也三總結二一正結虗妄阿難是等皆以業火乾枯酬其宿債傍為畜生此等亦皆自虗妄業之所招引若悟菩提則此妄緣本無所有二引前重示如汝所言寶蓮香等及琉璃王善星比丘如是惡業本自發明非從天降亦非地出亦非人與自妄所招還自來受菩提心中皆為浮虗妄想凝結熏聞云問此事本是地獄惡業之相那于畜生後結示耶答前阿難所舉三人且約惡趣極重者示之今佛于畜趣後說者葢明鬼畜皆是地獄業火燒乾愛水出生其趣則知寶蓮香等一業備歷三趣也歷至畜趣罪案已畢宜結前文自妄所招者自妄即結能招習因所招即結所招報果四人趣三初總明二一反徵其剩復次阿難從是畜生酬償先債若彼酬者分越所酬此等眾生還復為人反徵其剩如彼有力兼有福德則於人中不捨人身酬還彼力若無福者還為畜生償彼餘直畜生為六情四想所感亦為償債分越者猶言過分謂驅使則晝夜不息烹庖則殺害無己所取過于先債也徵如徵稅之徵剩餘也有力之語最寬但指為有善業力甚妥不但不失人身兼有福德而處富貴為彼用財用力可酬所剩若善業不勝福德不兼後轉為畜以酬剩負而已酬還彼力力字即上有力之力故知言有力者謂有財力及身力也彼酬者彼有力二彼字指元負人後二彼字則指還復為人者耳二酬償難息阿難當知若用錢物或役其力償足自停如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息除奢摩他及佛出世不可停寢或償債或徵剩但宜用錢役力酬足則自停止若殺身食肉便成怨仇雖但償宿債猶為殺食之因況分越所酬者耶在喻則互為高下在法則互為強弱奢摩他成自出生死佛出世則解冤釋結故除此二外必不能停息也二別顯十一參頑類汝今應知彼梟倫者酬足復形生人道中參合頑類貪習為怪鬼怪鬼為梟倫梟為不孝之鳥酬債已畢復得人形傳曰心不則德義之經曰頑正與梟合參合者雨公云帶畜生之餘習而參雜混合于人中也若不作此解當云人中自分十類今從傍生來者各以其類而參合之所以後之三類云參而不云合以人中惡多善少善惟有三彼得之未全但參雜耳又人道元五情五想所招帶彼餘習故分十類天如云是等皆非正報乃餘習所偶故云參合正此意也二參異類彼咎徵者酬足復形生人道中參合異類淫習為魃鬼魃鬼為咎徵異類或云愚類未知孰是前咎徵中亦云一切異類生在人中亦能致災眾皆擯逐而成異類若作愚類者如長水云欲多者不別習善但專一境由不習善故于善業成愚鈍也三參庸類彼狐倫者酬足復形生人道中參於庸類詐習為媚鬼媚鬼為狐倫雨公云昔為狐媚今復人形惟曲情飾貌搖尾乞憐不能卓然自立所謂因人成事碌碌庸人也四參狠類彼毒倫者酬足復形生人道中參合狠類冤習為蠱鬼蠱鬼為毒倫狠者敢于害人無慈之稱五參微類彼蛔倫者酬足復形生人道中叅合微類瞋習為癘鬼癘鬼為蛔倫蛔者畜類之微趣今為人亦不蒙齒錄六參柔類彼食倫者酬足復形生人道中參合柔類慢習為餓鬼餓鬼為食倫窮餓被食之餘唯能柔怯至剛者變為至柔輪迴之事豈可測乎七參勞類彼服倫者酬足復形生人道中參合勞類誑習為魘鬼魘鬼為服倫服類纏綿于人今必被人役使故勞八參文類彼應倫者酬足復形生人道中參于文類見習為罔兩受畜為應倫能知節序今為人亦文采可觀九參明類彼休徵者酬足復形生人道中參合明類枉習為役使役使為休徵知有道而為休徵是其明矣今為人亦識善惡知去就也十參達類彼循倫者酬足復形生人道中參于達類訟習為傳送傳送為循倫葢始為乩仙後為猫犬必知人意故曰達也三結示阿難是等皆以宿債畢酬復形人道皆無始來業計顛倒相生相殺不遇如來不聞正法于塵勞中法爾輪轉此輩名為可憐愍者皆無等者業惑非始今日故言無始彼多從徵剩而來故云業計計即是惑惑償命為實有故是顛倒為徵債而相生為索命而相殺似牒前相食相誅互為高下之文而結為可憐愍也長水云欲息顛倒唯戒定慧無此三種不息輪迴佛若不出誰說此法五仙趣三一總明阿難復有從人不依正覺修三摩地別修妄念存想固形遊于山林人不及處有十種仙妄想即能招報因十仙即所招報果不依正覺等者言無正慧正定別修妄念似于慧存想固形似于定另成一種仙趣正覺如長水云三乘行法皆佛所教今經尚斥二乘云不識生死根本錯亂修習況修仙道耶文彼謂雙修性命即妄念能招報也如下十種各別即所招報也存想固形十種所共如廣成子云神將守形形乃長生二別顯阿難彼諸眾生堅固服餌而不休息食道圓成名地行仙堅固草木而不休息藥道圓成名飛行仙堅固金石而不休息化道圓成名遊行仙堅固動止而不休息氣精圓成名空行仙堅固津液而不休息潤德圓成名天行仙堅固精色而不休息吸粹圓成名通行仙堅固呪禁而不休息術法圓成名道行仙堅固思念而不休息思憶圓成名照行仙堅固交遘而不休息感應圓成名精行仙堅固變化而不休息覺悟圓成名絕行仙形之堅固由于服餌故云堅固服餌下皆倣此若云堅持此服餌之法其說恐非長水云服餌者即服麻仁草木之實其說是也但食草木似類第二交光以為生熟之分服餌謂炮煉方服草木即飡松噉栢遊行者真際云精窮變化察物性元點鐵成金恤貧哀苦又鍊金石可以化骨故能遊行人間堅固動止如熊經鳥伸宜動而動宜止而止真精力久可以遊于虗空天行者溫陵云皷天池𠻳精液冰雪綽約不交世欲與天無異或云此天非六欲天如張蹇至崑崙頂得見天宮也通行者古云吸乎日氣潤益姿容吞彼霞光將延世表此其精神流注而與造化交通也道行乃呪術之道堅固思念者如桓先生修默朝之道豈非思念照行者謂精神有所注照谷響云交遘者易云男女遘精萬物化生是也神仙傳云彭祖修房中之術葢此類矣真誥中再三呵赤白之氣穢惡之事夫精行仙若是其類應如下文云于邪婬中心不流逸者方與斯趣溫陵云內以坎男離女配匹夫妻其說最是兩物相交即名感應攝精自固名精行仙變化不息如尸解之類按真誥云道有陰度陽度若鍊形道合呼吸純陽秪自肉身次第變蛻蛻而愈妙身入無形所蛻之皮宛同蟬殻解變之後因無骸骨雖葬墳塚惟劒舄杖履存焉此陽度也若陰度者即陸仙也言覺悟圓成者謂絕于視聽令如槁木等行字溫陵皆作去聲讀交光以前五為平聲後五為去聲然平則皆平去則皆去荊公云地行仙能壽而不能飛飛行仙能飛而不能遊遊行仙能轉化而遊也即中云前三皆有待于外物不能入空若乘陰陽動止之氣而自鍊氣精則能入空矣堅固津液亦求之內耳天一生水水德合天名為天行通行者吸日月吞雲霞與造物相通呪術能役鬼神遣風雷是道術也交遘既云感應必是坎離會合為交若鍊精成氣鍊氣成神鍊神成虗名為變化覺悟超物故云絕行三結示阿難是等皆于人中鍊心不修正覺別得生理壽千萬歲休止深山或大海島絕于人境斯亦輪迴妄想流轉不修三昧報盡還來散入諸趣妄想流轉散入諸趣結出能招所招報相盡矣神將守形是煉心也始在人中不依正覺修心忽成仙趣別得依正二報如蟬蛻鳩變頓改人趣不修三昧終有報盡之期耳云別得生理則始而為人既而為仙固無疑也長水云言于人中者以仙趣無別總報即于人身總報之上加于前來十種修煉轉成仙也吳興云前文情少想多輕舉非遠即為飛仙葢約命終隨業受生而說下文云精研七趣皆是昏沉諸有為相妄想受生妄想隨業而云仙趣無別總報者此義不然況復今云深山海島絕于人境豈非別乎應知人中鍊心者非止服餌養生而已必兼戒善方曰煉心別得生理者正由人中之業別感仙趣之報也以其業種之性經生不失故曰生理縱于人間現得長生久視之理其數幾何若生仙趣則千萬歲信有之矣如山海經云崑崙之山廣都之野軒轅之丘不死之國氣不寒暑人皆數千歲此亦眾私同分非無定處若但固形而不鍊心便希千歲是猶見卵而求時夜不太早計乎文即中云復有從人總結云人中鍊心顯然即生成仙吳興以為命終方生非也六天趣二初別示諸天三一欲界二一正釋為六一四天王天六天之欲有輕重者婬是因緣生法然從內心起者則重從外緣感者則輕初二天因是內心取境初天之因已除邪淫非時非處一切不犯但未捨妻子恩愛次天云於己妻房婬愛微薄則內心猶未除也第三第四以外緣而感內心第三云逢欲暫交去無思憶淫心既不自起但為外緣所成第四云有應觸來未能違戾前之逢欲實有交感今但不違其情轉薄應觸者是應理之觸如父母為嫁娶故不指老年之人老者精力既衰中歲心多灰冷今少年好靜故足奇耳第五第六內心已忘惟應外境故第五云我無欲心應汝行事葢迫于不得已而味如嚼蠟第六云了然超越不但嚼蠟兼起厭患故此二天唯有外緣也但觀其因六天階級槩可知矣阿難諸世間人不求常住未能捨諸妻妾恩愛于邪淫中心不流逸澄瑩生明命終之後鄰于日月如是一類名四天王天不求常住一句總貫下文世人修善秪希福報是不求常住初四王中妻妾為正淫非己妻為邪淫但舉不淫十善可知是人具足妻妾但不犯非己之色不但身遠心更無邪如水之澄如玉之瑩瑩潔也從此身心皆有光明然必命終生天與前仙道異矣鄰于日月明所居地也此是欲界初天為清昇之首居須彌山半去地高四萬二千由旬東方黃金埵城名上賢持國天王所居南方琉璃埵城名善見增長天王所居西方白銀埵城名周羅廣目天王所居北方水晶埵城名天敬多聞天王所居身長半里衣重半兩壽五百歲以人間五十歲為一晝夜今經則惟以十善中持邪淫戒心不流逸澄瑩生明為因以居鄰日月為果夫日月人間世之光明至圓滿矣苟無戒明焉能與鄰慶喜以邪淫致墮而啟教葢有由也二忉利天於己妻房淫愛微薄于淨居時不得全味命終之後超日月明居人間頂如是一類名忉利天是人但有一妻與前有殊前未捨其妻妾恩愛今于一妻愛又微薄但非全無故清淨自居之時未全清淨之味謂間有愛念起也超日月者以善增故愛心又減身則又昇考日天子是觀世音應作月天子大勢至應作豈應超勝今居地則超因修善之力也忉利此云三十三帝釋統焉竊謂日月是菩薩變現然日是太陽月是太陰遍統世間夫婦之事葢順凡情而現此象也今已超世間夫婦故反越日月桐洲云淨居即坐禪以上二天為地居天葢三十三天居須彌之極頂去地高八萬四千由旬善見大城周萬由旬極世間之莊嚴身長一里衣重六銖壽一千歲以人間百歲為一晝夜今經以正淫微薄為因超日月明為果前適與隣今則超之可見淫為沉墜之本戒為昇濟之因也三須𦦨摩天逢欲暫交去無思憶于人間世動少靜多命終之後于虗空中朗然安住日月光明上照不及是諸人等自有光明如是一類名須𦦨摩天言逢欲者顯未逢時心則不起逢欲不免暫交去則但有悔心更無追憶又勝于淫愛微薄者矣此人于淨居時已得全味不同前人靜中間有愛念起也長水云逢欲暫交故云動少去無思憶故云靜多即中云動少靜多何必專指欲境葢寡欲之人每事淡泊故紛動時少靜攝時多孤山云須焰摩此云時分時時唱快樂故此天為空居之首身長一里半衣重三銖壽二千歲以人間二百歲為一晝夜今經以逢欲暫交去無思憶為因身有光明不借日月為果謂欲情又薄于前也此天加修未到定由其未入根本定故如止觀云若端坐攝身調和氣息泯然澄靜身如雲影虗豁清淨而猶見有身心之相是則名為欲界定也從此已去忽然不見欲界定中身首衣服牀鋪等事猶如虗空冏冏安隱身是事障事障未來障去身空未來得發如是名為未到定相以此而言則前之二天已有欲界定故初天云澄瑩生明次天云于淨居時不得全味豈非約一分好修禪者漸窒欲而然乎今天則云動少靜多豈非欲界定已成兼坐未到定將成之相乎第四天云一切時靜則兼後二天已成未到定而根本禪亦兼修之者也四兜率陀天一切時靜有應觸來未能違戾命終之後上昇精微不接下界諸人天境乃至劫壞三災不及如是一類名兜率陀天一切時靜對前動少靜多應觸如前前云暫交乃實有交感之情今但未能違戾謂尚有和順之心也生天之後以笑為欲今未捨報時逢欲未免隨順上天定多下天欲多兜率處中是補處所居故曰精微謂中道之境粗心不能至耳三災不及約內院言之如云我淨土不毀而眾見燒盡兜率陀此云知足於五欲知止足故佛地論名為喜足謂後身菩薩于中教化多修喜足幽溪曰此空居第二天身長二里衣重一銖半壽四千歲以人間四百歲為一晝夜有內院外院今云上昇精微不接下界是約內院言之凡求生內院者不可單約事善應修禪定至未到定然後可生故求生內院欲見補處菩薩者當修三法一上品十善二大乘禪定三發往生深願如此三法缺一不可苟以片善而欲往生是猶見彈而求鴞炙也或問何必禪定及以發願答若無未到或恐不及不及則生下天及以外院若無深願或恐過之生于上天五樂變化天我無欲心應汝行事於橫陳時味如嚼蠟命終之後生越化地如是一類名樂變化天前未能違戾猶有和順之心今但酬應且無隨順之念喻如嚼蠟故勝前也橫陳是父母強為婚配溫陵云此無心而境自至曰橫陳如此解之最妥不必用宋玉賦及古詩也泐潭云下之諸天衣食所須尚假自化此天所受用思念即生珙鈔云諸天用異熟境此天不爾雖有異熟五塵樂自變化而以受用也是則越下而化名為越化此空居第三天身長二里半衣重一銖壽八千歲以人間八百歲為一晝夜今經以欲情味如嚼蠟為因樂境自變化受用為果葢欲情轉薄定力轉勝故因果皆越于下天也六他化自在天無世間心同世行事于行事交了然超越命終之後徧能出超化無化境如是一類名他化自在天前如嚼蠟是無淫情今更起厭欲之心反增持戒之念故云超越不免行事因生欲天溫陵云化即第五天無化即下天也諸欲樂境不勞自化皆由他化而自在受用名他化自在也吳興云準天台說六欲天業皆以十善為本若兼護法心是四天王業若兼慈化人是忉利天業若兼不惱眾生善巧純熟是𦦨摩天業若兼修禪定粗住細住是兜率天業欲界定是變化天業未到定是他化天業今經止約欲事輕重而分六天者應有二義一是阿難發起之緣故二是欲界受生之本故此是空居第四天身長三里衣重半銖壽一萬六千歲以人間一千六百歲為一晝夜今經以於行事交了然超越為因徧超化無化境為果前三天修未到定或深或淺俱未成就至于此天方乃成之此中應有二天一正一邪正則未到定成更加修根本能生色界初禪邪即魔羅波旬壽三萬二千歲躭著欲境住而不前報盡還來散入諸趣問諸天壽命定耶不定耶報盡定散入諸趣耶答經論多約一分住果報不更進修者言之若進修者隨禪上生壽應無定若不上生散入諸趣何疑二結示阿難如是六天形雖出動心迹尚交自此以還名為欲界交光云欲字謂欲界躁動之心其說是也長水云此之六天身有光明飛行自在不同下之人趣故云出動前四天尚兼心欲以有味故後二天但是迹交以無味故俱舍頌曰六受欲交抱執手笑視淫此言地居兩天則形交𦦨摩則勾抱兜率則執手變化則對笑他化則相視葢彼文各據六天受欲而說今經則就人中辨欲事輕重用顯六天感報不同內心六欲是現行能招之因六天即所招報果也
