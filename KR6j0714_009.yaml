body:
  text: 二色界四初別明四初初禪二初正釋三一梵衆天壽二十小劫身半由旬阿難世間一切所修心人不假禪那無有智慧但能執身不行淫欲若行若坐想念俱無愛染不生無留欲界是人應念身為梵侶如是一類名梵衆天前明六欲天初云諸世間人不求常住此總斥欲天不求常住之果也今明色界初云一切修心人不假禪那無有智慧亦總斥色界諸禪也修心是以禪定修心無智是無觀智故以禪那斥之梵語禪那此云靜慮乃止觀不二之義盡理而言二乘入空是偏定菩薩出假是偏慧總為禪那所斥今獨斥禪天者此以出世上上禪對斥根本味禪以其初得禪定而無觀慧之甚也若引申禪那之義亦可斥偏定偏慧之菩薩寧止世間禪乎問何不以奢摩他三摩提斥禪天耶答此二為禪那所攝獨舉禪那已該餘二況禪那之名顯兼定慧對斥禪天有定無慧文便故取之耳但能下身不淫也若行下心不淫也愛染不生是無淫因無留欲界是離欲果當知愛染所以不生必由六行觀之力故辭世之日不留欲界應念者不指現在世謂臨終時應念生色界也初得色定當為梵衆大論云已得離淫火則獲清涼定如人大熱悶入冷池則樂言六行者厭下苦粗障欣上勝妙離今以欲界為苦粗障初禪為勝妙出至修二禪還以初禪為苦粗障也隨修一行得入上地色界絶無女人兼無食眠三欲俱忘稍覺飢倦即入禪定出定則飽滿精明二梵輔天壽四十小劫身一由旬欲習既除離欲心現于諸律儀愛樂隨順是人應時能行梵德如是一類名梵輔天既有九品則此中所發勝于前也補遺云欲習既除名伏為除也離欲心現初禪發也以初禪九品次第發故長水云于諸下明此天于定共戒心愛樂而體隨順文故臨終時應念能行梵德內定外戒即梵德也又梵王具慈悲喜捨四無量心今匡輔梵王亦能行此德矣三大梵天壽六十小劫身一由旬半身心妙圓威儀不缺清淨禁戒加以明悟是人應時能統梵衆為大梵王如是一類名大梵王初天云執身不淫次天云離欲心現今承上云妙圓蓋初禪有九品下地不測曰妙具發九品曰圓前但云愛樂隨順今于定共戒能具行無缺定共禁戒故云清淨梵王為三界之尊若非明悟豈能統攝佛地論云離欲寂靜故名曰梵具云梵摩此云清潔寂靜謂創離欲染故名清潔得根本定名為寂靜貌如童子身白銀色衣黃金衣禪悅為食資中云俱舍論明大梵天威德光明獨一而住無尋唯伺定力所感下二天具有尋伺餘如桐洲注二結示阿難此三勝流一切苦惱所不能逼雖非正修真三摩地清淨心中諸漏不動名為初禪勝欲界故名曰勝流雨公云此二天若據阿毗曇婆沙論豎分當有三層相去倍遠若天民天臣天王各居一層何成一統且臣民可許衆多而天王獨居一層彼此皆王何所使令或是以德之優劣相較堪為民為輔為王耳故列為三非一天盡臣民而無王一天盡王而無臣民也據俱舍云梵王無別處所但於梵輔中有高樓閣是又云威德光明獨一而住此似梵王獨尊而梵民梵輔共居一天而供使令此則三天同在初禪秪一地耳正以獨一而住之言見三天之同居也荊公云諸漏不動雖未能伏漏然能持使不動此天有覺觀支故或云此天伏鼻舌二識除段食故二二禪二初正釋三一少光天壽二大劫身二由旬阿難其次梵天統攝梵人圓滿梵行澄心不動寂湛生光如是一類名少光天據其次梵天之言則二禪亦名梵天統攝至梵行據古解皆以為牒前以後三禪之文例推則躡前更進其說為是澄心下是正明少光也已離覺觀故曰澄心不動論云是故離覺觀得入一識處內心清淨故定生得喜樂二禪有四支內淨喜禪一心寂湛生光是定心發光應是內淨支也二禪以內淨為正支此天以光之多少而分等級其光尚少名少光天考小千世界至初禪中千至二禪大千至三禪則初禪統千帝釋二禪統千梵王以此解統攝梵人義亦有據或云一世界有一初禪故云小千至初禪是則二禪方統千梵王及小千世界二禪方統千梵者謂初禪不能統千釋也二無量光天壽四大劫身四由旬光光相然照耀無盡映十方界遍成琉璃如是一類名無量光天長水云從前少光更發多光光相轉增名光光相然溫陵云定力轉明妙光迭發境隨光變遍成琉璃真際云映十方界者約其定光隨所受用東西等言之非遍十方世界文既統小千世界則十方之言所該亦廣三光音天壽八大劫身八由旬吸持圓光成就教體發化清淨應用無盡如是一類名光音天吸言不散持言不失不散不失則光圓矣此天內無覺觀外無語言惟以光明而成教體發化清淨者謂所發之光清淨無染十四變化中二禪具三種變化一二禪化二初禪化三欲界化從內淨支發故皆清淨雖無覺觀語言應物之用更廣此皆二禪天王之事此天王不出號令而以光為指示光即是音二結示阿難此三勝流一切憂懸所不能逼雖非正修真三摩地清淨心中粗漏已伏名為二禪吳興云地持論目二禪名喜俱禪此定生時與喜俱發故今云一切憂懸所不能逼問初禪五支已具于喜何以二禪方名喜俱答初禪有覺有觀猶帶憂懸今覺觀俱盡故別受斯稱文覺察八觸十功德稍有不如法焉得無憂粗漏已伏者溫陵云初禪方得漏心不動而未能伏此天已伏粗漏則業漸劣行漸勝也其說甚是或云二禪伏前五識故無尋伺未伏第六故有喜樂亦是一說三三禪二初正釋三一少淨天壽十六大劫身十六由旬阿難如是天人圓光成音披音露妙發成精行通寂滅樂如是一類名少淨天如是二句牒前也披音露妙下正明三禪也披去光音之教跡露出妙性之正定發成精行者此天伏六識現行離喜支是精行也言寂滅樂者前初禪內有覺觀外有語言二禪雖無語言以光為音今并去其音是寂滅樂二禪有內喜之染此中去之所以名淨證得少淨故通入于寂滅樂也三禪有五支今文咸具披音露妙即是慧支發成精行是捨支亦兼念支通寂滅樂是樂支一心支大論云由愛故有苦失喜則生憂離苦樂身安捨念及方便論言離苦樂者謂三禪中離苦得樂方便即慧支也二無量淨天壽三十二大劫身三十二由旬淨空現前引發無際身心輕安成寂滅樂如是一類名無量淨天憂喜咸除名為淨空吳興云既得少淨空相現前復以定力引發少相令無邊際望上未遍望下則多故名無量長水云徹意地樂遍身輕安名無量淨文淨空是淨引發無際是無量三遍淨天壽六十四大劫身六十四由旬世界身心一切圓淨淨德成就勝託現前歸寂滅樂如是一類名遍淨天上身心輕安且言其內今世界等者總攝于外樂淨圓融通于依正并世界亦為離憂喜之域此殊勝妙樂即淨德也言成就者謂天中妙樂至此更無可加便認以為清淨極樂之鄉終身歸託之地故曰託曰歸由彼淨業無處不遍故曰遍淨二結示阿難此三勝流具大隨順身心安隱得無量樂雖非正修真三摩地安隱心中歡喜畢具名為三禪雨公云具大隨順者言此妙樂無不隨心順意故曰大也身心安隱者前初二禪心有喜受故多散動不得身親受樂今喜受既除身心皆親受無量妙樂故得安隱言歡喜畢具者顯身心俱受樂也資中云具大隨順者意地異熟樂隨順自在故熏聞云異熟樂者徹于意地遍身適悅與五識相應不可分別也文離掉動為安隱心三禪之樂亦名歡喜吳興云名同體異不以文害意也四四禪二初明四根本二一正釋四一福生天阿難復次天人不逼身心苦因已盡樂非常住久必壞生苦樂二心俱時頓捨粗重相滅淨福性生如是一類名福生天初三句結三禪之德離下界內喜之動則身心不逼具足如俱舍論說第四禪離八災患謂尋伺苦樂憂喜出入息又不為三災所動名不動地苦因句明離苦所以以能伏愛故曰苦因已盡如偈云由愛故有苦失喜則生憂苦即憂喜也又喜是苦因成三禪樂故云苦因已盡樂非下顯三禪之過三禪雖得徹意地樂然不常住此名壞苦苦樂下正示福生色憂喜為苦無憂喜為樂今第四禪苦樂頓捨名曰捨受前一一地皆厭下苦粗障今以離三禪為粗重相滅心本無樂而樂生焉即粗重也或云粗重者即六識分別種子淨福性生者不壞即福補遺云樂壞苦生非所以為福也二福愛天捨心圓融勝解清淨福無遮中得妙隨順窮未來際如是一類名福愛天前捨心初生尚未至圓融今苦樂盡忘故云圓融捨心轉勝故云勝解由此淨福體性無遮能順後之七天名妙隨順後之七天名未來際吳興云得妙隨順即隨順下文二岐路也文是則望後二天名窮未來際豈真常住耶以愛樂修習勝妙之法得福愛名三廣果天阿難從是天中有二岐路若于先心無量淨光福德圓明修證而住如是一類名廣果天先心之言當是福愛古人以四無量心釋無量二字當指初禪以來即修無量備歷四禪至此福愛更能增進此四等心能發淨光故云無量淨光也四等屬福德性至今離下地染故曰圓明不為外道不為聖人故云修證而住妙玄云四無量心有通別二修通者大論云是慈在色界四禪中間得修別者初禪修悲易二禪修喜易三禪修樂易四禪修捨易雨公云色界所感果報至此為極以四禪報境唯此三天第四無想是福愛之差支五不還天是三果聖人之別寓也四無想天若于先心雙厭苦樂精研捨心相續不斷圓窮捨道身心俱滅心慮灰凝經五百劫是人既以生滅為因不能發明不生滅性初半劫滅後半劫生如是一類名無想天資中曰此計無想為涅槃以捨心為方便初捨粗心入于微心復從微心入微微心從微微心便即灰凝身心下定成克果問身心俱滅與四空何異答此定中境界出定即有故不同也心慮灰凝者以伏六識分別之心如氷夾魚不知微細生滅妄謂涅槃是人不明無常之故是人但于六識加工以識捨識捨心相續豈非生滅縱自謂涅槃豈能證不生滅性乎五百劫中初之半劫猶覺有心方入無想最後半劫身心漸生即入無常二結示阿難此四勝流一切世間諸苦樂境所不能動雖非無為真不動地有所得心功用純熟名為四禪大論云若能知樂患見不動大安憂喜先已除苦樂今亦斷無為真不動地者或指第八為不動地考大經中持戒之果亦名不動地已證常樂我淨位在別初地圓初住也有所得者禪定是有所得心故至第四出入息斷苦樂俱除名功用純熟雨公云已上禪天初禪伏鼻舌二識無段食故二禪伏前五識三禪伏意識分別現行故得妙樂四禪伏意識分別種子故得捨心二明五不還三一總示阿難此中復有五不還天于下界中九品習氣俱時滅盡苦樂雙忘下無卜居故于捨心衆同分中安立居處習氣即思惑種子溫陵曰第三果人斷欲界九品修惑盡即生此天不復欲界受生故曰不還亦名五淨居謂離欲淨身所居也習氣惑也與現行皆滅故曰俱盡此指欲界無續生業也苦樂雙忘兼指四禪已下無續業也故云下無卜居此五天自四禪別立通名捨念清淨地故曰捨心同分二別明五一無煩天阿難苦樂兩滅鬬心不交如是一類名無煩天吳興云若有苦樂勢必相傾是猶鬬戰交于內心也長水云苦樂心滅敵對則亡形待既無故曰不交不交則無煩也即中云四禪九天咸除苦樂故名捨心衆同分也而聖獨得無煩名者將見苦樂兩滅之處即是真空法性故名無煩煩謂煩惱苦樂交鬬內心煩雜今始除之輔行云無煩之始得無煩名據此文豈非以斷思惑為無煩乎二無熱天機括獨行研交無地如是一類名無熱天機弩牙括筈也箭本受弦處也亦喻真心機括獨行雖欲求苦樂之交而無其地內心為煩外境為熱所行之地更無形對宜名無熱三善見天十方世界妙見圓澄更無塵象一切沉垢如是一類名善見天大千世界共一四禪三果人能見大千或更過之見色而色不能隔是妙見也圓則普照澄則清徹雖有色法莫能遮障故云更無塵象一切沉垢以塵象是深沉垢穢所附著也輔行云見清徹故名為善見四善現天精見現前陶鑄無礙如是一類名善現天精見現前躡前文也見無不到不為塵象所隔故云精見陶鑄下明今意陶鑄融鍊也範土曰陶鎔金曰鑄既易障隔而為通明即能轉變萬象現十四變化乃指變化為善現耳輔行云果易障故名為善現若是即障礙已易故云陶鑄五色究竟天究竟群幾窮色性性入無邊際如是一類名色究竟天吳興曰究竟研窮之義也幾者動之微也研窮多念至於一念故曰究竟群幾以雜修五品初用多念無漏熏多念有漏乃至最後用一念無漏熏一念有漏名上極品云云窮色性性者上性字是色之性下性字即是總性體也入無邊際者如馬勝問佛四大性當于何位滅盡無餘佛云空處近分正在頂天也輔行云色中無上名色究竟考輔行云五那含者若以地為名但名第四禪此禪九處五是聖居名五含天無想唯凡三通凡聖生五含者由修熏禪有五階差大品九定通熏九地此中唯熏第四禪地先修得已更以多念無漏相續現起從此引生多念有漏從此復生多念無漏如是後後漸漸減少乃至最後復生二念無漏次復引生二念有漏復生二念無漏名熏加行成相次唯一念無漏次復唯有一念有漏無間復生一念無漏名根本成相故俱舍云成由一念雜言五差者謂下中上上勝上極一品有三後品兼前故第五品合成十五如是五品如其次第三六九等生五淨居言夾熏者謂前後無漏中間有漏使多念有漏俱成一念無漏故名夾熏據輔行文當于夾熏根本成後方生五淨居雖有下中上上勝上極之分皆是前後一念無漏熏中間一念有漏也據吳興注則以多念無漏熏多念有漏為下品至後一念無漏熏一念有漏為上極品智者詳之三結示阿難此不還天彼諸四禪四位天王獨有欽聞不能知見如今世間曠野深山聖道場地皆阿羅漢所住持故世間粗人所不能見聖道場地如白道猷之方廣唐玄宗之回向寺也然乃四果別居人所不見今是三果聖人寄居四禪不及羅漢但以為例而已溫陵云下天修有漏凡定此天修無漏聖業粗細有異故不能見二總結阿難是十八天獨行無交未盡形纍自此已還名為色界孤山曰獨行無交俱無情欲故未盡形纍尚有色質故三無色界二初正明二初明感報二一簡回心不入復次阿難從是有頂色邊際中其間復有二種岐路若於捨心發明智慧慧光圓通便出塵界成阿羅漢入菩薩乘如是一類名為回心大阿羅漢色究竟天居有色頂與無色鄰名色邊際若謂慧光圓通但是盡無生智秪應成阿羅漢何由入菩薩乘應知發明智慧必是中道智光故即云慧光圓通如是則以大小乘為二岐也義縱不然亦當以發明智慧當盡無生智慧光圓通便入大乘所謂別圓入通于義方順凡夫尚有別圓之機羅漢寧不受接以通真含中中又二種但中圓中但中來接是別接通不但中接是圓接通以得盡無生智故出塵界成阿羅漢以別圓來接是入菩薩乘不必同涅槃五人發心彼五人發心動經八六四二等劫今在界內即回心故亦不必為破定性之明文今別圓接通法華前亦有此機故回小向大故曰回心二明生者類殊二初別明四天四一空處若在捨心捨厭成就覺身為礙銷礙入空如是一類名為空處初二句躡前長水云捨心有二一者若于有頂用無漏道斷惑入空即樂定那含也二者若于廣果用有漏道伏惑入空即凡夫外道也文覺身下正明空處輔行引大品云為過一切色相滅有對色相不念種種相入無邊空處大論釋云過一切色滅可見有對色滅有對色滅不可見有對色不念種種色相滅不可見無對色一切色法唯十一種謂五根塵法入少分阿毗曇云一可見謂色是二有對有十謂五根塵若云不可見有對應但云五根四塵三不可見無對謂法入少分欲入無色故滅此三滅色方便具如禪門先想此身如甑如籠如網乃至漸空佛弟子修八聖種觀等者病癰瘡刺及無常苦空無我名聖種觀前四對治後四緣諦故以此八緣于無色有總有別總者總以八觀觀彼四陰和合不實別者前之四種治四陰事受如病想如癰行如瘡識如刺以無常等治四陰理無常觀識苦觀于受空觀于想無我觀行以有此八心易生厭疾能捨離修習無漏云云又輔行云空處如病識處如癰無所有處如瘡非想如刺今初成空處而即云如病者以佛弟子能捨自地著也二識處諸礙既銷無礙亦滅其中唯留阿賴耶識全於末那半分微細如是一類名為識處依正之礙既銷無礙之無亦滅色空既盡六識分別不行則唯留阿賴耶識而七八相依七識恆執八識為自內我然七識不緣第六今六識已伏而云全於半分者以轉末那功在第六六識分別既伏則七識中分別之法因第六而有者亦與六識同伏故云全于半分微細也若據唯識末那不緣外境唯執八識見分為我今根身既除前五識不行則八識見分中粗緣已無唯留半分微細執于識體而已空多則散捨空緣識與識相應名識處定三無所有處空色既亡識心都滅十方寂然逈無攸往如是一類名無所有處前捨空緣識識又生滅故捨識緣無所有識心指六七二識然末那何以得滅憑深定力伏其現行而使不行非真滅也蓋前天七識緣八能所歷然即是現行今緣心暫息名為都滅豈種現俱斷之謂乎逈者遠也前空識無邊則遠處似有可到今滅空識是滅無邊之相斯遠處無所往矣四非非想處識性不動以滅窮研于無盡中發宣盡性上句明存下句明盡如存不存若盡非盡如是一類名為非想非非想處止觀云識處如癰無所有處如瘡捨識無識即是非想非非想或云前以末那為識心此以第八為識性此說甚有眉目不動者逈無攸往也以滅窮研者前天以定力伏末那此天更加功用研窮識性而欲滅之既無金剛三昧斷最後惑而強于無盡中發宣盡性無盡故如存盡性故不存盡性故若盡無盡則非盡似存不存故非想也似盡不盡又非非想也在外道法亦自名為非想非非想如須跋陀所云二總辨二類此等窮空不盡空理從不還天聖道窮者如是一類名不回心鈍阿羅漢若從無想諸外道天窮空不歸迷漏無聞便入輪轉吳興云此等二句通該聖凡斯言是也大經須跋陀言是非想非非想即一切智寂靜清淨常恆不變是故我能調伏其心佛言善男子汝云何能調伏心耶汝今所得非想非非想定猶名為想涅槃無想汝云何言獲得涅槃汝已先能訶責粗想今者云何愛著細想如是非想非非想處故名為想如癰如瘡如毒如箭故今文云此等窮空不盡空理不回心者明此後不肯回心是人樂定在四禪不能盡漏直至非想斷盡餘思非鈍而何又此後不肯向大亦名為鈍那含是標其因羅漢是標其果若從無想下如補遺所釋為是不歸謂不歸真理交光以無所歸托解之非也或指廣果皆名外道其說亦非如補遺云此等指前四空也窮空該于二類即不還無想自從不還下釋出二類窮空不歸者謂外道徒能窮空不反照性不歸真理也則顯不還能窮空歸真者矣但諸師泥于經論便謂無想不能復至四禪四空或指廣果同名無想或以不歸強作不來唯孤山云然人根不一諸教偏說一分耳況今明云從無想諸外道天來豈可違經蓋由無想天者外道所居多分壽盡應墮又是斥邪不得不爾豈可無報盡復生四空者乎無想初生半劫想未全滅又五百劫後仍經半劫有想復生既未墮落有利根者又復窮空乃生上天也言迷漏無聞者謂不廣聞聖教不辨諸禪漏與無漏修證行相命終隨業必入諸趣二辨王民阿難是諸天上各各天人則是凡夫業果酬答答盡入輪彼諸天王即是菩薩遊三摩地漸次增進回向聖倫所修行路此文結辨四空王民而兼帶前天義無不可有欲移置後文恐未必然天人即臣民也前修八定之業後得四禪四空之果是相酬答天王是菩薩言漸次增進者謂增進果位溫陵所云寄位升進是也回向謂回事向理聖倫即五十五位雖為天王實修入于菩提故云所修行路溫陵云通皆欲色無色天也其衆乃隨業感報未出輪回其王乃隨行權應寄位升進華嚴謂初地菩薩多作閻浮提王二地輪王乃至六欲三梵天王是也此豎論已終故通結指幽溪云溫陵引初地作人間王等者以其皆法身大士故也論圓教初住已證法身華嚴云初發心時便成正覺所有慧身不由他悟清淨妙法身湛然應一切應以何身說法即皆應之則初住多作閻浮提王矣今云初地豈華嚴兼別之言乎孤山云遊三摩地者以菩薩善入出住百千三昧故住此定而為天主九次第定名善入師子奮迅名善出超越名善住一一皆能深達實相號首楞嚴二結示阿難是四空天身心滅盡定性現前無業果色從此逮終名無色界身心既滅則定為內性故云定性現前然非性體逮終如六萬八萬等溫陵云身心滅盡者無色蘊及粗識也孤山云無業果色顯有定果色也補遺云色是有質礙義定法持心使不散亂似有質礙亦假色也若顯揚聖教論定自在所生色乃定之用非定果之比定果色具如百法論二總結虗妄此皆不了妙覺明心積妄發生妄有三界中間妄隨七趣沉溺補特伽羅各從其類此總結三界諸天無非積妄發生成現行能招報因妄隨七趣感所招報果妙覺明心謂三諦一心也積妄者如因明立所所既妄立生汝妄能等三界是輪回之處于三界中妄隨七趣沉溺天人有報盡入輪者故得論七趣也各從其類者如應感無色則生無色界天之類孤山曰補特伽羅此云數取趣謂諸有情起惑造業隨諸趣受生天如曰能取當來諸趣即中有也幽溪曰成論明極善極惡皆不經中陰如䂎矛離手故也今七趣中三途則屬極惡天仙則屬極善善惡相兼惟人與修羅耳今既總結虗妄其可以中陰釋之乎應是取其義相明之衆生七趣往來數數捨此生彼通名補特伽羅皆是所招報果也七修羅趣復次阿難是三界中復有四種阿修羅類若於鬼道以護法力乘通入空此阿修羅從卵而生鬼趣所攝若于天中降德貶墜其所卜居鄰于日月此阿修羅從胎而出人趣所攝有修羅王執持世界力洞無畏能與梵王及天帝釋四天爭權此阿修羅因變化有天趣所攝阿難別有一分下劣修羅生大海心沉水穴口且遊虗空暮歸水宿此阿修羅因濕氣有畜生趣攝修羅是六趣之餘故在後列或謂第二修羅從天而降前生是天今為修羅則第一修羅從鬼而升前生是鬼今為修羅未必然也第二從天降判屬人趣今從鬼升何亦屬鬼趣耶即中云若于鬼道是現在鬼道中也或以前生今生護法力故乘通入空通是五通不但以入空為通此修羅現從卵生既在鬼道即屬鬼趣鬼多有通故也第二若于天中是其前身降德者謂為天而無天德因此貶墜然天福未盡居鄰日月前生今生皆在天上而判屬人者以從胎生也第三獨稱王修羅之尊者也洞者徹也其力貫穿世界而無所畏尚與梵王爭權況帝釋四王乎或謂是羅睺阿修羅王亦未可定羅睺是畜生種今是化生補遺云生大海心總舉其處也沉水別目也即中云生大海心是生于海沉水穴口是居于海在泄水之穴故云穴口莊子云尾閭泄之注云尾閭東海川名疏云尾閭泄海水之所也在碧海之東其處有石濶四萬里百川之下尾而為閭族故曰尾閭旦遊暮歸狀若蛟龍判屬畜趣或指為毗摩質多阿修羅王然毗摩質多腳波海水手攻善見帝釋以般若呪力不能為害又是帝釋嶽父似之而已不可全同二結示勸斷二初結示二勸斷初又二一結能所本妄二示悟無能所初又二一能招現行因妄阿難如是地獄餓鬼畜生人及神仙天洎修羅精研七趣皆是昏沉諸有為相妄想受生妄想隨業于妙圓明無作本心皆如空華元無所著但一虗妄更無根緒一切浮塵諸幻化相皆如空華本無所有是用最初方便推破不在內外中間七處不從自他共離而生故現行能招因妄皆空也精研者謂精細研核無觀照故名為昏沉無正定故逐有為相皆昏散之為害也妄想是惑因七趣受生即是苦報報必由業故即云妄想隨業惑即貫于業苦之中此二句該三道若望妙心本無所有妙圓明即三諦雖具諸法體兼用冥更無為作不起分別思量即是其體名曰本心在此心中七趣皆同空華空華不著虗空則七趣亦不著本心有本云元無所有無有即無著之意但一下結成虗妄前問此道為復本來自有為是衆生妄習生起今答云更無根緒根謂根元緒謂由緒即非性中本有明矣二所招七趣果妄阿難此等衆生不識本心受此輪回經無量劫不得真淨皆由隨順殺盜淫故無此三種又則出生無殺盜淫有名鬼倫無名天趣有無相傾起輪回性長水云從此等至不得真淨示妄想受生也從皆由至無殺盜淫示妄想隨業也有名下結輪轉溫陵云前問妙心遍圓何有獄鬼人天等道故此結示由殺盜淫三為根本有是業則名鬼倫言必墜也無是業則名大趣言必升也出生無殺盜淫即天趣也七趣舉二以善惡通攝也文有無相傾者或從有而無或從無而有其性相奪譬如車輪互為高下然此所招七趣果報皆一虗妄也二示悟無能所二一妙悟皆無若得妙發三摩提者則妙常寂有無二無無二亦滅尚無不殺不偷不淫云何更隨殺盜淫事四運推破則三觀全顯解行證法當下圓成歸無所得矣何更有現行名相哉三摩提如前釋假即空中為妙發也長水曰妙般若也常法身也寂解脫也有無二無非生死也無二亦滅非涅槃也二妄生本無阿難不斷三業各各有私因各各私衆私同分非無定處自妄發生生妄無因無可尋究妄生無尋即四運推之此等現行能招報心不從東西南北去也溫陵云前問地獄為有定處為復自然彼彼發業各各私受故此牒答文諸家解此文謂首二句明造業各私次二句明受報有同分地然前阿難問中各各私受是約報說今結答前文各各有私何妨約報謂業既私造報亦私受所造業同故有同分地而為定處定處即共處耳雖有定處元從妄生此答自然二字若云自然即似本來元有故今云自妄發生非自然而有也即妄之生亦復無因二勸斷二一結勸得失汝勗修行欲得菩提要除三惑不盡三惑縱得神通皆是世間有為功用習氣不滅落于魔道雖欲除妄倍加虗僞如來說為可哀憐者汝妄自造非菩提咎習氣即荊溪云過現習生現行相應惑也汝勗修行是寄阿難勸勉他人長水云要除三惑者此正勸也前文云三緣斷故三因不生狂性自歇歇即菩提不盡下明不斷之失修禪不持戒是即魔羅業前文云若不斷淫必落魔道若不斷殺必落神道如不斷偷必落邪道豈非世間有為功用乎此句亦可該天仙等也習氣下似專誡淫此經所重殷勤告誡魔意亦欲除妄其如虗僞轉增乃如來所憐也汝妄自造者謂上魔道自妄而生非心體有咎二結顯邪正作是說者名為正說若他說者即魔王說名為正說者如上所明十習六交升沉七趣之現行能招報皆是妄因妄果以之為所觀之境而用修德四運推破此等起心了悟當體全空一一皆妄圓解既足更勗修行斷除三毒若得妙發三摩提者則妙常寂有無二無無二亦滅圓滿菩提歸無所得是為觀察現行能招報心以明修證一期事畢名為如來正說此之觀境正同止觀歷餘一心即空假中例餘陰入皆用十乘法也否則魔說矣示現行能招報竟二詳得發能招報如前七卷中正觀總無明心時現行因果之心雖或不起而用功深切觸動宿習或貪或愛業病禪見紛紜而起此等境起本在牽生今欲正觀出世魔業伺便而興妨禪害觀令入輪回行人不知以為勝解心生取著即入群邪故名發得能招報如云汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落於邪見乃至墮阿鼻獄為害既深所當詳示而破斥之不令住著也既不住邪即歸正觀倘現起不休又當如止觀例用四運十乘推之本空以顯三諦而入性藏則一切事始得究竟堅固矣在止觀名煩惱病魔禪見等九境發則為觀不發不觀荊溪云彼因觀發昔是也為二一正明發相二更斷餘疑初又二一結前即時如來將罷法座於師子牀攬七寶几回紫金山再來憑倚普告大衆及阿難言汝等有學緣覺聲聞今日回心趣大菩提無上妙覺吾今已說真修行法將欲罷而再來憑倚知有說以普利群生也古云曾來方識路高低禪那細境非初心能知故為不請之示也真修行法如上所示正觀總無明心七卷半文及詳現行能招報七趣因果是也此等並是所觀之境俱得為觀若總若別隨於一境可顯三千三諦入如來藏故云已說真修行法二正詳二一詳明發得二結勸欽承初又二一標示能所三一標示又二一標汝猶未識修奢摩他毗婆舍那微細魔事魔境現前汝不能識洗心非正落于邪見二示或汝陰魔或復天魔或著鬼神或遭魑魅心中不明認賊為子又復於中得少為足如第四禪無聞比丘妄言證聖天報已畢衰相現前謗阿羅漢身遭後有墮阿鼻獄陰魔天魔等標示發得能招報之因墮阿鼻獄標示發得所招報果微細魔事落於邪見是總標能所陰魔下又是列示能所須知陰魔五十種境即止觀所明煩惱見慢九境發起則觀不發不觀今正論發起能招報也止觀觀餘九境既一一皆用十乘今亦應爾但佛意要在正觀總無明心為主若此等因修發昔之境只須說破令行人不著即歸正路所謂識得不為冤故少示修證之文然而理必具焉例正可知也即止觀觀發得九境雖列十乘亦但略例而已佛祖同心蓋可知矣洗心非正者謂不以正法而洗滌其心也孤山云奢摩他止也毗婆舍那觀也依常住真心修圓融止觀未入初住則多動魔事吳興云此等魔事悉是觀行位中所發從相似位破見惑後必無大妄墮獄之理若十信中縱有魔事觀力易防非此經所說之意孤山謂未入初住指位太深矣交光云言陰魔者即色陰中初心自現不自外來者天魔鬼神魑魅皆受想二陰所現者觀下經文云得少為足方指行陰所發心魔識陰所發見魔皆無外境但是自心邪見得少為足耳如此分文一往觀之似有眉目再往觀之義則不然蓋陰魔之言該于五陰天魔至魑魅雖受想心中所現然色陰中亦云此名邪心含受魑魅或遭天魔大槩陰魔內動魔鬼外應前之三陰皆有其文魔鬼是賊謬認為子即壞禪觀至下行識二陰發心見二魔多成外道魔外皆賊故經誡之則認賊為子之言亦該五陰明矣下文以四禪無聞比丘為例者經五陰下佛皆結云衆生頑迷不自忖量謂言登聖大妄語成墮無間獄故先以無聞比丘為例亦通五陰豈局于行識之文耶長水引智論云此比丘不尋經論師心修行無廣聞慧不識諸禪三界地位但精勤不息證初禪謂是初果乃至四禪離八災患謂證四果至無常時四禪中陰見有生處忽然起謗吾聞羅漢已得無生今日云何更有生處若如是者佛說羅漢盡是虗妄故知無有證涅槃者因此邪見天中陰滅墮阿鼻獄此四禪天報已畢衰相現時當生餘道遂起謗墮獄耳二許宣汝應諦聽吾今為汝子細分別三佇聽阿難起立并其會中同有學者歡喜頂禮伏聽慈誨據有學歡喜則所勗者必非十信後心之人也二釋明能所二一總明發得因由二別釋發得相狀初又三一明發得因由二明魔發本意三明損益勸誡初又二一生佛理同佛告阿難及諸大衆汝等當知有漏世界十二類生本覺妙明覺圓心體與十方佛無二無別此推原其始以明魔發之由本覺妙明三諦之理也三諦在一心中故云覺圓心體無二無別者輔行云其相無二其性無別二迷悟事別二一迷真起妄由汝妄想迷理為咎癡愛發生生發遍迷故有空性化迷不息有世界生則此十方微塵國土非無漏者皆是迷頑妄想安立當知虗空生汝心內猶如片雲點太清裡況諸世界在虗空耶大經云夫著相者則能生癡癡故生愛今起妄想而迷理者即著相也以無相為有相即癡也因而愛此事相覺體遍迷遂成空性虗空無所不到隨迷變化故曰化迷此依空立世界也吳興云非無漏者謂微塵國土悉是有情有漏之所變造亦可此句別指衆生正報兼于上文復具虗空之同世界之異非無漏者即有為法無同無異吳興此解最是然一往言之有情所造且屬世界迷謂迷理頑謂無知妄想是迷頑之體也當知下喻顯真心甚大虗空甚小心是覺明空是迷頑故以片雲太清比之二悟理魔發二一明歸元妄滅汝等一人發真歸元此十方空皆悉銷殞云何空中所有國土而不振裂或云虗空無相何言銷殞答空是昏昧之法無日月燈則無光明此正是無明之相寧不消殞虗空國土悉皆消裂魔發之由正在此矣二明將歸魔發分二一明諸聖心通汝輩修禪飾三摩地十方菩薩及諸無漏大阿羅漢心精通㳷當處湛然此文正明動魔飾謂修飾所修之禪乃是飾三摩地不同世間禪也㳷應是䐇武粉切合也㳷音忽是青黑色即非今意湛然是了悟之意亦不動之意正當合聖即動諸魔次明魔凡驚懾一切魔王及與鬼神諸凡夫天見其宮殿無故崩裂大地振坼水陸飛騰無不驚懾凡夫昏暗不覺遷訛因大地振坼故異類皆驚遷訛是遷動或解是訛傳未必然也吳興云凡夫昏暗不覺遷訛是釋伏疑也恐疑者云魔及諸天既見其相凡夫何事都不覺知故此釋云初明發得因由竟于三摩中觸動發起牽人入魔正發得能招報之九境也二明魔發本意彼等咸得五種神通惟除漏盡戀此塵勞如何令汝摧裂其處是故神鬼及諸天魔魍魎妖精于三昧時僉來惱汝僉皆也三明損益勸誡然彼諸魔雖有大怒彼塵勞內汝妙覺中如風吹光如刀斷水了不相觸汝如沸湯彼如堅氷暖氣漸鄰不日消殞徒恃神力但為其客成就破亂由汝心中五陰主人主人若迷客得其便當處禪那覺悟無惑則彼魔事無奈汝何陰消入明則彼群邪咸受幽氣明能破暗近自消殞如何敢留擾亂禪定若不明悟被陰所迷則汝阿難必為魔子成就魔人如摩登伽殊為眇劣彼惟呪汝破佛律儀八萬行中只毀一戒心清淨故尚未淪溺此乃隳汝寶覺全身如宰臣家忽逢籍沒宛轉零落無可哀救被陰所迷發得能招之因汝為魔子發得所招之報也初有三喻幽溪云初如風吹光乃以不動而勝動次如刀斷水是以柔勝剛共喻妙覺照而常寂之體方魔境現前果能寂然不動其奈我何哉故曰了不相觸第三喻汝如沸湯彼如堅氷乃以陽而勝陰喻妙定寂而常照之力下文云彼等群邪咸受幽氣明能破暗故曰暖氣漸鄰不日消殞即中云前之兩喻明魔不能加害第三喻明不惟無害反能化彼四主客喻總貫下文客是外人元不能為損成壞皆由主人主人喻修正觀之心不必定其真妄言主人若迷者喻執陰為真如主人或昏或醉則客能為損上雙標成壞已竟當處下先明成就長水云當處禪那者勸依本修治其說是也幽溪云當處禪那有二義一任彼魔來現怪我心寂爾如空然魔有強軟強來以寂軟來以照若慈雲之讚智者華頂降魔云強軟消磨寂照功是也又如首楞三昧經云觀魔界如佛界如若魔界如即佛界如一如無二如則魔界無所捨佛界無所取不取不捨所謂當處禪那也自若不下次明破亂不明悟者謂不識是魔被陰所迷者五陰未破所現虗妄境界彼謂聖境即是被迷是觀心主人既迷而魔得其便發得能招因果具在是矣吳興云此寄阿難用警凡衆魔子謂魔所生魔人謂人中之魔眇細微也以未淪溺而見登伽力小但破佛律尚非己法身寶覺是己法身全身固非一戒功行將成喻宰臣位高總明發得因由竟二別詳發得相狀五初色陰分三一總示始終二正詳發得三結過勸示初又三一三昧所依阿難當知汝坐道場銷落諸念其念若盡則諸離念一切精明動靜不移憶忘如一當住此處入三摩地破陰是修先須見道故論離念坐道場者破無明也起信論云若離于念名為得入則銷落諸念為坐道場之前相明矣念盡則為見道之位遇事明了不勞卜度是離念一切精明也蓋不得精明之體不能離念諸念盡滅精明現前故居靜不移涉動無失忘之而觀智明明憶之而寂體了了譬如明鏡不以不照而失其明也當住下明三昧必從此入于此見道亦即于此修道決定物情使無他向二示始終二一不盡始相如明目人處大幽暗精性妙淨心未發光此則名為色陰區宇如明目下明色陰未盡明目之人處于大暗則無所覩是虗空為之障也以空體晦昧無日月燈即無所照今精性亦然精者不雜根塵妙者不可思議淨者遠離生滅此性明了如明目人而心光未發亦為虗空所昧雖知心體離念然內不見五藏外不見山河晝則有見夜則無見與明眼人處暗無異豈非色陰為之障乎如者假如非譬如也目能見色故將明目對辨色陰古人以此為譬豈不謬哉為色陰拘局故曰區為色陰蓋覆故曰宇二已盡終相若目明朗十方洞開無復幽黯名色陰盡是人則能超越劫濁山河不能障虗空不能昧是色陰盡若目明者目明必賴日月燈光若心光發時十方洞開不假三光內見五藏外見山河晝能徹見夜不能昏至此名色陰已盡一切色法皆起虗空而劫濁以虗空為體以劫濁是總四濁是別而虗空總乎地水火風故是劫濁之體也今超色陰能破虗空則超劫濁可知三結顯妄源觀其所由堅固妄想以為其本觀所由者觀色陰所由也國土雖起虗空而根身器界莫非窒礙故是堅固妄想所成破此妄想是第一重破無明也所云破者破其堅固妄想而已下四亦然二正詳發得十一身能出礙阿難當在此中精研妙明四大不織少選之間身能出礙此名精明流逸前境斯但功用暫得如是非為聖證不作聖心名善境界若作聖解即受群邪當在者正當也此中者色陰將破未破之中間也精研即是深觀涅槃云于己身中觀如來性有人木塵蟲等喻亦是此意因正觀總無明心用功既深乃發斯境即能招之因受群邪即所招報果也地水火風四大相織而成根境今四大不織外境虗融而大相欲滅然少選身能出礙耳非一得永得也此名等者定其名以見非聖證也謂此名自性精明流溢于目前外境暫得應上少選是工夫邊事不可言證行人得遇此境不自滿足以謂證聖誠為修觀得力之處若遽起證聖之解是未得謂得故外魔乘間而入漸成大害所謂主人若迷客得其便也經四大不織少選之間身能出礙前以外境虗融解四大不織其義略顯今謂如一石壁體是地大而水勢劣火結為高山則具水火有水火則有風此四大織成石壁也今觀地無堅性風無動性水性不住火性無我四大欲亡何能織乎如是則石壁不可得此山壁由之直度也山壁既爾餘亦例之大論云云何觀一切法一相所謂觀一切法無相如四大各各不相離地中有水火風但地多以地為名水火風亦如是此乃四大相織之明證也妙玄引此文竟復云今觀無此異相若火中有三大三大應併熱若三大在火中三大遂不熱則不名火若三大併熱則三大捨自性皆名為火無復三大若言有三大而細不可知此與無何粗可得則知有細若無粗則無細此不織之觀發相未嘗不好但心一著即受群邪佛既詳示意令行人不著脫有著者又當用四運十乘明破明顯而修證之矣則知佛詳發得五十陰魔有兩意一令不著以入正觀二令識境以明修證也二拾出蟯蛔阿難復以此心精研妙明其身內徹是人忽然于其身內拾出蟯蛔身相宛然亦無傷毀此名精明流溢形體斯但精行暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪蟯腹中短蟲蛔腹中長蟲拾出蟯蛔而無所傷此內身無障礙也精明本無礙故流溢之處亦無礙精行者性精流行三內外通聞又以此心內外精研其時魂魄意志精神除執受身餘皆涉入互為賓主忽于空中聞說法音或聞十方同敷密義此名精魄遞相離合成就善種暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪醫書云魂藏于肝魄藏于肺意藏于脾志藏于膽精藏于腎神藏于心此六不拘于內不專于外因精研妙明六腑虗融故除其色身質礙之外魂魄等六互涉也互為賓主古本云若為賓主未知孰是法音密義皆善根所發此善根由虗融而發也空中說法一處說法也十方同敷十方說法也離是離本位合是合他位虗融之中善種成就故聞說法得未曾有而法門密義從此皆知之矣長水云善種者謂先所習聞熏種子定力所激禪中發生遂寄神魄現于說法此善種成就之相經除執受身餘皆涉入執受身者謂根身是八識所執受也古解執受各具二義執二義者一攝義二持義言攝者即攝為自體也言持者即持令不散受二義者一領義二覺義領者即領以為境覺者即令生覺受安危共同根身具執受四義一攝為自體同是無記性故二持令不散第八能任持此身令不爛壞故三領以為境根身是第八親相分故四令生覺受安危共同第八安五根安第八危五根危故若器世間量但緣非執受即受二義中領以為境一義今言除執受身者謂除其色身而內魂魄等六互相涉入也經意謂除有形之身彼魂等無堅礙之質故相涉入蓋色身雖有虗融之相而不能涉入魂魄等六方能涉入也善境界者即以為六根互用之先兆耳四見佛依正又以此心澄露皎徹內光發明十方遍作閻浮檀色一切種類化為如來于時忽見毗盧遮那踞天光臺千佛圍繞百億國土及與蓮華俱時出現此名心魂靈悟所染心光研明照諸世界暫得如是非為聖證不作聖心名善境界若作聖解即受群邪此心即色陰將破未破之心也毗盧遮那即法身也踞天光臺即報身也千佛圍繞即應身也言天光者當是第一義天之光華藏二十重世界第十三重又有一大蓮華舍那坐華臺釋迦坐華葉一華千葉一葉一釋迦一釋迦又現百億釋迦其餘九百九十九釋迦現身亦爾言心魂靈悟者心思魂氣俱為靈悟所漸染以色陰未全破故魂氣能為變現然心魂中以心為主研窮發明能照華藏中所有世界觀文意止辨其是悟非證如云靈悟所染又云非為聖證其義了然靈悟所染乘悟勢也又帶魂氣故非真證幽溪曰澄露皎徹者謂以止澄之以觀露之使此心皎潔清徹以是之故內光發明十方遍作閻浮檀色依報淨也一切種類化為如來正報淨也于時下見華嚴世界也或問此己力所至乎佛力所至乎魔力所至乎答己力所至也蓋娑婆原居華藏則一土一石莫非浮幢一種一類莫非覺體良為色陰所蔽餘陰所封故盲無所見今已澄露皎徹內光發明照諸世界使之發現如此比前功用似為更勝更不受不著則色陰盡在不久也熏聞云毗盧遮那此翻遍一切處斯是法身若見踞天光臺合是盧舍那報身之相以唐時譯經法報不分故也五空成寶色又以此心精研妙明觀察不停抑按降伏制止超越于時忽見十方虗空成七寶色或百寶色同時遍滿不相留礙青黃赤白各各純現此名抑按功力逾分暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪抑按而使其降伏制止而維以超越此伏無明之功也小乘中觀八色流光必先修胖青瘀等觀今因抑制而見空成寶色亦是此意同時遍滿者所謂彼彼交徹彼彼無礙也止觀釋十一切處云以青遍十方十方皆青餘色亦爾故名一切處若一切入者以青遍一切時黃來入青亦遍一切處青黃本不相失相入又不相濫餘色相入亦如是今意亦爾又寶色現者將化頑空為寶覺真空故現如斯止觀云八色之光是界外法則此是界外色現無疑矣然此等多是禪中所現或有五支八觸等如止觀說言抑按功力逾分者若論斷惑瞥爾便斷反不如此費力今是伏制故逾分耳然觀文意止明其是伏非斷修胖等豈非抑按始則抑按既則降伏後即制止不行皆兩字者見用力之意也或當以觀察不停為觀抑按等八字皆屬止是由觀入止然觀文意乃以勤修觀法故煩惱被伏所以先曰不停而下即云抑制等也溫陵云力用過越故妙明逼極煥散而現也六暗室見物又以此心研究澄徹精光不亂忽于夜半在暗室內見種種物不殊白晝而暗室物亦不除滅此名心細密澄其見所視洞幽暫得如是非為聖證不作聖心名善境界若作聖解即受群邪精光不亂者彼此不雜也如暗室物亦不滅即是其相又見種種物即澄徹之相心細者定心微細也于微密中靡所不見是澄清之極故云密澄洞幽者視至于人所不到也交光云澄徹者靜極光通也精光不亂者心光凝定明暗不移也見種種物者非室內元有之物是暗中所現如鬼神精魅及奇形異狀之物而此暗中所有之物猶然如故謂元見暗中之物蓋鬼神等恆雜人居互不相見今由用心細密而見亦密澄故能洞視七燒斫無損又以此心圓入虗融四肢忽然同于草木火燒刀斫曾無所覺又則火光不能燒爇縱割其肉猶如削木此名塵併排四大性一向入純暫得如是非為聖證不作聖心名善境界若作聖解即受羣邪長水云圓遍也以此定心遍使一切己身他物無不虗融如下有情如無情有火如無火皆其相也四肢等者不以頑礙似于無情直以虗融同于草木蓋亦異矣火燒刀斫略舉二事總明身根無所覺也又則下與上略異上明火燒不覺今明火不能燒上言刀斫今云割削亦復少異例上火不能燒應云刀不能割然縱割亦無損益內四大無覺則排四大于覺性之外外四大無損則失四大之性亦是排也又內四大已虗雖有其形猶如草木故云直以虗融同于草木外四大亦虗故火不燒爇斯則五塵併入于虗融故云塵併內外四大皆失其性則排去其性內外四大之性咸入于虗融之中故云一向入純內四大以知痛癢為性八遍見聖凡又以此心成就清淨淨心功極忽見大地十方山河皆成佛國具足七寶光明遍滿又見恆沙諸佛如來遍滿空界樓殿華麗下見地獄上觀天宮得無障礙此名欣厭凝想日深想久化成非為聖證不作聖心名善境界若作聖解即受羣邪三業俱無穢濁故云清淨于中先見依報淨次見正報淨淨即聖境下見等是見六凡凡即是穢熏聞云欣厭當約淨穢凡聖二義分之想久化成者佛國依正定是化成天宮地獄雖是本有然下見上觀亦今日所化成也九夜見遠方又以此心研究深遠忽于中夜遙見遠方市井街巷親族眷屬或聞其語此名迫心逼極飛出故多隔見非為聖證不作聖心名善境界若作聖解即受羣邪窮諦理為深達法界為遠何但中夜靜深之深遠方遐遠之遠乎然中夜則其心靜而遙見不隔亦深遠之相也谷響云管子曰處商必就市井尹知章注云立市必四方若造井之制故曰市井補遺云此名迫心等者觀解之心推窮迫逐于色陰故色陰虗融不能為障是則飛出能隔見矣即中云通途逼于觀心非專迫逐于色陰也而此觀心被逼極飛出多隔而見此色陰將破之象十他變自說又以此心研究精極見善知識形體變移少選無端種種遷改此名邪心含受魑魅或遭天魔入其心腑無端說法通達妙義非為聖證不作聖心魔事消歇若作聖解即受羣邪已過前九故云精極補遺云善知識是行者依歸今見改變欲壞行人之心謂彼不足為憑故也此第十人皆魔所為至能無端說法等乃是行人因魔入心故能如是所以興福云天魔借辨是也蓋善知識是實人而形體遷改乃行人自見下無端說法亦是行人因魔入心自能說法資中曰此人曾有邪心種子合外魔境相因而來此則非善境界純是魔嬈不同前九皆稱善境起心作證方乃成魔者溫陵曰前九但明定力獨此乃明魔事者定力未成不能動魔研究精極乃漸發魔事也荊溪云因觀發昔故九境皆名發得而今經觀心愈深故下文魔事愈甚竝屬能招之因大妄語成墮無間獄即所報果也三結過勸示阿難如是十種禪那現境皆是色陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等當依如來滅後于末法中宣示斯義無令天魔得其方便保持覆護成無上道現境不識是總結發得能招之因墮獄是總結所招之報或以邪而入正或以正而入邪故云交互不自忖量頑也迷不自識迷也登聖者自謂登四果及菩薩位未必自云成佛汝等當依者謂當依佛之所誡顯則言說宣示使魔不得便冥則神力保持俾成無上道長水云問此不作五陰次第觀門何得陰次第盡明其境耶答觀雖總相五陰同觀陰有粗細粗者先盡譬如浣衣粗垢先去此陰既積妄所成妄盡自然陰滅從粗至細理必然也吳興曰用心交互者用禪那心與色陰妄想交互故現斯事乃至識陰例此明之何則以五妄想各于本陰區宇之中為禪所觀將破未破如燈欲滅其光復熾乃與定力交戰其功故成之敗之則魔佛之道于是乎辨孤山曰大妄語成墮無間獄此約名字位中修禪定者及五品觀行位中不能安忍俱有墮義以俱未得位不退故然五陰盡相不同在色陰未盡之中即名字位也色陰盡者猶居觀行受陰盡則在相似初二兩信想陰盡則在三四兩信行陰盡則在五六兩信識陰盡則諸根互用此在相似七信已去正是粗垢先落六根清淨位也而其五陰各為十魔種子所依共五十重皆在觀行初心所發故有退墮若入相似墮義不成故佛次第細辨相狀令初心識其所發氣分譬如色陰未破之中或現天魔此即想陰氣分之所發也問受陰盡時既入相似何故想等中復發十種魔境耶答若論陰破豈應發魔但文中說相似已前觀行心中所發耳令知所依故歷五陰次第說之又只作相似位中發境亦應可耳何者魔尚能惱深位豈不能惱相似淺位耶但相似位人發之終不將為聖解又如阿羅漢人回心入大接位雖當相似進入即破無明故不為所動也若名字觀行位人觀智強者則寂爾如空亦不將為聖解觀力弱者則為所惑墮落魔道更受輪回若相似位生法愛者則名頂墮菩薩吳興云問若言此等魔事並是觀行所發之境秪如上文所告有學二乘及回心者豈可盡是外凡之人乎答此有二意一告當機已破惑者令其流通二告結緣未破惑者令其保護然結緣則少當機則多至下付囑自見其意矣二受陰三一總示始終二正詳發相三結過勸示初又三一三昧所依阿難彼善男子修三摩提奢摩他中色陰盡者見諸佛心如明鏡中顯現其像依想陰已盡功夫以修三昧則想陰盡乃破受陰之根本也苕溪云色陰盡者約已斷說見諸佛心即相似證如前文云若目明朗十方洞開無復幽暗即中云苕溪所釋約伏斷分文最有眉目會解不録者因釋經至九十卷人心怠忽擇義不精至近代解文皆如夢中語耳文中三摩提是假奢摩他是空即俗而真此之謂歟二者既合即是禪那故今云三摩提奢摩他前云禪那其義一也言色陰盡見諸佛心者色為結暗所成今晦昧之空既破則佛遍照之心朗然可見如明鏡下喻見之親切耳二預示始終又二一不盡始相若有所得而未能用猶如魘人手足宛然見聞不惑心觸客邪而不能動此則名為受陰區宇此約色陰妄想伏而未斷故更立魘人之喻也應知色陰若斷進破受陰縱有魔事觀力易防只因色陰才伏若有得于諸佛之心明朗之相而受陰未伏是未能用下文心離其身去住自由方有用也魘本厭後人加鬼伏合人心曰厭手足宛然見聞不惑喻明了之相也心觸客邪喻為受陰所籠也又手足宛然見聞不惑喻色陰伏已得明了即喻上若有所得也彼被魘人明見醒中之境如色陰伏此心有離色之道也心觸客邪而不能動喻上而未能用客邪喻受陰受即苦樂憂喜捨也以此縛心不得解脫為受所區局蓋覆故云受陰區宇苕溪曰問何故色陰前斷後伏耶答斷從懸示伏就次論若不明斷無以知離過顯德之相若不明伏無以知依陰發魔之由下諸陰文初皆有此義二已盡終相若魘咎歇其心離身反觀其面去住自由無復留礙名受陰盡是人則能超越見濁此預明受盡以為修行之式又次利根者觀色陰不悟但伏非斷觀受陰即悟名魘咎歇也其心離身有二故一者前除色陰二者今除妄受補遺云其心離身者凡夫心必隨根領受前境今不隨于眼等受境乃是其心離身矣非但不隨眼等受境又能返觀能見等根是反觀其面依根曰住離根曰去去住在己故曰自由夫受陰盡者既離所受之四大又離能受之情根是受陰盡也能超見濁者前文云見聞覺知壅令留礙水火風土旋令覺知此謂見濁今心能離身則不為四大所拘能超見濁明矣問前破色陰心破四大茲破受陰何亦離四大耶答前破色陰是總破暗昧之相暗相既除四大自破即有離受之愛又除係戀自然去住無礙然伏惑者實法雖去或從幻境而起妄情所以招魔過在于此今去妄情之受則根中四大一一皆除如是而謂之超見濁也三結顯妄源觀其所由虗明妄想以為其本言虗明妄想者若因妄境生妄受是虗妄照了故曰虗明又離色陰曰虗領前境曰明長水曰照境而領虗通無礙故曰虗明此妄境中之虗明非真境之虗明也二正詳發相十一見物生悲二一指相定名阿難彼善男子當在此中得大光耀其心發明內抑過分忽于其處發無窮悲如是乃至觀見蚊虻猶如赤子心生憐愍不覺流淚此名功用抑摧過越此中受陰將破未破之中間也前云若目明朗十方洞開無復幽暗豈非大光耀乎苕溪云其心發明即下文見色陰消受陰明白有以狂慧釋之者非也內抑者見己心中有此光明痛惜向迷深自尅責名為內抑忽于下受陰發相自悲悲人悲則無窮長水云憂悲種子在藏識者忽然現起凡見生類皆如自己所生赤子此名下定名以明非聖證也此功用屬于下化修行之來元為度生而悲心至此即為太過二用心邪正悟則無咎非為聖證覺了不迷久自消歇若作聖解則有悲魔入其心腑見人則悲啼泣無限失于正受當從淪墜正受者離苦樂等三受今啼泣無限豈不失之二勇齊諸佛二一指相定名阿難又彼定中諸善男子見色陰消受陰明白勝相現前感激過分忽于其中生無限勇其心猛利志齊諸佛謂三僧祇一念能越此名功用陵率過越色為結暗所成色陰既消則所領受之法歷歷分明是受陰明白此所謂勝相也因之感動激發而思奮起忽于下是受陰發感激太過勇志無限于現在生欲齊諸佛思以一念而超三祇此功用屬于上求陵謂陵節率謂粗率吳興云謂勇心高率也二用心邪正悟則無咎非為聖證覺了不迷久自消歇若作聖解則有狂魔入其心腑見人則誇我慢無比其心乃至上不見佛下不見人失于正受當從淪墜見人下乃魔入心之相我慢者恃己陵他高舉為性此人初因勇猛大過魔著生慢非初心即慢言上不見佛等者非以蕩相名為不見乃慢心中不見有諸佛可尊有他人可重也如此則失定必矣三枯渴沉憶二一指相定名又彼定中諸善男子見色陰消受陰明白前無新證歸失故居智力衰微入中地隳逈無所見心中忽然生大枯渴于一切時沉憶不散將此以為勤精進相此名修心無慧自失前無新證者受陰未破也歸失故居者已過色陰而向受陰用心也墮在兩間無所依倚智力下先明工夫有失長水云若于色受盡末盡中以無相慧觀察陰體本自不生今則無滅惟一實相如此有何無新證失故居之慮哉今既不然名智力衰微云中隳者隳是毀壞中間無有悟證遍觀其處一無所見也心中下次明受發相一無所見則枯渴矣無善萌曰枯乏理水曰渴沉憶不散者此有定無慧即于逈無所見處而深沉思憶心無散失既是定中境界故以為勤精進相有慧者必有解悟何至一無所見非以此而生怯弱乃以此而為正修墮中隳即失也二用心邪正悟則無咎非為聖證若作聖解則有憶魔入其心腑旦夕撮心懸在一處失于正受當從淪墜悟者謂自知有定無慧策心修觀則無偏定之咎若謂聖人所解如此斯憶魔以類附之撮者戲聚也懸者懸念也問此撮心與前沉憶何異答前沉憶不散乃是自力今旦夕撮心懸在一處更兼魔力竟成窠臼則與前少異所以失正定而從淪墜魔使然也交光疏問古人謂置心一處無事不辦何以異此彼答未善今謂置心一處者如或觀身或觀受是置心一處今以中隳地逈無所見為一處自不侔矣四自疑舍那二一指相定名又彼定中諸善男子見色陰消受陰明白慧力過定失于猛利以諸勝性懷于心中自心已疑是盧舍那得少為足此名用心亡失恆審溺于知見慧力過定等用心有失也既在定中當知此人非是無定但是慧力勝定慧能過定猛利可知諸勝性者慧力所見自性境界也自心下受陰發相此受以自足為相舍那是報智自疑舍那受動使然然前但失于猛利次因受著得少為足定名中如長水云定力微故亡失恆審慧力勝故溺于知見文蓋慧性猛利定力恆常恆常所以救掉動之失慧得定故方能審知審見溺則有偏并知見而成謬前以偏定名為修心今以慧勝名為用心二用心邪正悟則無咎非為聖證若作聖解則有下劣易知足魔入其心腑見人自言我得無上第一義諦失于正受當從淪墜悟有慧無定為失謬疑舍那猶是自心之疑次以魔力彰言得第一義諦失定何疑因偏而邪豈云正受五生無盡憂二一指相定名又彼定中諸善男子見色陰消受陰明白新證未獲故心已亡歷覽二際自生艱險于心忽然生無盡憂如坐鐵牀如飲毒藥心不欲活常求于人令害其命早取解脫此名修行失于方便二際即前中隳地也彼見修行得力如此其難故生艱險然何至于求死文中先自不欲活次令人害命皆受陰為之崇耳據其自生艱險縱然害命未即涅槃彼亦自知之矣但工夫中既自艱險激動受中憂惱憂非一端故曰無盡可憂既多不如早喪反獲解脫此捨壽之本懷也言失方便者譬如乘馬亦愛亦策稱為方便今欲棄命絶不自愛名失方便長水云定無方便安忍其心是也二用心邪正悟則無咎非為聖證若作聖解則有一分常憂愁魔入其心腑手執刀劒自割其肉欣其捨壽或常憂愁走入山林不耐見人失于正受當從淪墜悟者悟其為受陰發動倘謂聖心如此多憂則憂魔以類附之前但心不欲活令人害己今至自割其肉豈不過前又憂悶填胸即不耐見人強為歡笑矣古注引婆裘河邊諸比丘等修不淨觀厭患既甚求刀自割魔使之然正此類也六生無限喜二一指相定名又彼定中諸善男子見色陰消受陰明白處清淨中心安隱後忽然自有無限喜生心中歡悅不能自止此名輕安無慧自禁即以色消受現為清淨見其清淨則安隱矣忽然下受發之相此文以喜為受魔之端推其所由喜因輕安而發色消為輕安隱為安若以慧照所證尚淺喜即禁止今以無慧不能禁喜吳興云輕安七覺支中其體屬定定若兼慧正道可通今所發者既無慧自持則定翻成散魔得其便喜樂附焉文從定發喜便屬散動此喜非七覺中之喜彼多聞分別生喜今從輕安生喜義即不同故知輕安屬定而非慧不能持定也二用心邪正悟則無咎非為聖證若作聖解則有一分好喜樂魔入其心腑見人則笑于衢路傍自歌自舞自謂已得無礙解脫失于正受當從淪墜蓋以不顧威儀縱任不拘為無礙解脫耳魔入心腑畢竟淪于大狂而不可挽豈正受乎七起大我慢二一指相定名又彼定中諸善男子見色陰消受陰明白自謂已足忽有無端大我慢起如是乃至慢與過慢及慢過慢或增上慢或卑劣慢一時俱發其心尚輕十方如來何況下位聲聞緣覺此名見勝無慧自救前第二感激過分中因發勇太過魔著生慢然但標我慢而已今初即發慢又具七慢故與前異自謂已足乃慢所由起也大我慢雖七慢之一似總諸慢我慢種子忽然自發故曰無端蓋慢多對境而生此人不須對境諸慢盡發甚覺無端心輕諸佛是卑劣慢何況二乘是慢過慢但舉諸聖其餘可知則該七慢明矣見勝者謂見自己高勝良由自謂已足之故若得平等大慧必不起慢今無此慧以自救其斃也資中曰此有七慢恃己陵他名我慢稱量自他比較同德但名為慢于他等謂已勝名過慢于他勝謂己勝名慢過慢未得謂得名增上慢雖知下劣返顧自矜不敬不求名卑劣慢下毀經像即是邪慢成論有大慢為八慢慢過慢者慢中之慢也于前過慢又加一倍故補遺云經中七慢自足何故又云乃至須知據佛意衆生慢相不止于七故有斯語是則今文七慢亦略舉耳文成論大慢未考俱舍云大慢者于他勝謂己勝據此則俱舍大慢即今慢過慢也今文以毀經像為邪慢俱舍云邪慢者于有德中謂己有德溫陵云不能謂能故名大慢文以輕十方如來為大我慢可也二用心邪正悟則無咎非為聖證若作聖解則有一分大我慢魔入其心腑不禮塔廟摧毀經像謂檀越言此是金銅或是土木經是樹葉或是疊華肉身真常不自恭敬却崇土木實為顛倒其深信者從其毀碎埋棄地中疑誤衆生入無間獄失于正受當從淪墜不禮等者前但起慢未至毀經壞像復因魔附遂至此地入無間獄是毀碎經像之報邪見起故非正受也八輕安自足二一指相定名又彼定中諸善男子見色陰消受陰明白于精明中圓悟精理得大隨順其心忽生無量輕安己言成聖得大自在此名因慧獲諸輕清前第六文因輕安生喜喜魔得入今直以輕安致魔又前輕安屬定故文云無慧自禁今輕安屬慧所以與前不同色消受現即是精明此人慧多故云圓悟重發悟解乃能得大隨順非破受也長水云定中發慧與理暫契名圓悟精理理智相冥得無違拒故云隨順起信云若離于念名為得入雖說無有能說所說雖念無有能念所念名為隨順離念之理前已能契故云則諸離念一切精明動靜不移憶忘如一隨順之相于今復見忽生無量輕安是受陰發相吳興云輕安者名雖同前其義則異前以因慧獲諸輕清此由受陰于諸塵境無重濁之惑便言成聖得大自在其說最是然輕安亦因悟發以受陰明白更悟精理則輕安無量輕安隨順皆自在也悟離重濁斯獲輕清輕清所以自在後來著魔更不求進亦為輕清所誤謂只要輕清不須餘事也又前在定中止一輕安今屬慧性則生無量輕安無障礙為輕合理則安因慧照空業障所以獲諸輕清二用心邪正悟則無咎非為聖證若作聖解則有一分好輕清魔入其心腑自謂滿足更不求進此等多作無聞比丘疑誤衆生墮阿鼻獄失于正受當從淪墜魔入好輕清之身竝起自足之想此人已妄謂登聖又因魔附故不求進無聞比丘如前所說四禪比丘謂證四果此人入定亦必以初禪為初果四禪為四果故云多作等如此則疑誤衆生而自當入無間矣當其見中陰而謗如來豈不失正受耶又更不求進便失正受亦不待見中陰時方失正受九撥無因果二一指相推源又彼定中諸善男子見色陰消受陰明白于明悟中得虗明性其中忽然歸向永滅撥無因果一向入空空心現前乃至心生長斷滅解明悟者恐是又得一番悟境故所得是虗明之性虗明只是虗明妄想而已歸向永滅是總標撥無因果下是釋永滅之相謂悟空則更無因果乃至心生者謂縱然起念念念不住心法全空適足長其斷滅之解二用心邪正悟則無咎非為聖證若作聖解則有空魔入其心腑乃謗持戒名為小乘菩薩悟空有何持犯其人常于信心檀越飲酒噉肉廣行淫穢因魔力故攝其前人不生疑謗鬼心久入或食屎尿與酒肉等一種俱空破佛律儀誤入人罪失于正愛當從淪墜悟者悟其為惡取空非第一義空既無因果目持戒者反為著相觀後云食屎尿與酒肉等則其人非好酒肉女色直以此而明戒不必持正是空見不必云于解則空于行則不空也誤入人罪者令人誤入于罪咎也鼠唧鳥空豈正受耶十愛極發狂二一指相定名又彼定中諸善男子見色陰消受陰明白味其虗明深入心骨其心忽有無限愛生愛極發狂便為貪欲此名定境安順入心無慧自持誤入諸欲色陰既消離諸窒礙曰虗受陰明白照了前境曰明深生味著即味禪貪此工夫遂有失也其心下受陰發相始但味受陰之虗明既因發狂觸境皆愛轉成外境之貪欲此名等者前第九是慧之過今第十是定中生過安隱順意之境入于其心而無觀慧以破其愛轉成外欲二用心邪正悟則無咎非為聖證若作聖解則有欲魔入其心腑一向說欲為菩提道化諸白衣平等行欲其行淫者名持法子神鬼力故于末世中攝其凡愚其數至百如是乃至一百二百或五六百多滿千萬魔心生厭離其身體威德既無陷于王難疑誤衆生入無間獄失于正受當從淪墜悟則能以慧照故無咎也不悟則為大惡從味禪貪愛以來展轉增長前但發欲令因魔附彰言贊欲因之化人行淫蓋白衣行欲為便平等則無揀擇邪風一扇數至千萬所謂涓涓不絶遂成江河也陷于王難自此人始失于正受者邪風廣扇豈正受乎二結過勸示阿難如是十種禪那現境皆是受陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等亦當將如來語于我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道現境不識乃結發得之因墮無間獄乃結所招之報下皆例爾前云修三摩提奢摩他中今云禪那現境豈非二種既合即禪那耶準吳興解即用禪那心與受陰虗明妄想交互故現斯事如來語者即所宣受陰魔現之文也三想陰三一總示始終三一結前受陰阿難彼善男子修三摩地受陰盡者雖未漏盡心離其形如鳥出籠已能成就從是凡身上歷菩薩六十聖位得意生身隨往無礙受陰盡者約已斷說心之不能去住自由者外為色陰所礙內為受陰所留二陰既盡故心離其形如鳥出籠也未漏盡者才斷受陰三陰猶存然真斷受陰後三陰亦斷在不久不然豈有得意生身而反為魔著者乎故知後文所言是伏非斷故遭魔也若真斷色陰後陰亦如破竹況斷受耶從是凡身等者凡身指父母生身孤山以破受陰為初入聖位其言曰色陰未盡即名字位色陰盡者猶居觀行受陰盡則在相似初二兩信吳興之意則不然色陰盡時已入相似故云見諸佛心如明鏡中顯現其像此人于色陰悟入非但能盡色陰餘之四陰亦空其進觀受陰者蓋于色陰未悟但伏色陰更觀受陰今于受陰悟入故云從是凡身上歷菩薩六十聖位也六十位者十信十住十回向四加行十地前如乾慧與三漸次後加等妙成六十位言意生身者衆生受身雖具色心而身生不及意之迅疾菩薩亦然歷六十位皆意生身為變易也然天台判意生身多在未斷無明之位如妙玄六下十番利益中止觀三下攝一切惑中輔行云楞伽大慧問佛何名意生佛言譬如意去疾速無礙名為意生此即從喻得名彼經又有兩義重釋初云如十萬由旬外憶先所見疾至于彼次云如幻三昧力憶本願故生諸聖中初云憶處次云憶願二義並是意憶生故名為意生文又有三種五種意生略如大明法數解三種意生身甚明若據華嚴隨意生身則通于破無明之位矣二預示始終二一不盡始相譬如有人熟寐寱言是人雖則無別所知其言已成音韻倫次令不寐者咸悟其語此則名為想陰區宇此喻伏受陰人也因伏受陰進觀想陰故復墮想陰區宇寱者夢中語也喻受陰被伏有所得法門也彼所得法門賢聖諸位皆在其中而伏陰者不能自覺故云無別所知然地位高下皆在其中故喻已成音韻倫次證聖位者則知彼之所言可以分配諸位文中熟寐喻想存寱言喻受伏音韻倫次喻賢聖諸位展轉相生二已盡終相若動念盡浮想消除于覺明心如去塵垢一倫生死首尾圓照名想陰盡是人則能超煩惱濁此預明進觀想陰得悟之人也想者取相為義分劑名言從外塵起豈非動念因塵有想亦名浮想故喻為覺明之塵垢也一倫生死等古人解若悟真常無始終生死之異今謂生死根株幽隱微細浮想既祛方能圓照一倫即一類也生死非一故曰一倫首尾即根株也覺明能生法故該二死分段為生死之首變易為尾想陰盡則見思斷前煩惱濁中文云性發知見容現六塵豈非以取相為煩惱乎故想盡則超煩惱濁又前云憶識誦習憶識即立境分劑誦習即種種名言則想生煩惱明矣三結顯妄源觀其所由融通妄想以為其本長水云想能融變身隨于心心想酢梅口中流水融通質礙又想能取相即是內外融合而相通也此是妄境中之融通不同二諦融通二正詳發相十一貪求善巧三一明想動阿難彼善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛圓明鋭其精思貪求善巧夫正觀邪發皆由妄想因內想貪求種種妄憶遂發魔境蓋有諸內而應諸外理之必然者也文中貪求魔入是發得能招之因陷難入獄是發得所招之報結勸先覺是令不貪著即入正觀章章皆爾前之悲喜為邪慮權實俱照為圓明貪求二字是想陰動魔之根本二致魔邪爾時天魔候得其便飛精附人口說經法其人不覺是其魔著自言謂得無上涅槃來彼求巧善男子處敷座說法其形斯須或作比丘令彼人見或為帝釋或為婦女或比丘尼或寢暗室身有光明是人愚迷惑為菩薩信其教化搖蕩其心破佛律儀潛行貪欲口中好言災祥變異或言如來某處出世或言劫火或說刀兵恐怖于人令其家資無故耗散此名怪鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難飛精者急遣精魅也溫陵云附人附他人也其人所附人也彼人是人皆指修定人也文現形不同有似隨物現形之方便也化為婦女豈非破戒之漸心搖蕩故破戒導淫乃天魔亂人之本意既為怪鬼所惑則潛行貪欲似乎貪財然必以淫為正意口中好言者指魔附之人災謂咎徵祥謂休徵如來出世即祥劫火刀兵即災令人棄家逃散故致耗散怪鬼前因貪物附物成形今散人資財其宿習也前七趣中鬼名有十今六種為魔餓鬼苦極不能為魔餘之三鬼皆能向上不在魔數吳興云弟子與師即求巧之弟子說法之師下倣此三勸先覺汝當先覺不入輪回迷惑不知墮無間獄二貪求經歷三初明想動阿難又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛遊蕩飛其精思貪求經歷心有離形之機則思遊歷世界是愛遊蕩長水云觀中動掉舉種子故現此魔境二致魔邪爾時天魔候得其便飛精附人口說經法其人亦不覺知魔著亦言自得無上涅槃來彼求遊善男子處敷座說法自形無變其聽法者忽自見身坐寶蓮華全體化成紫金光聚一衆聽人各各如是得未曾有是人愚迷惑為菩薩淫逸其心破佛律儀潛行貪欲口中好言諸佛應世某處某人當是某佛化身來此某人即是某菩薩等來化人間其人見故心生傾渴邪見密興種智消滅此名魃鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難不自變形而變他形如佛菩薩此遊蕩心中所好蓋貪遊佛國即現佛國景象以惑之耳魃鬼遇風成形以合其放佚之性也行人心愛遊蕩以類相附故能淫逸其心破戒行欲諸佛應世菩薩遊人間皆是遊歷之事乃好遊者所慕又某佛某菩薩者以欲鉤牽其經歷以參承也其人見故者謂見其作此說邪見密興者多聽邪說則邪見生于胸中而正觀種智倐焉消滅魃鬼是淫習所感導淫宜矣三勸先覺汝當先覺不入輪回迷惑不知墮無間獄三貪求契合三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛綿㳷澄其精思貪求契合離影像為虗除係戀為妙資中云夫忘機寂照想念不生理自玄會若希求吻合愛念潛增擬心即差遂招魔惑澄凝寂也二致魔邪爾時天魔候得其便飛精附人口說經法其人實不覺知魔著亦言自得無上涅槃來彼求合善男子處敷座說法其形及彼聽法之人外無遷變令其聽者未聞法前心自開悟念念移易或得宿命或有他心或見地獄或知人間好惡諸事或口說偈或自誦經各各歡娛得未曾有是人愚迷惑為菩薩綿愛其心破佛律儀潛行貪欲口中好言佛有大小某佛先佛某佛後佛其中亦有真佛假佛男佛女佛菩薩亦然其人見故洗滌本心易入邪悟此名魅鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難對初二兩人初謂貪求善巧二謂貪求經歷故云自他俱無遷變言外無言以表內契未聞法而心開非密契乎開悟之心展轉不同故云移易或得下是移易中事法師無言弟子自說豈非默契各各歡娛承上或口說偈二句行者之心綿密愛著致為邪術所動而破戒行淫佛有先後大小者皆顯密契魅鬼是詐習遇畜成形之物詐習以甘言誑惑于人為鬼遇猿狐猪犬亦現美色媚人由行人貪契合而魅鬼適足以壞之也幽溪曰綿密也㳷合也即前心精通㳷之㳷夫我之因覺湛然能與諸佛果覺吻合亦求其任運而已若心愛綿㳷澄精思而貪契合天魔得其便矣令聞法者心自開悟至于他心宿命皆以密契之事而應之也長水云男女佛者貴引行人行貪欲事無妨成佛約教固有偏圓之殊而本同末異豈果有大小乎邪人灼然謂之大小如來本迹豈易知之邪人輒判某在先而某在後又乃恣其不遜有真僞之分何其愚哉洗滌本心者反以邪見除去正見也三勸先覺汝當先覺不入輪回迷惑不知墮無間獄四貪求元本三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛根本窮覽物化性之終始精爽其心貪求辨析色受伏而想陰現是圓定心愛根本推萬化所由生也欲知其始并欲知其終而意則至于求元也二致魔邪爾時天魔候得其便飛精附人口說經法其人先不覺知魔著亦言自得無上涅槃來彼求元善男子處敷座說法身有威神摧伏求者令其座下雖未聞法自然心伏是諸人等將佛涅槃菩提法身即是現前我肉身上父父子子遞代相生即是法身常住不絶都指現在即為佛國無別淨居及金色相其人信受亡失先心身命歸依得未曾有是等愚迷惑為菩薩推究其心破佛律儀潛行貪欲口中好言眼耳鼻舌皆為淨土男女二根即是菩提涅槃真處彼無知者信是穢言此名蠱毒魘勝惡鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難蠱魘二鬼咸具威力而加以天魔之威故未聞法而使人心伏也推原邪念直將生生之法等于三德祕藏謂生理化元咸在于此如法身為因菩提為果菩提為因涅槃為果而肉身上父為因子為果子又為因子之子又為果理無所存遍在于事即此生生是三德也三德無非法身即同父父子子無非肉身遞代句揭出生生本旨三法中法身為主故復指法身常住正報既爾依報亦然不但以生等無生且謂生法超于無生能使行人信受亡失先心者先心欲斷結出生死今反為生生所惑日將生生之法以究其心自然捨正歸邪破戒導淫矣口中好言等者前是諸人之見今是魔附者所說不但淨穢無殊亦似依正不二蠱為貪恨所成附毒蟲而成形害人者也魘勝或即是魔鬼世有魘勝之術取能壓伏故名魘勝或二鬼相藉以行魔業蓋影響于生死即涅槃煩惱即菩提而雜以穢言故作此論指妄為本其本顯然不覺信受并去其窮覽之先心矣指妄為本謂不須別求也三勸先覺汝當先覺不入輪回迷惑不知墮無間獄五貪求冥感三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛懸應周流精研貪求冥感長水云功深行著感應自冥起念妄求魔精暗入吳興云懸應在聖冥感在己于未證理前求其休驗也二致魔邪爾時天魔候得其便飛精附人口說經法其人元不覺知魔著亦言自得無上涅槃來彼求應善男子處敷座說法能令聽衆暫見其身如百千歲心生愛染不能捨離身為奴僕四事供養不覺疲勞各各令其座下人心知是先師本善知識別生法愛粘如膠漆得未曾有是人愚迷惑為菩薩親近其心破佛律儀潛行貪欲口中好言我于前世于某生中先度某人當時是我妻妾兄弟今來相度與汝相隨歸某世界供養某佛或言別有大光明天佛于中住一切如來所休居地彼無知者信是虗誑遺失本心此名癘鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難暫見其身如百千歲者言暫時相見如百千歲補遺云令聽者謬憶此人是我先世本師以傾其意耳文別生法愛者謂于尋常師弟情外別生法愛親愛既深遂致破戒我于下先引他人為例今來下正指行人既以前生為今生之緣復以今生為後世之緣以見感應決不相離當斯時也雖欲出其樊籠不可得矣古注云休居地者涅槃處也真實涅槃豈有處耶今指天為圓寂之地非魔是何信是等者指前所說皆是虗誑癘鬼即瞋習遇衰成形者也此最能示感應如今人事五瘟使者此其驗焉三勸先覺汝當先覺不入輪回迷惑不知墮無間獄六貪求深入三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛深入尅己辛勤樂處陰寂貪求靜謐深入定境欲到人所不到也非尅苦辛勤不能得之樂陰寂而求寧靜其所知必有超于顯露者矣孤山云束約身心名為尅己二致魔邪爾時天魔候得其便飛精附人口說經法其人本不覺知魔著亦言自得無上涅槃來彼求陰善男子處敷座說法令其聽人各知本業或于其處語一人言汝今未死已作畜生敕使一人于後踏尾頓令其人起不能得于是一衆傾心欽伏有人起心已知其肇佛律儀外重加精苦誹謗比丘罵詈徒衆訐露人事不避譏嫌口中好言未然禍福及至其時毫髮無失此大力鬼年老成魔惱亂是人厭足心生去彼人體弟子與師俱陷王難只求陰兩字已盡一章之意一各知本業二踏尾不起三起心知肇四訐露人事五未然禍福皆陰事也律外加勤以投其尅苦之好唯此文無破戒語訐露謂攻人之陰私也八卷有大力鬼王乃情少想多之報今但云鬼未必是王而神通力大者也俱陷王難有本云多陷王難未知孰是雨公云心愛四句當與下章心愛三句換過則前後相應因將此文竟作愛知見貪宿命解之未必然也溫陵云邪定能具五通本業宿業也畜生後報也此二宿命通也知肇他心通也訐露眼耳通也然知後報即屬天眼豈皆宿命者哉東土人師只聞解經不聞改經三勸先覺汝當先覺不入輪回迷惑不知墮無間獄七貪求知見三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛知見勤苦研尋貪求宿命二致魔邪爾時天魔候得其便飛精附人口說經法其人殊不知其魔著亦言自得無上涅槃來彼求知善男子處敷座說法是人無端于說法處得大寶珠其魔或時化為畜生口銜其珠及雜珍寶簡策符牘諸奇異物先授彼人後著其體或誘聽人藏于地下有明月珠照耀其處是諸聽者得未曾有多食藥草不餐嘉饌或時日餐一麻一麥其形肥充魔力持故誹謗比丘罵詈徒衆不避譏嫌口中好言他方寶藏十方聖賢潛匿之處隨其後者往往見有奇異之人此名山林土地城隍川嶽鬼神年老成魔或有宣淫破佛戒律與承事者潛行五欲或有精進純食草木無定行事惱亂是人厭足心生去彼人體弟子與師多陷王難求知兩字便盡一章之意是人即修三摩地人也明珠珍寶簡策符牘乃川嶽所藏而能知之知見無不通矣簡策祕書也符牘祕術也補遺云先授彼人後著其體者謂以奇異之物先授之使其見然後藏著身體之內誘其起貪故也有明月珠照耀其處者地下有珠所以顯其無所不見多食下是投其勤苦之好輔行云饌者陳飲食也亦具食也寶藏則以寶珠為證聖賢則以異人為證或有下文分兩節說法師與弟子行淫檢郭璞傳暨陽人任谷因息耕于樹下忽有一人著羽衣就淫之既而不知所在谷遂有娠積月將産羽衣復來以刀穿其陰下出一蛇子便去谷遂為宦者後詣闕上書自云有道術晉元帝留谷于宮中璞上疏曰按周禮奇服怪人不入宮今谷妖詭怪人之尤者而登講肆之堂密邇殿省之側塵點日月穢亂天聽臣之私情竊所不取後元帝崩谷遂亡走不雜五欲名精進此中不言宿命當是文略或別有意有欲與前文互換謂前文皆是宿命考前文止有各知本業一句似通宿命若能知未死之前已是畜生是天眼通非宿命通而盡以為宿命可乎三勸先覺汝當先覺不入輪回迷惑不知墮無間獄八貪求神力三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛神通種種變化研究化元貪取神力長水曰化元謂神變之本此貪如意通愛染忽生正見消滅二致魔邪爾時天魔候得其便飛精附人口說經法其人誠不覺知魔著亦言自得無上涅槃來彼求通善男子處敷座說法是人或復手執火光手撮其光分于所聽四衆頭上是諸聽人頂上火光皆長數尺亦無熱性曾不焚燒或水上行如履平地或于空中安坐不動或入瓶內或處囊中越牖透垣曾無障礙惟于刀兵不得自在自言是佛身著白衣受比丘禮誹謗禪律罵詈徒衆訐露人事不避譏嫌口中常說神通自在或復令人旁見佛土鬼力惑人非有真實讚歎行淫不毀粗行將諸猥媟以為傳法此名天地大力山精海精風精河精土精一切草木積劫精魅或復龍魅或壽終仙再活為鬼或仙期終計年應死其形不化他怪所附年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難是人指魔附之人火光乃不附草木者長水云必若真空刀豈能沮准仁王經白衣高座比丘地立是法滅相菩薩戒中亦同此說旁見佛土者身不入佛土而見佛土故云旁見猥鄙也媟狎也郭璞云相親狎也山精河精等以其得五行之精故于四大無礙壽終仙再活為魅者以仙術猶在故其形不化者謂年死而形不化三勸先覺汝當先覺不入輪回迷惑不知墮無間獄九貪求深空三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛入滅研究化性貪求深空入滅欲速入涅槃也化性萬化之性也二致魔邪爾時天魔候得其便飛精附人口說經法其人終不覺知魔著亦言自得無上涅槃來彼求空善男子處敷座說法于大衆內其形忽空衆無所見還從虗空突然而出存歿自在或現其身洞如琉璃或垂手足作栴檀氣或大小便如厚石蜜誹謗戒律輕賤出家口中常說無因無果一死永滅無復後身及諸凡聖雖得空寂潛行貪欲受其欲者亦得空心撥無因果此名日月薄蝕精氣金玉芝草麟鳳龜鶴經千萬年不死為靈出生國土年老成魔惱亂是人厭足心生去彼人體弟子與師多陷王難古云即色明空是無上智求空滅色魔境隨生即中云空不可著著則遭魔文云深空亦是即有而空故魔人所現忽空忽有存沒無定是示為深空也雖空有不定意重于空故言無因無果是投其愛滅也或云行人好空故以空惑至于體淨支香而又便蜜雖與空無涉而神異之事真足動人然體香便蜜亦顯深空功德以惑人耳受欲而得空心為魔力所攝也京房易傳云日月赤黃為薄或曰不交而蝕曰薄長水云薄蝕精氣者此即惡星精曜能為蝕神亦為魔怪金玉芝草雖無情物而精怪依附能成魔也三勸先覺汝當先覺不入輪回迷惑不知墮無間獄十貪求長壽三一明想動又善男子受陰虗妙不遭邪慮圓定發明三摩地中心愛長壽辛苦研幾貪求永歲棄分段生頓希變易細相常住欲弘佛法心愛長壽古亦有之研幾者研及于微細之處也古人云分段生死三界惑盡方始得離二乘無學登地菩薩皆得變易補遺云變易土中微細生滅緣相生壞若望分段亦名常住法性身二致魔邪爾時天魔候得其便飛精附人口說經法其人竟不覺知魔著亦言自得無上涅槃來彼求生善男子處敷座說法好言他方往還無滯或經萬里瞬息再來皆於彼方取得其物或于一處在一宅中數步之間令其從東詣至西壁是人急行纍年不到因此心信疑佛現前口中常說十方衆生皆是吾子我生諸佛我出世界我是元佛出世自然不因修得此名住世自在天魔使其眷屬如遮文茶及四天王毗舍童子未發心者利其虗明食彼精氣或不因師其修行人親自觀見稱執金剛與汝長命現美女身盛行貪欲未逾年歲肝腦枯竭口兼獨言聽若妖魅前人未詳多陷王難未及遇刑先已乾死惱亂彼人以至殂殞口中常說等者生佛依正皆其所生獨為元佛長壽可知與汝長命遂其長生之願也口兼獨言者修行之人與魔對說旁人不曉以為獨言聽之若妖魅之語前人即旁人也未詳即不曉也此人不但受陰是伏即色陰亦是伏非斷不然豈有已斷色受妄想得意生身而盛行貪欲肝腦枯竭者乎故知伏斷不分強釋茲文必多矛盾溫陵云萬里瞬息乃得變易者之事也陀羅尼經有遮文茶夫毗舍童子即毗舍遮鬼隸四天王已發心則護人未發心則害人以彼定力虗明為利故食精氣或不因師者不因魔附之師而親見魔現也二結過勸示二一約魔事結阿難當知是十種魔於末世時在我法中出家修道或附人體或自現形皆言已成正遍知覺讚歎淫欲破佛律儀先惡魔師與魔弟子淫淫相傳如是邪精魅其心腑近則九生多踰百世令真修行總為魔眷命終之後必為魔民失正遍知墮無間獄汝今未須先取寂滅縱得無學留願入彼末法之中起大慈悲救度正心深信衆生令不著魔得正知見我今度汝已出生死汝遵佛語名報佛恩勸教後人正是滅後正觀陰心之人因一妄想即有發得魔境牽人入苦故須教示十種中唯第八有身著白衣之言餘多現比丘相涅槃經云未來世中是魔波旬漸當壞亂我之正法乃至現比丘比丘尼及阿羅漢像非法說法誹謗戒律自言得聖惑亂世間古人共引此文解今是十種魔至出家修道今亦依之或附下指前十中前九是附人體第十是自現形九生百世指修行之時節也謂修行人能伏受陰由九生百世之積功也阿難雖入風奮迅四派其身乃權力示現而留願救世必依佛敕也正心者真欲自度度他深信者樂趣如來極果善揀魔佛名正知見二約想陰結阿難如是十種禪那現境皆是想陰用心交互故現斯事衆生頑迷不自忖量逢此因緣迷不自識謂言登聖大妄語成墮無間獄汝等必須將如來語于我滅後傳示末法遍令衆生開悟斯義無令天魔得其方便保持覆護成無上道謂言登聖者謂逢十種魔而自謂登聖也逢魔是發得境墮獄即所招報遍令不著可入正觀矣
