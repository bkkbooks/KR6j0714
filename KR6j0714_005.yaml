body:
  text: 二明解結無二通次義前第二義云阿難汝修菩提若不審觀煩惱根本則不能知虗妄根塵何處顛倒處尚不知云何降伏取如來位汝觀世間解結之人不見所結云何知解似必斷去煩惱方證佛位解去其結方名解脫豈非緣理斷九歷別行門乎今明根塵同源縛脫無二知見立見即無明本知見無見斯即涅槃則此六根即迷中實相無住本也經云使汝流轉生死結根惟汝六根更非他物此迷則三道流轉也令汝速證安樂妙常亦汝六根更非他物此悟則果中勝用也喻如秪一華巾綰之成六此因緣和合虗妄名生解之無一此因緣別離虗妄名滅殊不能知生滅去來本如來藏妙真如性只一華巾結解無二豈非決通歷別而入圓融為起行之大要乎又前云菩提道也涅槃滅也煩惱集也生死苦也以道治集滅超生死此前三教四諦耳今云縛脫無二結解惟一即顯示無作四諦只一圓中實相矣妙玄四上云無作四諦慧者解惑因緣而成四也大經云寶珠在體謂呼失去憂愁啼哭但見其體及瘡不見寶珠及鏡惟有憂愁無復歡喜此迷道滅而起苦集是知見立知而成流轉生死也若解瘡體即是寶珠則喜不哭因滅無明即得熾然三菩提燈此解悟因緣即是道滅是知見無見而歸安樂妙常也豈非四諦只一中實耶大經云無苦無諦有實無集無諦有實無滅無諦有實無道無諦有實實即中道虗空佛性亦即六根更非他物也今經中雙非空有及若欲解結當於結心皆顯中實為解結不二之本如此方名從性起修成無作妙行故科云融通次義為二一正明解結無二二兼顯六解一亡初中二一疑請阿難白佛言世尊如來雖說第二義門今觀世間解結之人若不知其所結之元我信是人終不能解世尊我及會中有學聲聞亦復如是從無始際與諸無明俱滅俱生雖得如是多聞善根名為出家猶隔日瘧惟願大慈哀愍淪溺今日身心云何是結從何名解亦令未來苦難衆生得免輪回不落三有作是語已普及大衆五體投地雨淚翹誠佇佛如來無上開示前第二決定義中文云阿難汝觀世間解結之人不見所結云何知解佛意指根即結而阿難乃於根外更求所結之元故有此問如云元來云何成此結也下合文云云何是結後文云知見立知即無明本是所結之元也幽溪云元本也謂最初結起根元若曉結起之元由知見立知則知見無見斯即涅槃誠為解結之方矣合喻中初云有學聲聞亦復如是者未得四果名為有學言無始無明者長水曰始自迷真隨逐有情生滅不離故前文云和合妄生和合妄死此文云俱滅俱生其意咸同熏聞云此有二義一約阿難權證初果俱生尚在則與界內無明俱滅俱生二約阿難別惑未除則與界外無明俱滅俱生也喻如隔日瘧者見惑已斷如安日俱生未破如發日又通惑先落如安日別惑猶在如發日多聞善根可出三界故云出家而無明全在是但有結而不知解也惟願大慈下請示阿難意謂無始無明必是結元但今日身心已斷八十八使不知何者是無明之結云何之言即問結元又不知解結之法從何用力一問結二問解未知結解惟一六根故下諸佛雙示結解只在六根也二開示二一現瑞爾時世尊憐愍阿難及諸會中諸有學者亦為未來一切衆生為出世因作將來眼以閻浮檀紫金光手摩阿難頂即時十方普佛世界六種震動微塵如來住世界者各有寶光從其頂出其光同時於彼世界來祗陀林灌如來頂是諸大衆得未曾有佛愍現未二機而獨摩阿難頂者寄當機以表衆生當證佛果耳據下偈云彈指超無學則無學亦在所益中但有學未離分段故特愍之上諸字指諸人也下諸字指前三果及四向也將來衆生若聞解結法門不但能出分段兼出變易故云作出世因所以諸佛示語便為將來眼目即時下正現瑞諸佛頂光灌釋迦頂者示宣無上頂法無相不相不相無相之理也經中放光至此共有四番前三番俱在初卷一頂光說呪二七徵後從面門放光即示二種根本三從胸卍字涌出寶光後即示見性前三番皆釋迦放光今諸佛放光灌釋迦頂表微塵諸佛同證頂法又顯諸佛當說圓中無作四諦之法故先顯神通六種動者表破六根惑也二正說二一諸佛同宣二釋迦申釋初諸佛同音告阿難者以阿難初卷中元請十方如來得成菩提妙奢摩他三摩禪那最初方便故也今雖示六根義該三觀而重在圓中也於是阿難及諸大衆俱聞十方微塵如來異口同音告阿難言善哉阿難汝欲識知俱生無明使汝輪轉生死結根惟汝六根更非他物汝復欲知無上菩提令汝速證安樂解脫寂靜妙常亦汝六根更非他物阿難問今日身心云何是結從何得解而諸佛皆指歸六根下文所云結解同所因聖凡無二路也今先約圓實諦釋次隨文分別無明是集諦生死是苦諦菩提是道諦涅槃是滅諦四諦同在六根即一實諦乃圓教無作四諦之旨妙玄云以迷理故菩提是煩惱名集諦涅槃是生死名苦諦以能解故煩惱即菩提是道諦生死即涅槃名滅諦當知理惟一實隨順衆生說有世諦因果是名苦集而體即道滅故云出世人知即第一義諦是則此文具一諦二諦四諦之義此義純圓永超偏教諸佛證此法門而成正覺故同說之次隨文分別言俱生無明者不知三諦名曰無明大品云諸法無所有如是有如是無所有是事不知名為無明正其義也此是根本無明衆生因此無明輪轉二種生死云結根者正答所結之元由衆生對境起念尋聲逐色故入輪回是惟汝六根也結既因根解亦因根菩提是習果與上無明相對涅槃是果果與上生死相對涅槃有四德安樂樂德妙常常德寂靜淨德解脫我德言速證者與下彈指超無學其文相應解者引下文知見立知故輪生死知見無見即證妙常使生死涅槃二途可別眉目朗然然諸佛之意正明道滅即苦集苦集即道滅當體即是不須翻破是無作義由迷悟有殊故成四諦四實非四所謂一切衆生即菩提相不可復得即大涅槃不可復滅也然交光云決定用根決定不用識實引今文為證但圓教法門元無揀擇若以別意甄分淪生死者乃凡夫之六根證妙常者乃互用之六根又不可不辨也二釋迦申釋二一疑問阿難雖聞如是法音心猶未明稽首白佛云何令我生死輪回安樂妙常同是六根更非他物上來所說是圓中實法所謂生死即涅槃煩惱即菩提也阿難于此不能無惑向疑結非根元今聞結即結元又衆生皆具六根何云即是妙常語既深妙請更明之二答釋二一長行二偈頌長行中三一約十八界示佛告阿難根塵同源縛脫無二識性虗妄猶如空華根塵識三攝十八界真則俱真妄則俱妄言同源者根塵同以陀那為源此妄源也又同以法性為源此真源也故維摩經云從無住本立一切法無住之言該乎真妄縛脫無二者如圓覺云不與法縛不求法脫注云性平等故其義正同夫根塵識既同源真妄故縛與脫無二也真則俱真俱名無二妄即俱妄同如空華豈分根塵為真而決定當用識性空華決不可用之異見乎況有用唯識五位硬配今文而言識決空妄真深經淺解諡鶴以烏也二約十二入示阿難由塵發知因根有相相見無性同於交蘆此處明示根塵二皆無性同於空妄妄既破去即同真源矣何曾獨指根塵是真決當用識性是妄決不用耶斷章節句豈能解佛經之大全乎交蘆相藉失一則俱仆或云交蘆別是一種粗大過於常蘆生必兩莖交抱而立二根盤結相連單則撲地不能自立三約六根示是故汝今知見立知即無明本知見無見斯即涅槃無漏真淨云何是中更容他物根界入三本一圓中實諦所謂同源無二也淨名指為無住本祖師指為迷中實相今經竟指根塵識以皆本如來藏妙真如性故也此乃就事點理極為圓頓而所以有無明涅槃之分者即妙玄解惑因緣而有四諦二諦之異而體只是一又前約界入示真空以遮俗有二觀之義明矣今特就六根以顯圓中故迷亦惟此悟亦惟此真亦惟此妄亦惟此三道流轉果中勝用如因地倒還因地起豈此外別有實諦中觀灼然矣云何是中更容他物喚作物即不中乃惟色惟聲惟根惟境之最親切語也次釋文者見色聞聲時自謂見色聞聲即知見立知也六根宛然根本無明只此念是知見無見者見色時不作見色之解聞聲亦然如人飲食時不自言我今飲食行路時不自言我今行路此即解脫之道以行不言行則與坐臥同見不言見則與嘗聽同是滅見安隱之法真空必由此證而行不言行即是真行見不言見即是真見真見即聞亦即嘗嗅六根互用非大涅槃之旨歟然真聞真見正於不立知見時湛然明露不可不知問聞不言聞見不言見知見豈遂忘耶答見聞無性上文元譬交蘆亦類空華衆生以妄念執之故成實有苟妄念不執知見體虗惟一真心而已此即涅槃更無他法可得涅槃然衆生飲食時孰有自言我今飲食者哉故云一切衆生即大涅槃不可復滅也二偈頌分二一頌正說二是名妙蓮下讚美初中二一重頌二孤起據後文云祇夜伽陀雜糅精瑩則此頌之有重頌有孤起明矣重頌中具明三觀之相而重在唯圓憨山師云此偈以三觀觀八識是也夫三觀為佛法之綱宗今人或得空而失假或得假而失中或影響乎中而失空假或慕次第三觀而忘圓融之道今偈意指三觀在一心中即唯圓也自初卷來阿難首請三觀前為開解文長意廣今示修門之要妙義萃于一文故後章讚其妙理清徹心目開明是一經之要也分三一頌十八界爾時世尊欲重宣此義而說偈言真性有為空緣生故如幻無為無起滅不實如空華憨山師以初句為空如幻句為假無為下為中極有眉眼恐初學未得其門更作一釋真性二字標起中道欲入中道須先會空故又標有為法空空從觀假而入緣生如幻即是假也夫緣生者謂衆緣生法既賴衆緣即無自性喻為如幻不亦宜乎從假入空故云無為無起滅而此空法亦是不實有類空華此偈前三句遮有後一句遮空即中道雙遮之義也須知三觀中前之二觀俱為中道雙遮所攝問此中俱明從假入空何無從空出假之觀答妙玄云若空非空點空出假今云無為不實即并空亦非而假觀在其中矣但文正意在中道雙遮耳若以此文頌上長行真性即根塵之源也根塵識三皆是有為今云無為尚似空華則識等之同空華可例知矣問今文本明一心三觀何同次第耶答此文以真性立宗直顯中道中以雙遮為體故明空假以遮二邊正是三觀在一心中耳二頌十二入言妄顯諸真妄真同二妄猶非真非真云何見所見中間無實性是故若交蘆言妄二句釋明上意幻即妄也言妄無自性所以顯諸法皆真所謂真者即無為無起滅也觀經玄云假是虗妄俗諦也空是審實真諦也與今意同妄真同二妄者中論云若法因待成是法還成待既有對待非皆妄乎猶非下意含況顯真即無為非真即有為前云緣生如幻指空前之假今非真既在真後即該空後之假文中正明中道雙非不但非空前之假并非空後之假問空前之假與空後之假亦有別乎答位有聖凡法無高下以空前是凡空後是聖故人必有殊然空後觀假止觀名為覆疏倒入輔行釋云自行雖破未委分別故名為疏次為利他更廣分別故名為復破已更來故名倒入亦名却入未前進故據記此文知觀假人殊而假亦不異今經文蓋前後互現耳又須知中道雙遮亦兼雙照以初觀破假次觀破空名曰雙非而初觀用空次觀用假復名雙照今舉任運雙非以該任運雙照雙非是中道之體故獨舉之言況顯者謂真與非真一破一立咸是聖證尚為中道所非況根塵未除成見所見與真性有何涉乎交光決定用根讀此可以悟矣中間者根塵相交之中也根塵相交斯有相見是相與見皆無實體失一俱倒譬若交蘆三頌六根結解同所因聖凡無二路汝觀交中性空有二俱非迷晦即無明發明便解脫初二句明結解無二結即是凡解即是聖同依六根更無二路此明結即結元故解亦無他路也汝觀下示解結之方交中性者根塵相交之中也以為空則幻用非無以為有則實體叵得交中之言似該根塵而意則在乎根以根亦從相交有耳此中復先空後有與上猶非真非真其言相映正以中道法門非空假二觀乃指別教十住所證為空十行去所證為有中雖別地圓住所證實不離現前六根故云汝觀交中性耳淨名經云說法不有亦不無以因緣故諸法生無我無造無受者善惡之業不敗亡從來解者以此文為圓頓教相豈不與今文同乎涅槃云見有二種一者常見二者斷見如是二見不名中道無常無斷乃名中道今文亦然迷晦下出結解相因迷晦故尋聲逐色見空見有皆是無明頌上知見立知即無明本也發明則思議情忘立證解脫頌上知見無見斯即涅槃也若論圓融三諦須如富那章中十界俱離十界俱即以明如來藏理方為暢論而入觀之法必以今文為司南文中有空前之假空後之假遮照咸備初後無殊三諦一心正在唯圓故以為一經之要義焉二孤起偈分三一起後文意解結因次第六解一亦亡根選擇圓通入流成正覺偈中凡示四義皆起後文一示解結有序如後文云是結本以次第綰生今日當須次第而解是也二示六解一亡如後云如來今日若總解除結若不生則無彼此尚不名一六云何成是也三示圓通須揀為後選擇圓通根本四示入流為要若據小乘須陀洹名入流今云成正覺者小乘止斷八十八使前無諸見不生猶滯偏空今空有二邊之見俱皆不生故成正覺以由入流成正覺故二示陀那識陀那微細識習氣成暴流真非真恐迷我常不開演前云知見立知即無明本知見之體陀那識是也陀那此翻執持即第八識具如桐洲注辨言微細者起信云非凡夫所知亦非二乘智慧所覺謂依菩薩從初正信發心觀察若證法身得少分知乃至菩薩究竟地不能盡知惟佛明了習氣者熏習氣分乃種子異名也以第八識中無始習氣微細生滅流注不息故如暴流又能引生五六七識復如暴流生諸波浪此識生滅與不生滅和合具真非真前文云猶非真非真者謂真性之體雙非真與非真本離對待今識體中既成二法相對而說便有真與非真二義佛于大小教中不說此識者恐凡小聞真謂識體空無生滅則執妄為真兼昧真性雙非之旨若聞此識非真又似撥波求水離此別求自心豈可得乎佛不開演其意在此此偈雖名孤起實推廣長行知見立知之意三誡取自心即雙明解結之故也自心取自心非幻成幻法不取無非幻非幻尚不生幻法云何立此亦一心頓證之道文意明陀那元即自心但由取著之故成根本無明則識體非幻而成幻妄之法苟不取著陀那即是真性真性非幻豈有妄乎又自心取自心者指上知見立知是取自心也知見中有一分不生滅義是真非幻因取著故遂成有為之幻次明知見無見即不取也此時對待俱忘非幻之真不立況幻俗乎此偈總意在離對待幽溪云上明中道雙遣即不取之理此明不取即中道雙非之觀二讚美是名妙蓮華金剛王寶覺如幻三摩提彈指超無學此阿毗達磨十方薄伽梵一路涅槃門先約觀力嘆中道現前不為二邊所染譬蓮華在淤泥中不為淤泥所染如法華開示悟入佛之知見衆生若離思量分別佛知見即開也今文云自心取自心者取即思量分別若離取著自心即顯與離分別思量佛知見即顯其義大同故名妙蓮華又今偈意收次第三觀歸一心三觀即同法華開權顯實乃十界皆中之道也次嘆真空蕩相如金剛王寶所擬皆碎梵語跋折羅此云金剛至堅至利能摧萬物譬以自心佛知見體遍入諸法則虗空銷殞器界化成無上知覺是十界皆空之道也三云如幻三摩提者上佛知見喻金剛寶能碎萬物實無摧碎之迹但修幻假法自歸真不但結惑是幻能解亦幻此義最要乃十界俱假之道觀今文則三摩提自屬幻假更無疑矣上三句的是圓三觀相故即結云彈指超無學只須不取自心便超小乘極位是頓教也已嘆觀力竟次約法門歎阿毗達磨此云無比法薄伽梵名含六義謂自在熾盛與端嚴名稱吉祥及尊貴也十方諸佛同此一路而為涅槃之門一路對十方說門對涅槃而言門名能通惟此三觀通入涅槃果位耳前請十方如來得成菩提之妙三觀於今起行文中開示已盡故結示之二兼顯六解一亡二一疑請二一經家敘事於是阿難及諸大衆聞佛如來無上慈誨祇夜伽陀雜糅精瑩妙理清徹心目開明歎未曾有阿難合掌頂禮白佛幽溪曰經家敘事則能詮在前所詮在後次阿難請則所詮在前能詮在後初文云無上慈誨兼指長行偈頌祇夜云應頌又云重頌即頌上長行也伽陀云諷頌亦略云偈不因長行但諷美而頌之二頌合明故云雜糅精瑩此指能詮也孤山云前四偈是重頌後五偈是孤起今謂前四偈中言妄顯諸真等亦是孤起後五偈中自心取自心等五句亦是重頌若然則雜糅精瑩於義為明二頌雖雜而詮理之言精而不雜瑩者照明之義次云妙理清徹指所詮之理如上所明以三觀觀八識理絶思議曰妙無染曰清盡底曰徹理既皎然可見故使人心開而目明耳二阿難陳辭我今聞佛無遮大悲性淨妙常真實法句心猶未達六解一亡舒結倫次唯垂大慈再愍斯會及與將來施以法音洗滌沉垢當機請中無遮大悲言其博濟也真性中道離諸對待有無俱遣為性淨妙常言法句者復指能詮長行偈頌之文既聞法句三觀之旨幸已洞然所未悟者六解一亡舒結倫次爾幽溪曰文雖兩句義則有六六解一也一亡二也舒開三也結成四也倫類五也次第六也倫類則取義于結成次第則義該乎解結惟垂下請答二開示二一明結成次第二明六解一亡初中三一以六結總譬六根即時如來於師子座整涅槃僧斂僧伽黎攬七寶几引手於几取劫波羅天所奉華巾於大衆前綰成一結示阿難言此名何等阿難大衆俱白佛言此名為結於是如來綰疊華巾又成一結重問阿難此名何等阿難大衆又白佛言此亦名結如是倫次綰疊華巾總成六結一一結成皆取手中所成之結持問阿難此名何等阿難大衆亦復如是次第酬佛此名為結涅槃僧裏衣也此方裙號僧伽黎大衣也劫波羅云時分或云即夜摩天或云髑髏天是四天王太子以華巾奉如來也谷響云疊即布名字或作氎即中云此巾六結必喻六根古人視之太易但注如文以致交光忽生異說公言六結不喻六根不知從四卷來以根喻結法喻了然乃至前文云結解因次第六解一亦亡根選擇圓通若不指根結何所喻此非難見如何固迷文中佛綰華巾成結問此名何等意重名字唯名可以定六結前後以結是總名結成之後又可名第一結第二結耳名必有實而此文中有六實六名名為最要然實為名本實者綰也言倫次者倫謂倫類六結相似次謂次第先後不紊夫根既有六結亦成六則以六結喻六根當矣次喻六根總名為結佛告阿難我初綰巾汝名為結此疊華巾先實一條第二第三云何汝曹復名為結阿難白佛言世尊此寶疊華緝績成巾雖本一體如我思惟如來一綰得一結名若百綰成終名百結何況此巾秪有六結終不至七亦不停五云何如來秪許初時第二第三不名為結次番問答明巾雖是一結不妨六喻雖是一精明不妨成六根此次番之意也初如來反問我初下牒前此疊下反問一條喻立一精明佛意似欲以巾比結巾既唯一結亦不應有二云何二三皆名結耶汝曹指阿難大衆但問二三此後可知佛故問者以法上容有此疑如疑秪一精明何故分成六根以巾比之則可知矣次阿難答中先領一精明之義故云一體緝績是織成義明巾之來由耳如我思惟下明結不妨多先泛言百結次何況下指歸六結言終不至七亦不停五則喻六根明矣此阿難以正義答如來也三喻六根體一用異佛告阿難此寶華巾汝知此巾元止一條我六綰時名有六結汝審觀察巾體是同因結有異於意云何初綰結成名為第一如是乃至第六結生吾今欲將第六結名成第一不不也世尊六結若存斯第六名終非第一縱我歷生盡其明辨如何令是六結亂名佛言如是六結不同循顧本因一巾所造令其雜亂終不得成則汝六根亦復如是畢竟同中生畢竟異第三番問巾體是一名或可亂阿難答謂巾雖是一結名難換此第三番之意也問中汝知下牒前是牒第二番非牒初番謂汝知以一精明分成六根也汝審下反問六名故問言巾體是同因結有異者不得仍以一精明分成六根解之乃佛以巾例結而欲換前後之名耳謂六結之義雖被汝成前後互換之義我還欲立於意下正明欲換名也前但總名為結此中兼定六名前後夫因初綰名一乃至六結名六似有來由名不可換然巾體畢竟同則第六亦可名第一否譬六根元一精明則見根可忽易為聞嘗根可忽易為嗅否次阿難復以正答六結次第名不可亂可顯六根成畢竟異六結正喻凡夫六根六結若存是實異六名非一是名異言實異者結時異故是實異也喻凡夫根體隔異終無目聽耳視舌嗅鼻嘗六根互換之事也縱我下謂不循其實但逞強詞奪理而欲以明辨亂名豈可得乎此中交光有異釋言六結是豎六根是橫以豎喻橫法喻不齊自立義云結時倫次非橫喻眼耳等六以彼根結元決非先眼後耳故也按後圓通所解六重結相一動二靜三聞四覺五空六滅以此為次與六結同即中云交光所解顯然背經佛意本以六結之異名喻六根之異用根則見聞用殊結則先後名異以異名喻異用法譬宛齊何論其橫豎耶況六結以次第成現文可據六根必無次第有何誠證如後經云因動有聲因聲有色因色有香因香有觸因觸有味因味知法六亂妄想成業惟故十二區分由此輪轉如經所言乃世界生起之次第六塵既有次第六根豈無次第耶又據衆生入胎成根次第如止觀云業行力故自然能起一念思心感召其母母便思青色呼聲臊氣酢味因此念力生一毫氣氣變為水水變為血血變為肉母氣出入以相資潤便得成肝藏向上成眼向下成手足大指若思白色哭聲腥氣辛味便成肺藏上向為鼻下向為手足第二指若思赤色語聲焦氣苦味便成心藏上向為口下向為手足第三指若思黃色歌聲香氣甜味便成脾藏上向為舌下向為手足第四指若思黑色吟聲臭氣鹹味便成腎藏上向為耳下向成手足第五指如止觀所說胎中成根亦有次第安得謂六根是橫定無先後耶然在今經先聲後色即先成耳次成眼經部不同不須和會而今文正意祗是以異名喻異用耳佛言如是下提譬合法結顯正義先提譬中六結喻六根不同一巾喻一精明言循顧者循是循環之義謂還顧本因也令其下明雖是一巾名不可亂則汝下合譬畢竟同是一精明合上一巾畢竟異是六根合上六結上來問答俱辨六結異名文云令其雜亂終不得成者顯名之不可亂也又云畢竟同中生畢竟異者顯根之事用殊也名異者謂第一非第二乃至第五非第六用殊者謂見非聞嘗非嗅法喻宛齊有何惑耶二明六解一亡為三一喻一六俱亡二一立喻佛告阿難汝必嫌此六結不成願樂一成復云何得阿難言此結若存是非鋒起于中自生此結非彼彼結非此如來今日若總解除結若不生則無彼此尚不名一六云何成先明六結次第已竟次明六解一亡佛復故問以使阿難自答六結不成者謂六結不成一也佛意云汝意必嫌六根妄隔樂成一體有何方便使成一耶阿難答中言此結若存是非鋒起者就凡夫立喻也若總解除者就聖人立喻也蓋對六名一六解則一自亡豈更有六相哉幽祖云上明從本向末在末觀之則六根不得不異故曰則汝六根亦復如是畢竟同中生畢竟異乃結成倫類義也此明循末歸本則六若解時其一亦亡故曰尚不名一六云何成故合法云六解一亡亦復如是乃結成六解一亡也二合法佛言六解一亡亦復如是由汝無始心性狂亂知見妄發發妄不息勞見發塵如勞目睛則有狂華於湛精明無因亂起一切世間山河大地生死涅槃皆即狂勞顛倒華相佛答中先合法六根若解則一精明亦亡不得如交光以動靜聞覺空滅為六結也前卷云入一無妄彼六知根一時清淨前偈云結解因次第六解一亦亡皆以六為六根安得作餘解耶由汝下欲明根解則塵亦淨故先示顛倒相心性即本覺之理狂亂指無始無明知見妄發指六根為知見也前文云所既妄立生汝妄能今此知見屬妄能發妄不息勞見發塵者如前文云如是擾亂相待成勞勞久發塵也文中有法譬合譬中目睛喻心性勞喻狂亂狂華喻知見妄發至勞見發塵合中山河大地是依報生死涅槃是正報由根塵合而成生死脫生死已復見涅槃生死為六即知見也涅槃為一亦為知見所攝皆喻狂華則依正凡小皆狂華矣合文從粗至細狂勞顛倒四字合勞目睛也此經前後所明皆先成依報後成正報今獨依根發塵者如前云由塵發知因根有相今順因根有相之義耳結解之要攝歸六根故明根解則塵亦淨後文云根結若除塵相自滅與今文相應次喻解結由心二一正顯由心阿難言此勞同結云何解除如來以手持所結巾偏掣其左問阿難言如是解不不也世尊旋復以手偏牽右邊又問阿難如是解不不也世尊佛告阿難吾今以手左右各牽竟不能解汝設方便云何解成阿難白佛言世尊當於結心解即分散佛告阿難如是如是若欲除結當於結心上文雖合六解一亡至由汝下仍是明結未論其解故今明解結由心六根勞相因于六結而言云何解除就法問也如來復就喻顯左右牽掣古人以喻二邊當於結心古人以喻中道語甚諦當然株守此言懼失古人之意須知一切二邊盡名左右無分別智總名結心如圓通章動靜二邊即是左右菩薩證無分別智則動靜二相了然不生即結心次之根塵相對即左右離根離塵即結心乃至世出世間名左右忽然超出即結心結心喻無結之處如綰疊成結其心本空空處解之結則分散若就根塵辨別如左右牽掣當知根塵之中有離根塵之處如首卷云如是見性是心非眼豈非根塵中之見性即非根塵乎此脫根塵之要道動靜世出世等例推可知故云若欲除結當于結心結心有四義一非結二不離結三結從此結四解從此解在法亦有四義一非根塵二不離根塵三根塵從此結四根塵從此除阿難言當于結心解即分散喻也佛言若欲除結當于結心法也當知心即中實圓觀雙遮二邊者是也二釋明因緣二一釋疑阿難我說佛法從因緣生非取世間和合粗相此文釋疑疑云從結心解結即是因緣何故前文排斥因緣故釋云我說佛法等佛說因緣窮盡細微即通非因緣自然之理豈同世間和合粗相若就本經前云四大和合發明世間種種變化即和合粗相盡理而言小乘教中明集因緣有苦道因緣有滅莫非和合粗相小乘四諦雖該真俗若對大乘秪名世諦而已小乘於世諦因緣未窮其細況出世因緣況因緣即非因緣自然乎二正明如來發明世出世法知其本因隨所緣出如是乃至恆沙界外一滴之雨亦知頭數現前種種松直棘曲鵠白烏玄皆了元由是故阿難隨汝心中選擇六根根結若除塵相自滅諸妄銷亡不真何待此明佛說因緣窮盡微細即通入于真也佛說世諦因緣已超粗相更有出世因緣靡不悉知故勝鬘云無量四聖諦者無作四聖諦也恆沙界外言其最遠一滴之雨言其最少亦知頭數則無遺照現前松何以直棘何以曲鵠何以白烏何以玄惟佛能知是知世間法根結若除塵相自滅亦因緣也是知出世間法前卷云汝但不循十二諸有為相隨拔一根脫黏內伏等此因由塵發知故先離塵今順因根有相故先除根據下觀音圓通亦先亡塵而後淨根此文之意恐人疑工夫唯在六根何不言塵故言根除則塵相永亡矣根塵俱銷不真何待豈真屬于因緣自然乎三喻解當次第二一立喻阿難吾今問汝此劫波羅巾六結現前同時解縈得同除不不也世尊是結本以次第綰生今日當須次第而解六結同體結不同時則結解時云何同除佛問中似欲以巾例結而令同除而不知六結只因同體所以解結不能同時此意反含未露阿難正論體結謂解從結來不從巾來結既次第綰生故六結異名第一乃至第六今日解結云何得同時而除默與佛意相符正以六結之異時喻六根之異用不必其皆有次第也但六結次第既非一時而解則六根異用豈可一時解也二合法佛言六根解除亦復如是此根初解先得人空空性圓明成法解脫解脫法已俱空不生是名菩薩從三摩地得無生忍文中先明解根有六番此根下更明三空次第五根雖未解已知根皆無我故云先得人空前卷云伏歸元真發本明耀耀性發明諸餘五黏應拔圓脫是空性圓明也根塵俱解名法解脫俱空不生者人法二空皆不生也前是六解此是一亡故至此文方圓六解一亡之義焉索隱云六根解結不可以華巾為例解巾則從一至六而為次第六根則以三空為次第即中云應拔圓脫雖無前後然如一心中而有生住異滅雖具四相止是一念今五根解除當亦如是雖在一念或有先後豈非圓脫耶三摩地者三摩提觀成之名也大論云一切禪定心皆名三摩地泰言正心行處是心無始常曲不端入正行處心則端直如蛇行常曲入筒則直亦名三昧無生忍者不見一法生不見一法滅以此理忍可于心此別地圓住所證或問前云空有二俱非今何言俱空耶答就人法言則謂之空就所顯真如則謂之中況俱空不生則其為中道明矣前偈明中道豈不從空有而入耶從五卷首至今明解結無二以通第二義一科竟二顯示修證此科從四卷阿難問入天王華屋如來正為宣說發來正行有二一發覺初心二顯示修證今為五一阿難請問圓根二一述解陳疑阿難及諸大衆蒙佛開示慧覺圓通得無疑惑一時合掌頂禮雙足而白佛言我等今日身心皎然快得無礙雖復悟知一六亡義然猶未達圓通本根前所示一心三觀名為慧覺六解一亡即屬圓通然猶未達圓通本根此問語中正意二敘意陳請世尊我輩飄零積劫孤露何心何慮預佛天倫如失乳兒忽遇慈母若復因此際會道成所得密言還同本悟則與未聞無有差別惟垂大悲惠我祕嚴成就如來最後開示作是語已五體投地退藏密機冀佛冥授際會道成承上文來謂從前孤露今生預佛天倫而際會如來道成之時也不即說圓通本根是為密言未曉本根何在即同先來所悟無用力之處既無處用力則與未聞一六亡義無以異矣非器不授曰祕嚴雖說而嚴終當惠我說經在法華涅槃之間名最後開示顯請已畢而惟以內心默念為機故曰密機佛不自說因衆敷陳是冥授也二如來詢諸聖衆爾時世尊普告衆中諸大菩薩及諸無漏大阿羅漢汝等菩薩及阿羅漢生我法中得成無學吾今問汝最初發心悟十八界誰為圓通從何方便入三摩地長水云從佛口生從法化生名生我法中最初所發之悟即是發心所從之界即方便也孤山曰此下二十五聖觀十八界及以七大乃開合之殊耳識大則合于六識根大則合于六根餘之五大則總收六塵以六塵之體不出地水火風空故也但言十八已攝七大故前文云十方如來于十八界一一修行皆得圓滿無上菩提又此十八只是六根以各開根塵識三故是則言六其義亦周故前云令汝生死輪轉安樂妙常同是六根更非他物三諸聖各說圓通五一觀六塵成道六一陳那觀聲六塵宜先優波尼沙陀今先聲塵幽祖謂有三義一以娑婆世界音聲為佛事一以如來成道而陳那先悟一以耳根圓通為此方最初方便正顯普門所修為當也分二一敘悟緣起憍陳那五比丘即從座起頂禮佛足而白佛言我在鹿苑及於雞園觀佛如來最初成道於佛音聲悟明四諦佛問比丘我初稱解如來印我名阿若多五人偈云頞跋提并俱利此三屬在父之親陳如十力母之親三轉法輪先度此太子初入山求道父王思念遣五人追侍二人喜五欲三人喜苦行太子勤行苦行二人捨去三人猶侍太子捨苦行還受酥油暖水三人又捨去太子得道念五人侍我勞苦在波羅奈念已便往為說四諦時三人乞食初教二人拘鄰法眼淨四人未得次二人乞食復教三人三人法眼淨第三說法時八萬諸天遠離塵垢五人得無生佛三問知法未即三答已知地神唱空神傳乃至梵世咸稱已知拘鄰最前初見佛道相初聞法鼓初服道香初嘗甘露初入法流初登真諦閻浮提得道最在一切人一切天一切羅漢前憍陳如是姓此翻火器阿若者名也此翻已知或言無知無知者非無所知也乃知無耳若依二諦即是知真以無生智為名也今文云我初稱解者是得阿羅漢而稱解不指得初果時中阿含云佛滅度後諸上德比丘皆住雞園智論云昔有野火燒林林中有雉入水漬羽以救其焚纂要云即雞頭摩寺也二牒證結答妙音密圓我於音聲得阿羅漢佛問圓通如我所證音聲為上妙音密圓者若在藏教指法性為妙音蓋小乘法性元神斷滅即微妙之音聲下文妙色妙香等例此可知離塵為密圓通為圓此在小教若通大教則以常住為妙三德為密圓具諸法為圓開小入大方有此義吳興曰夫開權顯實之說惟諸佛祕密之事非諸菩薩羅漢所能顯示其猶禮樂征伐自天子出非諸侯之事今佛所問最初發心悟十八界誰為圓通者且欲諸聖各述本根權實之道耳在昔方便未會真實諸聲聞人言與菩薩同入法性孰不自謂悟入圓通如陳那等雖曰妙音密圓但是聞生滅四諦微密圓悟未可混同如來藏理故中阿含云我至波羅奈擊妙甘露鼓又云如來說法初中後妙豈彼妙名便同法華之妙乎只如下文說圓覺聲聞云勝妙現圓及勝性現圓等又說大梵善見身心妙圓及妙見圓澄豈此妙圓亦同圓覺妙明之性乎應知如來先令諸聖次第說竟後告文殊言此二十五無學諸大菩薩及阿羅漢各說最初成道方便皆言修習真實圓通彼等修行實無優劣前後差別斯則開權會實之正文也文殊偈云聖性無不通順逆皆方便蓋演如來之旨也二沙陀觀色二一敘悟緣起優波尼沙陀即從座起頂禮佛足而白佛言我亦觀佛最初成道觀不淨相生大厭離悟諸色性以從不淨白骨微塵歸于虗空空色二無成無學道如來印我名尼沙陀觀不淨者九想之前先修死想不在九想之列九想中第一胖脹乃至第八白骨觀成分為二種一壞法人入第九燒想燒滅骨人急取無學二不壞法人住骨想觀八色流光進修背捨勝處十一切處禪歷觀練熏修名俱解脫成大阿羅漢今是壞法羅漢九想成時得慧解脫又云以從不淨該胖脹青瘀等七想次云白骨微塵歸于虗空乃從第八骨想入第九燒想燒後止存微塵微塵復歸空耳空色二無更離二邊又色是欲色二界空為無色界析空觀成故佛印彼為尼沙陀九想者一胖脹二青瘀三爛壞四血塗五膿爛六敗壞七噉八骨九燒二牒證結答塵色既盡妙色密圓我從色相得阿羅漢佛問圓通如我所證色因為上塵色下結顯圓通塵色是不淨所成法性即妙色也言色因者界是因義根境識三互為因故三香嚴觀香二一敘悟緣起香嚴童子即從座起頂禮佛足而白佛言我聞如來教我諦觀諸有為相我時辭佛宴晦清齊見諸比丘燒沉水香香氣寂然來入鼻中我觀此氣非木非空非烟非火去無所著來無所從由是意銷發明無漏如來印我得香嚴號教我諦觀諸有為相令其即事觀理也非木等者如三卷彼鼻香處所說若蒙烟嗅香便得云從木生香今香氣寂然未蒙烟氣則不生于木矣若生于空空性常恆香應常在嗅餘烟火而無香豈得云生于烟火乎去不至東西南北來不從自他共離香既無生復何分別故云意銷分別不有能所俱亡因妙香而莊嚴法身故號香嚴童子二牒證結答塵氣倐滅香氣密圓我從香嚴得阿羅漢佛問圓通如我所證香嚴為上先云香嚴童子則從菩薩受稱復云何得阿羅漢蓋敘昔日所證如月光童子初得小果後于佛所得童真名預菩薩會耳四藥王觀味二一敘悟緣起藥王藥上二法王子并在會中五百梵天即從座起頂禮佛足而白佛言我無始劫為世良翳口中嘗此娑婆世界草木金石名數凡有十萬八千如是悉知苦酢鹹淡甘辛等味并諸和合俱生變異是冷是熱有毒無毒悉能遍知承事如來了知味性非空非有非即身心非離身心分別味因從是開悟蒙佛如來印我昆季藥王藥上二菩薩名今于會中為法王子藥王藥上初為世之良醫因以是道而承事如來言非空非有者衆味宛然故非空咸離四性故非有如前偈云真性有為空緣生故如幻無為無起滅不實如空華則先非有而後非空今先非空而後非有皆所以明中道也如涅槃第十九佛告光明遍照高貴德王菩薩云云何復名甚深之義雖知衆生實無有我而于未來不失業果雖知五陰於此滅盡善惡之業終不敗亡雖有諸業不見作者雖有至處無有去者雖有繫縛無受縛者雖有涅槃亦無滅者是名甚深祕密之義據此經文雖知衆生下先明非有而後非空雖有諸業下復先明非空而後非有是甚深祕密之義豈不與楞嚴經旨相符合乎又涅槃二十五佛告師子吼菩薩云十二因緣其義甚深無知無見不可思惟乃是諸佛菩薩境界非諸聲聞緣覺所知以何義故甚深甚深衆生業行不常不斷而得果報雖念念滅而無所失雖無作者而有作業雖無受者而有果報受者雖滅果不敗亡無有慮知和合而有此文明十二因緣非有非空即是中道今明味性非空非有大旨略同無藥則舌與識不能別味故不即身心而別味者定是舌識故不離身心妙不決定亦中道也二牒證結答因味覺明位登菩薩佛問圓通如我所證味因為上具三諦為圓遍知十萬為通五跋陀觀觸二一敘悟緣起跋陀婆羅并其同伴十六開士即從座起頂禮佛足而白佛言我等先于威音王佛聞法出家於浴僧時隨例入室忽悟水因既不洗塵亦不洗體中間安然得無所有宿習無忘乃至今時從佛出家令得無學彼佛名我跋陀婆羅跋陀婆羅此云賢守亦云賢護自守護賢德亦守護衆生故水為所觸是十八界中事界即名因塵垢本非吾體故洗之意不在乎塵若離外塵體元無垢故洗之意亦不在體二俱不必洗豈得云因體有塵而人浴乎中間是共性各既無洗共豈有洗故安然也求其所洗者而不可得是得無所有二牒證結答妙觸宣明成佛子住佛問圓通如我所證觸因為上即觸無觸體是法性名為妙觸宣明六迦葉觀法二一敘悟緣起摩訶迦葉及紫金光比丘尼等即從座起頂禮佛足而白佛言我於往劫於此界中有佛出世名日月燈我得親近聞法修學佛滅度後供養舍利然燈續明以紫金光塗佛形像自爾以來世世生生身常圓滿紫金光聚此紫金光比丘尼等即我眷屬同時發心我觀世間六塵變壞唯以空寂修于滅盡身心乃能度百千劫猶如彈指我以空法成阿羅漢世尊說我頭陀為最摩訶迦葉此云大飲光是世尊傳衣弟子有佛名日月燈者法華疏云日是慧月是定定慧自行德也燈明是化他德又日月燈是三智云觀世間六塵者法塵是五塵落謝影子兼于五塵故云六也悟空寂法以修滅盡定而能度百千劫即是妙法開明也空法謂空去法塵頭陀新云杜多此云抖擻有十二行增一阿含云佛法中行十二頭陀難行苦行大迦葉為第一一阿蘭若二常乞食三糞掃衣四一坐食五節量食六中後不飲漿七冢間八樹下九露坐十常坐十一次第乞十二但三衣次牒證結答妙法開明銷滅諸漏佛問圓通如我所證法因為上雖不依法塵而圓明了知不由心念是妙法開明二觀五根成道五一那律觀眼二一敘悟緣起阿那律陀即從座起頂禮佛足而白佛言我初出家常樂睡眠如來訶我為畜生類我聞佛訶啼泣自責七日不眠失其雙目世尊示我樂見照明金剛三昧我不因眼觀見十方精真洞然如觀掌果如來印我成阿羅漢樂見或指習三昧之心然須以法性無時不矚名樂見也自性能照為照明金剛喻見性不壞精真者不雜根塵曰精是心非眼為真那律即阿㝹樓䭾此云無貧亦云如意乃白飯王之子過去世以一食施辟支感九十一劫受如意樂增一阿含云佛在給孤園為衆說法那律於中眼睡佛說偈訶曰咄咄何為睡螺螄蚌蛤類一睡一千年不聞佛名字那律於是達曉不眠眼根便失因是修禪得四大淨色半頭而見觀三千界猶如掌果今云金剛三昧觀見十方精真洞然而與昔異者此經開顯故約內祕以談昔引物機乃約現小而說吳興謂阿含云修禪蓋總略而示今云金剛三昧則別顯其名非謂金剛惟喻大定如阿難入電光三昧斷最後思惑亦名金剛三昧此喻小乘無漏之智耳智論云那律失眼四大造色半頭清淨佛天眼四大造色遍頭清淨智者云三藏佛全頭天眼徹見無礙故知全半之名但約分滿相望不以大小為異也又若據阿含觀大千此經見十方謂有優劣固未可也彼經云那律天眼見十方域不亦同乎掌果之譬既齊精真之言何別下文明善現天尚云精真現前陶鑄無礙況今羅漢發真無漏豈不得云精真洞然耶自初卷來示盲人矚暗是心非眼已明見性不屬眼根今那律失明而得遍見正此義也下觀音章須入流忘所聞所聞盡然後空中現前得耳根圓通正明聞性是心非耳而聞不屬于耳根矣奈何世人猶執圓通在根不在心也二結答圓通佛問圓通如我所證旋見循元斯為第一旋見循元謂旋眼根之見而歸之于本元也孤山曰見盡元明圓通著矣二周陀觀鼻二一敘悟緣起周利槃特迦即從座起頂禮佛足而白佛言我闕誦持無多聞性最初值佛聞法出家憶持如來一句伽陀於一百日得前遺後得後遺前佛愍我愚教我安居調出入息我時觀息微細窮盡生住異滅諸行剎那其心豁然得大無礙乃至漏盡成阿羅漢住佛座下即成無學周利槃特迦向來注疏不分作二人想以圓通之同而略其兄弟之非一人也周利一云周陀此云大路邊生佛本行經云其母是長者之女隨夫他國久而有孕垂産思歸行至中路即誕其子如是二度凡生二子乃以大小而區別之大即周陀小即莎伽陀或云槃特迦此云小路邊生以其繼兄生于道路又翻繼道據此則其為二人明矣法華經五百弟子受記品列周陀莎伽陀等又其一證資中云特迦過去為大法師善解經論有五百弟子祕吝佛法不肯教人後生暗鈍以宿善故遇佛出家五百比丘同教一偈經九十日不得成就佛知其根教以數息釋要云百日一句者兄見其弟誦之不得乃謂弟曰若不能誦何不還作白衣槃特聞已詣祇洹門泣佛問具答上事佛云成菩提由汝兄佛即以手牽詣靜室令誦守口攝意身莫犯如是行者得度世誦得上口佛曰汝今年老唯誦一偈不足為奇須解其義所謂身口意十觀其所起察其所滅由之生天由之入淵由之得道菩提自然因此心開得阿羅漢微細二字貫至剎那以息細故心亦微細能窮盡諸有為相息有四相謂生住異滅此四相即名諸行或云一念具四相即具四百剎那息豈不然是生中有諸剎那乃至異滅亦爾名諸行剎那因觀無常破四顛倒根身器界悉入空理故云豁然得大無礙幽溪引六妙門禪謂調息出入是一數二隨我時下三止四觀其心下五還六淨二結答圓通佛問圓通如我所證反息循空斯為第一長水云反生滅息循無生空空即大無礙圓也反息而入通也三憍梵觀舌二一敘悟緣起憍梵鉢提即從座起頂禮佛足而白佛言我有口業於過去劫輕弄沙門世世生生有牛呞病如來示我一味清淨心地法門我得滅心入三摩地觀味之知非體非物應念得超世間諸漏內脫身心外遺世界遠離諸有如鳥出籠離垢銷塵法眼清淨成阿羅漢如來親印我為無學憍梵鉢提此翻牛呞或云往世見老僧無齒而食笑其似牛故世世感生牛舌常如牛呞溫陵以念佛為一味清淨心地法門恐非正解當如孤山所云了味無味名為一味為是觀味下明觀法徒舌不知則非體徒物不知則非物非體非物則知非實有知非實有知即是空是為從假而入空非體所以內脫身心非物所以外遺世界應念得超故所以遠離三有離垢銷塵者前卷云想相為塵識情為垢而或以塵為見惑垢為思惑塵浮易袪垢膩難淨故喻見思未必然也當知離垢銷塵皆在初果垢是見惑塵是塵相初果已得六銷名曰塵銷法眼清淨正是須陀洹由初果進成阿羅漢也二結答圓通佛問圓通如我所證還味旋知斯為第一應念得超為通內外離等為圓還味即得一味旋知斯入無知舌乃合中知是故兼味而說四畢陵觀身二一敘悟緣起畢陵伽婆蹉即從座起頂禮佛足而白佛言我初發心從佛入道數聞如求說諸世間不可樂事乞食城中心思法門不覺路中毒刺傷足舉身疼痛我念有知知此深痛雖覺覺痛覺清淨心無痛痛覺我又思惟如是一身寧有雙覺攝念未久身心忽空三七日中諸漏虗盡成阿羅漢得親印記發明無學畢陵伽婆蹉此翻餘習五百世為婆羅門餘習多慢如罵河神非彼實心蓋習氣也數聞如來說諸世間不可樂事通而言之即八苦也思不可樂法觸不可樂事舉疼痛適當痛苦我念下次釋所悟初立雙覺我念有知知此深痛念即是觀雖覺等者雖身根之覺覺身根之痛而覺心本來清淨無身根之痛與夫知痛之覺我又下次遣雙覺雙覺者即謂知痛之覺與覺清淨心也攝念下三明證長水云有所得心一念不起名之為攝即與前若葉生滅守于真常其意是同身心皆空必不覺其痛矣諸漏之言不出三道惑業為諸漏之因生死為諸漏之果二結答圓通佛問圓通如我所證純覺遺身斯為第一純覺秪一真覺也答圓遺身身心忽空也答通五空生觀意二一敘悟緣起須菩提即從座起頂禮佛足而白佛言我曠劫來心得無礙自憶受生如恆河沙初在母胎即知空寂如是乃至十方成空亦令衆生證得空性蒙如來發性覺真空空性圓明得阿羅漢頓入如來寶明空海同佛知見印成無學解脫性空我為無上先敘解行心得無礙具從意根入也無礙即空理也母胎知空正報空也十方成空依報空也出胎之後亦使他證次明證入性覺真空是中道義空性圓明不但空見思惑而且六根皆空或但存通教徹證空理以是空故得阿羅漢果以被圓教接故入寶明空海寶明空海者長水云以空是如來藏故滿足周遍具一切法如摩尼珠隨意出生光明遍照法界性故如大溟渤深廣含攝因是中道正空故同一切種智之知佛眼之見也或疑小乘之空尚非性體何得云性覺真空要在如來所宣是中道正空在空生則先證空而復被別圓所接權順偏教印為無學耳人法二空及俱空不生是解脫性空謂得解脫而證性空我為第一二結答圓通佛問圓通如我所證諸相入非非所非盡旋法歸無斯為第一是圓接通故曰圓通言諸相入非者諸相法塵也入非入空也非所非盡者非但所非之相皆盡即能非之空亦空所謂如前火木然諸薪已亦復自然也尊者後意根入而云旋法者如前云必有所思發明汝意故今旋法塵而歸空無不但忘法塵并忘意根也三觀六識成道六一身子觀眼識二一敘悟緣起舍利弗即從座起頂禮佛足而白佛言我曠劫來心見清淨如是受生如恆河沙世出世間種種變化一見則通獲無障礙我於路中逢迦葉波兄弟相逐宣說因緣悟心無際從佛出家見覺明圓得大無畏成阿羅漢為佛長子從佛口生從法化生心見即眼識也此與後文普賢心聞其義稍異普賢不假耳根而于意根便發耳識故曰心聞今據下文一見則通是元因眼見而起心見然普賢心聞既非初心可入則身子心見决非他人可到智慧利根全由此得言清淨者不從眼識緣塵分別也從曠劫來依眼識修已非一生故得清淨二十五有因果為世間法三乘因果為出世間法緣塵分別則苦為苦集為集不見道滅惟其于世間法一見而知苦集反是則為修道證滅故曰一見則通獲無障礙雖然但依此而修未獲真證故於此世路逢良友宣說因緣悟心無際夫因緣為新醫破邪之妙法一遇金錍須消翳膜重聞得悟轉解為證見覺即心見始雖見覺未得明圓今既悟心得大無畏此與那律法門同而異者眼根三昧以體無分別為用故云旋見循元眼識三昧以分別為功故曰心見發光光極知見即中云識從根境而發今亦兼二世出世種種變化即是兼塵一見則通即是兼根故文殊揀云識見雜三和也因緣之言實指四諦故云法從因緣生亦從因緣滅我佛大沙門常作如是說法從因緣生是苦集二諦因緣是集諦生是苦諦此句中已含苦法忍苦法智苦比忍苦比智集諦亦然亦從因緣滅是道滅二諦因緣是道諦滅是滅諦此句中已含道法忍道法智道比忍道比智滅諦亦然故兩句內具十六剎那身子一聞即證初果雖同在初果而身子根利悟心無際餘經云身子路逢馬勝今云迦葉波者天如以為聞因緣義非止一人蓋彼此互出耳見覺即眼識亦取見即覺悟故云見覺覺者悟也明圓是徹證之義不但眼識明而五識皆明為佛長子下意兼釋難難云既是佛子從何處生釋云從佛口生又四生中應屬何生釋云從法化生既從佛法和合生其為僧寶無疑矣二結答圓通佛問圓通如我所證心見發光光極知見斯為第一前五根中皆有循元旋知等語今識兼二方有故不可以循元為例而云光極知見者光遍十方照窮萬法智光既發五根皆通也二普賢觀耳識二一敘悟緣起普賢菩薩即從座起頂禮佛足而白佛言我已曾與恆沙如來為法王子十方如來教其弟子菩薩根者修普賢行從我立名世尊我用心聞分別衆生所有知見若於他方恆沙界外有一衆生心中發明普賢行者我於爾時乘六牙象分身百千皆至其處縱彼障深未得見我我與其人暗中摩頂擁護安慰令其成就行彌法界曰普居衆伏之頂名賢手鑑云謂不假耳根而于意根便發耳識故曰心聞此即一根發六識名互用自在也然不同餘聖具談初因者則與觀音無異也若爾何得不是此界之當機耶謂塵非根則不了別識非根則不發生根親識疏是故文殊約此以揀又心聞之義即是真因初心絶分故揀之矣心中發明普賢行者言心中發明非心聞孰能知之蓋心聞不假耳根則所有知見亦不假音聲而能聞之雖從意根發耳識而所聞亦是法塵此見互用之妙問為以百千分身至一人處乎為至百千處乎答應至百千處也但明於恆沙界外不遺一衆生耳故云皆至其處手鑑云若於下顯機顯應縱彼下即冥機冥應機應相赴凡有四句展轉多句如妙玄明幽溪曰文殊雖云心聞遍十方生于大因力非初心方便謂非娑婆初心方便可爾豈有無始之終乎故首楞嚴百八三昧中有分別衆生諸心數法三昧要知以耳識分別所有衆生亦有從微至著工夫鏡淨明生其體自現若與觀音耳聞論同異者一因異是初心方便二境異乃耳根圓通三聞異則拔苦為先二結答圓通佛問圓通我說本因心聞發明分別自在斯為第一本因即真因也至等覺時分別自在又不假耳根名為自在心聞洞十方是圓遍至其處是通三難陀觀鼻識二一敘悟緣起孫陀羅難陀即從座起頂禮佛足而白佛言我初出家從佛入道雖具戒律於三摩地心常散動未獲無漏世尊教我及拘絺羅觀鼻端白我初諦觀經三七日見鼻中氣出入如烟身心內明圓洞世界遍成虗淨猶如琉璃烟相漸銷鼻息成白心開漏盡諸出入息化為光明照十方界得阿羅漢世尊記我當得菩提三摩地者三昧之別名觀鼻端白所以駐心與鼻識何涉然觀息出入時豈不用鼻識故吳興云似發十六特勝禪也此禪中第一知息入第二知息出第三知息長短等豈不用鼻識為能知耶身心內明下明觀成相至鼻息成白則不但鼻端白矣身心下因觀生滅息相空慧將發遂洞世界猶在方便未能忘緣故見其烟變成白相無生空慧現前諸息不生純是智慧慧光明照一切皆如世界衆生無非圓妙由斯漏盡當得菩提孫陀羅云好愛妻名也難陀云歡喜己號也慈恩兩名共翻艷喜為簡放牛難陀故標其妻乃如來親弟也二結答圓通佛問圓通我以銷息息久發明明圓滅漏斯為第一煙相漸銷故曰銷息息久發明即前云諸出入息化為光明四滿慈觀舌識二一敘悟緣起富樓那彌多羅尼子即從座起頂禮佛足而白佛言我曠劫來辨才無礙宣說苦空深達實相如是乃至恆沙如來祕密法門我於衆中微妙開示得無所畏世尊知我有大辨才以音聲輪教我發揚我於佛前助佛轉輪因師子吼成阿羅漢世尊印我說法無上舌識通于知味說法今別在說法宣說苦空屬小乘深達實相屬大乘是則苦空在阿含時深達在方等時以如來之音聲輪而使滿慈助揚此般若轉教時也二結答圓通佛問圓通我以法音降伏魔怨銷滅諸漏斯為第一手鑑云滿慈舌識故以法音言之中道法音降無明魔怨也說法可以制外故以魔怨言之五優波觀身識二一敘悟緣起優波離即從座起頂禮佛足而白佛言我親隨佛踰城出家親觀如來六年勤苦親見如來降伏諸魔制諸外道解脫世間貪欲諸漏承佛教戒如是乃至三千威儀八萬微細性業遮業悉皆清淨身心寂滅成阿羅漢我是如來衆中綱紀親印我心持戒修身衆推無上優波離此云上首以其持律為衆綱紀故或翻近執以佛為太子時彼為親近執事之臣故溫陵曰言親隨親觀乃至承教皆明身識欽承又自持戒修身亦身識也頌曰四重十三三不定三十九十四提尼一百衆學七滅諍總論二百五十戒行住坐臥律儀各二百五十對三聚成三千復以三千配身口七支成二萬一千復配四分煩惱成八萬四千性業即殺盜淫等謂本性是戒如殺盜淫妄王法亦禁遮業即支末愆失因過遮止者律中得度波離第一若以二百五十戒作五篇者一夷即淫殺盜妄四波羅夷比丘四條尼八條二殘即十三僧殘比丘十三條尼十七條三提即三十尼薩耆九十波逸提比丘百二十條尼二百八條四尼即四提舍尼比丘四條尼八條五吉即究吉羅比丘一百條尼一百條作七聚者一棄二衆殘三醜惡四墮五可呵六惡作七惡說身心寂滅必是定慧蓋內戒生定發慧也親印我心者印心清淨得證四果也二結答圓通佛問圓通我以執身身得自在次第執心心得通達然後身心一切通利斯為第一自在者無毀犯也通達者細防意地以至八萬皆備也一切通利三學具矣八萬皆備為圓通達為通六目連觀意識二一敘悟緣起大目犍連即從座起頂禮佛足而白佛言我初於路乞食逢遇優樓頻螺伽耶那提三迦葉波宣說如來因緣深義我頓發心得大通達如來惠我袈裟著身鬚髮自落我遊十方得無罣礙神通發明推為無上成阿羅漢寧唯世尊十方如來歎我神力圓明清淨自在無畏優樓頻螺此云木瓜癃胸前有癃如木瓜故伽耶山名即象頭山也亦云城城近此山故那提河名一兄二弟名三迦葉發心謂證初果神通由心性而發故曰發明云圓明清淨者下云心光發宣是也神通屬意者如前卷云以湛旋其虗妄滅生方能發通故有旋湛之言乃至明相精純一切變現不為煩惱皆合涅槃清淨妙德又吳興曰神名天心通名慧性而此心性即意識發明故通屬意也大乘發如來藏小乘發根本禪六神通中惟漏盡通是其內證餘之五通皆屬外用二結答圓通佛問圓通我以旋湛心光發宣如澄濁流久成清瑩斯為第一圓明為圓神通為通旋湛者旋意識而復妙湛乃轉意識為心光也我以下法如澄下喻須菩提章云心得無礙直名為心知是意根今旋湛而發心光當是意識四觀七大成道七一烏芻觀火大二一敘悟緣起三一貪欲為因烏芻瑟摩於如來前合掌頂禮佛之雙足而白佛言我常先憶久遠劫前性多貪欲烏芻瑟摩此云火頭即火頭金剛也金剛立於佛前故文中無即從座起句二遇佛得道有佛出世名曰空王說多淫人成猛火聚教我遍觀百骸四支諸冷暖氣神光內凝化多淫心成智慧火從是諸佛皆呼召我名為火頭觀四支百骸諸冷暖氣此觀法也夫對暖而稱冷對冷而名暖此對待之法若分別不起對待俱亡則神光內凝矣不由兩法起觀則分別何由忘神光何由凝而交光云句中冷字譯文誤耳應云諸暖觸氣是豈知觀心之道哉神光即智火內凝即三昧于火大法門為上首故曰火頭三結成火光我以火光三昧力故成阿羅漢心發大願諸佛成道我為力士親伏魔怨初成小果後發大心乃普現色身以執金剛神輔佛揚化者也二結答圓通佛問圓通我以諦觀身心暖觸無礙流通諸漏既銷生大寶焰登無上覺斯為第一雖借冷以觀暖而正意在暖先證四果後登無上覺即佛道也問身心暖觸者觸應是塵今是體暖何以觸言答暖因境發全暖即觸故前又云知身即觸知觸即身經意謂知冷暖在身是名知身而此冷暖即觸也知受冷暖之觸即是知觸而此冷暖實在身也桐洲云暖觸即空故云無礙性火妙發故曰流通內凝外現故生寶焰化淫心為智火即成佛道二持地觀地大二一敘悟緣起二一值無量佛具修福業持地菩薩即從座起頂禮佛足而白佛言我念往昔普光如來出現於世我為比丘常於一切要路津口田地險隘有不如法妨損車馬我皆平填或作橋梁或負沙土如是勤苦經無量佛出現于世或有衆生於闤闠處要人擎物我先為擎至其所詣放物即行不取其值毗舍浮佛現在世時世多飢荒我為負人無問遠近惟取一錢或有車牛被於泥溺我有神力為其推輪拔其苦惱時國大王延佛設齊我於爾時平地待佛經以平填道路為正擎物推輪為傍要路指陸地津口指水濱田地通指一切地高下凸凹曰險逼窄難行曰隘高則平之下則填之橋梁以濟津口沙土以填陸路闤市垣也闠市門也毗舍浮名遍一切自在以饑荒故惟取一文車則推輪牛則拔苦二別從毗舍浮聞教獲悟二一開解毗舍如來摩頂謂我當平心地則世界地一切皆平我即心開見身微塵與造世界所有微塵等無差別佛言當平心地乃圓頓上乘心造一切之旨而從地塵悟入故曰心開身塵從心有造世界塵亦從心有故云無別雖見依正無別但證小果後開佛知見則塵銷智圓而成大道二入證二一證阿羅漢微塵自性不相觸摩乃至刀兵亦無所觸我於法性悟無生忍成阿羅漢但就塵觀登第四果塵之自性本不相合安有觸摩正如俱舍論說微塵自性皆有間隙也乃至刀兵所加適復其本有何相觸無觸則無害可知法性即塵性也作此觀時生滅皆空即無生忍故般若云阿羅漢若智若斷是菩薩無生法忍也二開佛知見回心今入菩薩會中聞諸如來宣妙蓮華佛知見地我先證明而為上首後聞佛性方名回入法華云是法非思量分別之所能解又云開示悟入佛之知見是則知見不可無思議不可有名一實相地小乘由外法而證佛乘由心性而入據比則經通法華之後宜以方等被開醍醐為教相矣二結答圓通佛問圓通我以諦觀身界二塵等無差別本如來藏虗妄發塵塵銷智圓成無上道斯為第一二塵無別不偏屬小故即入如來藏故前見身微塵與造世界塵無別此義雙冠大小塵銷則通智圓即圓三月火觀水大二一敘悟緣起二一值佛受教月光童子即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名為水天教諸菩薩修習水觀入三摩地覺海性澄圓是水之第一義天二修觀入證二一修觀觀于身中水性無奪初從涕唾如是窮盡津液精血大小便利身中旋復水性一同見水身中與世界外浮幢王剎諸香水海等無差別一味水性更非餘大之所相傾故名無奪津液精血為外物所資乃由外入大小便等乃由內出有旋轉往復之義津液是身中之潤澤耳資中曰準華嚴經華藏海中有大蓮華其蓮華中有諸香水一一香水海為諸佛剎世界之種華藏世界在香水中故云浮幢王剎華藏二十重纍高如幢最為高大故稱王此方水脉江源則發岷山河源則星宿海更窮至崑崙無熱惱池水源極矣今窮所從來至浮幢王剎諸香水海此如來之教亦菩薩法眼之所觀也等無差別者起觀時元以無分別為觀法故內外無殊淨穢不二二入證二一證小四一未得忘身我於是時初成此觀但見其水未得無身即中云未得無身者未無變易之身非未無分段之身教中言變易者移粗形為細質易短壽為長年今唯見清水遍在一室豈非移粗形為細質乎後又云逢無量佛豈非易短壽為長年乎問變易界中安有童子及瓦礫耶答止觀十七卷二十一紙云八色之光是界外法當知戒定慧法悉不可盡故雖在界內已通界外今水定正是八色之一其云今我已得阿羅漢道及離病緣正指變易之身久離病緣也二因觀值緣當為比丘室中安禪我有弟子窺窗觀室唯見清水遍在室中了無所見童稚無知取一瓦礫投于水內激水作聲顧盻而去初修假想雖見其水與香水海等無差別但自心見非通他人今定力轉勝乃通他見亦定果色也不同十遍處想成自見耳十者青黃赤白地水火風空識皆從所觀境遍滿得名也三出觀知病我出定後頓覺心痛如舍利弗遭違害鬼我自思唯今我已得阿羅漢道久離病緣云何今日忽生心痛將無退失吳興曰得阿羅漢久離病緣等按智論明諸聖人皆有身苦如舍利弗風病畢陵伽眼病等今言已得羅漢久離病緣最難消會此蓋過去曾取小果既無見思惑業之事是離分段病苦之緣其時回心却入三界本無實疾所以疑之然此菩薩所修三昧與前持地觀法大同但由無明尚在未得無功用道是故出定不知病緣即中云已得四果而又久離病緣據久離病緣而生心痛是可疑也或有緣而不知則無宿命天眼將無退失果位歟亦是一說然古解為正釋要云舍利弗新剃髮竟正身端坐以衣覆頭爾時有二夜叉一名為害二名復害于時復害與為害言我于今日欲以拳打剃頭沙門為害云此有神德汝勿因此受長夜苦時復害以惡熾盛故以拳打打已地烈現身陷入地獄今云為害舉同時所逢也四審緣獲安爾時童子捷來我前說如上事我即告言汝更見水可即開門入此水中除去瓦爍童子奉教後入定時還復見水瓦礫宛然開門除出我後出定身質如初二證大逢無量佛如是至於山海自在通王如來方得亡身與十方界諸香水海性合真空無二無別今於如來得童真名預菩薩會既證法身分亡變易之身性水真空其相不二正是中道非但法空而已也二結答圓通佛問圓通我以水性一味流通得無生忍圓滿菩提斯為第一淮前持地當以水觀成時號無生忍至性合真空方為圓滿菩提然據今義得無生忍即滿菩提不必分二時也四琉璃觀風大二一敘悟緣起二一值佛受教琉璃光法王子即從座起頂禮佛足而白佛言我憶往昔經恆沙劫有佛出世名無量聲開示菩薩本覺妙明觀此世界及衆生身皆是妄緣風力所轉此菩薩以即動不動為圓通梵語吠琉璃此云遠山寶後經云因動有聲今即動顯靜故佛名無量聲也本覺妙明為本有三諦而云觀此世界等者正示動中有不動者在欲其觀動以顯不動之性不墮偏觀清淨真如之失上本有三諦是不動性妄緣風力即是動也應知妄法未空三諦不顯二修觀入證二一修觀我於爾時觀界安立觀世動時觀身動止觀心動念諸動無二等無差別我時覺了此群動性來無所從去無所至十方微塵顛倒衆生同一虗妄如是乃至三千大千一世界內所有衆生如一器中貯百蚊蚋啾啾亂鳴於分寸中鼓發狂閙此明依教修觀界之安立為風輪所持三世遷流亦風力所使身動止相待必皆有風如行有行風坐有坐風心動于內風動于外今空中之風蓬蓬然起于北海蓬蓬然入于南海孰非心力所致乎皆是風力故無差別來無所從去無所至者一往觀之則妄再往觀之則真既不從自他共離來不向東西南北去則動非實有即是妄也然來無所從即是無來去無所至即是無去無去無來是不動性從虗妄邊立空假二觀從不動邊立中道觀正三觀在一心中也前持地月光觀有次第證中甚遲今觀法巧妙證中甚速十方微塵下先成空假二觀既來無所從去無所至即是顛倒見同一妄見故云同也如一器下喻三昧一器喻大千百蚋喻衆生而器又極小不過分寸中之狂閙而已以菩薩知群動之源只一風力故所見如是二入證逢佛未幾得無生忍爾時心開乃見東方不動佛國為法王子事十方佛身心發光洞徹無礙此以見中為無生忍與前引阿羅漢若智若斷是菩薩無生法忍不同東方為群動之首而佛國號不動豈非動中有不動者存乎身心發光等此正言得名所自以洞了三諦在一心中故內外照徹如淨琉璃也二結答圓通佛問圓通我以觀察風力無依悟菩提心入三摩地合十方佛傳一妙心斯為第一風力無依者一切依正依風而住而風則無所依故非實有妙心者專動非妙專靜亦非妙即動無動三觀一心乃名為妙問上明三諦二粗一妙安顯圓通答釋籤云次第即已方成今即籤謂點彼偏空偏假即是中道是為次第即也後點此三俱空俱假俱中成妙三諦是故欲知圓理先須即彼次第五空藏觀空大二一敘悟緣起三一同佛所得虗空藏菩薩即從座起頂禮佛足而白佛言我與如來定光佛所得無邊身二備顯神用爾時手執四大寶珠照明十方微塵佛剎化成虗空又於自心現大圓鏡內放十種微妙寶光流灌十方盡虗空際諸幢王剎來入鏡內涉入我身身同虗空不相妨礙身能善入微塵國土廣行佛事得大隨順幽溪云四大寶珠表能觀四大之智十方塵剎表所觀四大之境第四卷中元將地水火風會入虗空今以手喻觀空之慧空含四大故執四珠四珠本空故照佛剎亦成虗空前卷又云性空真覺故于自心現大圓鏡表覺體也為照十方故現十光以光攝諸剎悉入心鏡而鏡內所照其分量不止于鏡則涉入我身矣而身質本空安有礙耶此時不必言諸剎皆空但虗空身不礙土耳身能善入者如此大身入諸國土不失本相土亦不窄故名善入又前以土入身今以身入土身如虗空故名善入生善滅惡名佛事小大相容為隨順三由觀獲證此大神力由我諦觀四大無依妄想生滅虗空無二佛國本同於同發明得無生忍四大依空而立既名曰空即無所依無依則無實不過妄想生滅而已諸佛國土亦復皆空故云本同既會四大入空復明空即空性并空亦忘名無生忍二結答圓通佛問圓通我以觀察虗空無邊入三摩地妙力圓明斯為第一虗空無邊即會四大入空也入三摩地即發明性覺也身土互入為圓光照剎土為明五大覺體互通為通又圓明即是圓通如後云現在諸菩薩今各入圓明六彌勒觀識大二一敘悟緣起三一遇佛受教彌勒菩薩即從座起頂禮佛足而白佛言我憶往昔經微塵劫有佛出世名日月燈明我從彼佛而得出家心重世名好遊俗姓爾時世尊教我修習唯心識定入三摩地貪著世名是向外馳求破外向內故令修唯識定手鑑云唯心識定有二種地前加行名影像唯識觀初地見道作真實唯識觀一切法以識為相真如為性據此則唯識之言應唯八識至成無上妙圓識心三昧即九識也二依教離過歷劫以來以此三昧事恆沙佛求世名心歇滅無有修習此觀正是對治知世名利有無厚薄皆我自己唯識所變不從他來故馳求頓息也三觀成得道至然燈佛出現于世我乃得成無上妙圓識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來今得授記次補佛處無上妙圓識心三昧即第三卷性覺明知覺明真識妙覺湛然周遍法界今云識性流出無量如來依正色心內外自他聖凡生佛一切不隔豈非無上妙圓之理耶現土霅川云現有二義一者約理現即是具二者約事謂三世變現良由理具方有事現前三卷正明性具所謂現即是具也今曰唯心乃至淨穢有無之言所謂三世變現也然兩處皆具二現唯心為性具之門性具乃唯心之本不作此釋何以會入于三卷之文而唯心亦失其本矣次現諸佛者盡十方三世諸佛皆我心性本具故復從識性流出如華嚴云若人欲了知三世一切佛應當如實觀心造諸如來豈不與今大合造有二義准前二現可嘵二結答圓通佛問圓通我以諦觀十方唯識識心圓明入圓成實遠離依他及遍計執得無生忍斯為第一諦觀之言若兼因中所修即該真妄至識心圓明即唯九識遍該依正為圓妙覺湛然為明通至果佛為通遍計性者衆生迷惑不了諸法本空妄于我身及一切法執為實有依他性者謂所有識法皆依衆緣相應而有都無自性唯是虗妄圓成性者謂真如自性不遷不變圓滿成就又遍計即我執依他即法執七勢至觀根大二一敘悟緣起二一遇佛受教又二一法大勢至法王子與其同倫五十二菩薩即從座起頂禮佛足而白佛言我憶往昔恆河沙劫有佛出世名無量光十二如來相繼一劫其最後佛名超日月光彼佛教我念佛三昧所稟之佛光光相傳共有十二一名無量光二名無邊光三名無礙光四名無對光五名大𦦨光六名清淨光七名歡喜光八名智慧光九名不斷光十名難思光十一名無稱光十二名超日月光故曰十二如來相繼一劫彼佛教我等明秉教之始立行之名念是能觀佛是所觀三昧曰正受因念佛力不受諸受而得正受但念佛之名其法最通以四種三昧通稱念佛餘三昧皆念本性之佛今此三昧同彼觀經乃托他佛而為所緣經敘昔秉雖不云專托彌陀而意則軌今行人一意西方也二喻下去兩重譬喻明必須念佛所以一相憶譬二染香譬初譬二一立喻二一喻衆生不念之失譬如有人一專為憶一人專忘如是二人若逢不逢或見非見一人專憶喻諸佛發僧那于始心終大悲以赴難無時不憶衆生一人專忘喻衆生背父逃逝竛竮五道唯貪粗弊色聲香味觸也若逢等者諸佛無時無處不現色身而行度脫隨法身遍處而應身亦遍奈衆生機疏無感佛緣故雖逢而不逢或見而不見耳二喻念佛之得二人相憶二憶念深如是乃至從生至生同于形影不相乖異二人相憶喻佛既念衆生衆生亦應念佛然佛念衆生無時無處不念其念已深衆生念佛亦無時無處不念方名二憶念深如是則生生常見佛土土覲如來故喻同形影不相乖異二合法二一帖合不念之失十方如來憐念衆生如母憶子若子逃逝雖憶何為前二人相憶其喻也泛故復舉母子而帖合之父嚴母慈故獨舉母子逃逝者帖合一人專忘雖憶何為帖若逢不逢或見非見二帖合念佛之得又二一帖喻子若憶母如母憶時母子歷生不相違遠教子憶母之方要當如母憶時不得一彈指頃念世五欲是為正念二正合若衆生心憶佛念佛現前當來必定見佛去佛不遠不假方便自得心開憶佛思憶而欲見也念佛念諸功德法門也現前下合母子歷生不相違遠去佛不遠者念佛衆生雖未成佛不久定當得之與佛相去不遠云不假方便者二十四門雖大小偏圓不同悉假方便惟今念佛只須憶念不勞更作餘觀蓋念佛雖屬意根不須卜度前經云但如鏡中無別分析今云不假方便是不將心推測其旨大同古人云執持名號名事一心即念無念名理一心今謂不起卜度則事一心即理一心也二染香喻如染香人身有香氣此則名曰香光莊嚴再喻衆生必須念佛者如染香人身有香氣故也身本不香因染香而有香氣生本非佛因念佛而有佛香香光莊嚴謂以如來德香光明而自莊嚴也二自行化他我本因地以念佛心入無生忍今於此界攝念佛人歸於淨土苕溪云以證驗修念佛之心不可單約事相而解念存三觀佛具三身心破三惑無生忍位方可入焉觀經云是心是佛是心作佛為念佛之要淨土者別指極樂通及寂光二結答圓通佛問圓通我無選擇都攝六根淨念相繼得三摩地斯為第一意根若淨諸根咸攝不須檢選也如念佛時眼不觀色眼念佛矣乃至身不貪觸即身念佛日用間惟彌陀是念淨土是求無有間斷名淨念相繼如此法門直契心地超勝餘門故為第一
